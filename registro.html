<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TELY 🎬 - Registrarse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0A0A0F;color:#fff;font-family:'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
        body:not(.dark){background:#f0f0f0;color:#111}
        .login-container{background:rgba(26,26,46,.95);border-radius:20px;padding:2.5rem;width:100%;max-width:400px;border:1px solid rgba(124,58,237,.15)}
        body:not(.dark) .login-container{background:#fff;border-color:rgba(0,0,0,.1)}
        .login-logo{font-size:2.5rem;font-weight:800;text-align:center;background:linear-gradient(135deg,#7C3AED,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.3rem}
        .login-sub{text-align:center;color:#94A3B8;font-size:.9rem;margin-bottom:1.5rem}
        body:not(.dark) .login-sub{color:#555}
        .login-input{width:100%;padding:.8rem 1rem;border-radius:12px;border:2px solid rgba(124,58,237,.2);background:rgba(255,255,255,.05);color:#fff;font-size:1rem;margin-bottom:1rem;transition:.3s}
        .login-input:focus{outline:none;border-color:#7C3AED;background:rgba(255,255,255,.08)}
        .login-input::placeholder{color:#64748B}
        body:not(.dark) .login-input{background:rgba(0,0,0,.05);color:#111;border-color:rgba(0,0,0,.1)}
        body:not(.dark) .login-input::placeholder{color:#888}
        .login-btn{width:100%;padding:.8rem;border-radius:12px;border:none;background:#7C3AED;color:#fff;font-size:1rem;font-weight:700;cursor:pointer;transition:.3s}
        .login-btn:hover{background:#6D28D9}
        .login-btn:disabled{opacity:.5;cursor:not-allowed}
        .login-divider{display:flex;align-items:center;gap:1rem;margin:1.5rem 0;color:#64748B;font-size:.85rem}
        .login-divider::before,.login-divider::after{content:"";flex:1;height:1px;background:rgba(124,58,237,.15)}
        body:not(.dark) .login-divider::before,body:not(.dark) .login-divider::after{background:rgba(0,0,0,.1)}
        .social-btn{width:100%;padding:.8rem;border-radius:12px;border:2px solid rgba(124,58,237,.15);background:transparent;color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:.3s;display:flex;align-items:center;justify-content:center;gap:.5rem}
        .social-btn:hover{background:rgba(124,58,237,.1);border-color:#7C3AED}
        .social-btn.google{color:#EA4335}
        body:not(.dark) .social-btn{color:#111;border-color:rgba(0,0,0,.1)}
        body:not(.dark) .social-btn:hover{background:rgba(124,58,237,.05)}
        .login-footer{text-align:center;margin-top:1.5rem;color:#94A3B8;font-size:.9rem}
        .login-footer a{color:#A78BFA;text-decoration:none;font-weight:600}
        .login-footer a:hover{text-decoration:underline}
        body:not(.dark) .login-footer{color:#555}
        body:not(.dark) .login-footer a{color:#7C3AED}
        .error-msg{color:#EF4444;font-size:.85rem;text-align:center;margin-top:.5rem;display:none}
        .success-msg{color:#34D399;font-size:.85rem;text-align:center;margin-top:.5rem;display:none}
        .theme-toggle{position:fixed;top:1rem;right:1rem;background:rgba(255,255,255,.05);border:none;color:#fff;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:1.1rem;transition:.3s}
        .theme-toggle:hover{background:rgba(255,255,255,.1)}
        body:not(.dark) .theme-toggle{background:rgba(0,0,0,.05);color:#111}
        body:not(.dark) .theme-toggle:hover{background:rgba(0,0,0,.1)}
        .back-link{display:inline-flex;align-items:center;gap:.3rem;color:#94A3B8;text-decoration:none;font-size:.85rem;margin-bottom:1rem;transition:.3s}
        .back-link:hover{color:#A78BFA}
        body:not(.dark) .back-link{color:#888}
        body:not(.dark) .back-link:hover{color:#7C3AED}
        .password-strength{height:4px;border-radius:2px;background:rgba(255,255,255,.1);margin-top:-.5rem;margin-bottom:1rem;overflow:hidden}
        .password-strength .bar{height:100%;width:0;border-radius:2px;transition:.3s}
        .password-strength .bar.weak{width:33%;background:#EF4444}
        .password-strength .bar.medium{width:66%;background:#F59E0B}
        .password-strength .bar.strong{width:100%;background:#34D399}
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn"><i class="fas fa-moon"></i></button>
    
    <div class="login-container">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Volver</a>
        <div class="login-logo">TELY</div>
        <p class="login-sub">Crea tu cuenta gratis</p>

        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>

        <form id="registerForm" onsubmit="event.preventDefault(); registrarUsuario()">
            <input type="text" class="login-input" id="regName" placeholder="👤 Nombre completo" required>
            <input type="email" class="login-input" id="regEmail" placeholder="📧 Correo electrónico" required>
            <input type="password" class="login-input" id="regPassword" placeholder="🔒 Contraseña (mínimo 6 caracteres)" required oninput="checkPasswordStrength(this.value)">
            <div class="password-strength"><div class="bar" id="passwordBar"></div></div>
            <input type="password" class="login-input" id="regPasswordConfirm" placeholder="🔒 Confirmar contraseña" required>
            <button type="submit" class="login-btn" id="registerBtn"><i class="fas fa-user-plus"></i> Registrarse</button>
        </form>

        <div class="login-divider">o continúa con</div>

        <button class="social-btn google" onclick="iniciarConGoogle()"><i class="fab fa-google"></i> Google</button>

        <div class="login-footer">
            ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script>
    const firebaseConfig = {
        apiKey: "AIzaSyCwLATDpQN1RWv3rLPjJXbNnIBkyo_BUfI",
        authDomain: "tely-ap.firebaseapp.com",
        databaseURL: "https://tely-ap-default-rtdb.firebaseio.com",
        projectId: "tely-ap",
        storageBucket: "tely-ap.firebasestorage.app",
        messagingSenderId: "760862940967",
        appId: "1:760862940967:web:69bbbbfee0de40f68a1302"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeBtn');
        if (body.classList.contains('dark')) { body.classList.remove('dark'); btn.innerHTML = '<i class="fas fa-moon"></i>'; localStorage.setItem('theme', 'light'); }
        else { body.classList.add('dark'); btn.innerHTML = '<i class="fas fa-sun"></i>'; localStorage.setItem('theme', 'dark'); }
    }
    if (localStorage.getItem('theme') === 'light') { document.body.classList.remove('dark'); document.getElementById('themeBtn').innerHTML = '<i class="fas fa-moon"></i>'; }
    else { document.body.classList.add('dark'); document.getElementById('themeBtn').innerHTML = '<i class="fas fa-sun"></i>'; }

    function mostrarError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 4000); }
    function mostrarExito(msg) { const el = document.getElementById('successMsg'); el.textContent = msg; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 4000); }

    function checkPasswordStrength(password) {
        const bar = document.getElementById('passwordBar');
        let strength = 0;
        if (password.length >= 6) strength++;
        if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
        if (/\d/.test(password)) strength++;
        if (/[^a-zA-Z0-9]/.test(password)) strength++;
        bar.className = 'bar';
        if (strength <= 1) bar.classList.add('weak');
        else if (strength <= 2) bar.classList.add('medium');
        else if (strength >= 3) bar.classList.add('strong');
    }

    function registrarUsuario() {
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regPasswordConfirm').value;
        const name = document.getElementById('regName').value.trim();
        const btn = document.getElementById('registerBtn');

        if (!email || !password || !confirm || !name) { mostrarError('Completa todos los campos'); return; }
        if (password.length < 6) { mostrarError('La contraseña debe tener al menos 6 caracteres'); return; }
        if (password !== confirm) { mostrarError('Las contraseñas no coinciden'); return; }

        btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Registrando...';

        auth.createUserWithEmailAndPassword(email, password)
            .then((userCredential) => {
                const user = userCredential.user;
                return user.updateProfile({ displayName: name }).then(() => {
                    return db.ref('usuarios/' + user.uid).set({
                        nombre: name,
                        email: email,
                        creado: Date.now(),
                        plan: 'gratis'
                    });
                });
            })
            .then(() => {
                mostrarExito('✅ Registro exitoso');
                setTimeout(() => window.location.href = 'index.html', 1500);
            })
            .catch((error) => {
                let msg = 'Error al registrar';
                if (error.code === 'auth/email-already-in-use') msg = 'Este correo ya está registrado';
                else if (error.code === 'auth/weak-password') msg = 'La contraseña es muy débil';
                else if (error.code === 'auth/invalid-email') msg = 'Correo inválido';
                mostrarError(msg);
                btn.disabled = false; btn.innerHTML = '<i class="fas fa-user-plus"></i> Registrarse';
            });
    }

    function iniciarConGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });
        auth.signInWithPopup(provider)
            .then((result) => {
                const user = result.user;
                return db.ref('usuarios/' + user.uid).once('value').then((snap) => {
                    if (!snap.exists()) {
                        return db.ref('usuarios/' + user.uid).set({
                            nombre: user.displayName || 'Usuario',
                            email: user.email,
                            foto: user.photoURL || '',
                            creado: Date.now(),
                            plan: 'gratis'
                        });
                    }
                });
            })
            .then(() => { window.location.href = 'index.html'; })
            .catch((e) => {
                if (e.code === 'auth/popup-closed-by-user') mostrarError('⚠️ Cancelaste el inicio de sesión');
                else mostrarError('❌ Error: ' + e.message);
            });
    }

    auth.onAuthStateChanged(user => { if (user) window.location.href = 'index.html'; });
    </script>
</body>
</html>
