<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TELY 🎬 - Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-page{padding:1rem;max-width:1200px;margin:0 auto}
        .admin-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:.5rem}
        .admin-card{background:rgba(255,255,255,.04);border-radius:12px;padding:1.2rem;border:1px solid rgba(124,58,237,.15);margin-bottom:1rem}
        body:not(.dark) .admin-card{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.1)}
        .admin-card h3{font-weight:700;margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
        .admin-input{width:100%;padding:.6rem;border-radius:8px;border:1px solid rgba(124,58,237,.2);background:rgba(255,255,255,.05);color:#fff;font-size:.9rem;margin-bottom:.5rem}
        body:not(.dark) .admin-input{background:rgba(0,0,0,.05);color:#111;border-color:rgba(0,0,0,.1)}
        .admin-input:focus{outline:none;border-color:#7C3AED}
        .admin-btn{background:#7C3AED;border:none;color:#fff;padding:.5rem 1.5rem;border-radius:8px;font-weight:700;cursor:pointer}
        .admin-btn:hover{background:#6D28D9}
        .admin-btn-danger{background:#EF4444}
        .admin-btn-danger:hover{background:#DC2626}
        .admin-btn-success{background:#10B981}
        .admin-btn-success:hover{background:#059669}
        .admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
        @media(max-width:768px){.admin-grid{grid-template-columns:1fr}}
        .admin-item{background:rgba(255,255,255,.02);border-radius:8px;padding:.6rem;border-left:3px solid #7C3AED;margin-bottom:.4rem}
        body:not(.dark) .admin-item{background:rgba(0,0,0,.02)}
        .admin-item .title{font-weight:600;font-size:.9rem}
        .admin-item .meta{font-size:.75rem;color:#94A3B8}
        body:not(.dark) .admin-item .meta{color:#888}
        .admin-item .actions{display:flex;gap:.3rem;margin-top:.2rem}
        .admin-item .actions button{padding:.1rem .6rem;border-radius:4px;border:none;font-size:.7rem;font-weight:600;cursor:pointer}
        .admin-item .actions .edit{background:rgba(59,130,246,.2);color:#60A5FA}
        .admin-item .actions .delete{background:rgba(239,68,68,.2);color:#F87171}
        .admin-item .actions .edit:hover{background:rgba(59,130,246,.3)}
        .admin-item .actions .delete:hover{background:rgba(239,68,68,.3)}
        .cap-item-admin{background:rgba(255,255,255,.02);border-radius:4px;padding:.3rem .6rem;margin:.2rem 0;border-left:2px solid #3B82F6;font-size:.8rem}
        body:not(.dark) .cap-item-admin{background:rgba(0,0,0,.02)}
        .badge-op2{color:#34D399;font-size:.6rem;font-weight:600}
        .badge-no-op2{color:#EF4444;font-size:.6rem;font-weight:600}
    </style>
</head>
<body class="admin-page">
    <div class="admin-header">
        <h1 style="background:linear-gradient(135deg,#7C3AED,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
            🛠️ Admin TELY
        </h1>
        <div>
            <button class="admin-btn admin-btn-success" onclick="cargarDatos()"><i class="fas fa-refresh"></i> Recargar</button>
            <a href="index.html" class="admin-btn" style="text-decoration:none;display:inline-block;"><i class="fas fa-home"></i> Volver</a>
        </div>
    </div>

    <!-- AGREGAR SERIE -->
    <div class="admin-card">
        <h3><i class="fas fa-plus-circle text-purple-500"></i> Agregar Serie</h3>
        <div class="admin-grid">
            <div>
                <input class="admin-input" id="sTitulo" placeholder="Título de la serie" value="Aprenderás">
                <input class="admin-input" id="sAnio" placeholder="Año" value="2024">
                <input class="admin-input" id="sPortada" placeholder="URL de la portada" value="https://image.tmdb.org/t/p/w342/kqjL17yufvn9OVLyXYpvtyrFfak.jpg">
                <textarea class="admin-input" id="sSinopsis" rows="2" placeholder="Sinopsis">Serie para aprender a programar</textarea>
            </div>
            <div>
                <h4 class="text-sm font-bold text-blue-400">Capítulos</h4>
                <div id="capitulosAdmin">
                    <div class="cap-item-admin">
                        <span>Cap 1: </span>
                        <input class="admin-input" style="display:inline-block;width:auto;" id="c1Titulo" placeholder="Título" value="Introducción">
                        <input class="admin-input" style="display:inline-block;width:auto;" id="c1Op2" placeholder="Opción 2 (Vidsrc)" value="https://vidsrc.in/embed/tv/1/1/1?lang=es">
                    </div>
                    <div class="cap-item-admin">
                        <span>Cap 2: </span>
                        <input class="admin-input" style="display:inline-block;width:auto;" id="c2Titulo" placeholder="Título" value="Variables">
                        <input class="admin-input" style="display:inline-block;width:auto;" id="c2Op2" placeholder="Opción 2 (Vidsrc)" value="https://vidsrc.in/embed/tv/1/1/2?lang=es">
                    </div>
                    <div class="cap-item-admin">
                        <span>Cap 3: </span>
                        <input class="admin-input" style="display:inline-block;width:auto;" id="c3Titulo" placeholder="Título" value="Funciones">
                        <input class="admin-input" style="display:inline-block;width:auto;" id="c3Op2" placeholder="Opción 2 (Vidsrc)" value="https://vidsrc.in/embed/tv/1/1/3?lang=es">
                    </div>
                </div>
                <button class="admin-btn" onclick="guardarSerie()"><i class="fas fa-save"></i> Guardar Serie</button>
            </div>
        </div>
    </div>

    <!-- LISTA DE SERIES -->
    <div class="admin-card">
        <h3><i class="fas fa-list text-emerald-500"></i> Series en Firebase</h3>
        <div id="listaSeries" class="max-h-96 overflow-y-auto">
            <p style="color:#64748B;font-size:.9rem;">Cargando series...</p>
        </div>
    </div>

    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/api.js"></script>
    <script>
        let serieKeyActual = null;

        // ----- GUARDAR SERIE -----
        async function guardarSerie() {
            const titulo = document.getElementById('sTitulo').value.trim() || 'Aprenderás';
            const serie = {
                titulo: titulo,
                anio: document.getElementById('sAnio').value.trim() || '2024',
                sinopsis: document.getElementById('sSinopsis').value.trim() || 'Sin sinopsis',
                portada: document.getElementById('sPortada').value.trim() || 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg',
                tipo: 'serie',
                categoria: 'series',
                genero: 'Educativo',
                opcion2: '',
                plataforma2: 'vidsrc',
                temporadas: [{
                    numero: 1,
                    nombre: 'Temporada 1',
                    capitulos: [
                        {
                            numero: 1,
                            titulo: document.getElementById('c1Titulo').value.trim() || 'Capítulo 1',
                            sinopsis: '',
                            url: generarEnlaceMultiplataforma(1, 'serie', 'unlimplay', 1, 1),
                            opcion2: document.getElementById('c1Op2').value.trim() || '',
                            plataforma2: 'vidsrc'
                        },
                        {
                            numero: 2,
                            titulo: document.getElementById('c2Titulo').value.trim() || 'Capítulo 2',
                            sinopsis: '',
                            url: generarEnlaceMultiplataforma(1, 'serie', 'unlimplay', 1, 2),
                            opcion2: document.getElementById('c2Op2').value.trim() || '',
                            plataforma2: 'vidsrc'
                        },
                        {
                            numero: 3,
                            titulo: document.getElementById('c3Titulo').value.trim() || 'Capítulo 3',
                            sinopsis: '',
                            url: generarEnlaceMultiplataforma(1, 'serie', 'unlimplay', 1, 3),
                            opcion2: document.getElementById('c3Op2').value.trim() || '',
                            plataforma2: 'vidsrc'
                        }
                    ]
                }]
            };

            try {
                if (serieKeyActual) {
                    await db.ref(`series_personalizadas/${serieKeyActual}`).update(serie);
                    mostrarToast('✅ Serie actualizada', 'success');
                } else {
                    await db.ref('series_personalizadas').push(serie);
                    mostrarToast('✅ Serie guardada', 'success');
                }
                cargarSeries();
                serieKeyActual = null;
                document.getElementById('sTitulo').value = 'Aprenderás';
                document.getElementById('sAnio').value = '2024';
                document.getElementById('sSinopsis').value = 'Serie para aprender a programar';
            } catch(e) {
                mostrarToast('❌ Error: ' + e.message, 'error');
            }
        }

        // ----- CARGAR SERIES -----
        async function cargarSeries() {
            const container = document.getElementById('listaSeries');
            container.innerHTML = '<p style="color:#64748B;font-size:.9rem;">Cargando series...</p>';
            try {
                const snap = await db.ref('series_personalizadas').once('value');
                const data = snap.val();
                if (!data) {
                    container.innerHTML = '<p style="color:#64748B;font-size:.9rem;">No hay series guardadas</p>';
                    return;
                }
                container.innerHTML = '';
                Object.entries(data).forEach(([key, s]) => {
                    const caps = s.temporadas?.[0]?.capitulos || [];
                    const capInfo = caps.map((cap, i) => {
                        const tieneOp2 = cap.opcion2 && cap.opcion2.trim() !== '';
                        return `<span class="${tieneOp2 ? 'badge-op2' : 'badge-no-op2'}">Cap${i+1} ${tieneOp2 ? '✅ Op2' : '❌ Sin Op2'}</span>`;
                    }).join(' ');
                    const div = document.createElement('div');
                    div.className = 'admin-item';
                    div.innerHTML = `
                        <div class="title">${s.titulo}</div>
                        <div class="meta">${s.anio} • ${s.genero || 'Serie'}</div>
                        <div class="meta">${capInfo}</div>
                        <div class="actions">
                            <button class="edit" onclick="editarSerie('${key}')"><i class="fas fa-pen"></i> Editar</button>
                            <button class="delete" onclick="eliminarSerie('${key}')"><i class="fas fa-trash"></i> Eliminar</button>
                        </div>
                    `;
                    container.appendChild(div);
                });
            } catch(e) {
                container.innerHTML = '<p style="color:#EF4444;font-size:.9rem;">Error al cargar</p>';
            }
        }

        // ----- EDITAR SERIE -----
        async function editarSerie(key) {
            try {
                const snap = await db.ref(`series_personalizadas/${key}`).once('value');
                const s = snap.val();
                if (!s) return;
                serieKeyActual = key;
                document.getElementById('sTitulo').value = s.titulo || '';
                document.getElementById('sAnio').value = s.anio || '';
                document.getElementById('sSinopsis').value = s.sinopsis || '';
                document.getElementById('sPortada').value = s.portada || '';
                const caps = s.temporadas?.[0]?.capitulos || [];
                if (caps[0]) {
                    document.getElementById('c1Titulo').value = caps[0].titulo || '';
                    document.getElementById('c1Op2').value = caps[0].opcion2 || '';
                }
                if (caps[1]) {
                    document.getElementById('c2Titulo').value = caps[1].titulo || '';
                    document.getElementById('c2Op2').value = caps[1].opcion2 || '';
                }
                if (caps[2]) {
                    document.getElementById('c3Titulo').value = caps[2].titulo || '';
                    document.getElementById('c3Op2').value = caps[2].opcion2 || '';
                }
                mostrarToast('📝 Editando: ' + s.titulo, 'warning');
            } catch(e) {
                mostrarToast('❌ Error al cargar: ' + e.message, 'error');
            }
        }

        // ----- ELIMINAR SERIE -----
        async function eliminarSerie(key) {
            if (!confirm('¿Eliminar esta serie?')) return;
            try {
                await db.ref(`series_personalizadas/${key}`).remove();
                if (serieKeyActual === key) serieKeyActual = null;
                cargarSeries();
                mostrarToast('🗑️ Serie eliminada', 'warning');
            } catch(e) {
                mostrarToast('❌ Error: ' + e.message, 'error');
            }
        }

        // ----- RECARGAR DATOS -----
        function cargarDatos() {
            cargarSeries();
            mostrarToast('🔄 Datos recargados', 'success');
        }

        // ----- FUNCIONES AUXILIARES -----
        function mostrarToast(mensaje, tipo = 'success') {
            const colores = { success: '#10B981', warning: '#F59E0B', error: '#EF4444' };
            const t = document.createElement('div');
            t.style.cssText = `
                position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
                background:${colores[tipo] || '#10B981'};color:#fff;padding:10px 20px;
                border-radius:10px;z-index:9999;font-weight:600;max-width:90%;
                text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.5);
                transition:opacity 0.3s;
            `;
            t.textContent = mensaje;
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2500);
        }

        // ----- INICIO -----
        cargarSeries();

        // Escuchar cambios en tiempo real
        db.ref('series_personalizadas').on('value', () => {
            console.log('🔄 Cambio detectado en series');
            cargarSeries();
        });

        console.log('✅ Admin TELY cargado');
    </script>
</body>
</html>
