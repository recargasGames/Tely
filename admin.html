<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TELY 🎬 - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0A0A0F;color:#fff;font-family:'Segoe UI',Roboto,sans-serif;min-height:100vh;transition:background 0.3s, color 0.3s}
        body.dark{background:#0A0A0F;color:#fff}
        body:not(.dark){background:#f0f0f0;color:#111}
        
        .main-content{width:100%;padding:1rem;max-width:800px;margin:0 auto}
        
        .top-header{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0 1rem;flex-wrap:wrap;gap:.5rem}
        .top-header h1{font-size:1.3rem;font-weight:700;background:linear-gradient(135deg,#7C3AED,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .top-actions{display:flex;align-items:center;gap:.5rem}
        .theme-btn{background:rgba(255,255,255,.05);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:.9rem;transition:.3s}
        .theme-btn:hover{background:rgba(255,255,255,.1)}
        body:not(.dark) .theme-btn{background:rgba(0,0,0,.05);color:#111}
        body:not(.dark) .theme-btn:hover{background:rgba(0,0,0,.1)}
        .user-btn{background:rgba(124,58,237,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;transition:.3s}
        .user-btn:hover{background:rgba(124,58,237,.3)}
        body:not(.dark) .user-btn{color:#111}
        
        .admin-card{background:rgba(255,255,255,.04);border-radius:12px;padding:1.2rem;border:1px solid rgba(124,58,237,.15);margin-bottom:1rem}
        body:not(.dark) .admin-card{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.1)}
        .admin-card h3{font-weight:700;margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem}
        .admin-btn{background:#7C3AED;border:none;color:#fff;padding:.5rem 1.5rem;border-radius:8px;font-weight:700;cursor:pointer;transition:.3s;font-size:.85rem}
        .admin-btn:hover{background:#6D28D9}
        .admin-btn-magic{background:#F59E0B;color:#111;font-size:1.1rem;padding:.8rem 2rem}
        .admin-btn-magic:hover{background:#D97706}
        .admin-btn-green{background:#10B981}
        .admin-btn-green:hover{background:#059669}
        .admin-btn-danger{background:#EF4444}
        .admin-btn-danger:hover{background:#DC2626}
        .admin-btn-blue{background:#3B82F6}
        .admin-btn-blue:hover{background:#2563EB}
        .admin-btn-purple{background:#8B5CF6}
        .admin-btn-purple:hover{background:#7C3AED}
        .admin-btn-cyan{background:#06B6D4;color:#fff}
        .admin-btn-cyan:hover{background:#0891B2}
        
        .btn-group{display:flex;gap:.3rem;flex-wrap:wrap;margin:.3rem 0}
        .btn-group .admin-btn{padding:.3rem 1rem;font-size:.75rem}
        
        .admin-item{display:flex;flex-direction:column;gap:.3rem;background:rgba(255,255,255,.02);border-radius:8px;padding:.6rem .8rem;border-left:3px solid #7C3AED;margin-bottom:.4rem}
        body:not(.dark) .admin-item{background:rgba(0,0,0,.02)}
        .admin-item .top-row{display:flex;align-items:center;gap:.8rem;flex-wrap:wrap}
        .admin-item .thumbnail{width:45px;height:67px;border-radius:4px;object-fit:cover;background:#1A1A2E;flex-shrink:0}
        .admin-item .info-item{flex:1;min-width:0}
        .admin-item .title{font-weight:600;font-size:.85rem}
        .admin-item .meta{font-size:.65rem;color:#94A3B8;display:flex;gap:.6rem;flex-wrap:wrap}
        
        .admin-item .enlace-wrap{width:100%;margin-top:.1rem}
        .admin-item .enlace{font-size:.6rem;color:#60A5FA;word-break:break-all;padding:.2rem .4rem;background:rgba(59,130,246,.06);border-radius:4px;border:1px solid rgba(59,130,246,.08);width:100%;cursor:pointer}
        .admin-item .enlace:hover{border-color:rgba(59,130,246,.3)}
        .admin-item .enlace.op1{color:#34D399;border-color:rgba(16,185,129,.15)}
        .admin-item .enlace.op2{color:#60A5FA;border-color:rgba(59,130,246,.15)}
        
        .admin-item .edit-input{width:100%;padding:.2rem .4rem;border-radius:4px;border:1px solid rgba(124,58,237,.2);background:rgba(255,255,255,.05);color:#fff;font-size:.6rem;margin-top:.1rem}
        body:not(.dark) .admin-item .edit-input{background:rgba(0,0,0,.05);color:#111;border-color:rgba(0,0,0,.1)}
        .admin-item .edit-input:focus{outline:none;border-color:#7C3AED}
        
        .admin-item .edit-actions{display:flex;gap:.2rem;margin-top:.1rem}
        .admin-item .edit-actions button{padding:.05rem .5rem;font-size:.5rem;border-radius:4px;border:none;cursor:pointer;font-weight:600}
        .admin-item .edit-actions .save-btn{background:rgba(16,185,129,.15);color:#34D399}
        .admin-item .edit-actions .save-btn:hover{background:rgba(16,185,129,.25)}
        .admin-item .edit-actions .cancel-btn{background:rgba(239,68,68,.15);color:#F87171}
        .admin-item .edit-actions .cancel-btn:hover{background:rgba(239,68,68,.25)}
        
        .admin-item .actions{display:flex;gap:.3rem;flex-wrap:wrap;margin-top:.2rem}
        .admin-item .actions .admin-btn{padding:.1rem .6rem;font-size:.55rem;border-radius:4px}
        .admin-item .badge-tipo{font-size:.5rem;font-weight:600;padding:.03rem .4rem;border-radius:4px}
        .admin-item .badge-tipo.pelicula{background:rgba(124,58,237,.12);color:#A78BFA}
        .admin-item .badge-tipo.serie{background:rgba(16,185,129,.12);color:#34D399}
        
        .user-dropdown{position:absolute;right:0;top:calc(100% + 8px);background:rgba(26,26,46,.95);border-radius:12px;width:200px;border:1px solid rgba(124,58,237,.15);padding:.4rem 0;display:none;z-index:50;box-shadow:0 20px 60px rgba(0,0,0,.5)}
        .user-dropdown.show{display:block}
        body:not(.dark) .user-dropdown{background:rgba(255,255,255,.95);border-color:rgba(0,0,0,.1)}
        .user-dropdown a{display:flex;align-items:center;gap:.6rem;padding:.4rem 1rem;color:#CBD5E1;text-decoration:none;font-size:.85rem;transition:.2s}
        .user-dropdown a:hover{background:rgba(124,58,237,.08);color:#fff}
        body:not(.dark) .user-dropdown a{color:#333}
        body:not(.dark) .user-dropdown a:hover{background:rgba(124,58,237,.08);color:#111}
        .user-dropdown hr{margin:.2rem 0;border:none;border-top:1px solid rgba(124,58,237,.08)}
        .user-menu{position:relative}
        
        .loading-text{color:#64748B;font-size:.9rem}
        .progress-bar{height:6px;background:rgba(255,255,255,.1);border-radius:3px;margin-top:.5rem;overflow:hidden}
        .progress-bar .fill{height:100%;width:0%;background:linear-gradient(90deg,#F59E0B,#F97316);border-radius:3px;transition:width 0.5s}
        .badge-count{display:inline-block;padding:.05rem .5rem;border-radius:9999px;background:rgba(124,58,237,.2);color:#A78BFA;font-size:.65rem;font-weight:600}
        .admin-protected{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);border-radius:8px;padding:.5rem 1rem;text-align:center;margin-bottom:.5rem;font-size:.8rem;color:#34D399}
        .admin-protected i{color:#34D399}
        .admin-protected.denied{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.2);color:#F87171}
        .login-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:9999;display:flex;align-items:center;justify-content:center;padding:1rem}
        .login-overlay.oculto{display:none}
        .login-box{background:rgba(26,26,46,.95);border-radius:20px;padding:2.5rem;width:100%;max-width:400px;border:1px solid rgba(124,58,237,.15)}
        body:not(.dark) .login-box{background:#fff;border-color:rgba(0,0,0,.1)}
        .login-box .logo{font-size:2.5rem;font-weight:800;text-align:center;background:linear-gradient(135deg,#7C3AED,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.3rem}
        .login-box .sub{text-align:center;color:#94A3B8;font-size:.9rem;margin-bottom:1.5rem}
        body:not(.dark) .login-box .sub{color:#555}
        .login-input{width:100%;padding:.8rem 1rem;border-radius:12px;border:2px solid rgba(124,58,237,.2);background:rgba(255,255,255,.05);color:#fff;font-size:1rem;margin-bottom:1rem;transition:.3s}
        .login-input:focus{outline:none;border-color:#7C3AED;background:rgba(255,255,255,.08)}
        .login-input::placeholder{color:#64748B}
        body:not(.dark) .login-input{background:rgba(0,0,0,.05);color:#111;border-color:rgba(0,0,0,.1)}
        body:not(.dark) .login-input::placeholder{color:#888}
        .login-btn{width:100%;padding:.8rem;border-radius:12px;border:none;background:#7C3AED;color:#fff;font-size:1rem;font-weight:700;cursor:pointer;transition:.3s}
        .login-btn:hover{background:#6D28D9}
        .login-btn:disabled{opacity:.5;cursor:not-allowed}
        .login-error{color:#EF4444;font-size:.85rem;text-align:center;margin-top:.5rem;display:none}
        .login-success{color:#34D399;font-size:.85rem;text-align:center;margin-top:.5rem;display:none}
        .login-footer{text-align:center;margin-top:1rem;color:#94A3B8;font-size:.85rem}
        body:not(.dark) .login-footer{color:#555}
        .login-footer a{color:#A78BFA;text-decoration:none;font-weight:600}
        body:not(.dark) .login-footer a{color:#7C3AED}
        .search-admin{display:flex;gap:.5rem;margin-bottom:.5rem;flex-wrap:wrap}
        .search-admin input{flex:1;padding:.4rem .8rem;border-radius:8px;border:1px solid rgba(124,58,237,.2);background:rgba(255,255,255,.05);color:#fff;font-size:.85rem;min-width:150px}
        body:not(.dark) .search-admin input{background:rgba(0,0,0,.05);color:#111;border-color:rgba(0,0,0,.1)}
        .search-admin input:focus{outline:none;border-color:#7C3AED}
        .search-admin select{padding:.4rem .8rem;border-radius:8px;border:1px solid rgba(124,58,237,.2);background:rgba(255,255,255,.05);color:#fff;font-size:.85rem;cursor:pointer}
        body:not(.dark) .search-admin select{background:rgba(0,0,0,.05);color:#111;border-color:rgba(0,0,0,.1)}
        .search-admin select:focus{outline:none;border-color:#7C3AED}
        
        .capitulo-detalle{background:rgba(255,255,255,.02);border-radius:6px;padding:.2rem .4rem;margin:.15rem 0;border-left:2px solid rgba(59,130,246,.3)}
        .capitulo-detalle .cap-titulo{font-size:.65rem;font-weight:500;color:#E2E8F0}
        body:not(.dark) .capitulo-detalle .cap-titulo{color:#111}
        .capitulo-detalle .cap-meta{font-size:.55rem;color:#64748B}
        .capitulo-detalle .cap-enlace{font-size:.55rem;color:#60A5FA;word-break:break-all}
        .serie-expandida{border-left-color:#34D399!important}
        .toggle-series-btn{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.2);color:#3B82F6;padding:.1rem .4rem;border-radius:4px;font-size:.55rem;font-weight:600;cursor:pointer;transition:.2s}
        .toggle-series-btn:hover{background:rgba(59,130,246,.25)}
        
        .temp-selector-serie{
            display:flex;
            align-items:center;
            gap:.5rem;
            margin:.3rem 0 .2rem;
            flex-wrap:wrap;
        }
        .temp-selector-serie label{
            font-size:.65rem;
            color:#94A3B8;
            font-weight:600;
        }
        .temp-selector-serie select{
            padding:.1rem .6rem;
            border-radius:6px;
            border:1px solid rgba(124,58,237,.2);
            background:rgba(255,255,255,.05);
            color:#fff;
            font-size:.65rem;
            cursor:pointer;
        }
        body:not(.dark) .temp-selector-serie select{
            background:rgba(0,0,0,.05);
            color:#111;
            border-color:rgba(0,0,0,.1);
        }
        .temp-selector-serie select:focus{
            outline:none;
            border-color:#7C3AED;
        }
        .temp-selector-serie .badge-temp{
            font-size:.55rem;
            color:#34D399;
            background:rgba(16,185,129,.1);
            padding:.03rem .4rem;
            border-radius:9999px;
        }
        
        .temporada-caps{margin-top:.2rem;padding:.1rem .2rem;background:rgba(255,255,255,.01);border-radius:4px}
        .temporada-header{font-size:.65rem;font-weight:700;color:#34D399;margin:.2rem 0 .1rem;display:flex;align-items:center;gap:.3rem;padding:.05rem .2rem;background:rgba(16,185,129,.05);border-radius:4px}
        
        .paginacion{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.5rem 0;flex-wrap:wrap}
        .paginacion button{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.2);color:#fff;padding:.2rem .8rem;border-radius:6px;font-size:.75rem;cursor:pointer;transition:.2s}
        .paginacion button:hover{background:rgba(124,58,237,.3)}
        .paginacion button:disabled{opacity:.3;cursor:not-allowed}
        .paginacion .info-pagina{color:#94A3B8;font-size:.7rem}
        .paginacion select{padding:.2rem .4rem;border-radius:4px;background:rgba(255,255,255,.05);color:#fff;border:1px solid rgba(124,58,237,.2);font-size:.7rem}
        body:not(.dark) .paginacion select{background:rgba(0,0,0,.05);color:#111}
        
        .pedido-item{background:rgba(255,255,255,.03);border-radius:8px;padding:.5rem .8rem;margin:.3rem 0;border-left:3px solid #F59E0B}
        body:not(.dark) .pedido-item{background:rgba(0,0,0,.02)}
        .pedido-item .titulo{font-weight:600;font-size:.85rem}
        .pedido-item .detalles{font-size:.7rem;color:#94A3B8;display:flex;gap:.8rem;flex-wrap:wrap}
        .pedido-item .estado{display:inline-block;padding:.05rem .5rem;border-radius:9999px;font-size:.55rem;font-weight:600}
        .pedido-item .estado.pendiente{background:rgba(245,158,11,.15);color:#F59E0B}
        .pedido-item .estado.procesando{background:rgba(59,130,246,.15);color:#3B82F6}
        .pedido-item .estado.completado{background:rgba(16,185,129,.15);color:#34D399}
        .pedido-item .fecha{font-size:.6rem;color:#64748B}
        .pedido-item .usuario-info{font-size:.65rem;color:#A78BFA}
        .pedido-actions{display:flex;gap:.3rem;margin-top:.3rem;flex-wrap:wrap}
        .pedido-actions button{padding:.1rem .6rem;border-radius:4px;font-size:.6rem;font-weight:600;border:none;cursor:pointer;transition:.2s}
        .pedido-actions .btn-completar{background:rgba(16,185,129,.15);color:#34D399}
        .pedido-actions .btn-completar:hover{background:rgba(16,185,129,.25)}
        .pedido-actions .btn-procesar{background:rgba(59,130,246,.15);color:#3B82F6}
        .pedido-actions .btn-procesar:hover{background:rgba(59,130,246,.25)}
        .pedido-actions .btn-eliminar{background:rgba(239,68,68,.15);color:#F87171}
        .pedido-actions .btn-eliminar:hover{background:rgba(239,68,68,.25)}
        .badge-pedidos{display:inline-block;background:#EF4444;color:#fff;border-radius:9999px;padding:.05rem .5rem;font-size:.55rem;font-weight:700;margin-left:.3rem}
        
        .spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.1);border-radius:50%;border-top-color:#7C3AED;animation:spin 0.8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* Estilos para el formulario de agregar capítulo */
        .add-capitulo-form {
            background: rgba(255,255,255,.03);
            border-radius: 6px;
            padding: .5rem;
            margin: .3rem 0;
            border: 1px solid rgba(16,185,129,.2);
            display: none;
        }
        .add-capitulo-form .form-row {
            display: flex;
            gap: .3rem;
            flex-wrap: wrap;
            align-items: center;
            margin-bottom: .2rem;
        }
        .add-capitulo-form .form-row label {
            font-size: .55rem;
            color: #94A3B8;
            min-width: 50px;
        }
        .add-capitulo-form .form-row input {
            flex: 1;
            padding: .1rem .3rem;
            border-radius: 4px;
            border: 1px solid rgba(124,58,237,.2);
            background: rgba(255,255,255,.05);
            color: #fff;
            font-size: .55rem;
            min-width: 80px;
        }
        body:not(.dark) .add-capitulo-form .form-row input {
            background: rgba(0,0,0,.05);
            color: #111;
        }
        .add-capitulo-form .form-row input:focus {
            outline: none;
            border-color: #7C3AED;
        }
        .add-capitulo-form .form-actions {
            display: flex;
            gap: .3rem;
            margin-top: .2rem;
        }
        .add-capitulo-form .form-actions button {
            padding: .05rem .6rem;
            font-size: .5rem;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: 600;
        }
        .add-capitulo-form .form-actions .btn-guardar-cap {
            background: rgba(16,185,129,.15);
            color: #34D399;
        }
        .add-capitulo-form .form-actions .btn-guardar-cap:hover {
            background: rgba(16,185,129,.25);
        }
        .add-capitulo-form .form-actions .btn-cancelar-cap {
            background: rgba(239,68,68,.15);
            color: #F87171;
        }
        .add-capitulo-form .form-actions .btn-cancelar-cap:hover {
            background: rgba(239,68,68,.25);
        }
    </style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
    <div class="login-box">
        <div class="logo">🔐 TELY</div>
        <p class="sub">Inicia sesión para acceder al panel de administración</p>
        <div id="loginError" class="login-error"></div>
        <div id="loginSuccess" class="login-success"></div>
        <form id="adminLoginForm" onsubmit="event.preventDefault(); iniciarSesionAdmin()">
            <input type="email" class="login-input" id="adminEmail" placeholder="📧 Correo electrónico" required>
            <input type="password" class="login-input" id="adminPassword" placeholder="🔒 Contraseña" required>
            <button type="submit" class="login-btn" id="adminLoginBtn"><i class="fas fa-sign-in-alt"></i> Iniciar sesión</button>
        </form>
        <div class="login-footer">
            <a href="#" onclick="irALogin()">¿Olvidaste tu contraseña?</a>
        </div>
    </div>
</div>

<main class="main-content">
    <div class="top-header">
        <h1><i class="fas fa-cog"></i> Administración</h1>
        <div class="top-actions">
            <button class="theme-btn" onclick="toggleTheme()" id="themeBtn"><i class="fas fa-moon"></i></button>
            <div class="user-menu">
                <button class="user-btn" onclick="toggleUserMenu()"><i class="fas fa-user-circle"></i></button>
                <div class="user-dropdown" id="userDropdown">
                    <a href="perfil.html"><i class="fas fa-user"></i> Mi perfil</a>
                    <hr>
                    <a href="#" id="logoutBtn" onclick="cerrarSesionAdmin()"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</a>
                </div>
            </div>
        </div>
    </div>

    <div class="admin-protected" id="adminProtected">
        <i class="fas fa-shield-alt"></i> 
        <span id="adminStatus">Verificando acceso...</span>
    </div>

    <!-- ⭐ GENERACIÓN -->
    <div class="admin-card" style="border-color:rgba(245,158,11,.4)">
        <h3><i class="fas fa-wand-magic-sparkles" style="color:#F59E0B;"></i> Generar contenido</h3>
        
        <div class="btn-group">
            <button class="admin-btn admin-btn-magic" onclick="generarPeliculas()" style="font-size:.85rem;padding:.4rem 1.2rem;">
                <i class="fas fa-film"></i> Generar Películas
            </button>
            <button class="admin-btn admin-btn-magic" onclick="generarSeries()" style="font-size:.85rem;padding:.4rem 1.2rem;background:#8B5CF6;">
                <i class="fas fa-tv"></i> Generar Series
            </button>
            <button class="admin-btn admin-btn-green" onclick="limpiarTodo()" style="font-size:.75rem;padding:.3rem 1rem;">
                <i class="fas fa-trash"></i> Limpiar Todo
            </button>
            <button class="admin-btn admin-btn-blue" onclick="cargarContenido()" style="font-size:.75rem;padding:.3rem 1rem;">
                <i class="fas fa-refresh"></i> Recargar
            </button>
        </div>
        
        <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
        <div class="info" id="progressInfo" style="color:#94A3B8;font-size:.85rem;">Listo para generar</div>
    </div>

    <!-- ⭐ PEDIDOS -->
    <div class="admin-card" style="border-color:rgba(245,158,11,.3)">
        <h3><i class="fas fa-clipboard-list" style="color:#F59E0B;"></i> Pedidos de usuarios <span class="badge-pedidos" id="badgeTotalPedidos">0</span></h3>
        
        <div style="display:flex;gap:.5rem;margin-bottom:.5rem;flex-wrap:wrap;">
            <button class="admin-btn admin-btn-blue" onclick="cargarPedidos()" style="padding:.2rem .8rem;font-size:.7rem;">
                <i class="fas fa-refresh"></i> Recargar
            </button>
        </div>
        
        <div id="listaPedidosAdmin" class="max-h-96 overflow-y-auto">
            <p class="loading-text">Cargando pedidos...</p>
        </div>
    </div>

    <!-- ⭐ CONTENIDO -->
    <div class="admin-card">
        <h3><i class="fas fa-list text-emerald-500"></i> Contenido en Firebase</h3>
        
        <div class="search-admin">
            <input type="text" id="searchAdminInput" placeholder="🔍 Buscar por título..." oninput="filtrarContenido()">
            <select id="filterAdminTipo" onchange="filtrarContenido()">
                <option value="todos">Todos</option>
                <option value="pelicula">🎬 Películas</option>

function generarEnlaceUnlimplay(tmdb_id, tipo, temporada = 1, capitulo = 1) {
    const temp = parseInt(temporada) || 1;
    const cap = parseInt(capitulo) || 1;
    
    if (tipo === 'pelicula') {
        return `https://unlimplay.com/play/embed/movie/${tmdb_id}?lang=es-MX&autoplay=1&controls=1&logo=0`;
    } else {
        return `https://unlimplay.com/play/embed/tv/${tmdb_id}/${temp}/${cap}?lang=es-MX&autoplay=1&controls=1&logo=0`;
    }
}

function getImagenUrl(path, size = 'w342') {
    if (!path) return 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg';
    return `https://image.tmdb.org/t/p/${size}${path}`;
}

function mostrarToast(msg, tipo = 'success') {
    const colores = { success: '#10B981', warning: '#F59E0B', error: '#EF4444', info: '#3B82F6' };
    const t = document.createElement('div');
    t.style.cssText = `position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:${colores[tipo] || '#10B981'};color:#fff;padding:10px 20px;border-radius:10px;z-index:9999;font-weight:600;max-width:90%;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:opacity 0.3s;`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2500);
}

async function fetchTMDB(path, params = {}) {
    const queryParams = new URLSearchParams();
    queryParams.append('path', path);
    Object.keys(params).forEach(key => queryParams.append(key, params[key]));
    const url = `https://tely-xi.vercel.app/api/tmdb?${queryParams.toString()}`;
    const response = await fetch(url);
    if (!response.ok) throw new Error(`Error: ${response.status}`);
    return response.json();
}

function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

async function generarPeliculas() {
    if (!esAdmin) { mostrarToast('⛔ No tienes permisos', 'error'); return; }
    if (generando) { mostrarToast('⏳ Ya está generando...', 'warning'); return; }
    if (!confirm('⚠️ ¿Generar películas populares de TMDB?')) return;
    
    generando = true;
    totalGenerados = 0;
    totalErrores = 0;
    const fill = document.getElementById('progressFill');
    const info = document.getElementById('progressInfo');
    
    fill.style.width = '0%';
    info.textContent = '🎬 Obteniendo películas...';
    
    let page = 1;
    let hasMore = true;
    const MAX_PELIS = 5000;
    let peliculasTotales = [];
    
    try {
        while (peliculasTotales.length < MAX_PELIS && hasMore && page <= 100) {
            const data = await fetchTMDB('movie/popular', { page: page });
            if (!data.results || !data.results.length) { hasMore = false; break; }
            
            for (const p of data.results) {
                if (peliculasTotales.length >= MAX_PELIS) break;
                peliculasTotales.push(p);
            }
            
            info.textContent = `🎬 Cargando películas... ${peliculasTotales.length}/${MAX_PELIS}`;
            fill.style.width = `${(peliculasTotales.length / MAX_PELIS) * 40}%`;
            page++;
            if (!data.total_pages || page > data.total_pages) hasMore = false;
            await sleep(50);
        }
        
        info.textContent = `🎬 Generando ${peliculasTotales.length} películas...`;
        for (let i = 0; i < peliculasTotales.length; i++) {
            try {
                const p = peliculasTotales[i];
                await db.ref('contenido_personalizado').push({
                    titulo: p.title || `Película ${p.id}`,
                    anio: p.release_date ? p.release_date.split('-')[0] : 'N/D',
                    sinopsis: p.overview || 'Sin sinopsis',
                    portada: getImagenUrl(p.poster_path, 'w342'),
                    genero: 'Película',
                    tipo: 'pelicula',
                    tmdb_id: p.id,
                    puntuacion: p.vote_average ? p.vote_average.toFixed(1) : 'N/A',
                    url: generarEnlaceUnlimplay(p.id, 'pelicula'),
                    creado: Date.now()
                });
                totalGenerados++;
            } catch(e) { totalErrores++; }
            
            fill.style.width = `${40 + (i / peliculasTotales.length) * 60}%`;
            info.textContent = `🎬 ${totalGenerados}/${peliculasTotales.length} (${totalErrores} errores)`;
            await sleep(20);
        }
        
        info.textContent = `✅ ${totalGenerados} películas generadas (${totalErrores} errores)`;
        mostrarToast(`✅ ${totalGenerados} películas generadas`, 'success');
        cargarContenido();
    } catch(e) {
        info.textContent = `❌ Error: ${e.message}`;
        mostrarToast('❌ Error: ' + e.message, 'error');
    }
    generando = false;
}

async function generarSeries() {
    if (!esAdmin) { mostrarToast('⛔ No tienes permisos', 'error'); return; }
    if (generando) { mostrarToast('⏳ Ya está generando...', 'warning'); return; }
    if (!confirm('⚠️ ¿Generar series populares de TMDB?')) return;
    
    generando = true;
    totalGenerados = 0;
    totalErrores = 0;
    const fill = document.getElementById('progressFill');
    const info = document.getElementById('progressInfo');
    
    fill.style.width = '0%';
    info.textContent = '📺 Obteniendo series...';
    
    let page = 1;
    let hasMore = true;
    const MAX_SERIES = 4000;
    let seriesTotales = [];
    
    try {
        while (seriesTotales.length < MAX_SERIES && hasMore && page <= 100) {
            const data = await fetchTMDB('tv/popular', { page: page });
            if (!data.results || !data.results.length) { hasMore = false; break; }
            
            for (const s of data.results) {
                if (seriesTotales.length >= MAX_SERIES) break;
                seriesTotales.push(s);
            }
            
            info.textContent = `📺 Cargando series... ${seriesTotales.length}/${MAX_SERIES}`;
            fill.style.width = `${(seriesTotales.length / MAX_SERIES) * 40}%`;
            page++;
            if (!data.total_pages || page > data.total_pages) hasMore = false;
            await sleep(50);
        }
        
        info.textContent = `📺 Generando ${seriesTotales.length} series...`;
        for (let i = 0; i < seriesTotales.length; i++) {
            try {
                const s = seriesTotales[i];
                const temporadas = [];
                // Solo 2 temporadas por defecto
                for (let t = 1; t <= Math.min(s.number_of_seasons || 2, 2); t++) {
                    try {
                        const seasonData = await fetchTMDB(`tv/${s.id}/season/${t}`);
                        if (!seasonData || !seasonData.episodes) continue;
                        const capitulos = seasonData.episodes.slice(0, 10).map(ep => ({
                            numero: ep.episode_number,
                            titulo: ep.name || `Capítulo ${ep.episode_number}`,
                            sinopsis: ep.overview || 'Sin sinopsis',
                            url: generarEnlaceUnlimplay(s.id, 'serie', t, ep.episode_number),
                            opcion2: null
                        }));
                        temporadas.push({ numero: t, nombre: seasonData.name || `Temporada ${t}`, capitulos });
                    } catch(e) {}
                }
                if (temporadas.length > 0) {
                    await db.ref('series_personalizadas').push({
                        titulo: s.name || `Serie ${s.id}`,
                        anio: s.first_air_date ? s.first_air_date.split('-')[0] : 'N/D',
                        sinopsis: s.overview || 'Sin sinopsis',
                        portada: getImagenUrl(s.poster_path, 'w342'),
                        genero: 'Serie',
                        tipo: 'serie',
                        tmdb_id: s.id,
                        puntuacion: s.vote_average ? s.vote_average.toFixed(1) : 'N/A',
                        temporadas: temporadas,
                        url: generarEnlaceUnlimplay(s.id, 'serie', 1, 1),
                        creado: Date.now()
                    });
                    totalGenerados++;
                }
            } catch(e) { totalErrores++; }
            
            fill.style.width = `${40 + (i / seriesTotales.length) * 60}%`;
            info.textContent = `📺 ${totalGenerados}/${seriesTotales.length} (${totalErrores} errores)`;
            await sleep(20);
        }
        
        info.textContent = `✅ ${totalGenerados} series generadas (${totalErrores} errores)`;
        mostrarToast(`✅ ${totalGenerados} series generadas`, 'success');
        cargarContenido();
    } catch(e) {
        info.textContent = `❌ Error: ${e.message}`;
        mostrarToast('❌ Error: ' + e.message, 'error');
    }
    generando = false;
}

window.cargarTodasLasTemporadas = async function(key) {
    if (!esAdmin) { mostrarToast('⛔ No tienes permisos', 'error'); return; }
    if (!confirm('⚠️ ¿Cargar TODAS las temporadas de esta serie desde TMDB?\nEsto puede tomar varios segundos.')) return;
    
    const btn = document.getElementById(`btn-cargar-temps-${key}`);
    if (!btn) return;
    
    const originalText = btn.innerHTML;
    btn.innerHTML = '<span class="spinner"></span> Cargando...';
    btn.disabled = true;
    
    try {
        const snap = await db.ref(`series_personalizadas/${key}`).once('value');
        const serie = snap.val();
        if (!serie) {
            mostrarToast('❌ Serie no encontrada', 'error');
            btn.innerHTML = originalText;
            btn.disabled = false;
            return;
        }
        
        const tmdbId = serie.tmdb_id;
        if (!tmdbId) {
            mostrarToast('❌ No tiene TMDB ID', 'error');
            btn.innerHTML = originalText;
            btn.disabled = false;
            return;
        }
        
        mostrarToast('📡 Obteniendo datos de TMDB...', 'info');
        const data = await fetchTMDB(`tv/${tmdbId}`);
        if (!data || !data.id) {
            mostrarToast('❌ Serie no encontrada en TMDB', 'error');
            btn.innerHTML = originalText;
            btn.disabled = false;
            return;
        }
        
        const numTemporadas = data.number_of_seasons || 1;
        mostrarToast(`📺 Cargando ${numTemporadas} temporadas...`, 'info');
        
        const nuevasTemporadas = [];
        for (let t = 1; t <= numTemporadas; t++) {
            try {
                const seasonData = await fetchTMDB(`tv/${tmdbId}/season/${t}`);
                if (!seasonData || !seasonData.episodes) continue;
                
                const capitulos = seasonData.episodes.map(ep => ({
                    numero: ep.episode_number,
                    titulo: ep.name || `Capítulo ${ep.episode_number}`,
                    sinopsis: ep.overview || 'Sin sinopsis',
                    url: generarEnlaceUnlimplay(tmdbId, 'serie', t, ep.episode_number),
                    opcion2: null
                }));
                nuevasTemporadas.push({
                    numero: t,
                    nombre: seasonData.name || `Temporada ${t}`,
                    capitulos: capitulos
                });
            } catch(e) {
                console.error(`Error en temp ${t}:`, e);
            }
        }
        
        if (nuevasTemporadas.length === 0) {
            mostrarToast('❌ No se pudieron cargar temporadas', 'error');
            btn.innerHTML = originalText;
            btn.disabled = false;
            return;
        }
        
        await db.ref(`series_personalizadas/${key}/temporadas`).set(nuevasTemporadas);
        
        mostrarToast(`✅ ${nuevasTemporadas.length} temporadas cargadas`, 'success');
        
        const idx = seriesKeys.indexOf(key);
        if (idx !== -1) {
            seriesLista[idx].temporadas = nuevasTemporadas;
        }
        
        if (seriesExpandidas[key]) {
            mostrarCapitulosSerie(key);
        }
        
        btn.innerHTML = originalText;
        btn.disabled = false;
        
    } catch(e) {
        console.error('Error:', e);
        mostrarToast('❌ Error: ' + e.message, 'error');
        btn.innerHTML = originalText;
        btn.disabled = false;
    }
};

window.mostrarFormAgregarCapitulo = function(serieKey, tempNum) {
    const formId = `add-cap-form-${serieKey}-${tempNum}`;
    const form = document.getElementById(formId);
    if (!form) return;
    
    // Toggle visibility
    if (form.style.display === 'block') {
        form.style.display = 'none';
        return;
    }
    
    form.style.display = 'block';
    // Limpiar campos
    const inputs = form.querySelectorAll('input');
    inputs.forEach(inp => inp.value = '');
    // Enfocar el primer input
    const numInput = document.getElementById(`add-cap-num-${serieKey}-${tempNum}`);
    if (numInput) numInput.focus();
};

window.guardarCapituloManual = async function(serieKey, tempNum) {
    if (!esAdmin) { mostrarToast('⛔ No tienes permisos', 'error'); return; }
    
    const numInput = document.getElementById(`add-cap-num-${serieKey}-${tempNum}`);
    const tituloInput = document.getElementById(`add-cap-titulo-${serieKey}-${tempNum}`);
    const urlInput = document.getElementById(`add-cap-url-${serieKey}-${tempNum}`);
    const op2Input = document.getElementById(`add-cap-op2-${serieKey}-${tempNum}`);
    
    if (!numInput || !tituloInput || !urlInput) {
        mostrarToast('❌ Error en el formulario', 'error');
        return;
    }
    
    const numero = parseInt(numInput.value.trim());
    const titulo = tituloInput.value.trim() || `Capítulo ${numero}`;
    const url = urlInput.value.trim();
    const opcion2 = op2Input.value.trim() || null;
    
    if (!numero || numero <= 0) {
        mostrarToast('❌ Ingresa un número de capítulo válido', 'error');
        return;
    }
    
    if (!url) {
        mostrarToast('❌ Ingresa un enlace para la Opción 1', 'error');
        return;
    }
    
    try {
        // Obtener la serie actual
        const snap = await db.ref(`series_personalizadas/${serieKey}`).once('value');
        const serie = snap.val();
        if (!serie) {
            mostrarToast('❌ Serie no encontrada', 'error');
            return;
        }
        
        // Encontrar la temporada
        let tempIndex = serie.temporadas.findIndex(t => t.numero === tempNum);
        if (tempIndex === -1) {
            // Si no existe, crear la temporada
            serie.temporadas.push({
                numero: tempNum,
                nombre: `Temporada ${tempNum}`,
                capitulos: []
            });
            tempIndex = serie.temporadas.length - 1;
        }
        
        // Verificar si ya existe un capítulo con ese número
        const existe = serie.temporadas[tempIndex].capitulos.some(c => c.numero === numero);
        if (existe) {
            mostrarToast(`⚠️ El capítulo ${numero} ya existe. Edita el existente.`, 'warning');
            return;
        }
        
        // Agregar el nuevo capítulo
        const nuevoCap = {
            numero: numero,
            titulo: titulo,
            sinopsis: 'Sin sinopsis',
            url: url,
            opcion2: opcion2
        };
        
        serie.temporadas[tempIndex].capitulos.push(nuevoCap);
        // Ordenar capítulos por número
        serie.temporadas[tempIndex].capitulos.sort((a, b) => a.numero - b.numero);
        
        // Guardar en Firebase
        await db.ref(`series_personalizadas/${serieKey}`).update({ temporadas: serie.temporadas });
        
        mostrarToast(`✅ Capítulo ${numero} agregado correctamente`, 'success');
        
        // Actualizar memoria
        const idx = seriesKeys.indexOf(serieKey);
        if (idx !== -1) {
            seriesLista[idx] = serie;
        }
        
        // Ocultar formulario
        const formId = `add-cap-form-${serieKey}-${tempNum}`;
        document.getElementById(formId).style.display = 'none';
        
        // Recargar vista de la serie
        if (seriesExpandidas[serieKey]) {
            mostrarCapitulosSerie(serieKey);
        }
        
    } catch(e) {
        console.error('Error:', e);
        mostrarToast('❌ Error: ' + e.message, 'error');
    }
};

        cancelarEdicion(key);
        return;

    const currentUrl = enlaceDiv.textContent.trim();
    itemsEditando[key] = true;
    
    const label = campo === 'url' ? 'Opción 1' : 'Opción 2';
    const color = campo === 'url' ? '#34D399' : '#60A5FA';
    
    enlaceWrap.innerHTML = `

        if (input) input.focus();
    }, 100);

window.editarCapitulo = function(serieKey, tempNum, capIndex, campo) {
    const inputId = `cap-${campo}-input-${serieKey}-${tempNum}-${capIndex}`;
    const input = document.getElementById(inputId);
    const display = document.getElementById(`cap-${campo}-display-${serieKey}-${tempNum}-${capIndex}`);
    const saveBtn = document.getElementById(`cap-${campo}-save-${serieKey}-${tempNum}-${capIndex}`);
    
    if (!input || !display || !saveBtn) return;
    
    if (input.style.display === 'none' || !input.style.display) {
        input.style.display = 'inline-block';
        display.style.display = 'none';
        saveBtn.style.display = 'inline-block';
        input.focus();
        input.select();
    }
};

window.guardarCapitulo = async function(serieKey, tempNum, capIndex, campo) {
    const inputId = `cap-${campo}-input-${serieKey}-${tempNum}-${capIndex}`;
    const input = document.getElementById(inputId);
    const display = document.getElementById(`cap-${campo}-display-${serieKey}-${tempNum}-${capIndex}`);
    const saveBtn = document.getElementById(`cap-${campo}-save-${serieKey}-${tempNum}-${capIndex}`);
    
    if (!input || !display || !saveBtn) return;
    
    const nuevoEnlace = input.value.trim();
    if (!nuevoEnlace) {
        mostrarToast('❌ El enlace no puede estar vacío', 'error');
        return;
    }
    
    try {
        const snap = await db.ref(`series_personalizadas/${serieKey}`).once('value');
        const serie = snap.val();
        if (!serie) { mostrarToast('❌ Serie no encontrada', 'error'); return; }
        
        const tempIndex = serie.temporadas.findIndex(t => t.numero === tempNum);
        if (tempIndex === -1) { mostrarToast('❌ Temporada no encontrada', 'error'); return; }
        
        serie.temporadas[tempIndex].capitulos[capIndex][campo] = nuevoEnlace;
        await db.ref(`series_personalizadas/${serieKey}`).update({ temporadas: serie.temporadas });
        
        mostrarToast(`✅ Capítulo ${campo} actualizado`, 'success');
        input.style.display = 'none';
        display.style.display = 'inline';
        display.textContent = nuevoEnlace;
        saveBtn.style.display = 'none';
        
        const idx = seriesKeys.indexOf(serieKey);
        if (idx !== -1) {
            seriesLista[idx] = serie;
        }
    } catch(e) {
        mostrarToast('❌ Error: ' + e.message, 'error');
    }
};

function cargarPedidos() {
    if (!esAdmin) return;
    const container = document.getElementById('listaPedidosAdmin');
    container.innerHTML = '<p class="loading-text">Cargando pedidos...</p>';
    
    db.ref('pedidos').orderByChild('fecha').once('value').then((snap) => {
        const data = snap.val();
        container.innerHTML = '';
        
        if (!data) {
            container.innerHTML = '<div style="color:#64748B;font-size:.8rem;text-align:center;padding:.5rem;">No hay pedidos</div>';
            document.getElementById('badgeTotalPedidos').textContent = '0';
            document.getElementById('badgeTotalPedidos').style.display = 'none';
            return;
        }
        
        const pedidos = Object.entries(data).map(([key, value]) => ({ key, ...value }));
        pedidos.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
        
        const pendientes = pedidos.filter(p => p.estado === 'pendiente').length;
        document.getElementById('badgeTotalPedidos').textContent = pendientes;
        document.getElementById('badgeTotalPedidos').style.display = pendientes > 0 ? 'inline-block' : 'none';
        
        pedidos.forEach((p) => {
            const div = document.createElement('div');
            div.className = 'pedido-item';
            const estadoText = {
                'pendiente': '⏳ Pendiente',
                'procesando': '🔄 En proceso',
                'completado': '✅ Completado'
            }[p.estado] || '⏳ Pendiente';
            
            div.innerHTML = `
                <div class="titulo">${p.tipo === 'pelicula' ? '🎬' : '📺'} ${p.titulo}</div>
                <div class="detalles">
                    <span>📅 ${p.anio || 'N/D'}</span>
                    <span class="estado ${p.estado || 'pendiente'}">${estadoText}</span>
                    <span class="usuario-info">👤 ${p.nombre || 'Usuario'}</span>
                </div>
                ${p.sinopsis && p.sinopsis !== 'Sin descripción' ? `<div style="font-size:.7rem;color:#64748B;margin-top:.2rem;">${p.sinopsis.substring(0, 80)}</div>` : ''}
                <div class="fecha">📆 ${new Date(p.fecha).toLocaleDateString()}</div>
                <div class="pedido-actions">
                    ${p.estado !== 'completado' ? `<button class="btn-completar" onclick="actualizarEstadoPedido('${p.key}', 'completado')"><i class="fas fa-check"></i> Completar</button>` : ''}
                    ${p.estado === 'pendiente' ? `<button class="btn-procesar" onclick="actualizarEstadoPedido('${p.key}', 'procesando')"><i class="fas fa-spinner"></i> Procesar</button>` : ''}
                    <button class="btn-eliminar" onclick="eliminarPedido('${p.key}')"><i class="fas fa-trash"></i> Eliminar</button>
                </div>
            `;
            container.appendChild(div);
        });
    });
}

function actualizarEstadoPedido(key, nuevoEstado) {
    if (!confirm(`¿Cambiar a "${nuevoEstado}"?`)) return;
    db.ref(`pedidos/${key}`).update({ estado: nuevoEstado }).then(() => {
        mostrarToast(`✅ Pedido actualizado`, 'success');
        cargarPedidos();
    });
}

function eliminarPedido(key) {
    if (!confirm('⚠️ ¿Eliminar este pedido?')) return;
    db.ref(`pedidos/${key}`).remove().then(() => {
        mostrarToast('🗑️ Pedido eliminado', 'warning');
        cargarPedidos();
    });
}

window.filtrarContenido = function() {
    const searchTerm = document.getElementById('searchAdminInput').value.toLowerCase();
    const tipoFilter = document.getElementById('filterAdminTipo').value;
    const items = document.querySelectorAll('.admin-item');
    
    items.forEach(item => {
        const titulo = item.dataset.titulo?.toLowerCase() || '';
        const tipo = item.dataset.tipo || '';
        let match = true;
        if (searchTerm && !titulo.includes(searchTerm)) match = false;
        if (tipoFilter !== 'todos' && tipo !== tipoFilter) match = false;
        item.style.display = match ? 'flex' : 'none';
    });
};

function cambiarPagina(dir) {
    const totalItems = document.querySelectorAll('.admin-item').length;
    const totalPaginas = Math.ceil(totalItems / itemsPorPagina);
    const nuevaPagina = paginaActual + dir;
    if (nuevaPagina >= 1 && nuevaPagina <= totalPaginas) {
        paginaActual = nuevaPagina;
        mostrarPagina();
    }
}

function cambiarPaginaSize() {
    itemsPorPagina = parseInt(document.getElementById('selectPaginaSize').value);
    paginaActual = 1;
    mostrarPagina();
}

function mostrarPagina() {
    const container = document.getElementById('listaContenido');
    const pagContainer = document.getElementById('paginacionContainer');
    const items = container.querySelectorAll('.admin-item');
    const totalItems = items.length;
    const totalPaginas = Math.ceil(totalItems / itemsPorPagina);
    
    if (totalItems <= itemsPorPagina) {
        pagContainer.style.display = 'none';
        return;
    }
    
    const inicio = (paginaActual - 1) * itemsPorPagina;
    const fin = Math.min(inicio + itemsPorPagina, totalItems);
    
    items.forEach((item, index) => {
        item.style.display = (index >= inicio && index < fin) ? 'flex' : 'none';
    });
    
    document.getElementById('infoPagina').textContent = `Página ${paginaActual} de ${totalPaginas}`;
    document.getElementById('btnPaginaPrev').disabled = paginaActual <= 1;
    document.getElementById('btnPaginaNext').disabled = paginaActual >= totalPaginas;
    pagContainer.style.display = 'flex';
}

                        <img src="${portada}" class="thumbnail" loading="lazy" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg'">
                        <div class="info-item">
                            <div class="title">${p.titulo} <span class="badge-tipo pelicula">🎬</span></div>
                            <div class="meta">${p.anio || 'N/D'} • ⭐ ${p.puntuacion || 'N/A'} • TMDB: ${p.tmdb_id}</div>
                        </div>
                    </div>
                    
                    <div class="enlace-wrap url-wrap">
                        <div style="font-size:.55rem;color:#34D399;margin-bottom:.05rem;">🔗 Opción 1</div>
                        <div class="enlace op1" onclick="editarEnlace('${key}', 'pelicula', 'url')">${urlOp1}</div>
                    </div>
                    
                    <div class="enlace-wrap ${urlOp2 ? 'op2-wrap' : ''}">
                        <div style="font-size:.55rem;color:#60A5FA;margin-bottom:.05rem;">🔗 Opción 2</div>
                        ${urlOp2 
                            ? `<div class="enlace op2" onclick="editarEnlace('${key}', 'pelicula', 'op2')">${urlOp2}</div>`
                            : `<div style="font-size:.55rem;color:#64748B;">Sin opción 2 <button class="admin-btn admin-btn-purple" style="padding:.05rem .4rem;font-size:.45rem;margin-left:.3rem;" onclick="agregarOpcion2('${key}', 'pelicula', '${p.tmdb_id}')"><i class="fas fa-plus"></i> Agregar</button></div>`
                        }
                    </div>
                    
                    <div class="actions">
                        <button class="admin-btn admin-btn-danger" onclick="eliminarItem('${key}', 'pelicula')"><i class="fas fa-trash"></i> Eliminar</button>
                    </div>
                `;
                div.appendChild(item);
            });
            container.appendChild(div);
        }
        
        // ⭐ SERIES
        if (seriesLista.length) {
            const div = document.createElement('div');
            div.innerHTML = `<div style="font-weight:700;color:#34D399;margin:.5rem 0 .3rem;">📺 Series (${seriesLista.length})</div>`;
            
            seriesLista.forEach((s, index) => {
                const key = seriesKeys[index];
                const capsCount = s.temporadas ? s.temporadas.reduce((sum, t) => sum + (t.capitulos ? t.capitulos.length : 0), 0) : 0;
                const isExpanded = seriesExpandidas[key] || false;
                const portada = s.portada || 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg';
                const urlOp1 = s.url || 'Sin enlace';
                const urlOp2 = s.opcion2 || '';
                const hasTemps = s.temporadas && s.temporadas.length > 0;
                
                const item = document.createElement('div');
                item.className = 'admin-item serie-expandida';
                item.id = `item-${key}`;
                item.dataset.titulo = s.titulo;
                item.dataset.tipo = 'serie';
                item.style.borderLeftColor = '#34D399';
                
                if (!serieTempSeleccionada[key]) {
                    if (s.temporadas && s.temporadas.length) {
                        serieTempSeleccionada[key] = s.temporadas[0].numero.toString();
                    } else {
                        serieTempSeleccionada[key] = '1';
                    }
                }
                
                item.innerHTML = `
                    <div class="top-row">
                        <img src="${portada}" class="thumbnail" loading="lazy" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg'">
                        <div class="info-item">
                            <div class="title">${s.titulo} <span class="badge-tipo serie">📺</span></div>
                            <div class="meta">${s.anio || 'N/D'} • ${s.temporadas?.length || 0} temps • ${capsCount} caps • ⭐ ${s.puntuacion || 'N/A'} • TMDB: ${s.tmdb_id}</div>
                            ${!hasTemps ? `<span style="color:#F59E0B;font-size:.55rem;display:block;">⚠️ Sin temporadas guardadas</span>` : ''}
                        </div>
                    </div>
                    
                    <div class="enlace-wrap url-wrap">
                        <div style="font-size:.55rem;color:#34D399;margin-bottom:.05rem;">🔗 Opción 1</div>
                        <div class="enlace op1" onclick="editarEnlace('${key}', 'serie', 'url')">${urlOp1}</div>
                    </div>
                    
                    <div class="enlace-wrap ${urlOp2 ? 'op2-wrap' : ''}">
                        <div style="font-size:.55rem;color:#60A5FA;margin-bottom:.05rem;">🔗 Opción 2</div>
                        ${urlOp2 
                            ? `<div class="enlace op2" onclick="editarEnlace('${key}', 'serie', 'op2')">${urlOp2}</div>`
                            : `<div style="font-size:.55rem;color:#64748B;">Sin opción 2 <button class="admin-btn admin-btn-purple" style="padding:.05rem .4rem;font-size:.45rem;margin-left:.3rem;" onclick="agregarOpcion2('${key}', 'serie', '${s.tmdb_id}')"><i class="fas fa-plus"></i> Agregar</button></div>`
                        }
                    </div>
                    
                    <div class="actions">
                        <button class="toggle-series-btn" id="toggle-btn-${key}" onclick="toggleSerie('${key}')">
                            <i class="fas fa-chevron-${isExpanded ? 'up' : 'down'}"></i> ${isExpanded ? 'Ocultar caps' : 'Ver caps'}
                        </button>
                        ${!hasTemps ? `
                        <button class="admin-btn admin-btn-cyan" id="btn-cargar-temps-${key}" onclick="cargarTodasLasTemporadas('${key}')" style="padding:.1rem .6rem;font-size:.55rem;">
                            <i class="fas fa-download"></i> Cargar todas las temps
                        </button>
                        ` : `
                        <button class="admin-btn admin-btn-cyan" id="btn-cargar-temps-${key}" onclick="cargarTodasLasTemporadas('${key}')" style="padding:.1rem .6rem;font-size:.55rem;">
                            <i class="fas fa-sync-alt"></i> Recargar temps
                        </button>
                        `}
                        <button class="admin-btn admin-btn-danger" onclick="eliminarItem('${key}', 'serie')"><i class="fas fa-trash"></i> Eliminar</button>
                    </div>
                    <div id="serie-detalle-${key}" style="display:${isExpanded ? 'block' : 'none'};margin-top:.3rem;background:rgba(255,255,255,.02);border-radius:6px;padding:.2rem;">
                        ${isExpanded ? `<div style="color:#94A3B8;font-size:.65rem;text-align:center;padding:.3rem;">Cargando capítulos...</div>` : ''}
                    </div>
                `;
                div.appendChild(item);
                
                if (isExpanded) {
                    setTimeout(() => mostrarCapitulosSerie(key), 100);
                }
            });
            container.appendChild(div);
        }
        
        paginaActual = 1;
        mostrarPagina();
        
    } catch(e) {
        console.error('❌ Error:', e);
        container.innerHTML = `
            <div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);border-radius:8px;padding:1rem;text-align:center;">
                <p style="color:#EF4444;font-size:.9rem;">❌ Error al cargar</p>
                <p style="color:#94A3B8;font-size:.75rem;margin-top:.3rem;">${e.message || 'Verifica Firebase'}</p>
                <button onclick="cargarContenido()" style="margin-top:.5rem;padding:.3rem 1rem;background:#7C3AED;border:none;border-radius:6px;color:#fff;cursor:pointer;font-size:.75rem;">
                    <i class="fas fa-refresh"></i> Reintentar
                </button>
            </div>
        `;
    }
};

// ============================================================
// ⭐ ELIMINAR ITEM
// ============================================================
window.eliminarItem = async function(key, tipo) {
    if (!confirm(`¿Eliminar este ${tipo}?`)) return;
    try {
        const path = tipo === 'pelicula' ? 'contenido_personalizado' : 'series_personalizadas';
        await db.ref(`${path}/${key}`).remove();
        mostrarToast(`🗑️ ${tipo} eliminado`, 'warning');
        cargarContenido();
    } catch(e) {
        mostrarToast('❌ Error: ' + e.message, 'error');
    }
};
