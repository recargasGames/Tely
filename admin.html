<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin TELY - Enlaces</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0F172A; color: #F8FAFC; font-family: 'Segoe UI', Roboto, sans-serif; min-height: 100vh; padding: 1rem; }
        .card { background: #1E293B; border-radius: 12px; padding: 1.2rem; margin-bottom: 1rem; }
        .card h3 { color: #60A5FA; margin-bottom: 0.8rem; font-size: 1.1rem; }
        input { width: 100%; padding: 0.7rem; border-radius: 8px; border: 1px solid #334155; background: #0F172A; color: #F8FAFC; font-size: 0.95rem; margin-bottom: 0.5rem; }
        input:focus { outline: none; border-color: #60A5FA; }
        .btn { padding: 0.6rem 1.2rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .btn-guardar { background: #10B981; color: white; }
        .btn-guardar:hover { background: #059669; }
        .btn-danger { background: #EF4444; color: white; }
        .btn-danger:hover { background: #DC2626; }
        .btn-refresh { background: #60A5FA; color: white; }
        .btn-refresh:hover { background: #3B82F6; }
        .btn-small { padding: 0.3rem 0.8rem; font-size: 0.8rem; }
        .btn-probar { background: #8B5CF6; color: white; }
        .btn-probar:hover { background: #7C3AED; }
        .grid-peliculas { display: grid; grid-template-columns: 1fr; gap: 0.8rem; max-height: 65vh; overflow-y: auto; padding-right: 0.5rem; }
        .grid-peliculas::-webkit-scrollbar { width: 6px; }
        .grid-peliculas::-webkit-scrollbar-track { background: transparent; }
        .grid-peliculas::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        .pelicula-item { background: #1E293B; padding: 0.8rem 1rem; border-radius: 10px; border-left: 4px solid #60A5FA; display: flex; flex-direction: column; gap: 0.5rem; }
        .pelicula-item .info { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .pelicula-item .info .titulo { font-weight: 600; font-size: 1rem; }
        .pelicula-item .info .anio { color: #94A3B8; font-size: 0.85rem; }
        .pelicula-item .enlaces { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; }
        .pelicula-item .enlaces input { flex: 1; min-width: 120px; margin-bottom: 0; padding: 0.4rem 0.6rem; font-size: 0.8rem; }
        .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.65rem; font-weight: 600; }
        .badge-peli { background: #60A5FA; color: #0F172A; }
        .badge-sin-enlace { background: #EF4444; color: white; }
        .badge-con-enlace { background: #10B981; color: white; }
        .badge-firebase { background: #F59E0B; color: #0F172A; }
        .oculto { display: none !important; }
        .cargando { text-align: center; color: #94A3B8; padding: 2rem; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #334155; }
        .header h1 { font-size: 1.8rem; font-weight: 700; }
        .header h1 i { color: #60A5FA; }
        .contador { color: #94A3B8; font-size: 0.9rem; }
        .error-msg { color: #EF4444; text-align: center; padding: 1rem; }
        .portada-mini { width: 40px; height: 60px; object-fit: cover; border-radius: 4px; margin-right: 0.5rem; }
        .info-peli { display: flex; align-items: center; gap: 0.5rem; }
        .status-firebase { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.65rem; font-weight: 600; background: #10B981; color: white; }
        .status-firebase.error { background: #EF4444; }
        .modal-video { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 1rem; }
        .modal-video.abierto { display: flex; }
        .modal-video .modal-content { background: #000; border-radius: 12px; max-width: 900px; width: 100%; aspect-ratio: 16/9; position: relative; overflow: hidden; }
        .modal-video .modal-content iframe, .modal-video .modal-content object { width: 100%; height: 100%; border: none; background: #000; }
        .modal-video .btn-cerrar-modal { position: absolute; top: 0.5rem; right: 0.5rem; background: rgba(255,0,0,0.3); border: none; color: #fff; font-size: 1.5rem; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 10; }
        .modal-video .btn-cerrar-modal:hover { background: rgba(255,0,0,0.6); }
    </style>
</head>
<body>
    <div class="max-w-4xl mx-auto">
        <!-- HEADER -->
        <div class="header">
            <div>
                <h1><i class="fa fa-link"></i> Admin TELY</h1>
                <span style="font-size:0.8rem; color:#94A3B8;">
                    <i class="fa fa-database"></i> Firebase: <span id="statusFirebase" class="status-firebase">Conectando...</span>
                </span>
            </div>
            <div style="display:flex; gap:0.8rem; align-items:center; flex-wrap:wrap;">
                <span class="contador" id="contador">0 películas</span>
                <button class="btn btn-refresh btn-small" onclick="cargarPeliculas()"><i class="fa fa-sync"></i> Recargar</button>
                <button class="btn btn-small" onclick="exportarDatos()" style="background:#F59E0B; color:#0F172A;"><i class="fa fa-download"></i> Exportar</button>
            </div>
        </div>

        <!-- CONTENIDO -->
        <div class="card">
            <h3><i class="fa fa-film"></i> Películas de TMDB</h3>
            <p class="text-gray-400 text-sm mb-3">Agrega enlaces de video (Opción 1 y Opción 2) a cada película</p>
            <div id="lista-peliculas" class="grid-peliculas">
                <div class="cargando"><i class="fa-solid fa-spinner fa-spin"></i> Cargando películas...</div>
            </div>
        </div>
    </div>

    <!-- MODAL PARA PROBAR VIDEO -->
    <div id="modalVideo" class="modal-video">
        <div class="modal-content" id="modalVideoContent">
            <button class="btn-cerrar-modal" onclick="cerrarModalVideo()"><i class="fa-solid fa-xmark"></i></button>
        </div>
    </div>    <script>
        // ==============================================
        // 🔧 CONFIGURACIÓN FIREBASE
        // ==============================================
        const firebaseConfig = {
            apiKey: "AIzaSyCwLATDpQN1RWv3rLPjJXbNnIBkyo_BUfI",
            authDomain: "tely-ap.firebaseapp.com",
            databaseURL: "https://tely-ap-default-rtdb.firebaseio.com",
            projectId: "tely-ap",
            storageBucket: "tely-ap.firebasestorage.app",
            messagingSenderId: "760862940967",
            appId: "1:760862940967:web:69bbbbfee0de40f68a1302",
            measurementId: "G-1MVRN8QNLG"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ==============================================
        // 🔑 CONFIGURACIÓN TMDB
        // ==============================================
        const TMDB_API_KEY = "8dd99b5a15acfdd98e3b249d5f890af4";
        const TMDB_BASE = "https://api.themoviedb.org/3";
        const TMDB_IMG = "https://image.tmdb.org/t/p/w500";
        const TMDB_LANG = "es-ES";

        let peliculas = [];
        let peliculasAdmin = [];
        let peliculasCargadas = false;

        // ==============================================
        // 🔥 VERIFICAR CONEXIÓN FIREBASE
        // ==============================================
        function verificarFirebase() {
            const status = document.getElementById("statusFirebase");
            db.ref(".info/connected").on("value", (snap) => {
                if (snap.val() === true) {
                    status.textContent = "Conectado";
                    status.className = "status-firebase";
                } else {
                    status.textContent = "Desconectado";
                    status.className = "status-firebase error";
                }
            });
        }

        // ==============================================
        // 📥 CARGAR PELÍCULAS
        // ==============================================
        async function cargarPeliculas() {
            const contenedor = document.getElementById("lista-peliculas");
            contenedor.innerHTML = '<div class="cargando"><i class="fa-solid fa-spinner fa-spin"></i> Cargando películas...</div>';

            try {
                // 1. Cargar películas de TMDB
                const res = await fetch(`${TMDB_BASE}/movie/popular?api_key=${TMDB_API_KEY}&language=${TMDB_LANG}&page=1`);
                
                if (!res.ok) throw new Error(`Error ${res.status}`);
                
                const datos = await res.json();
                
                if (!datos.results || datos.results.length === 0) {
                    throw new Error("No se encontraron películas");
                }

                const pelisTMDB = datos.results.slice(0, 20);

                // 2. Cargar datos guardados en Firebase
                const snapshot = await db.ref("contenido_personalizado").once("value");
                const datosAdmin = snapshot.val();
                peliculasAdmin = datosAdmin ? Object.values(datosAdmin) : [];

                // 3. Combinar
                peliculas = pelisTMDB.map(p => {
                    const enAdmin = peliculasAdmin.find(a => a.tmdb_id == p.id);
                    return {
                        id: p.id,
                        tmdb_id: p.id,
                        titulo: p.title || "Sin título",
                        anio: p.release_date ? p.release_date.split("-")[0] : "N/D",
                        portada: p.poster_path ? `${TMDB_IMG}${p.poster_path}` : "",
                        sinopsis: p.overview || "Sin sinopsis",
                        puntuacion: p.vote_average ? p.vote_average.toFixed(1) : "N/A",
                        genero: "Película",
                        url: enAdmin?.url || "",
                        opcion2: enAdmin?.opcion2 || "",
                        adminId: enAdmin?.id || null
                    };
                });

                peliculasCargadas = true;
                mostrarPeliculas();

            } catch (err) {
                console.error("Error:", err);
                contenedor.innerHTML = `
                    <div class="error-msg">
                        <i class="fa-solid fa-triangle-exclamation"></i> Error: ${err.message}
                        <br><br>
                        <button class="btn btn-refresh btn-small" onclick="cargarPeliculas()">
                            <i class="fa fa-sync"></i> Reintentar
                        </button>
                    </div>
                `;
            }
        }

        // ==============================================
        // 📋 MOSTRAR PELÍCULAS
        // ==============================================
        function mostrarPeliculas() {
            const contenedor = document.getElementById("lista-peliculas");
            const contador = document.getElementById("contador");
            
            if (peliculas.length === 0) {
                contenedor.innerHTML = '<div class="cargando">No hay películas disponibles</div>';
                contador.textContent = "0 películas";
                return;
            }

            contador.textContent = `${peliculas.length} películas`;

            contenedor.innerHTML = peliculas.map(p => {
                const tieneEnlace = p.url || p.opcion2;
                return `
                    <div class="pelicula-item" data-id="${p.id}">
                        <div class="info">
                            <div class="info-peli">
                                ${p.portada ? `<img src="${p.portada}" class="portada-mini" loading="lazy" onerror="this.style.display='none'">` : ''}
                                <div>
                                    <span class="titulo">${p.titulo}</span>
                                    <span class="anio">${p.anio}</span>
                                </div>
                            </div>
                            <div>
                                ${tieneEnlace ? '<span class="badge badge-con-enlace">✅ Con enlace</span>' : '<span class="badge badge-sin-enlace">❌ Sin enlace</span>'}
                                ${p.adminId ? '<span class="badge badge-firebase">☁️ Firebase</span>' : ''}
                                <span class="badge badge-peli">TMDB</span>
                            </div>
                        </div>
                        <div class="enlaces">
                            <input type="text" class="input-opcion1" placeholder="Opción 1 (URL)" value="${p.url || ''}">
                            <input type="text" class="input-opcion2" placeholder="Opción 2 (URL)" value="${p.opcion2 || ''}">
                            <button class="btn btn-guardar btn-small" onclick="guardarEnlaces('${p.id}')">
                                <i class="fa fa-save"></i> Guardar
                            </button>
                            ${p.url || p.opcion2 ? `<button class="btn btn-probar btn-small" onclick="probarVideo('${p.id}')"><i class="fa fa-play"></i> Probar</button>` : ''}
                            ${p.adminId ? `<button class="btn btn-danger btn-small" onclick="eliminarEnlaces('${p.adminId}', '${p.id}')"><i class="fa fa-trash"></i></button>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ==============================================
        // 💾 GUARDAR ENLACES EN FIREBASE
        // ==============================================
        function guardarEnlaces(tmdbId) {
            const item = document.querySelector(`.pelicula-item[data-id="${tmdbId}"]`);
            if (!item) return;

            const url = item.querySelector('.input-opcion1').value.trim();
            const opcion2 = item.querySelector('.input-opcion2').value.trim();

            if (!url && !opcion2) {
                alert("⚠️ Debes agregar al menos un enlace (Opción 1 o Opción 2)");
                return;
            }

            const peli = peliculas.find(p => p.id == tmdbId);
            if (!peli) return;

            const existe = peliculasAdmin.find(a => a.tmdb_id == tmdbId);

            const datos = {
                tmdb_id: tmdbId,
                titulo: peli.titulo,
                anio: peli.anio,
                tipo: "pelicula",
                categoria: "peliculas",
                portada: peli.portada,
                sinopsis: peli.sinopsis,
                puntuacion: peli.puntuacion,
                genero: peli.genero,
                url: url,
                opcion2: opcion2,
                fecha_actualizacion: new Date().toISOString()
            };

            const ref = existe ? db.ref(`contenido_personalizado/${existe.id}`) : db.ref("contenido_personalizado").push();

            ref.set(datos)
                .then(() => {
                    alert("✅ Enlaces guardados en Firebase correctamente");
                    
                    if (!existe) {
                        datos.id = ref.key;
                        peliculasAdmin.push(datos);
                    } else {
                        const index = peliculasAdmin.findIndex(a => a.id === existe.id);
                        if (index !== -1) peliculasAdmin[index] = { ...datos, id: existe.id };
                    }
                    
                    peli.url = url;
                    peli.opcion2 = opcion2;
                    peli.adminId = existe ? existe.id : ref.key;
                    
                    mostrarPeliculas();
                })
                .catch(err => {
                    alert("❌ Error al guardar en Firebase: " + err.message);
                });
        }

        // ==============================================
        // 🗑️ ELIMINAR ENLACES DE FIREBASE
        // ==============================================
        function eliminarEnlaces(adminId, tmdbId) {
            if (!confirm("¿Eliminar los enlaces de esta película de Firebase?")) return;

            db.ref(`contenido_personalizado/${adminId}`).remove()
                .then(() => {
                    alert("✅ Enlaces eliminados de Firebase");
                    peliculasAdmin = peliculasAdmin.filter(a => a.id !== adminId);
                    
                    const peli = peliculas.find(p => p.id == tmdbId);
                    if (peli) {
                        peli.url = "";
                        peli.opcion2 = "";
                        peli.adminId = null;
                    }
                    
                    mostrarPeliculas();
                })
                .catch(err => {
                    alert("❌ Error al eliminar: " + err.message);
                });
        }

        // ==============================================
        // 🎬 PROBAR VIDEO
        // ==============================================
        function probarVideo(tmdbId) {
            const peli = peliculas.find(p => p.id == tmdbId);
            if (!peli) return;

            const url = peli.url || peli.opcion2;
            if (!url) {
                alert("❌ Esta película no tiene enlace");
                return;
            }

            const modal = document.getElementById("modalVideo");
            const content = document.getElementById("modalVideoContent");
            
            // Limpiar contenido anterior
            content.innerHTML = `
                <button class="btn-cerrar-modal" onclick="cerrarModalVideo()"><i class="fa-solid fa-xmark"></i></button>
                <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#000;">
                    <div style="color:#94A3B8;text-align:center;">
                        <i class="fa-solid fa-spinner fa-spin" style="font-size:2rem;"></i>
                        <p style="margin-top:1rem;">Cargando video...</p>
                    </div>
                </div>
            `;

            modal.classList.add("abierto");
            document.body.style.overflow = "hidden";

            // Cargar el video después de un momento
            setTimeout(() => {
                let enlace = url.trim();
                let html = '';

                if (enlace.includes('youtube.com') || enlace.includes('youtu.be')) {
                    html = `<iframe src="${enlace}" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen style="width:100%;height:100%;border:none;background:#000;"></iframe>`;
                } else if (enlace.includes('vidmoly')) {
                    if (!enlace.includes('controls=')) {
                        enlace += (enlace.includes('?') ? '&' : '?') + 'controls=1&logo=0&autoplay=1';
                    }
                    html = `<object data="${enlace}" type="text/html" style="width:100%;height:100%;border:none;background:#000;"></object>`;
                } else if (enlace.includes('mixdrop')) {
                    if (!enlace.includes('autoplay')) {
                        enlace += (enlace.includes('?') ? '&' : '?') + 'autoplay=1';
                    }
                    html = `<iframe src="${enlace}" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen style="width:100%;height:100%;border:none;background:#000;"></iframe>`;
                } else if (enlace.includes('drive.google.com')) {
                    const id = enlace.match(/[-\w]{25,}/)?.[0];
                    if (id) {
                        const driveUrl = `https://drive.google.com/uc?export=stream&id=${id}&confirm=t&cache=1`;
                        html = `<video src="${driveUrl}" controls playsinline preload="auto" style="width:100%;height:100%;background:#000;" autoplay>Tu navegador no soporta el video.</video>`;
                    } else {
                        html = `<div style="color:#EF4444;text-align:center;padding:2rem;">❌ Enlace de Drive inválido</div>`;
                    }
                } else {
                    html = `<iframe src="${enlace}" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen style="width:100%;height:100%;border:none;background:#000;"></iframe>`;
                }

                content.innerHTML = `
                    <button class="btn-cerrar-modal" onclick="cerrarModalVideo()"><i class="fa-solid fa-xmark"></i></button>
                    ${html}
                `;
            }, 500);
        }

        function cerrarModalVideo() {
            document.getElementById("modalVideo").classList.remove("abierto");
            document.body.style.overflow = "auto";
            document.getElementById("modalVideoContent").innerHTML = `
                <button class="btn-cerrar-modal" onclick="cerrarModalVideo()"><i class="fa-solid fa-xmark"></i></button>
            `;
        }

        // ==============================================
        // 📤 EXPORTAR DATOS
        // ==============================================
        function exportarDatos() {
            if (peliculasAdmin.length === 0) {
                alert("No hay datos guardados en Firebase para exportar");
                return;
            }

            const blob = new Blob([JSON.stringify(peliculasAdmin, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `tely_enlaces_${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ==============================================
        // ⚡ INICIO
        // ==============================================
        verificarFirebase();
        cargarPeliculas();

        // Cerrar modal con ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                cerrarModalVideo();
            }
        });
    </script>
</body>
</html>
