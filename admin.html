<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin - TELY</title>
  <!-- Estilos y librerías -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- Firebase (misma configuración que tu index.html) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

  <style>
    /* Eliminar desplazamiento lateral */
    html, body {
      margin: 0;
      padding: 0;
      background-color: #0f1115;
      overflow-x: hidden !important;
      width: 100%;
    }
    * {
      box-sizing: border-box;
    }
  </style>
</head>
<body class="text-gray-200 font-sans">

  <div class="w-full max-w-6xl mx-auto p-4 sm:p-6">

    <!-- Encabezado -->
    <div class="flex flex-wrap justify-between items-center mb-6 pb-4 border-b border-gray-700 gap-3">
      <h1 class="text-2xl sm:text-3xl font-bold text-white">⚙️ Panel de Administración TELY</h1>
      <a href="/" class="text-blue-400 hover:text-blue-300 flex items-center gap-2">
        <i class="fa-solid fa-arrow-left"></i> Volver al sitio
      </a>
    </div>

    <!-- Formulario de agregar contenido -->
    <div class="bg-gray-800 p-5 sm:p-6 rounded-xl shadow-lg mb-8">
      <h2 class="text-xl sm:text-2xl font-semibold text-white mb-5">➕ Agregar Película o Serie</h2>

      <form id="formContenido" class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <!-- Tipo de contenido -->
        <div>
          <label class="block text-gray-300 mb-2 text-sm">Tipo</label>
          <select id="tipoContenido" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 text-white focus:outline-none focus:border-blue-500">
            <option value="pelicula">Película</option>
            <option value="serie">Serie</option>
          </select>
        </div>

        <!-- Categoría -->
        <div>
          <label class="block text-gray-300 mb-2 text-sm">Categoría</label>
          <select id="categoriaContenido" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 text-white focus:outline-none focus:border-blue-500">
            <option value="estrenos">Estrenos</option>
            <option value="peliculas">Películas</option>
            <option value="series">Series</option>
          </select>
        </div>

        <!-- Título -->
        <div class="md:col-span-2">
          <label class="block text-gray-300 mb-2 text-sm">Título</label>
          <input type="text" id="tituloContenido" placeholder="Ej: El Padrino" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 text-white focus:outline-none focus:border-blue-500" required>
        </div>

        <!-- Año -->
        <div>
          <label class="block text-gray-300 mb-2 text-sm">Año</label>
          <input type="text" id="anioContenido" placeholder="Ej: 1972" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 text-white">
        </div>

        <!-- Género -->
        <div>
          <label class="block text-gray-300 mb-2 text-sm">Género</label>
          <input type="text" id="generoContenido" placeholder="Ej: Crimen / Drama" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 text-white">
        </div>

        <!-- Puntuación -->
        <div>
          <label class="block text-gray-300 mb-2 text-sm">Puntuación (0.0 - 10.0)</label>
          <input type="number" step="0.1" min="0" max="10" id="puntuacionContenido" placeholder="Ej: 9.2" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 text-white">
        </div>

        <!-- Ruta de imagen PNG -->
        <div class="md:col-span-2">
          <label class="block text-gray-300 mb-2 text-sm">Ruta de la portada (formato PNG)</label>
          <input type="text" id="portadaContenido" placeholder="Ej: /imagenes/portadas/el-padrino.png" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 text-white focus:outline-none focus:border-blue-500" required>
          <small class="text-gray-400">Funciona directamente en tu dominio Vercel / GitHub</small>
        </div>

        <!-- Sinopsis -->
        <div class="md:col-span-2">
          <label class="block text-gray-300 mb-2 text-sm">Sinopsis</label>
          <textarea id="sinopsisContenido" rows="3" placeholder="Resumen de la historia..." class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 text-white focus:outline-none focus:border-blue-500"></textarea>
        </div>

        <!-- Enlaces de reproducción -->
        <div class="md:col-span-2">
          <h4 class="text-white font-medium mb-3">🔗 Enlaces de reproducción</h4>
          <div id="listaEnlaces" class="space-y-3 mb-4 w-full"></div>
          <button type="button" onclick="agregarCampoEnlace()" class="bg-blue-600 px-4 py-2 rounded-lg text-sm text-white hover:bg-blue-700 transition">
            + Agregar otro enlace
          </button>
        </div>

        <!-- Botón Guardar -->
        <div class="md:col-span-2 mt-2">
          <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-lg transition text-lg">
            💾 Guardar Contenido
          </button>
        </div>
      </form>
    </div>

    <!-- Lista de contenido agregado -->
    <div class="bg-gray-800 p-5 sm:p-6 rounded-xl shadow-lg w-full">
      <h3 class="text-xl sm:text-2xl font-semibold text-white mb-5">📚 Contenido Agregado</h3>
      <div id="listaContenidoAdmin" class="space-y-3 text-gray-200 w-full">
        <p class="text-gray-400 text-center py-6">Cargando contenido...</p>
      </div>
    </div>

  </div>

  <script>
    // CONFIGURACIÓN FIREBASE (IGUAL A TU index.html)
    const firebaseConfig = {
      apiKey: "AIzaSyCYetRSA0nsZsGiqABbTtjq-5a4bz5-oDk",
      authDomain: "tely-675c0.firebaseapp.com",
      databaseURL: "https://tely-675c0-default-rtdb.firebaseio.com",
      projectId: "tely-675c0",
      storageBucket: "tely-675c0.appspot.com",
      messagingSenderId: "375009551428",
      appId: "1:375009551428:web:33846891b7641f97a20811",
      measurementId: "G-V1HFDG2366"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Agregar campos dinámicos para enlaces
    function agregarCampoEnlace() {
      const contenedor = document.getElementById("listaEnlaces");
      const div = document.createElement("div");
      div.className = "flex flex-wrap sm:flex-row gap-2 items-center w-full";
      div.innerHTML = `
        <input type="text" placeholder="Nombre de la opción" class="flex-1 min-w-[120px] p-2 rounded bg-gray-700 border border-gray-600 text-white" data-nombre>
        <input type="url" placeholder="URL del video" class="flex-[2] min-w-[200px] p-2 rounded bg-gray-700 border border-gray-600 text-white" data-url>
        <button type="button" onclick="this.parentElement.remove()" class="text-red-400 text-xl hover:text-red-500 px-2">×</button>
      `;
      contenedor.appendChild(div);
    }

    // Guardar en Firebase
    document.getElementById("formContenido").addEventListener("submit", async (e) => {
      e.preventDefault();

      const enlaces = [];
      document.querySelectorAll("#listaEnlaces > div").forEach(div => {
        const nombre = div.querySelector("[data-nombre]").value.trim();
        const url = div.querySelector("[data-url]").value.trim();
        if (nombre && url) enlaces.push({ nombre, url });
      });

      const nuevoContenido = {
        id: `admin_${Date.now()}`,
        titulo: document.getElementById("tituloContenido").value.trim(),
        anio: document.getElementById("anioContenido").value.trim() || "N/D",
        tipo: document.getElementById("tipoContenido").value,
        categoria: document.getElementById("categoriaContenido").value,
        portada: document.getElementById("portadaContenido").value.trim(),
        sinopsis: document.getElementById("sinopsisContenido").value.trim() || "Sin sinopsis disponible",
        puntuacion: document.getElementById("puntuacionContenido").value.trim() || "7.0",
        genero: document.getElementById("generoContenido").value.trim() || "Sin clasificar",
        opciones: enlaces,
        temporadas: [],
        deAdmin: true
      };

      try {
        await db.ref("contenido_personalizado/" + nuevoContenido.id).set(nuevoContenido);
        alert("✅ Contenido guardado correctamente");
        document.getElementById("formContenido").reset();
        document.getElementById("listaEnlaces").innerHTML = "";
        agregarCampoEnlace();
        cargarListaContenido();
      } catch (error) {
        alert("❌ Error al guardar: " + error.message);
      }
    });

    // Cargar lista de contenido guardado
    async function cargarListaContenido() {
      const lista = document.getElementById("listaContenidoAdmin");
      lista.innerHTML = "<p class='text-gray-400 text-center py-6'>Cargando...</p>";

      try {
        const snapshot = await db.ref("contenido_personalizado").once("value");
        const datos = snapshot.val() ? Object.values(snapshot.val()) : [];

        if (!datos.length) {
          lista.innerHTML = "<p class='text-gray-400 text-center py-6'>Aún no has agregado contenido.</p>";
          return;
        }

        lista.innerHTML = "";
        datos.forEach(item => {
          const fila = document.createElement("div");
          fila.className = "flex flex-wrap justify-between items-center bg-gray-700 p-3 rounded-lg gap-3 w-full";
          fila.innerHTML = `
            <div class="flex-1">
              <strong class="text-white">${item.titulo}</strong> <span class="text-gray-300">(${item.anio})</span>
              <br>
              <small class="text-gray-400">Tipo: ${item.tipo.toUpperCase()} | Portada: ${item.portada}</small>
            </div>
            <button onclick="eliminarContenido('${item.id}')" class="text-red-400 hover:text-red-500 p-1" title="Eliminar">
              <i class="fa-solid fa-trash"></i>
            </button>
          `;
          lista.appendChild(fila);
        });
      } catch (error) {
        lista.innerHTML = "<p class='text-red-400 text-center py-6'>Error al cargar contenido</p>";
      }
    }

    // Eliminar contenido
    async function eliminarContenido(id) {
      if (!confirm("¿Estás seguro de eliminar este contenido? No se puede recuperar.")) return;
      try {
        await db.ref("contenido_personalizado/" + id).remove();
        cargarListaContenido();
      } catch (error) {
        alert("❌ Error al eliminar: " + error.message);
      }
    }

    // Inicializar
    window.addEventListener("load", () => {
      agregarCampoEnlace();
      cargarListaContenido();
    });
  </script>
</body>
</html>
