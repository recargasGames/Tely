<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TELY 🎬 - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0A0A0F;color:#fff;font-family:'Segoe UI',Roboto,sans-serif;min-height:100vh;transition:background 0.3s, color 0.3s}
        body.dark{background:#0A0A0F;color:#fff}
        body:not(.dark){background:#f0f0f0;color:#111}
        
        .main-content{width:100%;padding:0.5rem;max-width:100%;margin:0 auto}
        
        .top-header{display:flex;justify-content:space-between;align-items:center;padding:.3rem 0 .5rem;flex-wrap:wrap;gap:.3rem}
        .top-header h1{font-size:1rem;font-weight:700;background:linear-gradient(135deg,#7C3AED,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .top-actions{display:flex;align-items:center;gap:.3rem}
        .theme-btn{background:rgba(255,255,255,.05);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:.8rem;transition:.3s}
        .theme-btn:hover{background:rgba(255,255,255,.1)}
        body:not(.dark) .theme-btn{background:rgba(0,0,0,.05);color:#111}
        body:not(.dark) .theme-btn:hover{background:rgba(0,0,0,.1)}
        .user-btn{background:rgba(124,58,237,.15);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:.8rem;transition:.3s}
        .user-btn:hover{background:rgba(124,58,237,.3)}
        body:not(.dark) .user-btn{color:#111}
        
        .admin-card{background:rgba(255,255,255,.04);border-radius:8px;padding:0.6rem;border:1px solid rgba(124,58,237,.15);margin-bottom:0.5rem}
        body:not(.dark) .admin-card{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.1)}
        .admin-card h3{font-weight:700;margin-bottom:.3rem;font-size:.85rem;display:flex;align-items:center;gap:.3rem}
        .admin-btn{background:#7C3AED;border:none;color:#fff;padding:.3rem .8rem;border-radius:6px;font-weight:600;cursor:pointer;transition:.3s;font-size:.7rem}
        .admin-btn:hover{background:#6D28D9}
        .admin-btn-magic{background:#F59E0B;color:#111;font-size:.8rem;padding:.4rem 1rem}
        .admin-btn-magic:hover{background:#D97706}
        .admin-btn-green{background:#10B981}
        .admin-btn-green:hover{background:#059669}
        .admin-btn-danger{background:#EF4444}
        .admin-btn-danger:hover{background:#DC2626}
        .admin-btn-blue{background:#3B82F6}
        .admin-btn-blue:hover{background:#2563EB}
        .admin-btn-purple{background:#8B5CF6}
        .admin-btn-purple:hover{background:#7C3AED}
        .admin-btn-orange{background:#F59E0B;color:#111}
        .admin-btn-orange:hover{background:#D97706}
        .admin-btn-red{background:#EF4444}
        .admin-btn-red:hover{background:#DC2626}
        
        .btn-group{display:flex;gap:.2rem;flex-wrap:wrap;margin:.2rem 0}
        .btn-group .admin-btn{padding:.2rem .6rem;font-size:.65rem}
        
        .admin-item{display:flex;align-items:center;gap:.4rem;background:rgba(255,255,255,.02);border-radius:6px;padding:.3rem .4rem;border-left:3px solid #7C3AED;margin-bottom:.3rem}
        body:not(.dark) .admin-item{background:rgba(0,0,0,.02)}
        .admin-item .thumbnail{width:35px;height:52px;border-radius:3px;object-fit:cover;background:#1A1A2E;flex-shrink:0}
        .admin-item .info-item{flex:1;min-width:0;overflow:hidden}
        .admin-item .title{font-weight:600;font-size:.7rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .admin-item .meta{font-size:.55rem;color:#94A3B8;display:flex;gap:.4rem;flex-wrap:wrap}
        .admin-item .enlace{font-size:.5rem;color:#60A5FA;word-break:break-all;padding:.05rem .2rem;background:rgba(59,130,246,.06);border-radius:3px;border:1px solid rgba(59,130,246,.08);max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .admin-item .enlace.op1{color:#34D399;border-color:rgba(16,185,129,.15)}
        .admin-item .enlace.op2{color:#60A5FA;border-color:rgba(59,130,246,.15)}
        .admin-item .actions{display:flex;gap:.15rem;flex-wrap:wrap;flex-shrink:0}
        .admin-item .actions .admin-btn{padding:.05rem .3rem;font-size:.45rem;border-radius:3px;min-width:auto}
        .admin-item .badge-tipo{font-size:.4rem;font-weight:600;padding:.02rem .2rem;border-radius:3px}
        .admin-item .badge-tipo.pelicula{background:rgba(124,58,237,.12);color:#A78BFA}
        .admin-item .badge-tipo.serie{background:rgba(16,185,129,.12);color:#34D399}
        .admin-item .edit-input{width:100%;padding:.05rem .2rem;border-radius:3px;border:1px solid rgba(124,58,237,.15);background:rgba(255,255,255,.05);color:#fff;font-size:.5rem;margin-top:.05rem}
        body:not(.dark) .admin-item .edit-input{background:rgba(0,0,0,.05);color:#111;border-color:rgba(0,0,0,.08)}
        .admin-item .edit-input:focus{outline:none;border-color:#7C3AED}
        
        .user-dropdown{position:absolute;right:0;top:calc(100% + 8px);background:rgba(26,26,46,.95);border-radius:12px;width:200px;border:1px solid rgba(124,58,237,.15);padding:.4rem 0;display:none;z-index:50;box-shadow:0 20px 60px rgba(0,0,0,.5)}
        .user-dropdown.show{display:block}
        body:not(.dark) .user-dropdown{background:rgba(255,255,255,.95);border-color:rgba(0,0,0,.1)}
        .user-dropdown a{display:flex;align-items:center;gap:.6rem;padding:.4rem 1rem;color:#CBD5E1;text-decoration:none;font-size:.85rem;transition:.2s}
        .user-dropdown a:hover{background:rgba(124,58,237,.08);color:#fff}
        body:not(.dark) .user-dropdown a{color:#333}
        body:not(.dark) .user-dropdown a:hover{background:rgba(124,58,237,.08);color:#111}
        .user-dropdown hr{margin:.2rem 0;border:none;border-top:1px solid rgba(124,58,237,.08)}
        .user-menu{position:relative}
        
        .loading-text{color:#64748B;font-size:.8rem}
        .progress-bar{height:4px;background:rgba(255,255,255,.1);border-radius:3px;margin-top:.3rem;overflow:hidden}
        .progress-bar .fill{height:100%;width:0%;background:linear-gradient(90deg,#F59E0B,#F97316);border-radius:3px;transition:width 0.5s}
        .admin-protected{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);border-radius:6px;padding:.3rem .6rem;text-align:center;margin-bottom:.3rem;font-size:.7rem;color:#34D399}
        .admin-protected i{color:#34D399}
        .admin-protected.denied{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.2);color:#F87171}
        .login-overlay{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:9999;display:flex;align-items:center;justify-content:center;padding:1rem}
        .login-overlay.oculto{display:none}
        .login-box{background:rgba(26,26,46,.95);border-radius:20px;padding:2rem;width:100%;max-width:400px;border:1px solid rgba(124,58,237,.15)}
        body:not(.dark) .login-box{background:#fff;border-color:rgba(0,0,0,.1)}
        .login-box .logo{font-size:2.5rem;font-weight:800;text-align:center;background:linear-gradient(135deg,#7C3AED,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.3rem}
        .login-box .sub{text-align:center;color:#94A3B8;font-size:.9rem;margin-bottom:1.5rem}
        body:not(.dark) .login-box .sub{color:#555}
        .login-input{width:100%;padding:.8rem 1rem;border-radius:12px;border:2px solid rgba(124,58,237,.2);background:rgba(255,255,255,.05);color:#fff;font-size:1rem;margin-bottom:1rem;transition:.3s}
        .login-input:focus{outline:none;border-color:#7C3AED;background:rgba(255,255,255,.08)}
        .login-input::placeholder{color:#64748B}
        body:not(.dark) .login-input{background:rgba(0,0,0,.05);color:#111;border-color:rgba(0,0,0,.1)}
        body:not(.dark) .login-input::placeholder{color:#888}
        .login-btn{width:100%;padding:.8rem;border-radius:12px;border:none;background:#7C3AED;color:#fff;font-size:1rem;font-weight:700;cursor:pointer;transition:.3s}
        .login-btn:hover{background:#6D28D9}
        .login-btn:disabled{opacity:.5;cursor:not-allowed}
        .login-error{color:#EF4444;font-size:.85rem;text-align:center;margin-top:.5rem;display:none}
        .login-success{color:#34D399;font-size:.85rem;text-align:center;margin-top:.5rem;display:none}
        .login-footer{text-align:center;margin-top:1rem;color:#94A3B8;font-size:.85rem}
        body:not(.dark) .login-footer{color:#555}
        .login-footer a{color:#A78BFA;text-decoration:none;font-weight:600}
        body:not(.dark) .login-footer a{color:#7C3AED}
        .search-admin{display:flex;gap:.3rem;margin-bottom:.3rem;flex-wrap:wrap}
        .search-admin input{flex:1;padding:.2rem .5rem;border-radius:6px;border:1px solid rgba(124,58,237,.2);background:rgba(255,255,255,.05);color:#fff;font-size:.7rem;min-width:100px}
        body:not(.dark) .search-admin input{background:rgba(0,0,0,.05);color:#111;border-color:rgba(0,0,0,.1)}
        .search-admin input:focus{outline:none;border-color:#7C3AED}
        .search-admin select{padding:.2rem .5rem;border-radius:6px;border:1px solid rgba(124,58,237,.2);background:rgba(255,255,255,.05);color:#fff;font-size:.7rem;cursor:pointer}
        body:not(.dark) .search-admin select{background:rgba(0,0,0,.05);color:#111;border-color:rgba(0,0,0,.1)}
        .search-admin select:focus{outline:none;border-color:#7C3AED}
        
        .capitulo-detalle{background:rgba(255,255,255,.02);border-radius:4px;padding:.1rem .2rem;margin:.1rem 0;border-left:2px solid rgba(59,130,246,.3)}
        .capitulo-detalle .cap-titulo{font-size:.55rem;font-weight:500;color:#E2E8F0}
        body:not(.dark) .capitulo-detalle .cap-titulo{color:#111}
        .capitulo-detalle .cap-meta{font-size:.45rem;color:#64748B}
        .capitulo-detalle .cap-enlace{font-size:.45rem;color:#60A5FA;word-break:break-all}
        .serie-expandida{border-left-color:#34D399!important}
        .toggle-series-btn{background:rgba(59,130,246,.15);border:1px solid rgba(59,130,246,.2);color:#3B82F6;padding:.05rem .3rem;border-radius:3px;font-size:.45rem;font-weight:600;cursor:pointer;transition:.2s}
        .toggle-series-btn:hover{background:rgba(59,130,246,.25)}
        .temporada-titulo{font-size:.55rem;font-weight:600;color:#34D399;margin:.1rem 0 .05rem;display:flex;align-items:center;gap:.2rem}
        
        .paginacion{display:flex;align-items:center;justify-content:center;gap:.3rem;padding:.3rem 0;flex-wrap:wrap}
        .paginacion button{background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.2);color:#fff;padding:.1rem .5rem;border-radius:4px;font-size:.6rem;cursor:pointer;transition:.2s}
        .paginacion button:hover{background:rgba(124,58,237,.3)}
        .paginacion button:disabled{opacity:.3;cursor:not-allowed}
        .paginacion .info-pagina{color:#94A3B8;font-size:.6rem}
        .paginacion select{padding:.1rem .3rem;border-radius:4px;background:rgba(255,255,255,.05);color:#fff;border:1px solid rgba(124,58,237,.2);font-size:.6rem}
        body:not(.dark) .paginacion select{background:rgba(0,0,0,.05);color:#111}
        
        .pedido-item{background:rgba(255,255,255,.03);border-radius:6px;padding:.3rem .5rem;margin:.2rem 0;border-left:3px solid #F59E0B}
        body:not(.dark) .pedido-item{background:rgba(0,0,0,.02)}
        .pedido-item .titulo{font-weight:600;font-size:.7rem}
        .pedido-item .detalles{font-size:.6rem;color:#94A3B8;display:flex;gap:.5rem;flex-wrap:wrap}
        .pedido-item .estado{display:inline-block;padding:.02rem .4rem;border-radius:9999px;font-size:.45rem;font-weight:600}
        .pedido-item .estado.pendiente{background:rgba(245,158,11,.15);color:#F59E0B}
        .pedido-item .estado.procesando{background:rgba(59,130,246,.15);color:#3B82F6}
        .pedido-item .estado.completado{background:rgba(16,185,129,.15);color:#34D399}
        .pedido-item .fecha{font-size:.5rem;color:#64748B}
        .pedido-item .usuario-info{font-size:.55rem;color:#A78BFA}
        .pedido-actions{display:flex;gap:.2rem;margin-top:.2rem;flex-wrap:wrap}
        .pedido-actions button{padding:.05rem .4rem;border-radius:3px;font-size:.5rem;font-weight:600;border:none;cursor:pointer;transition:.2s}
        .pedido-actions .btn-completar{background:rgba(16,185,129,.15);color:#34D399}
        .pedido-actions .btn-completar:hover{background:rgba(16,185,129,.25)}
        .pedido-actions .btn-procesar{background:rgba(59,130,246,.15);color:#3B82F6}
        .pedido-actions .btn-procesar:hover{background:rgba(59,130,246,.25)}
        .pedido-actions .btn-eliminar{background:rgba(239,68,68,.15);color:#F87171}
        .pedido-actions .btn-eliminar:hover{background:rgba(239,68,68,.25)}
        .badge-pedidos{display:inline-block;background:#EF4444;color:#fff;border-radius:9999px;padding:.02rem .4rem;font-size:.45rem;font-weight:700;margin-left:.2rem}
        
        .stats-generacion{display:grid;grid-template-columns:repeat(3,1fr);gap:.3rem;margin:.3rem 0;padding:.3rem;background:rgba(0,0,0,.2);border-radius:6px}
        .stats-generacion .stat{text-align:center}
        .stats-generacion .stat .num{font-size:1rem;font-weight:700;color:#F59E0B}
        .stats-generacion .stat .label{font-size:.55rem;color:#94A3B8}
        .info{font-size:.7rem;color:#94A3B8}
        
        .max-h-96{max-height:60vh;overflow-y:auto}
        .overflow-y-auto{overflow-y:auto}
        
        .badge-count{display:inline-block;padding:.02rem .4rem;border-radius:9999px;background:rgba(124,58,237,.2);color:#A78BFA;font-size:.55rem;font-weight:600}
        .badge-no-op2{display:inline-block;padding:.02rem .3rem;border-radius:3px;background:rgba(239,68,68,.15);color:#F87171;font-size:.4rem;font-weight:600}
    </style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
    <div class="login-box">
        <div class="logo">🔐 TELY</div>
        <p class="sub">Inicia sesión para acceder al panel de administración</p>
        <div id="loginError" class="login-error"></div>
        <div id="loginSuccess" class="login-success"></div>
        <form id="adminLoginForm" onsubmit="event.preventDefault(); iniciarSesionAdmin()">
            <input type="email" class="login-input" id="adminEmail" placeholder="📧 Correo electrónico" required>
            <input type="password" class="login-input" id="adminPassword" placeholder="🔒 Contraseña" required>
            <button type="submit" class="login-btn" id="adminLoginBtn"><i class="fas fa-sign-in-alt"></i> Iniciar sesión</button>
        </form>
        <div class="login-footer">
            <a href="#" onclick="irALogin()">¿Olvidaste tu contraseña?</a>
        </div>
    </div>
</div>

<main class="main-content">
    <div class="top-header">
        <h1><i class="fas fa-cog"></i> Admin</h1>
        <div class="top-actions">
            <button class="theme-btn" onclick="toggleTheme()" id="themeBtn"><i class="fas fa-moon"></i></button>
            <div class="user-menu">
                <button class="user-btn" onclick="toggleUserMenu()"><i class="fas fa-user-circle"></i></button>
                <div class="user-dropdown" id="userDropdown">
                    <a href="#" id="logoutBtn" onclick="cerrarSesionAdmin()"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</a>
                </div>
            </div>
        </div>
    </div>

    <div class="admin-protected" id="adminProtected">
        <i class="fas fa-shield-alt"></i> 
        <span id="adminStatus">Verificando acceso...</span>
    </div>

    <!-- GENERACIÓN -->
    <div class="admin-card" style="border-color:rgba(245,158,11,.4)">
        <h3><i class="fas fa-wand-magic-sparkles" style="color:#F59E0B;"></i> Generar</h3>
        <div class="btn-group">
            <button class="admin-btn admin-btn-magic" onclick="generarPeliculas()" style="font-size:.7rem;padding:.3rem .8rem;">
                <i class="fas fa-film"></i> Pelis
            </button>
            <button class="admin-btn admin-btn-magic" onclick="generarSeries()" style="font-size:.7rem;padding:.3rem .8rem;background:#8B5CF6;">
                <i class="fas fa-tv"></i> Series
            </button>
            <button class="admin-btn admin-btn-orange" onclick="detenerGeneracion()" id="btnDetener" style="display:none;background:#EF4444;font-size:.6rem;padding:.2rem .6rem;">
                <i class="fas fa-stop"></i> Detener
            </button>
            <button class="admin-btn admin-btn-green" onclick="continuarGeneracion()" id="btnContinuar" style="display:none;font-size:.6rem;padding:.2rem .6rem;">
                <i class="fas fa-play"></i> Continuar
            </button>
        </div>
        <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
        <div class="stats-generacion" id="statsGeneracion" style="display:none;">
            <div class="stat"><div class="num" id="genActual">0</div><div class="label">Procesados</div></div>
            <div class="stat"><div class="num" id="genTotal">0</div><div class="label">Total</div></div>
            <div class="stat"><div class="num" id="genErrores">0</div><div class="label">Errores</div></div>
        </div>
        <div class="info" id="progressInfo" style="font-size:.7rem;">Listo para generar</div>
        <div style="display:flex;gap:.3rem;justify-content:center;margin-top:.3rem;flex-wrap:wrap">
            <button class="admin-btn admin-btn-green" onclick="limpiarTodo()" style="font-size:.6rem;padding:.2rem .6rem;">
                <i class="fas fa-trash"></i> Limpiar
            </button>
            <button class="admin-btn admin-btn-blue" onclick="cargarContenido()" style="font-size:.6rem;padding:.2rem .6rem;">
                <i class="fas fa-refresh"></i> Recargar
            </button>
        </div>
    </div>

    <!-- PEDIDOS -->
    <div class="admin-card" style="border-color:rgba(245,158,11,.3)">
        <h3 style="font-size:.8rem;"><i class="fas fa-clipboard-list" style="color:#F59E0B;"></i> Pedidos <span class="badge-pedidos" id="badgeTotalPedidos">0</span></h3>
        <div style="display:flex;gap:.3rem;margin-bottom:.3rem;flex-wrap:wrap;">
            <button class="admin-btn admin-btn-blue" onclick="cargarPedidos()" style="padding:.15rem .6rem;font-size:.6rem;">
                <i class="fas fa-refresh"></i> Recargar
            </button>
            <button class="admin-btn admin-btn-green" onclick="marcarTodosCompletados()" style="padding:.15rem .6rem;font-size:.6rem;">
                <i class="fas fa-check-double"></i> Completar todos
            </button>
        </div>
        <div id="listaPedidosAdmin" class="max-h-96 overflow-y-auto">
            <p class="loading-text">Cargando pedidos...</p>
        </div>
    </div>

    <!-- CONTENIDO -->
    <div class="admin-card">
        <h3 style="font-size:.8rem;"><i class="fas fa-list text-emerald-500"></i> Contenido</h3>
        <div class="search-admin">
            <input type="text" id="searchAdminInput" placeholder="🔍 Buscar..." oninput="filtrarContenido()">
            <select id="filterAdminTipo" onchange="filtrarContenido()">
                <option value="todos">Todos</option>
                <option value="pelicula">🎬 Películas</option>
                <option value="serie">📺 Series</option>
            </select>
        </div>
        <div id="listaContenido" class="max-h-96 overflow-y-auto">
            <p class="loading-text">Cargando contenido...</p>
        </div>
        <div class="paginacion" id="paginacionContainer" style="display:none;">
            <button onclick="cambiarPagina(-1)" id="btnPaginaPrev"><i class="fas fa-chevron-left"></i></button>
            <span class="info-pagina" id="infoPagina">Página 1 de 1</span>
            <button onclick="cambiarPagina(1)" id="btnPaginaNext"><i class="fas fa-chevron-right"></i></button>
            <select id="selectPaginaSize" onchange="cambiarPaginaSize()">
                <option value="10">10</option>
                <option value="20" selected>20</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
        </div>
    </div>
</main>

window.iniciarSesionAdmin = function() {
    const email = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value;
    const btn = document.getElementById('adminLoginBtn');
    const errorEl = document.getElementById('loginError');
    const successEl = document.getElementById('loginSuccess');
    
    errorEl.style.display = 'none';
    successEl.style.display = 'none';
    if (!email || !password) {
        errorEl.textContent = '⚠️ Completa todos los campos';
        errorEl.style.display = 'block';
        return;
    }
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Iniciando...';
    
    auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
            const user = userCredential.user;
            if (ADMIN_EMAILS.includes(user.email)) {
                successEl.textContent = '✅ Acceso concedido';
                successEl.style.display = 'block';
                document.getElementById('loginOverlay').classList.add('oculto');
                esAdmin = true;
                actualizarUIAdmin(true);
                cargarContenido();
                cargarPedidos();
            } else {
                errorEl.textContent = '⛔ No tienes permisos de administrador';
                errorEl.style.display = 'block';
                auth.signOut();
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Iniciar sesión';
            }
        })
        .catch((e) => {
            let msg = '❌ Error al iniciar sesión';
            if (e.code === 'auth/user-not-found') msg = '❌ Usuario no encontrado';
            else if (e.code === 'auth/wrong-password') msg = '❌ Contraseña incorrecta';
            else if (e.code === 'auth/invalid-email') msg = '❌ Correo inválido';
            else if (e.code === 'auth/too-many-requests') msg = '❌ Demasiados intentos';
            errorEl.textContent = msg;
            errorEl.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Iniciar sesión';
        });
};

window.cerrarSesionAdmin = function() {
    auth.signOut().then(() => {
        esAdmin = false;
        document.getElementById('loginOverlay').classList.remove('oculto');
        document.getElementById('userDropdown').classList.remove('show');
        actualizarUIAdmin(false);
        mostrarToast('✅ Sesión cerrada', 'success');

};

function actualizarUIAdmin(isAdmin) {
    const statusEl = document.getElementById('adminStatus');
    const protectedDiv = document.getElementById('adminProtected');
    const logoutBtn = document.getElementById('logoutBtn');
    
    if (isAdmin) {
        statusEl.textContent = '✅ Acceso de Administrador concedido';
        protectedDiv.className = 'admin-protected';
        logoutBtn.style.display = 'flex';
    } else {
        statusEl.textContent = '⛔ Acceso denegado. Inicia sesión.';
        protectedDiv.className = 'admin-protected denied';
        logoutBtn.style.display = 'none';
    }
}

auth.onAuthStateChanged((user) => {
    if (user && ADMIN_EMAILS.includes(user.email)) {
        esAdmin = true;
        document.getElementById('loginOverlay').classList.add('oculto');
        actualizarUIAdmin(true);
        cargarContenido();
        cargarPedidos();
    } else if (user) {
        auth.signOut();
        esAdmin = false;
        document.getElementById('loginOverlay').classList.remove('oculto');
        actualizarUIAdmin(false);
    } else {
        esAdmin = false;
        document.getElementById('loginOverlay').classList.remove('oculto');
        actualizarUIAdmin(false);
    }
});

function generarEnlaceUnlimplay(tmdb_id, tipo, temporada = 1, capitulo = 1) {
    if (tipo === 'pelicula') {
        return `https://unlimplay.com/play/embed/movie/${tmdb_id}?lang=es-MX&autoplay=1&controls=1&logo=0`;
    } else {
        return `https://unlimplay.com/play/embed/tv/${tmdb_id}/${temporada}/${capitulo}?lang=es-MX&autoplay=1&controls=1&logo=0`;
    }
}

function getImagenUrl(path, size = 'w342') {
    if (!path) return 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg';
    return `https://image.tmdb.org/t/p/${size}${path}`;
}

function mostrarToast(msg, tipo = 'success') {
    const colores = { success: '#10B981', warning: '#F59E0B', error: '#EF4444', info: '#3B82F6' };
    const t = document.createElement('div');
    t.style.cssText = `position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:${colores[tipo] || '#10B981'};color:#fff;padding:8px 16px;border-radius:8px;z-index:9999;font-weight:600;max-width:90%;text-align:center;font-size:.8rem;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:opacity 0.3s;`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2500);
}

async function fetchTMDB(path, params = {}) {
    const queryParams = new URLSearchParams();
    queryParams.append('path', path);
    Object.keys(params).forEach(key => queryParams.append(key, params[key]));
    const url = `https://tely-xi.vercel.app/api/tmdb?${queryParams.toString()}`;
    const response = await fetch(url);
    if (!response.ok) throw new Error(`Error: ${response.status}`);
    return response.json();
}

function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

// GENERAR PELÍCULAS
async function generarPeliculas() {
    if (!esAdmin) { mostrarToast('⛔ No tienes permisos', 'error'); return; }
    if (generando) { mostrarToast('⏳ Ya está generando...', 'warning'); return; }
    if (!confirm('⚠️ ¿Generar TODAS las películas populares de TMDB?')) return;
    
    generando = true;
    generacionDetenida = false;
    totalGenerados = 0;
    totalErrores = 0;
    
    document.getElementById('btnDetener').style.display = 'inline-block';
    document.getElementById('btnContinuar').style.display = 'none';
    document.getElementById('statsGeneracion').style.display = 'grid';
    document.getElementById('progressInfo').textContent = '🎬 Obteniendo películas...';
    document.getElementById('progressFill').style.width = '0%';
    
    let page = 1;
    let hasMore = true;
    const MAX_PAGES = 500;
    let peliculasTotales = [];
    
    try {
        while (hasMore && page <= MAX_PAGES && !generacionDetenida) {
            const data = await fetchTMDB('movie/popular', { page: page });
            if (!data.results || !data.results.length) { hasMore = false; break; }
            peliculasTotales = [...peliculasTotales, ...data.results];
            document.getElementById('progressInfo').textContent = `🎬 Cargando películas... página ${page} (${peliculasTotales.length} encontradas)`;
            document.getElementById('progressFill').style.width = `${Math.min((page / MAX_PAGES) * 40, 40)}%`;
            page++;
            if (!data.total_pages || page > data.total_pages) hasMore = false;
            await sleep(100);
        }
        
        totalProcesar = peliculasTotales.length;
        document.getElementById('genTotal').textContent = totalProcesar;
        
        for (let i = 0; i < peliculasTotales.length && !generacionDetenida; i++) {
            try {
                const p = peliculasTotales[i];
                await db.ref(RUTA_PELICULAS).push({
                    titulo: p.title || `Película ${p.id}`,
                    anio: p.release_date ? p.release_date.split('-')[0] : 'N/D',
                    sinopsis: p.overview || 'Sin sinopsis',
                    portada: getImagenUrl(p.poster_path, 'w342'),
                    genero: 'Película',
                    tipo: 'pelicula',
                    categoria: 'peliculas',
                    tmdb_id: p.id,
                    puntuacion: p.vote_average ? p.vote_average.toFixed(1) : 'N/A',
                    url: generarEnlaceUnlimplay(p.id, 'pelicula'),
                    creado: Date.now()
                });
                totalGenerados++;
            } catch(e) { totalErrores++; }
            
            document.getElementById('genActual').textContent = totalGenerados;
            document.getElementById('genErrores').textContent = totalErrores;
            document.getElementById('progressFill').style.width = `${40 + (i / peliculasTotales.length) * 60}%`;
            document.getElementById('progressInfo').textContent = `🎬 ${totalGenerados}/${peliculasTotales.length} (${totalErrores} errores)`;
            await sleep(50);
        }
        
        if (generacionDetenida) {
            document.getElementById('progressInfo').textContent = `⏸️ Generación pausada - ${totalGenerados} películas generadas`;
            document.getElementById('btnContinuar').style.display = 'inline-block';
        } else {
            document.getElementById('progressInfo').textContent = `✅ ${totalGenerados} películas generadas (${totalErrores} errores)`;
            document.getElementById('btnDetener').style.display = 'none';
            mostrarToast(`✅ ${totalGenerados} películas generadas`, 'success');
            cargarContenido();
        }
    } catch(e) {
        document.getElementById('progressInfo').textContent = `❌ Error: ${e.message}`;
        mostrarToast('❌ Error: ' + e.message, 'error');
    }
    generando = false;
}

// GENERAR SERIES
async function generarSeries() {
    if (!esAdmin) { mostrarToast('⛔ No tienes permisos', 'error'); return; }
    if (generando) { mostrarToast('⏳ Ya está generando...', 'warning'); return; }
    if (!confirm('⚠️ ¿Generar TODAS las series populares de TMDB?')) return;
    
    generando = true;
    generacionDetenida = false;
    totalGenerados = 0;
    totalErrores = 0;
    
    document.getElementById('btnDetener').style.display = 'inline-block';
    document.getElementById('btnContinuar').style.display = 'none';
    document.getElementById('statsGeneracion').style.display = 'grid';
    document.getElementById('progressInfo').textContent = '📺 Obteniendo series...';
    document.getElementById('progressFill').style.width = '0%';
    
    let page = 1;
    let hasMore = true;
    const MAX_PAGES = 500;
    let seriesTotales = [];
    
    try {
        while (hasMore && page <= MAX_PAGES && !generacionDetenida) {
            const data = await fetchTMDB('tv/popular', { page: page });
            if (!data.results || !data.results.length) { hasMore = false; break; }
            seriesTotales = [...seriesTotales, ...data.results];
            document.getElementById('progressInfo').textContent = `📺 Cargando series... página ${page} (${seriesTotales.length} encontradas)`;
            document.getElementById('progressFill').style.width = `${Math.min((page / MAX_PAGES) * 40, 40)}%`;
            page++;
            if (!data.total_pages || page > data.total_pages) hasMore = false;
            await sleep(100);
        }
        
        totalProcesar = seriesTotales.length;
        document.getElementById('genTotal').textContent = totalProcesar;
        
        for (let i = 0; i < seriesTotales.length && !generacionDetenida; i++) {
            try {
                const s = seriesTotales[i];
                const temporadas = [];
                let capsSerie = 0;
                for (let t = 1; t <= Math.min(s.number_of_seasons || 1, 10); t++) {
                    try {
                        const seasonData = await fetchTMDB(`tv/${s.id}/season/${t}`);
                        if (!seasonData || !seasonData.episodes) continue;
                        const capitulos = seasonData.episodes.map(ep => ({
                            numero: ep.episode_number,
                            titulo: ep.name || `Capítulo ${ep.episode_number}`,
                            sinopsis: ep.overview || 'Sin sinopsis',
                            url: generarEnlaceUnlimplay(s.id, 'serie', t, ep.episode_number)
                        }));
                        capsSerie += capitulos.length;
                        temporadas.push({ numero: t, nombre: seasonData.name || `Temporada ${t}`, capitulos });
                    } catch(e) {}
                }
                if (temporadas.length > 0) {
                    await db.ref(RUTA_SERIES).push({
                        titulo: s.name || `Serie ${s.id}`,
                        anio: s.first_air_date ? s.first_air_date.split('-')[0] : 'N/D',
                        sinopsis: s.overview || 'Sin sinopsis',
                        portada: getImagenUrl(s.poster_path, 'w342'),
                        genero: 'Serie',
                        tipo: 'serie',
                        categoria: 'series',
                        tmdb_id: s.id,
                        puntuacion: s.vote_average ? s.vote_average.toFixed(1) : 'N/A',
                        temporadas: temporadas,
                        url: generarEnlaceUnlimplay(s.id, 'serie', 1, 1),
                        creado: Date.now()
                    });
                    totalGenerados++;
                }
            } catch(e) { totalErrores++; }
            
            document.getElementById('genActual').textContent = totalGenerados;
            document.getElementById('genErrores').textContent = totalErrores;
            document.getElementById('progressFill').style.width = `${40 + (i / seriesTotales.length) * 60}%`;
            document.getElementById('progressInfo').textContent = `📺 ${totalGenerados}/${seriesTotales.length} (${totalErrores} errores)`;
            await sleep(50);
        }
        
        if (generacionDetenida) {
            document.getElementById('progressInfo').textContent = `⏸️ Generación pausada - ${totalGenerados} series generadas`;
            document.getElementById('btnContinuar').style.display = 'inline-block';
        } else {
            document.getElementById('progressInfo').textContent = `✅ ${totalGenerados} series generadas (${totalErrores} errores)`;
            document.getElementById('btnDetener').style.display = 'none';
            mostrarToast(`✅ ${totalGenerados} series generadas`, 'success');
            cargarContenido();
        }
    } catch(e) {
        document.getElementById('progressInfo').textContent = `❌ Error: ${e.message}`;
        mostrarToast('❌ Error: ' + e.message, 'error');
    }
    generando = false;
}

function detenerGeneracion() {
    generacionDetenida = true;
    document.getElementById('btnDetener').style.display = 'none';
    document.getElementById('btnContinuar').style.display = 'inline-block';

}

// EDITAR ENLACES
window.editarEnlace = function(key, tipo, campo) {
    const container = document.getElementById(`item-${key}`);
    const enlaceDiv = container.querySelector(`.enlace.${campo}`);
    const actionsDiv = container.querySelector('.actions');
    
    if (itemsEditando[key]) {
        cancelarEdicion(key);
        return;
    }
    
    const currentUrl = enlaceDiv.textContent.replace('🔗', '').trim();
    itemsEditando[key] = true;
    
    enlaceDiv.innerHTML = `
        <input class="edit-input" id="edit-input-${key}-${campo}" value="${currentUrl}" placeholder="Pega el nuevo enlace..." style="font-size:.5rem;">
        <div style="margin-top:.05rem;display:flex;gap:.15rem;">
            <button class="admin-btn admin-btn-green" style="padding:.03rem .3rem;font-size:.4rem;" onclick="guardarEnlace('${key}', '${tipo}', '${campo}')"><i class="fas fa-check"></i></button>
            <button class="admin-btn admin-btn-danger" style="padding:.03rem .3rem;font-size:.4rem;" onclick="cancelarEdicion('${key}')"><i class="fas fa-times"></i></button>
        </div>
    `;
    
    setTimeout(() => {
        const input = document.getElementById(`edit-input-${key}-${campo}`);
        if (input) input.focus();
    }, 100);
};

window.cancelarEdicion = function(key) {
    delete itemsEditando[key];
    cargarContenido();
};

window.guardarEnlace = async function(key, tipo, campo) {
    const input = document.getElementById(`edit-input-${key}-${campo}`);
    if (!input) return;
    
    const nuevoEnlace = input.value.trim();
    if (!nuevoEnlace) {
        mostrarToast('❌ El enlace no puede estar vacío', 'error');
        return;
    }
    
    try {
        const path = tipo === 'pelicula' ? RUTA_PELICULAS : RUTA_SERIES;
        await db.ref(`${path}/${key}`).update({ [campo]: nuevoEnlace });
        mostrarToast(`✅ ${campo} actualizada`, 'success');
        delete itemsEditando[key];
        cargarContenido();
    } catch(e) {
        mostrarToast('❌ Error: ' + e.message, 'error');
    }
};

    const container = document.getElementById(`item-${key}`);

// PEDIDOS
function cargarPedidos() {
    if (!esAdmin) return;
    const container = document.getElementById('listaPedidosAdmin');
    container.innerHTML = '<p class="loading-text">Cargando pedidos...</p>';
    
    db.ref(RUTA_PEDIDOS).orderByChild('fecha').once('value').then((snap) => {
        const data = snap.val();
        container.innerHTML = '';
        pedidosData = [];
        
        if (!data) {
            container.innerHTML = '<div style="color:#64748B;font-size:.7rem;text-align:center;padding:.3rem;">No hay pedidos</div>';
            document.getElementById('badgeTotalPedidos').textContent = '0';
            document.getElementById('badgeTotalPedidos').style.display = 'none';
            return;
        }
        
        const pedidos = Object.entries(data).map(([key, value]) => ({ key, ...value }));
        pedidos.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
        pedidosData = pedidos;
        
        const pendientes = pedidos.filter(p => p.estado === 'pendiente').length;
        document.getElementById('badgeTotalPedidos').textContent = pendientes;
        document.getElementById('badgeTotalPedidos').style.display = pendientes > 0 ? 'inline-block' : 'none';
        
        pedidos.forEach((p) => {
            const div = document.createElement('div');
            div.className = 'pedido-item';
            const estadoText = {
                'pendiente': '⏳ Pendiente',
                'procesando': '🔄 En proceso',
                'completado': '✅ Completado'
            }[p.estado] || '⏳ Pendiente';
            
            div.innerHTML = `
                <div class="titulo">${p.tipo === 'pelicula' ? '🎬' : '📺'} ${p.titulo}</div>
                <div class="detalles">
                    <span>📅 ${p.anio || 'N/D'}</span>
                    <span class="estado ${p.estado || 'pendiente'}">${estadoText}</span>
                    <span class="usuario-info">👤 ${p.nombre || 'Usuario'}</span>
                </div>
                ${p.sinopsis && p.sinopsis !== 'Sin descripción' ? `<div style="font-size:.6rem;color:#64748B;margin-top:.1rem;">${p.sinopsis.substring(0, 60)}</div>` : ''}
                <div class="fecha">📆 ${new Date(p.fecha).toLocaleDateString()}</div>
                <div class="pedido-actions">
                    ${p.estado !== 'completado' ? `<button class="btn-completar" onclick="actualizarEstadoPedido('${p.key}', 'completado')"><i class="fas fa-check"></i> Completar</button>` : ''}
                    ${p.estado === 'pendiente' ? `<button class="btn-procesar" onclick="actualizarEstadoPedido('${p.key}', 'procesando')"><i class="fas fa-spinner"></i> Procesar</button>` : ''}
                    <button class="btn-eliminar" onclick="eliminarPedido('${p.key}')"><i class="fas fa-trash"></i> Eliminar</button>
                </div>
            `;
            container.appendChild(div);
        });
    });
}

function actualizarEstadoPedido(key, nuevoEstado) {
    if (!confirm(`¿Cambiar a "${nuevoEstado}"?`)) return;
    db.ref(`${RUTA_PEDIDOS}/${key}`).update({ estado: nuevoEstado }).then(() => {
        mostrarToast(`✅ Pedido actualizado`, 'success');
        cargarPedidos();
    });
}

function eliminarPedido(key) {
    if (!confirm('⚠️ ¿Eliminar este pedido?')) return;
    db.ref(`${RUTA_PEDIDOS}/${key}`).remove().then(() => {
        mostrarToast('🗑️ Pedido eliminado', 'warning');
        cargarPedidos();
    });
}

function marcarTodosCompletados() {
    if (!confirm('⚠️ ¿Marcar TODOS los pedidos como completados?')) return;
    const pendientes = pedidosData.filter(p => p.estado !== 'completado');
    if (!pendientes.length) { mostrarToast('ℹ️ No hay pedidos pendientes', 'info'); return; }
    
    pendientes.forEach(p => {
        db.ref(`${RUTA_PEDIDOS}/${p.key}`).update({ estado: 'completado' });
    });
    setTimeout(() => {
        mostrarToast(`✅ ${pendientes.length} pedidos completados`, 'success');
        cargarPedidos();
    }, 500);
}

// PAGINACIÓN
function cambiarPagina(dir) {
    const totalItems = peliculasLista.length + seriesLista.length;
    const totalPaginas = Math.ceil(totalItems / itemsPorPagina);
    const nuevaPagina = paginaActual + dir;
    if (nuevaPagina >= 1 && nuevaPagina <= totalPaginas) {
        paginaActual = nuevaPagina;
        mostrarPagina();
    }
}

function cambiarPaginaSize() {
    itemsPorPagina = parseInt(document.getElementById('selectPaginaSize').value);
    paginaActual = 1;
    mostrarPagina();
}

function mostrarPagina() {
    const container = document.getElementById('listaContenido');
    const pagContainer = document.getElementById('paginacionContainer');
    const items = container.querySelectorAll('.admin-item');
    const totalItems = items.length;
    const totalPaginas = Math.ceil(totalItems / itemsPorPagina);
    
    if (totalItems <= itemsPorPagina) {
        pagContainer.style.display = 'none';
        return;
    }
    
    const inicio = (paginaActual - 1) * itemsPorPagina;
    const fin = Math.min(inicio + itemsPorPagina, totalItems);
    
    items.forEach((item, index) => {
        item.style.display = (index >= inicio && index < fin) ? 'flex' : 'none';
    });
    
    document.getElementById('infoPagina').textContent = `Página ${paginaActual} de ${totalPaginas}`;
    document.getElementById('btnPaginaPrev').disabled = paginaActual <= 1;
    document.getElementById('btnPaginaNext').disabled = paginaActual >= totalPaginas;
    pagContainer.style.display = 'flex';
}

// LIMPIAR TODO
window.limpiarTodo = async function() {
    if (!esAdmin) { mostrarToast('⛔ No tienes permisos', 'error'); return; }
    if (!confirm('⚠️ ¿Eliminar TODO el contenido de Firebase?\n¡No se puede deshacer!')) return;
    try {
        await db.ref(RUTA_PELICULAS).remove();
        await db.ref(RUTA_SERIES).remove();
        mostrarToast('🗑️ Todo eliminado', 'warning');
        cargarContenido();
    } catch(e) {
        mostrarToast('❌ Error: ' + e.message, 'error');
    }
};

window.filtrarContenido = function() {
    const searchTerm = document.getElementById('searchAdminInput').value.toLowerCase();
    const tipoFilter = document.getElementById('filterAdminTipo').value;
    const items = document.querySelectorAll('.admin-item');
    
    items.forEach(item => {
        const titulo = item.dataset.titulo?.toLowerCase() || '';
        const tipo = item.dataset.tipo || '';
        let match = true;
        if (searchTerm && !titulo.includes(searchTerm)) match = false;
        if (tipoFilter !== 'todos' && tipo !== tipoFilter) match = false;
        item.style.display = match ? 'flex' : 'none';
    });
};

// CARGAR CONTENIDO
window.cargarContenido = async function() {
    if (!esAdmin) return;
    const container = document.getElementById('listaContenido');
    container.innerHTML = '<p class="loading-text">⏳ Cargando...</p>';
    
    try {
        const [pSnap, sSnap] = await Promise.all([
            db.ref(RUTA_PELICULAS).once('value'),
            db.ref(RUTA_SERIES).once('value')
        ]);
        
        const pData = pSnap.val() || {};
        const sData = sSnap.val() || {};
        
        peliculasLista = Object.values(pData);
        seriesLista = Object.values(sData);
        peliculasKeys = Object.keys(pData);
        seriesKeys = Object.keys(sData);
        
        if (!peliculasLista.length && !seriesLista.length) {
            container.innerHTML = `
                <div style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.15);border-radius:6px;padding:.5rem;text-align:center;">
                    <p style="color:#F59E0B;font-size:.8rem;">📭 No hay contenido</p>
                    <button onclick="generarPeliculas()" style="margin-top:.3rem;padding:.2rem .8rem;background:#7C3AED;border:none;border-radius:4px;color:#fff;cursor:pointer;font-size:.7rem;">
                        <i class="fas fa-wand-magic-sparkles"></i> Generar
                    </button>
                </div>
            `;
            document.getElementById('paginacionContainer').style.display = 'none';
            return;
        }
        
        container.innerHTML = '';
        
        // PELÍCULAS
        if (peliculasLista.length) {
            const div = document.createElement('div');
            div.innerHTML = `<div style="font-weight:700;color:#A78BFA;font-size:.7rem;margin:.2rem 0;">🎬 Películas (${peliculasLista.length})</div>`;
            
            peliculasLista.forEach((p, index) => {
                const key = peliculasKeys[index];
                const portada = p.portada || 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg';
                const urlOp1 = p.url || 'Sin enlace';
                const urlOp2 = p.opcion2 || '';
                
                const item = document.createElement('div');
                item.className = 'admin-item';
                item.id = `item-${key}`;
                item.dataset.titulo = p.titulo;
                item.dataset.tipo = 'pelicula';
                item.style.borderLeftColor = '#10B981';
                
                item.innerHTML = `
                    <img src="${portada}" class="thumbnail" loading="lazy" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg'">
                    <div class="info-item">
                        <div class="title">${p.titulo} <span class="badge-tipo pelicula">🎬</span></div>
                        <div class="meta">${p.anio || 'N/D'} • ⭐ ${p.puntuacion || 'N/A'}</div>
                        <div class="enlace op1" title="${urlOp1}">🔗 ${urlOp1}</div>
                        ${urlOp2 ? `<div class="enlace op2" title="${urlOp2}">🔗 ${urlOp2}</div>` : ''}
                    </div>
                    <div class="actions">
                        <button class="admin-btn admin-btn-blue" onclick="editarEnlace('${key}', 'pelicula', 'url')"><i class="fas fa-pen"></i></button>
                        ${urlOp2 ? `<button class="admin-btn admin-btn-purple" onclick="editarEnlace('${key}', 'pelicula', 'opcion2')"><i class="fas fa-pen"></i></button>` : `<button class="admin-btn admin-btn-purple" onclick="agregarOpcion2('${key}', 'pelicula', '${p.tmdb_id}')"><i class="fas fa-plus"></i></button>`}
                        <button class="admin-btn admin-btn-danger" onclick="eliminarItem('${key}', 'pelicula')"><i class="fas fa-trash"></i></button>
                    </div>
                `;
                div.appendChild(item);
            });
            container.appendChild(div);
        }
        
        // SERIES
        if (seriesLista.length) {
            const div = document.createElement('div');
            div.innerHTML = `<div style="font-weight:700;color:#34D399;font-size:.7rem;margin:.3rem 0 .2rem;">📺 Series (${seriesLista.length})</div>`;
            
            seriesLista.forEach((s, index) => {
                const key = seriesKeys[index];
                const capsCount = s.temporadas ? s.temporadas.reduce((sum, t) => sum + (t.capitulos ? t.capitulos.length : 0), 0) : 0;
                const isExpanded = seriesExpandidas[key] || false;
                const portada = s.portada || 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg';
                const urlOp1 = s.url || 'Sin enlace';
                const urlOp2 = s.opcion2 || '';
                
                const item = document.createElement('div');
                item.className = 'admin-item serie-expandida';
                item.id = `item-${key}`;
                item.dataset.titulo = s.titulo;
                item.dataset.tipo = 'serie';
                item.style.borderLeftColor = '#34D399';
                
                let capitulosHTML = '';
                if (s.temporadas && s.temporadas.length) {
                    s.temporadas.forEach((temp, tempIdx) => {
                        capitulosHTML += `<div class="temporada-titulo">📺 Temporada ${temp.numero || tempIdx + 1}</div>`;
                        if (temp.capitulos && temp.capitulos.length) {
                            temp.capitulos.forEach((cap, capIdx) => {
                                const capUrl = cap.url || 'Sin enlace';
                                const capOp2 = cap.opcion2 || '';
                                capitulosHTML += `
                                    <div class="capitulo-detalle">
                                        <div class="cap-titulo">Cap ${cap.numero || capIdx + 1}: ${cap.titulo || 'Sin título'}</div>
                                        <div style="display:flex;gap:.2rem;flex-wrap:wrap;margin-top:.05rem;">
                                            <span style="color:#34D399;font-size:.45rem;">▶</span>
                                            <span id="cap-display-${key}-${tempIdx}-${capIdx}" style="font-size:.45rem;color:#34D399;word-break:break-all;">${capUrl}</span>
                                            <input class="edit-input" id="cap-input-${key}-${tempIdx}-${capIdx}" value="${capUrl}" style="display:none;width:60px;font-size:.4rem;">
                                            <button class="admin-btn admin-btn-blue" style="padding:.02rem .2rem;font-size:.35rem;" onclick="editarCapituloSerie('${key}', ${tempIdx}, ${capIdx})"><i class="fas fa-pen"></i></button>
                                            <button class="admin-btn admin-btn-green" id="cap-save-${key}-${tempIdx}-${capIdx}" style="display:none;padding:.02rem .2rem;font-size:.35rem;" onclick="guardarCapituloSerie('${key}', ${tempIdx}, ${capIdx})"><i class="fas fa-check"></i></button>
                                        </div>
                                        ${capOp2 ? `
                                        <div style="display:flex;gap:.2rem;flex-wrap:wrap;margin-top:.05rem;">
                                            <span style="color:#3B82F6;font-size:.45rem;">▶ Op2</span>
                                            <span id="cap-op2-display-${key}-${tempIdx}-${capIdx}" style="font-size:.45rem;color:#60A5FA;word-break:break-all;">${capOp2}</span>
                                            <input class="edit-input" id="cap-op2-input-${key}-${tempIdx}-${capIdx}" value="${capOp2}" style="display:none;width:60px;font-size:.4rem;">
                                            <button class="admin-btn admin-btn-purple" style="padding:.02rem .2rem;font-size:.35rem;" onclick="editarCapituloSerieOp2('${key}', ${tempIdx}, ${capIdx})"><i class="fas fa-pen"></i></button>
                                            <button class="admin-btn admin-btn-green" id="cap-op2-save-${key}-${tempIdx}-${capIdx}" style="display:none;padding:.02rem .2rem;font-size:.35rem;" onclick="guardarCapituloSerieOp2('${key}', ${tempIdx}, ${capIdx})"><i class="fas fa-check"></i></button>
                                        </div>
                                        ` : ''}
                                    </div>
                                `;
                            });
                        }
                    });
                }
                
                item.innerHTML = `
                    <img src="${portada}" class="thumbnail" loading="lazy" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg'">
                    <div class="info-item">
                        <div class="title">${s.titulo} <span class="badge-tipo serie">📺</span></div>
                        <div class="meta">${s.anio || 'N/D'} • ${s.temporadas?.length || 0} temps • ${capsCount} caps</div>
                        <div class="enlace op1" title="${urlOp1}">🔗 ${urlOp1}</div>
                        ${urlOp2 ? `<div class="enlace op2" title="${urlOp2}">🔗 ${urlOp2}</div>` : ''}
                    </div>
                    <div class="actions">
                        <button class="admin-btn admin-btn-blue" onclick="editarEnlace('${key}', 'serie', 'url')"><i class="fas fa-pen"></i></button>
                        ${urlOp2 ? `<button class="admin-btn admin-btn-purple" onclick="editarEnlace('${key}', 'serie', 'opcion2')"><i class="fas fa-pen"></i></button>` : `<button class="admin-btn admin-btn-purple" onclick="agregarOpcion2('${key}', 'serie', '${s.tmdb_id}')"><i class="fas fa-plus"></i></button>`}
                        <button class="toggle-series-btn" id="toggle-btn-${key}" onclick="toggleSerie('${key}')">
                            <i class="fas fa-chevron-${isExpanded ? 'up' : 'down'}"></i>
                        </button>
                        <button class="admin-btn admin-btn-danger" onclick="eliminarItem('${key}', 'serie')"><i class="fas fa-trash"></i></button>
                    </div>
                    <div id="serie-detalle-${key}" style="display:${isExpanded ? 'block' : 'none'};margin-top:.2rem;background:rgba(255,255,255,.02);border-radius:4px;padding:.1rem;">
                        ${capitulosHTML}
                    </div>
                `;
                div.appendChild(item);
            });
            container.appendChild(div);
        }
        
        paginaActual = 1;
        mostrarPagina();
        
    } catch(e) {
        console.error('❌ Error:', e);
        container.innerHTML = `
            <div style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);border-radius:6px;padding:.5rem;text-align:center;">
                <p style="color:#EF4444;font-size:.8rem;">❌ Error al cargar</p>
                <button onclick="cargarContenido()" style="margin-top:.3rem;padding:.2rem .8rem;background:#7C3AED;border:none;border-radius:4px;color:#fff;cursor:pointer;font-size:.7rem;">
                    <i class="fas fa-refresh"></i> Reintentar
                </button>
            </div>
        `;
    }
};

window.eliminarItem = async function(key, tipo) {
    if (!confirm(`¿Eliminar este ${tipo}?`)) return;
    try {
        const path = tipo === 'pelicula' ? RUTA_PELICULAS : RUTA_SERIES;
        await db.ref(`${path}/${key}`).remove();
        mostrarToast(`🗑️ ${tipo} eliminado`, 'warning');
        cargarContenido();
    } catch(e) {
        mostrarToast('❌ Error: ' + e.message, 'error');
    }
};
