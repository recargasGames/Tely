<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - TELY 🎬</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        fondo: '#0F172A',
                        tarjeta: '#1E293B',
                        acento: '#60A5FA',
                        alerta: '#EF4444',
                        exito: '#10B981'
                    }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0F172A; color: #F8FAFC; font-family: 'Segoe UI', Roboto, sans-serif; min-height: 100vh; padding: 1rem; }
        .form-group { margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input, select, textarea { width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid #334155; background: #1E293B; color: #F8FAFC; font-size: 1rem; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #60A5FA; box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.2); }
        .btn { padding: 0.9rem 1.5rem; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-guardar { background: #10B981; color: white; }
        .btn-guardar:hover { background: #059669; }
        .btn-limpiar { background: #475569; color: white; }
        .btn-limpiar:hover { background: #334155; }
        .btn-eliminar { background: #EF4444; color: white; }
        .opcion { display: flex; gap: 0.8rem; align-items: center; margin-bottom: 0.8rem; }
        .opcion input { flex: 1; }
        .oculto { display: none !important; }
    </style>
</head>
<body class="dark">
    <div class="max-w-3xl mx-auto">
        <header class="mb-6 pb-4 border-b border-gray-700">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <i class="fa fa-film"></i> Panel de Administración TELY
            </h1>
            <p class="text-gray-400 mt-1">Agrega, edita o elimina contenido personalizado</p>
        </header>

        <form id="formulario" class="bg-tarjeta p-5 rounded-xl shadow-lg mb-8" data-id="">
            <div class="form-group">
                <label>Título</label>
                <input type="text" id="titulo" required placeholder="Ej: John Wick">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="form-group">
                    <label>Año</label>
                    <input type="text" id="anio" placeholder="Ej: 2014">
                </div>
                <div class="form-group">
                    <label>Tipo</label>
                    <select id="tipo">
                        <option value="pelicula">Película</option>
                        <option value="serie">Serie</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>URL de Portada / Imagen</label>
                <input type="text" id="portada" placeholder="Ej: https://dominio.com/imagen.png o john-wick.png">
            </div>

            <div class="form-group">
                <label>Sinopsis</label>
                <textarea id="sinopsis" rows="3" placeholder="Breve descripción del contenido..."></textarea>
            </div>

            <div class="form-group">
                <label>ID de TMDB (opcional)</label>
                <input type="text" id="tmdb_id" placeholder="Para vincular con datos automáticos">
            </div>

            <div class="form-group">
                <label>Opciones de reproducción</label>
                <div id="contenedor-opciones">
                    <div class="opcion">
                        <input type="text" class="nombre-opcion" placeholder="Nombre ej: Opción 1">
                        <input type="url" class="url-opcion" placeholder="Enlace de video">
                        <button type="button" class="text-alerta text-xl" onclick="eliminarOpcion(this)"><i class="fa fa-times"></i></button>
                    </div>
                </div>
                <button type="button" onclick="agregarOpcion()" class="text-acento mt-2 text-sm">
                    <i class="fa fa-plus mr-1"></i> Agregar otra opción
                </button>
            </div>

            <div class="flex gap-3 mt-6">
                <button type="submit" class="btn btn-guardar flex items-center gap-2">
                    <i class="fa fa-save"></i> Guardar contenido
                </button>
                <button type="button" onclick="limpiarFormulario()" class="btn btn-limpiar flex items-center gap-2">
                    <i class="fa fa-refresh"></i> Limpiar
                </button>
            </div>
        </form>

        <div class="bg-tarjeta p-5 rounded-xl shadow-lg">
            <h2 class="text-xl font-semibold mb-4 flex items-center gap-2">
                <i class="fa fa-list"></i> Contenido Guardado
            </h2>
            <div id="lista-contenido-propio"></div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

    <script>
        // Configuración de Firebase (la misma que usas en tu app)
        const firebaseConfig = {
            apiKey: "AIzaSyCYetRSA0nsZsGiqABbTtjq-5a4bz5-oDk",
            authDomain: "tely-675c0.firebaseapp.com",
            databaseURL: "https://tely-675c0-default-rtdb.firebaseio.com",
            projectId: "tely-675c0",
            storageBucket: "tely-675c0.appspot.com",
            messagingSenderId: "375009551428",
            appId: "1:375009551428:web:33846891b7641f97a20811"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ✅ FUNCIÓN QUE FALTABA (causaba el error)
        function listarContenidoPropio() {
            const contenedor = document.getElementById("lista-contenido-propio");
            contenedor.innerHTML = "<p class='text-gray-400 text-center py-6'>Cargando contenido...</p>";

            db.ref("contenido_personalizado").once("value")
                .then(snapshot => {
                    const datos = snapshot.val();
                    contenedor.innerHTML = "";

                    if (!datos) {
                        contenedor.innerHTML = "<p class='text-gray-400 text-center py-6'>Aún no hay contenido guardado</p>";
                        return;
                    }

                    Object.entries(datos).forEach(([id, item]) => {
                        const tarjeta = document.createElement("div");
                        tarjeta.className = "bg-gray-800 p-4 rounded-lg mb-3 flex flex-wrap justify-between items-center gap-3";
                        tarjeta.innerHTML = `
                            <div>
                                <h3 class="font-bold text-lg">${item.titulo || "Sin título"}</h3>
                                <p class="text-gray-300 text-sm">${item.tipo === "pelicula" ? "Película" : "Serie"} • ${item.anio || "N/D"}</p>
                                <p class="text-gray-400 text-xs mt-1">ID TMDB: ${item.tmdb_id || "No asignado"}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="cargarParaEditar('${id}')" class="text-acento p-2 rounded hover:bg-gray-700" title="Editar">
                                    <i class="fa fa-pen"></i>
                                </button>
                                <button onclick="eliminarContenido('${id}')" class="text-alerta p-2 rounded hover:bg-gray-700" title="Eliminar">
                                    <i class="fa fa-trash"></i>
                                </button>
                            </div>
                        `;
                        contenedor.appendChild(tarjeta);
                    });
                })
                .catch(err => {
                    contenedor.innerHTML = `<p class="text-alerta text-center py-4">Error: ${err.message}</p>`;
                });
        }

        // Funciones auxiliares
        function agregarOpcion() {
            const contenedor = document.getElementById("contenedor-opciones");
            const nueva = document.createElement("div");
            nueva.className = "opcion";
            nueva.innerHTML = `
                <input type="text" class="nombre-opcion" placeholder="Nombre ej: Opción 2">
                <input type="url" class="url-opcion" placeholder="Enlace de video">
                <button type="button" class="text-alerta text-xl" onclick="eliminarOpcion(this)"><i class="fa fa-times"></i></button>
            `;
            contenedor.appendChild(nueva);
        }

        function eliminarOpcion(boton) {
            boton.parentElement.remove();
        }

        function limpiarFormulario() {
            document.getElementById("formulario").reset();
            document.getElementById("formulario").dataset.id = "";
            document.getElementById("contenedor-opciones").innerHTML = `
                <div class="opcion">
                    <input type="text" class="nombre-opcion" placeholder="Nombre ej: Opción 1">
                    <input type="url" class="url-opcion" placeholder="Enlace de video">
                    <button type="button" class="text-alerta text-xl" onclick="eliminarOpcion(this)"><i class="fa fa-times"></i></button>
                </div>
            `;
        }

        function cargarParaEditar(id) {
            db.ref(`contenido_personalizado/${id}`).once("value")
                .then(snap => {
                    const item = snap.val();
                    if (!item) return;

                    document.getElementById("formulario").dataset.id = id;
                    document.getElementById("titulo").value = item.titulo || "";
                    document.getElementById("anio").value = item.anio || "";
                    document.getElementById("tipo").value = item.tipo || "pelicula";
                    document.getElementById("portada").value = item.portada || "";
                    document.getElementById("sinopsis").value = item.sinopsis || "";
                    document.getElementById("tmdb_id").value = item.tmdb_id || "";

                    const contenedor = document.getElementById("contenedor-opciones");
                    contenedor.innerHTML = "";
                    if (item.opciones && item.opciones.length > 0) {
                        item.opciones.forEach(op => {
                            const div = document.createElement("div");
                            div.className = "opcion";
                            div.innerHTML = `
                                <input type="text" class="nombre-opcion" value="${op.nombre || ""}" placeholder="Nombre">
                                <input type="url" class="url-opcion" value="${op.url || ""}" placeholder="Enlace">
                                <button type="button" class="text-alerta text-xl" onclick="eliminarOpcion(this)"><i class="fa fa-times"></i></button>
                            `;
                            contenedor.appendChild(div);
                        });
                    } else {
                        agregarOpcion();
                    }

                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
        }

        function eliminarContenido(id) {
            if (!confirm("¿Seguro que quieres eliminar este contenido? No se puede deshacer.")) return;
            db.ref(`contenido_personalizado/${id}`).remove()
                .then(() => {
                    listarContenidoPropio();
                    alert("Contenido eliminado correctamente");
                })
                .catch(err => alert("Error al eliminar: " + err.message));
        }

        // Guardar al enviar el formulario
        document.getElementById("formulario").addEventListener("submit", function(e) {
            e.preventDefault();

            const opciones = [];
            document.querySelectorAll(".opcion").forEach(op => {
                const nombre = op.querySelector(".nombre-opcion").value.trim();
                const url = op.querySelector(".url-opcion").value.trim();
                if (nombre && url) opciones.push({ nombre, url });
            });

            const datos = {
                titulo: document.getElementById("titulo").value.trim(),
                anio: document.getElementById("anio").value.trim(),
                tipo: document.getElementById("tipo").value,
                categoria: document.getElementById("tipo").value === "pelicula" ? "peliculas" : "series",
                portada: document.getElementById("portada").value.trim(),
                sinopsis: document.getElementById("sinopsis").value.trim(),
                tmdb_id: document.getElementById("tmdb_id").value.trim() || null,
                opciones: opciones,
                fecha_creacion: new Date().toISOString()
            };

            const idActual = this.dataset.id;
            const ref = idActual ? db.ref(`contenido_personalizado/${idActual}`) : db.ref("contenido_personalizado").push();

            ref.set(datos)
                .then(() => {
                    limpiarFormulario();
                    listarContenidoPropio();
                    alert("✅ Contenido guardado correctamente");
                })
                .catch(err => alert("❌ Error al guardar: " + err.message));
        });

        // Cargar lista al abrir la página
        window.onload = listarContenidoPropio;
    </script>
</body>
</html>
