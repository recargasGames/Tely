<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TELY 🎬 - Admin</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="apple-touch-icon" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;background:#0A0A0F}
        body{background:#0A0A0F;color:#fff;font-family:'Segoe UI',Roboto,sans-serif;min-height:100vh;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
        ::-webkit-scrollbar{display:none}
        
        .main-content{width:100%;height:100vh;padding:.3rem .5rem;overflow-y:auto;margin:0 auto;max-width:600px}
        
        .header-flotante{
            position:sticky;
            top:0;
            z-index:50;
            background:rgba(10,10,15,.92);
            backdrop-filter:blur(12px);
            padding:.3rem .3rem .4rem;
            border-bottom:1px solid rgba(124,58,237,.1);
        }
        
        .top-header{display:flex;justify-content:space-between;align-items:center;padding:.1rem 0 .2rem;flex-wrap:wrap;gap:.3rem}
        .top-header h1{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,#7C3AED,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .top-actions{display:flex;align-items:center;gap:.5rem}
        
        .theme-btn{background:rgba(255,255,255,.05);border:none;color:#fff;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:1.1rem;transition:.3s;display:flex;align-items:center;justify-content:center}
        .theme-btn:hover{background:rgba(255,255,255,.1)}
        
        .back-btn{background:rgba(255,255,255,.05);border:none;color:#94A3B8;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:1.1rem;transition:.3s;display:flex;align-items:center;justify-content:center}
        .back-btn:hover{background:rgba(255,255,255,.1)}
        
        .admin-card{background:rgba(255,255,255,.04);border-radius:12px;padding:1.5rem;border:1px solid rgba(124,58,237,.1);max-width:500px;margin:1rem auto}
        body:not(.dark) .admin-card{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.08)}
        
        .admin-card h2{font-size:1.1rem;font-weight:700;margin-bottom:.2rem;text-align:center}
        .admin-card .sub{color:#94A3B8;font-size:.75rem;text-align:center;margin-bottom:.6rem}
        
        .campo{margin-bottom:.4rem}
        .campo label{display:block;font-size:.65rem;font-weight:600;color:#94A3B8;margin-bottom:.1rem}
        .campo input,.campo select,.campo textarea{width:100%;padding:.3rem .6rem;border-radius:8px;border:2px solid rgba(124,58,237,.2);background:rgba(255,255,255,.05);color:#fff;font-size:.75rem;transition:.3s}
        .campo input:focus,.campo select:focus,.campo textarea:focus{outline:none;border-color:#7C3AED}
        .campo textarea{min-height:40px;resize:vertical}
        body:not(.dark) .campo input,body:not(.dark) .campo select,body:not(.dark) .campo textarea{background:rgba(0,0,0,.05);color:#111;border-color:rgba(0,0,0,.1)}
        body:not(.dark) .campo label{color:#555}
        
        .btn-guardar{background:#7C3AED;color:#fff;padding:.4rem 1.2rem;border-radius:8px;font-weight:600;border:none;cursor:pointer;transition:.3s;font-size:.75rem;width:100%}
        .btn-guardar:hover{background:#6D28D9}
        .btn-guardar:disabled{opacity:.5;cursor:not-allowed}
        
        .btn-cancelar{background:rgba(255,255,255,.05);color:#94A3B8;padding:.4rem 1.2rem;border-radius:8px;font-weight:600;border:none;cursor:pointer;transition:.3s;font-size:.75rem}
        .btn-cancelar:hover{background:rgba(255,255,255,.1)}
        body:not(.dark) .btn-cancelar{background:rgba(0,0,0,.05);color:#555}
        
        .btn-eliminar{background:rgba(239,68,68,.15);color:#EF4444;padding:.3rem .8rem;border-radius:6px;font-weight:600;border:1px solid rgba(239,68,68,.2);cursor:pointer;transition:.3s;font-size:.65rem}
        .btn-eliminar:hover{background:rgba(239,68,68,.25)}
        
        .lista-contenido{max-height:300px;overflow-y:auto;margin-top:.3rem}
        .item-admin{background:rgba(255,255,255,.03);border-radius:8px;padding:.4rem .6rem;margin:.2rem 0;border-left:3px solid #7C3AED;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.2rem}
        body:not(.dark) .item-admin{background:rgba(0,0,0,.02)}
        .item-admin .info{flex:1;min-width:0}
        .item-admin .info .titulo{font-weight:600;font-size:.75rem}
        .item-admin .info .detalles{font-size:.55rem;color:#94A3B8}
        .item-admin .info .detalles .op2{color:#60A5FA}
        .item-admin .acciones{display:flex;gap:.2rem;flex-shrink:0}
        .item-admin .acciones button{background:none;border:none;color:#94A3B8;padding:.05rem .3rem;border-radius:4px;font-size:.55rem;cursor:pointer;transition:.2s}
        .item-admin .acciones .edit-btn{color:#F59E0B}
        .item-admin .acciones .edit-btn:hover{background:rgba(245,158,11,.15)}
        .item-admin .acciones .delete-btn{color:#EF4444}
        .item-admin .acciones .delete-btn:hover{background:rgba(239,68,68,.15)}
        
        .badge-op2{display:inline-block;background:rgba(59,130,246,.15);color:#60A5FA;padding:.02rem .3rem;border-radius:4px;font-size:.45rem;font-weight:600;margin-left:.2rem}
        
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:none;align-items:center;justify-content:center;padding:1rem}
        .modal-overlay.show{display:flex}
        .modal-box{background:#1A1A2E;border-radius:12px;padding:1.2rem;max-width:400px;width:100%;border:1px solid rgba(124,58,237,.12);max-height:90vh;overflow-y:auto}
        body:not(.dark) .modal-box{background:#fff;border-color:rgba(0,0,0,.08)}
        .modal-box h2{font-size:1.1rem;font-weight:700;margin-bottom:.2rem;text-align:center}
        .modal-actions{display:flex;gap:.4rem;justify-content:center;flex-wrap:wrap;margin-top:.3rem}
        .modal-actions .btn-confirmar{background:#EF4444;color:#fff;padding:.4rem 1.2rem;border-radius:8px;font-weight:600;border:none;cursor:pointer;transition:.3s;font-size:.75rem}
        .modal-actions .btn-confirmar:hover{background:#DC2626}
        
        .loading-spinner{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;color:#94A3B8;gap:.3rem}
        .loading-spinner i{font-size:1.5rem;color:#7C3AED;animation:spin 1s linear infinite}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        
        #bannerApp{display:none;position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#1A1A2E,#2D2D44);border-top:2px solid #7C3AED;padding:.4rem .6rem;z-index:9999;box-shadow:0 -4px 30px rgba(124,58,237,.3);animation:slideUp 0.5s ease-out}
        @keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
        body.banner-activo{padding-bottom:60px}
        .banner-logo-img{width:28px;height:28px;border-radius:6px;object-fit:cover;background:#1A1A2E}
        .banner-install-btn{background:linear-gradient(135deg,#7C3AED,#A78BFA);border:none;color:#fff;padding:.25rem .7rem;border-radius:6px;font-weight:600;font-size:.65rem;cursor:pointer;transition:.3s;white-space:nowrap;display:flex;align-items:center;gap:.2rem}
        .banner-install-btn:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(124,58,237,.4)}
        
        .lista-contenido::-webkit-scrollbar{width:3px}
        .lista-contenido::-webkit-scrollbar-track{background:rgba(255,255,255,.02)}
        .lista-contenido::-webkit-scrollbar-thumb{background:#7C3AED;border-radius:10px}
    </style>
</head>
<body>

<main class="main-content">
    <div class="header-flotante">
        <div class="top-header">
            <h1><i class="fas fa-crown"></i> Admin</h1>
            <div class="top-actions">
                <button class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i></button>
                <button class="theme-btn" onclick="toggleTheme()" id="themeBtn"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </div>

    <div class="admin-card">
        <h2><i class="fas fa-plus-circle" style="color:#7C3AED;"></i> Agregar contenido</h2>
        <p class="sub" id="subAdmin">Agrega películas o series con sus opciones</p>
        
        <form id="formAdmin" onsubmit="event.preventDefault(); guardarContenido()">
            <div class="campo">
                <label>📌 Tipo *</label>
                <select id="adminTipo" required>
                    <option value="pelicula">🎬 Película</option>
                    <option value="serie">📺 Serie</option>
                </select>
            </div>
            <div class="campo">
                <label>📝 Título *</label>
                <input type="text" id="adminTitulo" placeholder="Ej: El Señor de los Anillos" required>
            </div>
            <div class="campo">
                <label>📅 Año</label>
                <input type="number" id="adminAnio" placeholder="Ej: 2024" min="1900" max="2100">
            </div>
            <div class="campo">
                <label>📖 Sinopsis</label>
                <textarea id="adminSinopsis" placeholder="Describe de qué trata..."></textarea>
            </div>
            <div class="campo">
                <label>⭐ Puntuación</label>
                <input type="number" id="adminPuntuacion" placeholder="Ej: 8.5" min="0" max="10" step="0.1">
            </div>
            <div class="campo">
                <label>🎭 Género</label>
                <input type="text" id="adminGenero" placeholder="Ej: Acción, Aventura">
            </div>
            <div class="campo">
                <label>🖼️ URL de portada</label>
                <input type="text" id="adminPortada" placeholder="https://image.tmdb.org/t/p/w342/...">
            </div>
            
            <hr style="border-color:rgba(124,58,237,.1);margin:.3rem 0;">
            
            <div class="campo">
                <label>🔗 Opción 1 (Link principal) *</label>
                <input type="text" id="adminUrl" placeholder="https://unlimplay.com/play/embed/movie/..." required>
            </div>
            
            <!-- ✅ OPCIÓN 2 - VALIDADA -->
            <div class="campo">
                <label>🔗 Opción 2 <span style="color:#60A5FA;font-weight:400;">(opcional - solo si tienes enlace)</span></label>
                <input type="text" id="adminOp2" placeholder="https://vidsrc.in/embed/movie/... o déjalo vacío">
                <div style="font-size:.5rem;color:#64748B;margin-top:.05rem;">
                    <i class="fas fa-info-circle"></i> Si no pones nada, la Opción 2 no aparecerá en el reproductor
                </div>
            </div>
            
            <div style="margin-top:.4rem;">
                <button type="submit" class="btn-guardar" id="btnGuardar"><i class="fas fa-save"></i> Guardar contenido</button>
            </div>
        </form>
    </div>

    <div class="admin-card">
        <h2><i class="fas fa-list" style="color:#F59E0B;"></i> Contenido agregado</h2>
        <p class="sub" id="subLista">Aquí aparecen las películas y series que has agregado</p>
        <div class="lista-contenido" id="listaContenido">
            <div class="loading-spinner"><i class="fas fa-spinner"></i> Cargando...</div>
        </div>
    </div>
</main>

<!-- MODAL CONFIRMAR ELIMINACIÓN -->
<div class="modal-overlay" id="modalEliminar">
    <div class="modal-box">
        <h2><i class="fas fa-exclamation-triangle" style="color:#EF4444;"></i> ¿Eliminar?</h2>
        <p style="color:#94A3B8;font-size:.75rem;text-align:center;margin:.2rem 0;">¿Estás seguro de eliminar "<span id="eliminarTitulo"></span>"?</p>
        <div class="modal-actions">
            <button class="btn-confirmar" onclick="confirmarEliminar()"><i class="fas fa-trash"></i> Eliminar</button>
            <button class="btn-cancelar" onclick="cerrarModalEliminar()"><i class="fas fa-times"></i> Cancelar</button>
        </div>
    </div>
</div>

<div id="bannerApp">
    <div style="display:flex;align-items:center;justify-content:space-between;max-width:600px;margin:0 auto;gap:0.4rem;">
        <div style="display:flex;align-items:center;gap:0.3rem;flex:1;">
            <img src="logo.png" alt="TELY" class="banner-logo-img" onerror="this.style.display='none'">
            <div>
                <div class="banner-titulo" style="font-weight:700;font-size:.75rem;color:#fff;">📱 TELY App</div>
                <div class="banner-sub" style="font-size:.6rem;color:#94A3B8;">Descarga la app</div>
            </div>
        </div>
        <div style="display:flex;gap:0.3rem;flex-shrink:0;">
            <button onclick="descargarAPK()" style="background:#7C3AED;border:none;color:#fff;padding:.25rem .7rem;border-radius:6px;font-weight:600;font-size:.65rem;cursor:pointer;transition:.3s;white-space:nowrap;">
                <i class="fas fa-download"></i> APK
            </button>
            <button onclick="cerrarBannerApp()" style="background:rgba(255,255,255,.1);border:none;color:#94A3B8;padding:.2rem .4rem;border-radius:6px;font-size:.65rem;cursor:pointer;transition:.3s;">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
// ============================================================
//  CONFIGURACIÓN FIREBASE
// ============================================================
const firebaseConfig = {
    apiKey: "AIzaSyBPBDEVUR7hjNrxCYrefF9Sbl0Wofp3VoQ",
    authDomain: "telyx-23210.firebaseapp.com",
    projectId: "telyx-23210",
    storageBucket: "telyx-23210.firebasestorage.app",
    messagingSenderId: "10164285015",
    appId: "1:10164285015:web:5cf32bd2831de126c67d12",
    measurementId: "G-0YEZMJYMJS"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ============================================================
//  VERIFICAR AUTENTICACIÓN (SOLO ADMIN)
// ============================================================
auth.onAuthStateChanged(user => {
    if (!user) {
        window.location.href = 'login.html';
        return;
    }
    // Verificar si es admin
    db.ref('admins').child(user.uid).once('value').then(snap => {
        if (!snap.exists()) {
            alert('⛔ No tienes permisos de administrador');
            window.location.href = 'index.html';
            return;
        }
        cargarLista();
    });
});

// ============================================================
//  VARIABLES
// ============================================================
let editandoId = null;
let eliminarId = null;

// ============================================================
//  TEMA
// ============================================================
function toggleTheme() {
    const body = document.body;
    const btn = document.getElementById('themeBtn');
    if (body.classList.contains('dark')) { 
        body.classList.remove('dark'); 
        btn.innerHTML = '<i class="fas fa-moon"></i>'; 
        localStorage.setItem('theme', 'light'); 
    } else { 
        body.classList.add('dark'); 
        btn.innerHTML = '<i class="fas fa-sun"></i>'; 
        localStorage.setItem('theme', 'dark'); 
    }
}
if (localStorage.getItem('theme') === 'light') { 
    document.body.classList.remove('dark'); 
    document.getElementById('themeBtn').innerHTML = '<i class="fas fa-moon"></i>'; 
} else { 
    document.body.classList.add('dark'); 
    document.getElementById('themeBtn').innerHTML = '<i class="fas fa-sun"></i>'; 
}

// ============================================================
//  MOSTRAR TOAST
// ============================================================
function mostrarToast(msg, tipo = 'success') {
    const colores = { success: '#10B981', warning: '#F59E0B', error: '#EF4444', info: '#3B82F6' };
    const t = document.createElement('div');
    t.style.cssText = `position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:${colores[tipo] || '#10B981'};color:#fff;padding:6px 14px;border-radius:8px;z-index:9999;font-weight:600;font-size:.7rem;max-width:90%;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:opacity 0.3s;`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2000);
}

// ============================================================
//  VALIDAR URL
// ============================================================
function esUrlValida(url) {
    if (!url || url.trim() === '') return false;
    try {
        new URL(url);
        return true;
    } catch(e) {
        return false;
    }
}

// ============================================================
//  GUARDAR CONTENIDO (OPTIMIZADO - SIN LAG)
// ============================================================
function guardarContenido() {
    const btn = document.getElementById('btnGuardar');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Guardando...';
    
    const tipo = document.getElementById('adminTipo').value;
    const titulo = document.getElementById('adminTitulo').value.trim();
    const anio = document.getElementById('adminAnio').value || 'N/D';
    const sinopsis = document.getElementById('adminSinopsis').value || 'Sin sinopsis';
    const puntuacion = document.getElementById('adminPuntuacion').value || 'N/A';
    const genero = document.getElementById('adminGenero').value || (tipo === 'pelicula' ? 'Película' : 'Serie');
    const portada = document.getElementById('adminPortada').value || '';
    const url = document.getElementById('adminUrl').value.trim();
    const opcion2 = document.getElementById('adminOp2').value.trim();
    
    // Validar título
    if (!titulo) {
        mostrarToast('❌ El título es obligatorio', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save"></i> Guardar contenido';
        return;
    }
    
    // Validar URL principal
    if (!esUrlValida(url)) {
        mostrarToast('❌ La Opción 1 debe ser una URL válida', 'error');
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-save"></i> Guardar contenido';
        return;
    }
    
    // ✅ Validar Opción 2: solo guardar si es una URL válida
    let opcion2Guardar = '';
    if (opcion2 && esUrlValida(opcion2)) {
        opcion2Guardar = opcion2;
    }
    
    const data = {
        tipo: tipo,
        titulo: titulo,
        anio: anio,
        sinopsis: sinopsis,
        puntuacion: puntuacion,
        genero: genero,
        portada: portada || `https://ui-avatars.com/api/?name=${encodeURIComponent(titulo)}&background=7C3AED&color=fff&size=300`,
        url: url,
        opcion2: opcion2Guardar, // ✅ Solo se guarda si tiene URL válida
        fecha: new Date().toISOString()
    };
    
    const path = tipo === 'pelicula' ? 'contenido_personalizado' : 'series_personalizadas';
    const ref = db.ref(path);
    
    if (editandoId) {
        // Actualizar
        ref.child(editandoId).update(data).then(() => {
            mostrarToast('✅ Contenido actualizado correctamente', 'success');
            resetearFormulario();
            cargarLista();
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save"></i> Guardar contenido';
        }).catch((e) => {
            mostrarToast('❌ Error: ' + e.message, 'error');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save"></i> Guardar contenido';
        });
    } else {
        // Nuevo
        ref.push(data).then(() => {
            mostrarToast('✅ Contenido agregado correctamente', 'success');
            resetearFormulario();
            cargarLista();
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save"></i> Guardar contenido';
        }).catch((e) => {
            mostrarToast('❌ Error: ' + e.message, 'error');
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save"></i> Guardar contenido';
        });
    }
}

// ============================================================
//  RESETEAR FORMULARIO
// ============================================================
function resetearFormulario() {
    editandoId = null;
    document.getElementById('formAdmin').reset();
    document.getElementById('adminTipo').value = 'pelicula';
    document.getElementById('subAdmin').textContent = 'Agrega películas o series con sus opciones';
    document.getElementById('btnGuardar').innerHTML = '<i class="fas fa-save"></i> Guardar contenido';
}

// ============================================================
//  CARGAR LISTA DE CONTENIDO
// ============================================================
function cargarLista() {
    const container = document.getElementById('listaContenido');
    const sub = document.getElementById('subLista');
    container.innerHTML = '<div class="loading-spinner"><i class="fas fa-spinner"></i> Cargando...</div>';
    
    Promise.all([
        db.ref('contenido_personalizado').once('value'),
        db.ref('series_personalizadas').once('value')
    ]).then(([pelisSnap, seriesSnap]) => {
        const pelis = pelisSnap.val() || {};
        const series = seriesSnap.val() || {};
        const items = [];
        
        Object.keys(pelis).forEach(key => {
            items.push({ id: key, ...pelis[key], tipo: 'pelicula' });
        });
        Object.keys(series).forEach(key => {
            items.push({ id: key, ...series[key], tipo: 'serie' });
        });
        
        if (!items.length) {
            container.innerHTML = '<div class="item-admin" style="justify-content:center;color:#64748B;font-size:.7rem;">No hay contenido agregado</div>';
            sub.textContent = 'Agrega tu primera película o serie';
            return;
        }
        
        sub.textContent = `Total: ${items.length} contenido(s)`;
        container.innerHTML = '';
        items.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
        
        items.forEach(item => {
            const div = document.createElement('div');
            div.className = 'item-admin';
            const tieneOp2 = item.opcion2 && item.opcion2.trim() !== '';
            div.innerHTML = `
                <div class="info">
                    <div class="titulo">${item.tipo === 'pelicula' ? '🎬' : '📺'} ${item.titulo}</div>
                    <div class="detalles">
                        <span>📅 ${item.anio || 'N/D'}</span>
                        <span>⭐ ${item.puntuacion || 'N/A'}</span>
                        ${tieneOp2 ? '<span class="op2">🔗 Opción 2 disponible</span>' : ''}
                        ${!tieneOp2 ? '<span style="color:#64748B;">🔗 Solo Opción 1</span>' : ''}
                    </div>
                </div>
                <div class="acciones">
                    <button class="edit-btn" onclick="editarContenido('${item.id}')"><i class="fas fa-edit"></i></button>
                    <button class="delete-btn" onclick="abrirModalEliminar('${item.id}','${item.titulo}')"><i class="fas fa-trash"></i></button>
                </div>
            `;
            container.appendChild(div);
        });
    }).catch((e) => {
        container.innerHTML = '<div style="color:#EF4444;text-align:center;padding:.3rem;font-size:.7rem;">Error al cargar</div>';
    });
}

// ============================================================
//  EDITAR CONTENIDO
// ============================================================
function editarContenido(id) {
    const path = 'contenido_personalizado'; // Por defecto película
    // Buscar en ambos paths
    Promise.all([
        db.ref('contenido_personalizado').child(id).once('value'),
        db.ref('series_personalizadas').child(id).once('value')
    ]).then(([pelisSnap, seriesSnap]) => {
        let data = pelisSnap.val() || seriesSnap.val();
        if (!data) {
            mostrarToast('❌ Contenido no encontrado', 'error');
            return;
        }
        
        editandoId = id;
        document.getElementById('adminTipo').value = data.tipo || 'pelicula';
        document.getElementById('adminTitulo').value = data.titulo || '';
        document.getElementById('adminAnio').value = data.anio || '';
        document.getElementById('adminSinopsis').value = data.sinopsis || '';
        document.getElementById('adminPuntuacion').value = data.puntuacion || '';
        document.getElementById('adminGenero').value = data.genero || '';
        document.getElementById('adminPortada').value = data.portada || '';
        document.getElementById('adminUrl').value = data.url || '';
        document.getElementById('adminOp2').value = data.opcion2 || '';
        
        document.getElementById('subAdmin').textContent = '✏️ Editando: ' + data.titulo;
        document.getElementById('btnGuardar').innerHTML = '<i class="fas fa-save"></i> Actualizar';
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
}

// ============================================================
//  ELIMINAR CONTENIDO
// ============================================================
function abrirModalEliminar(id, titulo) {
    eliminarId = id;
    document.getElementById('eliminarTitulo').textContent = titulo;
    document.getElementById('modalEliminar').classList.add('show');
}

function cerrarModalEliminar() {
    document.getElementById('modalEliminar').classList.remove('show');
    eliminarId = null;
}

function confirmarEliminar() {
    if (!eliminarId) return;
    
    // Buscar en ambos paths
    Promise.all([
        db.ref('contenido_personalizado').child(eliminarId).remove(),
        db.ref('series_personalizadas').child(eliminarId).remove()
    ]).then(() => {
        mostrarToast('🗑️ Contenido eliminado', 'warning');
        cerrarModalEliminar();
        cargarLista();
    }).catch((e) => {
        mostrarToast('❌ Error: ' + e.message, 'error');
    });
}

// ============================================================
//  BANNER APK
// ============================================================
function detectarPlataforma() {
    const ua = navigator.userAgent || '';
    const esWebView = /wv|WebView|Android.*(wv|WebView)/i.test(ua);
    const esNavegador = !esWebView && /Android|iPhone|iPad|iPod/i.test(ua);
    return { esWebView, esNavegador };
}

function mostrarBannerApp() {
    const banner = document.getElementById('bannerApp');
    if (!banner) return;
    if (localStorage.getItem('bannerAppCerrado') === 'true') return;
    const { esWebView, esNavegador } = detectarPlataforma();
    if (esNavegador) {
        banner.style.display = 'block';
        document.body.classList.add('banner-activo');
    }
}

function cerrarBannerApp() {
    const banner = document.getElementById('bannerApp');
    if (banner) {
        banner.style.display = 'none';
        document.body.classList.remove('banner-activo');
        localStorage.setItem('bannerAppCerrado', 'true');
    }
}

function descargarAPK() {
    const urlAPK = 'https://appsgeyser.io/19960416/Tely';
    mostrarToast('📱 Descargando...', 'info');
    const link = document.createElement('a');
    link.href = urlAPK;
    link.target = '_blank';
    link.download = 'Tely.apk';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    setTimeout(cerrarBannerApp, 1000);
}

document.addEventListener('DOMContentLoaded', function() {
    setTimeout(mostrarBannerApp, 1500);
});
