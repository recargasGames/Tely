<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TELY 🎬 - Admin</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://image.tmdb.org">
    <link rel="dns-prefetch" href="https://image.tmdb.org">
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="apple-touch-icon" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;background:#0A0A0F}
        body{background:#0A0A0F;color:#fff;font-family:'Segoe UI',Roboto,sans-serif;min-height:100vh;transition:background 0.3s, color 0.3s;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
        ::-webkit-scrollbar{display:none}
        body.dark{background:#0A0A0F;color:#fff}
        body:not(.dark){background:#f0f0f0;color:#111}
        
        .main-content{width:100%;height:100vh;padding:.3rem .5rem;overflow-y:auto;margin:0 auto;max-width:600px}
        
        .header-flotante{
            position:sticky;
            top:0;
            z-index:50;
            background:rgba(10,10,15,.92);
            backdrop-filter:blur(12px);
            padding:.3rem .3rem .4rem;
            border-bottom:1px solid rgba(124,58,237,.1);
        }
        body:not(.dark) .header-flotante{
            background:rgba(240,240,240,.92);
            border-bottom-color:rgba(0,0,0,.08);
        }
        
        .top-header{display:flex;justify-content:space-between;align-items:center;padding:.1rem 0 .2rem;flex-wrap:wrap;gap:.3rem}
        .top-header h1{font-size:1.1rem;font-weight:700;background:linear-gradient(135deg,#7C3AED,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .top-actions{display:flex;align-items:center;gap:.5rem}
        
        .theme-btn{background:rgba(255,255,255,.05);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;transition:.3s;display:flex;align-items:center;justify-content:center}
        .theme-btn:hover{background:rgba(255,255,255,.1)}
        body:not(.dark) .theme-btn{background:rgba(0,0,0,.05);color:#111}
        body:not(.dark) .theme-btn:hover{background:rgba(0,0,0,.1)}
        
        .user-btn{background:rgba(124,58,237,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;transition:.3s;display:flex;align-items:center;justify-content:center}
        .user-btn:hover{background:rgba(124,58,237,.3)}
        body:not(.dark) .user-btn{color:#111}
        
        .back-btn{background:rgba(255,255,255,.05);border:none;color:#94A3B8;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;transition:.3s;display:flex;align-items:center;justify-content:center}
        .back-btn:hover{background:rgba(255,255,255,.1)}
        body:not(.dark) .back-btn{background:rgba(0,0,0,.05);color:#555}
        
        .admin-card{background:rgba(255,255,255,.03);border-radius:10px;padding:.8rem;border:1px solid rgba(124,58,237,.08);margin-bottom:.6rem}
        body:not(.dark) .admin-card{background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.06)}
        .admin-card h3{font-size:.9rem;font-weight:700;margin-bottom:.3rem;display:flex;align-items:center;gap:.4rem}
        
        .admin-btn{background:#7C3AED;border:none;color:#fff;padding:.3rem 1rem;border-radius:6px;font-weight:600;font-size:.7rem;cursor:pointer;transition:.3s}
        .admin-btn:hover{background:#6D28D9}
        .admin-btn-magic{background:#F59E0B;color:#111;font-size:.85rem;padding:.5rem 1.2rem}
        .admin-btn-magic:hover{background:#D97706}
        .admin-btn-green{background:#10B981}
        .admin-btn-green:hover{background:#059669}
        .admin-btn-danger{background:#EF4444}
        .admin-btn-danger:hover{background:#DC2626}
        .admin-btn-blue{background:#3B82F6}
        .admin-btn-blue:hover{background:#2563EB}
        .admin-btn-purple{background:#8B5CF6}
        .admin-btn-purple:hover{background:#7C3AED}
        .admin-btn-orange{background:#F59E0B;color:#111}
        .admin-btn-orange:hover{background:#D97706}
        
        .btn-group{display:flex;gap:.3rem;flex-wrap:wrap;margin:.2rem 0}
        .btn-group .admin-btn{padding:.2rem .8rem;font-size:.65rem}
        
        /* ⭐ TARJETAS CON MINIATURAS */
        .grid-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.5rem;padding:.2rem 0}
        @media(min-width:768px){.grid-cards{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}}
        
        .card-item{background:rgba(255,255,255,.03);border-radius:8px;overflow:hidden;border:1px solid rgba(124,58,237,.06);transition:.3s}
        .card-item:hover{transform:translateY(-2px);border-color:rgba(124,58,237,.2)}
        body:not(.dark) .card-item{background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.06)}
        
        .card-item .poster{width:100%;aspect-ratio:2/3;object-fit:cover;background:#1A1A2E}
        .card-item .card-info{padding:.3rem .4rem}
        .card-item .card-info .titulo{font-size:.7rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center}
        body:not(.dark) .card-item .card-info .titulo{color:#111}
        .card-item .card-info .meta{font-size:.55rem;color:#94A3B8;display:flex;gap:.3rem;flex-wrap:wrap;justify-content:center}
        .card-item .badge-tipo{font-size:.5rem;font-weight:600;padding:.03rem .3rem;border-radius:4px}
        .card-item .badge-tipo.pelicula{background:rgba(124,58,237,.12);color:#A78BFA}
        .card-item .badge-tipo.serie{background:rgba(16,185,129,.12);color:#34D399}
        
        .card-item .enlaces-vertical{display:flex;flex-direction:column;gap:.15rem;margin:.2rem 0}
        .card-item .enlaces-vertical .enlace-item{font-size:.5rem;padding:.05rem .3rem;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center}
        .card-item .enlaces-vertical .enlace-item.op1{color:#34D399;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.12)}
        .card-item .enlaces-vertical .enlace-item.op2{color:#60A5FA;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.12)}
        .card-item .enlaces-vertical .enlace-item.sin-enlace{color:#64748B;background:rgba(100,116,139,.08);border:1px solid rgba(100,116,139,.12)}
        
        .card-item .card-actions{display:flex;gap:.2rem;justify-content:center;flex-wrap:wrap;padding:.2rem 0}
        .card-item .card-actions .admin-btn{padding:.1rem .4rem;font-size:.5rem;border-radius:4px}
        
        .edit-input-mini{width:100%;padding:.1rem .3rem;border-radius:4px;border:1px solid rgba(124,58,237,.2);background:rgba(255,255,255,.05);color:#fff;font-size:.5rem;margin-top:.1rem}
        body:not(.dark) .edit-input-mini{background:rgba(0,0,0,.05);color:#111;border-color:rgba(0,0,0,.1)}
        .edit-input-mini:focus{outline:none;border-color:#7C3AED}
        
        .edit-actions{display:flex;gap:.2rem;justify-content:center;margin-top:.1rem}
        .edit-actions .admin-btn{padding:.05rem .3rem;font-size:.45rem;border-radius:4px}
        
        .progress-bar{height:6px;background:rgba(255,255,255,.05);border-radius:3px;margin:.3rem 0;overflow:hidden}
        .progress-bar .fill{height:100%;width:0%;background:linear-gradient(90deg,#F59E0B,#F97316);border-radius:3px;transition:width 0.3s}
        
        .stats-generacion{display:grid;grid-template-columns:repeat(3,1fr);gap:.3rem;margin:.3rem 0;padding:.3rem;background:rgba(0,0,0,.15);border-radius:6px}
        .stats-generacion .stat{text-align:center}
        .stats-generacion .stat .num{font-size:1rem;font-weight:700;color:#F59E0B}
        .stats-generacion .stat .label{font-size:.55rem;color:#94A3B8}
        
        .search-admin{display:flex;gap:.3rem;margin-bottom:.3rem;flex-wrap:wrap}
        .search-admin input{flex:1;padding:.25rem .6rem;border-radius:6px;border:1px solid rgba(124,58,237,.15);background:rgba(255,255,255,.03);color:#fff;font-size:.75rem;min-width:120px}
        body:not(.dark) .search-admin input{background:rgba(0,0,0,.03);color:#111;border-color:rgba(0,0,0,.08)}
        .search-admin input:focus{outline:none;border-color:#7C3AED}
        .search-admin select{padding:.25rem .6rem;border-radius:6px;border:1px solid rgba(124,58,237,.15);background:rgba(255,255,255,.03);color:#fff;font-size:.7rem;cursor:pointer}
        body:not(.dark) .search-admin select{background:rgba(0,0,0,.03);color:#111;border-color:rgba(0,0,0,.08)}
        
        .paginacion{display:flex;align-items:center;justify-content:center;gap:.3rem;padding:.3rem 0;flex-wrap:wrap}
        .paginacion button{background:rgba(124,58,237,.12);border:1px solid rgba(124,58,237,.15);color:#fff;padding:.15rem .6rem;border-radius:4px;font-size:.65rem;cursor:pointer;transition:.2s}
        .paginacion button:hover{background:rgba(124,58,237,.25)}
        .paginacion button:disabled{opacity:.3;cursor:not-allowed}
        .paginacion .info-pagina{color:#94A3B8;font-size:.6rem}
        body:not(.dark) .paginacion button{color:#111;background:rgba(124,58,237,.06)}
        body:not(.dark) .paginacion button:hover{background:rgba(124,58,237,.15)}
        
        .login-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:9999;display:flex;align-items:center;justify-content:center;padding:1rem}
        .login-overlay.oculto{display:none}
        .login-box{background:#1A1A2E;border-radius:16px;padding:2rem;width:100%;max-width:360px;border:1px solid rgba(124,58,237,.12)}
        body:not(.dark) .login-box{background:#fff;border-color:rgba(0,0,0,.08)}
        .login-box .logo{font-size:2rem;font-weight:800;text-align:center;background:linear-gradient(135deg,#7C3AED,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.2rem}
        .login-box .sub{text-align:center;color:#94A3B8;font-size:.8rem;margin-bottom:1rem}
        body:not(.dark) .login-box .sub{color:#555}
        .login-input{width:100%;padding:.6rem 1rem;border-radius:10px;border:2px solid rgba(124,58,237,.15);background:rgba(255,255,255,.05);color:#fff;font-size:.9rem;margin-bottom:.8rem;transition:.3s}
        .login-input:focus{outline:none;border-color:#7C3AED}
        .login-input::placeholder{color:#64748B}
        body:not(.dark) .login-input{background:rgba(0,0,0,.05);color:#111;border-color:rgba(0,0,0,.08)}
        body:not(.dark) .login-input::placeholder{color:#888}
        .login-btn{width:100%;padding:.6rem;border-radius:10px;border:none;background:#7C3AED;color:#fff;font-size:.9rem;font-weight:700;cursor:pointer;transition:.3s}
        .login-btn:hover{background:#6D28D9}
        .login-error{color:#EF4444;font-size:.8rem;text-align:center;margin-top:.5rem;display:none}
        .login-footer{text-align:center;margin-top:.8rem;color:#94A3B8;font-size:.8rem}
        body:not(.dark) .login-footer{color:#555}
        .login-footer a{color:#A78BFA;text-decoration:none;font-weight:600}
        
        .admin-protected{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.15);border-radius:6px;padding:.3rem .6rem;text-align:center;margin-bottom:.4rem;font-size:.7rem;color:#34D399}
        .admin-protected i{color:#34D399}
        .admin-protected.denied{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.15);color:#F87171}
        .badge-count{display:inline-block;padding:.05rem .4rem;border-radius:9999px;background:rgba(124,58,237,.15);color:#A78BFA;font-size:.55rem;font-weight:600}
        .badge-pedidos{display:inline-block;background:#EF4444;color:#fff;border-radius:9999px;padding:.03rem .4rem;font-size:.5rem;font-weight:700;margin-left:.2rem}
        
        /* ⭐ PEDIDOS */
        .pedido-item{background:rgba(255,255,255,.03);border-radius:6px;padding:.3rem .6rem;margin:.2rem 0;border-left:3px solid #F59E0B}
        body:not(.dark) .pedido-item{background:rgba(0,0,0,.02)}
        .pedido-item .titulo{font-weight:600;font-size:.75rem}
        .pedido-item .detalles{font-size:.6rem;color:#94A3B8;display:flex;gap:.6rem;flex-wrap:wrap}
        .pedido-item .estado{display:inline-block;padding:.03rem .4rem;border-radius:9999px;font-size:.5rem;font-weight:600}
        .pedido-item .estado.pendiente{background:rgba(245,158,11,.12);color:#F59E0B}
        .pedido-item .estado.procesando{background:rgba(59,130,246,.12);color:#3B82F6}
        .pedido-item .estado.completado{background:rgba(16,185,129,.12);color:#34D399}
        .pedido-item .fecha{font-size:.5rem;color:#64748B}
        .pedido-item .usuario-info{font-size:.55rem;color:#A78BFA}
        .pedido-actions{display:flex;gap:.2rem;margin-top:.2rem;flex-wrap:wrap}
        .pedido-actions button{padding:.05rem .4rem;border-radius:4px;font-size:.5rem;font-weight:600;border:none;cursor:pointer;transition:.2s}
        .pedido-actions .btn-completar{background:rgba(16,185,129,.12);color:#34D399}
        .pedido-actions .btn-completar:hover{background:rgba(16,185,129,.2)}
        .pedido-actions .btn-procesar{background:rgba(59,130,246,.12);color:#3B82F6}
        .pedido-actions .btn-procesar:hover{background:rgba(59,130,246,.2)}
        .pedido-actions .btn-eliminar{background:rgba(239,68,68,.12);color:#F87171}
        .pedido-actions .btn-eliminar:hover{background:rgba(239,68,68,.2)}
        
        /* ⭐ BANNER APK */
        #bannerApp {
            display:none;
            position:fixed;
            bottom:0;
            left:0;
            right:0;
            background:linear-gradient(135deg,#1A1A2E,#2D2D44);
            border-top:2px solid #7C3AED;
            padding:.4rem .6rem;
            z-index:9999;
            box-shadow:0 -4px 30px rgba(124,58,237,.3);
            animation:slideUp 0.5s ease-out;
        }
        body:not(.dark) #bannerApp {
            background:linear-gradient(135deg,#f0f0f0,#e8e8e8);
            border-top-color:#7C3AED;
        }
        body:not(.dark) #bannerApp .banner-titulo{color:#111;}
        body:not(.dark) #bannerApp .banner-sub{color:#555;}
        
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        body.banner-activo {
            padding-bottom: 60px;
        }
        
        .banner-logo-img {
            width: 30px;
            height: 30px;
            border-radius: 6px;
            object-fit: cover;
        }
        
        .banner-install-btn {
            background:linear-gradient(135deg,#7C3AED,#A78BFA);
            border:none;
            color:#fff;
            padding:.25rem .8rem;
            border-radius:6px;
            font-weight:700;
            font-size:.6rem;
            cursor:pointer;
            transition:.3s;
            display:flex;
            align-items:center;
            gap:.2rem;
        }
        .banner-install-btn:hover {
            transform:scale(1.05);
            box-shadow:0 0 15px rgba(124,58,237,.3);
        }
    </style>
</head>
<body>

<main class="main-content" id="mainContent">
    <div class="header-flotante">
        <div class="top-header">
            <h1><i class="fas fa-cog"></i> Admin</h1>
            <div class="top-actions">
                <button class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i></button>
                <button class="theme-btn" onclick="toggleTheme()" id="themeBtn"><i class="fas fa-moon"></i></button>
                <div class="user-menu">
                    <button class="user-btn" onclick="toggleUserMenu()"><i class="fas fa-user-circle"></i></button>
                    <div class="user-dropdown" id="userDropdown">
                        <a href="perfil.html"><i class="fas fa-user"></i> Mi perfil</a>
                        <hr>
                        <a href="#" id="logoutBtn" onclick="cerrarSesionAdmin()"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="admin-protected" id="adminProtected">
        <i class="fas fa-shield-alt"></i> 
        <span id="adminStatus">Verificando acceso...</span>
    </div>

    <!-- ⭐ SECCIÓN GENERACIÓN -->
    <div class="admin-card" style="border-color:rgba(245,158,11,.2)">
        <h3><i class="fas fa-wand-magic-sparkles" style="color:#F59E0B;"></i> Generar contenido</h3>
        <div class="btn-group">
            <button class="admin-btn admin-btn-magic" onclick="generarPeliculas()"><i class="fas fa-film"></i> Películas</button>
            <button class="admin-btn admin-btn-magic" onclick="generarSeries()" style="background:#8B5CF6;"><i class="fas fa-tv"></i> Series</button>
            <button class="admin-btn admin-btn-orange" onclick="detenerGeneracion()" id="btnDetener" style="display:none;"><i class="fas fa-stop"></i> Detener</button>
            <button class="admin-btn admin-btn-green" onclick="continuarGeneracion()" id="btnContinuar" style="display:none;"><i class="fas fa-play"></i> Continuar</button>
        </div>
        <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
        <div class="stats-generacion" id="statsGeneracion" style="display:none;">
            <div class="stat"><div class="num" id="genActual">0</div><div class="label">Procesados</div></div>
            <div class="stat"><div class="num" id="genTotal">0</div><div class="label">Total</div></div>
            <div class="stat"><div class="num" id="genErrores">0</div><div class="label">Errores</div></div>
        </div>
        <div class="info" id="progressInfo" style="color:#94A3B8;font-size:.7rem;">Listo para generar</div>
    </div>

    <!-- ⭐ SECCIÓN PEDIDOS -->
    <div class="admin-card" style="border-color:rgba(245,158,11,.15)">
        <h3><i class="fas fa-clipboard-list" style="color:#F59E0B;"></i> Pedidos <span class="badge-pedidos" id="badgeTotalPedidos">0</span></h3>
        <div style="display:flex;gap:.3rem;margin-bottom:.3rem;flex-wrap:wrap;">
            <button class="admin-btn admin-btn-blue" onclick="cargarPedidos()" style="padding:.15rem .6rem;font-size:.6rem;"><i class="fas fa-refresh"></i> Recargar</button>
            <button class="admin-btn admin-btn-green" onclick="marcarTodosCompletados()" style="padding:.15rem .6rem;font-size:.6rem;"><i class="fas fa-check-double"></i> Completar todos</button>
        </div>
        <div id="listaPedidosAdmin" class="max-h-60 overflow-y-auto">
            <p class="loading-text" style="color:#64748B;font-size:.75rem;">Cargando pedidos...</p>
        </div>
    </div>

    <!-- ⭐ SECCIÓN CONTENIDO CON TARJETAS -->
    <div class="admin-card">
        <h3><i class="fas fa-list text-emerald-500"></i> Contenido en Firebase</h3>
        <div class="search-admin">
            <input type="text" id="filterAdminInput" placeholder="🔍 Filtrar..." oninput="filtrarContenido()">
            <select id="filterAdminTipo" onchange="filtrarContenido()">
                <option value="todos">Todos</option>
                <option value="pelicula">🎬 Películas</option>
                <option value="serie">📺 Series</option>
            </select>
            <button class="admin-btn admin-btn-blue" onclick="cargarContenido()" style="padding:.15rem .8rem;font-size:.6rem;"><i class="fas fa-refresh"></i></button>
        </div>
        <div id="listaContenido" class="grid-cards"></div>
        <div class="paginacion" id="paginacionContainer" style="display:none;">
            <button onclick="cambiarPagina(-1)" id="btnPaginaPrev"><i class="fas fa-chevron-left"></i></button>
            <span class="info-pagina" id="infoPagina">Página 1 de 1</span>
            <button onclick="cambiarPagina(1)" id="btnPaginaNext"><i class="fas fa-chevron-right"></i></button>
        </div>
    </div>
</main>

<!-- ⭐ BANNER APK -->
<div id="bannerApp">
    <div style="display:flex;align-items:center;justify-content:space-between;max-width:600px;margin:0 auto;gap:0.4rem;">
        <div style="display:flex;align-items:center;gap:0.3rem;flex:1;">
            <img src="logo.png" alt="TELY" class="banner-logo-img" onerror="this.style.display='none'">
            <div>
                <div class="banner-titulo" style="font-weight:700;font-size:.7rem;color:#fff;">📱 ¿Quieres instalar TELY?</div>
                <div class="banner-sub" style="font-size:.55rem;color:#94A3B8;">Mejor experiencia</div>
            </div>
        </div>
        <div style="display:flex;gap:0.3rem;flex-shrink:0;align-items:center;">
            <button onclick="descargarAPK()" class="banner-install-btn"><i class="fas fa-download"></i> Instalar</button>
            <button onclick="cerrarBannerApp()" style="background:rgba(255,255,255,.1);border:none;color:#94A3B8;padding:.2rem .4rem;border-radius:6px;font-size:.7rem;cursor:pointer;transition:.3s;"><i class="fas fa-times"></i></button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyBPBDEVUR7hjNrxCYrefF9Sbl0Wofp3VoQ",
    authDomain: "telyx-23210.firebaseapp.com",
    projectId: "telyx-23210",

function activarPantallaCompleta() {
    const esApp = window.navigator.standalone || 
                   window.matchMedia('(display-mode: standalone)').matches ||
                   /Android.*(wv|WebView)/i.test(navigator.userAgent);
    if (esApp) {
        try {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            }
        } catch(e) {}
    }
}

function toggleTheme() {
    const body = document.body;
    const btn = document.getElementById('themeBtn');
    if (body.classList.contains('dark')) { 
        body.classList.remove('dark'); 
        btn.innerHTML = '<i class="fas fa-moon"></i>'; 
        localStorage.setItem('theme', 'light'); 
    } else { 
        body.classList.add('dark'); 
        btn.innerHTML = '<i class="fas fa-sun"></i>'; 
        localStorage.setItem('theme', 'dark'); 
    }
}

function mostrarToast(msg, tipo = 'success') {
    const colores = { success: '#10B981', warning: '#F59E0B', error: '#EF4444', info: '#3B82F6' };
    const t = document.createElement('div');
    t.style.cssText = `position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:${colores[tipo] || '#10B981'};color:#fff;padding:6px 14px;border-radius:8px;z-index:9999;font-weight:600;font-size:.7rem;max-width:90%;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:opacity 0.3s;`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2000);
}

function getImagenUrl(path, size = 'w342') {
    if (!path) return 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg';
    return `https://image.tmdb.org/t/p/${size}${path}`;
}

async function fetchTMDB(path, params = {}) {
    const queryParams = new URLSearchParams();
    queryParams.append('path', path);
    Object.keys(params).forEach(key => queryParams.append(key, params[key]));
    const url = `https://tely-xi.vercel.app/api/tmdb?${queryParams.toString()}`;
    const response = await fetch(url);
    if (!response.ok) throw new Error(`Error: ${response.status}`);
    return response.json();
}

function generarEnlaceUnlimplay(tmdb_id, tipo, temporada = 1, capitulo = 1) {
    if (tipo === 'pelicula') {
        return `https://unlimplay.com/play/embed/movie/${tmdb_id}?lang=es-MX&autoplay=1&controls=1&logo=0`;
    } else {
        return `https://unlimplay.com/play/embed/tv/${tmdb_id}/${temporada}/${capitulo}?lang=es-MX&autoplay=1&controls=1&logo=0`;
    }
}

function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

window.iniciarSesionAdmin = function() {
    const email = document.getElementById('adminEmail').value.trim();
    const password = document.getElementById('adminPassword').value;
    const btn = document.getElementById('adminLoginBtn');
    const errorEl = document.getElementById('loginError');
    if (!email || !password) {
        errorEl.textContent = '⚠️ Completa todos los campos';
        errorEl.style.display = 'block';
        return;
    }
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Iniciando...';
    auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
            const user = userCredential.user;

                document.getElementById('loginOverlay').classList.add('oculto');
                esAdmin = true;
                actualizarUIAdmin(true);
                cargarContenido();

            } else {

                errorEl.style.display = 'block';
                auth.signOut();
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Iniciar sesión';

        })
        .catch((e) => {
            let msg = '❌ Error al iniciar sesión';
            if (e.code === 'auth/user-not-found') msg = '❌ Usuario no encontrado';
            else if (e.code === 'auth/wrong-password') msg = '❌ Contraseña incorrecta';
            errorEl.textContent = msg;

            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Iniciar sesión';

// ⭐ GENERAR PELÍCULAS
async function generarPeliculas() {
    if (!esAdmin) { mostrarToast('⛔ No tienes permisos', 'error'); return; }
    if (generando) { mostrarToast('⏳ Ya está generando...', 'warning'); return; }
    if (!confirm('⚠️ ¿Generar TODAS las películas populares de TMDB?')) return;
    generando = true;
    generacionDetenida = false;
    totalGenerados = 0;
    totalErrores = 0;
    document.getElementById('btnDetener').style.display = 'inline-block';
    document.getElementById('btnContinuar').style.display = 'none';
    document.getElementById('statsGeneracion').style.display = 'grid';
    document.getElementById('progressInfo').textContent = '🎬 Obteniendo películas...';
    document.getElementById('progressFill').style.width = '0%';
    let page = 1, hasMore = true, peliculasTotales = [];
    try {
        while (hasMore && page <= 500 && !generacionDetenida) {
            const data = await fetchTMDB('movie/popular', { page });
            if (!data.results || !data.results.length) { hasMore = false; break; }
            peliculasTotales = [...peliculasTotales, ...data.results];
            document.getElementById('progressInfo').textContent = `🎬 Cargando... página ${page} (${peliculasTotales.length})`;
            document.getElementById('progressFill').style.width = `${Math.min((page / 500) * 40, 40)}%`;
            page++;
            if (!data.total_pages || page > data.total_pages) hasMore = false;
            await sleep(100);
        }
        totalProcesar = peliculasTotales.length;
        document.getElementById('genTotal').textContent = totalProcesar;
        for (let i = 0; i < peliculasTotales.length && !generacionDetenida; i++) {
            try {
                const p = peliculasTotales[i];
                await db.ref('contenido_personalizado').push({
                    titulo: p.title || `Película ${p.id}`,
                    anio: p.release_date ? p.release_date.split('-')[0] : 'N/D',
                    sinopsis: p.overview || 'Sin sinopsis',
                    portada: getImagenUrl(p.poster_path, 'w342'),
                    genero: 'Película',
                    tipo: 'pelicula',
                    categoria: 'peliculas',
                    tmdb_id: p.id,
                    puntuacion: p.vote_average ? p.vote_average.toFixed(1) : 'N/A',
                    url: generarEnlaceUnlimplay(p.id, 'pelicula'),
                    creado: Date.now()
                });
                totalGenerados++;
            } catch(e) { totalErrores++; }
            document.getElementById('genActual').textContent = totalGenerados;
            document.getElementById('genErrores').textContent = totalErrores;
            document.getElementById('progressFill').style.width = `${40 + (i / peliculasTotales.length) * 60}%`;
            document.getElementById('progressInfo').textContent = `🎬 ${totalGenerados}/${peliculasTotales.length} (${totalErrores} errores)`;
            await sleep(50);
        }
        if (generacionDetenida) {
            document.getElementById('progressInfo').textContent = `⏸️ Pausado - ${totalGenerados} películas`;
            document.getElementById('btnContinuar').style.display = 'inline-block';
        } else {
            document.getElementById('progressInfo').textContent = `✅ ${totalGenerados} películas (${totalErrores} errores)`;
            document.getElementById('btnDetener').style.display = 'none';
            mostrarToast(`✅ ${totalGenerados} películas generadas`, 'success');
            cargarContenido();
        }
    } catch(e) {
        document.getElementById('progressInfo').textContent = `❌ Error: ${e.message}`;
        mostrarToast('❌ Error', 'error');
    }
    generando = false;
}

async function generarSeries() {
    if (!esAdmin) { mostrarToast('⛔ No tienes permisos', 'error'); return; }
    if (generando) { mostrarToast('⏳ Ya está generando...', 'warning'); return; }
    if (!confirm('⚠️ ¿Generar TODAS las series populares de TMDB?')) return;
    generando = true;
    generacionDetenida = false;
    totalGenerados = 0;
    totalErrores = 0;
    document.getElementById('btnDetener').style.display = 'inline-block';
    document.getElementById('btnContinuar').style.display = 'none';
    document.getElementById('statsGeneracion').style.display = 'grid';
    document.getElementById('progressInfo').textContent = '📺 Obteniendo series...';
    document.getElementById('progressFill').style.width = '0%';
    let page = 1, hasMore = true, seriesTotales = [];
    try {
        while (hasMore && page <= 500 && !generacionDetenida) {
            const data = await fetchTMDB('tv/popular', { page });
            if (!data.results || !data.results.length) { hasMore = false; break; }
            seriesTotales = [...seriesTotales, ...data.results];
            document.getElementById('progressInfo').textContent = `📺 Cargando... página ${page} (${seriesTotales.length})`;
            document.getElementById('progressFill').style.width = `${Math.min((page / 500) * 40, 40)}%`;
            page++;
            if (!data.total_pages || page > data.total_pages) hasMore = false;
            await sleep(100);
        }
        totalProcesar = seriesTotales.length;
        document.getElementById('genTotal').textContent = totalProcesar;
        for (let i = 0; i < seriesTotales.length && !generacionDetenida; i++) {
            try {
                const s = seriesTotales[i];
                const temporadas = [];
                let capsSerie = 0;
                for (let t = 1; t <= Math.min(s.number_of_seasons || 1, 10); t++) {
                    try {
                        const seasonData = await fetchTMDB(`tv/${s.id}/season/${t}`);
                        if (!seasonData || !seasonData.episodes) continue;
                        const capitulos = seasonData.episodes.map(ep => ({
                            numero: ep.episode_number,
                            titulo: ep.name || `Capítulo ${ep.episode_number}`,
                            sinopsis: ep.overview || 'Sin sinopsis',
                            url: generarEnlaceUnlimplay(s.id, 'serie', t, ep.episode_number)
                        }));
                        capsSerie += capitulos.length;
                        temporadas.push({ numero: t, nombre: seasonData.name || `Temporada ${t}`, capitulos });
                    } catch(e) {}
                }
                if (temporadas.length > 0) {
                    await db.ref('series_personalizadas').push({
                        titulo: s.name || `Serie ${s.id}`,
                        anio: s.first_air_date ? s.first_air_date.split('-')[0] : 'N/D',
                        sinopsis: s.overview || 'Sin sinopsis',
                        portada: getImagenUrl(s.poster_path, 'w342'),
                        genero: 'Serie',
                        tipo: 'serie',
                        categoria: 'series',
                        tmdb_id: s.id,
                        puntuacion: s.vote_average ? s.vote_average.toFixed(1) : 'N/A',
                        temporadas: temporadas,
                        url: generarEnlaceUnlimplay(s.id, 'serie', 1, 1),
                        creado: Date.now()
                    });
                    totalGenerados++;
                }
            } catch(e) { totalErrores++; }
            document.getElementById('genActual').textContent = totalGenerados;
            document.getElementById('genErrores').textContent = totalErrores;
            document.getElementById('progressFill').style.width = `${40 + (i / seriesTotales.length) * 60}%`;
            document.getElementById('progressInfo').textContent = `📺 ${totalGenerados}/${seriesTotales.length} (${totalErrores} errores)`;
            await sleep(50);
        }
        if (generacionDetenida) {
            document.getElementById('progressInfo').textContent = `⏸️ Pausado - ${totalGenerados} series`;
            document.getElementById('btnContinuar').style.display = 'inline-block';
        } else {
            document.getElementById('progressInfo').textContent = `✅ ${totalGenerados} series (${totalErrores} errores)`;
            document.getElementById('btnDetener').style.display = 'none';
            mostrarToast(`✅ ${totalGenerados} series generadas`, 'success');
            cargarContenido();
        }
    } catch(e) {
        document.getElementById('progressInfo').textContent = `❌ Error: ${e.message}`;
        mostrarToast('❌ Error', 'error');
    }
    generando = false;
}

// ⭐ CARGAR CONTENIDO
window.cargarContenido = async function() {
    if (!esAdmin) return;
    const container = document.getElementById('listaContenido');
    container.innerHTML = '<p style="color:#64748B;font-size:.75rem;">Cargando...</p>';
    try {
        const [pSnap, sSnap] = await Promise.all([
            db.ref('contenido_personalizado').once('value'),
            db.ref('series_personalizadas').once('value')
        ]);
        const pData = pSnap.val() || {};
        const sData = sSnap.val() || {};
        peliculasLista = Object.values(pData);
        seriesLista = Object.values(sData);
        peliculasKeys = Object.keys(pData);
        seriesKeys = Object.keys(sData);
        if (!peliculasLista.length && !seriesLista.length) {
            container.innerHTML = '<p style="color:#64748B;font-size:.75rem;">No hay contenido</p>';
            document.getElementById('paginacionContainer').style.display = 'none';
            return;
        }
        container.innerHTML = '';
        let itemsHTML = '';
        peliculasLista.forEach((p, index) => {
            const key = peliculasKeys[index];
            const portada = p.portada || 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg';
            const urlOp1 = p.url || 'Sin enlace';
            const urlOp2 = p.opcion2 || 'Sin Op2';
            itemsHTML += `
                <div class="card-item" id="item-${key}" data-titulo="${p.titulo.toLowerCase()}" data-tipo="pelicula">
                    <img src="${portada}" class="poster" loading="lazy" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg'">
                    <div class="card-info">
                        <div class="titulo">${p.titulo}</div>
                        <div class="meta">
                            <span>${p.anio || 'N/D'}</span>
                            <span>⭐ ${p.puntuacion || 'N/A'}</span>
                            <span class="badge-tipo pelicula">🎬</span>
                        </div>
                        <div class="enlaces-vertical">
                            <div class="enlace-item op1">🔗 ${urlOp1}</div>
                            <div class="enlace-item op2">🔗 ${urlOp2}</div>
                        </div>
                        <div class="card-actions">
                            <button class="admin-btn admin-btn-blue" onclick="editarEnlace('${key}', 'pelicula', 'url')"><i class="fas fa-pen"></i> Op1</button>
                            <button class="admin-btn admin-btn-purple" onclick="editarEnlace('${key}', 'pelicula', 'opcion2')"><i class="fas fa-pen"></i> Op2</button>
                            <button class="admin-btn admin-btn-danger" onclick="eliminarItem('${key}', 'pelicula')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            `;
        });
        seriesLista.forEach((s, index) => {
            const key = seriesKeys[index];
            const capsCount = s.temporadas ? s.temporadas.reduce((sum, t) => sum + (t.capitulos ? t.capitulos.length : 0), 0) : 0;
            const portada = s.portada || 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg';
            const urlOp1 = s.url || 'Sin enlace';
            const urlOp2 = s.opcion2 || 'Sin Op2';
            itemsHTML += `
                <div class="card-item" id="item-${key}" data-titulo="${s.titulo.toLowerCase()}" data-tipo="serie">
                    <img src="${portada}" class="poster" loading="lazy" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg'">
                    <div class="card-info">
                        <div class="titulo">${s.titulo}</div>
                        <div class="meta">
                            <span>${s.anio || 'N/D'}</span>
                            <span>${s.temporadas?.length || 0} temps</span>
                            <span>${capsCount} caps</span>
                            <span>⭐ ${s.puntuacion || 'N/A'}</span>
                            <span class="badge-tipo serie">📺</span>
                        </div>
                        <div class="enlaces-vertical">
                            <div class="enlace-item op1">🔗 ${urlOp1}</div>
                            <div class="enlace-item op2">🔗 ${urlOp2}</div>
                        </div>
                        <div class="card-actions">
                            <button class="admin-btn admin-btn-blue" onclick="editarEnlace('${key}', 'serie', 'url')"><i class="fas fa-pen"></i> Op1</button>
                            <button class="admin-btn admin-btn-purple" onclick="editarEnlace('${key}', 'serie', 'opcion2')"><i class="fas fa-pen"></i> Op2</button>
                            <button class="admin-btn admin-btn-danger" onclick="eliminarItem('${key}', 'serie')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            `;
        });
        container.innerHTML = itemsHTML;
        paginaActual = 1;
        mostrarPagina();
        filtrarContenido();
    } catch(e) {
        container.innerHTML = '<p style="color:#EF4444;font-size:.75rem;">Error al cargar</p>';
        console.error(e);
    }
};

function mostrarPagina() {
    const container = document.getElementById('listaContenido');
    const pagContainer = document.getElementById('paginacionContainer');
    const items = container.querySelectorAll('.card-item');
    const totalItems = items.length;
    const totalPaginas = Math.ceil(totalItems / itemsPorPagina);
    if (totalItems <= itemsPorPagina) { pagContainer.style.display = 'none'; return; }
    const inicio = (paginaActual - 1) * itemsPorPagina;
    const fin = Math.min(inicio + itemsPorPagina, totalItems);
    items.forEach((item, index) => {
        item.style.display = (index >= inicio && index < fin) ? 'block' : 'none';
    });
    document.getElementById('infoPagina').textContent = `Página ${paginaActual} de ${totalPaginas}`;
    document.getElementById('btnPaginaPrev').disabled = paginaActual <= 1;
    document.getElementById('btnPaginaNext').disabled = paginaActual >= totalPaginas;
    pagContainer.style.display = 'flex';
}

function cambiarPagina(dir) {
    const items = document.querySelectorAll('.card-item');
    const totalItems = items.length;
    const totalPaginas = Math.ceil(totalItems / itemsPorPagina);
    const nueva = paginaActual + dir;
    if (nueva >= 1 && nueva <= totalPaginas) {
        paginaActual = nueva;
        mostrarPagina();
    }
}

function filtrarContenido() {
    const searchTerm = document.getElementById('filterAdminInput').value.toLowerCase();
    const tipoFilter = document.getElementById('filterAdminTipo').value;
    const items = document.querySelectorAll('.card-item');
    items.forEach(item => {
        const titulo = item.dataset.titulo || '';
        const tipo = item.dataset.tipo || '';
        let match = true;
        if (searchTerm && !titulo.includes(searchTerm)) match = false;
        if (tipoFilter !== 'todos' && tipo !== tipoFilter) match = false;
        item.style.display = match ? 'block' : 'none';
    });
}

function eliminarItem(key, tipo) {
    if (!confirm(`¿Eliminar este ${tipo}?`)) return;
    const path = tipo === 'pelicula' ? 'contenido_personalizado' : 'series_personalizadas';
    db.ref(`${path}/${key}`).remove().then(() => {
        mostrarToast(`🗑️ ${tipo} eliminado`, 'warning');
        cargarContenido();
    });
}

// ⭐ EDITAR ENLACES (OP1 Y OP2)
function editarEnlace(key, tipo, campo) {
    const container = document.getElementById(`item-${key}`);
    const enlaceDiv = container.querySelector(`.enlace-item.${campo === 'url' ? 'op1' : 'op2'}`);
    if (itemsEditando[key]) { cancelarEdicion(key); return; }
    const currentUrl = enlaceDiv.textContent.replace('🔗', '').trim();
    itemsEditando[key] = true;
    enlaceDiv.innerHTML = `
        <input class="edit-input-mini" id="edit-input-${key}-${campo}" value="${currentUrl}" placeholder="Pega el nuevo enlace...">
        <div class="edit-actions">
            <button class="admin-btn admin-btn-green" onclick="guardarEnlace('${key}', '${tipo}', '${campo}')"><i class="fas fa-check"></i></button>
            <button class="admin-btn admin-btn-danger" onclick="cancelarEdicion('${key}')"><i class="fas fa-times"></i></button>
        </div>
    `;
    setTimeout(() => {
        const input = document.getElementById(`edit-input-${key}-${campo}`);
        if (input) input.focus();
    }, 100);
}

function cancelarEdicion(key) {
    delete itemsEditando[key];
    cargarContenido();
}

function guardarEnlace(key, tipo, campo) {
    const input = document.getElementById(`edit-input-${key}-${campo}`);
    if (!input) return;
    const nuevoEnlace = input.value.trim();
    if (!nuevoEnlace) {
        mostrarToast('❌ El enlace no puede estar vacío', 'error');
        return;
    }
    const path = tipo === 'pelicula' ? 'contenido_personalizado' : 'series_personalizadas';
    db.ref(`${path}/${key}`).update({ [campo]: nuevoEnlace }).then(() => {
        mostrarToast(`✅ ${campo === 'url' ? 'Op1' : 'Op2'} actualizada`, 'success');
        delete itemsEditando[key];
        cargarContenido();
    }).catch(e => mostrarToast('❌ Error: ' + e.message, 'error'));
}

// ⭐ PEDIDOS
function cargarPedidos() {
    if (!esAdmin) return;
    const container = document.getElementById('listaPedidosAdmin');
    container.innerHTML = '<p style="color:#64748B;font-size:.75rem;">Cargando pedidos...</p>';
    db.ref('pedidos').orderByChild('fecha').once('value').then((snap) => {
        const data = snap.val();
        container.innerHTML = '';
        pedidosData = [];
        if (!data) {
            container.innerHTML = '<div style="color:#64748B;font-size:.7rem;text-align:center;padding:.3rem;">No hay pedidos</div>';
            document.getElementById('badgeTotalPedidos').textContent = '0';
            document.getElementById('badgeTotalPedidos').style.display = 'none';
            return;
        }
        const pedidos = Object.entries(data).map(([key, value]) => ({ key, ...value }));
        pedidos.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
        pedidosData = pedidos;
        const pendientes = pedidos.filter(p => p.estado === 'pendiente').length;
        document.getElementById('badgeTotalPedidos').textContent = pendientes;
        document.getElementById('badgeTotalPedidos').style.display = pendientes > 0 ? 'inline-block' : 'none';
        pedidos.forEach((p) => {
            const div = document.createElement('div');
            div.className = 'pedido-item';
            const estadoText = {
                'pendiente': '⏳ Pendiente',
                'procesando': '🔄 En proceso',
                'completado': '✅ Completado'
            }[p.estado] || '⏳ Pendiente';
            div.innerHTML = `
                <div class="titulo">${p.tipo === 'pelicula' ? '🎬' : '📺'} ${p.titulo}</div>
                <div class="detalles">
                    <span>📅 ${p.anio || 'N/D'}</span>
                    <span class="estado ${p.estado || 'pendiente'}">${estadoText}</span>
                    <span class="usuario-info">👤 ${p.nombre || 'Usuario'}</span>
                </div>
                ${p.sinopsis && p.sinopsis !== 'Sin descripción' ? `<div style="font-size:.6rem;color:#64748B;margin-top:.1rem;">${p.sinopsis.substring(0, 80)}</div>` : ''}
                <div class="fecha">📆 ${new Date(p.fecha).toLocaleDateString()}</div>
                <div class="pedido-actions">
                    ${p.estado !== 'completado' ? `<button class="btn-completar" onclick="actualizarEstadoPedido('${p.key}', 'completado')"><i class="fas fa-check"></i> Completar</button>` : ''}
                    ${p.estado === 'pendiente' ? `<button class="btn-procesar" onclick="actualizarEstadoPedido('${p.key}', 'procesando')"><i class="fas fa-spinner"></i> Procesar</button>` : ''}
                    <button class="btn-eliminar" onclick="eliminarPedido('${p.key}')"><i class="fas fa-trash"></i> Eliminar</button>
                </div>
            `;
            container.appendChild(div);
        });
    });
}

function actualizarEstadoPedido(key, nuevoEstado) {
    if (!confirm(`¿Cambiar a "${nuevoEstado}"?`)) return;
    db.ref(`pedidos/${key}`).update({ estado: nuevoEstado }).then(() => {
        mostrarToast(`✅ Pedido actualizado`, 'success');
        cargarPedidos();
    });
}

function eliminarPedido(key) {
    if (!confirm('⚠️ ¿Eliminar este pedido?')) return;
    db.ref(`pedidos/${key}`).remove().then(() => {
        mostrarToast('🗑️ Pedido eliminado', 'warning');
        cargarPedidos();
    });
}

function marcarTodosCompletados() {
    if (!confirm('⚠️ ¿Marcar TODOS los pedidos como completados?')) return;
    const pendientes = pedidosData.filter(p => p.estado !== 'completado');
    if (!pendientes.length) { mostrarToast('ℹ️ No hay pedidos pendientes', 'info'); return; }
    pendientes.forEach(p => { db.ref(`pedidos/${p.key}`).update({ estado: 'completado' }); });
    setTimeout(() => {
        mostrarToast(`✅ ${pendientes.length} pedidos completados`, 'success');
        cargarPedidos();
    }, 500);
}

// ⭐ BANNER APK
function detectarPlataforma() {
    const ua = navigator.userAgent || '';
    const esWebView = /wv|WebView|Android.*(wv|WebView)/i.test(ua);
    const esNavegador = !esWebView && /Android|iPhone|iPad|iPod/i.test(ua);
    return { esWebView, esNavegador };
}

function mostrarBannerApp() {
    const banner = document.getElementById('bannerApp');
    if (!banner) return;
    if (localStorage.getItem('bannerAppCerrado') === 'true') return;
    const { esWebView, esNavegador } = detectarPlataforma();
    if (esNavegador) {
        banner.style.display = 'block';
        document.body.classList.add('banner-activo');
    }
}

function cerrarBannerApp() {
    const banner = document.getElementById('bannerApp');
    if (banner) {
        banner.style.display = 'none';
        document.body.classList.remove('banner-activo');
        localStorage.setItem('bannerAppCerrado', 'true');
    }
}

function descargarAPK() {
    const urlAPK = 'https://appsgeyser.io/19960416/Tely';
    mostrarToast('📱 Descargando TELY...', 'info');
    const link = document.createElement('a');
    link.href = urlAPK;
    link.target = '_blank';
    link.download = 'Tely.apk';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    setTimeout(cerrarBannerApp, 2000);
}

// ⭐ INICIAR
document.addEventListener('DOMContentLoaded', function() {
    setTimeout(mostrarBannerApp, 2000);
    activarPantallaCompleta();
});

cargarContenido();
cargarPedidos();
console.log('✅ Admin TELY - Con Op1 y Op2 editables, miniaturas');
</script>
