<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TELY 🎬</title>
    <link rel="icon" href="logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;background:#0A0A0F}
        body{background:#0A0A0F;color:#fff;font-family:system-ui,sans-serif}
        ::-webkit-scrollbar{display:none}
        .main-content{width:100%;height:100vh;padding:10px 12px 100px 12px;overflow-y:auto;max-width:600px;margin:0 auto}
        .header{position:sticky;top:0;z-index:50;background:rgba(10,10,15,.95);backdrop-filter:blur(12px);padding:10px 0 14px;border-bottom:2px solid rgba(124,58,237,.15)}
        .header-top{display:flex;justify-content:space-between;align-items:center}
        .header-top h1{font-size:22px;font-weight:800;background:linear-gradient(135deg,#7C3AED,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .header-actions{display:flex;gap:8px}
        .header-actions button{background:rgba(255,255,255,.05);border:none;color:#fff;width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:16px}
        .search-box{display:flex;gap:8px;margin-top:10px}
        .search-box input{flex:1;padding:10px 16px;border-radius:50px;border:2px solid rgba(124,58,237,.2);background:rgba(255,255,255,.05);color:#fff;font-size:14px;transition:.3s}
        .search-box input:focus{outline:none;border-color:#7C3AED}
        .search-box input::placeholder{color:#64748B}
        .search-box button{padding:10px 20px;border-radius:50px;border:none;background:#7C3AED;color:#fff;font-weight:700;cursor:pointer;font-size:14px}
        .search-box button:hover{background:#6D28D9}
        .tabs{display:flex;gap:4px;margin-top:10px;background:rgba(255,255,255,.03);border-radius:10px;padding:4px}
        .tab{flex:1;padding:6px 0;border:none;border-radius:8px;background:transparent;color:#94A3B8;font-weight:700;font-size:13px;cursor:pointer;transition:.3s}
        .tab.active{background:#7C3AED;color:#fff}
        .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 0}
        .card{background:rgba(255,255,255,.04);border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid rgba(124,58,237,.08);transition:.3s;position:relative}
        .card:hover{transform:translateY(-3px);border-color:#7C3AED}
        .card .poster{width:100%;aspect-ratio:2/3;object-fit:cover;background:#1A1A2E}
        .card .info{padding:6px 8px}
        .card .info h4{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .card .info .meta{font-size:9px;color:#94A3B8;display:flex;justify-content:space-between}
        .card .badge{position:absolute;top:4px;left:4px;background:rgba(124,58,237,.85);color:#fff;padding:2px 8px;border-radius:4px;font-size:8px;font-weight:700}
        .skeleton{aspect-ratio:2/3;border-radius:10px;background:linear-gradient(90deg,#1A1A2E 25%,#2D2D44 50%,#1A1A2E 75%);background-size:200%;animation:skeleton 1.5s infinite}
        @keyframes skeleton{0%{background-position:-200%}100%{background-position:200%}}
        .load-more{display:flex;justify-content:center;padding:16px 0}
        .load-more button{background:#7C3AED;color:#fff;padding:14px 40px;border-radius:50px;border:none;font-weight:700;font-size:16px;cursor:pointer;min-width:180px;min-height:54px;box-shadow:0 4px 20px rgba(124,58,237,.3)}
        .load-more button.oculto{display:none}
        .load-more button:disabled{opacity:.5;cursor:not-allowed}
        .empty-msg{color:#64748B;padding:20px;text-align:center;font-size:14px}
        .modo{display:none}
        .modo.active{display:block}
        .section-title{font-size:14px;font-weight:700;margin:10px 0 4px;display:flex;align-items:center;gap:6px}
        .section-title i{color:#7C3AED}
        .horizontal{display:flex;gap:6px;overflow-x:auto;padding:4px 0}
        .horizontal .card{flex:0 0 80px}
    </style>
</head>
<body>

<main class="main-content" id="mainContent">
    <div class="header">
        <div class="header-top">
            <h1>🎬 TELY</h1>
            <div class="header-actions">
                <button onclick="toggleTheme()" id="themeBtn">🌙</button>
                <button onclick="window.location.href='login.html'">👤</button>
            </div>
        </div>
        <div class="search-box">
            <input type="text" placeholder="🔍 Buscar..." id="searchInput" oninput="buscarGlobal()">
            <button onclick="buscarGlobal()"><i class="fas fa-search"></i></button>
        </div>
        <div class="tabs">
            <button class="tab active" onclick="cambiarTab('inicio')">Inicio</button>
            <button class="tab" onclick="cambiarTab('peliculas')">Películas</button>
            <button class="tab" onclick="cambiarTab('series')">Series</button>
        </div>
    </div>

    <div id="tabInicio" class="modo active">
        <div class="section-title"><i class="fas fa-heart"></i> Favoritos</div>
        <div class="horizontal" id="favoritosContainer"><p class="empty-msg">No hay favoritos</p></div>
        <div class="section-title"><i class="fas fa-fire"></i> Populares</div>
        <div class="grid" id="popularesContainer"></div>
        <div class="section-title"><i class="fas fa-star"></i> Series</div>
        <div class="grid" id="seriesPopularesContainer"></div>
    </div>

    <div id="tabPeliculas" class="modo">
        <div class="grid" id="peliculasGrid"></div>
        <div class="load-more"><button onclick="cargarMasPeliculas()" id="btnPeliculas"><i class="fas fa-plus"></i> Cargar más</button></div>
    </div>

    <div id="tabSeries" class="modo">
        <div class="grid" id="seriesGrid"></div>
        <div class="load-more"><button onclick="cargarMasSeries()" id="btnSeries"><i class="fas fa-plus"></i> Cargar más</button></div>
    </div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyBPBDEVUR7hjNrxCYrefF9Sbl0Wofp3VoQ",
    authDomain: "telyx-23210.firebaseapp.com",
    projectId: "telyx-23210",
    storageBucket: "telyx-23210.firebasestorage.app",
    messagingSenderId: "10164285015",
    appId: "1:10164285015:web:5cf32bd2831de126c67d12"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ========== VARIABLES ==========
let peliPag = 1, seriePag = 1, peliTotal = 1, serieTotal = 1, cargandoP = false, cargandoS = false;
let timeoutBusqueda = null;
let modoActual = 'inicio';

// ========== FUNCIONES ==========
function getImg(path) {
    if (!path) return 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg';
    return `https://image.tmdb.org/t/p/w342${path}`;
}

async function fetchTMDB(path, params = {}) {
    const q = new URLSearchParams({ path, ...params });
    const res = await fetch(`https://tely-xi.vercel.app/api/tmdb?${q}`);
    if (!res.ok) throw new Error('Error');
    return res.json();
}

function toggleTheme() {
    document.body.classList.toggle('dark');
    const btn = document.getElementById('themeBtn');
    btn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
    localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
}
if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark');
    document.getElementById('themeBtn').textContent = '☀️';
}

function crearCard(item, tipo = 'pelicula') {
    const div = document.createElement('div');
    div.className = 'card';
    const idReal = item.tmdb_id || item.id;
    div.innerHTML = `
        <span class="badge">${item.anio || 'N/D'}</span>
        <img src="${item.portada}" class="poster" loading="lazy" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg'">
        <div class="info">
            <h4>${item.titulo}</h4>
            <div class="meta"><span>⭐ ${item.puntuacion || 'N/A'}</span></div>
        </div>
    `;
    div.onclick = () => {
        const p = new URLSearchParams({ play: idReal, tipo });
        window.location.href = `reproductor.html?${p}`;
    };
    return div;
}

// ========== CAMBIAR PESTAÑA ==========
function cambiarTab(tab) {
    modoActual = tab;
    document.querySelectorAll('.modo').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
    
    if (tab === 'inicio') {
        document.getElementById('tabInicio').classList.add('active');
        document.querySelector('.tab').classList.add('active');
        if (!document.getElementById('popularesContainer').querySelector('.card')) cargarInicio();
    } else if (tab === 'peliculas') {
        document.getElementById('tabPeliculas').classList.add('active');
        document.querySelectorAll('.tab')[1].classList.add('active');
        if (!document.getElementById('peliculasGrid').querySelector('.card')) cargarPeliculas(1);
    } else if (tab === 'series') {
        document.getElementById('tabSeries').classList.add('active');
        document.querySelectorAll('.tab')[2].classList.add('active');
        if (!document.getElementById('seriesGrid').querySelector('.card')) cargarSeries(1);
    }
    document.getElementById('searchInput').value = '';
    document.getElementById('searchInput').dispatchEvent(new Event('input'));
}

// ========== CARGAR INICIO ==========
async function cargarInicio() {
    try {
        const [pop, series] = await Promise.all([
            fetchTMDB('movie/popular', { page: 1 }),
            fetchTMDB('tv/popular', { page: 1 })
        ]);
        const pC = document.getElementById('popularesContainer');
        const sC = document.getElementById('seriesPopularesContainer');
        pC.innerHTML = ''; sC.innerHTML = '';
        if (pop.results) pop.results.slice(0, 12).forEach(p => {
            const item = { id: p.id, tmdb_id: p.id, titulo: p.title || 'Sin título', anio: p.release_date ? p.release_date.split('-')[0] : 'N/D', portada: getImg(p.poster_path), puntuacion: p.vote_average ? p.vote_average.toFixed(1) : 'N/A' };
            pC.appendChild(crearCard(item));
        });
        if (series.results) series.results.slice(0, 12).forEach(s => {
            const item = { id: s.id, tmdb_id: s.id, titulo: s.name || 'Sin título', anio: s.first_air_date ? s.first_air_date.split('-')[0] : 'N/D', portada: getImg(s.poster_path), puntuacion: s.vote_average ? s.vote_average.toFixed(1) : 'N/A' };
            sC.appendChild(crearCard(item, 'serie'));
        });
        cargarFavoritos();
    } catch(e) { console.error(e); }
}

// ========== CARGAR PELÍCULAS ==========
async function cargarPeliculas(page = 1) {
    if (cargandoP || page > peliTotal && page > 1) return;
    cargandoP = true;
    const grid = document.getElementById('peliculasGrid');
    const btn = document.getElementById('btnPeliculas');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Cargando...';
    if (page === 1) grid.innerHTML = '';
    try {
        const data = await fetchTMDB('movie/popular', { page });
        peliTotal = data.total_pages || 1;
        if (page === 1) grid.innerHTML = '';
        if (!data.results || !data.results.length) {
            if (page === 1) grid.innerHTML = '<p class="empty-msg">No hay películas</p>';
            btn.classList.add('oculto');
            cargandoP = false;
            return;
        }
        data.results.forEach(p => {
            const item = { id: p.id, tmdb_id: p.id, titulo: p.title || 'Sin título', anio: p.release_date ? p.release_date.split('-')[0] : 'N/D', portada: getImg(p.poster_path), puntuacion: p.vote_average ? p.vote_average.toFixed(1) : 'N/A' };
            grid.appendChild(crearCard(item));
        });
        peliPag = page;
        if (page >= peliTotal) btn.classList.add('oculto');
        else { btn.classList.remove('oculto'); btn.disabled = false; btn.innerHTML = '<i class="fas fa-plus"></i> Cargar más'; }
    } catch(e) { console.error(e); btn.innerHTML = '⚠️ Error'; btn.disabled = false; }
    cargandoP = false;
}
window.cargarMasPeliculas = function() { if (!cargandoP) cargarPeliculas(peliPag + 1); };

// ========== CARGAR SERIES ==========
async function cargarSeries(page = 1) {
    if (cargandoS || page > serieTotal && page > 1) return;
    cargandoS = true;
    const grid = document.getElementById('seriesGrid');
    const btn = document.getElementById('btnSeries');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Cargando...';
    if (page === 1) grid.innerHTML = '';
    try {
        const data = await fetchTMDB('tv/popular', { page });
        serieTotal = data.total_pages || 1;
        if (page === 1) grid.innerHTML = '';
        if (!data.results || !data.results.length) {
            if (page === 1) grid.innerHTML = '<p class="empty-msg">No hay series</p>';
            btn.classList.add('oculto');
            cargandoS = false;
            return;
        }
        data.results.forEach(s => {
            const item = { id: s.id, tmdb_id: s.id, titulo: s.name || 'Sin título', anio: s.first_air_date ? s.first_air_date.split('-')[0] : 'N/D', portada: getImg(s.poster_path), puntuacion: s.vote_average ? s.vote_average.toFixed(1) : 'N/A' };
            grid.appendChild(crearCard(item, 'serie'));
        });
        seriePag = page;
        if (page >= serieTotal) btn.classList.add('oculto');
        else { btn.classList.remove('oculto'); btn.disabled = false; btn.innerHTML = '<i class="fas fa-plus"></i> Cargar más'; }
    } catch(e) { console.error(e); btn.innerHTML = '⚠️ Error'; btn.disabled = false; }
    cargandoS = false;
}
window.cargarMasSeries = function() { if (!cargandoS) cargarSeries(seriePag + 1); };

// ========== FAVORITOS ==========
function cargarFavoritos() {
    const container = document.getElementById('favoritosContainer');
    if (!auth.currentUser) { container.innerHTML = '<p class="empty-msg">Inicia sesión</p>'; return; }
    const userId = auth.currentUser.uid;
    db.ref(`usuarios/${userId}/favoritos`).on('value', snap => {
        const data = snap.val();
        container.innerHTML = '';
        if (!data) { container.innerHTML = '<p class="empty-msg">Sin favoritos</p>'; return; }
        Object.values(data).forEach(item => {
            const div = document.createElement('div');
            div.className = 'card';
            div.style.flex = '0 0 80px';
            div.innerHTML = `<img src="${item.portada || 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg'}" class="poster" loading="lazy"><div class="info"><h4>${item.titulo}</h4></div>`;
            div.onclick = () => {
                const p = new URLSearchParams({ play: item.tmdb_id || item.id, tipo: item.tipo || 'pelicula' });
                window.location.href = `reproductor.html?${p}`;
            };
            container.appendChild(div);
        });
    });
}
auth.onAuthStateChanged(user => { if (user) cargarFavoritos(); });

// ========== SCROLL INFINITO ==========
const main = document.getElementById('mainContent');
main.addEventListener('scroll', function() {
    if (main.scrollTop + main.clientHeight >= main.scrollHeight - 100) {
        if (modoActual === 'peliculas') {
            const btn = document.getElementById('btnPeliculas');
            if (!btn.classList.contains('oculto') && !cargandoP) cargarMasPeliculas();
        } else if (modoActual === 'series') {
            const btn = document.getElementById('btnSeries');
            if (!btn.classList.contains('oculto') && !cargandoS) cargarMasSeries();
        }
    }
});

// ========== BUSCADOR ==========
window.buscarGlobal = async function() {
    const input = document.getElementById('searchInput');
    const texto = input.value.trim();
    
    // Si no hay texto, recargar la pestaña actual
    if (!texto) {
        if (modoActual === 'inicio') { cargarInicio(); return; }
        if (modoActual === 'peliculas') { cargarPeliculas(1); return; }
        if (modoActual === 'series') { cargarSeries(1); return; }
        return;
    }
    
    clearTimeout(timeoutBusqueda);
    timeoutBusqueda = setTimeout(async () => {
        try {
            // Buscar en el tipo correcto según la pestaña
            let data;
            let grid;
            let btn;
            
            if (modoActual === 'peliculas') {
                data = await fetchTMDB('search/movie', { query: texto, page: 1 });
                grid = document.getElementById('peliculasGrid');
                btn = document.getElementById('btnPeliculas');
            } else if (modoActual === 'series') {
                data = await fetchTMDB('search/tv', { query: texto, page: 1 });
                grid = document.getElementById('seriesGrid');
                btn = document.getElementById('btnSeries');
            } else {
                // En Inicio, buscar en ambos
                const [pelis, series] = await Promise.all([
                    fetchTMDB('search/movie', { query: texto, page: 1 }),
                    fetchTMDB('search/tv', { query: texto, page: 1 })
                ]);
                const pC = document.getElementById('popularesContainer');
                const sC = document.getElementById('seriesPopularesContainer');
                pC.innerHTML = ''; sC.innerHTML = '';
                let total = 0;
                if (pelis.results && pelis.results.length) {
                    pelis.results.slice(0, 12).forEach(p => {
                        const item = { id: p.id, tmdb_id: p.id, titulo: p.title || 'Sin título', anio: p.release_date ? p.release_date.split('-')[0] : 'N/D', portada: getImg(p.poster_path), puntuacion: p.vote_average ? p.vote_average.toFixed(1) : 'N/A' };
                        pC.appendChild(crearCard(item));
                        total++;
                    });
                }
                if (series.results && series.results.length) {
                    series.results.slice(0, 12).forEach(s => {
                        const item = { id: s.id, tmdb_id: s.id, titulo: s.name || 'Sin título', anio: s.first_air_date ? s.first_air_date.split('-')[0] : 'N/D', portada: getImg(s.poster_path), puntuacion: s.vote_average ? s.vote_average.toFixed(1) : 'N/A' };
                        sC.appendChild(crearCard(item, 'serie'));
                        total++;
                    });
                }
                if (total === 0) {
                    pC.innerHTML = `<p class="empty-msg">🔍 No se encontraron resultados para "${texto}"</p>`;
                    sC.innerHTML = '';
                }
                return;
            }
            
            // Mostrar skeletons
            grid.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const sk = document.createElement('div');
                sk.className = 'skeleton';
                grid.appendChild(sk);
            }
            
            grid.innerHTML = '';
            
            if (!data.results || !data.results.length) {
                grid.innerHTML = `<p class="empty-msg">🔍 No se encontraron resultados para "${texto}"</p>`;
                btn.classList.add('oculto');
                return;
            }
            
            const tipo = modoActual === 'series' ? 'serie' : 'pelicula';
            data.results.slice(0, 20).forEach(item => {
                const obj = {
                    id: item.id,
                    tmdb_id: item.id,
                    titulo: item.title || item.name || 'Sin título',
                    anio: item.release_date ? item.release_date.split('-')[0] : item.first_air_date ? item.first_air_date.split('-')[0] : 'N/D',
                    portada: getImg(item.poster_path),
                    puntuacion: item.vote_average ? item.vote_average.toFixed(1) : 'N/A'
                };
                grid.appendChild(crearCard(obj, tipo));
            });
            
            btn.classList.add('oculto');
        } catch(e) { console.error(e); }
    }, 300);
};

// ========== INICIAR ==========
cargarInicio();
cargarPeliculas(1);
cargarSeries(1);
console.log('✅ TELY - Todo en uno');
</script>
</body>
</html>
