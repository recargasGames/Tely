<!DOCTYPE html>
<html lang="es">
<head>

    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;background:#0A0A0F}
        body{background:#0A0A0F;color:#fff;font-family:'Segoe UI',Roboto,sans-serif;min-height:100vh;transition:background .3s,color .3s;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
        ::-webkit-scrollbar{display:none}
        body.dark{background:#0A0A0F;color:#fff}
        body:not(.dark){background:#f0f0f0;color:#111}
        
        .main-content{width:100%;height:100vh;padding:.3rem .5rem;overflow-y:auto;margin:0 auto;max-width:600px;padding-bottom:80px}
        
        .header-flotante{
            position:sticky;
            top:0;
            z-index:50;
            background:rgba(10,10,15,.92);
            backdrop-filter:blur(12px);
            padding:.3rem .3rem .4rem;
            border-bottom:1px solid rgba(124,58,237,.1);
        }
        body:not(.dark) .header-flotante{
            background:rgba(240,240,240,.92);
            border-bottom-color:rgba(0,0,0,.08);
        }
        
        .top-header{display:flex;justify-content:space-between;align-items:center;padding:.1rem 0 .2rem;flex-wrap:wrap;gap:.3rem}
        .top-header h1{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,#7C3AED,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .top-actions{display:flex;align-items:center;gap:.5rem}
        
        .theme-btn{background:rgba(255,255,255,.05);border:none;color:#fff;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:1.1rem;transition:.3s;display:flex;align-items:center;justify-content:center}
        .theme-btn:hover{background:rgba(255,255,255,.1)}
        body:not(.dark) .theme-btn{background:rgba(0,0,0,.05);color:#111}
        body:not(.dark) .theme-btn:hover{background:rgba(0,0,0,.1)}
        
        .user-btn{background:rgba(124,58,237,.15);border:none;color:#fff;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:1.1rem;transition:.3s;display:flex;align-items:center;justify-content:center}
        .user-btn:hover{background:rgba(124,58,237,.3)}
        body:not(.dark) .user-btn{color:#111}
        
        .tabs-container{display:flex;gap:.3rem;margin:.1rem 0 .2rem;background:rgba(255,255,255,.03);border-radius:10px;padding:.2rem;border:1px solid rgba(124,58,237,.08)}
        body:not(.dark) .tabs-container{background:rgba(0,0,0,.03);border-color:rgba(0,0,0,.06)}
        .tab-btn{flex:1;padding:.3rem .1rem;border:none;border-radius:8px;font-size:.85rem;font-weight:700;cursor:pointer;transition:.3s;background:transparent;color:#94A3B8}
        .tab-btn.active{background:#7C3AED;color:#fff}
        .tab-btn:hover:not(.active){background:rgba(124,58,237,.1);color:#fff}
        body:not(.dark) .tab-btn{color:#555}
        body:not(.dark) .tab-btn.active{color:#fff}
        body:not(.dark) .tab-btn:hover:not(.active){background:rgba(124,58,237,.08);color:#111}
        
        .search-bar{display:flex;align-items:center;gap:.3rem;position:relative;margin:.1rem 0}
        .search-bar input{flex:1;padding:.3rem .6rem;border-radius:9999px;border:2px solid rgba(124,58,237,.2);background:rgba(255,255,255,.05);color:#fff;font-size:.8rem;transition:.3s}
        .search-bar input:focus{outline:none;border-color:#7C3AED;background:rgba(255,255,255,.08)}
        .search-bar input::placeholder{color:#64748B;font-size:.75rem}
        body:not(.dark) .search-bar input{background:rgba(0,0,0,.05);color:#111;border-color:rgba(0,0,0,.1)}
        body:not(.dark) .search-bar input::placeholder{color:#888}
        .search-bar button{padding:.2rem .8rem;border-radius:9999px;border:none;background:#7C3AED;color:#fff;font-size:.75rem;cursor:pointer;transition:.3s}

        .search-results{display:none !important}
        
        .grid-movies{display:grid;grid-template-columns:repeat(4,1fr);gap:.4rem;padding:.2rem 0}
        
        .movie-card{background:rgba(255,255,255,.04);border-radius:6px;overflow:hidden;cursor:pointer;border:1px solid rgba(124,58,237,.06);transition:.3s;position:relative}

        body:not(.dark) .movie-card{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.06)}

        .movie-card .info h4{font-size:.6rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

        .movie-card .info .meta{display:flex;justify-content:space-between;font-size:.45rem;color:#94A3B8}
        .movie-card .badge-year{position:absolute;top:.15rem;left:.15rem;background:rgba(124,58,237,.85);color:#fff;padding:.03rem .25rem;border-radius:3px;font-size:.35rem;font-weight:700}

        .movie-card .badge-op2{position:absolute;bottom:.15rem;right:.15rem;background:rgba(59,130,246,.85);color:#fff;padding:.02rem .15rem;border-radius:3px;font-size:.3rem;font-weight:600}
        .movie-card .badge-db{position:absolute;bottom:.15rem;left:.15rem;font-size:.3rem;font-weight:700;padding:.01rem .15rem;border-radius:2px}
        .movie-card .badge-db.db1{background:rgba(16,185,129,.7);color:#fff}
        .movie-card .badge-db.db2{background:rgba(236,72,153,.7);color:#fff}
        
        .section-title{font-size:.85rem;font-weight:700;margin:.3rem 0 .15rem;display:flex;align-items:center;gap:.2rem}
        .section-title i{color:#7C3AED}
        body:not(.dark) .section-title{color:#111}
        
        .horizontal-scroll{display:flex;gap:.3rem;overflow-x:auto;padding:.15rem 0;scrollbar-width:none}
        .horizontal-scroll::-webkit-scrollbar{display:none}
        .horizontal-scroll .movie-card{flex:0 0 auto;width:80px}
        
        .skeleton{aspect-ratio:2/3;border-radius:6px;background:linear-gradient(90deg,#1A1A2E 25%,#2D2D44 50%,#1A1A2E 75%);background-size:200% 100%;animation:skeleton 1.5s infinite}
        body:not(.dark) .skeleton{background:linear-gradient(90deg,#e0e0e0 25%,#f0f0f0 50%,#e0e0e0 75%);background-size:200% 100%}
        @keyframes skeleton{0%{background-position:-200% 0}100%{background-position:200% 0}}
        
        .load-more{display:flex;justify-content:center;padding:.3rem 0;margin:.5rem 0}
        .load-more button{background:rgba(124,58,237,.15);color:#fff;padding:.3rem 1.2rem;border-radius:9999px;border:2px solid rgba(124,58,237,.2);font-weight:600;cursor:pointer;font-size:.7rem;transition:.3s}
        .load-more button:hover{background:rgba(124,58,237,.25);border-color:#7C3AED}
        body:not(.dark) .load-more button{color:#111;background:rgba(124,58,237,.1)}
        .load-more button:disabled{opacity:.4;cursor:not-allowed}
        
        .user-dropdown{position:absolute;right:0;top:calc(100% + 6px);background:rgba(26,26,46,.95);border-radius:8px;width:160px;border:1px solid rgba(124,58,237,.15);padding:.2rem 0;display:none;z-index:60;box-shadow:0 20px 60px rgba(0,0,0,.5)}
        .user-dropdown.show{display:block}
        body:not(.dark) .user-dropdown{background:rgba(255,255,255,.95);border-color:rgba(0,0,0,.1)}
        .user-dropdown a{display:flex;align-items:center;gap:.3rem;padding:.3rem .6rem;color:#CBD5E1;text-decoration:none;font-size:.75rem;transition:.2s}
        .user-dropdown a:hover{background:rgba(124,58,237,.08);color:#fff}
        body:not(.dark) .user-dropdown a{color:#333}
        body:not(.dark) .user-dropdown a:hover{background:rgba(124,58,237,.08);color:#111}
        .user-dropdown hr{margin:.05rem 0;border:none;border-top:1px solid rgba(124,58,237,.08)}
        .user-menu{position:relative}
        .empty-msg{color:#64748B;font-size:.7rem;padding:.15rem 0}
        .card-actions{display:flex;gap:2px;margin-top:1px;justify-content:center}
        .card-actions button{background:none;border:none;cursor:pointer;font-size:.5rem;padding:1px 3px;border-radius:2px;transition:.2s}
        .card-actions .fav-btn{color:#EF4444}
        .card-actions .fav-btn:hover{background:rgba(239,68,68,.15)}
        .card-actions .list-btn{color:#3B82F6}
        .card-actions .list-btn:hover{background:rgba(59,130,246,.15)}
        
        #bannerApp {
            display:none;
            position:fixed;
            bottom:0;
            left:0;
            right:0;
            background:linear-gradient(135deg,#1A1A2E,#2D2D44);
            border-top:2px solid #7C3AED;
            padding:.6rem .8rem;
            z-index:9999;
            box-shadow:0 -4px 30px rgba(124,58,237,.3);
            animation:slideUp 0.5s ease-out;
        }
        body:not(.dark) #bannerApp {
            background:linear-gradient(135deg,#f0f0f0,#e8e8e8);
            border-top-color:#7C3AED;
        }
        body:not(.dark) #bannerApp .banner-titulo{color:#111;}
        body:not(.dark) #bannerApp .banner-sub{color:#555;}
        
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        body.banner-activo {
            padding-bottom: 70px;
        }
        
        .banner-logo-img {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            object-fit: cover;
            background: #1A1A2E;
        }
        
        .banner-install-btn {
            background:linear-gradient(135deg,#7C3AED,#A78BFA);
            border:none;
            color:#fff;
            padding:.4rem 1.2rem;

            font-size:.75rem;
            cursor:pointer;
            transition:.3s;
            white-space:nowrap;

            align-items:center;
            gap:.3rem;
        }
        .banner-install-btn:hover {
            transform:scale(1.05);
            box-shadow:0 0 20px rgba(124,58,237,.4);
        }
        .banner-install-btn:active {
            transform:scale(0.95);
        }
    </style>
</head>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
// ============================================================
// 🔥 CONFIGURACIÓN - DB1 (PRINCIPAL)
// ============================================================
const firebaseConfig1 = {
    apiKey: "AIzaSyDSCjhkZBmBfpgsyLPdN50ISvgvzfGRH2Q",
    authDomain: "tely-c9776.firebaseapp.com",
    projectId: "tely-c9776",
    storageBucket: "tely-c9776.firebasestorage.app",
    messagingSenderId: "185494855835",
    appId: "1:185494855835:web:cb113139c6d5aeb472263e"
};

// ============================================================
// 🔥 CONFIGURACIÓN - DB2 (SECUNDARIA)
// ============================================================
const firebaseConfig2 = {
    apiKey: "AIzaSyCEw5ZmFF4wWBgkAb5dR_hh_DClFmtN4KE",
    authDomain: "tely-bd2.firebaseapp.com",
    projectId: "tely-bd2",
    storageBucket: "tely-bd2.firebasestorage.app",
    messagingSenderId: "784532605615",
    appId: "1:784532605615:web:dbf11b54673b7db6c1225a"
};

// ============================================================
// ⭐ INICIALIZAR - AUTENTICACIÓN SOLO EN DB1
// ============================================================
const app1 = firebase.initializeApp(firebaseConfig1, 'app1');
const auth = firebase.auth(app1);
const db1 = firebase.database(app1);

const app2 = firebase.initializeApp(firebaseConfig2, 'app2');
const db2 = firebase.database(app2);

// ============================================================
// ⭐⭐ PROXY Y CACHÉ
// ============================================================
const CACHE_TMDB = {};
const PROXY_URL = 'https://corsproxy.io/?';

async function fetchTMDB(path, params = {}) {
    const cacheKey = path + JSON.stringify(params);
    if (CACHE_TMDB[cacheKey]) {
        console.log('📦 Usando caché:', path);
        return CACHE_TMDB[cacheKey];
    }
    
    const q = new URLSearchParams({ path, ...params });
    const url = `https://tely-xi.vercel.app/api/tmdb?${q}`;
    try {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`Error: ${response.status}`);
        const data = await response.json();
        CACHE_TMDB[cacheKey] = data;
        return data;
    } catch(e) {
        console.error('❌ Error:', e);
        throw e;
    }
}

// ============================================================
// ⭐ CARGAR CONTENIDO DE FIREBASE (DB1 + DB2)
// ============================================================
async function cargarContenidoFirebase() {
    console.log('📡 Cargando contenido de Firebase...');
    
    try {
        const [pSnap1, sSnap1] = await Promise.all([
            db1.ref('contenido_personalizado').once('value'),
            db1.ref('series_personalizadas').once('value')
        ]);
        const pelis1 = pSnap1.val() || {};
        const series1 = sSnap1.val() || {};
        
        const [pSnap2, sSnap2] = await Promise.all([
            db2.ref('contenido_personalizado').once('value'),
            db2.ref('series_personalizadas').once('value')
        ]);
        const pelis2 = pSnap2.val() || {};
        const series2 = sSnap2.val() || {};
        
        const todasPelis = { ...pelis1, ...pelis2 };
        const todasSeries = { ...series1, ...series2 };
        
        mostrarContenidoFirebase(todasPelis, todasSeries);
        
    } catch(e) {
        console.error('❌ Error cargando Firebase:', e);
    }
}

function mostrarContenidoFirebase(pelis, series) {
    // Mostrar películas
    const container = document.getElementById('peliculasPopulares');
    container.innerHTML = '';
    const pelisArray = Object.values(pelis);
    if (pelisArray.length) {
        pelisArray.slice(0, 20).forEach(p => {
            const item = {
                id: p.tmdb_id || p.id,
                tmdb_id: p.tmdb_id || p.id,
                titulo: p.titulo || 'Sin título',
                anio: p.anio || 'N/D',
                portada: p.portada || 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg',
                puntuacion: p.puntuacion || 'N/A'
            };
            const card = crearTarjeta(item, false);
            const dbBadge = document.createElement('span');
            dbBadge.className = 'badge-db ' + (p._db || 'db1');
            dbBadge.textContent = p._db === 'db2' ? '🩷' : '🟢';
            card.querySelector('.badge-type').after(dbBadge);
            container.appendChild(card);
        });
    } else {
        container.innerHTML = '<p class="empty-msg">No hay películas en Firebase</p>';
    }
    
    // Mostrar series
    const sContainer = document.getElementById('seriesPopulares');
    sContainer.innerHTML = '';
    const seriesArray = Object.values(series);
    if (seriesArray.length) {
        seriesArray.slice(0, 20).forEach(s => {
            const item = {
                id: s.tmdb_id || s.id,
                tmdb_id: s.tmdb_id || s.id,
                titulo: s.titulo || 'Sin título',
                anio: s.anio || 'N/D',
                portada: s.portada || 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg',
                puntuacion: s.puntuacion || 'N/A'
            };
            const card = crearTarjeta(item, true);
            const dbBadge = document.createElement('span');
            dbBadge.className = 'badge-db ' + (s._db || 'db1');
            dbBadge.textContent = s._db === 'db2' ? '🩷' : '🟢';
            card.querySelector('.badge-type').after(dbBadge);
            sContainer.appendChild(card);
        });
    } else {
        sContainer.innerHTML = '<p class="empty-msg">No hay series en Firebase</p>';
    }
}

// ============================================================
// ⭐ CREAR TARJETA (CON REDIRECCIÓN)
// ============================================================
function crearTarjeta(item, esSerie = false) {
    const div = document.createElement('div');
    div.className = 'movie-card';
    const tipo = esSerie ? '📺' : '🎬';
    const idReal = item.tmdb_id || item.id;
    const tipoReal = esSerie ? 'serie' : 'pelicula';
    
    div.innerHTML = `
        <span class="badge-year">${item.anio || 'N/D'}</span>
        <span class="badge-type">${tipo}</span>
        <img src="${item.portada}" class="poster" loading="lazy" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg'">
        <div class="info">
            <h4>${item.titulo}</h4>
            <div class="meta"><span>⭐ ${item.puntuacion || 'N/A'}</span></div>
            <div class="card-actions">
                <button class="fav-btn" onclick="event.stopPropagation(); toggleFavorito({id:'${idReal}', titulo:'${item.titulo}', tipo:'${tipoReal}', portada:'${item.portada}', tmdb_id:'${idReal}'})"><i class="fas fa-heart"></i></button>

// ============================================================
let paginaPeliculas = 1, paginaSeries = 1;
let cargandoPeliculas = false, cargandoSeries = false;
let totalPaginasPeliculas = 1, totalPaginasSeries = 1;
let scrollTimeout = null, timeoutBusqueda = null;

async function cargarPeliculasTMDB(page = 1) {
    if (cargandoPeliculas || (page > totalPaginasPeliculas && page > 1)) return;
    cargandoPeliculas = true;
    const grid = document.getElementById('gridPeliculas');
    const btn = document.getElementById('btnMasPeliculas');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Cargando...';
    if (page === 1) grid.innerHTML = '';
    try {
        const data = await fetchTMDB('movie/popular', { page });
        totalPaginasPeliculas = data.total_pages || 1;
        if (!data.results || !data.results.length) {
            if (page === 1) grid.innerHTML = '<p class="empty-msg">No hay películas</p>';
            btn.style.display = 'none';
            cargandoPeliculas = false;
            return;
        }
        data.results.forEach(p => {
            const item = {
                id: p.id, tmdb_id: p.id,
                titulo: p.title || 'Sin título',
                anio: p.release_date ? p.release_date.split('-')[0] : 'N/D',
                portada: getImagenUrl(p.poster_path, 'w342'),
                puntuacion: p.vote_average ? p.vote_average.toFixed(1) : 'N/A'
            };
            grid.appendChild(crearTarjeta(item));
        });
        paginaPeliculas = page;
        if (page >= totalPaginasPeliculas) btn.style.display = 'none';
        else { btn.style.display = 'flex'; btn.disabled = false; btn.innerHTML = '<i class="fas fa-plus"></i> Cargar más'; }
    } catch(e) { console.error(e); btn.innerHTML = '⚠️ Error'; btn.disabled = false; }
    cargandoPeliculas = false;
}

window.cargarMasPeliculas = function() {
    if (!cargandoPeliculas) { paginaPeliculas++; cargarPeliculasTMDB(paginaPeliculas); }
};

// ============================================================
// BUSCADOR GLOBAL
// ============================================================
window.buscarGlobal = async function() {
    const input = document.getElementById('searchInput');
    const texto = input.value.trim();
    
    if (!texto) {
        if (document.getElementById('tabInicio').style.display !== 'none') { cargarContenidoFirebase(); return; }
        if (document.getElementById('tabPeliculas').style.display !== 'none') { cargarPeliculasTMDB(1); return; }
        if (document.getElementById('tabSeries').style.display !== 'none') { cargarSeriesTMDB(1); return; }
        return;
    }
    
    clearTimeout(timeoutBusqueda);
    timeoutBusqueda = setTimeout(async () => {
        try {
            let grid, btn, tipo, data;
            const esPeliculas = document.getElementById('tabPeliculas').style.display !== 'none';
            const esSeries = document.getElementById('tabSeries').style.display !== 'none';
            
            if (esPeliculas) {
                data = await fetchTMDB('search/movie', { query: texto, page: 1 });
                grid = document.getElementById('gridPeliculas');
                btn = document.getElementById('btnMasPeliculas');
                tipo = 'pelicula';
            } else if (esSeries) {
                data = await fetchTMDB('search/tv', { query: texto, page: 1 });
                grid = document.getElementById('gridSeries');
                btn = document.getElementById('btnMasSeries');
                tipo = 'serie';
            } else {
                // Buscar en Firebase
                const resultados = await buscarEnFirebase(texto);
                const pC = document.getElementById('peliculasPopulares');
                const sC = document.getElementById('seriesPopulares');
                pC.innerHTML = '';
                sC.innerHTML = '';
                
                let total = 0;
                if (resultados.peliculas && resultados.peliculas.length) {
                    resultados.peliculas.slice(0, 20).forEach(p => {
                        pC.appendChild(crearTarjeta(p));
                        total++;
                    });
                }
                if (resultados.series && resultados.series.length) {
                    resultados.series.slice(0, 20).forEach(s => {
                        sC.appendChild(crearTarjeta(s, true));
                        total++;
                    });
                }
                
                if (total === 0) {
                    const [pelisTMDB, seriesTMDB] = await Promise.all([
                        fetchTMDB('search/movie', { query: texto, page: 1 }),
                        fetchTMDB('search/tv', { query: texto, page: 1 })
                    ]);
                    
                    if (pelisTMDB.results && pelisTMDB.results.length) {
                        pelisTMDB.results.slice(0, 12).forEach(p => {
                            const item = {
                                id: p.id, tmdb_id: p.id,
                                titulo: p.title || 'Sin título',
                                anio: p.release_date ? p.release_date.split('-')[0] : 'N/D',
                                portada: getImagenUrl(p.poster_path, 'w342'),
                                puntuacion: p.vote_average ? p.vote_average.toFixed(1) : 'N/A'
                            };
                            pC.appendChild(crearTarjeta(item));
                            total++;
                        });
                    }
                    if (seriesTMDB.results && seriesTMDB.results.length) {
                        seriesTMDB.results.slice(0, 12).forEach(s => {
                            const item = {
                                id: s.id, tmdb_id: s.id,
                                titulo: s.name || 'Sin título',
                                anio: s.first_air_date ? s.first_air_date.split('-')[0] : 'N/D',
                                portada: getImagenUrl(s.poster_path, 'w342'),
                                puntuacion: s.vote_average ? s.vote_average.toFixed(1) : 'N/A'
                            };
                            sC.appendChild(crearTarjeta(item, true));
                            total++;
                        });
                    }
                }
                
                if (total === 0) {
                    pC.innerHTML = `<p class="empty-msg">🔍 No se encontraron resultados para "${texto}"</p>`;
                    sC.innerHTML = '';
                }
                return;
            }
            
            grid.innerHTML = '';
            for (let i = 0; i < 12; i++) {
                const sk = document.createElement('div');
                sk.className = 'skeleton';
                grid.appendChild(sk);
            }
            
            grid.innerHTML = '';
            if (!data.results || !data.results.length) {
                grid.innerHTML = `<p class="empty-msg">🔍 No se encontraron ${tipo === 'pelicula' ? 'películas' : 'series'} para "${texto}"</p>`;
                btn.style.display = 'none';
                return;
            }
            
            data.results.slice(0, 20).forEach(item => {
                const obj = {
                    id: item.id,
                    tmdb_id: item.id,
                    titulo: item.title || item.name || 'Sin título',
                    anio: item.release_date ? item.release_date.split('-')[0] : item.first_air_date ? item.first_air_date.split('-')[0] : 'N/D',
                    portada: getImagenUrl(item.poster_path, 'w342'),
                    puntuacion: item.vote_average ? item.vote_average.toFixed(1) : 'N/A'
                };
                grid.appendChild(crearTarjeta(obj, tipo === 'serie'));
            });
            btn.style.display = 'none';
        } catch(e) { console.error(e); }
    }, 300);
};

// ============================================================
// BUSCAR EN FIREBASE
// ============================================================
async function buscarEnFirebase(texto) {
    const resultados = { peliculas: [], series: [] };
    const textoLower = texto.toLowerCase();
    
    try {
        const [pSnap1, sSnap1] = await Promise.all([
            db1.ref('contenido_personalizado').once('value'),
            db1.ref('series_personalizadas').once('value')
        ]);
        const pelis1 = pSnap1.val() || {};
        const series1 = sSnap1.val() || {};
        
        for (const key of Object.keys(pelis1)) {
            const p = pelis1[key];
            if (p.titulo && p.titulo.toLowerCase().includes(textoLower)) {
                resultados.peliculas.push({
                    id: p.tmdb_id || key,
                    tmdb_id: p.tmdb_id || key,
                    titulo: p.titulo,
                    anio: p.anio || 'N/D',
                    portada: p.portada || 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg',
                    puntuacion: p.puntuacion || 'N/A'
                });
            }
        }
        for (const key of Object.keys(series1)) {
            const s = series1[key];
            if (s.titulo && s.titulo.toLowerCase().includes(textoLower)) {
                resultados.series.push({
                    id: s.tmdb_id || key,
                    tmdb_id: s.tmdb_id || key,
                    titulo: s.titulo,
                    anio: s.anio || 'N/D',
                    portada: s.portada || 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg',
                    puntuacion: s.puntuacion || 'N/A'
                });
            }
        }
        
        const [pSnap2, sSnap2] = await Promise.all([
            db2.ref('contenido_personalizado').once('value'),
            db2.ref('series_personalizadas').once('value')
        ]);
        const pelis2 = pSnap2.val() || {};
        const series2 = sSnap2.val() || {};
        
        for (const key of Object.keys(pelis2)) {
            const p = pelis2[key];
            if (p.titulo && p.titulo.toLowerCase().includes(textoLower)) {
                const existe = resultados.peliculas.some(r => r.tmdb_id == p.tmdb_id);
                if (!existe) {
                    resultados.peliculas.push({
                        id: p.tmdb_id || key,
                        tmdb_id: p.tmdb_id || key,
                        titulo: p.titulo,
                        anio: p.anio || 'N/D',
                        portada: p.portada || 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg',
                        puntuacion: p.puntuacion || 'N/A'
                    });
                }
            }
        }
        for (const key of Object.keys(series2)) {
            const s = series2[key];
            if (s.titulo && s.titulo.toLowerCase().includes(textoLower)) {
                const existe = resultados.series.some(r => r.tmdb_id == s.tmdb_id);
                if (!existe) {
                    resultados.series.push({
                        id: s.tmdb_id || key,
                        tmdb_id: s.tmdb_id || key,
                        titulo: s.titulo,
                        anio: s.anio || 'N/D',
                        portada: s.portada || 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg',
                        puntuacion: s.puntuacion || 'N/A'
                    });
                }
            }
        }
        
    } catch(e) {
        console.error('Error buscando en Firebase:', e);
    }
    
    return resultados;
}

function detectarPlataforma() {
    const ua = navigator.userAgent || '';
    const esWebView = /wv|WebView|Android.*(wv|WebView)/i.test(ua);
    const esNavegador = !esWebView && /Android|iPhone|iPad|iPod/i.test(ua);
    return { esWebView, esNavegador };
}
