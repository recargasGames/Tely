        .badge-video { display:inline-block; font-size:0.6rem; background:#7C3AED; padding:0.15rem 0.6rem; border-radius:12px; color:#fff; margin-top:0.2rem; }
        .badge-sin-video { display:inline-block; font-size:0.6rem; background:#333; padding:0.15rem 0.6rem; border-radius:12px; color:#666; margin-top:0.2rem; }

        .btn-perfil { background:none; border:none; color:#fff; font-size:1.5rem; cursor:pointer; }

        .dropdown-header { padding:0.8rem; border-bottom:1px solid #2a2a3a; font-weight:bold; color:#A78BFA; }

        .caja-login { background:#151520; padding:2.5rem; border-radius:12px; width:100%; max-width:360px; text-align:center; box-shadow:0 0 20px rgba(124,58,237,0.2); }
        .btn-google { width:100%; padding:1rem; background:#fff; color:#333; border:none; border-radius:8px; font-weight:bold; margin-top:1.5rem; display:flex; align-items:center; justify-content:center; gap:0.8rem; cursor:pointer; }

        .lista-capitulos { display:grid; grid-template-columns:repeat(auto-fill, minmax(120px, 1fr)); gap:0.6rem; }
        .btn-capitulo { padding:0.6rem; border-radius:6px; border:none; background:#1e1e2f; color:#fff; cursor:pointer; text-align:center; font-size:0.9rem; }

        <button class="btn-google" onclick="iniciarConGoogle()"><i class="fa-brands fa-google"></i> Continuar con Google</button>

</div>

<div id="modal-video" class="modal-video oculto">

        <h4 class="text-sm text-gray-300 mb-2">Selecciona temporada y capítulo</h4>
        <div class="selector-temporadas" id="selectorTemporadas"></div>
        <div class="lista-capitulos" id="listaCapitulos"></div>
    </div>
</div><script>

// ==============================================

const TMDB_TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI4ZGQ5OWI1YTE1YWNmZGQ5OGUzYjI0OWQ1Zjg5MGFmNCIsIm5iZiI6MTc4MjI3NzIzMS4zMzMsInN1YiI6IjZhM2I2NDZmZThmMTMwOTc2MWVjNDYxYiIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.JLmHWuXkhDc9LreAvXFZa0qTS7PR_nrj_SSwVm9UZ9Y";

        ]
      },

        capitulos: [
          { numero: 1, titulo: 'Seven Thirty-Seven', video: '' },

        ]
      }
    ]
  }
];

// ==============================================
// 📦 CARGA DE CONTENIDO (TMDb + TU CONTENIDO)
// ==============================================
let contenido = [];

async function cargarContenidoCompleto() {
  document.getElementById("tituloSeccion").textContent = "Recientes";
  const lista = document.getElementById("lista-contenido");
  lista.innerHTML = '<div class="col-span-2 text-center py-10 text-gray-400">Cargando...</div>';

  try {
    // 1. Cargar películas populares de TMDb (SOLO PORTADAS)
    const resPeliculas = await fetch(`${TMDB_BASE}/movie/popular?language=${TMDB_LANG}&page=1`, opcionesTMDB);
    const datosPeliculas = await resPeliculas.json();

    const resSeries = await fetch(`${TMDB_BASE}/tv/popular?language=${TMDB_LANG}&page=1`, opcionesTMDB);
    const datosSeries = await resSeries.json();

    // 2. Convertir datos de TMDb a formato compatible (sin video)
    const pelisTMDB = datosPeliculas.results.slice(0, 10).map(p => ({
      id: `tmdb_${p.id}`,
      titulo: p.title,
      anio: p.release_date ? p.release_date.split("-")[0] : "N/D",
      tipo: "pelicula",
      categoria: "peliculas",
      portada: p.poster_path ? `${TMDB_IMG}${p.poster_path}` : "portada-default.png",
      video: "",
      deTMDB: true
    }));

    const seriesTMDB = datosSeries.results.slice(0, 8).map(s => ({
      id: `tmdb_${s.id}`,
      titulo: s.name,
      anio: s.first_air_date ? s.first_air_date.split("-")[0] : "N/D",
      tipo: "serie",
      categoria: "series",
      portada: s.poster_path ? `${TMDB_IMG}${s.poster_path}` : "portada-default.png",
      temporadas: [],
      deTMDB: true
    }));

    // 3. UNIR: TU CONTENIDO (con video) + TMDb (sin video)
    contenido = [
      ...MI_CONTENIDO,
      ...pelisTMDB,
      ...seriesTMDB
    ];

    // 4. Mostrar la categoría "recientes"
    mostrarContenido("recientes");

  } catch (err) {
    console.error("Error TMDB:", err);
    // Si falla TMDb, mostrar solo tu contenido
    contenido = [...MI_CONTENIDO];
    mostrarContenido("recientes");
  }
}

// ==============================================
// 📋 FUNCIONES GENERALES
// ==============================================
function agregarAlHistorial(item) {
  let historial = JSON.parse(localStorage.getItem("historialTely")) || [];
  historial = historial.filter(h => h.id !== item.id);
  historial.unshift({ id: item.id, titulo: item.titulo, tipo: item.tipo });
  if (historial.length > 10) historial.pop();
  localStorage.setItem("historialTely", JSON.stringify(historial));
  mostrarHistorial();
}

function mostrarHistorial() {
  const contenedor = document.getElementById("listaHistorial");
  const historial = JSON.parse(localStorage.getItem("historialTely")) || [];
  contenedor.innerHTML = historial.length ? "" : `<div class="historial-vacio">Aún no has visto nada</div>`;
  historial.forEach(item => {
    const btn = document.createElement("button");
    btn.innerHTML = `<i class="fa-solid fa-play mr-2"></i> ${item.titulo}`;
    btn.onclick = () => {
      const encontrado = contenido.find(c => c.id === item.id);
      if (!encontrado) return;
      auth.currentUser ?
        (encontrado.tipo === "pelicula" ? abrirVideoPelicula(encontrado) : abrirSerie(encontrado)) :
        (videoPendiente = encontrado, abrirModalLogin(), toggleMenu());
    };
    contenedor.appendChild(btn);
  });
}

function limpiarHistorial() {
  localStorage.removeItem("historialTely");
  mostrarHistorial();
}

function mostrarContenido(categoria) {
  const lista = document.getElementById("lista-contenido");
  lista.innerHTML = "";
  
  // Primero mostrar las de tu catálogo (con video), luego las de TMDb
  const misItems = MI_CONTENIDO.filter(i => i.categoria === categoria);
  const otrosItems = contenido.filter(i => i.categoria === categoria && !MI_CONTENIDO.includes(i));

  const filtrados = [...misItems, ...otrosItems];

  if (filtrados.length === 0) {
    lista.innerHTML = `<p class="col-span-2 text-center text-gray-400 py-10">Sin contenido en esta categoría</p>`;
    return;
  }

  filtrados.forEach(item => {
    const tarjeta = document.createElement("div");
    tarjeta.className = "tarjeta";
    
    const tieneVideo = item.video || (item.temporadas && item.temporadas.length > 0 && item.temporadas[0].capitulos.some(c => c.video));
    
    tarjeta.innerHTML = `
      <img src="${item.portada}" alt="${item.titulo}" class="portada" loading="lazy">
      <div class="info-tarjeta">
        <h3 class="font-medium truncate">${item.titulo}</h3>
        <p class="anio">${item.anio} • ${item.tipo === "pelicula" ? "Película" : "Serie"}</p>
        ${tieneVideo ? '<span class="badge-video">▶ Disponible</span>' : '<span class="badge-sin-video">🔒 Sin video</span>'}
      </div>
    `;
    
    tarjeta.onclick = () => {
      if (!tieneVideo) {
        alert('⚠️ Este contenido solo tiene portada, no tiene video disponible.');
        return;
      }
      auth.currentUser ?
        (item.tipo === "pelicula" ? abrirVideoPelicula(item) : abrirSerie(item)) :
        (videoPendiente = item, abrirModalLogin());
    };
    lista.appendChild(tarjeta);
  });
}

function cambiarCategoria(cat) {
  document.querySelectorAll(".btn-cat").forEach(b => b.classList.remove("activo"));
  event.target.classList.add("activo");
  const titulos = { recientes: "Recientes", peliculas: "Películas", series: "Series", anime: "Anime" };
  document.getElementById("tituloSeccion").textContent = titulos[cat];
  mostrarContenido(cat);
}

function toggleMenu() {
  mostrarHistorial();
  document.getElementById("menuPerfil").classList.toggle("mostrar");
}

window.onclick = e => {
  if (!e.target.matches(".btn-perfil, .btn-perfil *")) document.getElementById("menuPerfil").classList.remove("mostrar");
};

// ==============================================
// 🔐 INICIO DE SESIÓN
// ==============================================
function abrirModalLogin() { document.getElementById("modal-login").classList.remove("oculto"); }
function cerrarModalLogin() { document.getElementById("modal-login").classList.add("oculto"); videoPendiente = null; }

function iniciarConGoogle() {
  const proveedor = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(proveedor)
    .then(res => {
      document.getElementById("nombrePerfil").textContent = res.user.displayName;
      cerrarModalLogin();
      if (videoPendiente) {
        videoPendiente.tipo === "pelicula" ? abrirVideoPelicula(videoPendiente) : abrirSerie(videoPendiente);
        agregarAlHistorial(videoPendiente);
        videoPendiente = null;
      }
    })
    .catch(err => alert("Error: " + err.message));
}

function cerrarSesion() { auth.signOut().then(() => document.getElementById("nombrePerfil").textContent = "Invitado"); }

// ==============================================
// 🎬 REPRODUCTOR CORREGIDO (con <object> para VidMoly)
// ==============================================
function abrirVideoPelicula(peli) {
  const player = document.getElementById("netflixPlayer");
  const modal = document.getElementById("modal-video");
  const seccionCap = document.getElementById("seccionCapitulos");
  modal.classList.remove("oculto");
  seccionCap.classList.add("oculto");
  document.body.style.overflow = "hidden";
  player.innerHTML = "";

  if (!peli.video) {
    player.innerHTML = `<div class="error-video">❌ Enlace de video no agregado</div>`;
    return;
  }

  let src = peli.video;
  let esVidMoly = src.includes('vidmoly');
  
  // 🆕 Si es VidMoly y NO es embed, usar <object> que funciona mejor
  if (esVidMoly && !src.includes('embed')) {
    player.innerHTML = `
      <object type="text/html" data="${src}" style="width:100%; height:100%; border:none; background:#000;"></object>
      <div class="player-top">
        <h3 class="titulo-video">${peli.titulo} (${peli.anio})</h3>
        <button class="btn-cerrar-video" onclick="cerrarVideo()">✕</button>
      </div>
    `;
  } else {
    // Para YouTube y otros servicios que sí funcionan con iframe
    player.innerHTML = `
      <iframe src="${src}" frameborder="0" allow="autoplay; fullscreen; encrypted-media" allowfullscreen></iframe>
      <div class="player-top">
        <h3 class="titulo-video">${peli.titulo} (${peli.anio})</h3>
        <button class="btn-cerrar-video" onclick="cerrarVideo()">✕</button>
      </div>
    `;
  }
  
  agregarAlHistorial(peli);
}

function abrirSerie(serie) {
  serieActual = serie;
  const player = document.getElementById("netflixPlayer");
  const modal = document.getElementById("modal-video");
  const seccionCap = document.getElementById("seccionCapitulos");
  modal.classList.remove("oculto");
  seccionCap.classList.remove("oculto");
  document.body.style.overflow = "hidden";
  player.innerHTML = `<div class="error-video">Selecciona temporada y capítulo</div>`;

  if (!serie.temporadas || serie.temporadas.length === 0) {
    player.innerHTML = `<div class="error-video">❌ Sin temporadas registradas</div>`;
    return;
  }

  const contTemporadas = document.getElementById("selectorTemporadas");
  contTemporadas.innerHTML = "";
  serie.temporadas.forEach((temp, idx) => {
    const btn = document.createElement("button");
    btn.className = `btn-temporada ${idx === 0 ? "activa" : ""}`;
    btn.textContent = temp.nombre;
    btn.onclick = () => {
      document.querySelectorAll(".btn-temporada").forEach(b => b.classList.remove("activa"));
      btn.classList.add("activa");
      mostrarCapitulos(temp);
    };
    contTemporadas.appendChild(btn);
  });

  mostrarCapitulos(serie.temporadas[0]);
  agregarAlHistorial(serie);
}

function mostrarCapitulos(temporada) {
  const contCap = document.getElementById("listaCapitulos");
  contCap.innerHTML = "";
  temporada.capitulos.forEach(cap => {
    const btn = document.createElement("button");
    btn.className = "btn-capitulo";
    btn.textContent = `Cap. ${cap.numero}`;
    btn.onclick = () => {
      document.querySelectorAll(".btn-capitulo").forEach(b => b.classList.remove("activo"));
      btn.classList.add("activo");
      reproducirCapitulo(cap);
    };
    contCap.appendChild(btn);
  });
}

function reproducirCapitulo(cap) {
  const player = document.getElementById("netflixPlayer");
  if (!cap.video) {
    player.innerHTML = `<div class="error-video">❌ Capítulo sin enlace</div>`;
    return;
  }
  
  let src = cap.video;
  let esVidMoly = src.includes('vidmoly');
  
  if (esVidMoly && !src.includes('embed')) {
    player.innerHTML = `
      <object type="text/html" data="${src}" style="width:100%; height:100%; border:none; background:#000;"></object>
      <div class="player-top">
        <h3 class="titulo-video">${serieActual.titulo} - Capítulo ${cap.numero}</h3>
        <button class="btn-cerrar-video" onclick="cerrarVideo()">✕</button>
      </div>
    `;
  } else {
    player.innerHTML = `
      <iframe src="${src}" frameborder="0" allow="autoplay; fullscreen; encrypted-media" allowfullscreen></iframe>
      <div class="player-top">
        <h3 class="titulo-video">${serieActual.titulo} - Capítulo ${cap.numero}</h3>
        <button class="btn-cerrar-video" onclick="cerrarVideo()">✕</button>
      </div>
    `;
  }
}

function cerrarVideo() {
  document.getElementById("modal-video").classList.add("oculto");
  document.body.style.overflow = "auto";
  serieActual = null;
}
