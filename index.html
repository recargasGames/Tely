                        naranja: '#F59E0B',

<body><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;max-width:100%;overflow-x:hidden;min-height:100vh;background:#0A0A0F;color:#fff;font-family:'Segoe UI',Roboto,sans-serif;scroll-behavior:smooth}
body.dark{background:#0A0A0F;color:#fff}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#7C3AED;border-radius:4px}

header{padding:0.8rem 1.2rem;background:rgba(10,10,15,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(124,58,237,0.15);position:sticky;top:0;z-index:50}
.logo-contenedor{display:flex;align-items:center;gap:0.6rem}
.logo{height:36px;width:auto;object-fit:contain}
.titulo-app{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,#7C3AED,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.btn-menu{background:rgba(124,58,237,0.15);border:none;font-size:1.2rem;cursor:pointer;color:#fff;padding:.5rem;border-radius:50%;transition:.3s;width:40px;height:40px;display:flex;align-items:center;justify-content:center}
.btn-menu:hover{background:rgba(124,58,237,0.3);transform:scale(1.05)}
.btn-perfil{background:rgba(124,58,237,0.15);border:none;font-size:1.3rem;cursor:pointer;color:#fff;padding:.5rem;border-radius:50%;transition:.3s;width:40px;height:40px;display:flex;align-items:center;justify-content:center}
.btn-perfil:hover{background:rgba(124,58,237,0.3);transform:scale(1.05)}
.menu-derecha{display:flex;align-items:center;gap:.6rem}

.pestanas{display:flex;gap:0.4rem;padding:0.6rem 1.2rem;flex-wrap:wrap;background:rgba(10,10,15,0.6);backdrop-filter:blur(8px);border-bottom:1px solid rgba(124,58,237,0.08);overflow-x:auto;white-space:nowrap}
.pestanas::-webkit-scrollbar{height:2px}
.btn-pestana{padding:0.4rem 1rem;border-radius:9999px;border:none;font-weight:600;cursor:pointer;font-size:0.75rem;transition:all .3s ease;white-space:nowrap;flex-shrink:0}
.btn-pestana.inactiva{background:rgba(255,255,255,0.05);color:#94A3B8}
.btn-pestana.inactiva:hover{background:rgba(255,255,255,0.1);color:#fff}
.btn-pestana.activa{background:#7C3AED;color:#fff;box-shadow:0 4px 15px rgba(124,58,237,0.4)}

.buscador{display:flex;align-items:center;gap:.6rem;padding:.6rem 1.2rem .8rem;flex-wrap:wrap}
.input-buscar{flex:1;min-width:160px;padding:.7rem 1rem;border-radius:9999px;border:2px solid rgba(124,58,237,0.2);background:rgba(255,255,255,0.05);color:#fff;font-size:.9rem;transition:.3s;backdrop-filter:blur(8px)}
.input-buscar:focus{outline:none;border-color:#7C3AED;box-shadow:0 0 30px rgba(124,58,237,0.15)}
.input-buscar::placeholder{color:#64748B}
.btn-buscar{background:#7C3AED;border:none;font-size:1rem;cursor:pointer;color:#fff;padding:.7rem 1rem;border-radius:9999px;transition:.3s}
.btn-buscar:hover{background:#6D28D9;transform:scale(1.05);box-shadow:0 4px 20px rgba(124,58,237,0.4)}
.contador{background:rgba(255,255,255,0.05);padding:.4rem .8rem;border-radius:9999px;font-weight:500;font-size:.7rem;color:#94A3B8;border:1px solid rgba(124,58,237,0.1)}

/* ===== SECCIONES CON SCROLL ===== */
.seccion-populares,.seccion-recientes{padding:0 1.2rem 1rem}
.seccion-populares .titulo-seccion,.seccion-recientes .titulo-seccion{font-size:1.1rem;font-weight:700;margin-bottom:.5rem;display:flex;align-items:center;gap:.5rem;color:#fff}
.seccion-populares .titulo-seccion i{color:#F59E0B}
.seccion-recientes .titulo-seccion i{color:#7C3AED}
.seccion-populares .ver-mas{font-size:.7rem;color:#94A3B8;cursor:pointer;margin-left:auto}
.seccion-populares .ver-mas:hover{color:#fff}

.scroll-populares,.scroll-recientes{display:flex;gap:.6rem;overflow-x:auto;padding:.3rem 0 .6rem;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.scroll-populares::-webkit-scrollbar,.scroll-recientes::-webkit-scrollbar{height:3px}
.scroll-populares::-webkit-scrollbar-track,.scroll-recientes::-webkit-scrollbar-track{background:rgba(255,255,255,0.05);border-radius:4px}
.scroll-populares::-webkit-scrollbar-thumb,.scroll-recientes::-webkit-scrollbar-thumb{background:#7C3AED;border-radius:4px}

/* ===== INDICADORES DE SCROLL (3 puntitos) ===== */
.scroll-indicators{display:flex;justify-content:center;gap:6px;margin-top:4px}
.scroll-dot{width:6px;height:6px;border-radius:50%;background:#475569;transition:.3s}
.scroll-dot.activo{background:#7C3AED;width:16px;border-radius:4px}

/* ===== TARJETAS POPULARES ===== */
.tarjeta-popular{flex:0 0 auto;width:120px;border-radius:10px;overflow:hidden;background:rgba(255,255,255,0.04);cursor:pointer;transition:all .3s ease;scroll-snap-align:start;border:1px solid rgba(124,58,237,0.08)}
.tarjeta-popular:hover{transform:scale(1.05) translateY(-4px);box-shadow:0 8px 25px rgba(124,58,237,0.2);border-color:rgba(124,58,237,0.3)}
.tarjeta-popular .portada-popular{width:100%;aspect-ratio:2/3;object-fit:cover}
.tarjeta-popular .info-popular{padding:.3rem;text-align:center}
.tarjeta-popular .info-popular h4{font-size:.65rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#E2E8F0}

/* ===== TARJETAS RECIENTES ===== */
.tarjeta-reciente{flex:0 0 auto;width:100px;border-radius:10px;overflow:hidden;background:rgba(255,255,255,0.04);cursor:pointer;transition:all .3s ease;scroll-snap-align:start;border:1px solid rgba(124,58,237,0.08)}
.tarjeta-reciente:hover{transform:scale(1.05) translateY(-4px);box-shadow:0 8px 25px rgba(124,58,237,0.2);border-color:rgba(124,58,237,0.3)}
.tarjeta-reciente .portada-reciente{width:100%;aspect-ratio:2/3;object-fit:cover}
.tarjeta-reciente .info-reciente{padding:.3rem;text-align:center}
.tarjeta-reciente .info-reciente h4{font-size:.6rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#E2E8F0}

/* ===== GRID DE CONTENIDO - TARJETAS MÁS PEQUEÑAS ===== */
.grid-contenido{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:.6rem;padding:0 1.2rem 1.5rem}
@media(max-width:480px){.grid-contenido{grid-template-columns:repeat(3,1fr);gap:.4rem}}
@media(min-width:768px){.grid-contenido{grid-template-columns:repeat(5,1fr);gap:.6rem}}
@media(min-width:1024px){.grid-contenido{grid-template-columns:repeat(6,1fr);gap:.6rem}}

.tarjeta{border-radius:10px;overflow:hidden;background:rgba(255,255,255,0.04);cursor:pointer;transition:all .35s cubic-bezier(.25,.46,.45,.94);position:relative;border:1px solid rgba(124,58,237,0.06);backdrop-filter:blur(4px)}
.tarjeta:hover{transform:translateY(-4px) scale(1.03);box-shadow:0 8px 25px rgba(124,58,237,0.2);border-color:rgba(124,58,237,0.2)}
.tarjeta:active{transform:scale(.97)}
.portada{width:100%;aspect-ratio:2/3;object-fit:cover}
.etiqueta-anio{position:absolute;top:.3rem;left:.3rem;background:rgba(124,58,237,0.85);color:#fff;padding:.05rem .35rem;border-radius:3px;font-size:.5rem;font-weight:700;backdrop-filter:blur(4px)}
.estrella{position:absolute;top:.3rem;right:.3rem;color:#F59E0B;font-size:.55rem;text-shadow:0 2px 10px rgba(245,158,11,0.5)}
.info-tarjeta{padding:.3rem}
.info-tarjeta h3{font-size:.65rem;font-weight:600;margin-bottom:.05rem;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#F1F5F9}
.badge-video{font-size:.45rem;color:#34D399;font-weight:600;background:rgba(52,211,153,0.12);padding:.05rem .25rem;border-radius:3px;display:inline-block}
.badge-sin-video{font-size:.45rem;color:#64748B;font-weight:500;background:rgba(100,116,139,0.1);padding:.05rem .25rem;border-radius:3px;display:inline-block}
.badge-serie{font-size:.45rem;color:#A78BFA;font-weight:600;background:rgba(124,58,237,0.15);padding:.05rem .25rem;border-radius:3px;margin-left:.1rem;display:inline-block}
.badge-anime{font-size:.45rem;color:#EC4899;font-weight:600;background:rgba(236,72,153,0.15);padding:.05rem .25rem;border-radius:3px;margin-left:.1rem;display:inline-block}
.badge-terror{font-size:.45rem;color:#EF4444;font-weight:600;background:rgba(239,68,68,0.15);padding:.05rem .25rem;border-radius:3px;margin-left:.1rem;display:inline-block}
.badge-comedia{font-size:.45rem;color:#FBBF24;font-weight:600;background:rgba(251,191,36,0.15);padding:.05rem .25rem;border-radius:3px;margin-left:.1rem;display:inline-block}
.badge-accion{font-size:.45rem;color:#FB923C;font-weight:600;background:rgba(251,146,60,0.15);padding:.05rem .25rem;border-radius:3px;margin-left:.1rem;display:inline-block}

/* ===== MODALES (Igual que antes) ===== */
.modal-video{position:fixed;inset:0;background:rgba(0,0,0,0.97);z-index:9998;display:none;align-items:center;justify-content:center;padding:0;overflow-y:auto;backdrop-filter:blur(20px)}
.modal-video.abierto{display:flex;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:scale(1)}}
.reproductor-contenedor{background:#0A0A0F;width:100%;height:100vh;max-height:100vh;overflow-y:auto;padding:1rem;margin:0;position:relative;display:flex;flex-direction:column}
.info-arriba{margin-bottom:.8rem;flex-shrink:0}
.info-arriba h2{font-size:1.4rem;font-weight:700;color:#fff;background:linear-gradient(135deg,#fff,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.info-arriba .detalles-arriba{display:flex;gap:1rem;align-items:center;font-size:.8rem;color:#94A3B8;flex-wrap:wrap;margin-top:.1rem}
.info-arriba .detalles-arriba .anio-arriba{background:rgba(124,58,237,0.15);padding:.1rem .6rem;border-radius:4px;border:1px solid rgba(124,58,237,0.15)}
.info-arriba .detalles-arriba .rating-arriba{color:#F59E0B}
.info-arriba .sinopsis-arriba{font-size:.8rem;color:#94A3B8;margin-top:.2rem;line-height:1.5;max-height:3rem;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.netflix-player{width:100%;aspect-ratio:16/9;position:relative;background:#000;border-radius:16px;overflow:hidden;flex-shrink:0;box-shadow:0 8px 40px rgba(0,0,0,0.6)}
.netflix-player iframe,.netflix-player object,.netflix-player embed{width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0}
.controles-superior{display:flex;justify-content:flex-end;gap:.6rem;margin-top:.6rem;flex-shrink:0}
.btn-control{background:rgba(255,255,255,0.06);border:none;color:#fff;padding:.5rem 1rem;border-radius:10px;cursor:pointer;display:flex;align-items:center;gap:.4rem;font-size:.8rem;transition:.3s;backdrop-filter:blur(8px)}
.btn-control:hover{background:rgba(255,255,255,0.12)}
.btn-cerrar-modal{background:rgba(239,68,68,0.15);color:#EF4444}
.btn-cerrar-modal:hover{background:rgba(239,68,68,0.3)}
.botones-opciones{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.8rem;flex-shrink:0}
.btn-opcion{padding:.5rem 1.2rem;border-radius:10px;border:2px solid rgba(124,58,237,0.2);background:rgba(255,255,255,0.04);color:#fff;cursor:pointer;display:flex;align-items:center;gap:.4rem;font-weight:600;font-size:.8rem;transition:.3s}
.btn-opcion.activo{border-color:#7C3AED;background:#7C3AED;color:#fff;box-shadow:0 4px 20px rgba(124,58,237,0.3)}
.btn-opcion:hover{border-color:#7C3AED;transform:translateY(-2px)}
.btn-nueva-ventana{border-color:rgba(239,68,68,0.3)!important;color:#EF4444!important}
.btn-nueva-ventana:hover{background:rgba(239,68,68,0.15)!important;border-color:#EF4444!important}
.selector-temporada{display:flex;align-items:center;justify-content:center;gap:1rem;margin-bottom:.8rem;padding:.5rem;background:rgba(255,255,255,0.03);border-radius:12px;border:1px solid rgba(124,58,237,0.08);flex-shrink:0}
.btn-temp{background:rgba(124,58,237,0.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;transition:all .3s ease;display:flex;align-items:center;justify-content:center;font-size:.9rem}
.btn-temp:hover{background:rgba(124,58,237,0.3);transform:scale(1.05)}
.btn-temp:disabled{opacity:.3;cursor:not-allowed;transform:none}
#tempActual{font-weight:600;color:#A78BFA;font-size:.9rem;min-width:120px;text-align:center}
.capitulos-horizontal{display:flex;gap:.8rem;overflow-x:auto;padding:.3rem .2rem .8rem;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;flex-shrink:0}
.capitulos-horizontal::-webkit-scrollbar{height:4px}
.capitulos-horizontal::-webkit-scrollbar-track{background:rgba(255,255,255,0.05);border-radius:4px}
.capitulos-horizontal::-webkit-scrollbar-thumb{background:#7C3AED;border-radius:4px}
.capitulo-item-horizontal{flex:0 0 auto;width:120px;background:rgba(255,255,255,0.04);border-radius:10px;padding:.5rem;border:2px solid rgba(124,58,237,0.05);cursor:pointer;transition:all .3s ease;scroll-snap-align:start;text-align:center}
.capitulo-item-horizontal:hover{background:rgba(124,58,237,0.1);border-color:rgba(124,58,237,0.3);transform:translateY(-4px)}
.capitulo-item-horizontal.activo{border-color:#7C3AED;background:rgba(124,58,237,0.15)}
.capitulo-item-horizontal .cap-numero-h{font-weight:700;color:#A78BFA;font-size:.7rem;display:block;margin-bottom:.1rem}
.capitulo-item-horizontal .cap-titulo-h{font-size:.65rem;color:#E2E8F0;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.capitulo-item-horizontal .cap-play-h{display:inline-block;margin-top:.2rem;color:#34D399;font-size:.6rem;padding:.1rem .6rem;border-radius:4px;background:rgba(52,211,153,0.1)}
.capitulo-item-horizontal .cap-sin-enlace-h{display:inline-block;margin-top:.2rem;color:#64748B;font-size:.55rem}
.capitulos-container{margin-top:.5rem;flex-shrink:0}
.seccion-recomendadas{border-top:1px solid rgba(124,58,237,0.1);padding-top:.8rem;margin-top:.8rem;flex-shrink:0}
.titulo-recomendadas{font-size:1rem;font-weight:600;color:#fff;margin-bottom:.6rem}
.lista-recomendadas{display:flex;gap:.8rem;overflow-x:auto;padding-bottom:.5rem}
.lista-recomendadas::-webkit-scrollbar{height:3px}
.lista-recomendadas::-webkit-scrollbar-track{background:rgba(255,255,255,0.05);border-radius:4px}
.lista-recomendadas::-webkit-scrollbar-thumb{background:#7C3AED;border-radius:4px}
.tarjeta-recomendada{flex:0 0 auto;width:90px;cursor:pointer;transition:all .3s ease;border-radius:10px;overflow:hidden}
.tarjeta-recomendada:hover{transform:scale(1.08) translateY(-4px);box-shadow:0 8px 25px rgba(124,58,237,0.2)}
.portada-recomendada{width:100%;height:135px;border-radius:8px;object-fit:cover}
.texto-recomendada{font-size:.6rem;text-align:center;margin-top:.1rem;color:#94A3B8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media(orientation:landscape){.modal-video.abierto .info-arriba,.modal-video.abierto .controles-superior,.modal-video.abierto .botones-opciones,.modal-video.abierto .capitulos-container,.modal-video.abierto .seccion-recomendadas{display:none!important}.modal-video.abierto .netflix-player{border-radius:0!important;aspect-ratio:auto!important;height:100vh!important;width:100vw!important}.modal-video.abierto .reproductor-contenedor{padding:0!important;background:#000!important;overflow:hidden!important}.modal-video.abierto{padding:0!important;background:#000!important}}
.menu-perfil{position:relative}
.dropdown{position:absolute;right:0;top:120%;background:rgba(26,26,46,0.95);backdrop-filter:blur(20px);border-radius:16px;width:260px;box-shadow:0 20px 60px rgba(0,0,0,0.5);display:none;z-index:100;border:1px solid rgba(124,58,237,0.15);padding:.5rem 0}
.dropdown.mostrar{display:block;animation:slideDown .25s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.dropdown-header{padding:.6rem 1rem;border-bottom:1px solid rgba(124,58,237,0.08);font-weight:600;color:#F1F5F9;font-size:.85rem}
.dropdown button{display:block;width:100%;padding:.6rem 1rem;text-align:left;border:none;background:none;cursor:pointer;font-size:.8rem;color:#CBD5E1;transition:.2s}
.dropdown button:hover{background:rgba(124,58,237,0.08);color:#fff}
.historial-vacio{padding:1rem;text-align:center;color:#64748B;font-size:.8rem}
.modal-login{position:fixed;inset:0;background:rgba(0,0,0,0.92);backdrop-filter:blur(20px);z-index:9999;display:flex;align-items:center;justify-content:center;padding:1rem}
.contenedor-login{background:rgba(26,26,46,0.95);border-radius:20px;padding:1.5rem;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.5);border:1px solid rgba(124,58,237,0.08);backdrop-filter:blur(20px)}
.contenedor-login h2{font-size:1.3rem;font-weight:700;text-align:center;margin-bottom:.2rem;background:linear-gradient(135deg,#fff,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.contenedor-login input{width:100%;padding:.6rem;border-radius:12px;border:1px solid rgba(124,58,237,0.1);background:rgba(255,255,255,0.04);color:#fff;font-size:.85rem;margin-bottom:.4rem;transition:.3s}
.contenedor-login input:focus{outline:none;border-color:#7C3AED;box-shadow:0 0 30px rgba(124,58,237,0.05)}
.contenedor-login input::placeholder{color:#64748B}
.btn-google{background:rgba(255,255,255,0.04);border:1px solid rgba(124,58,237,0.1);color:#fff;padding:.6rem;border-radius:12px;font-weight:600;cursor:pointer;width:100%;transition:.3s;display:flex;align-items:center;justify-content:center;gap:.5rem}
.btn-google:hover{background:rgba(124,58,237,0.1);border-color:#7C3AED}
.btn-enviar-codigo{background:linear-gradient(135deg,#7C3AED,#5B7CFF);border:none;color:#fff;padding:.6rem;border-radius:12px;font-weight:600;cursor:pointer;width:100%;transition:.3s}
.btn-enviar-codigo:hover{transform:scale(1.02);box-shadow:0 4px 20px rgba(124,58,237,0.3)}
.btn-cerrar-login{background:none;border:none;color:#64748B;cursor:pointer;width:100%;margin-top:.4rem;font-size:.75rem;transition:.3s}
.btn-cerrar-login:hover{color:#fff}
#recaptcha-container{margin-top:.4rem;min-height:0}
.btn-cargar-mas{background:rgba(124,58,237,0.15);color:#fff;padding:.6rem 1.5rem;border-radius:9999px;border:2px solid rgba(124,58,237,0.2);font-weight:600;cursor:pointer;display:flex;align-items:center;gap:.4rem;font-size:.85rem;transition:.3s;margin:0 auto;backdrop-filter:blur(8px)}
.btn-cargar-mas:hover{background:rgba(124,58,237,0.25);border-color:#7C3AED;transform:scale(1.03);box-shadow:0 4px 25px rgba(124,58,237,0.2)}
.btn-cargar-mas:disabled{opacity:.5;cursor:not-allowed}
.oculto{display:none!important}
</style><header>
    <div class="flex justify-between items-center">
        <div class="logo-contenedor">
            <img src="logo.png" alt="Logo TELY" class="logo" onerror="this.style.display='none'">
            <h1 class="titulo-app">TELY</h1>
        </div>
        <div class="menu-derecha">
            <button class="btn-menu" onclick="cambiarModo()"><i class="fa-solid fa-moon" id="iconoModo"></i></button>

    auth.signInWithPopup(provider).then((r) => { document.getElementById("nombrePerfil").textContent = "✅ Sesión iniciada"; cerrarModalLogin(); btn.innerHTML = original; btn.disabled = false; if (videoPendiente) { abrirVideoPelicula(videoPendiente); agregarAlHistorial(videoPendiente); videoPendiente = null; } }).catch((e) => { btn.innerHTML = original; btn.disabled = false; if (e.code === 'auth/popup-closed-by-user') alert("⚠️ Cerraste la ventana."); else alert("Error: " + e.message); });
}

function iniciarRecaptcha() { const c = document.getElementById('recaptcha-container'); if (c) c.innerHTML = ''; if (!recaptchaVerifier) { recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { size: 'invisible', callback: function() {} }); } }
function enviarCodigo() { iniciarRecaptcha(); const t = document.getElementById("telefonoInput").value.trim(); if (!t.startsWith("+")) return alert("Agrega código de país ej: +58..."); auth.signInWithPhoneNumber(t, recaptchaVerifier).then(r => { confirmationResult = r; document.getElementById("seccionCodigo").classList.remove("oculto"); }).catch(e => alert("Error: " + e.message)); }
function verificarCodigo() { const c = document.getElementById("codigoInput").value.trim(); confirmationResult.confirm(c).then(r => { document.getElementById("nombrePerfil").textContent = "✅ Sesión iniciada"; cerrarModalLogin(); if (videoPendiente) { abrirVideoPelicula(videoPendiente); agregarAlHistorial(videoPendiente); videoPendiente = null; } }).catch(e => alert("Código incorrecto")); }
function cerrarSesion() { auth.signOut().then(() => { document.getElementById("nombrePerfil").textContent = "❌ Sesión cerrada"; videoPendiente = null; }); }

cargarContenidoCompleto();

auth.onAuthStateChanged(u => { 
    if (u) { document.getElementById("nombrePerfil").textContent = "✅ Sesión iniciada"; } 
    else { document.getElementById("nombrePerfil").textContent = "❌ Sesión cerrada"; }
});

window.addEventListener('popstate', function(e) { if (document.getElementById("modal-video").classList.contains("abierto")) { cerrarVideo(); e.preventDefault(); history.pushState(null, '', window.location.href); } });
history.pushState(null, '', window.location.href);

function reportarContenido() { alert("🚩 Reportar contenido"); }
function trofeosContenido() { alert("🏆 Trofeos"); }
function ayudaContenido() { alert("❓ Ayuda"); }
</script>
