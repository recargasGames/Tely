<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELY 🎬</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        fondo: '#0A0A0F',
                        texto: '#FFFFFF',
                        grisClaro: '#1A1A2E',
                        grisMedio: '#2D2D44',
                        acento: '#7C3AED',
                        acentoClaro: '#A78BFA',
                        botonActivo: '#7C3AED',
                        botonInactivo: '#2D2D44',
                        naranja: '#F59E0B',
                        rojo: '#EF4444',
                        verde: '#10B981'
                    },
                    fontFamily: { sans: ['Segoe UI', 'Roboto', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; max-width: 100%; overflow-x: hidden; min-height: 100vh;
            background: #0A0A0F; color: #FFFFFF;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }
        body.dark { background: #0A0A0F; color: #FFFFFF; }

        ::-webkit-scrollbar { width: 2px; height: 2px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #7C3AED; border-radius: 4px; }

        header { 
            padding: 0.4rem 0.6rem; 
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(124, 58, 237, 0.15);
            position: sticky; top: 0; z-index: 50; 
        }
        .logo-contenedor { display: flex; align-items: center; gap: 0.3rem; }
        .logo { height: 24px; width: auto; }
        .titulo-app { 
            font-size: 1rem; font-weight: 800; 
            background: linear-gradient(135deg, #7C3AED, #A78BFA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .btn-menu, .btn-perfil { 
            background: rgba(124, 58, 237, 0.15); border: none; 
            cursor: pointer; color: #FFFFFF; 
            border-radius: 50%; transition: 0.3s; 
            width: 28px; height: 28px; font-size: 0.85rem;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-menu:hover, .btn-perfil:hover { background: rgba(124, 58, 237, 0.3); transform: scale(1.05); }
        .menu-derecha { display: flex; align-items: center; gap: 0.3rem; }

        .pestanas { 
            display: flex; gap: 0.2rem; padding: 0.3rem 0.6rem; flex-wrap: wrap;
            background: rgba(10, 10, 15, 0.8);
            border-bottom: 1px solid rgba(124, 58, 237, 0.08);
        }
        .btn-pestana { 
            padding: 0.2rem 0.6rem; border-radius: 9999px; border: none; 
            font-weight: 600; cursor: pointer; font-size: 0.65rem;
            transition: all 0.2s ease;
        }
        .btn-pestana.inactiva { background: rgba(255,255,255,0.05); color: #94A3B8; }
        .btn-pestana.inactiva:hover { background: rgba(255,255,255,0.1); color: #FFFFFF; }
        .btn-pestana.activa { background: #7C3AED; color: #FFFFFF; }

        .buscador { 
            display: flex; align-items: center; gap: 0.3rem; 
            padding: 0.3rem 0.6rem; flex-wrap: wrap;
        }
        .input-buscar { 
            flex: 1; min-width: 100px; padding: 0.3rem 0.6rem; border-radius: 9999px; 
            border: 2px solid rgba(124, 58, 237, 0.2); background: rgba(255,255,255,0.05);
            color: #FFFFFF; font-size: 0.7rem; transition: 0.3s;
        }
        .input-buscar:focus { outline: none; border-color: #7C3AED; background: rgba(255,255,255,0.08); }
        .input-buscar::placeholder { color: #64748B; }
        .btn-buscar { 
            background: #7C3AED; border: none; font-size: 0.7rem; cursor: pointer; 
            color: #FFFFFF; padding: 0.3rem 0.6rem; border-radius: 9999px;
            transition: 0.3s;
        }
        .btn-buscar:hover { background: #6D28D9; transform: scale(1.05); }
        .contador { 
            background: rgba(255,255,255,0.05); padding: 0.15rem 0.5rem; border-radius: 9999px; 
            font-weight: 500; font-size: 0.55rem; color: #94A3B8;
            border: 1px solid rgba(124, 58, 237, 0.1);
        }

        /* ===== CARRUSEL POPULARES ===== */
        .seccion-populares { padding: 0.3rem 0.6rem 0.5rem; }
        .seccion-populares .titulo-seccion { 
            font-size: 0.75rem; font-weight: 700; margin-bottom: 0.3rem; 
            display: flex; align-items: center; gap: 0.3rem;
            color: #FFFFFF;
        }
        .seccion-populares .titulo-seccion i { color: #F59E0B; }

        .carrusel-container {
            position: relative;
            overflow: hidden;
            border-radius: 8px;
        }
        .carrusel-track {
            display: flex;
            transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            gap: 0.3rem;
        }
        .carrusel-item {
            flex: 0 0 auto;
            width: 100px;
            border-radius: 8px;
            overflow: hidden;
            background: rgba(255,255,255,0.04);
            cursor: pointer;
            border: 1px solid rgba(124,58,237,0.08);
            transition: 0.3s;
        }
        .carrusel-item:hover { transform: scale(1.03); border-color: rgba(124,58,237,0.3); }
        .carrusel-item .portada-popular { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .carrusel-item .info-popular { padding: 0.2rem; text-align: center; }
        .carrusel-item .info-popular h4 { font-size: 0.5rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #E2E8F0; }

        /* ===== RECIENTES ===== */
        .seccion-recientes { padding: 0 0.6rem 0.5rem; }
        .seccion-recientes .titulo-seccion { 
            font-size: 0.75rem; font-weight: 700; margin-bottom: 0.3rem; 
            display: flex; align-items: center; gap: 0.3rem;
            color: #FFFFFF;
        }
        .seccion-recientes .titulo-seccion i { color: #7C3AED; }

        .scroll-recientes { 
            display: flex; gap: 0.3rem; overflow-x: auto; 
            padding: 0.15rem 0 0.3rem; 
            -webkit-overflow-scrolling: touch;
        }
        .scroll-recientes::-webkit-scrollbar { height: 2px; }
        .scroll-recientes::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        .scroll-recientes::-webkit-scrollbar-thumb { background: #7C3AED; }
        
        .tarjeta-reciente { 
            flex: 0 0 auto; width: 55px; border-radius: 6px; overflow: hidden; 
            background: rgba(255,255,255,0.04); cursor: pointer; 
            border: 1px solid rgba(124, 58, 237, 0.08);
        }
        .tarjeta-reciente .portada-reciente { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .tarjeta-reciente .info-reciente { padding: 0.1rem; text-align: center; }
        .tarjeta-reciente .info-reciente h4 { font-size: 0.4rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #E2E8F0; }

        /* ===== GRID ===== */
        .grid-contenido { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 0.3rem; 
            padding: 0 0.6rem 0.8rem; 
        }
        @media (min-width: 480px) { .grid-contenido { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 768px) { .grid-contenido { grid-template-columns: repeat(5, 1fr); } }
        @media (min-width: 1024px) { .grid-contenido { grid-template-columns: repeat(6, 1fr); } }
        
        .tarjeta { 
            border-radius: 6px; overflow: hidden; background: rgba(255,255,255,0.04); 
            cursor: pointer; position: relative; 
            border: 1px solid rgba(124, 58, 237, 0.06);
        }
        .tarjeta:active { transform: scale(0.97); }
        .portada { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #1A1A2E; }
        .etiqueta-anio { 
            position: absolute; top: 0.2rem; left: 0.2rem; 
            background: rgba(124, 58, 237, 0.85); color: #fff; 
            padding: 0.05rem 0.3rem; border-radius: 3px; font-size: 0.4rem; font-weight: 700;
        }
        .estrella { 
            position: absolute; top: 0.2rem; right: 0.2rem; 
            color: #F59E0B; font-size: 0.45rem;
        }
        .info-tarjeta { padding: 0.2rem; }
        .info-tarjeta h3 { 
            font-size: 0.5rem; font-weight: 600; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            color: #F1F5F9;
        }
        .badge-video { font-size: 0.4rem; color: #34D399; font-weight: 600; background: rgba(52,211,153,0.12); padding: 0.05rem 0.2rem; border-radius: 3px; }
        .badge-sin-video { font-size: 0.4rem; color: #64748B; font-weight: 500; background: rgba(100,116,139,0.1); padding: 0.05rem 0.2rem; border-radius: 3px; }
        .badge-serie { font-size: 0.35rem; color: #A78BFA; font-weight: 600; background: rgba(124,58,237,0.15); padding: 0.05rem 0.2rem; border-radius: 3px; margin-left: 0.1rem; }

        .btn-cargar-mas { 
            background: rgba(124, 58, 237, 0.15); color: #FFFFFF; 
            padding: 0.3rem 1rem; border-radius: 9999px; 
            border: 2px solid rgba(124, 58, 237, 0.2); font-weight: 600; 
            cursor: pointer; display: flex; align-items: center; gap: 0.3rem; 
            font-size: 0.6rem; transition: 0.3s; margin: 0 auto; 
        }
        .btn-cargar-mas:hover { background: rgba(124, 58, 237, 0.25); border-color: #7C3AED; }
        .btn-cargar-mas:disabled { opacity: 0.5; cursor: not-allowed; }

        .oculto { display: none !important; }
    </style>
</head>
<body><header>
    <div class="flex justify-between items-center">
        <div class="logo-contenedor">
            <img src="logo.png" alt="Logo TELY" class="logo" onerror="this.style.display='none'">
            <h1 class="titulo-app">TELY</h1>
        </div>
        <div class="menu-derecha">
            <button class="btn-menu" onclick="cambiarModo()"><i class="fa-solid fa-moon" id="iconoModo"></i></button>
            <div class="menu-perfil">
                <button class="btn-perfil" onclick="toggleMenu()"><i class="fa-solid fa-user-circle"></i></button>
                <div class="dropdown" id="menuPerfil">
                    <div class="dropdown-header" id="nombrePerfil" style="font-size:0.7rem;">Acceder</div>
                    <div class="dropdown-header" style="font-size:0.55rem;color:#64748B;">📺 Visto recientemente</div>
                    <div id="listaHistorial"></div>
                    <button onclick="limpiarHistorial()" style="color:#F59E0B;font-size:0.65rem;"><i class="fa-solid fa-trash"></i> Limpiar</button>
                    <button onclick="cerrarSesion()" style="color:#EF4444;font-size:0.65rem;border-top:1px solid rgba(124,58,237,0.08);margin-top:0.2rem;padding-top:0.4rem;"><i class="fa-solid fa-sign-out"></i> Cerrar sesión</button>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="pestanas">
    <button class="btn-pestana activa" onclick="cambiarCategoria('estrenos')">🏠 Estrenos</button>
    <button class="btn-pestana inactiva" onclick="cambiarCategoria('peliculas')">🎬 Películas</button>
    <button class="btn-pestana inactiva" onclick="cambiarCategoria('series')">📺 Series</button>
</div>

<div class="buscador">
    <input type="text" class="input-buscar" placeholder="🔍 Buscar..." id="buscadorInput" onkeydown="if(event.key==='Enter') buscarContenido()">
    <button class="btn-buscar" onclick="buscarContenido()"><i class="fa-solid fa-magnifying-glass"></i></button>
    <div class="contador" id="contadorTotal">0</div>
</div>

<!-- ===== CARRUSEL POPULARES ===== -->
<div class="seccion-populares" id="seccionPopulares">
    <div class="titulo-seccion">
        <i class="fa-solid fa-fire"></i> Más vistas
    </div>
    <div class="carrusel-container">
        <div class="carrusel-track" id="carruselTrack"></div>
    </div>
</div>

<!-- ===== RECIENTES ===== -->
<div class="seccion-recientes">
    <div class="titulo-seccion">
        <i class="fa-solid fa-clock-rotate-left"></i> Visto recientemente
    </div>
    <div class="scroll-recientes" id="scrollRecientes"></div>
</div>

<!-- ===== GRID ===== -->
<div class="grid-contenido" id="lista-contenido"></div>

<div class="flex justify-center py-2 px-4" id="contenedorCargarMas">
    <button class="btn-cargar-mas" onclick="cargarMasContenido()" id="btnCargarMas">
        <i class="fa-solid fa-plus"></i> Cargar más
    </button>
</div><!-- ===== MODAL VIDEO ===== -->
<div id="modal-video" class="modal-video">
    <div class="reproductor-contenedor" id="reproductorContenedor">
        <div class="info-arriba" id="infoArriba">
            <h2 id="tituloReproductor">Título</h2>
            <div class="detalles-arriba">
                <span class="anio-arriba" id="anioPanel">2024</span>
                <span class="rating-arriba">⭐ <span id="ratingPanel">7.3</span></span>
                <span id="generoPanel">Acción</span>
                <span id="tipoPanel" style="color:#A78BFA;">🎬 Película</span>
            </div>
            <div class="sinopsis-arriba" id="sinopsisPanel">Sinopsis...</div>
        </div>

        <div class="netflix-player" id="netflixPlayer"></div>

        <div class="controles-superior" id="controlesSuperior">
            <button class="btn-control btn-cerrar-modal" onclick="cerrarVideo()">
                <i class="fa-solid fa-xmark"></i> Cerrar
            </button>
        </div>

        <div class="botones-opciones" id="botonesOpciones"></div>

        <div id="capitulosContainer" class="capitulos-container oculto">
            <div class="selector-temporada">
                <button class="btn-temp" id="tempAnterior" onclick="cambiarTemporada(-1)">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <span id="tempActual">Temporada 1</span>
                <button class="btn-temp" id="tempSiguiente" onclick="cambiarTemporada(1)">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
            <div class="capitulos-horizontal" id="capitulosHorizontal"></div>
        </div>

        <div class="seccion-recomendadas" id="seccionRecomendadas">
            <h4 class="titulo-recomendadas">Te podría gustar</h4>
            <div class="lista-recomendadas" id="recomendadasLista">
                <p style="color:#64748B;font-size:0.6rem;text-align:center;padding:0.3rem;">Cargando...</p>
            </div>
        </div>
    </div>
</div>

<!-- ===== MODAL LOGIN ===== -->
<div id="modal-login" class="modal-login oculto" onclick="cerrarModalLoginSiClickFuera(event)">
    <div class="contenedor-login" onclick="event.stopPropagation()">
        <h2>Iniciar Sesión</h2>
        <p style="text-align:center;color:#64748B;font-size:0.7rem;margin-bottom:0.8rem;">Accede para ver todo el contenido</p>
        <button class="btn-google" id="btnGoogleLogin" onclick="iniciarConGoogle()">
            <i class="fa-brands fa-google"></i> Continuar con Google
        </button>
        <div style="margin:0.6rem 0;text-align:center;color:#64748B;font-size:0.6rem;">— o con número de teléfono —</div>
        <div>
            <input type="tel" id="telefonoInput" placeholder="+58 412 1234567">
            <button class="btn-enviar-codigo" onclick="enviarCodigo()">Enviar código</button>
        </div>
        <div id="seccionCodigo" class="oculto" style="margin-top:0.4rem;">
            <input type="text" id="codigoInput" placeholder="Código de 6 dígitos">
            <button class="btn-enviar-codigo" onclick="verificarCodigo()" style="background:#10B981;">Verificar</button>
        </div>
        <div id="recaptcha-container"></div>
        <button class="btn-cerrar-login" onclick="cerrarModalLogin()">Cerrar</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script><style>
    .modal-video { 
        position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 9998; 
        display: none; flex-direction: column; overflow-y: auto;
        backdrop-filter: blur(20px);
    }
    .modal-video.abierto { display: flex; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .reproductor-contenedor {
        background: #0A0A0F; width: 100%; max-width: 1200px; margin: 0 auto;
        padding: 0.5rem; display: flex; flex-direction: column; gap: 0.3rem;
    }
    .netflix-player {
        width: 100%; aspect-ratio: 16/9; position: relative; background: #000;
        border-radius: 10px; overflow: hidden;
    }
    .netflix-player iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; background: #000; }

    .controles-superior { display: flex; justify-content: flex-end; gap: 0.3rem; }
    .btn-control { background: rgba(255,255,255,0.06); border: none; color: #fff; padding: 0.2rem 0.5rem; border-radius: 6px; cursor: pointer; font-size: 0.6rem; transition: 0.3s; }
    .btn-control:hover { background: rgba(255,255,255,0.12); }

    .btn-cerrar-modal:hover { background: rgba(239, 68, 68, 0.3); }

    .info-arriba .detalles-arriba { display: flex; gap: 0.4rem; align-items: center; font-size: 0.55rem; color: #94A3B8; flex-wrap: wrap; }
    .info-arriba .sinopsis-arriba { font-size: 0.6rem; color: #94A3B8; margin-top: 0.1rem; line-height: 1.3; max-height: 2rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

    .botones-opciones { display: flex; gap: 0.3rem; flex-wrap: wrap; }
    .btn-opcion { padding: 0.2rem 0.6rem; border-radius: 6px; border: 2px solid rgba(124,58,237,0.2); background: rgba(255,255,255,0.04); color: #fff; cursor: pointer; font-weight: 600; font-size: 0.55rem; transition: 0.3s; }
    .btn-opcion.activo { border-color: #7C3AED; background: #7C3AED; color: #fff; }

    .btn-nueva-ventana { border-color: rgba(239,68,68,0.3) !important; color: #EF4444 !important; font-size: 0.55rem; }
    .btn-nueva-ventana:hover { background: rgba(239,68,68,0.15) !important; }

    .capitulos-container { background: rgba(255,255,255,0.03); border-radius: 8px; padding: 0.3rem; border: 1px solid rgba(124,58,237,0.06); }
    .selector-temporada { display: flex; align-items: center; justify-content: center; gap: 0.4rem; margin-bottom: 0.3rem; }
    .selector-temporada .btn-temp { background: rgba(255,255,255,0.06); border: none; color: #fff; padding: 0.1rem 0.4rem; border-radius: 9999px; cursor: pointer; font-size: 0.55rem; }
    .selector-temporada .btn-temp:hover { background: rgba(124,58,237,0.2); }
    .selector-temporada .btn-temp:disabled { opacity: 0.3; cursor: not-allowed; }
    .selector-temporada span { color: #fff; font-weight: 600; font-size: 0.65rem; }
    .capitulos-horizontal { display: flex; gap: 0.2rem; overflow-x: auto; padding: 0.15rem 0; }

    .capitulo-item-horizontal:hover { background: rgba(255,255,255,0.08); }

    .cap-numero-h { font-size: 0.4rem; color: #64748B; display: block; }
    .cap-titulo-h { font-size: 0.45rem; color: #E2E8F0; display: block; font-weight: 500; }
    .cap-play-h { font-size: 0.4rem; color: #34D399; display: block; }
    .cap-sin-enlace-h { font-size: 0.4rem; color: #EF4444; display: block; }

    .seccion-recomendadas { border-top: 1px solid rgba(124,58,237,0.1); padding-top: 0.3rem; margin-top: 0.3rem; }
    .titulo-recomendadas { font-size: 0.65rem; font-weight: 600; color: #fff; margin-bottom: 0.3rem; }

    .lista-recomendadas::-webkit-scrollbar { height: 2px; }
    .tarjeta-recomendada { flex: 0 0 auto; width: 55px; cursor: pointer; border-radius: 6px; overflow: hidden; }
    .tarjeta-recomendada:hover { transform: scale(1.05); }
    .portada-recomendada { width: 100%; height: 82px; border-radius: 4px; object-fit: cover; }
    .texto-recomendada { font-size: 0.4rem; text-align: center; margin-top: 0.1rem; color: #94A3B8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .menu-perfil { position: relative; }
    .dropdown { position: absolute; right: 0; top: 120%; background: rgba(26,26,46,0.95); backdrop-filter: blur(20px); border-radius: 10px; width: 200px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); display: none; z-index: 100; border: 1px solid rgba(124,58,237,0.15); padding: 0.2rem 0; }
    .dropdown.mostrar { display: block; animation: slideDown 0.25s ease; }

let carruselIndex = 0;
let carruselItems = [];

function iniciarCarrusel(items) {
    carruselItems = items;
    const track = document.getElementById("carruselTrack");
    track.innerHTML = "";
    
    if (!items || items.length === 0) {
        document.getElementById("seccionPopulares").style.display = "none";
        return;
    }
    
    // Mostrar los primeros 10 en el carrusel
    const mostrar = items.slice(0, 10);
    mostrar.forEach(item => {
        const div = document.createElement("div");
        div.className = "carrusel-item";
        div.innerHTML = `
            <img src="${item.portada}" alt="${item.titulo}" class="portada-popular" loading="lazy" onerror="this.src='https://via.placeholder.com/100x150?text=?'">
            <div class="info-popular"><h4>${item.titulo}</h4></div>
        `;
        div.onclick = () => {
            auth.currentUser ? abrirVideoPelicula(item) : (videoPendiente = item, abrirModalLogin());
        };
        track.appendChild(div);
    });
    
    // Clonar los primeros para efecto infinito
    const clones = mostrar.slice(0, 3).map(item => {
        const div = document.createElement("div");
        div.className = "carrusel-item";
        div.innerHTML = `
            <img src="${item.portada}" alt="${item.titulo}" class="portada-popular" loading="lazy" onerror="this.src='https://via.placeholder.com/100x150?text=?'">
            <div class="info-popular"><h4>${item.titulo}</h4></div>
        `;
        div.onclick = () => {
            auth.currentUser ? abrirVideoPelicula(item) : (videoPendiente = item, abrirModalLogin());
        };
        return div;
    });
    clones.forEach(clone => track.appendChild(clone));
    
    // Auto-slide
    if (intervaloAutoSlide) clearInterval(intervaloAutoSlide);
    intervaloAutoSlide = setInterval(() => {
        const totalItems = track.children.length;
        if (totalItems === 0) return;
        carruselIndex++;
        if (carruselIndex >= totalItems - 3) {
            carruselIndex = 0;
            track.style.transition = 'none';
            track.style.transform = `translateX(0)`;
            setTimeout(() => {
                track.style.transition = 'transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
                carruselIndex = 1;
                track.style.transform = `translateX(-${carruselIndex * 103}px)`;
            }, 50);
        } else {
            track.style.transform = `translateX(-${carruselIndex * 103}px)`;
        }
    }, 3000);

function abrirVideoPelicula(peli) {
    if (peli.tipo === 'pelicula' && !peli.url && peli.tmdb_id) {
        peli.url = `https://unlimplay.com/play/embed/movie/${peli.tmdb_id}`;
        const datos = {
            tmdb_id: peli.tmdb_id,
            titulo: peli.titulo,
            anio: peli.anio || 'N/D',
            tipo: "pelicula",
            categoria: peli.categoria || "peliculas",
            portada: peli.portada || '',
            sinopsis: peli.sinopsis || 'Sin sinopsis',
            puntuacion: peli.puntuacion || 'N/A',
            genero: peli.genero || 'Película',
            url: peli.url,
            fecha_actualizacion: new Date().toISOString()
        };
        db.ref("contenido_personalizado").push(datos).then((ref) => {
            console.log('✅ Enlace automático guardado:', peli.titulo);
            peli.adminId = ref.key;
        }).catch(err => console.log('Error guardando enlace:', err));
    }
    
    if (peli.tipo === 'serie' && (!peli.temporadas || peli.temporadas.length === 0) && peli.tmdb_id) {
        peli.temporadas = [{
            numero: 1,
            nombre: 'Temporada 1',
            capitulos: [{
                numero: 1,
                titulo: 'Capítulo 1',
                url: `https://unlimplay.com/play/embed/tv/${peli.tmdb_id}/1/1`
            }]
        }];
        const datos = {
            tmdb_id: peli.tmdb_id,
            titulo: peli.titulo,
            anio: peli.anio || 'N/D',
            tipo: "serie",
            categoria: peli.categoria || "series",
            portada: peli.portada || '',
            sinopsis: peli.sinopsis || 'Sin sinopsis',
            puntuacion: peli.puntuacion || 'N/A',
            genero: peli.genero || 'Serie',
            temporadas: peli.temporadas,
            fecha_actualizacion: new Date().toISOString()
        };
        db.ref("series_personalizadas").push(datos).then((ref) => {
            console.log('✅ Serie automática guardada:', peli.titulo);
            peli.adminId = ref.key;
        }).catch(err => console.log('Error guardando serie:', err));
    }
    
    if (peli.tipo === 'serie' && peli.temporadas && peli.tmdb_id) {
        peli.temporadas.forEach(temp => {
            if (temp.capitulos) {
                temp.capitulos.forEach(cap => {
                    if (!cap.url) {
                        cap.url = `https://unlimplay.com/play/embed/tv/${peli.tmdb_id}/${temp.numero}/${cap.numero}`;
                    }
                });
            }
        });
    }
    
    if (peli.tmdb_id) {
        db.ref("contenido_personalizado").orderByChild("tmdb_id").equalTo(peli.tmdb_id).once("value", (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const keys = Object.keys(data);
                const adminItem = data[keys[0]];
                if (adminItem) {
                    peli.url = adminItem.url || peli.url || '';
                    peli.opcion2 = adminItem.opcion2 || '';
                    peli.adminId = keys[0];
                    peli.categoria = adminItem.categoria || peli.categoria || 'peliculas';
                }
            }
            if (peli.tipo === 'serie') {
                db.ref("series_personalizadas").orderByChild("tmdb_id").equalTo(peli.tmdb_id).once("value", (snap2) => {
                    const data2 = snap2.val();
                    if (data2) {
                        const keys = Object.keys(data2);
                        const adminItem = data2[keys[0]];
                        if (adminItem && adminItem.temporadas) {
                            peli.temporadas = adminItem.temporadas;
                            peli.adminId = keys[0];
                            peli.categoria = adminItem.categoria || peli.categoria || 'series';
                        }
                    }
                    abrirReproductor(peli);
                });
            } else {
                abrirReproductor(peli);
            }
        });
    } else {
        abrirReproductor(peli);
    }
}

function obtenerPrimerCapitulo(idx) { if (!temporadasActuales || temporadasActuales.length === 0) return null; const t = temporadasActuales[idx]; if (!t || !t.capitulos || t.capitulos.length === 0) return null; return t.capitulos[0]; }

function mostrarTemporada(index) {
    if (!temporadasActuales || temporadasActuales.length === 0) return;
    if (index < 0) index = 0; if (index >= temporadasActuales.length) index = temporadasActuales.length - 1;
    tempActualIndex = index; const temp = temporadasActuales[index]; const container = document.getElementById("capitulosHorizontal"); const label = document.getElementById("tempActual");
    label.textContent = `Temporada ${temp.numero || index + 1}`; container.innerHTML = "";
    document.getElementById("tempAnterior").disabled = index === 0; document.getElementById("tempSiguiente").disabled = index === temporadasActuales.length - 1;
    if (!temp.capitulos || temp.capitulos.length === 0) { container.innerHTML = `<p style="color:#64748B;padding:0.2rem;text-align:center;font-size:0.6rem;">Sin capítulos</p>`; return; }
    temp.capitulos.forEach((cap, idx) => { const div = document.createElement("div"); div.className = "capitulo-item-horizontal"; if (idx === 0 && cap.url) div.classList.add("activo"); div.innerHTML = `<span class="cap-numero-h">Cap ${cap.numero || idx + 1}</span><span class="cap-titulo-h">${cap.titulo || 'Capítulo ' + (idx + 1)}</span>${cap.url ? '<span class="cap-play-h"><i class="fa-solid fa-play"></i> Ver</span>' : '<span class="cap-sin-enlace-h">🔒 Sin enlace</span>'}`; div.onclick = function() { if (cap.url) { document.querySelectorAll(".capitulo-item-horizontal").forEach(el => el.classList.remove("activo")); this.classList.add("activo"); reproducirOpcion(cap.url); } else { alert("❌ Este capítulo no tiene enlace"); } }; container.appendChild(div); });
}

function cambiarTemporada(direccion) { const nueva = tempActualIndex + direccion; if (nueva >= 0 && nueva < temporadasActuales.length) mostrarTemporada(nueva); }

function reproducirOpcion(url) {
    const player = document.getElementById("netflixPlayer");
    let enlace = url.trim();
    
    if (enlace.includes('unlimplay.com')) {
        if (!enlace.includes('?')) { enlace += '?autoplay=1&controls=1&logo=0'; }
        player.innerHTML = `<iframe src="${enlace}" frameborder="0" referrerpolicy="origin" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen style="width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;"></iframe>`;
        return;
    }
    
    if (enlace.includes('youtube.com') || enlace.includes('youtu.be')) {
        const videoId = enlace.match(/(?:v\/|watch\?v=|\/)([a-zA-Z0-9_-]{11})/)?.[1];
        if (videoId) { enlace = `https://www.youtube.com/embed/${videoId}?autoplay=1&controls=1&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3`; }
        player.innerHTML = `<iframe src="${enlace}" frameborder="0" referrerpolicy="origin" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen style="width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;"></iframe>`;
        return;
    }
    
    player.innerHTML = `<iframe src="${enlace}" frameborder="0" referrerpolicy="origin" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen style="width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;"></iframe>`;
}// ==============================================

async function cargarRecomendadas(tmdbId) {
    const container = document.getElementById("recomendadasLista");
    container.innerHTML = "<p style='color:#64748B;font-size:0.6rem;text-align:center;padding:0.3rem;'>Cargando...</p>";
    if (!tmdbId) { container.innerHTML = "<p style='color:#64748B;font-size:0.6rem;text-align:center;padding:0.3rem;'>Sin recomendaciones</p>"; return; }
    try {
        const res = await fetch(`${TMDB_BASE}/movie/${tmdbId}/recommendations?language=${TMDB_LANG}&page=1`, opcionesTMDB);
        const datos = await res.json();
        container.innerHTML = "";
        if (!datos.results || datos.results.length === 0) { container.innerHTML = "<p style='color:#64748B;font-size:0.6rem;text-align:center;padding:0.3rem;'>No hay películas relacionadas</p>"; return; }
        datos.results.slice(0, 6).forEach(p => {
            const t = document.createElement("div");
            t.className = "tarjeta-recomendada";
            t.innerHTML = `<img src="${p.poster_path ? 'https://image.tmdb.org/t/p/w92' + p.poster_path : 'https://via.placeholder.com/55x82?text=?'}" alt="${p.title}" class="portada-recomendada" loading="lazy"><p class="texto-recomendada">${p.title}</p>`;
            t.onclick = () => {
                cerrarVideo();
                const comp = contenido.find(c => c.tmdb_id == p.id);
                if (comp) {
                    abrirVideoPelicula(comp);
                } else {
                    abrirVideoPelicula({
                        id: `tmdb_${p.id}`,
                        tmdb_id: p.id,
                        titulo: p.title,
                        anio: p.release_date ? p.release_date.split("-")[0] : "N/D",
                        tipo: "pelicula",
                        categoria: "peliculas",
                        portada: p.poster_path ? 'https://image.tmdb.org/t/p/w92' + p.poster_path : "",
                        sinopsis: p.overview || "Sin sinopsis",
                        puntuacion: p.vote_average ? p.vote_average.toFixed(1) : "N/A",
                        genero: "Película",
                        url: `https://unlimplay.com/play/embed/movie/${p.id}`,
                        opcion2: "",
                        temporadas: []
                    });
                }
            };
            container.appendChild(t);
        });
    } catch (err) { container.innerHTML = "<p style='color:#EF4444;font-size:0.6rem;text-align:center;padding:0.3rem;'>Error al cargar</p>"; }
}

function iniciarConGoogle() {
    const btn = document.getElementById('btnGoogleLogin');
    if (!btn) return;
    const original = btn.innerHTML;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
    btn.disabled = true;
    
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ 'prompt': 'select_account' });
    
    auth.signInWithPopup(provider)
        .then((result) => {
            document.getElementById("nombrePerfil").textContent = result.user.displayName || result.user.email || "✅ Sesión iniciada";
            cerrarModalLogin();
            btn.innerHTML = original;
            btn.disabled = false;
            if (videoPendiente) {
                const temp = videoPendiente;
                videoPendiente = null;
                abrirVideoPelicula(temp);
                agregarAlHistorial(temp);
            }
        })
        .catch((error) => {
            btn.innerHTML = original;
            btn.disabled = false;
            if (error.code === 'auth/popup-closed-by-user') {
                alert("⚠️ Cerraste la ventana de Google.");
            } else if (error.code === 'auth/cancelled-popup-request') {
                console.log('Popup cancelado por el usuario');
            } else {
                alert("❌ Error: " + error.message);
            }
        });
}

function iniciarRecaptcha() {
    const container = document.getElementById('recaptcha-container');
    if (container) container.innerHTML = '';
    if (!recaptchaVerifier) {
        recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
            size: 'invisible',
            callback: function() {}
        });
    }
}

function enviarCodigo() {
    iniciarRecaptcha();
    const telefono = document.getElementById("telefonoInput").value.trim();
    if (!telefono.startsWith("+")) return alert("Agrega código de país ej: +58...");
    auth.signInWithPhoneNumber(telefono, recaptchaVerifier)
        .then(res => {
            confirmationResult = res;
            document.getElementById("seccionCodigo").classList.remove("oculto");
        })
        .catch(err => alert("❌ Error: " + err.message));
}

function verificarCodigo() {
    const codigo = document.getElementById("codigoInput").value.trim();
    confirmationResult.confirm(codigo)
        .then(res => {
            document.getElementById("nombrePerfil").textContent = res.user.phoneNumber || "✅ Sesión iniciada";
            cerrarModalLogin();
            if (videoPendiente) {
                abrirVideoPelicula(videoPendiente);
                agregarAlHistorial(videoPendiente);
                videoPendiente = null;
            }
        })
        .catch(err => alert("❌ Código incorrecto"));
}

function cerrarSesion() {
    auth.signOut().then(() => {
        document.getElementById("nombrePerfil").textContent = "❌ Sesión cerrada";
        videoPendiente = null;
        document.getElementById("menuPerfil").classList.remove("mostrar");
        menuAbierto = false;
    }).catch(err => {
        console.error("Error al cerrar sesión:", err);
        document.getElementById("menuPerfil").classList.remove("mostrar");
        menuAbierto = false;
    });
}

cargarContenidoCompleto();

auth.onAuthStateChanged(user => {
    if (user) {
        document.getElementById("nombrePerfil").textContent = user.displayName || user.phoneNumber || user.email || "✅ Sesión iniciada";
    } else {
        document.getElementById("nombrePerfil").textContent = "❌ Sesión cerrada";
    }
});

window.addEventListener('popstate', function(e) {
    if (document.getElementById("modal-video").classList.contains("abierto")) {
        cerrarVideo();
        e.preventDefault();
        history.pushState(null, '', window.location.href);
    }
});
history.pushState(null, '', window.location.href);

function reportarContenido() { alert("🚩 Reportar contenido"); }
function trofeosContenido() { alert("🏆 Trofeos"); }
function ayudaContenido() { alert("❓ Ayuda"); }
