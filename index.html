// ✅ Carga rápida SIN esperar a Firebase
async function cargarContenidoAdmin() {
  try {
    const snapshot = await db.ref("contenido_personalizado").once("value");
    const datosAdmin = snapshot.val();
    return datosAdmin ? Object.values(datosAdmin) : [];
  } catch (err) {
    console.log("Sin contenido de Firebase:", err);
    return [];
  }
}

async function cargarTodoContenido() {
  contenido = [...MI_PELICULAS, ...MI_SERIES];
  document.getElementById("contadorTotal").textContent = `${contenido.length} títulos`;
  mostrarRecientes();
  mostrarContenido("peliculas");

  const admin = await cargarContenidoAdmin();
  if (admin.length > 0) {
    contenido = [...contenido, ...admin];
    contenido.sort((a, b) => new Date(b.fecha_agregado || "1970-01-01") - new Date(a.fecha_agregado || "1970-01-01"));
    document.getElementById("contadorTotal").textContent = `${contenido.length} títulos`;
    mostrarRecientes();
    mostrarContenido(document.querySelector(".btn-pestana.activa").getAttribute("onclick").split("'")[1]);
  }
}

function mostrarRecientes() {
  const contenedor = document.getElementById("listaRecientes");
  const recientes = contenido.slice(0, 6);
  contenedor.innerHTML = "";
  recientes.forEach(item => {
    const tarjeta = document.createElement("div");
    tarjeta.className = "tarjeta-recientes";
    tarjeta.innerHTML = `
      <img src="${item.portada}" alt="${item.titulo}" class="portada-recientes" loading="lazy">
      <div class="texto-recientes">${item.titulo}</div>
    `;
    tarjeta.onclick = () => {
      // ✅ Permitir ver SIN iniciar sesión mientras pruebas
      if (window.location.protocol === "file:") {
        abrirDetalle(item);
      } else {
        auth.currentUser ? abrirDetalle(item) : (videoPendiente = item, abrirModalLogin());
      }
    };
    contenedor.appendChild(tarjeta);
  });
}

function mostrarContenido(categoria) {
  const lista = document.getElementById("lista-contenido");
  lista.innerHTML = "";
  const filtrados = contenido.filter(x => x.categoria === categoria);
  if (!filtrados.length) { lista.innerHTML = `<p class="col-span-3 text-center text-gray-400 py-10">Sin ${categoria}</p>`; return; }
  filtrados.forEach(item => {
    const tieneVideo = (item.opciones?.length > 0 || item.temporadas?.length > 0);
    const tarjeta = document.createElement("div");
    tarjeta.className = "tarjeta";
    tarjeta.innerHTML = `
      <span class="etiqueta-anio">${item.anio}</span>
      <i class="fa-solid fa-star estrella"></i>
      <img src="${item.portada}" alt="${item.titulo}" class="portada" loading="lazy">
      <div class="info-tarjeta">
        <h3>${item.titulo}</h3>
        ${tieneVideo ? '<span class="badge-video">▶ Disponible</span>' : '<span class="badge-sin-video">🔒 Sin enlace</span>'}
      </div>
    `;
    tarjeta.onclick = () => {
      if (window.location.protocol === "file:") {
        abrirDetalle(item);
      } else {
        auth.currentUser ? abrirDetalle(item) : (videoPendiente = item, abrirModalLogin());
      }
    };
    lista.appendChild(tarjeta);
  });
}

function cambiarModo() {
  const body = document.body;
  const icono = document.getElementById("iconoModo");
  const icono2 = document.getElementById("iconoModo2");
  if (body.classList.contains("dark")) {
    body.classList.remove("dark");
    icono.className = "fa-solid fa-moon";
    if (icono2) icono2.className = "fa-solid fa-moon";
    localStorage.setItem("modo", "claro");
  } else {
    body.classList.add("dark");
    icono.className = "fa-solid fa-sun";
    if (icono2) icono2.className = "fa-solid fa-sun";
    localStorage.setItem("modo", "oscuro");
  }
}

if (localStorage.getItem("modo") === "oscuro" || (!localStorage.getItem("modo") && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
  document.body.classList.add("dark");
  document.getElementById("iconoModo").className = "fa-solid fa-sun";
}
function cambiarCategoria(cat) {
  document.querySelectorAll(".btn-pestana").forEach(b => { b.classList.remove("activa"); b.classList.add("inactiva"); });
  event.target.classList.remove("inactiva"); event.target.classList.add("activa"); mostrarContenido(cat);
}

function toggleMenu() { mostrarHistorial(); document.getElementById("menuPerfil").classList.toggle("mostrar"); }
window.onclick = e => { if (!e.target.matches(".btn-menu, .btn-menu *")) document.getElementById("menuPerfil").classList.remove("mostrar"); };

function buscarContenido() {
  const texto = document.getElementById("buscadorInput").value.trim().toLowerCase();
  const resultados = contenido.filter(x => x.titulo.toLowerCase().includes(texto));
  const lista = document.getElementById("lista-contenido");
  lista.innerHTML = "";
  resultados.length ? resultados.forEach(item => {
    const tarjeta = document.createElement("div");
    tarjeta.className = "tarjeta";
    tarjeta.innerHTML = `
      <span class="etiqueta-anio">${item.anio}</span>
      <i class="fa-solid fa-star estrella"></i>
      <img src="${item.portada}" alt="${item.titulo}" class="portada" loading="lazy">
      <div class="info-tarjeta"><h3>${item.titulo}</h3></div>
    `;
    tarjeta.onclick = () => {
      if (window.location.protocol === "file:") {
        abrirDetalle(item);
      } else {
        auth.currentUser ? abrirDetalle(item) : (videoPendiente = item, abrirModalLogin());
      }
    };
    lista.appendChild(tarjeta);
  }) : lista.innerHTML = `<p class="col-span-3 text-center text-gray-400 py-10">Sin resultados</p>`;
}

function abrirModalLogin() { document.getElementById("modal-login").classList.remove("oculto"); }
function cerrarModalLogin() { document.getElementById("modal-login").classList.add("oculto"); videoPendiente = null; }

// ✅ Error corregido: no intenta iniciar en modo archivo
function iniciarConGoogle() {
  if (window.location.protocol === "file:") {
    alert("⚠️ Inicia sesión solo desde el enlace de Vercel, no desde archivo local");
    cerrarModalLogin();
    return;
  }
  const proveedor = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(proveedor)
    .then(res => {
      document.getElementById("nombrePerfil").textContent = res.user.displayName || res.user.email;
      cerrarModalLogin();
      if (videoPendiente) abrirDetalle(videoPendiente);
    })
    .catch(err => {
      console.error("Error inicio:", err);
      alert(`⚠️ Error: ${err.message}\nSube el código a Vercel para que funcione bien`);
    });
}

function abrirDetalle(item) {
  document.getElementById("tituloDetalle").textContent = `${item.titulo} (${item.anio})`;
  document.getElementById("tituloCabecera").textContent = item.titulo;
  document.getElementById("anioDetalle").textContent = item.anio;
  document.getElementById("puntuacionDetalle").textContent = item.puntuacion || "7.0";
  document.getElementById("generoDetalle").textContent = item.genero || "";
  document.getElementById("sinopsisDetalle").textContent = item.sinopsis || "Sin sinopsis";

  const contenedor = document.getElementById("contenidoReproductor");
  contenedor.innerHTML = "";

  if (item.tipo === "pelicula" && item.opciones?.length > 0) {
    let html = `
      <div class="reproductor-contenedor" id="reproductorPrincipal">
        <iframe src="${item.opciones[0].url}" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture; fullscreen; *" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-top-navigation-by-user-activation" referrerpolicy="no-referrer-when-downgrade" allowfullscreen loading="lazy"></iframe>
      </div>
      <div class="botones-opciones" id="listaOpciones">
    `;
    item.opciones.forEach((op, i) => {
      html += `<button class="btn-opcion ${i === 0 ? 'activo' : ''}" onclick="cambiarFuente('${op.url}', this)">${op.nombre}</button>`;
    });
    html += `
      </div>
      <div class="aviso">
        <i class="fa-solid fa-info-circle"></i>
        Si ves error, activa pantalla completa o prueba otro servidor
      </div>
    `;
    contenedor.innerHTML = html;
    enlaceActual = item.opciones[0].url;
  } else if (item.tipo === "serie") {
    contenedor.innerHTML = `<p class="text-center py-10 text-gray-400">📺 Selecciona temporada y capítulo</p>`;
  } else {
    contenedor.innerHTML = `<div class="text-center py-10 text-gray-400">❌ Sin enlaces disponibles</div>`;
  }

  mostrarRecomendaciones(item);
  document.getElementById("paginaDetalle").style.display = "block";
  document.body.style.overflow = "hidden";
  agregarAlHistorial(item);
}

function cambiarFuente(url, boton) {
  document.querySelectorAll(".btn-opcion").forEach(btn => btn.classList.remove("activo"));
  boton.classList.add("activo");
  enlaceActual = url;
  document.getElementById("reproductorPrincipal").innerHTML = `<iframe src="${url}" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture; fullscreen; *" sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-top-navigation-by-user-activation" referrerpolicy="no-referrer-when-downgrade" allowfullscreen loading="lazy"></iframe>`;
}

function cerrarDetalle() {
  document.getElementById("paginaDetalle").style.display = "none";
  document.body.style.overflow = "auto";
}

function agregarAlHistorial(item) {
  let h = JSON.parse(localStorage.getItem("historialTely")) || [];
  h = h.filter(x => x.id !== item.id);
  h.unshift({ id: item.id, titulo: item.titulo, tipo: item.tipo });
  if (h.length > 10) h.pop();
  localStorage.setItem("historialTely", JSON.stringify(h));
  mostrarHistorial();
}

function mostrarHistorial() {
  const c = document.getElementById("listaHistorial");
  const h = JSON.parse(localStorage.getItem("historialTely")) || [];
  c.innerHTML = h.length ? "" : `<div class="historial-vacio">Aún no ves nada</div>`;
  h.forEach(i => {
    const btn = document.createElement("button");
    btn.innerHTML = `<i class="fa-solid fa-play mr-2"></i> ${i.titulo}`;
    btn.onclick = () => { const f = contenido.find(x => x.id === i.id); if (f) abrirDetalle(f); };
    c.appendChild(btn);
  });
}

function limpiarHistorial() { localStorage.removeItem("historialTely"); mostrarHistorial(); }

function enviarCodigo() { alert("Función de teléfono en desarrollo"); }
function verificarCodigo() { alert("Verificación en desarrollo"); }

function cerrarSesion() { 
  auth.signOut().then(() => { 
    document.getElementById("nombrePerfil").textContent = "Acceder"; 
    localStorage.removeItem("historialTely");
    mostrarHistorial();
  }); 
}

function mostrarRecomendaciones(itemActual) {
  const contenedor = document.getElementById("recomendadasLista");
  contenedor.innerHTML = "";
  const similares = contenido.filter(x =>
    x.id !== itemActual.id &&
    x.tipo === itemActual.tipo &&
    x.genero && itemActual.genero &&
    x.genero.includes(itemActual.genero.split("/")[0].trim())
  ).slice(0, 8);

  if (similares.length === 0) {
    contenedor.innerHTML = `<p class="text-gray-400 w-full text-center py-4">No hay recomendaciones disponibles</p>`;
    return;
  }

  similares.forEach(sim => {
    const tarjeta = document.createElement("div");
    tarjeta.className = "tarjeta-recomendada";
    tarjeta.innerHTML = `
      <img src="${sim.portada}" alt="${sim.titulo}" class="portada-recomendada" loading="lazy">
      <div class="texto-recomendada">${sim.titulo}</div>
    `;
    tarjeta.onclick = () => abrirDetalle(sim);
    contenedor.appendChild(tarjeta);
  });
}

auth.onAuthStateChanged(usuario => {
  if (usuario) {
    document.getElementById("nombrePerfil").textContent = usuario.displayName || usuario.phoneNumber || usuario.email;
  }
  cargarTodoContenido();
});

window.addEventListener('popstate', function(e) {
  if (document.getElementById("paginaDetalle").style.display === "block") {
    cerrarDetalle();
    e.preventDefault();
    history.pushState(null, '', window.location.href);
  }
});

history.pushState(null, '', window.location.href);
</script>
