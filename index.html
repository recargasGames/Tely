<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TELY 🎬 - Inicio</title>
    <link rel="preconnect" href="https://image.tmdb.org">
    <link rel="dns-prefetch" href="https://image.tmdb.org">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0A0A0F;color:#fff;font-family:'Segoe UI',Roboto,sans-serif;min-height:100vh;transition:background 0.3s, color 0.3s;display:flex}
        body.dark{background:#0A0A0F;color:#fff}
        body:not(.dark){background:#f0f0f0;color:#111}
        
        .sidebar{position:fixed;top:0;left:0;bottom:0;width:72px;background:rgba(10,10,15,.97);backdrop-filter:blur(12px);border-right:1px solid rgba(124,58,237,.12);z-index:100;display:flex;flex-direction:column;align-items:center;padding:.8rem 0;overflow-y:auto;transition:width 0.3s}
        body:not(.dark) .sidebar{background:rgba(255,255,255,.97);border-color:rgba(0,0,0,.08)}
        .sidebar:hover{width:200px}
        .sidebar:hover .sidebar-link span{display:inline}
        .sidebar-logo{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,#7C3AED,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1.5rem;text-align:center;width:100%;padding:0 .5rem}
        .sidebar-logo small{display:block;font-size:.55rem;color:#64748B;-webkit-text-fill-color:#64748B}
        .sidebar-nav{display:flex;flex-direction:column;gap:.2rem;width:100%;padding:0 .3rem}
        .sidebar-link{display:flex;align-items:center;gap:.8rem;padding:.6rem .8rem;border-radius:10px;color:#94A3B8;text-decoration:none;font-weight:600;font-size:.85rem;transition:.3s;white-space:nowrap}
        .sidebar-link:hover{background:rgba(124,58,237,.12);color:#fff}
        .sidebar-link.active{background:rgba(124,58,237,.2);color:#fff}
        .sidebar-link i{font-size:1.2rem;min-width:24px;text-align:center}
        .sidebar-link span{display:none}
        .sidebar:hover .sidebar-link span{display:inline}
        body:not(.dark) .sidebar-link{color:#555}
        body:not(.dark) .sidebar-link:hover{background:rgba(124,58,237,.08);color:#111}
        body:not(.dark) .sidebar-link.active{background:rgba(124,58,237,.12);color:#7C3AED}
        .sidebar-bottom{margin-top:auto;display:flex;flex-direction:column;gap:.2rem;width:100%;padding:0 .3rem}
        
        .main-content{flex:1;margin-left:72px;padding:1rem;max-width:calc(100% - 72px)}
        @media(max-width:768px){.sidebar{width:56px}.main-content{margin-left:56px;max-width:calc(100% - 56px)}}
        
        .top-header{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0 1rem;flex-wrap:wrap;gap:.5rem}
        .top-header h1{font-size:1.3rem;font-weight:700;background:linear-gradient(135deg,#7C3AED,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .top-actions{display:flex;align-items:center;gap:.5rem}
        .theme-btn{background:rgba(255,255,255,.05);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:.9rem;transition:.3s}
        .theme-btn:hover{background:rgba(255,255,255,.1)}
        body:not(.dark) .theme-btn{background:rgba(0,0,0,.05);color:#111}
        body:not(.dark) .theme-btn:hover{background:rgba(0,0,0,.1)}
        .user-btn{background:rgba(124,58,237,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;transition:.3s}
        .user-btn:hover{background:rgba(124,58,237,.3)}
        body:not(.dark) .user-btn{color:#111}
        
        .search-bar{display:flex;align-items:center;gap:.5rem;max-width:500px;margin-bottom:1rem;position:relative}
        .search-bar input{flex:1;padding:.5rem 1rem;border-radius:9999px;border:2px solid rgba(124,58,237,.2);background:rgba(255,255,255,.05);color:#fff;font-size:.9rem;transition:.3s}
        .search-bar input:focus{outline:none;border-color:#7C3AED;background:rgba(255,255,255,.08)}
        .search-bar input::placeholder{color:#64748B}
        body:not(.dark) .search-bar input{background:rgba(0,0,0,.05);color:#111;border-color:rgba(0,0,0,.1)}
        body:not(.dark) .search-bar input::placeholder{color:#888}
        .search-bar button{padding:.4rem 1.2rem;border-radius:9999px;border:none;background:#7C3AED;color:#fff;font-size:.9rem;cursor:pointer;transition:.3s}
        .search-bar button:hover{background:#6D28D9}
        .search-results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:rgba(26,26,46,.98);border-radius:12px;max-height:300px;overflow-y:auto;display:none;z-index:50;border:1px solid rgba(124,58,237,.15);padding:.3rem 0}
        .search-results.show{display:block}
        body:not(.dark) .search-results{background:rgba(255,255,255,.98);border-color:rgba(0,0,0,.1)}
        .search-result{display:flex;align-items:center;gap:.6rem;padding:.4rem .8rem;cursor:pointer;transition:.2s}
        .search-result:hover{background:rgba(124,58,237,.1)}
        .search-result img{width:30px;height:45px;object-fit:cover;border-radius:4px}
        .search-result .info{flex:1}
        .search-result .info .title{font-weight:600;font-size:.8rem}
        .search-result .info .detail{font-size:.65rem;color:#94A3B8}
        
        .grid-movies{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.6rem}
        @media(min-width:768px){.grid-movies{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}}
        @media(min-width:1024px){.grid-movies{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}}
        
        .movie-card{background:rgba(255,255,255,.04);border-radius:8px;overflow:hidden;cursor:pointer;border:1px solid rgba(124,58,237,.06);transition:.3s;position:relative}
        .movie-card:hover{transform:translateY(-3px);border-color:rgba(124,58,237,.2)}
        body:not(.dark) .movie-card{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.08)}
        .movie-card .poster{width:100%;aspect-ratio:2/3;object-fit:cover;background:#1A1A2E}
        .movie-card .info{padding:.3rem .4rem}
        .movie-card .info h4{font-size:.7rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        body:not(.dark) .movie-card .info h4{color:#111}
        .movie-card .info .meta{display:flex;justify-content:space-between;font-size:.55rem;color:#94A3B8}
        .movie-card .badge-year{position:absolute;top:.3rem;left:.3rem;background:rgba(124,58,237,.85);color:#fff;padding:.1rem .4rem;border-radius:3px;font-size:.5rem;font-weight:700}
        .movie-card .badge-type{position:absolute;top:.3rem;right:.3rem;background:rgba(0,0,0,.7);color:#fff;padding:.1rem .4rem;border-radius:3px;font-size:.45rem;font-weight:600}
        .movie-card .badge-op2{position:absolute;bottom:.3rem;right:.3rem;background:rgba(59,130,246,.85);color:#fff;padding:.05rem .3rem;border-radius:3px;font-size:.4rem;font-weight:600}
        
        .section-title{font-size:1rem;font-weight:700;margin:.8rem 0 .5rem;display:flex;align-items:center;gap:.4rem}
        .section-title i{color:#7C3AED}
        body:not(.dark) .section-title{color:#111}
        
        .horizontal-scroll{display:flex;gap:.6rem;overflow-x:auto;padding:.3rem 0;scrollbar-width:none}
        .horizontal-scroll::-webkit-scrollbar{display:none}
        .horizontal-scroll .movie-card{flex:0 0 auto;width:100px}
        
        .skeleton{aspect-ratio:2/3;border-radius:8px;background:linear-gradient(90deg,#1A1A2E 25%,#2D2D44 50%,#1A1A2E 75%);background-size:200% 100%;animation:skeleton 1.5s infinite}
        body:not(.dark) .skeleton{background:linear-gradient(90deg,#e0e0e0 25%,#f0f0f0 50%,#e0e0e0 75%);background-size:200% 100%}
        @keyframes skeleton{0%{background-position:-200% 0}100%{background-position:200% 0}}
        
        .load-more{display:flex;justify-content:center;padding:1rem 0}
        .load-more button{background:rgba(124,58,237,.15);color:#fff;padding:.4rem 1.5rem;border-radius:9999px;border:2px solid rgba(124,58,237,.2);font-weight:600;cursor:pointer;font-size:.85rem;transition:.3s}
        .load-more button:hover{background:rgba(124,58,237,.25);border-color:#7C3AED}
        body:not(.dark) .load-more button{color:#111;background:rgba(124,58,237,.1)}
        
        .user-dropdown{position:absolute;right:0;top:calc(100% + 8px);background:rgba(26,26,46,.95);border-radius:12px;width:200px;border:1px solid rgba(124,58,237,.15);padding:.4rem 0;display:none;z-index:50;box-shadow:0 20px 60px rgba(0,0,0,.5)}
        .user-dropdown.show{display:block}
        body:not(.dark) .user-dropdown{background:rgba(255,255,255,.95);border-color:rgba(0,0,0,.1)}
        .user-dropdown a{display:flex;align-items:center;gap:.6rem;padding:.4rem 1rem;color:#CBD5E1;text-decoration:none;font-size:.85rem;transition:.2s}
        .user-dropdown a:hover{background:rgba(124,58,237,.08);color:#fff}
        body:not(.dark) .user-dropdown a{color:#333}
        body:not(.dark) .user-dropdown a:hover{background:rgba(124,58,237,.08);color:#111}
        .user-dropdown hr{margin:.2rem 0;border:none;border-top:1px solid rgba(124,58,237,.08)}
        .user-menu{position:relative}
        .empty-msg{color:#64748B;font-size:.85rem;padding:.3rem 0}
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="sidebar-logo">TELY<small>🍿</small></div>
    <div class="sidebar-nav">
        <a href="index.html" class="sidebar-link active"><i class="fas fa-home"></i><span>Inicio</span></a>
        <a href="peliculas.html" class="sidebar-link"><i class="fas fa-film"></i><span>Películas</span></a>
        <a href="series.html" class="sidebar-link"><i class="fas fa-tv"></i><span>Series</span></a>

<main class="main-content">
    <div class="top-header">
        <h1><i class="fas fa-home"></i> Inicio</h1>
        <div class="top-actions">
            <button class="theme-btn" onclick="toggleTheme()" id="themeBtn"><i class="fas fa-moon"></i></button>
            <div class="user-menu">
                <button class="user-btn" onclick="toggleUserMenu()"><i class="fas fa-user-circle"></i></button>
                <div class="user-dropdown" id="userDropdown">
                    <a href="perfil.html"><i class="fas fa-user"></i> Mi perfil</a>
                    <hr>
                    <a href="#" id="loginBtn" onclick="irALogin()"><i class="fas fa-sign-in-alt"></i> Iniciar sesión</a>
                    <a href="#" id="logoutBtn" style="display:none;" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</a>

            </div>

    <div class="search-bar">
        <input type="text" placeholder="🔍 Buscar películas, series..." id="searchInput" onkeydown="if(event.key==='Enter') buscarGlobal()" oninput="mostrarSugerencias(this.value)">

    <div class="section-title"><i class="fas fa-fire"></i> Películas populares</div>
    <div class="grid-movies" id="peliculasPopulares">
        <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
        <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    </div>

    <div class="section-title"><i class="fas fa-star"></i> Series populares</div>
    <div class="grid-movies" id="seriesPopulares">
        <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
        <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    </div>

    <div class="load-more"><button onclick="cargarMas()"><i class="fas fa-plus"></i> Cargar más</button></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyCwLATDpQN1RWv3rLPjJXbNnIBkyo_BUfI",
    authDomain: "tely-ap.firebaseapp.com",
    databaseURL: "https://tely-ap-default-rtdb.firebaseio.com",
    projectId: "tely-ap",
    storageBucket: "tely-ap.firebasestorage.app",
    messagingSenderId: "760862940967",
    appId: "1:760862940967:web:69bbbbfee0de40f68a1302"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ⭐ BOTÓN ATRÁS
history.pushState(null, '', window.location.href);
window.addEventListener('popstate', function(e) {
    const modal = document.querySelector('.modal-reproductor');
    if (modal && modal.classList.contains('abierto')) {
        cerrarReproductor();
        e.preventDefault();
        history.pushState(null, '', window.location.href);
        return false;
    }
    return true;
});
document.addEventListener('backbutton', function(e) {
    const modal = document.querySelector('.modal-reproductor');
    if (modal && modal.classList.contains('abierto')) {
        cerrarReproductor();
        e.preventDefault();
        e.stopPropagation();
        return false;
    }
}, false);

// 🔐 AUTENTICACIÓN
function irALogin() { window.location.href = 'login.html'; }
function cerrarSesion() { auth.signOut().then(() => { location.reload(); }); }
function toggleUserMenu() { document.getElementById('userDropdown').classList.toggle('show'); }
document.addEventListener('click', (e) => {
    const menu = document.getElementById('userDropdown');
    if (menu && !e.target.closest('.user-menu')) menu.classList.remove('show');
});
auth.onAuthStateChanged(user => {
    document.getElementById('loginBtn').style.display = user ? 'none' : 'flex';
    document.getElementById('logoutBtn').style.display = user ? 'flex' : 'none';
});

// 🌓 MODO OSCURO
function toggleTheme() {
    const body = document.body;
    const btn = document.getElementById('themeBtn');
    if (body.classList.contains('dark')) {
        body.classList.remove('dark');
        btn.innerHTML = '<i class="fas fa-moon"></i>';
        localStorage.setItem('theme', 'light');
    } else {
        body.classList.add('dark');
        btn.innerHTML = '<i class="fas fa-sun"></i>';
        localStorage.setItem('theme', 'dark');
    }
}
if (localStorage.getItem('theme') === 'light') {
    document.body.classList.remove('dark');
    document.getElementById('themeBtn').innerHTML = '<i class="fas fa-moon"></i>';
} else {
    document.body.classList.add('dark');
    document.getElementById('themeBtn').innerHTML = '<i class="fas fa-sun"></i>';
}

function getImagenUrl(path, size = 'w342') {
    if (!path) return 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg';
    return `https://image.tmdb.org/t/p/${size}${path}`;
}

function crearTarjeta(item, esSerie = false) {
    const div = document.createElement('div');
    div.className = 'movie-card';
    const tipo = esSerie ? '📺' : '🎬';
    const tieneOp2 = item.opcion2 && item.opcion2.trim() !== '';
    div.innerHTML = `
        <span class="badge-year">${item.anio || 'N/D'}</span>
        <span class="badge-type">${tipo}</span>
        ${tieneOp2 ? '<span class="badge-op2">🔗 Op2</span>' : ''}
        <img src="${item.portada}" alt="${item.titulo}" class="poster" loading="lazy" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg'">
        <div class="info"><h4>${item.titulo}</h4><div class="meta"><span>⭐ ${item.puntuacion || 'N/A'}</span></div></div>
    `;
    div.onclick = () => {
        if (auth.currentUser) {
            const params = new URLSearchParams();
            params.set('play', item.tmdb_id || item.id);
            params.set('tipo', item.tipo || 'pelicula');
            window.location.href = `reproductor.html?${params.toString()}`;
        } else {
            window.location.href = 'login.html';
        }
    };
    return div;
}

async function cargarContenido() {
    try {
        const [pelis, series] = await Promise.all([
            fetch('https://tely-xi.vercel.app/api/tmdb?path=movie/popular&page=1').then(r => r.json()).catch(() => ({ results: [] })),
            fetch('https://tely-xi.vercel.app/api/tmdb?path=tv/popular&page=1').then(r => r.json()).catch(() => ({ results: [] }))
        ]);

        const pelisContainer = document.getElementById('peliculasPopulares');
        const seriesContainer = document.getElementById('seriesPopulares');
        pelisContainer.innerHTML = '';
        seriesContainer.innerHTML = '';

        const adminSnap = await db.ref('contenido_personalizado').once('value');
        const adminData = adminSnap.val() || {};
        const adminMap = {};
        Object.values(adminData).forEach(i => { adminMap[i.tmdb_id] = i; });

        (pelis.results || []).slice(0, 12).forEach(p => {
            const a = adminMap[p.id];
            const item = {
                id: p.id, tmdb_id: p.id,
                titulo: a?.titulo || p.title || 'Sin título',
                anio: a?.anio || (p.release_date ? p.release_date.split('-')[0] : 'N/D'),
                tipo: 'pelicula',
                portada: a?.portada || getImagenUrl(p.poster_path, 'w342'),
                puntuacion: a?.puntuacion || (p.vote_average ? p.vote_average.toFixed(1) : 'N/A'),
                url: a?.url || `https://unlimplay.com/play/embed/movie/${p.id}?lang=es-MX`,
                opcion2: a?.opcion2 || `https://vidsrc.in/embed/movie/${p.id}?lang=es`
            };
            pelisContainer.appendChild(crearTarjeta(item));
        });

        (series.results || []).slice(0, 12).forEach(s => {
            const a = adminMap[s.id];
            const item = {
                id: s.id, tmdb_id: s.id,
                titulo: a?.titulo || s.name || 'Sin título',
                anio: a?.anio || (s.first_air_date ? s.first_air_date.split('-')[0] : 'N/D'),
                tipo: 'serie',
                portada: a?.portada || getImagenUrl(s.poster_path, 'w342'),
                puntuacion: a?.puntuacion || (s.vote_average ? s.vote_average.toFixed(1) : 'N/A'),
                url: a?.url || `https://unlimplay.com/play/embed/tv/${s.id}/1/1?lang=es-MX`,
                opcion2: a?.opcion2 || `https://vidsrc.in/embed/tv/${s.id}/1/1?lang=es`
            };
            seriesContainer.appendChild(crearTarjeta(item, true));
        });

        cargarContinuarViendo();
    } catch(e) { console.error(e); }
}

function cargarContinuarViendo() {
    const container = document.getElementById('continuarViendo');
    const historial = JSON.parse(localStorage.getItem('historialTely')) || [];
    if (!historial.length) { container.innerHTML = '<p class="empty-msg">No has visto nada aún</p>'; return; }
    container.innerHTML = '';
    historial.slice(0, 10).forEach(entry => {
        const div = document.createElement('div');
        div.className = 'movie-card';
        div.style.width = '100px';
        div.style.flexShrink = '0';
        const pos = entry.temporada !== null && entry.capitulo !== null ? ` T${entry.temporada+1} Cap${entry.capitulo+1}` : '';
        div.innerHTML = `
            <img src="${entry.portada || 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg'}" class="poster" loading="lazy" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg'">
            <div class="info"><h4>${entry.titulo}${pos}</h4></div>
        `;
        div.onclick = () => {
            if (auth.currentUser) {
                const params = new URLSearchParams();
                params.set('play', entry.id);
                params.set('tipo', entry.tipo || 'pelicula');
                if (entry.temporada !== null) params.set('temp', entry.temporada);
                if (entry.capitulo !== null) params.set('cap', entry.capitulo);
                window.location.href = `reproductor.html?${params.toString()}`;
            } else { window.location.href = 'login.html'; }
        };
        container.appendChild(div);
    });
}

async function mostrarSugerencias(texto) {
    const container = document.getElementById('searchResults');
    if (!texto || texto.length < 2) { container.classList.remove('show'); return; }
    try {
        const [pelis, series] = await Promise.all([
            fetch(`https://tely-xi.vercel.app/api/tmdb?path=search/movie&query=${encodeURIComponent(texto)}&page=1`).then(r => r.json()).catch(() => ({ results: [] })),
            fetch(`https://tely-xi.vercel.app/api/tmdb?path=search/tv&query=${encodeURIComponent(texto)}&page=1`).then(r => r.json()).catch(() => ({ results: [] }))
        ]);
        const resultados = [...(pelis.results || []), ...(series.results || [])];
        if (!resultados.length) { container.classList.remove('show'); return; }
        container.innerHTML = '';
        resultados.slice(0, 8).forEach(item => {
            const div = document.createElement('div');
            div.className = 'search-result';
            div.innerHTML = `
                <img src="${getImagenUrl(item.poster_path, 'w92')}" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg'">
                <div class="info"><div class="title">${item.title || item.name}</div><div class="detail">${item.media_type === 'tv' ? '📺 Serie' : '🎬 Película'}</div></div>
            `;
            div.onclick = () => {
                const tipo = item.media_type === 'tv' ? 'serie' : 'pelicula';
                const params = new URLSearchParams();
                params.set('play', item.id);
                params.set('tipo', tipo);
                window.location.href = `reproductor.html?${params.toString()}`;
                container.classList.remove('show');
            };
            container.appendChild(div);
        });
        container.classList.add('show');
    } catch(e) { container.classList.remove('show'); }
}

function buscarGlobal() {
    const input = document.getElementById('searchInput');
    if (input.value.trim()) mostrarSugerencias(input.value);
}

function cargarMas() {
    mostrarToast('🔄 Cargando más contenido...', 'info');
}

function mostrarToast(msg, tipo = 'success') {
    const colores = { success: '#10B981', warning: '#F59E0B', error: '#EF4444', info: '#3B82F6' };
    const t = document.createElement('div');
    t.style.cssText = `position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:${colores[tipo] || '#10B981'};color:#fff;padding:10px 20px;border-radius:10px;z-index:9999;font-weight:600;max-width:90%;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:opacity 0.3s;`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2500);
}
