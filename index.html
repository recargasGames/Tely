async function cargarContenidoAdmin() {
  try {
    const snapshot = await db.ref("contenido_personalizado").once("value");
    const datosAdmin = snapshot.val();
    return datosAdmin ? Object.values(datosAdmin) : [];
  } catch (err) {

async function cargarContenidoCompleto() {
  const lista = document.getElementById("lista-contenido");
  lista.innerHTML = '<div class="col-span-3 text-center py-10 text-gray-400">Cargando contenido...</div>';

  try {
    const resPeliculas = await fetch(`${TMDB_BASE}/movie/popular?language=${TMDB_LANG}&page=1`, opcionesTMDB);
    const datosPeliculas = await resPeliculas.json();
    
    const resSeries = await fetch(`${TMDB_BASE}/tv/popular?language=${TMDB_LANG}&page=1`, opcionesTMDB);
    const datosSeries = await resSeries.json();
    
    const contenidoAdmin = await cargarContenidoAdmin();

    const pelisTMDB = datosPeliculas.results ? datosPeliculas.results.slice(0, 12).map(p => ({
      id: `tmdb_${p.id}`,
      tmdb_id: p.id,
      titulo: p.title || "Sin título",
      anio: p.release_date ? p.release_date.split("-")[0] : "N/D",
      tipo: "pelicula",
      categoria: "peliculas",
      portada: p.poster_path ? `${TMDB_IMG}${p.poster_path}` : "https://via.placeholder.com/300x450?text=Sin+Portada",
      sinopsis: p.overview || "Sin sinopsis",
      puntuacion: p.vote_average ? p.vote_average.toFixed(1) : "N/A",
      genero: "Película",
      url: ""
    })) : [];

    const seriesTMDB = datosSeries.results ? datosSeries.results.slice(0, 8).map(s => ({
      id: `tmdb_${s.id}`,
      tmdb_id: s.id,
      titulo: s.name || "Sin título",
      anio: s.first_air_date ? s.first_air_date.split("-")[0] : "N/D",
      tipo: "serie",
      categoria: "series",
      portada: s.poster_path ? `${TMDB_IMG}${s.poster_path}` : "https://via.placeholder.com/300x450?text=Sin+Portada",
      sinopsis: s.overview || "Sin sinopsis",
      puntuacion: s.vote_average ? s.vote_average.toFixed(1) : "N/A",
      genero: "Serie",
      url: "",
      temporadas: []
    })) : [];

    contenido = [...MI_CONTENIDO, ...contenidoAdmin, ...pelisTMDB, ...seriesTMDB];
    
    if (contenido.length === 0) {
      contenido = [...MI_CONTENIDO, ...contenidoAdmin];
    }

  } catch (err) {
    console.error("Error TMDB:", err);
    const contenidoAdmin = await cargarContenidoAdmin();
    contenido = [...MI_CONTENIDO, ...contenidoAdmin];
  }

  document.getElementById("contadorTotal").textContent = `${contenido.length} títulos`;
  mostrarContenido("estrenos");
  mostrarRecientes();
}

function iniciarConGoogle() {
  const btn = document.getElementById('btnGoogleLogin');
  const textoOriginal = btn.innerHTML;
  
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Esperando...';
  btn.disabled = true;
  
  const proveedor = new firebase.auth.GoogleAuthProvider();
  proveedor.setCustomParameters({ 'prompt': 'select_account' });
  
  auth.signInWithPopup(proveedor)
    .then((result) => {
      document.getElementById("nombrePerfil").textContent = result.user.displayName || result.user.email;
      cerrarModalLogin();
      btn.innerHTML = textoOriginal;
      btn.disabled = false;
      if (videoPendiente) { 
        abrirVideoPelicula(videoPendiente);
        agregarAlHistorial(videoPendiente);
        videoPendiente = null; 
      }
    })
    .catch((error) => {
      btn.innerHTML = textoOriginal;
      btn.disabled = false;
      
      if (error.code === 'auth/popup-closed-by-user') {
        alert("⚠️ Cerraste la ventana de Google antes de terminar.\n\nVuelve a intentarlo.");
      } else {
        alert("Error: " + error.message);
      }
    });
}

function iniciarRecaptcha() {
  if (!recaptchaVerifier) recaptchaVerifier = new firebase.auth.RecaptchaVerifier('modal-login', { size: 'invisible' });
}

function enviarCodigo() {

  const telefono = document.getElementById("telefonoInput").value.trim();

function cambiarModo() {
  const body = document.body;
  const icono = document.getElementById("iconoModo");
  const icono2 = document.getElementById("iconoModo2");
  if (body.classList.contains("dark")) {
    body.classList.remove("dark");
    icono.className = "fa-solid fa-moon";
    if (icono2) icono2.className = "fa-solid fa-moon";
    localStorage.setItem("modo", "claro");
  } else {
    body.classList.add("dark");
    icono.className = "fa-solid fa-sun";
    if (icono2) icono2.className = "fa-solid fa-sun";
    localStorage.setItem("modo", "oscuro");
  }
}

if (localStorage.getItem("modo") === "oscuro" || (!localStorage.getItem("modo") && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
  document.body.classList.add("dark");
  document.getElementById("iconoModo").className = "fa-solid fa-sun";
}

function agregarAlHistorial(item) {
  let h = JSON.parse(localStorage.getItem("historialTely")) || [];
  h = h.filter(x => x.id !== item.id);
  h.unshift({ id: item.id, titulo: item.titulo, tipo: item.tipo });
  if (h.length > 10) h.pop();
  localStorage.setItem("historialTely", JSON.stringify(h));
  mostrarHistorial();
  mostrarRecientes();
}

function mostrarHistorial() {
  const c = document.getElementById("listaHistorial");
  const h = JSON.parse(localStorage.getItem("historialTely")) || [];
  c.innerHTML = h.length ? "" : `<div class="historial-vacio">Aún no has visto nada</div>`;
  h.forEach(i => {
    const btn = document.createElement("button");
    btn.innerHTML = `<i class="fa-solid fa-play mr-2"></i> ${i.titulo}`;
    btn.onclick = () => { 
      const f = contenido.find(x => x.id === i.id); 
      if (!f) return; 
      auth.currentUser ? abrirVideoPelicula(f) : (videoPendiente = f, abrirModalLogin(), toggleMenu()); 
    };
    c.appendChild(btn);
  });
}

function mostrarRecientes() {
  const contenedor = document.getElementById("scrollRecientes");
  const historial = JSON.parse(localStorage.getItem("historialTely")) || [];
  
  if (historial.length === 0) {
    contenedor.innerHTML = `<p class="text-gray-400 text-sm py-2">No has visto nada aún</p>`;
    return;
  }
  
  contenedor.innerHTML = "";
  historial.forEach(item => {
    const encontrado = contenido.find(c => c.id === item.id);
    if (!encontrado) return;
    
    const tarjeta = document.createElement("div");
    tarjeta.className = "tarjeta-reciente";
    tarjeta.innerHTML = `
      <img src="${encontrado.portada}" alt="${encontrado.titulo}" class="portada-reciente" loading="lazy" onerror="this.src='https://via.placeholder.com/120x180?text=Sin+Portada'">
      <div class="info-reciente">
        <h4>${encontrado.titulo}</h4>
      </div>
    `;
    tarjeta.onclick = () => {
      auth.currentUser ? abrirVideoPelicula(encontrado) : (videoPendiente = encontrado, abrirModalLogin());
    };
    contenedor.appendChild(tarjeta);
  });
}

function abrirVideoPelicula(peli) {
    detenerVideo();
    
    const modal = document.getElementById("modal-video");
    const player = document.getElementById("netflixPlayer");
    const botones = document.getElementById("botonesOpciones");

    modal.classList.add("abierto");
    document.body.style.overflow = "hidden";
    
    // 🔥 GIRAR LA PANTALLA AUTOMÁTICAMENTE A HORIZONTAL
    if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('landscape').catch(function() {
            // Si no se puede bloquear, intentar con pantalla completa
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(function() {});
            }
        });
    } else if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(function() {});
    }
    
    // ACTUALIZAR TÍTULO Y SINOPSIS ARRIBA
    document.getElementById("tituloReproductor").textContent = peli.titulo;
    document.getElementById("anioPanel").textContent = peli.anio || "2024";
    document.getElementById("ratingPanel").textContent = peli.puntuacion || "7.0";
    document.getElementById("generoPanel").textContent = peli.genero || (peli.tipo === "pelicula" ? "Película" : "Serie");
    document.getElementById("sinopsisPanel").textContent = peli.sinopsis || "Sin sinopsis disponible";
    
    // CREAR BOTONES DE OPCIÓN
    botones.innerHTML = "";
    
    const btnPrincipal = document.createElement("button");
    btnPrincipal.className = "btn-opcion activo";
    btnPrincipal.innerHTML = `<i class="fa-solid fa-play mr-2"></i> Opción 1`;
    btnPrincipal.onclick = function() {
        document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo"));
        this.classList.add("activo");
        if (peli.url) {
            reproducirOpcion(peli.url);
        }
    };
    botones.appendChild(btnPrincipal);
    
    if (peli.opcion2) {
        const btnOpcion2 = document.createElement("button");
        btnOpcion2.className = "btn-opcion";
        btnOpcion2.innerHTML = `<i class="fa-solid fa-play mr-2"></i> Opción 2`;
        btnOpcion2.onclick = function() {
            document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo"));
            this.classList.add("activo");
            if (peli.opcion2) {
                reproducirOpcion(peli.opcion2);
            }
        };
        botones.appendChild(btnOpcion2);
    }
    
    const btnNuevaVentana = document.createElement("button");
    btnNuevaVentana.className = "btn-opcion btn-nueva-ventana";
    btnNuevaVentana.innerHTML = `<i class="fa-solid fa-external-link-alt mr-2"></i> Abrir en ventana nueva`;
    btnNuevaVentana.onclick = function() {
        if (peli.url) {
            window.open(peli.url, '_blank');
        } else {
            alert("❌ No hay enlace disponible");
        }
    };
    botones.appendChild(btnNuevaVentana);

    // REPRODUCIR AUTOMÁTICAMENTE
    if (peli.url) {
        reproducirOpcion(peli.url);
    } else {
        player.innerHTML = `<div class="error-video" style="color:#EF4444;text-align:center;padding:4rem;font-size:1.2rem;">❌ Agrega enlaces desde el panel de administración</div>`;
    }

    agregarAlHistorial(peli);
    cargarRecomendadas(peli.tmdb_id);
}

function reproducirOpcion(url) {
    const player = document.getElementById("netflixPlayer");
    let enlace = url.trim();

    // 🔥 VIDMOLY - CON PANTALLA COMPLETA NATIVA
    if (enlace.includes('vidmoly')) {
        if (!enlace.includes('controls=')) {
            enlace += (enlace.includes('?') ? '&' : '?') + 'controls=1&logo=0&autoplay=1';
        }
        player.innerHTML = `
            <object data="${enlace}" type="text/html" 
                style="width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;">
            </object>
        `;
    } else if (enlace.includes('youtube.com') || enlace.includes('youtu.be')) {
        player.innerHTML = `
            <iframe src="${enlace}" frameborder="0" 
                allow="autoplay; encrypted-media; picture-in-picture; fullscreen" 
                allowfullscreen 
                style="width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;">
            </iframe>
        `;
    } else if (enlace.includes('mixdrop')) {
        if (!enlace.includes('autoplay')) {
            enlace += (enlace.includes('?') ? '&' : '?') + 'autoplay=1';
        }
        player.innerHTML = `
            <iframe src="${enlace}" frameborder="0" 
                allow="autoplay; encrypted-media; picture-in-picture; fullscreen" 
                allowfullscreen 
                style="width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;">
            </iframe>
        `;
    } else if (enlace.includes('drive.google.com')) {
        const id = enlace.match(/[-\w]{25,}/)?.[0];
        if (id) {
            const driveUrl = `https://drive.google.com/uc?export=stream&id=${id}&confirm=t&cache=1`;
            player.innerHTML = `
                <video src="${driveUrl}" controlsList="nodownload noremoteplayback" controls playsinline preload="auto" crossorigin="anonymous" style="width:100%;height:100%;background:#000;position:absolute;top:0;left:0;" autoplay>
                    Tu navegador no soporta el video.
                </video>
            `;
        } else {
            player.innerHTML = `<div class="error-video" style="color:#EF4444;text-align:center;padding:4rem;font-size:1.2rem;">❌ Enlace de Drive inválido</div>`;
            return;
        }
    } else {
        player.innerHTML = `
            <iframe src="${enlace}" frameborder="0" 
                allow="autoplay; encrypted-media; picture-in-picture; fullscreen" 
                allowfullscreen 
                style="width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;">
            </iframe>
        `;
    }
}

async function cargarRecomendadas(tmdbId) {
    const contenedor = document.getElementById("recomendadasLista");
    contenedor.innerHTML = "<p class='text-gray-400 text-center py-3'>Cargando recomendaciones...</p>";

    if (!tmdbId) {
        contenedor.innerHTML = "<p class='text-gray-400 text-center py-3'>Sin recomendaciones disponibles</p>";
        return;
    }

    try {
        const res = await fetch(`${TMDB_BASE}/movie/${tmdbId}/recommendations?language=${TMDB_LANG}&page=1`, opcionesTMDB);
        const datos = await res.json();
        contenedor.innerHTML = "";

        if (!datos.results || datos.results.length === 0) {
            contenedor.innerHTML = "<p class='text-gray-400 text-center py-3'>No hay películas relacionadas</p>";
            return;
        }

        datos.results.slice(0, 6).forEach(pelicula => {
            const tarjeta = document.createElement("div");
            tarjeta.className = "tarjeta-recomendada";
            tarjeta.innerHTML = `
                <img src="${pelicula.poster_path ? TMDB_IMG + pelicula.poster_path : 'https://via.placeholder.com/110x165?text=Sin+Imagen'}" 
                     alt="${pelicula.title}" class="portada-recomendada">
                <p class="texto-recomendada">${pelicula.title}</p>
            `;
            tarjeta.onclick = () => {
                cerrarVideo();
                const completo = contenido.find(c => c.tmdb_id == pelicula.id);
                if (completo) {
                    abrirVideoPelicula(completo);
                } else {
                    abrirVideoPelicula({
                        id: `tmdb_${pelicula.id}`,
                        tmdb_id: pelicula.id,
                        titulo: pelicula.title,
                        anio: pelicula.release_date ? pelicula.release_date.split("-")[0] : "N/D",
                        tipo: "pelicula",
                        categoria: "peliculas",
                        portada: pelicula.poster_path ? TMDB_IMG + pelicula.poster_path : "",
                        sinopsis: pelicula.overview || "Sin sinopsis",
                        puntuacion: pelicula.vote_average ? pelicula.vote_average.toFixed(1) : "N/A",
                        genero: "Película",
                        url: ""
                    });
                }
            };
            contenedor.appendChild(tarjeta);
        });

    } catch (err) {
        contenedor.innerHTML = "<p class='text-red-400 text-center py-3'>Error al cargar recomendaciones</p>";
    }
}

    btnNuevaVentana.onclick = () => {
        if (cap.url) {
            window.open(cap.url, '_blank');
        } else {
            alert("❌ No hay enlace disponible");
        }
    };
    botones.appendChild(btnNuevaVentana);

    if (cap.url) {
        reproducirOpcion(cap.url);
    } else {
        player.innerHTML = `<div class="error-video" style="color:#EF4444;text-align:center;padding:4rem;font-size:1.2rem;">❌ Sin enlace para este capítulo</div>`;
    }
}

// ==============================================
// CERRAR VIDEO - VOLVER A ORIENTACIÓN NORMAL
// ==============================================
function cerrarVideo() {
    detenerVideo();
    const modal = document.getElementById("modal-video");
    modal.classList.remove("abierto");
    document.body.style.overflow = "auto";
    peliculaActual = null;
    
    // 🔥 VOLVER A LA ORIENTACIÓN NORMAL (vertical)
    if (screen.orientation && screen.orientation.unlock) {
        screen.orientation.unlock();
    } else if (document.exitFullscreen) {
        document.exitFullscreen().catch(function() {});
    }
}

function detenerVideo() {
    const player = document.getElementById("netflixPlayer");
    player.innerHTML = "";
}
