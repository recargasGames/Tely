<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyBPBDEVUR7hjNrxCYrefF9Sbl0Wofp3VoQ",
    authDomain: "telyx-23210.firebaseapp.com",
    projectId: "telyx-23210",
    storageBucket: "telyx-23210.firebasestorage.app",
    messagingSenderId: "10164285015",
    appId: "1:10164285015:web:5cf32bd2831de126c67d12",
    measurementId: "G-0YEZMJYMJS"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ⭐ VARIABLES
let categoriaActual = '';
let paginaCategoria = 1;
let cargandoCategoria = false;
let totalPaginasCategoria = 1;
let scrollTimeout = null;
let datosEnCache = {};

// ⭐ CATEGORÍAS ÚNICAS Y ORGANIZADAS (sin duplicados)
const CATEGORIAS = [
    { id: 'popular', nombre: '🔥 Populares', icon: 'fa-fire' },
    { id: 'action', nombre: '⚔️ Acción', icon: 'fa-fist-raised' },
    { id: 'thriller', nombre: '🔪 Suspenso', icon: 'fa-knife' },
    { id: 'drama', nombre: '🎭 Drama', icon: 'fa-mask' },
    { id: 'comedy', nombre: '😂 Comedia', icon: 'fa-laugh' },
    { id: 'horror', nombre: '👻 Terror', icon: 'fa-ghost' },
    { id: 'sci-fi', nombre: '🚀 Ciencia Ficción', icon: 'fa-rocket' },
    { id: 'romance', nombre: '💕 Romance', icon: 'fa-heart' },
    { id: 'animation', nombre: '🎨 Animación', icon: 'fa-paint-brush' },
    { id: 'adventure', nombre: '🏔️ Aventura', icon: 'fa-mountain' }
];

const GENEROS = {
    'action': 28,
    'thriller': 53,
    'drama': 18,
    'comedy': 35,
    'horror': 27,
    'sci-fi': 878,
    'romance': 10749,
    'animation': 16,
    'adventure': 12
};

// ⭐ FUNCIONES
function irALogin() { window.location.href = 'login.html'; }
function cerrarSesion() { auth.signOut().then(() => { location.reload(); }); }
function toggleUserMenu() { document.getElementById('userDropdown').classList.toggle('show'); }
document.addEventListener('click', (e) => {
    const menu = document.getElementById('userDropdown');
    if (menu && !e.target.closest('.user-menu')) menu.classList.remove('show');
});
auth.onAuthStateChanged(user => {
    document.getElementById('loginBtn').style.display = user ? 'none' : 'flex';
    document.getElementById('logoutBtn').style.display = user ? 'flex' : 'none';
});

function toggleTheme() {
    const body = document.body;
    const btn = document.getElementById('themeBtn');
    if (body.classList.contains('dark')) { 
        body.classList.remove('dark'); 
        btn.innerHTML = '<i class="fas fa-moon"></i>'; 
        localStorage.setItem('theme', 'light'); 
    } else { 
        body.classList.add('dark'); 
        btn.innerHTML = '<i class="fas fa-sun"></i>'; 
        localStorage.setItem('theme', 'dark'); 
    }
}
if (localStorage.getItem('theme') === 'light') { 
    document.body.classList.remove('dark'); 
    document.getElementById('themeBtn').innerHTML = '<i class="fas fa-moon"></i>'; 
} else { 
    document.body.classList.add('dark'); 
    document.getElementById('themeBtn').innerHTML = '<i class="fas fa-sun"></i>'; 
}

function getImagenUrl(path, size = 'w342') {
    if (!path) return 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg';
    return `https://image.tmdb.org/t/p/${size}${path}`;
}

async function fetchTMDB(path, params = {}) {
    const queryParams = new URLSearchParams();
    queryParams.append('path', path);
    Object.keys(params).forEach(key => queryParams.append(key, params[key]));
    const url = `https://tely-xi.vercel.app/api/tmdb?${queryParams.toString()}`;
    const response = await fetch(url);
    if (!response.ok) throw new Error(`Error: ${response.status}`);
    return response.json();
}

function crearTarjeta(item) {
    const div = document.createElement('div');
    div.className = 'movie-card';
    div.innerHTML = `
        <span class="badge-year">${item.anio || 'N/D'}</span>
        <img src="${item.portada}" alt="${item.titulo}" class="poster" loading="lazy" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg'">
        <div class="info">
            <h4>${item.titulo}</h4>
            <div class="meta"><span>⭐ ${item.puntuacion || 'N/A'}</span></div>
        </div>
    `;
    div.onclick = () => {
        // Guardar estado actual antes de ir al reproductor
        guardarEstadoActual();
        const params = new URLSearchParams();
        params.set('play', item.tmdb_id || item.id);
        params.set('tipo', 'pelicula');
        window.location.href = `reproductor.html?${params.toString()}`;
    };
    return div;
}

// ⭐ GUARDAR ESTADO PARA VOLVER CON CACHÉ
function guardarEstadoActual() {
    const estado = {
        scrollPos: document.getElementById('mainContent').scrollTop,
        timestamp: Date.now()
    };
    localStorage.setItem('tely_estado', JSON.stringify(estado));
}

function restaurarEstado() {
    try {
        const estado = JSON.parse(localStorage.getItem('tely_estado'));
        if (estado && Date.now() - estado.timestamp < 600000) { // 10 minutos
            document.getElementById('mainContent').scrollTop = estado.scrollPos || 0;
        }
        localStorage.removeItem('tely_estado');
    } catch(e) {}
}

// ⭐ CARGAR CATEGORÍA CON CACHÉ
async function cargarCategoria(categoriaId, contenedor, esModal = false, page = 1) {
    if (esModal && cargandoCategoria) return;
    if (esModal) cargandoCategoria = true;
    
    const grid = esModal ? document.getElementById('modalGrid') : contenedor;
    const cacheKey = `${categoriaId}_${page}`;
    
    // Verificar caché
    const cachedData = localStorage.getItem(`tely_cache_${cacheKey}`);
    if (cachedData && !esModal) {
        try {
            const parsed = JSON.parse(cachedData);
            if (Date.now() - parsed.timestamp < 600000) { // 10 minutos de caché
                contenedor.innerHTML = '';
                parsed.items.forEach(item => {
                    contenedor.appendChild(crearTarjeta(item));
                });
                return;
            }
        } catch(e) {}
    }
    
    if (!esModal) {
        contenedor.innerHTML = '';
        for (let i = 0; i < 6; i++) {
            const sk = document.createElement('div');
            sk.className = 'skeleton-card';
            contenedor.appendChild(sk);
        }
    } else if (page === 1) {
        grid.innerHTML = '<div class="modal-loading"><i class="fas fa-spinner fa-spin"></i> Cargando...</div>';
    }
    
    try {
        let data;
        if (categoriaId === 'popular') {
            data = await fetchTMDB('movie/popular', { page });
        } else {
            const genreId = GENEROS[categoriaId];
            if (genreId) {
                data = await fetchTMDB('discover/movie', { with_genres: genreId, page, sort_by: 'popularity.desc' });
            } else {
                data = await fetchTMDB('movie/popular', { page });
            }
        }
        
        if (!data.results || !data.results.length) {
            if (esModal && page === 1) {
                grid.innerHTML = '<div style="text-align:center;padding:1rem;color:#64748B;grid-column:1/-1;">No hay más películas</div>';
            }
            if (esModal) cargandoCategoria = false;
            return;
        }
        
        totalPaginasCategoria = data.total_pages || 1;
        
        const items = data.results.map(p => ({
            id: p.id,
            tmdb_id: p.id,
            titulo: p.title || 'Sin título',
            anio: p.release_date ? p.release_date.split('-')[0] : 'N/D',
            tipo: 'pelicula',
            portada: getImagenUrl(p.poster_path, 'w342'),
            puntuacion: p.vote_average ? p.vote_average.toFixed(1) : 'N/A'
        }));
        
        // Guardar en caché
        if (!esModal) {
            localStorage.setItem(`tely_cache_${cacheKey}`, JSON.stringify({
                items: items,
                timestamp: Date.now()
            }));
        }
        
        if (!esModal) {
            contenedor.innerHTML = '';
            items.forEach(item => {
                contenedor.appendChild(crearTarjeta(item));
            });
        } else {
            if (page === 1) grid.innerHTML = '';
            items.forEach(item => {
                grid.appendChild(crearTarjeta(item));
            });
            cargandoCategoria = false;
        }
        
    } catch(e) {
        console.error(e);
        if (!esModal) {
            contenedor.innerHTML = '<p class="empty-msg">Error al cargar</p>';
        } else if (page === 1) {
            grid.innerHTML = '<div style="text-align:center;padding:1rem;color:#EF4444;grid-column:1/-1;">Error al cargar</div>';
        }
        if (esModal) cargandoCategoria = false;
    }
}

// ⭐ VER MÁS (MODAL)
window.verMas = function(categoriaId, nombre) {
    categoriaActual = categoriaId;
    paginaCategoria = 1;
    document.getElementById('modalTitulo').textContent = nombre;
    document.getElementById('modalGrid').innerHTML = '<div class="modal-loading"><i class="fas fa-spinner fa-spin"></i> Cargando...</div>';
    document.getElementById('modalVerMas').classList.add('show');
    cargarCategoria(categoriaId, null, true, 1);
};

window.cerrarModal = function() {
    document.getElementById('modalVerMas').classList.remove('show');
    categoriaActual = '';
    paginaCategoria = 1;
    cargandoCategoria = false;
};

// ⭐ SCROLL INFINITO EN MODAL
document.addEventListener('DOMContentLoaded', function() {
    const modalGrid = document.getElementById('modalGrid');
    modalGrid.addEventListener('scroll', function() {
        clearTimeout(scrollTimeout);
        scrollTimeout = setTimeout(() => {
            if (cargandoCategoria) return;
            const scrollTop = modalGrid.scrollTop;
            const scrollHeight = modalGrid.scrollHeight;
            const clientHeight = modalGrid.clientHeight;
            
            if (scrollTop + clientHeight >= scrollHeight - 100) {
                if (paginaCategoria < totalPaginasCategoria) {
                    paginaCategoria++;
                    cargarCategoria(categoriaActual, null, true, paginaCategoria);
                }
            }
        }, 300);
    });
});

// ⭐ BOTÓN ATRÁS - UNA SOLA VEZ CIERRA EL MODAL
window.addEventListener('popstate', function(e) {
    if (document.getElementById('modalVerMas').classList.contains('show')) {
        cerrarModal();
        e.preventDefault();
        // Volver a poner el estado para que no cierre la app
        history.pushState(null, '', window.location.href);
    }
});

// ⭐ CARGAR TODAS LAS CATEGORÍAS CON CACHÉ
async function cargarTodasCategorias() {
    const container = document.getElementById('contenidoPrincipal');
    container.innerHTML = '';
    
    for (const cat of CATEGORIAS) {
        const section = document.createElement('div');
        section.className = 'categoria-section';
        section.innerHTML = `
            <div class="categoria-header">
                <h3><i class="fas ${cat.icon}"></i> ${cat.nombre}</h3>
                <button class="ver-mas-btn" onclick="verMas('${cat.id}', '${cat.nombre}')">
                    Ver más <i class="fas fa-ellipsis-h"></i>
                </button>
            </div>
            <div class="scroll-horizontal" id="scroll-${cat.id}"></div>
        `;
        container.appendChild(section);
        
        const scrollContainer = document.getElementById(`scroll-${cat.id}`);
        await cargarCategoria(cat.id, scrollContainer);
    }
    
    // Restaurar posición después de cargar todo
    setTimeout(restaurarEstado, 300);
}

// ⭐ BÚSQUEDA
window.mostrarSugerencias = async function(texto) {
    const container = document.getElementById('searchResults');
    if (!texto || texto.length < 2) { container.classList.remove('show'); return; }
    try {
        const [pelis, series] = await Promise.all([
            fetchTMDB('search/movie', { query: texto, page: 1 }),
            fetchTMDB('search/tv', { query: texto, page: 1 })
        ]);
        const resultados = [...(pelis.results || []), ...(series.results || [])];
        if (!resultados.length) { 
            container.innerHTML = '<div class="search-result" style="padding:.3rem .5rem;color:#94A3B8;font-size:.6rem;">No hay resultados</div>';
            container.classList.add('show');
            return;
        }
        container.innerHTML = '';
        resultados.slice(0, 6).forEach(item => {
            const div = document.createElement('div');
            div.className = 'search-result';
            const tipo = item.media_type === 'tv' ? '📺 Serie' : '🎬 Película';
            div.innerHTML = `
                <img src="${getImagenUrl(item.poster_path, 'w92')}" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg'">
                <div class="info"><div class="title">${item.title || item.name}</div><div class="detail">${tipo}</div></div>
            `;
            div.onclick = () => {
                guardarEstadoActual();
                const tipo = item.media_type === 'tv' ? 'serie' : 'pelicula';
                const params = new URLSearchParams();
                params.set('play', item.id);
                params.set('tipo', tipo);
                window.location.href = `reproductor.html?${params.toString()}`;
                container.classList.remove('show');
            };
            container.appendChild(div);
        });
        container.classList.add('show');
    } catch(e) { container.classList.remove('show'); }
};

window.buscarGlobal = function() {
    const input = document.getElementById('searchInput');
    if (input.value.trim()) window.mostrarSugerencias(input.value);
};

// ⭐ BANNER APK
function detectarPlataforma() {
    const ua = navigator.userAgent || '';
    const esWebView = /wv|WebView|Android.*(wv|WebView)/i.test(ua);
    const esNavegador = !esWebView && /Android|iPhone|iPad|iPod/i.test(ua);
    return { esWebView, esNavegador };
}

function mostrarBannerApp() {
    const banner = document.getElementById('bannerApp');
    if (!banner) return;
    if (localStorage.getItem('bannerAppCerrado') === 'true') return;
    const { esWebView, esNavegador } = detectarPlataforma();
    if (esNavegador) {
        banner.style.display = 'block';
        document.body.classList.add('banner-activo');
    }
}

function cerrarBannerApp() {
    const banner = document.getElementById('bannerApp');
    if (banner) {
        banner.style.display = 'none';
        document.body.classList.remove('banner-activo');
        localStorage.setItem('bannerAppCerrado', 'true');
    }
}

function descargarAPK() {
    const urlAPK = 'https://appsgeyser.io/19960416/Tely';
    mostrarToast('📱 Descargando...', 'info');
    const link = document.createElement('a');
    link.href = urlAPK;
    link.target = '_blank';
    link.download = 'Tely.apk';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    setTimeout(cerrarBannerApp, 2000);
}

function mostrarToast(msg, tipo = 'success') {
    const colores = { success: '#10B981', warning: '#F59E0B', error: '#EF4444', info: '#3B82F6' };
    const t = document.createElement('div');
    t.style.cssText = `position:fixed;bottom:60px;left:50%;transform:translateX(-50%);background:${colores[tipo] || '#10B981'};color:#fff;padding:5px 12px;border-radius:8px;z-index:9999;font-weight:600;font-size:.65rem;max-width:90%;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:opacity 0.3s;`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2000);
}

// ⭐ INICIAR
document.addEventListener('DOMContentLoaded', function() {
    setTimeout(mostrarBannerApp, 2000);
    // Agregar estado al historial para que el botón atrás funcione bien
    history.pushState(null, '', window.location.href);
});
