<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TELY 🎬</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; max-width: 100%; overflow-x: hidden; min-height: 100vh;
            background: #0A0A0F; color: #FFFFFF;
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
            font-size: 16px;
        }
        body.dark { background: #0A0A0F; color: #FFFFFF; }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #7C3AED; border-radius: 4px; }

        header { 
            padding: 0.7rem 1rem; 
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(124, 58, 237, 0.15);
            position: sticky; top: 0; z-index: 100; 
        }
        .logo-contenedor { display: flex; align-items: center; gap: 0.7rem; }
        .logo { height: 36px; width: auto; }
        .titulo-app { 
            font-size: 1.6rem; font-weight: 800; 
            background: linear-gradient(135deg, #7C3AED, #A78BFA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .btn-menu, .btn-perfil { 
            background: rgba(124, 58, 237, 0.15); border: none; 
            cursor: pointer; color: #FFFFFF; 
            border-radius: 50%; transition: 0.3s; 
            width: 40px; height: 40px; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-menu:hover, .btn-perfil:hover { background: rgba(124, 58, 237, 0.3); }
        .menu-derecha { display: flex; align-items: center; gap: 0.6rem; }

        /* ===== BARRA FLOTANTE (STICKY) ===== */
        .sticky-bar {
            position: sticky;
            top: 68px;
            z-index: 99;
            background: rgba(10, 10, 15, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(124, 58, 237, 0.08);
        }

        .pestanas { 
            display: flex; gap: 0.4rem; padding: 0.5rem 1rem; flex-wrap: nowrap;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            -webkit-overflow-scrolling: touch;
        }
        .pestanas::-webkit-scrollbar { display: none; }
        .btn-pestana { 
            padding: 0.4rem 1rem; border-radius: 9999px; border: none; 
            font-weight: 700; cursor: pointer; font-size: 0.95rem;
            transition: all 0.15s ease;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .btn-pestana.inactiva { background: rgba(255,255,255,0.05); color: #94A3B8; }
        .btn-pestana.inactiva:hover { background: rgba(255,255,255,0.1); color: #FFFFFF; }
        .btn-pestana.activa { background: #7C3AED; color: #FFFFFF; }
        .btn-pestana.anime { background: #EC4899; color: #FFFFFF; }

        .buscador { 
            display: flex; align-items: center; gap: 0.5rem; 
            padding: 0.4rem 1rem 0.6rem; 
        }
        .input-buscar { 
            flex: 1; min-width: 120px; padding: 0.6rem 1rem; border-radius: 9999px; 
            border: 2px solid rgba(124, 58, 237, 0.2); background: rgba(255,255,255,0.05);
            color: #FFFFFF; font-size: 1rem; transition: 0.3s;
        }
        .input-buscar:focus { outline: none; border-color: #7C3AED; background: rgba(255,255,255,0.08); }
        .input-buscar::placeholder { color: #64748B; font-size: 0.95rem; }
        .btn-buscar { 
            background: #7C3AED; border: none; font-size: 1rem; cursor: pointer; 
            color: #FFFFFF; padding: 0.5rem 1.2rem; border-radius: 9999px;
            transition: 0.3s;
        }
        .btn-buscar:hover { background: #6D28D9; }
        .contador { 
            background: rgba(255,255,255,0.05); padding: 0.25rem 0.8rem; border-radius: 9999px; 
            font-weight: 600; font-size: 0.85rem; color: #94A3B8;
            border: 1px solid rgba(124, 58, 237, 0.1);
        }

        .contenido-scroll { padding-top: 0.5rem; }

        /* ===== CARRUSEL ===== */
        .seccion-populares { padding: 0.6rem 1rem 1rem; }
        .seccion-populares .titulo-seccion { 
            font-size: 1.2rem; font-weight: 700; margin-bottom: 0.6rem; 
            display: flex; align-items: center; gap: 0.5rem;
            color: #FFFFFF;
        }
        .seccion-populares .titulo-seccion i { color: #F59E0B; font-size: 1.3rem; }

        .carrusel-container { 
            position: relative; 
            overflow: hidden; 
            border-radius: 12px;
            touch-action: pan-y;
        }
        .carrusel-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding: 0.3rem 0;
            cursor: grab;
        }
        .carrusel-wrapper:active { cursor: grabbing; }
        .carrusel-wrapper::-webkit-scrollbar { display: none; }
        .carrusel-track { 
            display: flex; 
            gap: 0.6rem; 
            width: max-content;
        }
        .carrusel-item {
            flex: 0 0 auto;
            width: 140px;
            border-radius: 10px;
            overflow: hidden;
            background: rgba(255,255,255,0.04);
            cursor: pointer;
            border: 1px solid rgba(124,58,237,0.08);
            transition: 0.2s;
            position: relative;
        }
        .carrusel-item:hover { transform: scale(1.03); border-color: rgba(124,58,237,0.3); }
        .carrusel-item .portada-popular { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #1A1A2E; }
        .carrusel-item .info-popular { padding: 0.4rem; text-align: center; }
        .carrusel-item .info-popular h4 { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #E2E8F0; }
        .carrusel-item .badge-tipo { position: absolute; top: 0.4rem; right: 0.4rem; font-size: 0.65rem; padding: 0.1rem 0.5rem; border-radius: 4px; font-weight: 700; background: rgba(124,58,237,0.85); color: #fff; }

        /* ===== RECIENTES ===== */
        .seccion-recientes { padding: 0 1rem 1rem; }
        .seccion-recientes .titulo-seccion { 
            font-size: 1.2rem; font-weight: 700; margin-bottom: 0.6rem; 
            display: flex; align-items: center; gap: 0.5rem;
            color: #FFFFFF;
        }
        .seccion-recientes .titulo-seccion i { color: #7C3AED; font-size: 1.3rem; }

        .scroll-recientes { 
            display: flex; gap: 0.6rem; overflow-x: auto; 
            padding: 0.2rem 0 0.6rem; 
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .scroll-recientes::-webkit-scrollbar { display: none; }
        
        .tarjeta-reciente { 
            flex: 0 0 auto; width: 85px; border-radius: 8px; overflow: hidden; 
            background: rgba(255,255,255,0.04); cursor: pointer; 
            border: 1px solid rgba(124, 58, 237, 0.08);
        }
        .tarjeta-reciente:hover { transform: scale(1.05); }
        .tarjeta-reciente .portada-reciente { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #1A1A2E; }
        .tarjeta-reciente .info-reciente { padding: 0.25rem; text-align: center; }
        .tarjeta-reciente .info-reciente h4 { font-size: 0.65rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #E2E8F0; }

        /* ===== GRID ===== */
        .grid-contenido { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 0.6rem; 
            padding: 0 1rem 0.5rem; 
        }
        @media (min-width: 480px) { .grid-contenido { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 768px) { .grid-contenido { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 1024px) { .grid-contenido { grid-template-columns: repeat(5, 1fr); } }
        
        .tarjeta { 
            border-radius: 10px; overflow: hidden; background: rgba(255,255,255,0.04); 
            cursor: pointer; position: relative; 
            border: 1px solid rgba(124, 58, 237, 0.06);
            transition: 0.2s;
        }
        .tarjeta:hover { transform: translateY(-3px); border-color: rgba(124,58,237,0.2); }
        .tarjeta:active { transform: scale(0.97); }
        .portada { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #1A1A2E; }
        .etiqueta-anio { 
            position: absolute; top: 0.4rem; left: 0.4rem; 
            background: rgba(124, 58, 237, 0.85); color: #fff; 
            padding: 0.1rem 0.5rem; border-radius: 4px; font-size: 0.65rem; font-weight: 700;
        }
        .etiqueta-anime { 
            position: absolute; top: 0.4rem; left: 0.4rem; 
            background: rgba(236, 72, 153, 0.85); color: #fff; 
            padding: 0.1rem 0.5rem; border-radius: 4px; font-size: 0.65rem; font-weight: 700;
        }
        .estrella { 
            position: absolute; top: 0.4rem; right: 0.4rem; 
            color: #F59E0B; font-size: 0.8rem;
        }
        .info-tarjeta { padding: 0.4rem; }
        .info-tarjeta h3 { 
            font-size: 0.85rem; font-weight: 600; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            color: #F1F5F9;
        }
        .badge-video { font-size: 0.6rem; color: #34D399; font-weight: 600; background: rgba(52,211,153,0.12); padding: 0.1rem 0.5rem; border-radius: 4px; }
        .badge-serie { font-size: 0.55rem; color: #A78BFA; font-weight: 600; background: rgba(124,58,237,0.15); padding: 0.1rem 0.5rem; border-radius: 4px; margin-left: 0.15rem; }
        .badge-anime { font-size: 0.55rem; color: #EC4899; font-weight: 600; background: rgba(236,72,153,0.15); padding: 0.1rem 0.5rem; border-radius: 4px; margin-left: 0.15rem; }

        /* ===== BOTÓN CARGAR MÁS ===== */
        .contenedor-cargar-mas {
            display: flex;
            justify-content: center;
            padding: 0.8rem 1rem 1.2rem;
        }
        .btn-cargar-mas { 
            background: rgba(124, 58, 237, 0.15); color: #FFFFFF; 
            padding: 0.6rem 2rem; border-radius: 9999px; 
            border: 2px solid rgba(124, 58, 237, 0.2); font-weight: 700; 
            cursor: pointer; display: flex; align-items: center; gap: 0.5rem; 
            font-size: 1rem; transition: 0.3s; 
        }
        .btn-cargar-mas:hover { background: rgba(124, 58, 237, 0.25); border-color: #7C3AED; }
        .btn-cargar-mas:disabled { opacity: 0.5; cursor: not-allowed; }

        .oculto { display: none !important; }
    </style>
</head>
<body>
<header>
    <div class="flex justify-between items-center">
        <div class="logo-contenedor">
            <img src="logo.png" alt="Logo TELY" class="logo" onerror="this.style.display='none'">
            <h1 class="titulo-app">TELY</h1>
        </div>
        <div class="menu-derecha">
            <button class="btn-menu" onclick="cambiarModo()"><i class="fa-solid fa-moon" id="iconoModo"></i></button>
            <div class="menu-perfil">
                <button class="btn-perfil" onclick="toggleMenu()"><i class="fa-solid fa-user-circle"></i></button>
                <div class="dropdown" id="menuPerfil">
                    <div class="dropdown-header" id="nombrePerfil" style="font-size:0.9rem;">👤 Acceder</div>
                    <div class="dropdown-header" style="font-size:0.75rem;color:#64748B;border-top:1px solid rgba(124,58,237,0.08);">📺 Visto recientemente</div>
                    <div id="listaHistorial"></div>
                    <button onclick="limpiarHistorial()" style="color:#F59E0B;font-size:0.85rem;"><i class="fa-solid fa-trash"></i> Limpiar historial</button>
                    <button onclick="cerrarSesion()" style="color:#EF4444;font-size:0.85rem;border-top:1px solid rgba(124,58,237,0.08);margin-top:0.2rem;padding-top:0.5rem;"><i class="fa-solid fa-sign-out"></i> Cerrar sesión</button>
                </div>
            </div>
        </div>
    </div>
</header>

<!-- ===== BARRA FLOTANTE: CATEGORÍAS + BUSCADOR ===== -->
<div class="sticky-bar">
    <div class="pestanas" id="pestanasContainer">
        <button class="btn-pestana activa" onclick="cambiarCategoria('estrenos')">🏠 Inicio</button>
        <button class="btn-pestana inactiva" onclick="cambiarCategoria('peliculas')">🎬 Películas</button>
        <button class="btn-pestana inactiva" onclick="cambiarCategoria('series')">📺 Series</button>
        <button class="btn-pestana inactiva anime" onclick="cambiarCategoria('anime')">🌸 Anime</button>
    </div>
    <div class="buscador">
        <input type="text" class="input-buscar" placeholder="🔍 Buscar..." id="buscadorInput" onkeydown="if(event.key==='Enter') buscarContenido()">
        <button class="btn-buscar" onclick="buscarContenido()"><i class="fa-solid fa-magnifying-glass"></i></button>
        <div class="contador" id="contadorTotal">0</div>
    </div>
</div>
  <div class="contenido-scroll">
    <!-- ===== CARRUSEL PELÍCULAS POPULARES ===== -->
    <div class="seccion-populares" id="seccionPopulares">
        <div class="titulo-seccion"><i class="fa-solid fa-fire"></i> 🎬 Más vistas</div>
        <div class="carrusel-container">
            <div class="carrusel-wrapper" id="carruselWrapper">
                <div class="carrusel-track" id="carruselTrack"></div>
            </div>
        </div>
    </div>

    <!-- ===== RECIENTES ===== -->
    <div class="seccion-recientes">
        <div class="titulo-seccion"><i class="fa-solid fa-clock-rotate-left"></i> Visto recientemente</div>
        <div class="scroll-recientes" id="scrollRecientes">
            <p style="color:#64748B;font-size:0.85rem;padding:0.3rem;">No has visto nada aún</p>
        </div>
    </div>

    <!-- ===== GRID CONTENIDO ===== -->
    <div class="grid-contenido" id="lista-contenido">
        <!-- Se llena con JavaScript -->
    </div>

    <!-- ===== BOTÓN CARGAR MÁS ===== -->
    <div class="contenedor-cargar-mas" id="contenedorCargarMas">
        <button class="btn-cargar-mas" onclick="cargarMasContenido()" id="btnCargarMas">
            <i class="fa-solid fa-plus"></i> Cargar más
        </button>
    </div>
</div>
  <!-- ===== MODAL VIDEO ===== -->
<div id="modal-video" class="modal-video">
    <div class="reproductor-contenedor">
        <div class="info-arriba">
            <h2 id="tituloReproductor">Título</h2>
            <div class="detalles-arriba">
                <span class="anio-arriba" id="anioPanel">2024</span>
                <span class="rating-arriba">⭐ <span id="ratingPanel">7.3</span></span>
                <span id="generoPanel">Acción</span>
                <span id="tipoPanel" style="color:#A78BFA;">🎬 Película</span>
            </div>
            <div class="sinopsis-arriba" id="sinopsisPanel">Sinopsis...</div>
        </div>
        <div class="netflix-player" id="netflixPlayer"></div>
        <div class="controles-superior">
            <button class="btn-control btn-cerrar-modal" onclick="cerrarVideo()"><i class="fa-solid fa-xmark"></i> Cerrar</button>
            <button class="btn-control" onclick="recargarVideo()" style="color:#34D399;"><i class="fa-solid fa-rotate"></i> Recargar</button>
        </div>
        <div class="botones-opciones" id="botonesOpciones"></div>
        <div id="capitulosContainer" class="capitulos-container oculto">
            <div class="selector-temporada">
                <button class="btn-temp" id="tempAnterior" onclick="cambiarTemporadaHandler(-1)"><i class="fa-solid fa-chevron-left"></i></button>
                <span id="tempActual">Temporada 1</span>
                <button class="btn-temp" id="tempSiguiente" onclick="cambiarTemporadaHandler(1)"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
            <div class="capitulos-horizontal" id="capitulosHorizontal"></div>
        </div>
        <div class="seccion-recomendadas">
            <h4 class="titulo-recomendadas">Te podría gustar</h4>
            <div class="lista-recomendadas" id="recomendadasLista"><p style="color:#64748B;font-size:0.85rem;text-align:center;padding:0.5rem;">Cargando...</p></div>
        </div>
    </div>
</div>
  <!-- ===== MODAL LOGIN ===== -->
<div id="modal-login" class="modal-login oculto" onclick="cerrarModalLoginSiClickFuera(event)">
    <div class="contenedor-login" onclick="event.stopPropagation()">
        <h2>Iniciar Sesión</h2>
        <p style="text-align:center;color:#64748B;font-size:0.95rem;margin-bottom:1rem;">Accede para ver todo el contenido</p>
        <button class="btn-google" id="btnGoogleLogin" onclick="iniciarConGoogle()"><i class="fa-brands fa-google"></i> Continuar con Google</button>
        <div style="margin:0.8rem 0;text-align:center;color:#64748B;font-size:0.85rem;">— o con número de teléfono —</div>
        <div>
            <input type="tel" id="telefonoInput" placeholder="+58 412 1234567">
            <button class="btn-enviar-codigo" onclick="enviarCodigo()">Enviar código</button>
        </div>
        <div id="seccionCodigo" class="oculto" style="margin-top:0.6rem;">
            <input type="text" id="codigoInput" placeholder="Código de 6 dígitos">
            <button class="btn-enviar-codigo" onclick="verificarCodigo()" style="background:#10B981;">Verificar</button>
        </div>
        <div id="recaptcha-container"></div>
        <button class="btn-cerrar-login" onclick="cerrarModalLogin()">Cerrar</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <style>
    .modal-video { 
        position: fixed; inset: 0; background: rgba(0,0,0,0.97); z-index: 9998; 
        display: none; flex-direction: column; overflow-y: auto;
        backdrop-filter: blur(20px);
    }
    .modal-video.abierto { display: flex; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .reproductor-contenedor {
        background: #0A0A0F; width: 100%; max-width: 1200px; margin: 0 auto;
        padding: 0.8rem; display: flex; flex-direction: column; gap: 0.6rem;
    }
    .netflix-player {
        width: 100%; aspect-ratio: 16/9; position: relative; background: #000;
        border-radius: 12px; overflow: hidden;
    }
    .netflix-player iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; background: #000; }

    .controles-superior { display: flex; justify-content: flex-end; gap: 0.5rem; }
    .btn-control { background: rgba(255,255,255,0.06); border: none; color: #fff; padding: 0.4rem 0.9rem; border-radius: 8px; cursor: pointer; font-size: 0.85rem; transition: 0.3s; }
    .btn-control:hover { background: rgba(255,255,255,0.12); }
    .btn-cerrar-modal { background: rgba(239, 68, 68, 0.15); color: #EF4444; }
    .btn-cerrar-modal:hover { background: rgba(239, 68, 68, 0.3); }

    .info-arriba { margin-bottom: 0.4rem; }
    .info-arriba h2 { font-size: 1.4rem; font-weight: 700; color: #fff; background: linear-gradient(135deg, #FFFFFF, #A78BFA); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .info-arriba .detalles-arriba { display: flex; gap: 0.6rem; align-items: center; font-size: 0.85rem; color: #94A3B8; flex-wrap: wrap; }
    .info-arriba .sinopsis-arriba { font-size: 0.95rem; color: #94A3B8; margin-top: 0.25rem; line-height: 1.5; max-height: 3.5rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

    .botones-opciones { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .btn-opcion { padding: 0.4rem 1rem; border-radius: 8px; border: 2px solid rgba(124,58,237,0.2); background: rgba(255,255,255,0.04); color: #fff; cursor: pointer; font-weight: 700; font-size: 0.85rem; transition: 0.3s; }
    .btn-opcion.activo { border-color: #7C3AED; background: #7C3AED; color: #fff; }
    .btn-opcion:hover { border-color: #7C3AED; }
    .btn-opcion.sin-enlace { border-color: rgba(239,68,68,0.2) !important; color: #EF4444 !important; cursor: not-allowed; opacity: 0.6; }
    .btn-opcion.sin-enlace:hover { border-color: rgba(239,68,68,0.2) !important; background: none !important; }
    .btn-nueva-ventana { border-color: rgba(239,68,68,0.3) !important; color: #EF4444 !important; font-size: 0.85rem; }
    .btn-nueva-ventana:hover { background: rgba(239,68,68,0.15) !important; }

    .capitulos-container { background: rgba(255,255,255,0.03); border-radius: 10px; padding: 0.6rem; border: 1px solid rgba(124,58,237,0.06); }
    .selector-temporada { display: flex; align-items: center; justify-content: center; gap: 0.6rem; margin-bottom: 0.5rem; }
    .selector-temporada .btn-temp { background: rgba(255,255,255,0.06); border: none; color: #fff; padding: 0.2rem 0.6rem; border-radius: 9999px; cursor: pointer; font-size: 0.85rem; }
    .selector-temporada .btn-temp:hover { background: rgba(124,58,237,0.2); }
    .selector-temporada .btn-temp:disabled { opacity: 0.3; cursor: not-allowed; }
    .selector-temporada span { color: #fff; font-weight: 700; font-size: 0.95rem; }
    .capitulos-horizontal { display: flex; gap: 0.4rem; overflow-x: auto; padding: 0.2rem 0; }

// 📥 CARGAR CONTENIDO ADMIN
// ==============================================
async function cargarContenidoAdmin() {
    try {
        const [snapPelis, snapSeries] = await Promise.all([
            db.ref("contenido_personalizado").once("value"),
            db.ref("series_personalizadas").once("value")
        ]);
        const pelis = snapPelis.val() ? Object.values(snapPelis.val()) : [];
        const series = snapSeries.val() ? Object.values(snapSeries.val()) : [];
        const seriesFormateadas = series.map(s => ({ ...s, tipo: 'serie' }));
        return [...pelis, ...seriesFormateadas];
    } catch (err) { return []; }
}

    if (cargandoInicial) return;
    cargandoInicial = true;
    
    try {
        const admin = await cargarContenidoAdmin();
        const adminMap = {};

            fetch(`${TMDB_BASE}/movie/popular?language=es-ES&page=1`, opcionesTMDB),

            fetch(`${TMDB_BASE}/discover/tv?language=es-ES&page=1&with_genres=16`, opcionesTMDB)
        ]);
        const [d1, d2, d3] = await Promise.all([r1.json(), r2.json(), r3.json()]);
        
        // 12 Películas
        const pelisTMDB = (d1.results || []).slice(0, 12).map(p => {
            const a = adminMap[p.id];
            const url = a?.url || generarEnlaceUnlimplay(p.id, 'pelicula');
            const opcion2 = a?.opcion2 || '';
            return { 
                id: `tmdb_${p.id}`, tmdb_id: p.id, 
                titulo: p.title || "Sin título",

                portada: p.poster_path ? `https://image.tmdb.org/t/p/w154${p.poster_path}` : "https://via.placeholder.com/154x231?text=?", 
                sinopsis: p.overview || "Sin sinopsis",

                temporadas: a?.temporadas || [] 
            }; 
        });
        
        // 12 Series
        const seriesTMDB = (d2.results || []).slice(0, 12).map(s => {

            return { 
                id: `tmdb_${s.id}`, tmdb_id: s.id, 
                titulo: s.name || "Sin título",

// 🔄 CARRUSEL AUTOMÁTICO
// ==============================================
function iniciarCarrusel(trackId, items) {
    const track = document.getElementById(trackId);
    if (!track) return;
    track.innerHTML = "";
    if (!items || items.length === 0) {
        const section = track.closest('.seccion-populares');
        if (section) section.style.display = 'none';
        return;
    }
    
    items.forEach(item => {
        const div = document.createElement("div");
        div.className = "carrusel-item";
        div.innerHTML = `
            <span class="badge-tipo">🎬</span>
            <img src="${item.portada}" alt="${item.titulo}" class="portada-popular" loading="eager" onerror="this.src='https://via.placeholder.com/140x210?text=?'">
            <div class="info-popular"><h4>${item.titulo}</h4></div>
        `;
        div.onclick = () => { 
            auth.currentUser ? abrirVideoPelicula(item) : (videoPendiente = item, abrirModalLogin());
        };
        track.appendChild(div);
    });
    
    // Clones para efecto infinito
    const clones = items.slice(0, 5);
    clones.forEach(item => {
        const div = document.createElement("div");
        div.className = "carrusel-item";
        div.innerHTML = `
            <span class="badge-tipo">🎬</span>
            <img src="${item.portada}" alt="${item.titulo}" class="portada-popular" loading="eager" onerror="this.src='https://via.placeholder.com/140x210?text=?'">
            <div class="info-popular"><h4>${item.titulo}</h4></div>
        `;
        div.onclick = () => { 
            auth.currentUser ? abrirVideoPelicula(item) : (videoPendiente = item, abrirModalLogin());
        };
        track.appendChild(div);
    });
    
    const wrapper = track.closest('.carrusel-wrapper');
    if (!wrapper) return;
    
    let index = 0;
    const itemWidth = 146;
    
    if (carruselInterval) clearInterval(carruselInterval);
    
    carruselInterval = setInterval(() => {
        const totalItems = track.children.length;
        if (totalItems === 0) return;
        index++;
        if (index >= totalItems - 5) {
            index = 0;
            wrapper.scrollTo({ left: 0, behavior: 'smooth' });
        } else {
            wrapper.scrollTo({ left: index * itemWidth, behavior: 'smooth' });
        }
    }, 4000);
    
    wrapper.addEventListener('touchstart', () => {
        if (carruselInterval) clearInterval(carruselInterval);
    });
    wrapper.addEventListener('touchend', () => {
        if (carruselInterval) clearInterval(carruselInterval);
        carruselInterval = setInterval(() => {
            const totalItems = track.children.length;
            if (totalItems === 0) return;
            index++;
            if (index >= totalItems - 5) {
                index = 0;
                wrapper.scrollTo({ left: 0, behavior: 'smooth' });
            } else {
                wrapper.scrollTo({ left: index * itemWidth, behavior: 'smooth' });
            }
        }, 4000);
    });
}

function mostrarContenido(categoria) {
    const lista = document.getElementById("lista-contenido");
    lista.innerHTML = "";
    let filtrados = contenido.filter(item => item.categoria === categoria);
    if (categoria === 'estrenos') filtrados = contenido;
    if (!filtrados.length) {
        lista.innerHTML = `<div class="col-span-3 text-center py-6" style="color:#64748B;font-size:1rem;">No hay contenido en <strong style="color:#A78BFA;">${categoria}</strong></div>`;
        return;
    }
    filtrados.forEach(item => {
        const tieneVideo = item.url || item.opcion2 || (item.temporadas && item.temporadas.length > 0);
        const esAnime = item.categoria === 'anime';
        const tarjeta = document.createElement("div");
        tarjeta.className = "tarjeta";
        
        let etiqueta = '';
        if (esAnime) etiqueta = '<span class="etiqueta-anime">🌸 Anime</span>';
        else etiqueta = `<span class="etiqueta-anio">${item.anio}</span>`;
        
        tarjeta.innerHTML = `
            ${etiqueta}
            <i class="fa-solid fa-star estrella"></i>
            <img src="${item.portada}" alt="${item.titulo}" class="portada" loading="eager" onerror="this.src='https://via.placeholder.com/154x231?text=?'">
            <div class="info-tarjeta">
                <h3>${item.titulo}</h3>
                ${tieneVideo ? '<span class="badge-video">▶</span>' : ''}
                ${item.tipo === 'serie' ? (esAnime ? '<span class="badge-anime">🌸</span>' : '<span class="badge-serie">📺</span>') : ''}
            </div>
        `;
        tarjeta.onclick = () => { 
            auth.currentUser ? abrirVideoPelicula(item) : (videoPendiente = item, abrirModalLogin());
        };
        lista.appendChild(tarjeta);
    });
}

function cambiarCategoria(cat) {
    document.querySelectorAll(".btn-pestana").forEach(b => { b.classList.remove("activa", "anime"); b.classList.add("inactiva"); });
    document.querySelectorAll(".btn-pestana").forEach(b => { 
        const text = b.textContent.toLowerCase();
        if ((cat === 'estrenos' && text.includes('🏠')) ||
            (cat === 'peliculas' && text.includes('🎬')) ||
            (cat === 'series' && text.includes('📺')) ||
            (cat === 'anime' && text.includes('🌸'))) {
            b.classList.remove("inactiva");
            if (cat === 'anime') b.classList.add('anime');
            else b.classList.add('activa');
        }
    });
    modoBusqueda = false;
    mostrarContenido(cat);
}

function abrirVideoPelicula(peli) {
    if (peli.tipo === 'serie' && (!peli.temporadas || peli.temporadas.length === 0) && peli.tmdb_id) {
        const capitulos = [];
        for (let i = 1; i <= 10; i++) {
            capitulos.push({
                numero: i,
                titulo: `Capítulo ${i}`,
                url: generarEnlaceUnlimplay(peli.tmdb_id, 'serie', 1, i),
                opcion2: ''
            });
        }
        peli.temporadas = [{ numero: 1, nombre: "Temporada 1", capitulos: capitulos }];
    }
    if (peli.tipo === 'pelicula' && !peli.url && peli.tmdb_id) {
        peli.url = generarEnlaceUnlimplay(peli.tmdb_id, 'pelicula');
    }
    abrirReproductor(peli);
}

function abrirReproductor(peli) {
    detenerVideo();
    const modal = document.getElementById("modal-video");
    const player = document.getElementById("netflixPlayer");
    const botones = document.getElementById("botonesOpciones");
    const container = document.getElementById("capitulosContainer");
    
    peliculaActual = peli;
    modal.classList.add("abierto");
    document.body.style.overflow = "hidden";
    
    document.getElementById("tituloReproductor").textContent = peli.titulo;
    document.getElementById("anioPanel").textContent = peli.anio || "2024";
    document.getElementById("ratingPanel").textContent = peli.puntuacion || "7.0";
    document.getElementById("generoPanel").textContent = peli.genero || (peli.tipo === "pelicula" ? "Película" : "Serie");
    document.getElementById("sinopsisPanel").textContent = peli.sinopsis || "Sin sinopsis";
    
    const esAnime = peli.categoria === 'anime';
    document.getElementById("tipoPanel").textContent = esAnime ? '🌸 Anime' : (peli.tipo === 'serie' ? '📺 Serie' : '🎬 Película');
    document.getElementById("tipoPanel").style.color = esAnime ? '#EC4899' : (peli.tipo === 'serie' ? '#10B981' : '#A78BFA');
    
    botones.innerHTML = ""; 
    container.classList.add("oculto"); 
    document.getElementById("capitulosHorizontal").innerHTML = "";
    tempActualIndex = 0; 
    temporadasActuales = [];
    
    if (peli.tipo === 'serie' && peli.temporadas && peli.temporadas.length > 0) {
        container.classList.remove("oculto");
        temporadasActuales = peli.temporadas;
        mostrarTemporada(0);
        const primerCap = obtenerPrimerCapitulo(0);
        
        // Opción 1
        if (primerCap?.url) {
            const b1 = document.createElement("button");
            b1.className = "btn-opcion activo";
            b1.innerHTML = `<i class="fa-solid fa-play mr-1"></i> Opción 1`;
            b1.onclick = function() {
                document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo"));
                this.classList.add("activo");
                if (primerCap.url) reproducirOpcion(primerCap.url);
            };
            botones.appendChild(b1);
        } else {
            const b1 = document.createElement("button");
            b1.className = "btn-opcion sin-enlace";
            b1.innerHTML = `<i class="fa-solid fa-link-slash mr-1"></i> Opción 1 (Sin enlace)`;
            b1.onclick = function() { alert("❌ No hay enlace disponible"); };
            botones.appendChild(b1);
        }
        
        // Opción 2
        if (primerCap?.opcion2 && primerCap.opcion2.trim() !== '') {
            const b2 = document.createElement("button");
            b2.className = "btn-opcion";
            b2.innerHTML = `<i class="fa-solid fa-play mr-1"></i> Opción 2`;
            b2.onclick = function() {
                document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo"));
                this.classList.add("activo");
                if (primerCap.opcion2) reproducirOpcion(primerCap.opcion2);
            };
            botones.appendChild(b2);
        } else {
            const b2 = document.createElement("button");
            b2.className = "btn-opcion sin-enlace";
            b2.innerHTML = `<i class="fa-solid fa-link-slash mr-1"></i> Opción 2 (Sin enlace)`;
            b2.onclick = function() { alert("❌ No hay enlace disponible"); };
            botones.appendChild(b2);
        }
        
        // Nueva ventana
        if (primerCap?.url || primerCap?.opcion2) {
            const b3 = document.createElement("button");
            b3.className = "btn-opcion btn-nueva-ventana";
            b3.innerHTML = `<i class="fa-solid fa-external-link-alt mr-1"></i> Nueva ventana`;
            b3.onclick = function() { 
                const url = primerCap?.url || primerCap?.opcion2; 
                if (url) window.open(url, '_blank'); 
                else alert("❌ No hay enlace"); 
            };
            botones.appendChild(b3);
        }
        
        const primerCap2 = obtenerPrimerCapitulo(0);
        if (primerCap2?.url) {
            reproducirOpcion(primerCap2.url);
        } else {
            player.innerHTML = `<div style="color:#EF4444;text-align:center;padding:3rem;font-size:1rem;"><i class="fa-solid fa-link" style="font-size:2.5rem;display:block;margin-bottom:0.5rem;"></i>No hay capítulos disponibles</div>`;
        }
        agregarAlHistorial(peli);
        cargarRecomendadas(peli.tmdb_id);
        return;
    }
    
    // ===== PELÍCULA =====
    const t1 = peli.url && peli.url.trim() !== '';
    const t2 = peli.opcion2 && peli.opcion2.trim() !== '';
    
    // Opción 1
    if (t1) {
        const b1 = document.createElement("button");
        b1.className = "btn-opcion activo";
        b1.innerHTML = `<i class="fa-solid fa-play mr-1"></i> Opción 1`;
        b1.onclick = function() {
            document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo"));
            this.classList.add("activo");
            reproducirOpcion(peli.url);
        };
        botones.appendChild(b1);
    } else {
        const b1 = document.createElement("button");
        b1.className = "btn-opcion sin-enlace";
        b1.innerHTML = `<i class="fa-solid fa-link-slash mr-1"></i> Opción 1 (Sin enlace)`;
        b1.onclick = function() { alert("❌ No hay enlace disponible"); };
        botones.appendChild(b1);
    }
    
    // Opción 2
    if (t2) {
        const b2 = document.createElement("button");
        b2.className = "btn-opcion";
        b2.innerHTML = `<i class="fa-solid fa-play mr-1"></i> Opción 2`;
        b2.onclick = function() {
            document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo"));
            this.classList.add("activo");
            reproducirOpcion(peli.opcion2);
        };
        botones.appendChild(b2);
    } else {
        const b2 = document.createElement("button");
        b2.className = "btn-opcion sin-enlace";
        b2.innerHTML = `<i class="fa-solid fa-link-slash mr-1"></i> Opción 2 (Sin enlace)`;
        b2.onclick = function() { alert("❌ No hay enlace disponible"); };
        botones.appendChild(b2);
    }
    
    // Nueva ventana
    if (t1 || t2) {
        const b3 = document.createElement("button");
        b3.className = "btn-opcion btn-nueva-ventana";
        b3.innerHTML = `<i class="fa-solid fa-external-link-alt mr-1"></i> Nueva ventana`;
        b3.onclick = function() { 
            const url = peli.url || peli.opcion2; 
            if (url) window.open(url, '_blank'); 
            else alert("❌ No hay enlace"); 
        };
        botones.appendChild(b3);
    }
    
    if (t1) {
        reproducirOpcion(peli.url);
    } else if (t2) {
        reproducirOpcion(peli.opcion2);
    } else {
        player.innerHTML = `<div style="color:#EF4444;text-align:center;padding:3rem;font-size:1rem;"><i class="fa-solid fa-link" style="font-size:2.5rem;display:block;margin-bottom:0.5rem;"></i>No hay enlaces disponibles</div>`;
    }
    agregarAlHistorial(peli);
    cargarRecomendadas(peli.tmdb_id);
}

function obtenerPrimerCapitulo(idx) { 
    if (!temporadasActuales || temporadasActuales.length === 0) return null; 
    const t = temporadasActuales[idx]; 
    if (!t || !t.capitulos || t.capitulos.length === 0) return null; 
    return t.capitulos[0]; 
}

function mostrarTemporada(index) {
    if (!temporadasActuales || temporadasActuales.length === 0) return;
    if (index < 0) index = 0; 
    if (index >= temporadasActuales.length) index = temporadasActuales.length - 1;
    tempActualIndex = index; 
    const temp = temporadasActuales[index]; 
    const container = document.getElementById("capitulosHorizontal"); 
    const label = document.getElementById("tempActual");
    label.textContent = `Temporada ${temp.numero || index + 1}`; 
    container.innerHTML = "";
    document.getElementById("tempAnterior").disabled = index === 0; 
    document.getElementById("tempSiguiente").disabled = index === temporadasActuales.length - 1;
    if (!temp.capitulos || temp.capitulos.length === 0) { 
        container.innerHTML = `<p style="color:#64748B;padding:0.4rem;text-align:center;font-size:0.9rem;">Sin capítulos</p>`; 
        return; 
    }
    temp.capitulos.forEach((cap, idx) => { 
        const div = document.createElement("div"); 
        div.className = "capitulo-item-horizontal"; 
        if (idx === 0 && cap.url) div.classList.add("activo"); 
        if (!cap.url) div.classList.add("sin-enlace");
        div.innerHTML = `<span class="cap-numero-h">Cap ${cap.numero || idx + 1}</span><span class="cap-titulo-h">${cap.titulo || 'Capítulo ' + (idx + 1)}</span>${cap.url ? '<span class="cap-play-h"><i class="fa-solid fa-play"></i> Ver</span>' : '<span class="cap-sin-enlace-h">🔒 Sin enlace</span>'}`; 
        div.onclick = function() { 
            if (cap.url) { 
                document.querySelectorAll(".capitulo-item-horizontal").forEach(el => el.classList.remove("activo")); 
                this.classList.add("activo"); 
                reproducirOpcion(cap.url);
                const botones = document.getElementById("botonesOpciones");
                if (botones.children.length > 0) {
                    document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo"));
                    if (botones.children[0]) botones.children[0].classList.add("activo");
                }
            } else { alert("❌ Este capítulo no tiene enlace"); } 
        }; 
        container.appendChild(div); 
    });
}

function cambiarTemporadaHandler(direccion) { 
    const nueva = tempActualIndex + direccion; 
    if (nueva >= 0 && nueva < temporadasActuales.length) {
        mostrarTemporada(nueva);
        const cap = obtenerPrimerCapitulo(nueva);
        if (cap?.url) {
            reproducirOpcion(cap.url);
            const botones = document.getElementById("botonesOpciones");
            if (botones.children.length > 0) {
                document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo"));
                if (botones.children[0]) botones.children[0].classList.add("activo");
            }
        }
    } 
}

function reproducirOpcion(url) {
    const player = document.getElementById("netflixPlayer");
    let enlace = url.trim();
    if (enlace.includes('unlimplay.com')) {
        if (!enlace.includes('?')) { enlace += '?autoplay=1&controls=1&logo=0'; }
        player.innerHTML = `<iframe src="${enlace}" frameborder="0" referrerpolicy="origin" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen style="width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;"></iframe>`;
        return;
    }
    if (enlace.includes('youtube.com') || enlace.includes('youtu.be')) {
        const videoId = enlace.match(/(?:v\/|watch\?v=|\/)([a-zA-Z0-9_-]{11})/)?.[1];
        if (videoId) { enlace = `https://www.youtube.com/embed/${videoId}?autoplay=1&controls=1&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3`; }
        player.innerHTML = `<iframe src="${enlace}" frameborder="0" referrerpolicy="origin" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen style="width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;"></iframe>`;
        return;
    }
    player.innerHTML = `<iframe src="${enlace}" frameborder="0" referrerpolicy="origin" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen style="width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;"></iframe>`;
}

function cerrarVideo() {
    detenerVideo();
    document.getElementById("modal-video").classList.remove("abierto");
    document.body.style.overflow = "auto";
    peliculaActual = null;
    document.getElementById("capitulosHorizontal").innerHTML = "";
    document.getElementById("capitulosContainer").classList.add("oculto");
    tempActualIndex = 0;
    temporadasActuales = [];
}

function recargarVideo() {
    const player = document.getElementById("netflixPlayer");
    const iframe = player.querySelector('iframe');
    if (iframe) {
        const src = iframe.src;
        iframe.src = '';
        setTimeout(() => { iframe.src = src; }, 100);
    }
}

function detenerVideo() { document.getElementById("netflixPlayer").innerHTML = ""; }

// 📥 RECOMENDACIONES
// ==============================================
async function cargarRecomendadas(tmdbId) {
    const container = document.getElementById("recomendadasLista");
    container.innerHTML = "<p style='color:#64748B;font-size:0.85rem;text-align:center;padding:0.5rem;'>Cargando...</p>";
    if (!tmdbId) { container.innerHTML = "<p style='color:#64748B;font-size:0.85rem;text-align:center;padding:0.5rem;'>Sin recomendaciones</p>"; return; }
    try {
        const res = await fetch(`${TMDB_BASE}/movie/${tmdbId}/recommendations?language=es-ES&page=1`, opcionesTMDB);
        const datos = await res.json();
        container.innerHTML = "";
        if (!datos.results || datos.results.length === 0) { 
            container.innerHTML = "<p style='color:#64748B;font-size:0.85rem;text-align:center;padding:0.5rem;'>No hay recomendaciones</p>"; 
            return;
        }
        datos.results.slice(0, 6).forEach(p => {
            const t = document.createElement("div");
            t.className = "tarjeta-recomendada";
            t.innerHTML = `<img src="${p.poster_path ? 'https://image.tmdb.org/t/p/w154' + p.poster_path : 'https://via.placeholder.com/75x110?text=?'}" alt="${p.title}" class="portada-recomendada" loading="lazy"><p class="texto-recomendada">${p.title}</p>`;
            t.onclick = () => {
                cerrarVideo();
                const comp = contenido.find(c => c.tmdb_id == p.id);
                if (comp) abrirVideoPelicula(comp);
                else abrirVideoPelicula({ id: `tmdb_${p.id}`, tmdb_id: p.id, titulo: p.title, anio: p.release_date ? p.release_date.split("-")[0] : "N/D", tipo: "pelicula", categoria: "peliculas", portada: p.poster_path ? 'https://image.tmdb.org/t/p/w154' + p.poster_path : "", sinopsis: p.overview || "Sin sinopsis", puntuacion: p.vote_average ? p.vote_average.toFixed(1) : "N/A", genero: "Película", url: generarEnlaceUnlimplay(p.id, 'pelicula'), opcion2: '', temporadas: [] });
            };
            container.appendChild(t);
        });
    } catch (err) { container.innerHTML = "<p style='color:#64748B;font-size:0.85rem;text-align:center;padding:0.5rem;'>Sin recomendaciones</p>"; }
}

function agregarAlHistorial(item) {
    let h = JSON.parse(localStorage.getItem("historialTely")) || [];
    h = h.filter(x => x.id !== item.id); h.unshift({ id: item.id, titulo: item.titulo, tipo: item.tipo || 'serie' });
    if (h.length > 10) h.pop(); localStorage.setItem("historialTely", JSON.stringify(h));
    mostrarHistorial(); mostrarRecientes();
}

function mostrarHistorial() {
    const c = document.getElementById("listaHistorial"), h = JSON.parse(localStorage.getItem("historialTely")) || [];
    c.innerHTML = h.length ? "" : `<div class="historial-vacio">Aún no has visto nada</div>`;
    h.forEach(i => { 
        const btn = document.createElement("button"); 
        btn.innerHTML = `<i class="fa-solid fa-play mr-2"></i> ${i.titulo}`; 
        btn.onclick = (e) => {
            e.stopPropagation();
            const f = contenido.find(x => x.id === i.id); 
            if (!f) return; 
            if (auth.currentUser) {
                abrirVideoPelicula(f);
                document.getElementById("menuPerfil").classList.remove("mostrar");
                menuAbierto = false;
            } else { videoPendiente = f; abrirModalLogin(); }
        }; 
        c.appendChild(btn); 
    });
}

function mostrarRecientes() {
    const contenedor = document.getElementById("scrollRecientes"), historial = JSON.parse(localStorage.getItem("historialTely")) || [];
    if (historial.length === 0) { 
        contenedor.innerHTML = `<p style="color:#64748B;font-size:0.85rem;padding:0.3rem;">No has visto nada aún</p>`; 
        return; 
    }
    contenedor.innerHTML = "";
    historial.slice(0, 10).forEach(item => { 
        const encontrado = contenido.find(c => c.id === item.id); 
        if (!encontrado) return; 
        const tarjeta = document.createElement("div"); 
        tarjeta.className = "tarjeta-reciente"; 
        tarjeta.innerHTML = `<img src="${encontrado.portada}" alt="${encontrado.titulo}" class="portada-reciente" loading="lazy" onerror="this.src='https://via.placeholder.com/85x130?text=?'"><div class="info-reciente"><h4>${encontrado.titulo}</h4></div>`; 
        tarjeta.onclick = (e) => {
            e.stopPropagation();
            if (auth.currentUser) {
                abrirVideoPelicula(encontrado);
            } else { videoPendiente = encontrado; abrirModalLogin(); }
        }; 
        contenedor.appendChild(tarjeta); 
    });
}

function limpiarHistorial() { localStorage.removeItem("historialTely"); mostrarHistorial(); mostrarRecientes(); }

// 🔐 AUTENTICACIÓN

function iniciarConGoogle() {
    const btn = document.getElementById('btnGoogleLogin');
    if (!btn) return;
    const original = btn.innerHTML;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
    btn.disabled = true;
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ 'prompt': 'select_account' });
    auth.signInWithPopup(provider).then((result) => {
        document.getElementById("nombrePerfil").textContent = result.user.displayName || result.user.email || "✅ Sesión iniciada";
        cerrarModalLogin();
        btn.innerHTML = original;
        btn.disabled = false;
        if (videoPendiente) { const temp = videoPendiente; videoPendiente = null; abrirVideoPelicula(temp); agregarAlHistorial(temp); }
    }).catch((error) => {
        btn.innerHTML = original;
        btn.disabled = false;
        if (error.code === 'auth/popup-closed-by-user') alert("⚠️ Cerraste la ventana de Google.");
        else alert("❌ Error: " + error.message);
    });
}

function iniciarRecaptcha() {
    const container = document.getElementById('recaptcha-container');
    if (container) container.innerHTML = '';
    if (!recaptchaVerifier) {
        recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { size: 'invisible', callback: function() {} });
    }
}

function enviarCodigo() {
    iniciarRecaptcha();
    const telefono = document.getElementById("telefonoInput").value.trim();
    if (!telefono.startsWith("+")) return alert("Agrega código de país ej: +58...");
    auth.signInWithPhoneNumber(telefono, recaptchaVerifier).then(res => {
        confirmationResult = res;
        document.getElementById("seccionCodigo").classList.remove("oculto");
    }).catch(err => alert("❌ Error: " + err.message));
}

function verificarCodigo() {
    const codigo = document.getElementById("codigoInput").value.trim();
    confirmationResult.confirm(codigo).then(res => {
        document.getElementById("nombrePerfil").textContent = res.user.phoneNumber || "✅ Sesión iniciada";
        cerrarModalLogin();
        if (videoPendiente) { abrirVideoPelicula(videoPendiente); agregarAlHistorial(videoPendiente); videoPendiente = null; }
    }).catch(err => alert("❌ Código incorrecto"));
}

function cerrarModalLogin() { document.getElementById("modal-login").classList.add("oculto"); videoPendiente = null; }
function cerrarModalLoginSiClickFuera(event) { if (event.target === event.currentTarget) cerrarModalLogin(); }

function toggleMenu() {
    const menu = document.getElementById("menuPerfil");
    if (!auth.currentUser) { abrirModalLogin(); return; }
    if (menuAbierto) { menu.classList.remove("mostrar"); menuAbierto = false; } 
    else { menu.classList.add("mostrar"); menuAbierto = true; mostrarHistorial(); }
}

function abrirModalLogin() { document.getElementById("modal-login").classList.remove("oculto"); if (menuAbierto) { document.getElementById("menuPerfil").classList.remove("mostrar"); menuAbierto = false; } }

function cambiarModo() {
    const body = document.body, icono = document.getElementById("iconoModo");
    if (body.classList.contains("dark")) { body.classList.remove("dark"); icono.className = "fa-solid fa-moon"; localStorage.setItem("modo", "claro"); } 
    else { body.classList.add("dark"); icono.className = "fa-solid fa-sun"; localStorage.setItem("modo", "oscuro"); }
}
if (localStorage.getItem("modo") === "oscuro" || (!localStorage.getItem("modo") && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
    document.body.classList.add("dark"); document.getElementById("iconoModo").className = "fa-solid fa-sun";
}

function cerrarSesion() {
    auth.signOut().then(() => {
        document.getElementById("nombrePerfil").textContent = "❌ Sesión cerrada";
        videoPendiente = null;
        document.getElementById("menuPerfil").classList.remove("mostrar");
        menuAbierto = false;
    });
}
