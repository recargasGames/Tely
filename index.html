// Carga contenido desde tu panel admin
async function cargarContenidoAdmin() {
  try {
    const snapshot = await db.ref("contenido_personalizado").once("value");
    const datosAdmin = snapshot.val();
    return datosAdmin ? Object.values(datosAdmin) : [];
  } catch (err) {
    console.log("Sin conexión al panel admin:", err);
    return [];
  }
}

// FUNCIÓN MEJORADA: CARGA PRIMERO LO TUYO, LUEGO TMDB (AHORA TRAE 30 PELÍCULAS EN VEZ DE 12)
async function cargarContenidoCompleto() {
  const lista = document.getElementById("lista-contenido");
  lista.innerHTML = '<div class="col-span-3 text-center py-10 text-gray-400">📡 Cargando contenido...</div>';

  // Primero carga contenido propio y del panel
  const contenidoAdmin = await cargarContenidoAdmin();
  contenido = [...MI_CONTENIDO, ...contenidoAdmin];

  // Luego agrega TMDB con MÁS resultados para que no falten títulos
  try {
    const resPeliculas = await fetch(`${TMDB_BASE}/movie/popular?language=${TMDB_LANG}&page=1`, opcionesTMDB);
    const datosPeliculas = await resPeliculas.json();

    const resSeries = await fetch(`${TMDB_BASE}/tv/popular?language=${TMDB_LANG}&page=1`, opcionesTMDB);
    const datosSeries = await resSeries.json();

    // ⚠️ CAMBIO: Ahora trae 30 películas en vez de 12
    const pelisTMDB = datosPeliculas.results.slice(0, 30).map(p => ({
      id: `tmdb_${p.id}`,
      titulo: p.title,
      anio: p.release_date ? p.release_date.split("-")[0] : "N/D",
      tipo: "pelicula",
      categoria: "peliculas",
      portada: p.poster_path ? `${TMDB_IMG}${p.poster_path}` : "https://via.placeholder.com/300x450?text=Sin+Portada",
      sinopsis: p.overview || "Sin sinopsis disponible",
      puntuacion: p.vote_average ? p.vote_average.toFixed(1) : "N/A",
      genero: "Película",
      video: "",
      opciones: [],
      temporadas: [],
      deTMDB: true
    }));

    const seriesTMDB = datosSeries.results.slice(0, 15).map(s => ({
      id: `tmdb_${s.id}`,
      titulo: s.name,
      anio: s.first_air_date ? s.first_air_date.split("-")[0] : "N/D",
      tipo: "serie",
      categoria: "series",
      portada: s.poster_path ? `${TMDB_IMG}${s.poster_path}` : "https://via.placeholder.com/300x450?text=Sin+Portada",
      sinopsis: s.overview || "Sin sinopsis disponible",
      puntuacion: s.vote_average ? s.vote_average.toFixed(1) : "N/A",
      genero: "Serie",
      video: "",
      opciones: [],
      temporadas: [],
      deTMDB: true
    }));

    contenido = [...contenido, ...pelisTMDB, ...seriesTMDB];
  } catch (err) {
    console.log("TMDB tardó o falló, mostrando solo contenido disponible:", err);
  }

  document.getElementById("contadorTotal").textContent = `${contenido.length} títulos`;
  mostrarContenido("estrenos");
}

// Cambio de modo oscuro/claro
function cambiarModo() {
  const body = document.body;
  const icono = document.getElementById("iconoModo");
  const icono2 = document.getElementById("iconoModo2");
  if (body.classList.contains("dark")) {
    body.classList.remove("dark");
    icono.className = "fa-solid fa-moon";
    if (icono2) icono2.className = "fa-solid fa-moon";
    localStorage.setItem("modo", "claro");
  } else {
    body.classList.add("dark");
    icono.className = "fa-solid fa-sun";
    if (icono2) icono2.className = "fa-solid fa-sun";
    localStorage.setItem("modo", "oscuro");
  }
}

if (localStorage.getItem("modo") === "oscuro" || (!localStorage.getItem("modo") && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
  document.body.classList.add("dark");
  document.getElementById("iconoModo").className = "fa-solid fa-sun";
}

// Navegación entre categorías (funciona perfecto)
function cambiarCategoria(cat) {
  document.querySelectorAll(".btn-pestana").forEach(b => {
    b.classList.remove("activa");
    b.classList.add("inactiva");
  });
  event.target.classList.remove("inactiva");
  event.target.classList.add("activa");
  mostrarContenido(cat);
}

function mostrarContenido(categoria) {
  const lista = document.getElementById("lista-contenido");
  lista.innerHTML = "";
  const filtrados = contenido.filter(x => x.categoria === categoria);
  if (!filtrados.length) {
    lista.innerHTML = `<p class="col-span-3 text-center text-gray-400 py-10">Sin contenido en esta sección</p>`;
    return;
  }
  filtrados.forEach(item => {
    const tieneVideo = (item.opciones && item.opciones.length > 0) || (item.temporadas && item.temporadas.length > 0);
    const tarjeta = document.createElement("div");
    tarjeta.className = "tarjeta relative";
    tarjeta.innerHTML = `
      <span class="etiqueta-anio">${item.anio}</span>
      <i class="fa-solid fa-star estrella"></i>
      <img src="${item.portada}" alt="${item.titulo}" class="portada" loading="lazy">
      <div class="info-tarjeta">
        <h3>${item.titulo}</h3>
        ${tieneVideo ? '<span class="badge-video">▶ Disponible</span>' : '<span class="badge-sin-video">🔒 Sin enlace</span>'}
      </div>
    `;
    tarjeta.onclick = () => {
      if (!auth.currentUser) {
        videoPendiente = item;
        abrirModalLogin();
      } else {
        abrirDetalle(item);
      }
    };
    lista.appendChild(tarjeta);
  });
}
function reproducirOpcion(url, titulo, anio, opcion) {
  const player = document.getElementById("netflixPlayer");
  let enlace = url.trim();

  if (enlace.includes("google.com/search")) {
    window.open(enlace, "_blank", "noopener,noreferrer");
    return;
  }

  if (enlace.includes("vidmoly")) {
    if (!enlace.includes("controls=")) enlace += (enlace.includes("?") ? "&" : "?") + "controls=1&logo=0&autoplay=1";
    player.innerHTML = `<iframe src="${enlace}" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen style="width:100%;height:100%;background:#000;"></iframe>`;
  } else if (enlace.includes("voe.sx")) {
    player.innerHTML = `<iframe src="${enlace}" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen style="width:100%;height:100%;background:#000;"></iframe>`;
  } else if (enlace.includes("uptostream.com")) {
    player.innerHTML = `<iframe src="${enlace}" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen style="width:100%;height:100%;background:#000;"></iframe>`;
  } else if (enlace.includes("mixdrop.co")) {
    player.innerHTML = `<iframe src="${enlace}" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen style="width:100%;height:100%;background:#000;"></iframe>`;
  } else if (enlace.includes("drive.google.com")) {
    const id = enlace.match(/[-\w]{25,}/)?.[0];
    if (id) {
      enlace = `https://drive.google.com/uc?export=stream&id=${id}&confirm=t&cache=1`;
      player.innerHTML = `<video src="${enlace}" controlsList="nodownload noremoteplayback" controls playsinline preload="auto" crossorigin="anonymous" style="width:100%;height:100%;background:#000;">Tu navegador no soporta el video.</video>`;
    } else {
      player.innerHTML = `<div class="error-video">❌ Enlace de Drive inválido</div>`;
      return;
    }
  } else if (enlace.includes("streamtape.com")) {
    const id = enlace.match(/\/v\/([a-zA-Z0-9_-]+)/)?.[1];
    if (id) {
      enlace = `https://streamtape.com/get_video?id=${id}&stream=1&e=1`;
      player.innerHTML = `<video src="${enlace}" controlsList="nodownload noremoteplayback" controls playsinline preload="auto" crossorigin="anonymous" style="width:100%;height:100%;background:#000;">Tu navegador no soporta el video.</video>`;
    } else {
      player.innerHTML = `<div class="error-video">❌ Enlace de Streamtape inválido</div>`;
      return;
    }
  } else if (enlace.match(/\.(mp4|mkv|webm|m3u8)$/i)) {
    player.innerHTML = `<video src="${enlace}" controlsList="nodownload noremoteplayback" controls playsinline preload="auto" crossorigin="anonymous" style="width:100%;height:100%;background:#000;">Tu navegador no soporta este formato.</video>`;
  } else {
    player.innerHTML = `<iframe src="${enlace}" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen style="width:100%;height:100%;background:#000;"></iframe>`;
  }
}

function abrirCapitulo(capitulo) {
  cerrarDetalle();
  detenerVideo();
  const player = document.getElementById("netflixPlayer");
  const modal = document.getElementById("modal-video");
  const seccionCaps = document.getElementById("seccionCapitulos");
  const panelOpciones = document.getElementById("panelOpciones");
  const botones = document.getElementById("botonesOpciones");

  modal.classList.remove("oculto");
  seccionCaps.classList.remove("oculto");
  panelOpciones.classList.remove("oculto");
  document.body.style.overflow = "hidden";
  botones.innerHTML = "";

  if (capitulo.opciones && capitulo.opciones.length > 0) {
    capitulo.opciones.forEach((op, i) => {
      const btn = document.createElement("button");
      btn.className = `btn-opcion ${i === 0 ? 'activo' : ''}`;
      btn.innerHTML = `<i class="fa-solid fa-play mr-1"></i> ${op.nombre}`;
      btn.onclick = () => {
        document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo"));
        btn.classList.add("activo");
        reproducirOpcion(op.url, `${serieActual.titulo} - Cap. ${capitulo.numero}`, serieActual.anio, op.nombre);
      };
      botones.appendChild(btn);
    });
    reproducirOpcion(capitulo.opciones[0].url, `${serieActual.titulo} - Cap. ${capitulo.numero}`, serieActual.anio, capitulo.opciones[0].nombre);
  } else {
    player.innerHTML = `<div class="error-video">❌ Sin enlaces para este capítulo</div>`;
    return;
  }

  agregarAlHistorial({ ...serieActual, tipo: "serie" });
}

function cerrarVideo() {
  detenerVideo();
  document.getElementById("modal-video").classList.add("oculto");
  document.getElementById("seccionCapitulos").classList.add("oculto");
  document.getElementById("panelOpciones").classList.add("oculto");
  document.body.style.overflow = "auto";
}

// Carga inicial al abrir la app
window.addEventListener("load", () => {
  cargarContenidoCompleto();
  mostrarHistorial();
  auth.onAuthStateChanged(usuario => {
    if (usuario) {
      document.getElementById("nombrePerfil").textContent = usuario.displayName || usuario.email || usuario.phoneNumber || "Usuario";
    } else {
      document.getElementById("nombrePerfil").textContent = "Acceder";
    }
  });
});

// Cerrar con tecla Escape
document.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    if (!document.getElementById("modal-video").classList.contains("oculto")) cerrarVideo();
    else if (!document.getElementById("paginaDetalle").classList.contains("oculto")) cerrarDetalle();
  }
});
</script>
