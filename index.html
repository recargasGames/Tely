// Cambiar modo claro/oscuro
function cambiarModo() {
  const body = document.body;
  const icono = document.getElementById("iconoModo");
  const icono2 = document.getElementById("iconoModo2");
  if (body.classList.contains("dark")) {
    body.classList.remove("dark");
    icono.className = "fa-solid fa-moon";
    if (icono2) icono2.className = "fa-solid fa-moon";
    localStorage.setItem("modo", "claro");
  } else {
    body.classList.add("dark");
    icono.className = "fa-solid fa-sun";
    if (icono2) icono2.className = "fa-solid fa-sun";
    localStorage.setItem("modo", "oscuro");
  }
}

// Cargar preferencia de modo al iniciar
if (localStorage.getItem("modo") === "oscuro" || (!localStorage.getItem("modo") && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
  document.body.classList.add("dark");
  document.getElementById("iconoModo").className = "fa-solid fa-sun";
}

// Configuración TMDB
const TMDB_TOKEN = "eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI4ZGQ5OWI1YTE1YWNmZGQ5OGUzYjI0OWQ1Zjg5MGFmNCIsIm5iZiI6MTc4MjI3NzIzMS4zMzMsInN1YiI6IjZhM2I2NDZmZThmMTMwOTc2MWVjNDYxYiIsInNjb3BlcyI6WyJhcGlfcmVhZCJdLCJ2ZXJzaW9uIjoxfQ.JLmHWuXkhDc9LreAvXFZa0qTS7PR_nrj_SSwVm9UZ9Y";

const TMDB_LANG = "es-ES";

const opcionesTMDB = {
  method: "GET",
  headers: { "Authorization": `Bearer ${TMDB_TOKEN}`, "Content-Type": "application/json;charset=utf-8" }
};

// Cargar contenido desde el panel admin/Firebase
async function cargarContenidoAdmin() {
  try {
    const snapshot = await db.ref("contenido_personalizado").once("value");
    const datosAdmin = snapshot.val();
    return datosAdmin ? Object.values(datosAdmin) : [];
  } catch (err) {
    console.log("Sin contenido del panel:", err);
    return [];
  }
}

// Cargar todo el contenido (TMDB + personalizado + admin)
async function cargarContenidoCompleto() {
  const lista = document.getElementById("lista-contenido");
  lista.innerHTML = '<div class="col-span-3 text-center py-10 text-gray-400">Cargando contenido...</div>';

  try {
    // Obtener películas de TMDB
    const resPeliculas = await fetch(`${TMDB_BASE}/movie/popular?language=${TMDB_LANG}&page=1`, opcionesTMDB);
    const datosPeliculas = await resPeliculas.json();

    // Obtener series de TMDB
    const resSeries = await fetch(`${TMDB_BASE}/tv/popular?language=${TMDB_LANG}&page=1`, opcionesTMDB);
    const datosSeries = await resSeries.json();

    // ✅ TMDB PELÍCULAS ADAPTADAS A TU FORMATO
    const pelisTMDB = datosPeliculas.results.slice(0, 12).map(p => ({
      id: `tmdb_${p.id}`,
      titulo: p.title,
      anio: p.release_date ? p.release_date.split("-")[0] : "N/D",
      tipo: "pelicula",
      categoria: "peliculas",
      portada: p.poster_path ? `${TMDB_IMG}${p.poster_path}` : "https://via.placeholder.com/300x450?text=Sin+Portada",
      sinopsis: p.overview || "Sin sinopsis disponible",
      puntuacion: p.vote_average ? p.vote_average.toFixed(1) : "N/A",
      genero: "Película",
      video: "", // Aquí irá el enlace cuando lo agregues
      deTMDB: true
    }));

    // ✅ TMDB SERIES ADAPTADAS A TU FORMATO
    const seriesTMDB = datosSeries.results.slice(0, 8).map(s => ({
      id: `tmdb_${s.id}`,
      titulo: s.name,
      anio: s.first_air_date ? s.first_air_date.split("-")[0] : "N/D",
      tipo: "serie",
      categoria: "series",
      portada: s.poster_path ? `${TMDB_IMG}${s.poster_path}` : "https://via.placeholder.com/300x450?text=Sin+Portada",
      sinopsis: s.overview || "Sin sinopsis disponible",
      puntuacion: s.vote_average ? s.vote_average.toFixed(1) : "N/A",
      genero: "Serie",
      video: "",
      temporadas: [],
      deTMDB: true
    }));

    // Unir todo el contenido
    const contenidoAdmin = await cargarContenidoAdmin();
    contenido = [...MI_CONTENIDO, ...contenidoAdmin, ...pelisTMDB, ...seriesTMDB];

  } catch (err) {
    console.error("Error al cargar TMDB:", err);
    // Si falla TMDB, solo mostrar contenido propio
    const contenidoAdmin = await cargarContenidoAdmin();
    contenido = [...MI_CONTENIDO, ...contenidoAdmin];
  }

  document.getElementById("contadorTotal").textContent = `${contenido.length} títulos`;
  mostrarContenido("estrenos");
}

// Inicio de sesión con Google
function iniciarConGoogle() {
  const proveedor = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(proveedor)
    .then(res => {
      document.getElementById("nombrePerfil").textContent = res.user.displayName || res.user.email;
      cerrarModalLogin();
      if (videoPendiente) {
        abrirDetalle(videoPendiente);
        agregarAlHistorial(videoPendiente);
        videoPendiente = null;
      }
    })
    .catch(err => alert("Error al iniciar sesión: " + err.message));
}

// Recaptcha para inicio por teléfono
function iniciarRecaptcha() {
  if (!recaptchaVerifier) {
    recaptchaVerifier = new firebase.auth.RecaptchaVerifier('modal-login', { size: 'invisible' });
  }
}

// Enviar código SMS
function enviarCodigo() {
  iniciarRecaptcha();
  const telefono = document.getElementById("telefonoInput").value.trim();
  if (!telefono.startsWith("+")) {
    return alert("Agrega el código de país, ej: +58 412...");
  }
  auth.signInWithPhoneNumber(telefono, recaptchaVerifier)
    .then(res => {
      confirmationResult = res;
      document.getElementById("seccionCodigo").classList.remove("oculto");
    })
    .catch(err => alert("Error: " + err.message));
}

// Verificar código SMS
function verificarCodigo() {
  const codigo = document.getElementById("codigoInput").value.trim();
  confirmationResult.confirm(codigo)
    .then(res => {
      document.getElementById("nombrePerfil").textContent = res.user.phoneNumber;
      cerrarModalLogin();
      if (videoPendiente) {
        abrirDetalle(videoPendiente);
        agregarAlHistorial(videoPendiente);
        videoPendiente = null;
      }
    })
    .catch(err => alert("Código incorrecto o expirado"));
}

// Cerrar sesión
function cerrarSesion() {
  auth.signOut().then(() => {
    document.getElementById("nombrePerfil").textContent = "Acceder";
    location.reload();
  });
}

// Historial de reproducción
function agregarAlHistorial(item) {
  let historial = JSON.parse(localStorage.getItem("historialTely")) || [];
  historial = historial.filter(x => x.id !== item.id);
  historial.unshift({ id: item.id, titulo: item.titulo, tipo: item.tipo });
  if (historial.length > 10) historial.pop();
  localStorage.setItem("historialTely", JSON.stringify(historial));
  mostrarHistorial();
}

function mostrarHistorial() {
  const contenedor = document.getElementById("listaHistorial");
  const historial = JSON.parse(localStorage.getItem("historialTely")) || [];
  contenedor.innerHTML = historial.length ? "" : `<div class="historial-vacio">Aún no has visto nada</div>`;
  historial.forEach(item => {
    const boton = document.createElement("button");
    boton.innerHTML = `<i class="fa-solid fa-play mr-2"></i> ${item.titulo}`;
    boton.onclick = () => {
      const encontrado = contenido.find(x => x.id === item.id);
      if (!encontrado) return;
      auth.currentUser ? abrirDetalle(encontrado) : (videoPendiente = encontrado, abrirModalLogin(), toggleMenu());
    };
    contenedor.appendChild(boton);
  });
}

function limpiarHistorial() {
  localStorage.removeItem("historialTely");
  mostrarHistorial();
}

// Mostrar contenido en la lista
function mostrarContenido(categoria) {
  const lista = document.getElementById("lista-contenido");
  lista.innerHTML = "";
  const filtrados = contenido.filter(x => x.categoria === categoria);

  if (!filtrados.length) {
    lista.innerHTML = `<p class="col-span-3 text-center text-gray-400 py-10">Sin contenido en esta sección</p>`;
    return;
  }

  filtrados.forEach(item => {
    const tieneVideo = item.video && item.video.trim() !== "";
    const tarjeta = document.createElement("div");
    tarjeta.className = "tarjeta relative";
    tarjeta.innerHTML = `
      <span class="etiqueta-anio">${item.anio}</span>
      <i class="fa-solid fa-star estrella"></i>
      <img src="${item.portada}" alt="${item.titulo}" class="portada" loading="lazy">
      <div class="info-tarjeta">
        <h3>${item.titulo}</h3>
        ${tieneVideo ? '<span class="badge-video">▶ Disponible</span>' : '<span class="badge-sin-video">🔒 Sin enlace</span>'}
      </div>
    `;
    tarjeta.onclick = () => auth.currentUser ? abrirDetalle(item) : (videoPendiente = item, abrirModalLogin());
    lista.appendChild(tarjeta);
  });
}

// Cambiar entre pestañas
function cambiarCategoria(cat) {
  document.querySelectorAll(".btn-pestana").forEach(b => {
    b.classList.remove("activa");
    b.classList.add("inactiva");
  });
  event.target.classList.remove("inactiva");
  event.target.classList.add("activa");
  mostrarContenido(cat);
}

// Menú de usuario
function toggleMenu() {
  mostrarHistorial();
  document.getElementById("menuPerfil").classList.toggle("mostrar");
}
window.onclick = e => {
  if (!e.target.matches(".btn-menu, .btn-menu *")) {
    document.getElementById("menuPerfil").classList.remove("mostrar");
  }
};

// Buscador
function buscarContenido() {
  const texto = document.getElementById("buscadorInput").value.trim().toLowerCase();
  const resultados = contenido.filter(x => x.titulo.toLowerCase().includes(texto));
  const lista = document.getElementById("lista-contenido");
  lista.innerHTML = "";

  if (resultados.length === 0) {
    lista.innerHTML = `<p class="col-span-3 text-center text-gray-400 py-10">No se encontraron coincidencias</p>`;
    return;
  }

  resultados.forEach(item => {
    const tarjeta = document.createElement("div");
    tarjeta.className = "tarjeta relative";
    tarjeta.innerHTML = `
      <span class="etiqueta-anio">${item.anio}</span>
      <i class="fa-solid fa-star estrella"></i>
      <img src="${item.portada}" alt="${item.titulo}" class="portada" loading="lazy">
      <div class="info-tarjeta"><h3>${item.titulo}</h3></div>
    `;
    tarjeta.onclick = () => abrirDetalle(item);
    lista.appendChild(tarjeta);
  });
}

// Ventana de inicio de sesión
function abrirModalLogin() {
  document.getElementById("modal-login").classList.remove("oculto");
}
function cerrarModalLogin() {
  document.getElementById("modal-login").classList.add("oculto");
  videoPendiente = null;
}

// Abrir vista detallada
function abrirDetalle(item) {
  document.getElementById("fondoPortada").style.backgroundImage = `url(${item.portada})`;
  document.getElementById("tituloDetalle").textContent = item.titulo;
  document.getElementById("anioDetalle").textContent = item.anio;
  document.getElementById("puntuacionDetalle").textContent = item.puntuacion || "7.0";
  document.getElementById("generoDetalle").textContent = item.genero || (item.tipo === "pelicula" ? "Película" : "Serie");
  document.getElementById("sinopsisDetalle").textContent = item.sinopsis || "Sin sinopsis disponible";

  const contenedor = document.getElementById("contenidoReproductor");
  contenedor.innerHTML = "";

  if (item.tipo === "pelicula") {
    contenedor.innerHTML = `
      <div class="mt-6">
        <div class="h-[300px] bg-black rounded-xl flex items-center justify-center mb-4">
          <button class="w-20 h-20 rounded-full bg-amber-500 text-3xl flex items-center justify-center" 
            onclick='abrirVideoPelicula(${JSON.stringify(item).replace(/"/g, '&quot;')})'>▶</button>
        </div>
      </div>
    `;
  } else {
    contenedor.innerHTML = `<div class="mt-6"><div id="tempDetalle" class="selector-temporadas"></div><div id="capsDetalle" class="lista-capitulos mt-4"></div></div>`;
    serieActual = item;
    if (item.temporadas?.length > 0) {
      const contTemp = document.getElementById("tempDetalle");
      item.temporadas.forEach((temp, i) => {
        const btn = document.createElement("button");
        btn.className = `btn-temporada ${i === 0 ? 'activa' : ''}`;
        btn.textContent = temp.nombre;
        btn.onclick = () => {
          document.querySelectorAll("#tempDetalle .btn-temporada").forEach(b => b.classList.remove("activa"));
          btn.classList.add("activa");
          mostrarCapitulosDetalle(temp);
        };
        contTemp.appendChild(btn);
      });
      mostrarCapitulosDetalle(item.temporadas[0]);
    }
  }

  document.getElementById("paginaDetalle").style.display = "block";
  document.body.style.overflow = "hidden";
}

function mostrarCapitulosDetalle(temporada) {
  const contenedor = document.getElementById("capsDetalle");
  contenedor.innerHTML = "";
  temporada.capitulos.forEach(cap => {
    const btn = document.createElement("button");
    btn.className = "btn-capitulo";
    btn.textContent = `Cap. ${cap.numero}`;
    btn.onclick = () => abrirCapitulo(cap);
    contenedor.appendChild(btn);
  });
}

function cerrarDetalle() {
  document.getElementById("paginaDetalle").style.display = "none";
  document.body.style.overflow = "auto";
}

// ✅ Reproducir video (usa solo tu formato `video:`)
function abrirVideoPelicula(peli) {
  cerrarDetalle();
  const player = document.getElementById("netflixPlayer");
  const modal = document.getElementById("modal-video");
  const seccionCap = document.getElementById("seccionCapitulos");
  const panelOpciones = document.getElementById("panelOpciones");

  modal.classList.remove("oculto");
  seccionCap.classList.add("oculto");
  panelOpciones.classList.remove("oculto");
  document.body.style.overflow = "hidden";

  if (!peli.video || peli.video.trim() === "") {
    player.innerHTML = `<div class="error-video">❌ Sin enlace de video. Agrega el enlace en el campo "video" para reproducir.</div>`;
    return;
  }

  reproducirOpcion(peli.video, peli.titulo, peli.anio, "Reproducir");
  agregarAlHistorial(peli);
}

// Cargar el reproductor
function reproducirOpcion(url, titulo, anio, opcion) {
  const player = document.getElementById("netflixPlayer");
  let enlace = url.trim();

  // Adaptar enlaces de Google Drive
  if (enlace.includes('drive.google.com')) {
    enlace = enlace.replace(/\/view([^?]*)/, '/preview').replace(/\?usp=.*/, '').replace(/&usp=.*/, '');
    enlace += '?embedded=true&controls=1&modestbranding=1&rel=0';
  }

  player.innerHTML = `
    <iframe src="${enlace}" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen
      style="width: 100%; height: 100%; background: #000;"></iframe>
    <div class="player-top">
      <h3 class="titulo-video">${titulo} ${anio ? `(${anio})` : ''}</h3>
      <button class="btn-cerrar-video" onclick="cerrarVideo()"><i class="fa-solid fa-arrow-left"></i></button>
    </div>
  `;
}

// Reproducir capítulo de serie
function abrirCapitulo(cap) {
  const player = document.getElementById("netflixPlayer");
  if (!cap.video || cap.video.trim() === "") {
    player.innerHTML = `<div class="error-video">❌ Sin enlace para este capítulo</div>`;
    return;
  }
  reproducirOpcion(cap.video, serieActual.titulo, `Capítulo ${cap.numero}`, "Reproducir");
}

// Cerrar reproductor
function cerrarVideo() {
  document.getElementById("modal-video").classList.add("oculto");
  document.body.style.overflow = "auto";
  serieActual = null;
}

// Detectar estado de sesión
auth.onAuthStateChanged(usuario => {
  if (usuario) {
    document.getElementById("nombrePerfil").textContent = usuario.displayName || usuario.phoneNumber || "Usuario";
  }
});

// Iniciar todo al cargar la página
window.onload = cargarContenidoCompleto;
</script>
