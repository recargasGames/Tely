let paginaPeliculasCargadas = 0;
let paginaSeriesCargadas = 0;
const TOTAL_PAGINAS_INICIALES = 5;

async function cargarContenidoCompleto() {
  const lista = document.getElementById("lista-contenido");
  lista.innerHTML = '<div class="col-span-3 text-center py-10 text-gray-400"><i class="fa-solid fa-spinner fa-spin"></i> Cargando contenido...</div>';

  try {
    // Cargar PELÍCULAS (páginas 1 a 5)
    let todasPeliculas = [];
    for (let page = 1; page <= TOTAL_PAGINAS_INICIALES; page++) {
      const res = await fetch(`${TMDB_BASE}/movie/popular?language=${TMDB_LANG}&page=${page}`, opcionesTMDB);
      const datos = await res.json();
      if (datos.results) {
        todasPeliculas = [...todasPeliculas, ...datos.results];
      }
      await new Promise(r => setTimeout(r, 200));
    }
    paginaPeliculasCargadas = TOTAL_PAGINAS_INICIALES;

    // Cargar SERIES (páginas 1 a 5)
    let todasSeries = [];
    for (let page = 1; page <= TOTAL_PAGINAS_INICIALES; page++) {
      const res = await fetch(`${TMDB_BASE}/tv/popular?language=${TMDB_LANG}&page=${page}`, opcionesTMDB);
      const datos = await res.json();
      if (datos.results) {
        todasSeries = [...todasSeries, ...datos.results];
      }
      await new Promise(r => setTimeout(r, 200));
    }
    paginaSeriesCargadas = TOTAL_PAGINAS_INICIALES;
    
    // Cargar enlaces desde Firebase
    const contenidoAdmin = await cargarContenidoAdmin();

    // Crear mapa de admin por tmdb_id para enlaces
    const adminMap = {};
    contenidoAdmin.forEach(item => {
      adminMap[item.tmdb_id] = item;
    });

    // Mapear películas
    const pelisTMDB = todasPeliculas.map(p => {
      const admin = adminMap[p.id];
      return {
        id: `tmdb_${p.id}`,
        tmdb_id: p.id,
        titulo: p.title || "Sin título",
        anio: p.release_date ? p.release_date.split("-")[0] : "N/D",
        tipo: "pelicula",
        categoria: "peliculas",
        portada: p.poster_path ? `${TMDB_IMG}${p.poster_path}` : "https://via.placeholder.com/300x450?text=Sin+Portada",
        sinopsis: p.overview || "Sin sinopsis",
        puntuacion: p.vote_average ? p.vote_average.toFixed(1) : "N/A",
        genero: "Película",
        url: admin?.url || "",
        opcion2: admin?.opcion2 || "",
        adminId: admin?.id || null
      };
    });

    // Mapear series
    const seriesTMDB = todasSeries.map(s => {
      const admin = adminMap[s.id];
      return {
        id: `tmdb_${s.id}`,
        tmdb_id: s.id,
        titulo: s.name || "Sin título",
        anio: s.first_air_date ? s.first_air_date.split("-")[0] : "N/D",
        tipo: "serie",
        categoria: "series",
        portada: s.poster_path ? `${TMDB_IMG}${s.poster_path}` : "https://via.placeholder.com/300x450?text=Sin+Portada",
        sinopsis: s.overview || "Sin sinopsis",
        puntuacion: s.vote_average ? s.vote_average.toFixed(1) : "N/A",
        genero: "Serie",
        url: "",
        opcion2: "",
        temporadas: admin?.temporadas || [],
        adminId: admin?.id || null
      };
    });

    // Mezclar todo
    contenido = [...MI_CONTENIDO, ...contenidoAdmin, ...pelisTMDB, ...seriesTMDB];
    
    // Limpiar duplicados por tmdb_id
    const seen = new Set();
    contenido = contenido.filter(item => {
      const key = item.tmdb_id ? `${item.tipo}_${item.tmdb_id}` : item.id;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });

    if (contenido.length === 0) {
      contenido = [...MI_CONTENIDO, ...contenidoAdmin];
    }

  } catch (err) {
    console.error("Error TMDB:", err);
    const contenidoAdmin = await cargarContenidoAdmin();
    contenido = [...MI_CONTENIDO, ...contenidoAdmin];
  }

  document.getElementById("contadorTotal").textContent = `${contenido.length} títulos`;
  mostrarContenido("estrenos");
  mostrarRecientes();
}// ==============================================

        genero: "Película",
        url: admin?.url || "",
        opcion2: admin?.opcion2 || "",

      };
    });

    // Mapear nuevas series
    const seriesNuevas = nuevasSeries.map(s => {
      const admin = adminMap[s.id];
      return {
        id: `tmdb_${s.id}`,
        tmdb_id: s.id,
        titulo: s.name || "Sin título",

        tipo: "serie",
        categoria: "series",

        sinopsis: s.overview || "Sin sinopsis",
        puntuacion: s.vote_average ? s.vote_average.toFixed(1) : "N/A",
        genero: "Serie",
        url: "",
        opcion2: "",
        temporadas: admin?.temporadas || [],
        adminId: admin?.id || null
      };
    });

    // Agregar al contenido existente (evitar duplicados)
    const idsExistentes = new Set(contenido.map(item => item.tmdb_id ? `${item.tipo}_${item.tmdb_id}` : item.id));
    
    const nuevosItems = [...pelisNuevas, ...seriesNuevas].filter(item => {
      const key = item.tmdb_id ? `${item.tipo}_${item.tmdb_id}` : item.id;
      return !idsExistentes.has(key);
    });

    contenido = [...contenido, ...nuevosItems];
    
    document.getElementById("contadorTotal").textContent = `${contenido.length} títulos`;
    
    // Volver a mostrar la categoría actual
    const categoriaActual = document.querySelector('.btn-pestana.activa');

function iniciarConGoogle() {
  const btn = document.getElementById('btnGoogleLogin');
  const textoOriginal = btn.innerHTML;
  
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Esperando...';
  btn.disabled = true;
  
  const proveedor = new firebase.auth.GoogleAuthProvider();
  proveedor.setCustomParameters({ 'prompt': 'select_account' });
  
  auth.signInWithPopup(proveedor)
    .then((result) => {
      document.getElementById("nombrePerfil").textContent = result.user.displayName || result.user.email;
      cerrarModalLogin();
      btn.innerHTML = textoOriginal;
      btn.disabled = false;
      if (videoPendiente) { 
        abrirVideoPelicula(videoPendiente);
        agregarAlHistorial(videoPendiente);
        videoPendiente = null; 
      }
    })
    .catch((error) => {
      btn.innerHTML = textoOriginal;
      btn.disabled = false;
      
      if (error.code === 'auth/popup-closed-by-user') {
        alert("⚠️ Cerraste la ventana de Google antes de terminar.\n\nVuelve a intentarlo.");
      } else {
        alert("Error: " + error.message);
      }
    });
}

function iniciarRecaptcha() {
  if (!recaptchaVerifier) recaptchaVerifier = new firebase.auth.RecaptchaVerifier('modal-login', { size: 'invisible' });
}

function enviarCodigo() {
  iniciarRecaptcha();
  const telefono = document.getElementById("telefonoInput").value.trim();
  if (!telefono.startsWith("+")) return alert("Agrega código de país ej: +58...");
  auth.signInWithPhoneNumber(telefono, recaptchaVerifier)
    .then(res => { confirmationResult = res; document.getElementById("seccionCodigo").classList.remove("oculto"); })
    .catch(err => alert("Error: " + err.message));
}

function verificarCodigo() {
  const codigo = document.getElementById("codigoInput").value.trim();
  confirmationResult.confirm(codigo)
    .then(res => {
      document.getElementById("nombrePerfil").textContent = res.user.phoneNumber;
      cerrarModalLogin();
      if (videoPendiente) { 
        abrirVideoPelicula(videoPendiente);
        agregarAlHistorial(videoPendiente);
        videoPendiente = null; 
      }
    })
    .catch(err => alert("Código incorrecto o expirado"));
}

function cerrarSesion() { 
  auth.signOut().then(() => { 
    document.getElementById("nombrePerfil").textContent = "Acceder"; 
    videoPendiente = null;
  });

function cambiarModo() {
  const body = document.body;
  const icono = document.getElementById("iconoModo");
  if (body.classList.contains("dark")) {
    body.classList.remove("dark");
    icono.className = "fa-solid fa-moon";
    localStorage.setItem("modo", "claro");
  } else {
    body.classList.add("dark");
    icono.className = "fa-solid fa-sun";
    localStorage.setItem("modo", "oscuro");
  }
}

if (localStorage.getItem("modo") === "oscuro" || (!localStorage.getItem("modo") && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
  document.body.classList.add("dark");
  document.getElementById("iconoModo").className = "fa-solid fa-sun";
}

function agregarAlHistorial(item) {
  let h = JSON.parse(localStorage.getItem("historialTely")) || [];
  h = h.filter(x => x.id !== item.id);
  h.unshift({ id: item.id, titulo: item.titulo, tipo: item.tipo });
  if (h.length > 10) h.pop();
  localStorage.setItem("historialTely", JSON.stringify(h));
  mostrarHistorial();
  mostrarRecientes();
}

function mostrarHistorial() {
  const c = document.getElementById("listaHistorial");
  const h = JSON.parse(localStorage.getItem("historialTely")) || [];
  c.innerHTML = h.length ? "" : `<div class="historial-vacio">Aún no has visto nada</div>`;
  h.forEach(i => {
    const btn = document.createElement("button");
    btn.innerHTML = `<i class="fa-solid fa-play mr-2"></i> ${i.titulo}`;
    btn.onclick = () => { 
      const f = contenido.find(x => x.id === i.id); 
      if (!f) return; 
      auth.currentUser ? abrirVideoPelicula(f) : (videoPendiente = f, abrirModalLogin(), toggleMenu()); 
    };
    c.appendChild(btn);
  });
}

function mostrarRecientes() {
  const contenedor = document.getElementById("scrollRecientes");
  const historial = JSON.parse(localStorage.getItem("historialTely")) || [];
  
  if (historial.length === 0) {
    contenedor.innerHTML = `<p class="text-gray-400 text-sm py-2">No has visto nada aún</p>`;
    return;
  }
  
  contenedor.innerHTML = "";
  historial.forEach(item => {
    const encontrado = contenido.find(c => c.id === item.id);
    if (!encontrado) return;
    
    const tarjeta = document.createElement("div");
    tarjeta.className = "tarjeta-reciente";
    tarjeta.innerHTML = `
      <img src="${encontrado.portada}" alt="${encontrado.titulo}" class="portada-reciente" loading="lazy" onerror="this.src='https://via.placeholder.com/120x180?text=Sin+Portada'">
      <div class="info-reciente">
        <h4>${encontrado.titulo}</h4>
      </div>
    `;
    tarjeta.onclick = () => {
      auth.currentUser ? abrirVideoPelicula(encontrado) : (videoPendiente = encontrado, abrirModalLogin());
    };
    contenedor.appendChild(tarjeta);
  });
}

function limpiarHistorial() { localStorage.removeItem("historialTely"); mostrarHistorial(); mostrarRecientes(); }

function mostrarContenido(categoria) {
  const lista = document.getElementById("lista-contenido");
  lista.innerHTML = "";
  const filtrados = contenido.filter(x => x.categoria === categoria);
  if (!filtrados.length) { 
    lista.innerHTML = `<p class="col-span-3 text-center text-gray-400 py-10">Sin contenido en esta sección</p>`; 
    return; 
  }
  filtrados.forEach(item => {
    const tieneVideo = item.url || item.opcion2 || (item.temporadas && item.temporadas.length > 0);
    const tarjeta = document.createElement("div");
    tarjeta.className = "tarjeta";
    tarjeta.innerHTML = `
      <span class="etiqueta-anio">${item.anio}</span>
      <i class="fa-solid fa-star estrella"></i>
      <img src="${item.portada}" alt="${item.titulo}" class="portada" loading="lazy" onerror="this.src='https://via.placeholder.com/300x450?text=Sin+Portada'">
      <div class="info-tarjeta">
        <h3>${item.titulo}</h3>
        ${tieneVideo ? '<span class="badge-video">▶ Disponible</span>' : '<span class="badge-sin-video">🔒 Sin enlace</span>'}
      </div>
    `;
    tarjeta.onclick = () => { 
      auth.currentUser ? abrirVideoPelicula(item) : (videoPendiente = item, abrirModalLogin()); 
    };
    lista.appendChild(tarjeta);
  });
}

function cambiarCategoria(cat) {
  document.querySelectorAll(".btn-pestana").forEach(b => { 
    b.classList.remove("activa"); 
    b.classList.add("inactiva"); 
  });
  const botones = document.querySelectorAll(".btn-pestana");
  botones.forEach(b => {
    if (b.textContent.toLowerCase().includes(cat) || 
        (cat === 'estrenos' && b.textContent.includes('Estrenos')) ||
        (cat === 'peliculas' && b.textContent.includes('Películas')) ||
        (cat === 'series' && b.textContent.includes('Series'))) {
      b.classList.remove("inactiva");
      b.classList.add("activa");
    }
  });
  modoBusqueda = false;
  document.getElementById("contenedorCargarMas").style.display = "flex";
  mostrarContenido(cat);
}

function toggleMenu() { 
  const menu = document.getElementById("menuPerfil");
  menu.classList.toggle("mostrar");
  mostrarHistorial();
}

document.addEventListener('click', function(e) {
  const menu = document.getElementById("menuPerfil");
  const btn = document.querySelector(".btn-perfil");
  if (menu && !menu.contains(e.target) && !btn.contains(e.target)) {
    menu.classList.remove("mostrar");
  }
});

async function buscarContenido() {
  const texto = document.getElementById("buscadorInput").value.trim().toLowerCase();

    modoBusqueda = false;
    document.getElementById("contenedorCargarMas").style.display = "flex";
    const categoriaActual = document.querySelector('.btn-pestana.activa');
    if (categoriaActual) {
      const cat = categoriaActual.textContent.trim().toLowerCase();
      if (cat.includes('estrenos')) mostrarContenido('estrenos');
      else if (cat.includes('películas')) mostrarContenido('peliculas');
      else if (cat.includes('series')) mostrarContenido('series');
    }
    return;
  }

  modoBusqueda = true;
  document.getElementById("contenedorCargarMas").style.display = "none";

    const datosSeries = await resSeries.json();

    // Cargar enlaces desde Firebase

    const adminMap = {};
    contenidoAdmin.forEach(item => {
      adminMap[item.tmdb_id] = item;
    });

    // Procesar resultados de películas

        sinopsis: s.overview || "Sin sinopsis",

    });

// 🎬 REPRODUCTOR CON OPCIÓN 1 Y OPCIÓN 2
// ==============================================
function abrirVideoPelicula(peli) {
    detenerVideo();
    
    const modal = document.getElementById("modal-video");
    const player = document.getElementById("netflixPlayer");
    const botones = document.getElementById("botonesOpciones");
    
    peliculaActual = peli;
    
    modal.classList.add("abierto");
    document.body.style.overflow = "hidden";
    
    if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('landscape').catch(function(err) {
            console.log("No se pudo bloquear la orientación:", err);
        });
    }
    
    // ACTUALIZAR TÍTULO Y SINOPSIS
    document.getElementById("tituloReproductor").textContent = peli.titulo;
    document.getElementById("anioPanel").textContent = peli.anio || "2024";
    document.getElementById("ratingPanel").textContent = peli.puntuacion || "7.0";
    document.getElementById("generoPanel").textContent = peli.genero || (peli.tipo === "pelicula" ? "Película" : "Serie");
    document.getElementById("sinopsisPanel").textContent = peli.sinopsis || "Sin sinopsis disponible";
    
    // ==============================================
    // 🔥 CREAR BOTONES DE OPCIÓN DESDE FIREBASE
    // ==============================================
    botones.innerHTML = "";
    
    const tieneOp1 = peli.url && peli.url.trim() !== '';
    const tieneOp2 = peli.opcion2 && peli.opcion2.trim() !== '';
    
    if (tieneOp1) {
        const btn1 = document.createElement("button");
        btn1.className = "btn-opcion activo";
        btn1.innerHTML = `<i class="fa-solid fa-play mr-2"></i> Opción 1`;
        btn1.onclick = function() {
            document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo"));
            this.classList.add("activo");
            reproducirOpcion(peli.url);
        };
        botones.appendChild(btn1);
    }
    
    if (tieneOp2) {
        const btn2 = document.createElement("button");
        btn2.className = "btn-opcion";
        btn2.innerHTML = `<i class="fa-solid fa-play mr-2"></i> Opción 2`;
        btn2.onclick = function() {
            document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo"));
            this.classList.add("activo");
            reproducirOpcion(peli.opcion2);
        };
        botones.appendChild(btn2);
    }
    
    if (!tieneOp1 && !tieneOp2) {
        const btnSin = document.createElement("button");
        btnSin.className = "btn-opcion";
        btnSin.innerHTML = `<i class="fa-solid fa-ban mr-2"></i> Sin enlaces disponibles`;
        btnSin.style.borderColor = "#EF4444";
        btnSin.style.color = "#EF4444";
        btnSin.onclick = function() {
            alert("❌ Esta película no tiene enlaces agregados.\n\nVe al panel de administración para agregar Opción 1 y Opción 2.");
        };
        botones.appendChild(btnSin);
    }
    
    if (tieneOp1 || tieneOp2) {
        const btnNueva = document.createElement("button");
        btnNueva.className = "btn-opcion btn-nueva-ventana";
        btnNueva.innerHTML = `<i class="fa-solid fa-external-link-alt mr-2"></i> Abrir en ventana nueva`;
        btnNueva.onclick = function() {
            const url = peli.url || peli.opcion2;
            if (url) {
                window.open(url, '_blank');
            } else {
                alert("❌ No hay enlace disponible");
            }
        };
        botones.appendChild(btnNueva);
    }

    // REPRODUCIR AUTOMÁTICAMENTE
    if (tieneOp1) {
        reproducirOpcion(peli.url);
    } else if (tieneOp2) {
        reproducirOpcion(peli.opcion2);
    } else {
        player.innerHTML = `<div style="color:#EF4444;text-align:center;padding:4rem;font-size:1.2rem;">
            <i class="fa-solid fa-link" style="font-size:3rem;display:block;margin-bottom:1rem;"></i>
            No hay enlaces disponibles para esta película<br>
            <span style="font-size:0.8rem;color:#94A3B8;">Agrega Opción 1 y Opción 2 desde el panel de administración</span>
        </div>`;
    }

    agregarAlHistorial(peli);
    cargarRecomendadas(peli.tmdb_id);
}

// 🎬 REPRODUCIR OPCIÓN
// ==============================================
function reproducirOpcion(url) {
    const player = document.getElementById("netflixPlayer");
    let enlace = url.trim();

    if (enlace.includes('youtube.com') || enlace.includes('youtu.be')) {
        const videoId = enlace.match(/(?:v\/|watch\?v=|\/)([a-zA-Z0-9_-]{11})/)?.[1];
        if (videoId) {
            enlace = `https://www.youtube.com/embed/${videoId}?autoplay=1&controls=1&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3`;
        }
        player.innerHTML = `
            <iframe src="${enlace}" frameborder="0" 
                allow="autoplay; encrypted-media; picture-in-picture; fullscreen" 
                allowfullscreen 
                style="width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;">
            </iframe>
        `;
        return;
    }

    if (enlace.includes('vidmoly')) {
        if (!enlace.includes('controls=')) {
            enlace += (enlace.includes('?') ? '&' : '?') + 'controls=1&logo=0&autoplay=1';
        }
        player.innerHTML = `
            <object data="${enlace}" type="text/html" 
                style="width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;">
            </object>
        `;
        return;
    }

    if (enlace.includes('mixdrop')) {
        if (!enlace.includes('autoplay')) {
            enlace += (enlace.includes('?') ? '&' : '?') + 'autoplay=1';
        }
        player.innerHTML = `
            <iframe src="${enlace}" frameborder="0" 
                allow="autoplay; encrypted-media; picture-in-picture; fullscreen" 
                allowfullscreen 
                style="width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;">
            </iframe>
        `;
        return;
    }

    if (enlace.includes('drive.google.com')) {
        const id = enlace.match(/[-\w]{25,}/)?.[0];
        if (id) {
            const driveUrl = `https://drive.google.com/uc?export=stream&id=${id}&confirm=t&cache=1`;
            player.innerHTML = `
                <video src="${driveUrl}" controlsList="nodownload noremoteplayback" controls playsinline preload="auto" crossorigin="anonymous" style="width:100%;height:100%;background:#000;position:absolute;top:0;left:0;" autoplay>
                    Tu navegador no soporta el video.
                </video>
            `;
        } else {
            player.innerHTML = `<div style="color:#EF4444;text-align:center;padding:4rem;font-size:1.2rem;">❌ Enlace de Drive inválido</div>`;
        }
        return;
    }

    player.innerHTML = `
        <iframe src="${enlace}" frameborder="0" 
            allow="autoplay; encrypted-media; picture-in-picture; fullscreen" 
            allowfullscreen 
            style="width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;">
        </iframe>
    `;
}// ==============================================
// 📥 RECOMENDACIONES
// ==============================================
async function cargarRecomendadas(tmdbId) {
    const contenedor = document.getElementById("recomendadasLista");
    contenedor.innerHTML = "<p class='text-gray-400 text-center py-3'>Cargando recomendaciones...</p>";

    if (!tmdbId) {
        contenedor.innerHTML = "<p class='text-gray-400 text-center py-3'>Sin recomendaciones disponibles</p>";
        return;
    }

    try {
        const res = await fetch(`${TMDB_BASE}/movie/${tmdbId}/recommendations?language=${TMDB_LANG}&page=1`, opcionesTMDB);
        const datos = await res.json();
        contenedor.innerHTML = "";

        if (!datos.results || datos.results.length === 0) {
            contenedor.innerHTML = "<p class='text-gray-400 text-center py-3'>No hay películas relacionadas</p>";
            return;
        }

        datos.results.slice(0, 6).forEach(pelicula => {
            const tarjeta = document.createElement("div");
            tarjeta.className = "tarjeta-recomendada";
            tarjeta.innerHTML = `
                <img src="${pelicula.poster_path ? TMDB_IMG + pelicula.poster_path : 'https://via.placeholder.com/110x165?text=Sin+Imagen'}" 
                     alt="${pelicula.title}" class="portada-recomendada">
                <p class="texto-recomendada">${pelicula.title}</p>
            `;
            tarjeta.onclick = () => {
                cerrarVideo();
                const completo = contenido.find(c => c.tmdb_id == pelicula.id);
                if (completo) {
                    abrirVideoPelicula(completo);
                } else {
                    abrirVideoPelicula({
                        id: `tmdb_${pelicula.id}`,
                        tmdb_id: pelicula.id,
                        titulo: pelicula.title,
                        anio: pelicula.release_date ? pelicula.release_date.split("-")[0] : "N/D",
                        tipo: "pelicula",
                        categoria: "peliculas",
                        portada: pelicula.poster_path ? TMDB_IMG + pelicula.poster_path : "",
                        sinopsis: pelicula.overview || "Sin sinopsis",
                        puntuacion: pelicula.vote_average ? pelicula.vote_average.toFixed(1) : "N/A",
                        genero: "Película",
                        url: "",
                        opcion2: ""
                    });
                }
            };
            contenedor.appendChild(tarjeta);
        });

    } catch (err) {
        contenedor.innerHTML = "<p class='text-red-400 text-center py-3'>Error al cargar recomendaciones</p>";
    }
}

    btn1.className = "btn-opcion activo";

        btn2.className = "btn-opcion";
        btn2.innerHTML = `<i class="fa-solid fa-play mr-2"></i> Opción 2`;
        btn2.onclick = () => {
            document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo"));
            btn2.classList.add("activo");
            if (cap.opcion2) reproducirOpcion(cap.opcion2);
        };
        botones.appendChild(btn2);
    }
    
    const btnNueva = document.createElement("button");
    btnNueva.className = "btn-opcion btn-nueva-ventana";
    btnNueva.innerHTML = `<i class="fa-solid fa-external-link-alt mr-2"></i> Abrir en ventana nueva`;
    btnNueva.onclick = () => {
        if (cap.url) window.open(cap.url, '_blank');
        else alert("❌ No hay enlace disponible");
    };
    botones.appendChild(btnNueva);

    if (cap.url) {
        reproducirOpcion(cap.url);
    } else {
        player.innerHTML = `<div style="color:#EF4444;text-align:center;padding:4rem;font-size:1.2rem;">❌ Sin enlace para este capítulo</div>`;
    }
}
