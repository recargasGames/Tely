<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELY 🎬</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        fondo: '#0A0A0F',
                        texto: '#FFFFFF',
                        grisClaro: '#1A1A2E',
                        grisMedio: '#2D2D44',
                        oscuro: '#0F0F1A',
                        acento: '#7C3AED',
                        acentoClaro: '#A78BFA',
                        botonActivo: '#7C3AED',
                        botonInactivo: '#2D2D44',
                        naranja: '#F59E0B',
                        rojo: '#EF4444',
                        verde: '#10B981',
                        fondoOscuro: '#0A0A0F',
                        textoOscuro: '#FFFFFF',
                        grisOscuro: '#1A1A2E'
                    },
                    fontFamily: {
                        sans: ['Segoe UI', 'Roboto', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        /* ===== RESET Y BASE ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            width: 100%; 
            max-width: 100%; 
            overflow-x: hidden; 
            min-height: 100vh;
            background: #0A0A0F;
            color: #FFFFFF;
            font-family: 'Segoe UI', Roboto, sans-serif;
            scroll-behavior: smooth;
        }
        body.dark { background: #0A0A0F; color: #FFFFFF; }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #7C3AED; border-radius: 4px; }

        /* ===== HEADER ===== */
        header { 
            padding: 0.8rem 1.2rem; 
            background: rgba(10, 10, 15, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(124, 58, 237, 0.15);
            position: sticky; 
            top: 0; 
            z-index: 50; 
        }
        .logo-contenedor { display: flex; align-items: center; gap: 0.6rem; }
        .logo { height: 36px; width: auto; object-fit: contain; }
        .titulo-app { 
            font-size: 1.5rem; 
            font-weight: 800; 
            background: linear-gradient(135deg, #7C3AED, #A78BFA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .btn-menu { 
            background: rgba(124, 58, 237, 0.15); 
            border: none; 
            font-size: 1.2rem; 
            cursor: pointer; 
            color: #FFFFFF; 
            padding: 0.5rem; 
            border-radius: 50%;
            transition: 0.3s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-menu:hover { background: rgba(124, 58, 237, 0.3); transform: scale(1.05); }
        .btn-perfil { 
            background: rgba(124, 58, 237, 0.15); 
            border: none; 
            font-size: 1.3rem; 
            cursor: pointer; 
            color: #FFFFFF; 
            padding: 0.5rem; 
            border-radius: 50%;
            transition: 0.3s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-perfil:hover { background: rgba(124, 58, 237, 0.3); transform: scale(1.05); }
        .menu-derecha { display: flex; align-items: center; gap: 0.6rem; }

        /* ===== PESTAÑAS ===== */
        .pestanas { 
            display: flex; 
            gap: 0.6rem; 
            padding: 0.8rem 1.2rem; 
            flex-wrap: wrap;
            background: rgba(10, 10, 15, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-bottom: 1px solid rgba(124, 58, 237, 0.08);
        }
        .btn-pestana { 
            padding: 0.5rem 1.2rem; 
            border-radius: 9999px; 
            border: none; 
            font-weight: 600; 
            cursor: pointer; 
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }
        .btn-pestana.inactiva { 
            background: rgba(255,255,255,0.05); 
            color: #94A3B8; 
        }
        .btn-pestana.inactiva:hover { 
            background: rgba(255,255,255,0.1); 
            color: #FFFFFF; 
        }
        .btn-pestana.activa { 
            background: #7C3AED; 
            color: #FFFFFF;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
        }

        /* ===== BUSCADOR ===== */
        .buscador { 
            display: flex; 
            align-items: center; 
            gap: 0.8rem; 
            padding: 0.8rem 1.2rem 1rem; 
            flex-wrap: wrap;
        }
        .input-buscar { 
            flex: 1; 
            min-width: 200px; 
            padding: 0.9rem 1.2rem; 
            border-radius: 9999px; 
            border: 2px solid rgba(124, 58, 237, 0.2); 
            background: rgba(255,255,255,0.05);
            color: #FFFFFF; 
            font-size: 1rem;
            transition: 0.3s;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .input-buscar:focus { 
            outline: none; 
            border-color: #7C3AED;
            box-shadow: 0 0 30px rgba(124, 58, 237, 0.15);
            background: rgba(255,255,255,0.08);
        }
        .input-buscar::placeholder { color: #64748B; }
        .btn-buscar { 
            background: #7C3AED; 
            border: none; 
            font-size: 1.1rem; 
            cursor: pointer; 
            color: #FFFFFF; 
            padding: 0.85rem 1.2rem; 
            border-radius: 9999px;
            transition: 0.3s;
        }
        .btn-buscar:hover { 
            background: #6D28D9; 
            transform: scale(1.05);
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
        }
        .contador { 
            background: rgba(255,255,255,0.05); 
            padding: 0.6rem 1rem; 
            border-radius: 9999px; 
            font-weight: 500; 
            font-size: 0.8rem;
            color: #94A3B8;
            border: 1px solid rgba(124, 58, 237, 0.1);
        }

        /* ===== SECCIONES ===== */
        .seccion-recientes { padding: 0 1.2rem 1.5rem; }
        .seccion-recientes .titulo-seccion { 
            font-size: 1.2rem; 
            font-weight: 700; 
            margin-bottom: 0.8rem; 
            display: flex; 
            align-items: center; 
            gap: 0.6rem;
            color: #FFFFFF;
        }
        .seccion-recientes .titulo-seccion i { color: #7C3AED; }

        /* ===== SCROLL HORIZONTAL ===== */
        .scroll-recientes { 
            display: flex; 
            gap: 0.8rem; 
            overflow-x: auto; 
            padding: 0.3rem 0 0.8rem; 
            scroll-snap-type: x mandatory; 
            -webkit-overflow-scrolling: touch;
        }
        .scroll-recientes::-webkit-scrollbar { height: 3px; }
        .scroll-recientes::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
        .scroll-recientes::-webkit-scrollbar-thumb { background: #7C3AED; border-radius: 4px; }
        
        .tarjeta-reciente { 
            flex: 0 0 auto; 
            width: 110px; 
            border-radius: 12px; 
            overflow: hidden; 
            background: rgba(255,255,255,0.04); 
            cursor: pointer; 
            transition: all 0.3s ease; 
            scroll-snap-align: start;
            border: 1px solid rgba(124, 58, 237, 0.08);
        }
        .tarjeta-reciente:hover { 
            transform: scale(1.05) translateY(-4px);
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.2);
            border-color: rgba(124, 58, 237, 0.3);
        }
        .tarjeta-reciente .portada-reciente { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .tarjeta-reciente .info-reciente { padding: 0.4rem; text-align: center; }
        .tarjeta-reciente .info-reciente h4 { 
            font-size: 0.7rem; 
            font-weight: 600; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
            color: #E2E8F0;
        }

        /* ===== GRID DE CONTENIDO ===== */
        .grid-contenido { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
            gap: 1rem; 
            padding: 0 1.2rem 2rem; 
        }
        @media (max-width: 480px) { 
            .grid-contenido { 
                grid-template-columns: repeat(2, 1fr); 
                gap: 0.8rem; 
            } 
        }
        
        .tarjeta { 
            border-radius: 14px; 
            overflow: hidden; 
            background: rgba(255,255,255,0.04); 
            cursor: pointer; 
            transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94); 
            position: relative;
            border: 1px solid rgba(124, 58, 237, 0.06);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .tarjeta:hover { 
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 12px 40px rgba(124, 58, 237, 0.25);
            border-color: rgba(124, 58, 237, 0.25);
        }
        .tarjeta:active { transform: scale(0.97); }
        .portada { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .etiqueta-anio { 
            position: absolute; 
            top: 0.6rem; 
            left: 0.6rem; 
            background: rgba(124, 58, 237, 0.85); 
            color: #fff; 
            padding: 0.2rem 0.6rem; 
            border-radius: 6px; 
            font-size: 0.65rem; 
            font-weight: 700;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        .estrella { 
            position: absolute; 
            top: 0.6rem; 
            right: 0.6rem; 
            color: #F59E0B; 
            font-size: 0.8rem;
            text-shadow: 0 2px 10px rgba(245, 158, 11, 0.5);
        }
        .info-tarjeta { padding: 0.6rem; }
        .info-tarjeta h3 { 
            font-size: 0.85rem; 
            font-weight: 600; 
            margin-bottom: 0.1rem; 
            line-height: 1.2; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
            color: #F1F5F9;
        }
        .badge-video { 
            font-size: 0.6rem; 
            color: #34D399; 
            font-weight: 600;
            background: rgba(52, 211, 153, 0.12);
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
        }
        .badge-sin-video { 
            font-size: 0.6rem; 
            color: #64748B; 
            font-weight: 500;
            background: rgba(100, 116, 139, 0.1);
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
        }
        .badge-serie {
            font-size: 0.55rem;
            color: #A78BFA;
            font-weight: 600;
            background: rgba(124, 58, 237, 0.15);
            padding: 0.1rem 0.4rem;
            border-radius: 4px;
            margin-left: 0.3rem;
        }            /* ===== REPRODUCTOR MODAL ===== */
        .modal-video { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.97); 
            z-index: 9998; 
            display: none; 
            align-items: center;
            justify-content: center;
            padding: 0;
            overflow-y: auto;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .modal-video.abierto { display: flex; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .reproductor-contenedor {
            background: #0A0A0F;
            width: 100%;
            height: 100vh;
            max-height: 100vh;
            overflow-y: auto;
            padding: 1rem;
            margin: 0;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .info-arriba { margin-bottom: 0.8rem; flex-shrink: 0; }
        .info-arriba h2 { 
            font-size: 1.4rem; 
            font-weight: 700; 
            color: #fff;
            background: linear-gradient(135deg, #FFFFFF, #A78BFA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .info-arriba .detalles-arriba {
            display: flex;
            gap: 1rem;
            align-items: center;
            font-size: 0.8rem;
            color: #94A3B8;
            flex-wrap: wrap;
            margin-top: 0.1rem;
        }
        .info-arriba .detalles-arriba .anio-arriba {
            background: rgba(124, 58, 237, 0.15);
            padding: 0.1rem 0.6rem;
            border-radius: 4px;
            border: 1px solid rgba(124, 58, 237, 0.15);
        }
        .info-arriba .detalles-arriba .rating-arriba { color: #F59E0B; }
        .info-arriba .sinopsis-arriba {
            font-size: 0.8rem;
            color: #94A3B8;
            margin-top: 0.2rem;
            line-height: 1.5;
            max-height: 3rem;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .netflix-player {
            width: 100%;
            aspect-ratio: 16/9;
            position: relative;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
        }
        .netflix-player iframe,
        .netflix-player object,
        .netflix-player embed {
            width: 100%;
            height: 100%;
            border: none;
            background: #000;
            position: absolute;
            top: 0;
            left: 0;
        }

        .controles-superior { 
            display: flex; 
            justify-content: flex-end; 
            gap: 0.6rem; 
            margin-top: 0.6rem; 
            flex-shrink: 0;
        }
        .btn-control { 
            background: rgba(255,255,255,0.06); 
            border: none; 
            color: #fff; 
            padding: 0.5rem 1rem; 
            border-radius: 10px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 0.4rem; 
            font-size: 0.8rem; 
            transition: 0.3s;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }
        .btn-control:hover { background: rgba(255,255,255,0.12); }
        .btn-cerrar-modal { 
            background: rgba(239, 68, 68, 0.15); 
            color: #EF4444; 
        }
        .btn-cerrar-modal:hover { background: rgba(239, 68, 68, 0.3); }

        .botones-opciones { 
            display: flex; 
            gap: 0.6rem; 
            flex-wrap: wrap; 
            margin-top: 0.8rem; 
            flex-shrink: 0;
        }
        .btn-opcion { 
            padding: 0.5rem 1.2rem; 
            border-radius: 10px; 
            border: 2px solid rgba(124, 58, 237, 0.2); 
            background: rgba(255,255,255,0.04); 
            color: #fff; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            gap: 0.4rem; 
            font-weight: 600; 
            font-size: 0.8rem; 
            transition: 0.3s;
        }
        .btn-opcion.activo { 
            border-color: #7C3AED; 
            background: #7C3AED; 
            color: #fff;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
        }
        .btn-opcion:hover { 
            border-color: #7C3AED;
            transform: translateY(-2px);
        }
        .btn-nueva-ventana { 
            border-color: rgba(239, 68, 68, 0.3) !important; 
            color: #EF4444 !important; 
        }
        .btn-nueva-ventana:hover { 
            background: rgba(239, 68, 68, 0.15) !important; 
            border-color: #EF4444 !important;
        }

        /* ===== CAPÍTULOS DE SERIES ===== */
        .capitulos-container {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            margin-top: 0.5rem;
            padding: 0.5rem;
            background: rgba(255,255,255,0.03);
            border-radius: 10px;
            border: 1px solid rgba(124, 58, 237, 0.08);
            max-height: 200px;
            overflow-y: auto;
            flex-shrink: 0;
        }
        .capitulos-container::-webkit-scrollbar { width: 3px; }
        .capitulos-container::-webkit-scrollbar-track { background: transparent; }
        .capitulos-container::-webkit-scrollbar-thumb { background: #7C3AED; border-radius: 4px; }

        .capitulo-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.3rem 0.6rem;
            background: rgba(255,255,255,0.03);
            border-radius: 6px;
            border: 1px solid rgba(124, 58, 237, 0.05);
            transition: 0.3s;
            cursor: pointer;
        }
        .capitulo-item:hover {
            background: rgba(124, 58, 237, 0.08);
            border-color: rgba(124, 58, 237, 0.15);
        }
        .capitulo-item .cap-numero {
            font-weight: 600;
            color: #A78BFA;
            font-size: 0.75rem;
            min-width: 60px;
        }
        .capitulo-item .cap-titulo {
            flex: 1;
            font-size: 0.8rem;
            color: #E2E8F0;
            margin: 0 0.5rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .capitulo-item .cap-play {
            color: #34D399;
            font-size: 0.8rem;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            background: rgba(52, 211, 153, 0.1);
            transition: 0.3s;
        }
        .capitulo-item .cap-play:hover {
            background: rgba(52, 211, 153, 0.2);
        }
        .capitulo-item .cap-sin-enlace {
            color: #64748B;
            font-size: 0.65rem;
        }

        .seccion-recomendadas { 
            border-top: 1px solid rgba(124, 58, 237, 0.1); 
            padding-top: 0.8rem; 
            margin-top: 0.8rem; 
            flex-shrink: 0;
        }
        .titulo-recomendadas { 
            font-size: 1rem; 
            font-weight: 600; 
            color: #fff; 
            margin-bottom: 0.6rem; 
        }
        .lista-recomendadas { 
            display: flex; 
            gap: 0.8rem; 
            overflow-x: auto; 
            padding-bottom: 0.5rem; 
        }
        .lista-recomendadas::-webkit-scrollbar { height: 3px; }
        .lista-recomendadas::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; }
        .lista-recomendadas::-webkit-scrollbar-thumb { background: #7C3AED; border-radius: 4px; }
        
        .tarjeta-recomendada { 
            flex: 0 0 auto; 
            width: 100px; 
            cursor: pointer; 
            transition: all 0.3s ease;
            border-radius: 10px;
            overflow: hidden;
        }
        .tarjeta-recomendada:hover { 
            transform: scale(1.08) translateY(-4px);
            box-shadow: 0 8px 30px rgba(124, 58, 237, 0.2);
        }
        .portada-recomendada { 
            width: 100%; 
            height: 150px; 
            border-radius: 8px; 
            object-fit: cover; 
        }
        .texto-recomendada { 
            font-size: 0.65rem; 
            text-align: center; 
            margin-top: 0.2rem; 
            color: #94A3B8; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
        }

        @media (orientation: landscape) {
            .modal-video.abierto .info-arriba,
            .modal-video.abierto .controles-superior,
            .modal-video.abierto .botones-opciones,
            .modal-video.abierto .capitulos-container,
            .modal-video.abierto .seccion-recomendadas {
                display: none !important;
            }
            .modal-video.abierto .netflix-player {
                border-radius: 0 !important;
                aspect-ratio: auto !important;
                height: 100vh !important;
                width: 100vw !important;
            }
            .modal-video.abierto .reproductor-contenedor {
                padding: 0 !important;
                background: #000 !important;
                overflow: hidden !important;
            }
            .modal-video.abierto {
                padding: 0 !important;
                background: #000 !important;
            }
        }

        /* ===== MENÚ PERFIL ===== */
        .menu-perfil { position: relative; }
        .dropdown { 
            position: absolute; 
            right: 0; 
            top: 120%; 
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px; 
            width: 280px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.5); 
            display: none; 
            z-index: 100; 
            border: 1px solid rgba(124, 58, 237, 0.15);
            padding: 0.5rem 0;
        }
        .dropdown.mostrar { display: block; animation: slideDown 0.25s ease; }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .dropdown-header { 
            padding: 0.8rem 1rem; 
            border-bottom: 1px solid rgba(124, 58, 237, 0.08); 
            font-weight: 600;
            color: #F1F5F9;
        }
        .dropdown button { 
            display: block; 
            width: 100%; 
            padding: 0.7rem 1rem; 
            text-align: left; 
            border: none; 
            background: none; 
            cursor: pointer; 
            font-size: 0.85rem; 
            color: #CBD5E1;
            transition: 0.2s;
        }
        .dropdown button:hover { 
            background: rgba(124, 58, 237, 0.08); 
            color: #FFFFFF;
        }
        .historial-vacio { padding: 1.2rem; text-align: center; color: #64748B; font-size: 0.85rem; }

        /* ===== MODAL LOGIN ===== */
        .modal-login { 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 9999; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 1rem; 
        }
        .contenedor-login { 
            background: rgba(26, 26, 46, 0.95); 
            border-radius: 20px; 
            padding: 2rem; 
            width: 100%; 
            max-width: 400px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid rgba(124, 58, 237, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .contenedor-login h2 { 
            font-size: 1.5rem; 
            font-weight: 700; 
            text-align: center; 
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #FFFFFF, #A78BFA);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .contenedor-login input { 
            width: 100%; 
            padding: 0.8rem;

async function cargarContenidoAdmin() {
  try {
    const [snapPelis, snapSeries] = await Promise.all([
      db.ref("contenido_personalizado").once("value"),
      db.ref("series_personalizadas").once("value")
    ]);
    
    const pelis = snapPelis.val() ? Object.values(snapPelis.val()) : [];
    const series = snapSeries.val() ? Object.values(snapSeries.val()) : [];
    
    const seriesFormateadas = series.map(s => ({
      ...s,
      tipo: 'serie',
      categoria: 'series',
      url: s.temporadas?.[0]?.capitulos?.[0]?.url || '',
      opcion2: s.temporadas?.[0]?.capitulos?.[0]?.opcion2 || ''
    }));
    
    return [...pelis, ...seriesFormateadas];
  } catch (err) {
    console.log("Error cargando Firebase:", err);
    return [];
  }
}

    ]);

    const [datosPelis1, datosPelis2, datosSeries1, datosSeries2] = await Promise.all([
      resPelis1.json(), resPelis2.json(), resSeries1.json(), resSeries2.json()
    ]);

    const todasPeliculas = [...(datosPelis1.results || []), ...(datosPelis2.results || [])];
    const todasSeries = [...(datosSeries1.results || []), ...(datosSeries2.results || [])];

    paginaPeliculasCargadas = 2;
    paginaSeriesCargadas = 2;
    
    const contenidoAdmin = await cargarContenidoAdmin();

    const adminMap = {};
    contenidoAdmin.forEach(item => {
      adminMap[item.tmdb_id] = item;
    });

    const pelisTMDB = todasPeliculas.map(p => {
      const admin = adminMap[p.id];
      return {
        id: `tmdb_${p.id}`,
        tmdb_id: p.id,
        titulo: p.title || "Sin título",
        anio: p.release_date ? p.release_date.split("-")[0] : "N/D",
        tipo: "pelicula",
        categoria: "peliculas",
        portada: p.poster_path ? `${TMDB_IMG}${p.poster_path}` : "https://via.placeholder.com/300x450?text=Sin+Portada",
        sinopsis: p.overview || "Sin sinopsis",
        puntuacion: p.vote_average ? p.vote_average.toFixed(1) : "N/A",
        genero: "Película",
        url: admin?.url || "",
        opcion2: admin?.opcion2 || "",
        adminId: admin?.id || null,
        temporadas: admin?.temporadas || []
      };
    });

    const seriesTMDB = todasSeries.map(s => {
      const admin = adminMap[s.id];
      return {
        id: `tmdb_${s.id}`,
        tmdb_id: s.id,
        titulo: s.name || "Sin título",
        anio: s.first_air_date ? s.first_air_date.split("-")[0] : "N/D",
        tipo: "serie",
        categoria: "series",

        genero: "Serie",
        url: "",
        opcion2: "",
        temporadas: admin?.temporadas || [],
        adminId: admin?.id || null
      };
    });

    contenido = [...MI_CONTENIDO, ...contenidoAdmin, ...pelisTMDB, ...seriesTMDB];
    
    const seen = new Set();
    contenido = contenido.filter(item => {
      const key = item.tmdb_id ? `${item.tipo}_${item.tmdb_id}` : item.id;
      if (seen.has(key)) return false;
      seen.add(key);
      return true;

function cambiarModo() {
  const body = document.body;
  const icono = document.getElementById("iconoModo");
  if (body.classList.contains("dark")) {
    body.classList.remove("dark");
    icono.className = "fa-solid fa-moon";
    localStorage.setItem("modo", "claro");
  } else {
    body.classList.add("dark");
    icono.className = "fa-solid fa-sun";
    localStorage.setItem("modo", "oscuro");
  }
}

if (localStorage.getItem("modo") === "oscuro" || (!localStorage.getItem("modo") && window.matchMedia("(prefers-color-scheme: dark)").matches)) {

}

function agregarAlHistorial(item) {
  let h = JSON.parse(localStorage.getItem("historialTely")) || [];
  h = h.filter(x => x.id !== item.id);
  h.unshift({ id: item.id, titulo: item.titulo, tipo: item.tipo });
  if (h.length > 10) h.pop();
  localStorage.setItem("historialTely", JSON.stringify(h));
  mostrarHistorial();
  mostrarRecientes();
}

function mostrarHistorial() {
  const c = document.getElementById("listaHistorial");
  const h = JSON.parse(localStorage.getItem("historialTely")) || [];
  c.innerHTML = h.length ? "" : `<div class="historial-vacio">Aún no has visto nada</div>`;
  h.forEach(i => {
    const btn = document.createElement("button");
    btn.innerHTML = `<i class="fa-solid fa-play mr-2"></i> ${i.titulo}`;
    btn.onclick = () => { 
      const f = contenido.find(x => x.id === i.id); 
      if (!f) return; 
      auth.currentUser ? abrirVideoPelicula(f) : (videoPendiente = f, abrirModalLogin(), toggleMenu()); 
    };
    c.appendChild(btn);
  });
}

function mostrarRecientes() {
  const contenedor = document.getElementById("scrollRecientes");
  const historial = JSON.parse(localStorage.getItem("historialTely")) || [];
  
  if (historial.length === 0) {
    contenedor.innerHTML = `<p style="color:#64748B;font-size:0.8rem;padding:0.5rem;">No has visto nada aún</p>`;
    return;
  }
  
  contenedor.innerHTML = "";
  historial.forEach(item => {
    const encontrado = contenido.find(c => c.id === item.id);
    if (!encontrado) return;
    
    const tarjeta = document.createElement("div");
    tarjeta.className = "tarjeta-reciente";
    tarjeta.innerHTML = `
      <img src="${encontrado.portada}" alt="${encontrado.titulo}" class="portada-reciente" loading="lazy" onerror="this.src='https://via.placeholder.com/120x180?text=Sin+Portada'">
      <div class="info-reciente">
        <h4>${encontrado.titulo}</h4>
      </div>
    `;
    tarjeta.onclick = () => {
      auth.currentUser ? abrirVideoPelicula(encontrado) : (videoPendiente = encontrado, abrirModalLogin());
    };
    contenedor.appendChild(tarjeta);
  });
}

function abrirVideoPelicula(peli) {
    // 🔥 IMPORTANTE: CARGAR ENLACES DESDE FIREBASE EN TIEMPO REAL
    if (peli.tmdb_id) {
        // Buscar en contenido_personalizado (películas)
        db.ref("contenido_personalizado").orderByChild("tmdb_id").equalTo(peli.tmdb_id).once("value", (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const keys = Object.keys(data);
                const adminItem = data[keys[0]];
                if (adminItem) {
                    peli.url = adminItem.url || '';
                    peli.opcion2 = adminItem.opcion2 || '';
                    peli.adminId = keys[0];
                    console.log("✅ Enlaces cargados desde Firebase:", peli.url, peli.opcion2);
                }
            }
            // Si no se encontró en películas, buscar en series_personalizadas
            if (!peli.url && !peli.opcion2) {
                db.ref("series_personalizadas").orderByChild("tmdb_id").equalTo(peli.tmdb_id).once("value", (snapshot) => {
                    const dataSeries = snapshot.val();
                    if (dataSeries) {
                        const keys = Object.keys(dataSeries);
                        const adminItem = dataSeries[keys[0]];
                        if (adminItem && adminItem.temporadas) {
                            peli.temporadas = adminItem.temporadas;
                            peli.adminId = keys[0];
                            console.log("✅ Temporadas cargadas desde Firebase:", peli.temporadas.length);
                        }
                    }
                    // Continuar con la reproducción
                    continuarAbrirVideo(peli);
                });
            } else {
                continuarAbrirVideo(peli);
            }
        });
    } else {
        continuarAbrirVideo(peli);
    }
}

// ==============================================
// 🎬 REPRODUCIR OPCIÓN (CON BLOQUEO DE ANUNCIOS)
// ==============================================
function reproducirOpcion(url) {
    const player = document.getElementById("netflixPlayer");
    let enlace = url.trim();

    // ==========================================
    // 🔥 STREAMTAPE - Bloquear anuncios
    // ==========================================
    if (enlace.includes('streamtape.com')) {
        const videoId = enlace.match(/\/v\/([^\/?]+)/)?.[1] || enlace.match(/\/e\/([^\/?]+)/)?.[1] || enlace.match(/\/d\/([^\/?]+)/)?.[1];
        if (videoId) {
            enlace = `https://streamtape.com/e/${videoId}?autoplay=1&controls=1&logo=0`;
        }
        player.innerHTML = `
            <iframe src="${enlace}" frameborder="0" 
                allow="autoplay; encrypted-media; picture-in-picture; fullscreen" 
                allowfullscreen 
                style="width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;">
            </iframe>
        `;
        return;
    }

    // ==========================================
    // 🔥 MIXDROP - Bloquear anuncios
    // ==========================================
    if (enlace.includes('mixdrop')) {
        const videoId = enlace.match(/\/e\/([^\/?]+)/)?.[1] || enlace.match(/\/f\/([^\/?]+)/)?.[1];
        if (videoId) {
            enlace = `https://mixdrop.co/e/${videoId}?autoplay=1`;
        }
        player.innerHTML = `
            <iframe src="${enlace}" frameborder="0" 
                allow="autoplay; encrypted-media; picture-in-picture; fullscreen" 
                allowfullscreen 
                style="width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;">
            </iframe>
        `;
        return;
    }

    // ==========================================
    // 🔥 VIDMOLY - Bloquear anuncios
    // ==========================================
    if (enlace.includes('vidmoly')) {
        if (!enlace.includes('controls=')) {
            enlace += (enlace.includes('?') ? '&' : '?') + 'controls=1&logo=0&autoplay=1';
        }
        player.innerHTML = `
            <object data="${enlace}" type="text/html" 
                style="width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;">
            </object>
        `;
        return;
    }

    // ==========================================
    // 🔥 YOUTUBE
    // ==========================================
    if (enlace.includes('youtube.com') || enlace.includes('youtu.be')) {
        const videoId = enlace.match(/(?:v\/|watch\?v=|\/)([a-zA-Z0-9_-]{11})/)?.[1];
        if (videoId) {
            enlace = `https://www.youtube.com/embed/${videoId}?autoplay=1&controls=1&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3`;
        }
        player.innerHTML = `
            <iframe src="${enlace}" frameborder="0" 
                allow="autoplay; encrypted-media; picture-in-picture; fullscreen" 
                allowfullscreen 
                style="width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;">
            </iframe>
        `;
        return;
    }

    // ==========================================
    // 🔥 GOOGLE DRIVE
    // ==========================================
    if (enlace.includes('drive.google.com')) {
        const id = enlace.match(/[-\w]{25,}/)?.[0];
        if (id) {
            const driveUrl = `https://drive.google.com/uc?export=stream&id=${id}&confirm=t&cache=1`;
            player.innerHTML = `
                <video src="${driveUrl}" controlsList="nodownload noremoteplayback" controls playsinline preload="auto" crossorigin="anonymous" style="width:100%;height:100%;background:#000;position:absolute;top:0;left:0;" autoplay>
                    Tu navegador no soporta el video.
                </video>
            `;
        } else {
            player.innerHTML = `<div style="color:#EF4444;text-align:center;padding:4rem;font-size:1.2rem;">❌ Enlace de Drive inválido</div>`;
        }
        return;
    }

    // ==========================================
    // 🔥 CUALQUIER OTRO ENLACE
    // ==========================================
    player.innerHTML = `
        <iframe src="${enlace}" frameborder="0" 
            allow="autoplay; encrypted-media; picture-in-picture; fullscreen" 
            allowfullscreen 
            style="width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;">
        </iframe>
    `;
}// ==============================================

async function cargarRecomendadas(tmdbId) {
    const contenedor = document.getElementById("recomendadasLista");
    contenedor.innerHTML = "<p style='color:#64748B;text-align:center;padding:0.8rem;'>Cargando...</p>";

    if (!tmdbId) {
        contenedor.innerHTML = "<p style='color:#64748B;text-align:center;padding:0.8rem;'>Sin recomendaciones</p>";
        return;
    }

    try {
        const res = await fetch(`${TMDB_BASE}/movie/${tmdbId}/recommendations?language=${TMDB_LANG}&page=1`, opcionesTMDB);
        const datos = await res.json();
        contenedor.innerHTML = "";

        if (!datos.results || datos.results.length === 0) {
            contenedor.innerHTML = "<p style='color:#64748B;text-align:center;padding:0.8rem;'>No hay películas relacionadas</p>";
            return;
        }

        datos.results.slice(0, 6).forEach(pelicula => {
            const tarjeta = document.createElement("div");
            tarjeta.className = "tarjeta-recomendada";
            tarjeta.innerHTML = `
                <img src="${pelicula.poster_path ? TMDB_IMG + pelicula.poster_path : 'https://via.placeholder.com/110x165?text=Sin+Imagen'}" 
                     alt="${pelicula.title}" class="portada-recomendada" loading="lazy">
                <p class="texto-recomendada">${pelicula.title}</p>
            `;
            tarjeta.onclick = () => {
                cerrarVideo();
                const completo = contenido.find(c => c.tmdb_id == pelicula.id);
                if (completo) {
                    abrirVideoPelicula(completo);
                } else {
                    abrirVideoPelicula({
                        id: `tmdb_${pelicula.id}`,
                        tmdb_id: pelicula.id,
                        titulo: pelicula.title,
                        anio: pelicula.release_date ? pelicula.release_date.split("-")[0] : "N/D",
                        tipo: "pelicula",
                        categoria: "peliculas",
                        portada: pelicula.poster_path ? TMDB_IMG + pelicula.poster_path : "",
                        sinopsis: pelicula.overview || "Sin sinopsis",
                        puntuacion: pelicula.vote_average ? pelicula.vote_average.toFixed(1) : "N/A",
                        genero: "Película",
                        url: "",
                        opcion2: "",
                        temporadas: []
                    });
                }
            };
            contenedor.appendChild(tarjeta);
        });

    } catch (err) {
        contenedor.innerHTML = "<p style='color:#EF4444;text-align:center;padding:0.8rem;'>Error al cargar</p>";
    }
}

// CERRAR VIDEO

function cerrarVideo() {
    detenerVideo();
    const modal = document.getElementById("modal-video");
    modal.classList.remove("abierto");
    document.body.style.overflow = "auto";
    peliculaActual = null;
    
    // Limpiar capítulos
    document.getElementById("capitulosContainer").innerHTML = "";
    document.getElementById("capitulosContainer").classList.add("oculto");
    
    if (screen.orientation && screen.orientation.unlock) {
        screen.orientation.unlock();
    }
}

function detenerVideo() {
    document.getElementById("netflixPlayer").innerHTML = "";
}

function iniciarConGoogle() {
  const btn = document.getElementById('btnGoogleLogin');
  const textoOriginal = btn.innerHTML;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
  btn.disabled = true;
  
  const proveedor = new firebase.auth.GoogleAuthProvider();
  proveedor.setCustomParameters({ 'prompt': 'select_account' });
  
  auth.signInWithPopup(proveedor)
    .then((result) => {
      document.getElementById("nombrePerfil").textContent = result.user.displayName || result.user.email;
      cerrarModalLogin();
      btn.innerHTML = textoOriginal;
      btn.disabled = false;
      if (videoPendiente) { 
        abrirVideoPelicula(videoPendiente);
        agregarAlHistorial(videoPendiente);
        videoPendiente = null; 
      }
    })
    .catch((error) => {
      btn.innerHTML = textoOriginal;
      btn.disabled = false;
      if (error.code === 'auth/popup-closed-by-user') {
        alert("⚠️ Cerraste la ventana de Google.");
      } else {
        alert("Error: " + error.message);
      }
    });
}

function iniciarRecaptcha() {
  if (!recaptchaVerifier) recaptchaVerifier = new firebase.auth.RecaptchaVerifier('modal-login', { size: 'invisible' });
}

function enviarCodigo() {
  iniciarRecaptcha();
  const telefono = document.getElementById("telefonoInput").value.trim();
  if (!telefono.startsWith("+")) return alert("Agrega código de país ej: +58...");
  auth.signInWithPhoneNumber(telefono, recaptchaVerifier)
    .then(res => { confirmationResult = res; document.getElementById("seccionCodigo").classList.remove("oculto"); })
    .catch(err => alert("Error: " + err.message));
}

function verificarCodigo() {
  const codigo = document.getElementById("codigoInput").value.trim();
  confirmationResult.confirm(codigo)
    .then(res => {
      document.getElementById("nombrePerfil").textContent = res.user.phoneNumber;
      cerrarModalLogin();
      if (videoPendiente) { 
        abrirVideoPelicula(videoPendiente);
        agregarAlHistorial(videoPendiente);
        videoPendiente = null; 
      }
    })
    .catch(err => alert("Código incorrecto"));
}

function cerrarSesion() { 
  auth.signOut().then(() => { 
    document.getElementById("nombrePerfil").textContent = "Acceder"; 
    videoPendiente = null;
  }); 
}
