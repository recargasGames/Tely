<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELY 🎬</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0A0A0F;color:#fff;font-family:'Segoe UI',Roboto,sans-serif;min-height:100vh}
        ::-webkit-scrollbar{width:4px;height:4px}
        ::-webkit-scrollbar-thumb{background:#7C3AED;border-radius:4px}
        header{padding:.7rem 1rem;background:rgba(10,10,15,.95);backdrop-filter:blur(12px);border-bottom:1px solid rgba(124,58,237,.15);position:sticky;top:0;z-index:100}
        .logo-contenedor{display:flex;align-items:center;gap:.7rem}
        .titulo-app{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,#7C3AED,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .btn-menu,.btn-perfil{background:rgba(124,58,237,.15);border:none;cursor:pointer;color:#fff;border-radius:50%;transition:.3s;width:40px;height:40px;font-size:1.2rem;display:flex;align-items:center;justify-content:center}
        .btn-menu:hover,.btn-perfil:hover{background:rgba(124,58,237,.3)}
        .menu-derecha{display:flex;align-items:center;gap:.6rem}
        .sticky-bar{position:sticky;top:68px;z-index:99;background:rgba(10,10,15,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(124,58,237,.08)}
        .pestanas{display:flex;gap:.4rem;padding:.5rem 1rem;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
        .pestanas::-webkit-scrollbar{display:none}
        .btn-pestana{padding:.4rem 1rem;border-radius:9999px;border:none;font-weight:700;cursor:pointer;font-size:.95rem;white-space:nowrap;flex-shrink:0;transition:all .15s ease}
        .btn-pestana.inactiva{background:rgba(255,255,255,.05);color:#94A3B8}
        .btn-pestana.inactiva:hover{background:rgba(255,255,255,.1);color:#fff}
        .btn-pestana.activa{background:#7C3AED;color:#fff}
        .buscador{display:flex;align-items:center;gap:.5rem;padding:.4rem 1rem .6rem}
        .input-buscar{flex:1;min-width:120px;padding:.6rem 1rem;border-radius:9999px;border:2px solid rgba(124,58,237,.2);background:rgba(255,255,255,.05);color:#fff;font-size:1rem;transition:.3s}
        .input-buscar:focus{outline:none;border-color:#7C3AED;background:rgba(255,255,255,.08)}
        .input-buscar::placeholder{color:#64748B}
        .btn-buscar{background:#7C3AED;border:none;font-size:1rem;cursor:pointer;color:#fff;padding:.5rem 1.2rem;border-radius:9999px;transition:.3s}
        .btn-buscar:hover{background:#6D28D9}
        .contador{background:rgba(255,255,255,.05);padding:.25rem .8rem;border-radius:9999px;font-weight:600;font-size:.85rem;color:#94A3B8;border:1px solid rgba(124,58,237,.1)}
        .contenido-scroll{padding-top:.5rem}
        .seccion-populares{padding:.6rem 1rem 1rem}
        .seccion-populares .titulo-seccion{font-size:1.2rem;font-weight:700;margin-bottom:.6rem;display:flex;align-items:center;gap:.5rem;color:#fff}
        .seccion-populares .titulo-seccion i{color:#F59E0B}
        .carrusel-container{position:relative;overflow:hidden;border-radius:12px}
        .carrusel-wrapper{overflow-x:auto;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;scrollbar-width:none;padding:.3rem 0;cursor:grab}
        .carrusel-wrapper:active{cursor:grabbing}
        .carrusel-wrapper::-webkit-scrollbar{display:none}
        .carrusel-track{display:flex;gap:.6rem;width:max-content}
        .carrusel-item{flex:0 0 auto;width:140px;border-radius:10px;overflow:hidden;background:rgba(255,255,255,.04);cursor:pointer;border:1px solid rgba(124,58,237,.08);transition:.2s;position:relative}
        .carrusel-item:hover{transform:scale(1.03);border-color:rgba(124,58,237,.3)}
        .carrusel-item .portada-popular{width:100%;aspect-ratio:2/3;object-fit:cover;background:#1A1A2E}
        .carrusel-item .info-popular{padding:.4rem;text-align:center}
        .carrusel-item .info-popular h4{font-size:.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#E2E8F0}
        .carrusel-item .badge-tipo{position:absolute;top:.4rem;right:.4rem;font-size:.65rem;padding:.1rem .5rem;border-radius:4px;font-weight:700;background:rgba(124,58,237,.85);color:#fff}
        .seccion-recientes{padding:0 1rem 1rem}
        .seccion-recientes .titulo-seccion{font-size:1.2rem;font-weight:700;margin-bottom:.6rem;display:flex;align-items:center;gap:.5rem;color:#fff}
        .seccion-recientes .titulo-seccion i{color:#7C3AED}
        .scroll-recientes{display:flex;gap:.6rem;overflow-x:auto;padding:.2rem 0 .6rem;-webkit-overflow-scrolling:touch;scrollbar-width:none}
        .scroll-recientes::-webkit-scrollbar{display:none}
        .tarjeta-reciente{flex:0 0 auto;width:85px;border-radius:8px;overflow:hidden;background:rgba(255,255,255,.04);cursor:pointer;border:1px solid rgba(124,58,237,.08)}
        .tarjeta-reciente:hover{transform:scale(1.05)}
        .tarjeta-reciente .portada-reciente{width:100%;aspect-ratio:2/3;object-fit:cover;background:#1A1A2E}
        .tarjeta-reciente .info-reciente{padding:.25rem;text-align:center}
        .tarjeta-reciente .info-reciente h4{font-size:.65rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#E2E8F0}
        .grid-contenido{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;padding:0 1rem .5rem}
        @media(min-width:480px){.grid-contenido{grid-template-columns:repeat(3,1fr)}}
        @media(min-width:768px){.grid-contenido{grid-template-columns:repeat(4,1fr)}}
        @media(min-width:1024px){.grid-contenido{grid-template-columns:repeat(5,1fr)}}
        .tarjeta{border-radius:10px;overflow:hidden;background:rgba(255,255,255,.04);cursor:pointer;position:relative;border:1px solid rgba(124,58,237,.06);transition:.2s}
        .tarjeta:hover{transform:translateY(-3px);border-color:rgba(124,58,237,.2)}
        .tarjeta:active{transform:scale(.97)}
        .portada{width:100%;aspect-ratio:2/3;object-fit:cover;background:#1A1A2E;image-rendering:auto}
        .etiqueta-anio{position:absolute;top:.4rem;left:.4rem;background:rgba(124,58,237,.85);color:#fff;padding:.1rem .5rem;border-radius:4px;font-size:.65rem;font-weight:700}
        .estrella{position:absolute;top:.4rem;right:.4rem;color:#F59E0B;font-size:.8rem}
        .info-tarjeta{padding:.4rem}
        .info-tarjeta h3{font-size:.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#F1F5F9}
        .badge-video{font-size:.6rem;color:#34D399;font-weight:600;background:rgba(52,211,153,.12);padding:.1rem .5rem;border-radius:4px}
        .badge-serie{font-size:.55rem;color:#A78BFA;font-weight:600;background:rgba(124,58,237,.15);padding:.1rem .5rem;border-radius:4px;margin-left:.15rem}
        .badge-opcion2{font-size:.55rem;color:#F59E0B;font-weight:600;background:rgba(245,158,11,.15);padding:.1rem .5rem;border-radius:4px;margin-left:.15rem}
        .contenedor-cargar-mas{display:flex;justify-content:center;padding:.8rem 1rem 1.2rem}
        .btn-cargar-mas{background:rgba(124,58,237,.15);color:#fff;padding:.6rem 2rem;border-radius:9999px;border:2px solid rgba(124,58,237,.2);font-weight:700;cursor:pointer;display:flex;align-items:center;gap:.5rem;font-size:1rem;transition:.3s}
        .btn-cargar-mas:hover{background:rgba(124,58,237,.25);border-color:#7C3AED}
        .btn-cargar-mas:disabled{opacity:.5;cursor:not-allowed}
        .shimmer{background:linear-gradient(90deg,#1A1A2E 25%,#2D2D44 50%,#1A1A2E 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:10px}
        @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
        .shimmer-card{aspect-ratio:2/3;width:100%;border-radius:10px}
        .shimmer-carrusel{aspect-ratio:2/3;width:140px;border-radius:10px}
        .oculto{display:none!important}
        .modal-video{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:9998;display:none;flex-direction:column;overflow-y:auto;backdrop-filter:blur(20px)}
        .modal-video.abierto{display:flex;animation:fadeIn .3s ease}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .reproductor-contenedor{background:#0A0A0F;width:100%;max-width:1200px;margin:0 auto;padding:.8rem;display:flex;flex-direction:column;gap:.6rem}
        .netflix-player{width:100%;aspect-ratio:16/9;position:relative;background:#000;border-radius:12px;overflow:hidden}
        .netflix-player iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;background:#000}
        .controles-superior{display:flex;justify-content:flex-end;gap:.5rem}
        .btn-control{background:rgba(255,255,255,.06);border:none;color:#fff;padding:.4rem .9rem;border-radius:8px;cursor:pointer;font-size:.85rem;transition:.3s}
        .btn-control:hover{background:rgba(255,255,255,.12)}
        .btn-cerrar-modal{background:rgba(239,68,68,.15);color:#EF4444}
        .btn-cerrar-modal:hover{background:rgba(239,68,68,.3)}
        .info-arriba{margin-bottom:.4rem}
        .info-arriba h2{font-size:1.4rem;font-weight:700;color:#fff;background:linear-gradient(135deg,#fff,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .info-arriba .detalles-arriba{display:flex;gap:.6rem;align-items:center;font-size:.85rem;color:#94A3B8;flex-wrap:wrap}
        .info-arriba .sinopsis-arriba{font-size:.95rem;color:#94A3B8;margin-top:.25rem;line-height:1.5;max-height:3.5rem;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
        .botones-opciones{display:flex;gap:.5rem;flex-wrap:wrap}
        .btn-opcion{padding:.4rem 1rem;border-radius:8px;border:2px solid rgba(124,58,237,.2);background:rgba(255,255,255,.04);color:#fff;cursor:pointer;font-weight:700;font-size:.85rem;transition:.3s}
        .btn-opcion.activo{border-color:#7C3AED;background:#7C3AED;color:#fff}
        .btn-opcion:hover{border-color:#7C3AED}
        .btn-opcion.sin-enlace{border-color:rgba(239,68,68,.2)!important;color:#EF4444!important;cursor:not-allowed;opacity:.6}
        .btn-opcion.sin-enlace:hover{border-color:rgba(239,68,68,.2)!important;background:none!important}
        .btn-nueva-ventana{border-color:rgba(239,68,68,.3)!important;color:#EF4444!important;font-size:.85rem}
        .btn-nueva-ventana:hover{background:rgba(239,68,68,.15)!important}
        .capitulos-container{background:rgba(255,255,255,.03);border-radius:10px;padding:.6rem;border:1px solid rgba(124,58,237,.06)}
        .selector-temporada{display:flex;align-items:center;justify-content:center;gap:.6rem;margin-bottom:.5rem}
        .selector-temporada .btn-temp{background:rgba(255,255,255,.06);border:none;color:#fff;padding:.2rem .6rem;border-radius:9999px;cursor:pointer;font-size:.85rem}
        .selector-temporada .btn-temp:hover{background:rgba(124,58,237,.2)}
        .selector-temporada .btn-temp:disabled{opacity:.3;cursor:not-allowed}
        .selector-temporada span{color:#fff;font-weight:700;font-size:.95rem}
        .capitulos-horizontal{display:flex;gap:.4rem;overflow-x:auto;padding:.2rem 0}
        .capitulo-item-horizontal{flex:0 0 auto;min-width:90px;padding:.3rem .5rem;background:rgba(255,255,255,.04);border-radius:8px;cursor:pointer;border:1px solid transparent;text-align:center}
        .capitulo-item-horizontal:hover{background:rgba(255,255,255,.08)}
        .capitulo-item-horizontal.activo{background:rgba(124,58,237,.15);border-color:#7C3AED}
        .capitulo-item-horizontal.sin-enlace{opacity:.5;cursor:not-allowed}
        .cap-numero-h{font-size:.6rem;color:#64748B;display:block}
        .cap-titulo-h{font-size:.7rem;color:#E2E8F0;display:block;font-weight:500}
        .cap-play-h{font-size:.6rem;color:#34D399;display:block}
        .cap-sin-enlace-h{font-size:.6rem;color:#EF4444;display:block}
        .seccion-recomendadas{border-top:1px solid rgba(124,58,237,.1);padding-top:.6rem;margin-top:.6rem}
        .titulo-recomendadas{font-size:.95rem;font-weight:700;color:#fff;margin-bottom:.5rem}
        .lista-recomendadas{display:flex;gap:.5rem;overflow-x:auto;padding-bottom:.3rem}
        .lista-recomendadas::-webkit-scrollbar{height:2px}
        .tarjeta-recomendada{flex:0 0 auto;width:75px;cursor:pointer;border-radius:8px;overflow:hidden}
        .tarjeta-recomendada:hover{transform:scale(1.05)}
        .portada-recomendada{width:100%;height:110px;border-radius:6px;object-fit:cover}
        .texto-recomendada{font-size:.55rem;text-align:center;margin-top:.15rem;color:#94A3B8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .menu-perfil{position:relative}
        .dropdown{position:absolute;right:0;top:120%;background:rgba(26,26,46,.95);backdrop-filter:blur(20px);border-radius:12px;width:260px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5);display:none;z-index:100;border:1px solid rgba(124,58,237,.15);padding:.4rem 0}
        .dropdown.mostrar{display:block;animation:slideDown .2s ease}
        @keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
        .dropdown-header{padding:.5rem 1rem;border-bottom:1px solid rgba(124,58,237,.08);font-weight:700;color:#F1F5F9;font-size:.9rem}
        .dropdown button{display:block;width:100%;padding:.5rem 1rem;text-align:left;border:none;background:none;cursor:pointer;font-size:.85rem;color:#CBD5E1;transition:.2s}
        .dropdown button:hover{background:rgba(124,58,237,.08);color:#fff}
        .historial-vacio{padding:.6rem;text-align:center;color:#64748B;font-size:.8rem}
        .modal-login{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(20px);z-index:9999;display:flex;align-items:center;justify-content:center;padding:1rem}
        .modal-login.oculto{display:none}
        .contenedor-login{background:rgba(26,26,46,.95);border-radius:16px;padding:1.5rem;width:100%;max-width:380px;border:1px solid rgba(124,58,237,.1)}
        .contenedor-login h2{font-size:1.4rem;font-weight:700;text-align:center;margin-bottom:.3rem;background:linear-gradient(135deg,#fff,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .contenedor-login input{width:100%;padding:.6rem;border-radius:10px;border:1px solid rgba(124,58,237,.15);background:rgba(255,255,255,.05);color:#fff;font-size:.95rem;margin-bottom:.4rem}
        .contenedor-login input:focus{outline:none;border-color:#7C3AED}
        .btn-google{background:rgba(255,255,255,.05);border:1px solid rgba(124,58,237,.15);color:#fff;padding:.6rem;border-radius:10px;font-weight:700;cursor:pointer;width:100%;font-size:.95rem;display:flex;align-items:center;justify-content:center;gap:.5rem}
        .btn-google:hover{background:rgba(124,58,237,.15)}
        .btn-enviar-codigo{background:#7C3AED;border:none;color:#fff;padding:.6rem;border-radius:10px;font-weight:700;cursor:pointer;width:100%;font-size:.95rem}
        .btn-enviar-codigo:hover{background:#6D28D9}
        .btn-cerrar-login{background:none;border:none;color:#64748B;cursor:pointer;width:100%;margin-top:.4rem;font-size:.85rem}
        .btn-cerrar-login:hover{color:#fff}
        .toast-tely{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:#fff;padding:12px 24px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:999999;transition:.3s;font-size:.95rem;font-weight:600;max-width:90%;text-align:center;border:1px solid rgba(255,255,255,.1)}
    </style>
</head>
<body>
    <body>
<header>
    <div class="flex justify-between items-center">
        <div class="logo-contenedor">
            <img src="logo.png" alt="Logo TELY" class="logo" onerror="this.style.display='none'">
            <h1 class="titulo-app">TELY</h1>
        </div>
        <div class="menu-derecha">
            <button class="btn-menu" onclick="cambiarModo()"><i class="fa-solid fa-moon" id="iconoModo"></i></button>
            <div class="menu-perfil">
                <button class="btn-perfil" onclick="toggleMenu()"><i class="fa-solid fa-user-circle"></i></button>
                <div class="dropdown" id="menuPerfil">
                    <div class="dropdown-header" id="nombrePerfil">👤 Acceder</div>
                    <div class="dropdown-header" style="font-size:.75rem;color:#64748B;border-top:1px solid rgba(124,58,237,.08);">📺 Visto recientemente</div>
                    <div id="listaHistorial"></div>
                    <button onclick="limpiarHistorial()" style="color:#F59E0B;font-size:.85rem;"><i class="fa-solid fa-trash"></i> Limpiar historial</button>
                    <button onclick="cerrarSesion()" style="color:#EF4444;font-size:.85rem;border-top:1px solid rgba(124,58,237,.08);margin-top:.2rem;padding-top:.5rem;"><i class="fa-solid fa-sign-out"></i> Cerrar sesión</button>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="sticky-bar">
    <div class="pestanas" id="pestanasContainer">
        <button class="btn-pestana activa" onclick="cambiarCategoria('estrenos')">🏠 Inicio</button>
        <button class="btn-pestana inactiva" onclick="cambiarCategoria('peliculas')">🎬 Películas</button>
        <button class="btn-pestana inactiva" onclick="cambiarCategoria('series')">📺 Series</button>
    </div>
    <div class="buscador">
        <input type="text" class="input-buscar" placeholder="🔍 Buscar..." id="buscadorInput" onkeydown="if(event.key==='Enter') buscarContenido()">
        <button class="btn-buscar" onclick="buscarContenido()"><i class="fa-solid fa-magnifying-glass"></i></button>
        <div class="contador" id="contadorTotal">0</div>
    </div>
</div>

<div class="contenido-scroll">
    <div class="seccion-populares" id="seccionPopulares">
        <div class="titulo-seccion"><i class="fa-solid fa-fire"></i> 🔥 Más vistas</div>
        <div class="carrusel-container">
            <div class="carrusel-wrapper" id="carruselWrapper">
                <div class="carrusel-track" id="carruselTrack">
                    <div class="carrusel-item"><div class="shimmer-carrusel shimmer"></div></div>
                    <div class="carrusel-item"><div class="shimmer-carrusel shimmer"></div></div>
                    <div class="carrusel-item"><div class="shimmer-carrusel shimmer"></div></div>
                    <div class="carrusel-item"><div class="shimmer-carrusel shimmer"></div></div>
                    <div class="carrusel-item"><div class="shimmer-carrusel shimmer"></div></div>
                    <div class="carrusel-item"><div class="shimmer-carrusel shimmer"></div></div>
                </div>
            </div>
        </div>
    </div>

    <div class="seccion-recientes">
        <div class="titulo-seccion"><i class="fa-solid fa-clock-rotate-left"></i> Visto recientemente</div>
        <div class="scroll-recientes" id="scrollRecientes">
            <p style="color:#64748B;font-size:.85rem;padding:.3rem;">No has visto nada aún</p>
        </div>
    </div>

    <div class="grid-contenido" id="lista-contenido">
        <div class="tarjeta"><div class="shimmer-card shimmer"></div></div>
        <div class="tarjeta"><div class="shimmer-card shimmer"></div></div>
        <div class="tarjeta"><div class="shimmer-card shimmer"></div></div>
        <div class="tarjeta"><div class="shimmer-card shimmer"></div></div>
        <div class="tarjeta"><div class="shimmer-card shimmer"></div></div>
        <div class="tarjeta"><div class="shimmer-card shimmer"></div></div>
    </div>

    <div class="contenedor-cargar-mas" id="contenedorCargarMas">
        <button class="btn-cargar-mas" onclick="cargarMasContenido()" id="btnCargarMas">
            <i class="fa-solid fa-plus"></i> Cargar más
        </button>
    </div>
</div>
        <!-- MODAL VIDEO -->
<div id="modal-video" class="modal-video">
    <div class="reproductor-contenedor">
        <div class="info-arriba">
            <h2 id="tituloReproductor">Título</h2>
            <div class="detalles-arriba">
                <span class="anio-arriba" id="anioPanel">2024</span>
                <span class="rating-arriba">⭐ <span id="ratingPanel">7.3</span></span>
                <span id="generoPanel">Acción</span>
                <span id="tipoPanel" style="color:#A78BFA;">🎬 Película</span>
            </div>
            <div class="sinopsis-arriba" id="sinopsisPanel">Sinopsis...</div>
        </div>
        <div class="netflix-player" id="netflixPlayer"></div>
        <div class="controles-superior">
            <button class="btn-control btn-cerrar-modal" onclick="cerrarVideo()"><i class="fa-solid fa-xmark"></i> Cerrar</button>
            <button class="btn-control" onclick="recargarVideo()" style="color:#34D399;"><i class="fa-solid fa-rotate"></i> Recargar</button>
        </div>
        <div class="botones-opciones" id="botonesOpciones"></div>
        <div id="capitulosContainer" class="capitulos-container oculto">
            <div class="selector-temporada">
                <button class="btn-temp" id="tempAnterior" onclick="cambiarTemporadaHandler(-1)"><i class="fa-solid fa-chevron-left"></i></button>
                <span id="tempActual">Temporada 1</span>
                <button class="btn-temp" id="tempSiguiente" onclick="cambiarTemporadaHandler(1)"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
            <div class="capitulos-horizontal" id="capitulosHorizontal"></div>
        </div>

function iniciarCarrusel(trackId, items) {
    const track = document.getElementById(trackId);
    if (!track) return;
    track.innerHTML = "";
    if (!items || !items.length) { const s = track.closest('.seccion-populares'); if (s) s.style.display = 'none'; return; }
    items.forEach(i => {
        const d = document.createElement("div");
        d.className = "carrusel-item";
        d.innerHTML = `<span class="badge-tipo">🎬</span><img src="${i.portada}" alt="${i.titulo}" class="portada-popular" loading="eager" onerror="this.src='https://via.placeholder.com/140x210?text=?'"><div class="info-popular"><h4>${i.titulo}</h4></div>`;
        d.onclick = () => { auth.currentUser ? abrirVideoPelicula(i) : (videoPendiente = i, abrirModalLogin()); };
        track.appendChild(d);
    });
    const clones = items.slice(0, 5);
    clones.forEach(i => {
        const d = document.createElement("div");
        d.className = "carrusel-item";
        d.innerHTML = `<span class="badge-tipo">🎬</span><img src="${i.portada}" alt="${i.titulo}" class="portada-popular" loading="eager" onerror="this.src='https://via.placeholder.com/140x210?text=?'"><div class="info-popular"><h4>${i.titulo}</h4></div>`;
        d.onclick = () => { auth.currentUser ? abrirVideoPelicula(i) : (videoPendiente = i, abrirModalLogin()); };
        track.appendChild(d);
    });
    const w = track.closest('.carrusel-wrapper');
    if (!w) return;
    let idx = 0;
    if (carruselInterval) clearInterval(carruselInterval);
    carruselInterval = setInterval(() => {
        const total = track.children.length;
        if (!total) return;
        idx++;
        if (idx >= total - 5) { idx = 0; w.scrollTo({ left: 0, behavior: 'smooth' }); } else { w.scrollTo({ left: idx * 146, behavior: 'smooth' }); }
    }, 4000);
    w.addEventListener('touchstart', () => { if (carruselInterval) clearInterval(carruselInterval); });
    w.addEventListener('touchend', () => { if (carruselInterval) clearInterval(carruselInterval); carruselInterval = setInterval(() => { const total = track.children.length; if (!total) return; idx++; if (idx >= total - 5) { idx = 0; w.scrollTo({ left: 0, behavior: 'smooth' }); } else { w.scrollTo({ left: idx * 146, behavior: 'smooth' }); } }, 4000); });
}

        b1.className = "btn-opcion activo";
        b1.innerHTML = `<i class="fa-solid fa-play mr-1"></i> Opción 1`;
        b1.onclick = function() { document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo")); this.classList.add("activo"); if (pc?.url) reproducirOpcion(pc.url); };
        botones.appendChild(b1);
        const b2 = document.createElement("button");
        b2.className = "btn-opcion";
        b2.innerHTML = `<i class="fa-solid fa-play mr-1"></i> Opción 2`;
        b2.onclick = function() { document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo")); this.classList.add("activo"); if (pc?.opcion2) reproducirOpcion(pc.opcion2); };
        if (pc?.opcion2) { botones.appendChild(b2); } else { b2.className = "btn-opcion sin-enlace"; b2.innerHTML = `<i class="fa-solid fa-link-slash mr-1"></i> Opción 2 (Sin enlace)`; b2.onclick = function() { alert("❌ No hay enlace disponible"); }; botones.appendChild(b2); }
        if (pc?.url || pc?.opcion2) { const b3 = document.createElement("button"); b3.className = "btn-opcion btn-nueva-ventana"; b3.innerHTML = `<i class="fa-solid fa-external-link-alt mr-1"></i> Nueva ventana`; b3.onclick = function() { const u = pc?.url || pc?.opcion2; if (u) window.open(u, '_blank'); else alert("❌ No hay enlace"); }; botones.appendChild(b3); }
        if (pc?.url) reproducirOpcion(pc.url); else player.innerHTML = `<div style="color:#EF4444;text-align:center;padding:3rem;font-size:1rem;"><i class="fa-solid fa-link" style="font-size:2.5rem;display:block;margin-bottom:.5rem;"></i>No hay capítulos disponibles</div>`;
        agregarAlHistorial(peli);
        cargarRecomendadas(peli.tmdb_id);
        return;
    }
    const t1 = peli.url && peli.url.trim(), t2 = peli.opcion2 && peli.opcion2.trim();
    const b1 = document.createElement("button");
    b1.className = "btn-opcion activo";
    b1.innerHTML = `<i class="fa-solid fa-play mr-1"></i> Opción 1`;
    b1.onclick = function() { document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo")); this.classList.add("activo"); reproducirOpcion(peli.url); };
    if (t1) { botones.appendChild(b1); } else { b1.className = "btn-opcion sin-enlace"; b1.innerHTML = `<i class="fa-solid fa-link-slash mr-1"></i> Opción 1 (Sin enlace)`; b1.onclick = function() { alert("❌ No hay enlace disponible"); }; botones.appendChild(b1); }
    const b2 = document.createElement("button");
    b2.className = "btn-opcion";
    b2.innerHTML = `<i class="fa-solid fa-play mr-1"></i> Opción 2`;
    b2.onclick = function() { document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo")); this.classList.add("activo"); reproducirOpcion(peli.opcion2); };
    if (t2) { botones.appendChild(b2); } else { b2.className = "btn-opcion sin-enlace"; b2.innerHTML = `<i class="fa-solid fa-link-slash mr-1"></i> Opción 2 (Sin enlace)`; b2.onclick = function() { alert("❌ No hay enlace disponible"); }; botones.appendChild(b2); }
    if (t1 || t2) { const b3 = document.createElement("button"); b3.className = "btn-opcion btn-nueva-ventana"; b3.innerHTML = `<i class="fa-solid fa-external-link-alt mr-1"></i> Nueva ventana`; b3.onclick = function() { const u = peli.url || peli.opcion2; if (u) window.open(u, '_blank'); else alert("❌ No hay enlace"); }; botones.appendChild(b3); }
    if (t1) reproducirOpcion(peli.url); else if (t2) reproducirOpcion(peli.opcion2); else player.innerHTML = `<div style="color:#EF4444;text-align:center;padding:3rem;font-size:1rem;"><i class="fa-solid fa-link" style="font-size:2.5rem;display:block;margin-bottom:.5rem;"></i>No hay enlaces disponibles</div>`;
    agregarAlHistorial(peli);
    cargarRecomendadas(peli.tmdb_id);
}

function obtenerPrimerCapitulo(idx) { if (!temporadasActuales || !temporadasActuales.length) return null; const t = temporadasActuales[idx]; if (!t || !t.capitulos || !t.capitulos.length) return null; return t.capitulos[0]; }

function mostrarTemporada(index) {
    if (!temporadasActuales || !temporadasActuales.length) return;
    if (index < 0) index = 0; if (index >= temporadasActuales.length) index = temporadasActuales.length - 1;
    tempActualIndex = index;
    const temp = temporadasActuales[index], container = document.getElementById("capitulosHorizontal"), label = document.getElementById("tempActual");
    label.textContent = `Temporada ${temp.numero || index + 1}`;
    container.innerHTML = "";
    document.getElementById("tempAnterior").disabled = index === 0;
    document.getElementById("tempSiguiente").disabled = index === temporadasActuales.length - 1;
    if (!temp.capitulos || !temp.capitulos.length) { container.innerHTML = `<p style="color:#64748B;padding:.4rem;text-align:center;font-size:.9rem;">Sin capítulos</p>`; return; }
    temp.capitulos.forEach((cap, idx) => {
        const d = document.createElement("div");
        d.className = "capitulo-item-horizontal";
        if (idx === 0 && cap.url) d.classList.add("activo");
        if (!cap.url) d.classList.add("sin-enlace");
        d.innerHTML = `<span class="cap-numero-h">Cap ${cap.numero || idx + 1}</span><span class="cap-titulo-h">${cap.titulo || 'Capítulo ' + (idx + 1)}</span>${cap.url ? '<span class="cap-play-h"><i class="fa-solid fa-play"></i> Ver</span>' : '<span class="cap-sin-enlace-h">🔒 Sin enlace</span>'}`;
        d.onclick = function() { if (cap.url) { document.querySelectorAll(".capitulo-item-horizontal").forEach(el => el.classList.remove("activo")); this.classList.add("activo"); reproducirOpcion(cap.url); const bs = document.getElementById("botonesOpciones"); if (bs.children.length) { document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo")); if (bs.children[0]) bs.children[0].classList.add("activo"); } } else { alert("❌ Este capítulo no tiene enlace"); } };
        container.appendChild(d);
    });
}

function cambiarTemporadaHandler(dir) { const n = tempActualIndex + dir; if (n >= 0 && n < temporadasActuales.length) { mostrarTemporada(n); const c = obtenerPrimerCapitulo(n); if (c?.url) { reproducirOpcion(c.url); const bs = document.getElementById("botonesOpciones"); if (bs.children.length) { document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo")); if (bs.children[0]) bs.children[0].classList.add("activo"); } } } }

function reproducirOpcion(url) {
    const p = document.getElementById("netflixPlayer");
    let e = url.trim();
    if (e.includes('unlimplay.com')) { if (!e.includes('?')) e += '?autoplay=1&controls=1&logo=0'; p.innerHTML = `<iframe src="${e}" frameborder="0" referrerpolicy="origin" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen style="width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;"></iframe>`; return; }
    if (e.includes('youtube.com') || e.includes('youtu.be')) { const v = e.match(/(?:v\/|watch\?v=|\/)([a-zA-Z0-9_-]{11})/)?.[1]; if (v) e = `https://www.youtube.com/embed/${v}?autoplay=1&controls=1&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3`; p.innerHTML = `<iframe src="${e}" frameborder="0" referrerpolicy="origin" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen style="width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;"></iframe>`; return; }
    p.innerHTML = `<iframe src="${e}" frameborder="0" referrerpolicy="origin" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen style="width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;"></iframe>`;
}

function cerrarVideo() { detenerVideo(); document.getElementById("modal-video").classList.remove("abierto"); document.body.style.overflow = "auto"; peliculaActual = null; document.getElementById("capitulosHorizontal").innerHTML = ""; document.getElementById("capitulosContainer").classList.add("oculto"); tempActualIndex = 0; temporadasActuales = []; }
function recargarVideo() { const p = document.getElementById("netflixPlayer"), i = p.querySelector('iframe'); if (i) { const s = i.src; i.src = ''; setTimeout(() => { i.src = s; }, 100); } }
function detenerVideo() { document.getElementById("netflixPlayer").innerHTML = ""; }

// ==============================================
// 📥 RECOMENDACIONES
// ==============================================
async function cargarRecomendadas(tmdbId) {
    const c = document.getElementById("recomendadasLista");
    c.innerHTML = "<p style='color:#64748B;font-size:.85rem;text-align:center;padding:.5rem;'>Cargando...</p>";
    if (!tmdbId) { c.innerHTML = "<p style='color:#64748B;font-size:.85rem;text-align:center;padding:.5rem;'>Sin recomendaciones</p>"; return; }
    try {
        const r = await fetch(`${TMDB_BASE}/movie/${tmdbId}/recommendations?language=es-ES&page=1`, opcionesTMDB);
        const d = await r.json();
        c.innerHTML = "";
        if (!d.results || !d.results.length) { c.innerHTML = "<p style='color:#64748B;font-size:.85rem;text-align:center;padding:.5rem;'>No hay recomendaciones</p>"; return; }
        d.results.slice(0, 6).forEach(p => {
            const t = document.createElement("div");
            t.className = "tarjeta-recomendada";
            t.innerHTML = `<img src="${p.poster_path ? 'https://image.tmdb.org/t/p/w154' + p.poster_path : 'https://via.placeholder.com/75x110?text=?'}" alt="${p.title}" class="portada-recomendada" loading="lazy"><p class="texto-recomendada">${p.title}</p>`;
            t.onclick = () => { cerrarVideo(); const comp = contenido.find(c => c.tmdb_id == p.id); if (comp) abrirVideoPelicula(comp); else abrirVideoPelicula({ id: `tmdb_${p.id}`, tmdb_id: p.id, titulo: p.title, anio: p.release_date ? p.release_date.split("-")[0] : "N/D", tipo: "pelicula", categoria: "peliculas", portada: p.poster_path ? 'https://image.tmdb.org/t/p/w154' + p.poster_path : "", sinopsis: p.overview || "Sin sinopsis", puntuacion: p.vote_average ? p.vote_average.toFixed(1) : "N/A", genero: "Película", url: generarEnlaceUnlimplay(p.id, 'pelicula'), opcion2: '', temporadas: [] }); };
            c.appendChild(t);
        });
    } catch (e) { c.innerHTML = "<p style='color:#64748B;font-size:.85rem;text-align:center;padding:.5rem;'>Sin recomendaciones</p>"; }
}

// ==============================================
// 📋 HISTORIAL
// ==============================================
function agregarAlHistorial(item) {
    let h = JSON.parse(localStorage.getItem("historialTely")) || [];
    h = h.filter(x => x.id !== item.id);
    h.unshift({ id: item.id, titulo: item.titulo, tipo: item.tipo || 'serie' });
    if (h.length > 10) h.pop();
    localStorage.setItem("historialTely", JSON.stringify(h));
    mostrarHistorial();
    mostrarRecientes();
}

function mostrarHistorial() {
    const c = document.getElementById("listaHistorial"), h = JSON.parse(localStorage.getItem("historialTely")) || [];
    c.innerHTML = h.length ? "" : `<div class="historial-vacio">Aún no has visto nada</div>`;
    h.forEach(i => { const b = document.createElement("button"); b.innerHTML = `<i class="fa-solid fa-play mr-2"></i> ${i.titulo}`; b.onclick = (e) => { e.stopPropagation(); const f = contenido.find(x => x.id === i.id); if (!f) return; if (auth.currentUser) { abrirVideoPelicula(f); document.getElementById("menuPerfil").classList.remove("mostrar"); menuAbierto = false; } else { videoPendiente = f; abrirModalLogin(); } }; c.appendChild(b); });
}

function mostrarRecientes() {
    const c = document.getElementById("scrollRecientes"), h = JSON.parse(localStorage.getItem("historialTely")) || [];
    if (!h.length) { c.innerHTML = `<p style="color:#64748B;font-size:.85rem;padding:.3rem;">No has visto nada aún</p>`; return; }
    c.innerHTML = "";
    h.slice(0, 10).forEach(item => {
        const f = contenido.find(x => x.id === item.id);
        if (!f) return;
        const t = document.createElement("div");
        t.className = "tarjeta-reciente";
        t.innerHTML = `<img src="${f.portada}" alt="${f.titulo}" class="portada-reciente" loading="lazy" onerror="this.src='https://via.placeholder.com/85x130?text=?'"><div class="info-reciente"><h4>${f.titulo}</h4></div>`;
        t.onclick = (e) => { e.stopPropagation(); if (auth.currentUser) abrirVideoPelicula(f); else { videoPendiente = f; abrirModalLogin(); } };
        c.appendChild(t);
    });
}

function limpiarHistorial() { localStorage.removeItem("historialTely"); mostrarHistorial(); mostrarRecientes(); }
        // ==============================================
// 🔐 AUTENTICACIÓN
// ==============================================
function iniciarConGoogle() {
    const btn = document.getElementById('btnGoogleLogin');
    if (!btn) return;
    const original = btn.innerHTML;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Conectando...';
    btn.disabled = true;
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ 'prompt': 'select_account' });
    auth.signInWithPopup(provider).then((r) => {
        document.getElementById("nombrePerfil").textContent = r.user.displayName || r.user.email || "✅ Sesión iniciada";
        cerrarModalLogin();
        btn.innerHTML = original;
        btn.disabled = false;
        if (videoPendiente) { const t = videoPendiente; videoPendiente = null; abrirVideoPelicula(t); agregarAlHistorial(t); }
        mostrarToast('✅ Sesión iniciada correctamente', 'success');
    }).catch((e) => {
        btn.innerHTML = original;
        btn.disabled = false;
        if (e.code === 'auth/popup-closed-by-user') mostrarToast('⚠️ Cerraste la ventana de Google. Intenta de nuevo.', 'warning');
        else if (e.code === 'auth/popup-blocked') mostrarToast('⛔ Permite popups para este sitio en tu navegador.', 'error');
        else if (e.code === 'auth/unauthorized-domain') mostrarToast('❌ Agrega localhost en Firebase Console > Authentication > Authorized domains', 'error');
        else mostrarToast('❌ Error: ' + e.message, 'error');
    });
}

function iniciarRecaptcha() {
    const c = document.getElementById('recaptcha-container');
    if (c) c.innerHTML = '';
    if (!recaptchaVerifier) { try { recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { size: 'invisible', callback: function() {} }); } catch(e) { console.error(e); } }
}

function enviarCodigo() {
    iniciarRecaptcha();
    const t = document.getElementById("telefonoInput").value.trim();
    if (!t || !t.startsWith("+")) { mostrarToast('⚠️ Agrega código de país ej: +58 412 1234567', 'warning'); return; }
    auth.signInWithPhoneNumber(t, recaptchaVerifier).then(r => { confirmationResult = r; document.getElementById("seccionCodigo").classList.remove("oculto"); mostrarToast('✅ Código enviado', 'success'); }).catch(e => { mostrarToast('❌ Error: ' + e.message, 'error'); });
}

function verificarCodigo() {
    const c = document.getElementById("codigoInput").value.trim();
    if (!c || c.length < 6) { mostrarToast('⚠️ Ingresa el código de 6 dígitos', 'warning'); return; }
    confirmationResult.confirm(c).then(r => { document.getElementById("nombrePerfil").textContent = r.user.phoneNumber || "✅ Sesión iniciada"; cerrarModalLogin(); if (videoPendiente) { abrirVideoPelicula(videoPendiente); agregarAlHistorial(videoPendiente); videoPendiente = null; } mostrarToast('✅ Sesión iniciada', 'success'); }).catch(e => { mostrarToast('❌ Código incorrecto', 'error'); });
}

function cerrarModalLogin() { document.getElementById("modal-login").classList.add("oculto"); videoPendiente = null; }
function cerrarModalLoginSiClickFuera(e) { if (e.target === e.currentTarget) cerrarModalLogin(); }

function toggleMenu() {
    const m = document.getElementById("menuPerfil");
    if (!auth.currentUser) { abrirModalLogin(); return; }
    if (menuAbierto) { m.classList.remove("mostrar"); menuAbierto = false; } else { m.classList.add("mostrar"); menuAbierto = true; mostrarHistorial(); }
}

function abrirModalLogin() { document.getElementById("modal-login").classList.remove("oculto"); if (menuAbierto) { document.getElementById("menuPerfil").classList.remove("mostrar"); menuAbierto = false; } }

function cambiarModo() {
    const body = document.body, icono = document.getElementById("iconoModo");
    if (body.classList.contains("dark")) { body.classList.remove("dark"); icono.className = "fa-solid fa-moon"; localStorage.setItem("modo", "claro"); } else { body.classList.add("dark"); icono.className = "fa-solid fa-sun"; localStorage.setItem("modo", "oscuro"); }
}
if (localStorage.getItem("modo") === "oscuro" || (!localStorage.getItem("modo") && window.matchMedia("(prefers-color-scheme: dark)").matches)) { document.body.classList.add("dark"); document.getElementById("iconoModo").className = "fa-solid fa-sun"; }

function cerrarSesion() {
    auth.signOut().then(() => { document.getElementById("nombrePerfil").textContent = "❌ Sesión cerrada"; videoPendiente = null; document.getElementById("menuPerfil").classList.remove("mostrar"); menuAbierto = false; mostrarToast('✅ Sesión cerrada', 'success'); }).catch(e => { mostrarToast('❌ Error: ' + e.message, 'error'); });
}

// ==============================================
// ⚡ INICIO
// ==============================================
cargarContenidoCompleto();
setTimeout(() => { escucharFirebase(); console.log("🔥 Escuchando Firebase..."); }, 2000);
auth.onAuthStateChanged(user => { document.getElementById("nombrePerfil").textContent = user ? (user.displayName || user.phoneNumber || user.email || "✅ Sesión iniciada") : "❌ Sesión cerrada"; });
window.addEventListener('popstate', function(e) { if (document.getElementById("modal-video").classList.contains("abierto")) { cerrarVideo(); e.preventDefault(); history.pushState(null, '', window.location.href); } });
history.pushState(null, '', window.location.href);
console.log('✅ TELY cargado - Versión 3.0 - Optimizada');
</script>
