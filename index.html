<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TELY 🎬 Películas y Series</title>
    <meta http-equiv="X-Frame-Options" content="ALLOWALL">
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self' data: blob:;
        script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://www.googleapis.com https://api.themoviedb.org;
        style-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdnjs.cloudflare.com;
        font-src 'self' https://cdnjs.cloudflare.com;
        frame-src 'self' https://mixdrop.top https://mixdrop.ag https://*.vidmoly.to https://*.voe.sx;
        media-src 'self' https://mixdrop.top https://mixdrop.ag https://*.vidmoly.to;
        connect-src 'self' https://*.firebaseio.com https://www.googleapis.com https://www.gstatic.com https://api.themoviedb.org;
    ">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        fondoOscuro: '#0F172A',
                        grisOscuro: '#1E293B',
                        grisMedio: '#334155',
                        textoOscuro: '#F8FAFC',
                        acento: '#3B82F6',
                        naranja: '#F59E0B',
                        rojo: '#EF4444',
                        verde: '#10B981'
                    },
                    fontFamily: { sans: ['Segoe UI', 'Roboto', 'Arial', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.2s, color 0.2s; }
        html, body { width: 100%; max-width: 100%; overflow-x: hidden; min-height: 100vh; font-family: sans-serif; }
        body { background: #0F172A; color: #F8FAFC; }

        header { padding: 1.2rem; background: #1E293B; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 100; }
        .logo-contenedor { display: flex; align-items: center; gap: 0.8rem; }
        .logo { height: 48px; width: auto; object-fit: contain; }
        .titulo-app { font-size: 2rem; font-weight: 700; margin: 0; }
        .menu-derecha { display: flex; align-items: center; gap: 1rem; }
        .btn-menu { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #F8FAFC; padding: 0.5rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .btn-menu:hover { background: #334155; }

        .seccion-recientes { padding: 0 1.2rem 1.5rem; margin-top: 1rem; }
        .titulo-seccion { font-size: 1.2rem; font-weight: 700; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
        .etiqueta-new { background: #3B82F6; color: white; padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .lista-recientes, .lista-recomendadas {
            display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 0.8rem;
            scroll-behavior: smooth; scroll-snap-type: x mandatory;
        }
        .lista-recientes::-webkit-scrollbar, .lista-recomendadas::-webkit-scrollbar { height: 6px; }
        .lista-recientes::-webkit-scrollbar-thumb, .lista-recomendadas::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        .tarjeta-recientes, .tarjeta-recomendada {
            flex: 0 0 auto; width: 120px; cursor: pointer; transition: transform 0.2s;
            scroll-snap-align: start;
        }
        .tarjeta-recientes:hover, .tarjeta-recomendada:hover { transform: scale(1.05); }
        .portada-recientes, .portada-recomendada { width: 100%; height: 180px; border-radius: 8px; object-fit: cover; background: #1E293B; }
        .texto-recientes, .texto-recomendada { font-size: 0.85rem; text-align: center; margin-top: 0.5rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #F8FAFC; }

        .pestanas { display: flex; gap: 0.8rem; padding: 1rem 1.2rem; flex-wrap: wrap; }
        .btn-pestana { padding: 0.7rem 1.4rem; border-radius: 9999px; border: none; font-weight: 500; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-pestana.inactiva { background: #334155; color: #CBD5E1; }
        .btn-pestana.activa { background: #3B82F6; color: #FFFFFF; }

        .buscador { display: flex; align-items: center; gap: 0.8rem; padding: 0 1.2rem 1.5rem; flex-wrap: wrap; }
        .input-buscar { flex: 1; min-width: 200px; padding: 0.9rem 1.2rem; border-radius: 9999px; border: 1px solid #334155; background: #1E293B; color: #F8FAFC; font-size: 1rem; outline: none; }
        .input-buscar:focus { border-color: #3B82F6; }
        .btn-buscar { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #94A3B8; padding: 0.5rem; }
        .contador { background: #334155; padding: 0.7rem 1rem; border-radius: 9999px; font-weight: 500; font-size: 0.9rem; color: #CBD5E1; }

        .grid-contenido { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.2rem; padding: 0 1.2rem 2rem; }
        @media (max-width: 480px) { .grid-contenido { grid-template-columns: repeat(2, 1fr); gap: 0.8rem; } }
        .tarjeta { border-radius: 12px; overflow: hidden; background: #1E293B; box-shadow: 0 2px 8px rgba(0,0,0,0.3); cursor: pointer; transition: transform 0.2s; position: relative; }
        .tarjeta:hover { transform: translateY(-4px); }
        .portada { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #1E293B; }
        .etiqueta-anio { position: absolute; top: 0.7rem; left: 0.7rem; background: rgba(0,0,0,0.8); color: #fff; padding: 0.3rem 0.7rem; border-radius: 6px; font-size: 0.85rem; font-weight: 600; }
        .estrella { position: absolute; top: 0.7rem; right: 0.7rem; color: #F59E0B; font-size: 1.3rem; }
        .info-tarjeta { padding: 0.8rem; }
        .info-tarjeta h3 { font-size: 1rem; font-weight: 600; margin-bottom: 0.2rem; line-height: 1.3; color: #F8FAFC; }
        .badge-video { font-size: 0.8rem; color: #10B981; font-weight: 500; }
        .badge-sin-video { font-size: 0.8rem; color: #9CA3AF; font-weight: 500; }

        .pagina-detalle { display: none; position: fixed; inset: 0; background: #0F172A; z-index: 999; overflow-y: auto; }
        .encabezado-detalle { display: flex; justify-content: space-between; align-items: center; padding: 1.2rem; border-bottom: 1px solid #334155; position: sticky; top: 0; background: #1E293B; z-index: 10; }
        .btn-volver { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #F8FAFC; display: flex; align-items: center; }
        .titulo-detalle { font-size: 1.5rem; font-weight: 700; margin: 1rem 0; color: #F8FAFC; }
        .datos-detalle { display: flex; gap: 1rem; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
        .anio-detalle { background: #334155; padding: 0.4rem 0.9rem; border-radius: 20px; font-size: 0.9rem; color: #CBD5E1; }
        .puntuacion { display: flex; align-items: center; gap: 0.4rem; color: #F59E0B; font-weight: 600; }
        .sinopsis { line-height: 1.6; color: #94A3B8; margin-bottom: 2rem; font-size: 1rem; }

        .reproductor-contenedor { 
            width: 100%; 
            background: #000; 
            border-radius: 12px; 
            overflow: hidden; 
            margin-bottom: 1.5rem; 
            position: relative; 
            aspect-ratio: 16/9;
            min-height: 220px;
        }
        .reproductor-contenedor iframe {
            width: 100%; 
            height: 100%; 
            border: none; 
            background: #000;
            allow="autoplay; encrypted-media; picture-in-picture; fullscreen"
            sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-top-navigation-by-user-activation"
            referrerpolicy="no-referrer-when-downgrade"
            loading="lazy"
        }
        .botones-opciones { display: flex; gap: 0.8rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
        .btn-opcion { padding: 0.8rem 1.5rem; border-radius: 8px; border: none; background: #334155; color: #F8FAFC; font-weight: 500; cursor: pointer; transition: 0.2s; }
        .btn-opcion.activo { background: #3B82F6; color: #FFFFFF; }
        .aviso { display: flex; align-items: center; gap: 0.8rem; padding: 0.9rem; background: #78350F; border-radius: 8px; color: #FBBF24; font-size: 0.9rem; margin-bottom: 2rem; }

        .seccion-recomendadas { border-top: 1px solid #334155; padding-top: 1.5rem; margin-top: 1rem; }
        .titulo-recomendadas { font-size: 1.1rem; font-weight: 600; margin-bottom: 1rem; color: #F8FAFC; }

        .menu-perfil { position: relative; }
        .dropdown { position: absolute; right: 0; top: calc(100% + 10px); background: #1E293B; border-radius: 10px; width: 280px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); display: none; z-index: 200; border: 1px solid #334155; overflow: hidden; }
        .dropdown.mostrar { display: block; animation: aparecer 0.2s ease; }
        @keyframes aparecer { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
        .dropdown-header { padding: 1rem; border-bottom: 1px solid #334155; font-weight: 600; color: #F8FAFC; }
        .dropdown-item { display: flex; align-items: center; gap: 0.5rem; width: 100%; padding: 0.9rem 1rem; text-align: left; border: none; background: none; cursor: pointer; font-size: 0.95rem; color: #CBD5E1; transition: all 0.2s; }
        .dropdown-item:hover { background: #334155; color: #F8FAFC; padding-left: 1.2rem; }
        .divisor { height: 1px; background: #334155; margin: 0.5rem 0; }
        .historial-vacio { padding: 1.5rem; text-align: center; color: #9CA3AF; font-size: 0.9rem; }

        .modal-login { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 1rem; backdrop-filter: blur(4px); }
        .contenedor-login { background: #1E293B; border-radius: 16px; padding: 2rem; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #334155; animation: subir 0.3s ease; }
        @keyframes subir { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .oculto { display: none !important; }
    </style>
</head>
<body>
<header>
    <div class="flex justify-between items-center">
        <div class="logo-contenedor">
            <img src="logo.png" alt="Logo TELY" class="logo" loading="lazy" onerror="this.style.display='none'">
            <h1 class="titulo-app">TELY 🎬</h1>
        </div>
        <div class="menu-derecha">
            <button class="btn-menu" onclick="cambiarModo()" title="Cambiar modo"><i class="fa-solid fa-moon" id="iconoModo"></i></button>
            <div class="menu-perfil">
                <button class="btn-menu" onclick="toggleMenu()" title="Perfil"><i class="fa-solid fa-user-circle"></i></button>
                <div class="dropdown" id="menuPerfil">
                    <div class="dropdown-header" id="nombrePerfil">🔑 Acceder a tu cuenta</div>
                    <div class="divisor"></div>
                    <div class="dropdown-header">📺 Visto recientemente</div>
                    <div id="listaHistorial"></div>
                    <div class="divisor"></div>
                    <button class="dropdown-item text-amber-400" onclick="limpiarHistorial()">🗑️ Limpiar historial</button>
                    <button class="dropdown-item text-blue-400" onclick="abrirModalLogin()">🔑 Iniciar sesión</button>
                    <button class="dropdown-item text-red-400" onclick="cerrarSesion()">🚪 Cerrar sesión</button>
                    <button class="dropdown-item text-green-400 oculto" id="btnAdmin" onclick="irAlPanelAdmin()">⚙️ Panel Admin</button>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="seccion-recientes">
    <h2 class="titulo-seccion"><span class="etiqueta-new">NEW</span> Agregados recientemente</h2>
    <div class="lista-recientes" id="listaRecientes"></div>
</div>

<div class="pestanas">
    <button class="btn-pestana activa" onclick="cambiarCategoria('peliculas')">Películas</button>
    <button class="btn-pestana inactiva" onclick="cambiarCategoria('series')">Series</button>
</div>

<div class="buscador">
    <input type="text" class="input-buscar" placeholder="Buscar..." id="buscadorInput">
    <button class="btn-buscar" onclick="buscarContenido()"><i class="fa-solid fa-magnifying-glass"></i></button>
    <div class="contador" id="contadorTotal">0 títulos</div>
</div>

<div class="grid-contenido" id="lista-contenido">
    <div class="col-span-3 text-center py-16 text-gray-400 text-lg">Cargando contenido...</div>
</div>

<div class="pagina-detalle" id="paginaDetalle">
    <div class="encabezado-detalle">
        <button class="btn-volver" onclick="cerrarDetalle()"><i class="fa-solid fa-arrow-left"></i></button>
        <h2 class="font-bold text-lg text-white" id="tituloCabecera"></h2>
        <button class="btn-menu" onclick="cambiarModo()"><i class="fa-solid fa-moon" id="iconoModo2"></i></button>
    </div>
    <div class="contenido-detalle" style="padding: 1.2rem;">
        <h2 class="titulo-detalle" id="tituloDetalle"></h2>
        <div class="datos-detalle">
            <div class="anio-detalle" id="anioDetalle"></div>
            <div class="puntuacion"><i class="fa-solid fa-star"></i> <span id="puntuacionDetalle">7.0</span></div>
            <div class="text-gray-300" id="generoDetalle"></div>
        </div>
        <p class="sinopsis" id="sinopsisDetalle"></p>
        <div id="contenidoReproductor"></div>

        <div class="seccion-recomendadas" id="seccionRecomendadas">
            <h4 class="titulo-recomendadas">🎯 Te podría gustar</h4>
            <div class="lista-recomendadas" id="recomendadasLista"></div>
        </div>
    </div>
</div>

<div id="modal-login" class="modal-login oculto">
    <div class="contenedor-login">
        <h2 class="text-2xl font-bold text-center mb-4 text-white">Iniciar Sesión</h2>
        <p class="text-center text-gray-300 mb-6">Accede para ver todo el contenido</p>
        <button class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium flex items-center justify-center gap-2 mb-4 transition" onclick="iniciarConGoogle()">
            <i class="fa-brands fa-google"></i> Continuar con Google
        </button>
        <div class="mb-4">
            <p class="text-sm text-gray-300 mb-2">O con número de teléfono</p>
            <input type="tel" id="telefonoInput" placeholder="+58 412 1234567" class="w-full p-3 border border-gray-600 rounded-lg mb-2 bg-gray-800 text-white outline-none focus:border-green-500">
            <button class="w-full py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg transition" onclick="enviarCodigo()">Enviar código</button>
        </div>
        <div id="seccionCodigo" class="oculto mb-4">
            <input type="text" id="codigoInput" placeholder="Código de 6 dígitos" class="w-full p-3 border border-gray-600 rounded-lg mb-2 bg-gray-800 text-white outline-none focus:border-green-500">
            <button class="w-full py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg transition" onclick="verificarCodigo()">Verificar</button>
        </div>
        <button class="w-full text-gray-300 hover:text-white mt-4 transition" onclick="cerrarModalLogin()">Cerrar</button>
    </div>
</div>

<!-- Firebase CDN -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script>
// ✅ TU CONFIGURACIÓN FIREBASE NUEVA + PANEL ADMIN
const firebaseConfig = {
  apiKey: "AIzaSyCwLATDpQN1RWv3rLPjJXbNnIBkyo_BUfI",
  authDomain: "tely-ap.firebaseapp.com",
  databaseURL: "https://tely-ap-default-rtdb.firebaseio.com",
  projectId: "tely-ap",
  storageBucket: "tely-ap.firebasestorage.app",
  messagingSenderId: "760862940967",
  appId: "1:760862940967:web:69bbbbfee0de40f68a1302",
  measurementId: "G-1MVRN8QNLG"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ✅ API TMDB - pon aquí tu clave real cuando la tengas
const TMDB_API_KEY = "TU_CLAVE_TMDB_AQUI";
const TMDB_IMG_URL = "https://image.tmdb.org/t/p/w500";

let recaptchaVerifier, confirmationResult, videoPendiente = null, contenido = [], enlaceActual = "";
const ADMIN_UIDS = ["ID_DE_TU_USUARIO_AQUI"]; // Agrega tu UID aquí para ser admin

// ✅ CONTENIDO BASE
const MI_PELICULAS = [
  {
    id: "rambo_001",
    titulo: "Rambo 1",
    anio: "1982",
    tipo: "pelicula",
    categoria: "peliculas",
    tmdb_id: "1370",
    sinopsis: "Un ex soldado de élite regresa a su pueblo natal y se enfrenta a la hostilidad de las autoridades locales.",
    puntuacion: "7.7",
    genero: "Acción / Aventura",
    fecha_agregado: "2026-06-25",
    opciones: [{ nombre: "Mixdrop", url: "https://mixdrop.top/e/nl1k1k66ad8n3z" }]
  }
];

const MI_SERIES = [
  {
    id: "breaking_bad_001",
    titulo: "Breaking Bad",
    anio: "2008",
    tipo: "serie",
    categoria: "series",
    tmdb_id: "1396",
    sinopsis: "Un profesor de química con cáncer empieza a fabricar metanfetamina.",
    puntuacion: "9.2",
    genero: "Drama / Crimen",
    fecha_agregado: "2026-06-21",
    temporadas: [{ numero: 1, capitulos: [{ numero: 1, titulo: "El principio", opciones: [{ nombre: "Mixdrop", url: "https://mixdrop.top/e/ejemplo" }] }] }]
  }
];

// ✅ Funciones TMDB
async function obtenerDatosTMDB(tmdbId, tipo) {
  if (!TMDB_API_KEY || TMDB_API_KEY === "TU_CLAVE_TMDB_AQUI") return null;
  try {
    const res = await fetch(`https://api.themoviedb.org/3/${tipo}/${tmdbId}?api_key=${TMDB_API_KEY}&language=es-ES`);
    return res.ok ? await res.json() : null;
  } catch (err) {
    console.log("Error TMDB:", err);
    return null;
  }
}

// ✅ Cargar todo el contenido
async function cargarTodoContenido() {
  contenido = [...MI_PELICULAS, ...MI_SERIES];
  const admin = await cargarContenidoAdmin();
  if (admin.length) contenido = [...contenido, ...admin];
  contenido.sort((a,b) => new Date(b.fecha_agregado||"1970") - new Date(a.fecha_agregado||"1970"));
  document.getElementById("contadorTotal").textContent = `${contenido.length} títulos`;
  mostrarRecientes();
  mostrarContenido("peliculas");
}

async function cargarContenidoAdmin() {
  try {
    const snap = await db.ref("contenido_admin").once("value");
    return snap.val() ? Object.values(snap.val()) : [];
  } catch { return []; }
}

function mostrarRecientes() {
  const cont = document.getElementById("listaRecientes");
  cont.innerHTML = "";
  contenido.slice(0,6).forEach(async item => {
    let portada = item.portada;
    if (item.tmdb_id && TMDB_API_KEY !== "TU_CLAVE_TMDB_AQUI") {
      const datos = await obtenerDatosTMDB(item.tmdb_id, item.tipo);
      if (datos?.poster_path) portada = TMDB_IMG_URL + datos.poster_path;
    }
    const div = document.createElement("div");
    div.className = "tarjeta-recientes";
    div.innerHTML = `<img src="${portada||'logo.png'}" class="portada-recientes" loading="lazy"><div class="texto-recientes">${item.titulo}</div>`;
    div.onclick = () => auth.currentUser ? abrirDetalle(item) : (videoPendiente = item, abrirModalLogin());
    cont.appendChild(div);
  });
}

function mostrarContenido(cat) {
  const lista = document.getElementById("lista-contenido");
  lista.innerHTML = "";
  const filtrados = contenido.filter(x => x.categoria === cat);
  if (!filtrados.length) { lista.innerHTML = `<p class="col-span-3 text-center text-gray-400 py-16">Sin contenido</p>`; return; }
  filtrados.forEach(async item => {
    let portada = item.portada;
    if (item.tmdb_id && TMDB_API_KEY !== "TU_CLAVE_TMDB_AQUI") {
      const datos = await obtenerDatosTMDB(item.tmdb_id, item.tipo);
      if (datos?.poster_path) portada = TMDB_IMG_URL + datos.poster_path;
    }
    const tiene = item.opciones?.length || item.temporadas?.length;
    const div = document.createElement("div");
    div.className = "tarjeta";
    div.innerHTML = `
      <span class="etiqueta-anio">${item.anio}</span>
      <i class="fa-solid fa-star estrella"></i>
      <img src="${portada||'logo.png'}" class="portada" loading="lazy">
      <div class="info-tarjeta"><h3>${item.titulo}</h3><span class="${tiene?'badge-video':'badge-sin-video'}">${tiene?'▶ Disponible':'🔒 Sin enlace'}</span></div>
    `;
    div.onclick = () => auth.currentUser ? abrirDetalle(item) : (videoPendiente = item, abrirModalLogin());
    lista.appendChild(div);
  });
}

function cambiarModo() {
  const body = document.body;
  const icono = document.getElementById("iconoModo");
  const icono2 = document.getElementById("iconoModo2");
  const activo = body.classList.toggle("dark");
  icono.className = activo ? "fa-solid fa-sun" : "fa-solid fa-moon";
  if (icono2) icono2.className = activo ? "fa-solid fa-sun" : "fa-solid fa-moon";
  localStorage.setItem("modo", activo ? "oscuro" : "claro");
}

if (localStorage.getItem("modo") === "oscuro" || (!localStorage.getItem("modo") && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
  document.body.classList.add("dark");
  document.getElementById("iconoModo").className = "fa-solid fa-sun";
}
function cambiarCategoria(cat) {
  document.querySelectorAll(".btn-pestana").forEach(b => { b.classList.remove("activa"); b.classList.add("inactiva"); });
  event.target.classList.remove("inactiva"); event.target.classList.add("activa"); mostrarContenido(cat);
}

function toggleMenu() { mostrarHistorial(); document.getElementById("menuPerfil").classList.toggle("mostrar"); }
window.onclick = e => { if (!e.target.matches(".btn-menu, .btn-menu *")) document.getElementById("menuPerfil").classList.remove("mostrar"); };

function buscarContenido() {
  const texto = document.getElementById("buscadorInput").value.trim().toLowerCase();
  const res = contenido.filter(x => x.titulo.toLowerCase().includes(texto));
  const lista = document.getElementById("lista-contenido");
  lista.innerHTML = "";
  res.length ? res.forEach(item => {
    const div = document.createElement("div");
    div.className = "tarjeta";
    div.innerHTML = `<span class="etiqueta-anio">${item.anio}</span><i class="fa-solid fa-star estrella"></i><img src="${item.portada||'logo.png'}" class="portada"><div class="info-tarjeta"><h3>${item.titulo}</h3></div>`;
    div.onclick = () => auth.currentUser ? abrirDetalle(item) : (videoPendiente = item, abrirModalLogin());
    lista.appendChild(div);
  }) : lista.innerHTML = `<p class="col-span-3 text-center text-gray-400 py-16">Sin resultados</p>`;
}

function abrirModalLogin() { document.getElementById("modal-login").classList.remove("oculto"); toggleMenu(); }
function cerrarModalLogin() { document.getElementById("modal-login").classList.add("oculto"); videoPendiente = null; }

// ✅ Inicio de sesión Google
function iniciarConGoogle() {
  if (window.location.protocol === "file:") { alert("❌ Súbelo a Vercel primero"); return; }
  const prov = new firebase.auth.GoogleAuthProvider();
  prov.setCustomParameters({ prompt: "select_account" });
  auth.signInWithPopup(prov)
    .then(res => {
      document.getElementById("nombrePerfil").textContent = `👤 ${res.user.displayName || res.user.email}`;
      cerrarModalLogin();
      if (ADMIN_UIDS.includes(res.user.uid)) document.getElementById("btnAdmin").classList.remove("oculto");
      if (videoPendiente) abrirDetalle(videoPendiente);
    })
    .catch(err => {
      if (err.code === "auth/unauthorized-domain") alert("❌ Agrega dominios en Firebase");
      else alert(`❌ Error: ${err.message}`);
    });
}

// ✅ Inicio de sesión por teléfono
function enviarCodigo() {
  const tel = document.getElementById("telefonoInput").value.trim();
  if (!tel) return alert("Ingresa tu número con código +58");
  if (!recaptchaVerifier) recaptchaVerifier = new firebase.auth.RecaptchaVerifier("telefonoInput", { size: "invisible" });
  auth.signInWithPhoneNumber(tel, recaptchaVerifier)
    .then(res => {
      confirmationResult = res;
      document.getElementById("seccionCodigo").classList.remove("oculto");
      alert("Código enviado al teléfono");
    })
    .catch(err => alert(`Error: ${err.message}`));
}

function verificarCodigo() {
  const cod = document.getElementById("codigoInput").value.trim();
  if (!cod) return alert("Escribe el código");
  confirmationResult.confirm(cod)
    .then(res => {
      document.getElementById("nombrePerfil").textContent = `👤 ${res.user.phoneNumber}`;
      cerrarModalLogin();
      if (ADMIN_UIDS.includes(res.user.uid)) document.getElementById("btnAdmin").classList.remove("oculto");
    })
    .catch(err => alert("Código incorrecto"));
}

function abrirDetalle(item) {
  document.getElementById("tituloDetalle").textContent = `${item.titulo} (${item.anio})`;
  document.getElementById("tituloCabecera").textContent = item.titulo;
  document.getElementById("anioDetalle").textContent = item.anio;
  document.getElementById("puntuacionDetalle").textContent = item.puntuacion;
  document.getElementById("generoDetalle").textContent = item.genero;
  document.getElementById("sinopsisDetalle").textContent = item.sinopsis;

  const cont = document.getElementById("contenidoReproductor");
  cont.innerHTML = "";
  if (item.tipo === "pelicula" && item.opciones?.length) {
    let html = `<div class="reproductor-contenedor"><iframe src="${item.opciones[0].url}" allowfullscreen></iframe></div><div class="botones-opciones">`;
    item.opciones.forEach((o,i) => html += `<button class="btn-opcion ${i===0?'activo':''}" onclick="cambiarFuente('${o.url}', this)">${o.nombre}</button>`);
    html += `</div>`;
    cont.innerHTML = html;
  } else {
    cont.innerHTML = `<p class="text-center py-16 text-gray-400">Sin enlaces disponibles</p>`;
  }

  document.getElementById("paginaDetalle").style.display = "block";
  document.body.style.overflow = "hidden";
  agregarAlHistorial(item);
}

function cambiarFuente(url, btn) {
  document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo"));
  btn.classList.add("activo");
  document.querySelector("#reproductorPrincipal iframe").src = url;
}

function cerrarDetalle() {
  document.getElementById("paginaDetalle").style.display = "none";
  document.body.style.overflow = "auto";
}

function agregarAlHistorial(item) {
  let h = JSON.parse(localStorage.getItem("historialTely")) || [];
  h = h.filter(x => x.id !== item.id);
  h.unshift({ id: item.id, titulo: item.titulo });
  if (h.length > 10) h.pop();
  localStorage.setItem("historialTely", JSON.stringify(h));
  mostrarHistorial();
}

function mostrarHistorial() {
  const c = document.getElementById("listaHistorial");
  const h = JSON.parse(localStorage.getItem("historialTely")) || [];
  c.innerHTML = h.length ? "" : `<div class="historial-vacio">Aún no has visto nada</div>`;
  h.forEach(i => {
    const btn = document.createElement("button");
    btn.className = "dropdown-item";
    btn.innerHTML = `<i class="fa-solid fa-play mr-2"></i> ${i.titulo}`;
    btn.onclick = () => abrirDetalle(contenido.find(x => x.id === i.id));
    c.appendChild(btn);
  });
}

function limpiarHistorial() { localStorage.removeItem("historialTely"); mostrarHistorial(); }

function cerrarSesion() {
  auth.signOut().then(() => {
    document.getElementById("nombrePerfil").textContent = "🔑 Acceder a tu cuenta";
    document.getElementById("btnAdmin").classList.add("oculto");
    localStorage.removeItem("historialTely");
    mostrarHistorial();
    document.getElementById("menuPerfil").classList.remove("mostrar");
  });
}

function irAlPanelAdmin() { window.location.href = "/admin.html"; }

auth.onAuthStateChanged(usuario => {
  if (usuario && ADMIN_UIDS.includes(usuario.uid)) document.getElementById("btnAdmin").classList.remove("oculto");
  cargarTodoContenido();
});
</script>
</body>
</html>
