<header>

        </div>
        <div class="menu-derecha">
            <button class="btn-menu" onclick="cambiarModo()"><i class="fa-solid fa-moon" id="iconoModo"></i></button>
            <div class="menu-perfil">

                    <div class="dropdown-header" id="nombrePerfil">👤 Acceder</div>
                    <div class="dropdown-header" style="font-size:.75rem;color:#64748B;border-top:1px solid rgba(124,58,237,.08);">📺 Visto recientemente</div>

                    <button onclick="limpiarHistorial()" style="color:#F59E0B;font-size:.85rem;"><i class="fa-solid fa-trash"></i> Limpiar historial</button>
                    <button onclick="cerrarSesion()" style="color:#EF4444;font-size:.85rem;border-top:1px solid rgba(124,58,237,.08);margin-top:.2rem;padding-top:.5rem;"><i class="fa-solid fa-sign-out"></i> Cerrar sesión</button>
                </div>
            </div>
        </div>
    </div>
</header>

<div class="sticky-bar">
    <div class="pestanas" id="pestanasContainer">
        <button class="btn-pestana activa" data-categoria="estrenos" onclick="cambiarCategoria('estrenos')">🏠 Inicio</button>
        <button class="btn-pestana inactiva" data-categoria="peliculas" onclick="cambiarCategoria('peliculas')">🎬 Películas</button>
        <button class="btn-pestana inactiva" data-categoria="series" onclick="cambiarCategoria('series')">📺 Series</button>
    </div>
    <div class="buscador-contenedor">

        <div class="sugerencias-container" id="sugerenciasContainer">
            <div id="sugerenciasLista"></div>
        </div>
    </div>
</div><div class="contenido-scroll">

const PROXY_URL = "https://tely-xi.vercel.app/api/tmdb";

async function fetchTMDB(path, params = {}) {
    const queryParams = new URLSearchParams();
    queryParams.append('path', path);
    Object.keys(params).forEach(key => queryParams.append(key, params[key]));
    const url = `${PROXY_URL}?${queryParams.toString()}`;
    console.log('🔄 Proxy request:', url);
    const response = await fetch(url);
    if (!response.ok) throw new Error(`Proxy error: ${response.status}`);
    return response.json();
}

function getImagenUrl(path, size = 'w92') {
    if (!path) return 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg';
    return `https://image.tmdb.org/t/p/${size}${path}`;
}

function generarEnlaceMultiplataforma(tmdb_id, tipo, plataforma, temporada = 1, capitulo = 1) {
    const plataformas = {
        'unlimplay': {
            pelicula: (id) => `https://unlimplay.com/play/embed/movie/${id}?lang=es-MX&autoplay=1&controls=1&logo=0`,
            serie: (id, t, c) => `https://unlimplay.com/play/embed/tv/${id}/${t}/${c}?lang=es-MX&autoplay=1&controls=1&logo=0`
        },
        'vidsrc': {
            pelicula: (id) => `https://vidsrc.in/embed/movie/${id}?lang=es`,
            serie: (id, t, c) => `https://vidsrc.in/embed/tv/${id}/${t}/${c}?lang=es`
        },
        'vidmoly': {
            pelicula: (id) => `https://vidmoly.to/embed/movie/${id}`,
            serie: (id, t, c) => `https://vidmoly.to/embed/tv/${id}/${t}/${c}`
        },
        'embed': {
            pelicula: (id) => `https://embed.su/embed/movie/${id}`,
            serie: (id, t, c) => `https://embed.su/embed/tv/${id}/${t}/${c}`
        },
        '2embed': {
            pelicula: (id) => `https://www.2embed.to/embed/tmdb/movie?id=${id}`,
            serie: (id, t, c) => `https://www.2embed.to/embed/tmdb/tv?id=${id}&s=${t}&e=${c}`
        }
    };
    const plat = plataformas[plataforma] || plataformas['unlimplay'];
    if (tipo === 'pelicula') return plat.pelicula(tmdb_id);
    else return plat.serie(tmdb_id, temporada, capitulo);
}

async function cargarContenidoAdmin() {
    try {
        const [p, s] = await Promise.all([
            db.ref("contenido_personalizado").once("value"),
            db.ref("series_personalizadas").once("value")
        ]);
        const pelis = p.val() ? Object.values(p.val()) : [];
        const series = s.val() ? Object.values(s.val()) : [];
        const pf = pelis.map(p => ({ ...p, tipo: 'pelicula', opcion2: p.opcion2 || '', plataforma2: p.plataforma2 || 'vidsrc' }));
        const sf = series.map(s => {
            const temps = s.temporadas ? s.temporadas.map(t => ({
                ...t,
                capitulos: t.capitulos ? t.capitulos.map(c => ({ ...c, opcion2: c.opcion2 || s.opcion2 || '', plataforma2: c.plataforma2 || s.plataforma2 || 'vidsrc', sinopsis: c.sinopsis || '' })) : []
            })) : [];
            return { ...s, tipo: 'serie', opcion2: s.opcion2 || '', plataforma2: s.plataforma2 || 'vidsrc', temporadas: temps };
        });
        return [...pf, ...sf];
    } catch (e) { console.error("Error cargando desde Firebase:", e); return []; }
}

function escucharFirebase() {
    db.ref("contenido_personalizado").on("value", () => recargarContenido());

function iniciarCarrusel(trackId, items) {
    const track = document.getElementById(trackId);
    if (!track) return;
    track.innerHTML = "";
    if (!items || !items.length) { 
        const s = track.closest('.seccion-populares'); 
        if (s) s.style.display = 'none'; 
        return; 
    }
    items.forEach(i => {
        const d = document.createElement("div");
        d.className = "carrusel-item";
        d.innerHTML = `<span class="badge-tipo">🎬</span><img src="${i.portada}" alt="${i.titulo}" class="portada-popular" loading="eager" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg';this.onerror=null;"><div class="info-popular"><h4>${i.titulo}</h4></div>`;
        d.onclick = () => { auth.currentUser ? abrirVideoPelicula(i) : (videoPendiente = i, abrirModalLogin()); };
        track.appendChild(d);
    });
    const clones = items.slice(0, 5);
    clones.forEach(i => {
        const d = document.createElement("div");
        d.className = "carrusel-item";
        d.innerHTML = `<span class="badge-tipo">🎬</span><img src="${i.portada}" alt="${i.titulo}" class="portada-popular" loading="eager" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg';this.onerror=null;"><div class="info-popular"><h4>${i.titulo}</h4></div>`;
        d.onclick = () => { auth.currentUser ? abrirVideoPelicula(i) : (videoPendiente = i, abrirModalLogin()); };
        track.appendChild(d);
    });
    const w = track.closest('.carrusel-wrapper');
    if (!w) return;
    let idx = 0;
    if (carruselInterval) clearInterval(carruselInterval);
    carruselInterval = setInterval(() => {
        const total = track.children.length;
        if (!total) return;
        idx++;
        if (idx >= total - 5) { idx = 0; w.scrollTo({ left: 0, behavior: 'smooth' }); } else { w.scrollTo({ left: idx * 146, behavior: 'smooth' }); }
    }, 4000);
}

function mostrarContenido(categoria) {
    categoriaActual = categoria;
    const lista = document.getElementById("lista-contenido");
    lista.innerHTML = "";
    paginaActual = 1;
    hayMasParaCargar = true;
    totalMostrados = 0;
    
    let filtrados = [];
    if (categoria === 'estrenos') filtrados = contenido;
    else if (categoria === 'peliculas') filtrados = contenido.filter(i => i.tipo === 'pelicula' || i.categoria === 'peliculas');
    else if (categoria === 'series') filtrados = contenido.filter(i => i.tipo === 'serie' || i.categoria === 'series');
    
    window._filtradosActuales = filtrados;
    const mostrar = filtrados.slice(0, ITEMS_POR_PAGINA);
    totalMostrados = mostrar.length;
    
    if (!mostrar.length) { 
        lista.innerHTML = `<div class="col-span-3 text-center py-6" style="color:#64748B;font-size:1rem;">No hay contenido en <strong style="color:#A78BFA;">${categoria}</strong></div>`; 
        document.getElementById("contadorTotal").textContent = filtrados.length;
        document.getElementById('contenedorCargarMas').style.display = 'none';
        return; 
    }
    
    mostrar.forEach(i => {
        const t = document.createElement("div");
        t.className = "tarjeta";
        t.innerHTML = `
            <span class="etiqueta-anio">${i.anio}</span>
            <i class="fa-solid fa-star estrella"></i>
            <img src="${i.portada}" alt="${i.titulo}" class="portada" loading="eager" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg';this.onerror=null;">
            <div class="info-tarjeta">
                <h3>${i.titulo}</h3>
                <div class="badges">
                    ${i.tipo === 'serie' ? ' <span class="badge-serie">📺 Serie</span>' : ' <span class="badge-video">🎬 Película</span>'}
                    ${i.adminId ? ' <span class="badge-firebase">☁️</span>' : ''}
                </div>
            </div>
        `;
        t.onclick = () => {
            if (auth.currentUser) abrirVideoPelicula(i);
            else { videoPendiente = i; abrirModalLogin(); }
        };
        lista.appendChild(t);
    });
    
    document.getElementById("contadorTotal").textContent = filtrados.length;
    
    const btnContainer = document.getElementById('contenedorCargarMas');
    const btn = document.getElementById('btnCargarMas');
    if (filtrados.length > ITEMS_POR_PAGINA) {
        btnContainer.style.display = 'flex';
        btn.disabled = false;
        btn.innerHTML = `<i class="fa-solid fa-plus"></i> Cargar 20 más (${filtrados.length - totalMostrados} restantes)`;
        hayMasParaCargar = true;
    } else {
        btnContainer.style.display = 'none';
        hayMasParaCargar = false;
    }
}

function cambiarCategoria(cat) {
    document.querySelectorAll(".btn-pestana").forEach(b => { 
        b.classList.remove("activa"); b.classList.add("inactiva"); 
    });
    document.querySelectorAll(".btn-pestana").forEach(b => { 
        const t = b.textContent.toLowerCase(); 
        if ((cat === 'estrenos' && t.includes('🏠')) || 
            (cat === 'peliculas' && t.includes('🎬')) || 
            (cat === 'series' && t.includes('📺'))) { 
            b.classList.remove("inactiva"); b.classList.add('activa'); 
        } 
    });
    modoBusqueda = false;
    document.getElementById("buscadorInput").value = '';
    ocultarSugerencias();
    mostrarContenido(cat);
}// ==============================================
// 🔍 BÚSQUEDA CON SUGERENCIAS
// ==============================================
function mostrarSugerencias(texto) {
    const container = document.getElementById("sugerenciasContainer");
    const lista = document.getElementById("sugerenciasLista");
    if (!texto || texto.length < 2) { container.classList.remove("mostrar"); return; }
    const resultados = contenido.filter(i => i.titulo.toLowerCase().includes(texto.toLowerCase())).slice(0, 8);
    if (!resultados.length) {
        lista.innerHTML = `<div class="sugerencia-vacio">No se encontraron resultados</div>`;
        container.classList.add("mostrar"); return;
    }
    lista.innerHTML = "";
    resultados.forEach(i => {
        const div = document.createElement("div");
        div.className = "sugerencia-item";
        const tieneCaps = i.temporadas ? i.temporadas.reduce((sum, t) => sum + (t.capitulos ? t.capitulos.length : 0), 0) : 0;
        div.innerHTML = `
            <img src="${i.portada}" alt="${i.titulo}" loading="eager" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg';this.onerror=null;">
            <div class="info">
                <div class="titulo">${i.titulo}</div>
                <div class="detalle">${i.anio || 'N/D'} • ${i.tipo === 'serie' ? '📺 Serie' : '🎬 Película'}${i.tipo === 'serie' && tieneCaps ? ` • ${tieneCaps} capítulos` : ''}</div>
            </div>
            <span class="badge-tipo-sug">${i.tipo === 'serie' ? '📺' : '🎬'}</span>
        `;
        div.onmousedown = (e) => {
            e.preventDefault();
            document.getElementById("buscadorInput").value = i.titulo;
            ocultarSugerencias();
            if (auth.currentUser) abrirVideoPelicula(i);
            else { videoPendiente = i; abrirModalLogin(); }
        };
        lista.appendChild(div);
    });
    container.classList.add("mostrar");
}

function ocultarSugerencias() {
    document.getElementById("sugerenciasContainer").classList.remove("mostrar");
}

async function buscarContenido() {
    const texto = document.getElementById("buscadorInput").value.trim();
    if (!texto) { modoBusqueda = false; mostrarContenido(categoriaActual || 'estrenos'); return; }
    modoBusqueda = true;
    const lista = document.getElementById("lista-contenido");
    lista.innerHTML = '<div class="col-span-3 text-center py-6" style="color:#64748B;font-size:1rem;"><i class="fa-solid fa-spinner fa-spin"></i> Buscando...</div>';
    ocultarSugerencias();
    try {
        const [d1, d2] = await Promise.all([
            fetchTMDB('search/movie', { query: texto, page: 1 }).catch(() => null),
            fetchTMDB('search/tv', { query: texto, page: 1 }).catch(() => null)
        ]);
        let resultados = [];
        if (d1 && d1.results) {
            const pelis = (d1.results || []).slice(0, 10).map(p => ({ 
                id: `tmdb_${p.id}`, tmdb_id: p.id, titulo: p.title || "Sin título", 
                anio: p.release_date ? p.release_date.split("-")[0] : "N/D", tipo: "pelicula", categoria: "peliculas", 
                portada: getImagenUrl(p.poster_path, 'w92'), sinopsis: p.overview || "Sin sinopsis", 
                puntuacion: p.vote_average ? p.vote_average.toFixed(1) : "N/A", genero: "Película", 
                url: generarEnlaceMultiplataforma(p.id, 'pelicula', 'unlimplay'),
                opcion2: generarEnlaceMultiplataforma(p.id, 'pelicula', 'vidsrc'),
                plataforma2: 'vidsrc'
            }));
            resultados = [...resultados, ...pelis];
        }
        if (d2 && d2.results) {
            const series = (d2.results || []).slice(0, 10).map(s => ({ 
                id: `tmdb_${s.id}`, tmdb_id: s.id, titulo: s.name || "Sin título", 
                anio: s.first_air_date ? s.first_air_date.split("-")[0] : "N/D", tipo: "serie", categoria: "series", 
                portada: getImagenUrl(s.poster_path, 'w92'), sinopsis: s.overview || "Sin sinopsis", 
                puntuacion: s.vote_average ? s.vote_average.toFixed(1) : "N/A", genero: "Serie", 
                temporadas: [{ numero: 1, capitulos: Array.from({length: 10}, (_, i) => ({ 
                    numero: i+1, titulo: `Capítulo ${i+1}`,
                    sinopsis: `Sinopsis del capítulo ${i+1}`,
                    url: generarEnlaceMultiplataforma(s.id, 'serie', 'unlimplay', 1, i+1),
                    opcion2: generarEnlaceMultiplataforma(s.id, 'serie', 'vidsrc', 1, i+1),
                    plataforma2: 'vidsrc'
                })) }] 
            }));
            resultados = [...resultados, ...series];
        }
        if (resultados.length === 0) {
            resultados = DATOS_RESPALDO
                .filter(p => p.titulo.toLowerCase().includes(texto.toLowerCase()))
                .slice(0, 10)
                .map(p => ({ ...p, id: `backup_${p.tmdb_id}`, opcion2: p.opcion2 || '', plataforma2: p.plataforma2 || 'vidsrc' }));
        }
        if (!resultados.length) { 
            lista.innerHTML = `<div class="col-span-3 text-center py-6"><p style="color:#64748B;font-size:1rem;">No se encontraron resultados para "<strong style="color:#fff;">${texto}</strong>"</p><button class="btn-cargar-mas mt-3" onclick="limpiarBusqueda()" style="padding:.4rem 1.2rem;font-size:.9rem;background:rgba(124,58,237,.15);color:#fff;border-radius:9999px;border:2px solid rgba(124,58,237,.2);cursor:pointer;"><i class="fa-solid fa-arrow-left"></i> Volver</button></div>`; 
            return; 
        }
        document.getElementById("contadorTotal").textContent = resultados.length;
        lista.innerHTML = "";
        resultados.forEach(i => { 
            const t = document.createElement("div"); 
            t.className = "tarjeta"; 
            t.innerHTML = `<span class="etiqueta-anio">${i.anio}</span><i class="fa-solid fa-star estrella"></i><img src="${i.portada}" alt="${i.titulo}" class="portada" loading="eager" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg';this.onerror=null;"><div class="info-tarjeta"><h3>${i.titulo}</h3><div class="badges">${i.tipo === 'serie' ? ' <span class="badge-serie">📺 Serie</span>' : ' <span class="badge-video">🎬 Película</span>'}</div></div>`; 
            t.onclick = () => { auth.currentUser ? abrirVideoPelicula(i) : (videoPendiente = i, abrirModalLogin()); }; 
            lista.appendChild(t); 
        });
    } catch (e) { 
        console.error(e);
        const resultados = DATOS_RESPALDO
            .filter(p => p.titulo.toLowerCase().includes(texto.toLowerCase()))
            .slice(0, 10)
            .map(p => ({ ...p, id: `backup_${p.tmdb_id}`, opcion2: p.opcion2 || '', plataforma2: p.plataforma2 || 'vidsrc' }));
        if (resultados.length > 0) {
            document.getElementById("contadorTotal").textContent = resultados.length;
            lista.innerHTML = "";
            resultados.forEach(i => { 
                const t = document.createElement("div"); 
                t.className = "tarjeta"; 
                t.innerHTML = `<span class="etiqueta-anio">${i.anio}</span><i class="fa-solid fa-star estrella"></i><img src="${i.portada}" alt="${i.titulo}" class="portada" loading="eager" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg';this.onerror=null;"><div class="info-tarjeta"><h3>${i.titulo}</h3><div class="badges">${i.tipo === 'serie' ? ' <span class="badge-serie">📺 Serie</span>' : ' <span class="badge-video">🎬 Película</span>'}</div></div>`; 
                t.onclick = () => { auth.currentUser ? abrirVideoPelicula(i) : (videoPendiente = i, abrirModalLogin()); }; 
                lista.appendChild(t); 
            });
        } else {
            lista.innerHTML = `<div class="col-span-3 text-center py-6" style="color:#EF4444;font-size:1rem;">❌ Error al buscar</div>`; 
        }
    }
}

function limpiarBusqueda() { 
    document.getElementById("buscadorInput").value = ''; 
    modoBusqueda = false; 
    ocultarSugerencias();
    mostrarContenido(categoriaActual || 'estrenos'); 
}// ==============================================
// 📜 SCROLL INFINITO
// ==============================================
function iniciarScrollInfinito() {
    const observador = document.getElementById("observador-scroll");
    if (!observador) return;
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting && !cargandoMas && hayMasParaCargar && !modoBusqueda) {
                cargarMasContenido();
            }
        });
    }, { threshold: 0.1, rootMargin: '100px' });
    observer.observe(observador);
}

async function cargarMasContenido() {
    if (cargandoMas || modoBusqueda) return;
    cargandoMas = true;
    const btn = document.getElementById('btnCargarMas');
    const obs = document.getElementById("observador-scroll");
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Cargando 20...';
    btn.disabled = true;
    obs.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Cargando 20 más...';
    obs.style.display = 'block';
    try {
        const filtrados = window._filtradosActuales || contenido;
        const total = filtrados.length;
        const actual = totalMostrados;
        const siguientes = filtrados.slice(actual, actual + ITEMS_POR_PAGINA);
        if (!siguientes.length) {
            hayMasParaCargar = false;
            btn.innerHTML = '✅ No hay más contenido';
            btn.disabled = true;
            obs.innerHTML = '✅ No hay más contenido';
            obs.style.display = 'block';
            cargandoMas = false;
            return;
        }
        const lista = document.getElementById("lista-contenido");
        siguientes.forEach(i => {
            const t = document.createElement("div");
            t.className = "tarjeta";
            t.innerHTML = `
                <span class="etiqueta-anio">${i.anio}</span>
                <i class="fa-solid fa-star estrella"></i>
                <img src="${i.portada}" alt="${i.titulo}" class="portada" loading="eager" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg';this.onerror=null;">
                <div class="info-tarjeta">
                    <h3>${i.titulo}</h3>
                    <div class="badges">
                        ${i.tipo === 'serie' ? ' <span class="badge-serie">📺 Serie</span>' : ' <span class="badge-video">🎬 Película</span>'}
                        ${i.adminId ? ' <span class="badge-firebase">☁️</span>' : ''}
                    </div>
                </div>
            `;
            t.onclick = () => {
                if (auth.currentUser) abrirVideoPelicula(i);
                else { videoPendiente = i; abrirModalLogin(); }
            };
            lista.appendChild(t);
        });
        totalMostrados += siguientes.length;
        const restantes = total - totalMostrados;
        if (restantes > 0) {
            btn.innerHTML = `<i class="fa-solid fa-plus"></i> Cargar 20 más (${restantes} restantes)`;
            btn.disabled = false;
            obs.innerHTML = '<i class="fa-solid fa-spinner"></i> Cargando 20 más...';
            obs.style.display = 'block';
            hayMasParaCargar = true;
        } else {
            hayMasParaCargar = false;
            btn.innerHTML = '✅ No hay más contenido';
            btn.disabled = true;
            obs.innerHTML = '✅ No hay más contenido';
            obs.style.display = 'block';
        }
    } catch (e) { 
        console.error(e);
        btn.innerHTML = '<i class="fa-solid fa-plus"></i> Cargar 20 más';
        btn.disabled = false;
        obs.innerHTML = '❌ Error al cargar más';
        obs.style.display = 'block';
    }
    cargandoMas = false;
}

function abrirVideoPelicula(peli) {
    opcionActivaActual = 1;
    if (peli.tipo === 'serie' && (!peli.temporadas || !peli.temporadas.length) && peli.tmdb_id) {
        const adminItem = contenido.find(c => c.tmdb_id == peli.tmdb_id && c.tipo === 'serie');
        if (adminItem && adminItem.temporadas && adminItem.temporadas.length) {
            peli.temporadas = adminItem.temporadas;
        } else {
            const caps = [];
            for (let i = 1; i <= 10; i++) {
                caps.push({ 
                    numero: i, titulo: `Capítulo ${i}`,
                    sinopsis: `Sinopsis del capítulo ${i}`,
                    url: generarEnlaceMultiplataforma(peli.tmdb_id, 'serie', 'unlimplay', 1, i),
                    opcion2: generarEnlaceMultiplataforma(peli.tmdb_id, 'serie', 'vidsrc', 1, i),
                    plataforma2: 'vidsrc'
                });
            }
            peli.temporadas = [{ numero: 1, nombre: "Temporada 1", capitulos: caps }];
        }
    }
    if (peli.tipo === 'serie' && peli.temporadas && peli.temporadas.length) {
        const adminItem = contenido.find(c => c.tmdb_id == peli.tmdb_id && c.tipo === 'serie');
        if (adminItem && adminItem.temporadas && adminItem.temporadas.length) peli.temporadas = adminItem.temporadas;
    }
    if (peli.tipo === 'pelicula' && !peli.url && peli.tmdb_id) {
        peli.url = generarEnlaceMultiplataforma(peli.tmdb_id, 'pelicula', 'unlimplay');
        peli.opcion2 = generarEnlaceMultiplataforma(peli.tmdb_id, 'pelicula', 'vidsrc');
        peli.plataforma2 = 'vidsrc';
    }
    abrirReproductor(peli);
}function abrirReproductor(peli) {
    detenerVideo();
    const modal = document.getElementById("modal-video"), player = document.getElementById("netflixPlayer"), botones = document.getElementById("botonesOpciones"), container = document.getElementById("capitulosContainer");
    peliculaActual = peli;
    modal.classList.add("abierto");
    document.body.style.overflow = "hidden";
    document.getElementById("tituloReproductor").textContent = peli.titulo;
    document.getElementById("anioPanel").textContent = peli.anio || "2024";
    document.getElementById("ratingPanel").textContent = peli.puntuacion || "7.0";
    document.getElementById("generoPanel").textContent = peli.genero || (peli.tipo === "pelicula" ? "Película" : "Serie");
    document.getElementById("sinopsisPanel").textContent = peli.sinopsis || "Sin sinopsis";
    document.getElementById("tipoPanel").textContent = peli.tipo === 'serie' ? '📺 Serie' : '🎬 Película';
    document.getElementById("tipoPanel").style.color = peli.tipo === 'serie' ? '#10B981' : '#A78BFA';
    botones.innerHTML = "";
    container.classList.add("oculto");
    document.getElementById("capitulosLista").innerHTML = "";
    tempActualIndex = 0;
    temporadasActuales = [];
    opcionActivaActual = 1;
    
    // --- PELÍCULAS ---
    if (peli.tipo !== 'serie') {
        const t1 = peli.url && peli.url.trim();
        const t2 = peli.opcion2 && peli.opcion2.trim();
        
        const b1 = document.createElement("button");
        b1.className = "btn-opcion activo";
        b1.innerHTML = `<i class="fa-solid fa-play mr-1"></i> Opción 1`;
        b1.onclick = function() { 
            document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo")); 
            this.classList.add("activo"); 
            opcionActivaActual = 1;
            if (t1) reproducirOpcion(peli.url); 
        };
        if (t1) { 
            botones.appendChild(b1); 
        } else { 
            b1.className = "btn-opcion sin-enlace"; 
            b1.innerHTML = `<i class="fa-solid fa-link-slash mr-1"></i> Opción 1 (Sin enlace)`;
            b1.onclick = function() { alert("❌ No hay enlace disponible"); };
            botones.appendChild(b1); 
        }
        
        const b2 = document.createElement("button");
        b2.className = "btn-opcion";
        b2.innerHTML = `<i class="fa-solid fa-play mr-1"></i> Opción 2`;
        b2.onclick = function() { 
            document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo")); 
            this.classList.add("activo"); 
            opcionActivaActual = 2;
            if (t2) reproducirOpcion(peli.opcion2); 
        };
        if (t2) { 
            botones.appendChild(b2); 
        } else { 
            b2.className = "btn-opcion sin-enlace"; 
            b2.innerHTML = `<i class="fa-solid fa-link-slash mr-1"></i> Opción 2 (Sin enlace)`;
            b2.onclick = function() { alert("❌ No hay enlace alternativo disponible"); };
            botones.appendChild(b2); 
        }
        
        // Nueva ventana - usa la opción activa
        const b3 = document.createElement("button");
        b3.className = "btn-opcion btn-nueva-ventana";
        b3.innerHTML = `<i class="fa-solid fa-external-link-alt mr-1"></i> Abrir en nueva ventana`;
        b3.onclick = function() { 
            const u = opcionActivaActual === 1 ? peli.url : peli.opcion2;
            if (u) { 
                window.open(u, '_blank'); 
            } else { 
                alert("❌ No hay enlace disponible para esta opción"); 
            }
        };
        if (t1 || t2) botones.appendChild(b3);
        
        if (t1) {
            reproducirOpcion(peli.url);
        } else if (t2) {
            reproducirOpcion(peli.opcion2);
            document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo"));
            if (b2) b2.classList.add("activo");
            opcionActivaActual = 2;
        } else {
            player.innerHTML = `<div style="color:#EF4444;text-align:center;padding:3rem;font-size:1rem;"><i class="fa-solid fa-link" style="font-size:2.5rem;display:block;margin-bottom:.5rem;"></i>No hay enlaces disponibles</div>`;
        }
        agregarAlHistorial(peli);
        cargarRecomendadas(peli.tmdb_id);
        return;
    }
    
    // --- SERIES con capítulos en lista vertical y sinopsis ---
    if (peli.tipo === 'serie' && peli.temporadas && peli.temporadas.length) {
        container.classList.remove("oculto");
        temporadasActuales = peli.temporadas;
        mostrarTemporadaLista(0);
        const pc = obtenerPrimerCapitulo(0);
        
        const b1 = document.createElement("button");
        b1.className = "btn-opcion activo";
        b1.innerHTML = `<i class="fa-solid fa-play mr-1"></i> Opción 1`;
        b1.onclick = function() { 
            document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo")); 
            this.classList.add("activo"); 
            opcionActivaActual = 1;
            if (pc?.url) reproducirOpcion(pc.url); 
        };
        botones.appendChild(b1);
        
        const b2 = document.createElement("button");
        b2.className = "btn-opcion";
        b2.innerHTML = `<i class="fa-solid fa-play mr-1"></i> Opción 2`;
        b2.onclick = function() { 
            document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo")); 
            this.classList.add("activo"); 
            opcionActivaActual = 2;
            if (pc?.opcion2) reproducirOpcion(pc.opcion2); 
        };
        if (pc?.opcion2 && pc.opcion2.trim() !== '') {
            botones.appendChild(b2);
        } else {
            b2.className = "btn-opcion sin-enlace";
            b2.innerHTML = `<i class="fa-solid fa-link-slash mr-1"></i> Opción 2 (Sin enlace)`;
            b2.onclick = function() { alert("❌ No hay enlace alternativo disponible"); };
            botones.appendChild(b2);
        }
        
        const b3 = document.createElement("button");
        b3.className = "btn-opcion btn-nueva-ventana";
        b3.innerHTML = `<i class="fa-solid fa-external-link-alt mr-1"></i> Abrir en nueva ventana`;
        b3.onclick = function() { 
            const capActivo = document.querySelector('.capitulo-item-lista.activo');
            let u = null;
            if (capActivo) {
                const idx = capActivo.dataset.index;
                const temp = temporadasActuales[tempActualIndex];
                if (temp && temp.capitulos && temp.capitulos[idx]) {
                    const cap = temp.capitulos[idx];
                    u = opcionActivaActual === 1 ? cap.url : cap.opcion2;
                }
            } else {
                const pc2 = obtenerPrimerCapitulo(tempActualIndex);
                u = opcionActivaActual === 1 ? pc2?.url : pc2?.opcion2;
            }
            if (u) { window.open(u, '_blank'); } 
            else { alert("❌ No hay enlace disponible para esta opción"); }
        };
        botones.appendChild(b3);
        
        if (pc?.url) reproducirOpcion(pc.url); 
        else player.innerHTML = `<div style="color:#EF4444;text-align:center;padding:3rem;font-size:1rem;"><i class="fa-solid fa-link" style="font-size:2.5rem;display:block;margin-bottom:.5rem;"></i>No hay capítulos disponibles</div>`;
        agregarAlHistorial(peli);
        cargarRecomendadas(peli.tmdb_id);
    }
}

function obtenerPrimerCapitulo(idx) { 
    if (!temporadasActuales || !temporadasActuales.length) return null; 
    const t = temporadasActuales[idx]; 
    if (!t || !t.capitulos || !t.capitulos.length) return null; 
    return t.capitulos[0]; 
}

// ==============================================
// 📺 MOSTRAR TEMPORADA CON CAPÍTULOS EN LISTA VERTICAL
// ==============================================
function mostrarTemporadaLista(index) {
    if (!temporadasActuales || !temporadasActuales.length) return;
    if (index < 0) index = 0; 
    if (index >= temporadasActuales.length) index = temporadasActuales.length - 1;
    tempActualIndex = index;
    const temp = temporadasActuales[index], container = document.getElementById("capitulosLista"), label = document.getElementById("tempActual");
    label.textContent = `Temporada ${temp.numero || index + 1}`;
    container.innerHTML = "";
    document.getElementById("tempAnterior").disabled = index === 0;
    document.getElementById("tempSiguiente").disabled = index === temporadasActuales.length - 1;
    if (!temp.capitulos || !temp.capitulos.length) { 
        container.innerHTML = `<p style="color:#64748B;padding:.4rem;text-align:center;font-size:.9rem;">Sin capítulos</p>`; 
        return; 
    }
    temp.capitulos.forEach((cap, idx) => {
        const d = document.createElement("div");
        d.className = "capitulo-item-lista";
        d.dataset.index = idx;
        if (idx === 0 && cap.url) d.classList.add("activo");
        if (!cap.url && !cap.opcion2) d.classList.add("sin-enlace");
        
        const tieneOp1 = cap.url && cap.url.trim() !== '';
        const tieneOp2 = cap.opcion2 && cap.opcion2.trim() !== '';
        
        d.innerHTML = `
            <div class="cap-item-lista-top">
                <span class="cap-numero-lista">Cap ${cap.numero || idx + 1}</span>
                <span class="cap-titulo-lista">${cap.titulo || 'Capítulo ' + (idx + 1)}</span>
                ${tieneOp1 ? `<span class="cap-play-lista">▶ Opción 1</span>` : ''}
                ${tieneOp2 ? `<span class="cap-play-lista opcion2">▶ Opción 2</span>` : ''}
                ${!tieneOp1 && !tieneOp2 ? `<span class="cap-sin-enlace-lista">🔒 Sin enlace</span>` : ''}
            </div>
            ${cap.sinopsis ? `<div class="cap-sinopsis-lista">${cap.sinopsis}</div>` : ''}
        `;
        d.onclick = function() { 
            document.querySelectorAll(".capitulo-item-lista").forEach(el => el.classList.remove("activo")); 
            this.classList.add("activo"); 
            const u = opcionActivaActual === 1 ? cap.url : cap.opcion2;
            if (u && u.trim() !== '') {
                reproducirOpcion(u);
                const bs = document.getElementById("botonesOpciones"); 
                if (bs.children.length) { 
                    document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo")); 
                    if (opcionActivaActual === 1 && bs.children[0]) bs.children[0].classList.add("activo");
                    else if (opcionActivaActual === 2 && bs.children[1]) bs.children[1].classList.add("activo");
                } 
            } else {
                // Si la opción activa no tiene enlace, intentar con la otra
                const otra = opcionActivaActual === 1 ? cap.opcion2 : cap.url;
                if (otra && otra.trim() !== '') {
                    opcionActivaActual = opcionActivaActual === 1 ? 2 : 1;
                    reproducirOpcion(otra);
                    const bs = document.getElementById("botonesOpciones"); 
                    if (bs.children.length) { 
                        document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo")); 
                        if (opcionActivaActual === 1 && bs.children[0]) bs.children[0].classList.add("activo");
                        else if (opcionActivaActual === 2 && bs.children[1]) bs.children[1].classList.add("activo");
                    } 
                } else {
                    alert("❌ Este capítulo no tiene enlaces disponibles");
                }
            }
        };
        container.appendChild(d);
    });
}

function cambiarTemporadaHandler(dir) { 
    const n = tempActualIndex + dir; 
    if (n >= 0 && n < temporadasActuales.length) { 
        mostrarTemporadaLista(n); 
        const c = obtenerPrimerCapitulo(n); 
        if (c?.url) { 
            reproducirOpcion(c.url); 
            const bs = document.getElementById("botonesOpciones"); 
            if (bs.children.length) { 
                document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo")); 
                if (bs.children[0]) bs.children[0].classList.add("activo"); 
            } 
            opcionActivaActual = 1;
        } else if (c?.opcion2) {
            reproducirOpcion(c.opcion2);
            const bs = document.getElementById("botonesOpciones"); 
            if (bs.children.length) { 
                document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo")); 
                if (bs.children[1]) bs.children[1].classList.add("activo"); 
            }
            opcionActivaActual = 2;
        }
    } 
}

function reproducirOpcion(url) {
    const p = document.getElementById("netflixPlayer");
    let e = url.trim();
    p.innerHTML = `
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:#0A0A0F;color:#A78BFA;font-size:1.2rem;gap:1rem;">
            <i class="fa-solid fa-spinner fa-spin" style="font-size:3rem;color:#7C3AED;"></i>
            <span>Cargando video...</span>
            <span style="font-size:0.8rem;color:#64748B;">Esto puede tardar unos segundos</span>
        </div>
    `;
    if (e.includes('unlimplay.com') || e.includes('vidsrc') || e.includes('vidmoly') || e.includes('embed') || e.includes('2embed')) { 
        const iframe = document.createElement('iframe');
        iframe.src = e;
        iframe.frameborder = "0";
        iframe.referrerpolicy = "origin";
        iframe.allow = "autoplay; encrypted-media; picture-in-picture; fullscreen";
        iframe.allowfullscreen = true;
        iframe.style.cssText = "width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;";
        iframe.onload = function() {
            const loader = p.querySelector('.fa-spinner')?.closest('div');
            if (loader) {
                loader.style.opacity = '0';
                loader.style.transition = 'opacity 0.5s';
                setTimeout(() => { if (loader.parentNode) loader.remove(); }, 500);
            }
        };
        setTimeout(() => {
            const loader = p.querySelector('.fa-spinner')?.closest('div');
            if (loader) {
                loader.style.opacity = '0';
                loader.style.transition = 'opacity 0.5s';
                setTimeout(() => { if (loader.parentNode) loader.remove(); }, 500);
            }
        }, 8000);
        p.innerHTML = '';
        p.appendChild(iframe);
        return; 
    }
    p.innerHTML = `<iframe src="${e}" frameborder="0" referrerpolicy="origin" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen style="width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;"></iframe>`;
    setTimeout(() => {
        const loader = p.querySelector('.fa-spinner')?.closest('div');
        if (loader) {
            loader.style.opacity = '0';
            loader.style.transition = 'opacity 0.5s';
            setTimeout(() => { if (loader.parentNode) loader.remove(); }, 500);
        }
    }, 3000);
}

async function cargarRecomendadas(tmdbId) {
    const c = document.getElementById("recomendadasLista");
    c.innerHTML = "<p style='color:#64748B;font-size:.85rem;text-align:center;padding:.5rem;'>Cargando...</p>";
    if (!tmdbId) { c.innerHTML = "<p style='color:#64748B;font-size:.85rem;text-align:center;padding:.5rem;'>Sin recomendaciones</p>"; return; }
    try {
        const d = await fetchTMDB(`movie/${tmdbId}/recommendations`, { page: 1 }).catch(() => null);
        c.innerHTML = "";
        if (!d || !d.results || !d.results.length) { 
            const fallback = DATOS_RESPALDO.slice(0, 4);
            fallback.forEach(p => {
                const t = document.createElement("div");
                t.className = "tarjeta-recomendada";
                t.innerHTML = `<img src="${p.portada}" alt="${p.titulo}" class="portada-recomendada" loading="eager" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg';this.onerror=null;"><p class="texto-recomendada">${p.titulo}</p>`;
                t.onclick = () => { cerrarVideo(); abrirVideoPelicula(p); };
                c.appendChild(t);
            });
            return; 
        }
        d.results.slice(0, 6).forEach(p => {
            const t = document.createElement("div");
            t.className = "tarjeta-recomendada";
            t.innerHTML = `<img src="${p.poster_path ? 'https://image.tmdb.org/t/p/w92' + p.poster_path : 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg'}" alt="${p.title}" class="portada-recomendada" loading="eager" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg';this.onerror=null;"><p class="texto-recomendada">${p.title}</p>`;
            t.onclick = () => { cerrarVideo(); const comp = contenido.find(c => c.tmdb_id == p.id); if (comp) abrirVideoPelicula(comp); else abrirVideoPelicula({ id: `tmdb_${p.id}`, tmdb_id: p.id, titulo: p.title, anio: p.release_date ? p.release_date.split("-")[0] : "N/D", tipo: "pelicula", categoria: "peliculas", portada: getImagenUrl(p.poster_path, 'w92'), sinopsis: p.overview || "Sin sinopsis", puntuacion: p.vote_average ? p.vote_average.toFixed(1) : "N/A", genero: "Película", url: generarEnlaceMultiplataforma(p.id, 'pelicula', 'unlimplay'), opcion2: generarEnlaceMultiplataforma(p.id, 'pelicula', 'vidsrc'), plataforma2: 'vidsrc', temporadas: [] }); };
            c.appendChild(t);
        });
    } catch (e) { 
        const fallback = DATOS_RESPALDO.slice(0, 4);
        fallback.forEach(p => {
            const t = document.createElement("div");
            t.className = "tarjeta-recomendada";
            t.innerHTML = `<img src="${p.portada}" alt="${p.titulo}" class="portada-recomendada" loading="eager" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg';this.onerror=null;"><p class="texto-recomendada">${p.titulo}</p>`;
            t.onclick = () => { cerrarVideo(); abrirVideoPelicula(p); };
            c.appendChild(t);
        });
    }
}

function agregarAlHistorial(item) {
    let h = JSON.parse(localStorage.getItem("historialTely")) || [];
    h = h.filter(x => x.id !== item.id);
    h.unshift({ id: item.id, titulo: item.titulo, tipo: item.tipo || 'serie' });
    if (h.length > 10) h.pop();
    localStorage.setItem("historialTely", JSON.stringify(h));
    mostrarHistorial();
    mostrarRecientes();
}

function mostrarHistorial() {
    const c = document.getElementById("listaHistorial"), h = JSON.parse(localStorage.getItem("historialTely")) || [];
    c.innerHTML = h.length ? "" : `<div class="historial-vacio">Aún no has visto nada</div>`;
    h.forEach(i => { const b = document.createElement("button"); b.innerHTML = `<i class="fa-solid fa-play mr-2"></i> ${i.titulo}`; b.onclick = (e) => { e.stopPropagation(); const f = contenido.find(x => x.id === i.id); if (!f) return; if (auth.currentUser) { abrirVideoPelicula(f); document.getElementById("menuPerfil").classList.remove("mostrar"); menuAbierto = false; } else { videoPendiente = f; abrirModalLogin(); } }; c.appendChild(b); });
}

function mostrarRecientes() {
    const c = document.getElementById("scrollRecientes"), h = JSON.parse(localStorage.getItem("historialTely")) || [];
    if (!h.length) { c.innerHTML = `<p style="color:#64748B;font-size:.85rem;padding:.3rem;">No has visto nada aún</p>`; return; }
    c.innerHTML = "";
    h.slice(0, 10).forEach(item => {
        const f = contenido.find(x => x.id === item.id);
        if (!f) return;
        const t = document.createElement("div");
        t.className = "tarjeta-reciente";
        t.innerHTML = `<img src="${f.portada}" alt="${f.titulo}" class="portada-reciente" loading="eager" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg';this.onerror=null;"><div class="info-reciente"><h4>${f.titulo}</h4></div>`;
        t.onclick = (e) => { e.stopPropagation(); if (auth.currentUser) abrirVideoPelicula(f); else { videoPendiente = f; abrirModalLogin(); } };
        c.appendChild(t);
    });
}

function limpiarHistorial() { localStorage.removeItem("historialTely"); mostrarHistorial(); mostrarRecientes(); }

function iniciarConGoogle() {
    const btn = document.getElementById('btnGoogleLogin');
    if (!btn) return;
    const original = btn.innerHTML;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Conectando...';
    btn.disabled = true;
    const provider = new firebase.auth.GoogleAuthProvider();
    provider.setCustomParameters({ 'prompt': 'select_account' });
    auth.signInWithPopup(provider).then((r) => {
        document.getElementById("nombrePerfil").textContent = r.user.displayName || r.user.email || "✅ Sesión iniciada";
        cerrarModalLogin();
        btn.innerHTML = original;
        btn.disabled = false;
        if (videoPendiente) { const t = videoPendiente; videoPendiente = null; abrirVideoPelicula(t); agregarAlHistorial(t); }
        mostrarToast('✅ Sesión iniciada correctamente', 'success');
    }).catch((e) => {
        btn.innerHTML = original;
        btn.disabled = false;
        if (e.code === 'auth/popup-closed-by-user') mostrarToast('⚠️ Cerraste la ventana de Google. Intenta de nuevo.', 'warning');
        else if (e.code === 'auth/popup-blocked') mostrarToast('⛔ Permite popups para este sitio en tu navegador.', 'error');
        else if (e.code === 'auth/unauthorized-domain') mostrarToast('❌ Agrega localhost en Firebase Console > Authentication > Authorized domains', 'error');
        else mostrarToast('❌ Error: ' + e.message, 'error');
    });
}

function iniciarRecaptcha() {
    const container = document.getElementById('recaptcha-container');
    if (!container) return;
    container.innerHTML = '';
    if (recaptchaVerifier) { try { recaptchaVerifier.clear(); } catch(e) {} recaptchaVerifier = null; }
    try {
        recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { 
            size: 'invisible',
            callback: function() { console.log('✅ reCAPTCHA resuelto'); },
            'expired-callback': function() { recaptchaVerifier = null; iniciarRecaptcha(); }
        });
    } catch(e) { setTimeout(iniciarRecaptcha, 1000); }
}

function enviarCodigo() {
    const t = document.getElementById("telefonoInput").value.trim();
    if (!t || !t.startsWith("+")) { mostrarToast('⚠️ Agrega código de país ej: +58 412 1234567', 'warning'); return; }
    if (!recaptchaVerifier) { iniciarRecaptcha(); setTimeout(() => { if (recaptchaVerifier) enviarCodigo(); }, 1000); return; }
    auth.signInWithPhoneNumber(t, recaptchaVerifier)
        .then(r => { 
            confirmationResult = r; 
            document.getElementById("seccionCodigo").classList.remove("oculto"); 
            mostrarToast('✅ Código enviado. Revisa tu teléfono.', 'success'); 
        })
        .catch(e => { 
            console.error('❌ Error SMS:', e);
            if (e.code === 'auth/operation-not-allowed') {
                mostrarToast('❌ El SMS no está habilitado. Ve a Firebase Console → Authentication → Sign-in methods y activa Teléfono.', 'error');
            } else if (e.message.includes('reCAPTCHA')) { 
                recaptchaVerifier = null; 
                iniciarRecaptcha(); 
                mostrarToast('⚠️ Error de reCAPTCHA. Intenta de nuevo.', 'error'); 
            } else { 
                mostrarToast('❌ Error: ' + e.message, 'error'); 
            }
        });
}

function verificarCodigo() {
    const c = document.getElementById("codigoInput").value.trim();
    if (!c || c.length < 6) { mostrarToast('⚠️ Ingresa el código de 6 dígitos', 'warning'); return; }
    confirmationResult.confirm(c)
        .then(r => { 
            document.getElementById("nombrePerfil").textContent = r.user.phoneNumber || "✅ Sesión iniciada"; 
            cerrarModalLogin(); 
            if (videoPendiente) { abrirVideoPelicula(videoPendiente); agregarAlHistorial(videoPendiente); videoPendiente = null; } 
            mostrarToast('✅ Sesión iniciada', 'success'); 
        })
        .catch(e => { mostrarToast('❌ Código incorrecto o expirado', 'error'); });
}

function cerrarModalLogin() { 
    document.getElementById("modal-login").classList.add("oculto"); 
    videoPendiente = null; 
    if (recaptchaVerifier) { try { recaptchaVerifier.clear(); } catch(e) {} recaptchaVerifier = null; }
}
function cerrarModalLoginSiClickFuera(e) { if (e.target === e.currentTarget) cerrarModalLogin(); }

function toggleMenu() {
    const m = document.getElementById("menuPerfil");
    if (!auth.currentUser) { abrirModalLogin(); return; }
    if (menuAbierto) { m.classList.remove("mostrar"); menuAbierto = false; } else { m.classList.add("mostrar"); menuAbierto = true; mostrarHistorial(); }
}

function abrirModalLogin() { 
    document.getElementById("modal-login").classList.remove("oculto"); 
    if (menuAbierto) { document.getElementById("menuPerfil").classList.remove("mostrar"); menuAbierto = false; }
    setTimeout(iniciarRecaptcha, 500);
}

function cambiarModo() {
    const body = document.body, icono = document.getElementById("iconoModo");
    if (body.classList.contains("dark")) { body.classList.remove("dark"); icono.className = "fa-solid fa-moon"; localStorage.setItem("modo", "claro"); } else { body.classList.add("dark"); icono.className = "fa-solid fa-sun"; localStorage.setItem("modo", "oscuro"); }
}
if (localStorage.getItem("modo") === "oscuro" || (!localStorage.getItem("modo") && window.matchMedia("(prefers-color-scheme: dark)").matches)) { document.body.classList.add("dark"); document.getElementById("iconoModo").className = "fa-solid fa-sun"; }

function cerrarSesion() {
    auth.signOut().then(() => { document.getElementById("nombrePerfil").textContent = "❌ Sesión cerrada"; videoPendiente = null; document.getElementById("menuPerfil").classList.remove("mostrar"); menuAbierto = false; mostrarToast('✅ Sesión cerrada', 'success'); }).catch(e => { mostrarToast('❌ Error: ' + e.message, 'error'); });
}
