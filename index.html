async function cargarContenidoCompleto() {
  if (contenidoCargado) return;
  
  const lista = document.getElementById("lista-contenido");
  lista.innerHTML = '<div class="col-span-3 text-center py-10 text-gray-400">Cargando...</div>';

  try {
    // Intentar TMDB
    const resPeliculas = await fetch(`${TMDB_BASE}/movie/popular?language=${TMDB_LANG}&page=1`, opcionesTMDB);
    const datosPeliculas = await resPeliculas.json();
    
    const pelisTMDB = datosPeliculas.results ? datosPeliculas.results.slice(0, 8).map(p => ({
      id: `tmdb_${p.id}`,
      tmdb_id: p.id,
      titulo: p.title || "Sin título",
      anio: p.release_date ? p.release_date.split("-")[0] : "N/D",
      tipo: "pelicula",
      categoria: "peliculas",
      portada: p.poster_path ? `${TMDB_IMG}${p.poster_path}` : "https://via.placeholder.com/300x450?text=Sin+Portada",
      sinopsis: p.overview || "Sin sinopsis",
      puntuacion: p.vote_average ? p.vote_average.toFixed(1) : "N/A",
      genero: "Película",
      url: ""
    })) : [];

    contenido = [...MI_CONTENIDO, ...pelisTMDB];
    contenidoCargado = true;

  } catch (err) {
    console.warn("TMDB falló, cargando solo contenido propio:", err);
    contenido = [...MI_CONTENIDO];
    contenidoCargado = true;
  }

  document.getElementById("contadorTotal").textContent = `${contenido.length} títulos`;
  mostrarContenido("peliculas");
  mostrarRecientes();
}

// ==============================================
// 🔐 AUTENTICACIÓN
// ==============================================
function iniciarConGoogle() {
  const btn = document.getElementById('btnGoogleLogin');
  const textoOriginal = btn.innerHTML;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Esperando...';
  btn.disabled = true;
  
  const proveedor = new firebase.auth.GoogleAuthProvider();
  proveedor.setCustomParameters({ 'prompt': 'select_account' });
  
  auth.signInWithPopup(proveedor)
    .then((result) => {
      document.getElementById("nombrePerfil").textContent = result.user.displayName || result.user.email;
      cerrarModalLogin();
      btn.innerHTML = textoOriginal;
      btn.disabled = false;
      if (!contenidoCargado) cargarContenidoCompleto();
      if (videoPendiente) { abrirVideoPelicula(videoPendiente); agregarAlHistorial(videoPendiente); videoPendiente = null; }
    })
    .catch((error) => {
      btn.innerHTML = textoOriginal;
      btn.disabled = false;
      alert("Login: " + error.message);
    });
}

function cerrarSesion() { auth.signOut().then(() => { document.getElementById("nombrePerfil").textContent = "Acceder"; videoPendiente = null; }); }

// ==============================================
// 📋 FUNCIONES GENERALES
// ==============================================
function cambiarModo() {
  const body = document.body;
  const icono = document.getElementById("iconoModo");
  if (body.classList.contains("dark")) {
    body.classList.remove("dark");
    icono.className = "fa-solid fa-moon";
    localStorage.setItem("modo", "claro");
  } else {
    body.classList.add("dark");
    icono.className = "fa-solid fa-sun";
    localStorage.setItem("modo", "oscuro");
  }
}

if (localStorage.getItem("modo") === "oscuro" || (!localStorage.getItem("modo") && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
  document.body.classList.add("dark");
  document.getElementById("iconoModo").className = "fa-solid fa-sun";
}

function agregarAlHistorial(item) {
  let h = JSON.parse(localStorage.getItem("historialTely")) || [];
  h = h.filter(x => x.id !== item.id);
  h.unshift({ id: item.id, titulo: item.titulo, tipo: item.tipo });
  if (h.length > 10) h.pop();
  localStorage.setItem("historialTely", JSON.stringify(h));
  mostrarHistorial();
  mostrarRecientes();
}

function mostrarHistorial() {
  const c = document.getElementById("listaHistorial");
  const h = JSON.parse(localStorage.getItem("historialTely")) || [];
  c.innerHTML = h.length ? "" : `<div class="historial-vacio">Aún no has visto nada</div>`;
  h.forEach(i => {
    const btn = document.createElement("button");
    btn.innerHTML = `<i class="fa-solid fa-play mr-2"></i> ${i.titulo}`;
    btn.onclick = () => { const f = contenido.find(x => x.id === i.id); if (!f) return; auth.currentUser ? abrirVideoPelicula(f) : (videoPendiente = f, abrirModalLogin(), toggleMenu()); };
    c.appendChild(btn);
  });
}

function mostrarRecientes() {
  const contenedor = document.getElementById("scrollRecientes");
  const historial = JSON.parse(localStorage.getItem("historialTely")) || [];
  if (historial.length === 0) { contenedor.innerHTML = `<p class="text-gray-400 text-sm py-2">No has visto nada aún</p>`; return; }
  contenedor.innerHTML = "";
  historial.forEach(item => {
    const encontrado = contenido.find(c => c.id === item.id);
    if (!encontrado) return;
    const tarjeta = document.createElement("div");
    tarjeta.className = "tarjeta-reciente";
    tarjeta.innerHTML = `<img src="${encontrado.portada}" alt="${encontrado.titulo}" class="portada-reciente" loading="lazy" onerror="this.src='https://via.placeholder.com/120x180?text=Sin+Portada'"><div class="info-reciente"><h4>${encontrado.titulo}</h4></div>`;
    tarjeta.onclick = () => { auth.currentUser ? abrirVideoPelicula(encontrado) : (videoPendiente = encontrado, abrirModalLogin()); };
    contenedor.appendChild(tarjeta);
  });
}

function limpiarHistorial() { localStorage.removeItem("historialTely"); mostrarHistorial(); mostrarRecientes(); }

function mostrarContenido(categoria) {
  const lista = document.getElementById("lista-contenido");
  lista.innerHTML = "";
  const filtrados = contenido.filter(x => x.categoria === categoria);
  if (!filtrados.length) { lista.innerHTML = `<p class="col-span-3 text-center text-gray-400 py-10">Sin contenido</p>`; return; }
  filtrados.forEach(item => {
    const tieneVideo = !!item.url;
    const tarjeta = document.createElement("div");
    tarjeta.className = "tarjeta";
    tarjeta.innerHTML = `<span class="etiqueta-anio">${item.anio}</span><i class="fa-solid fa-star estrella"></i><img src="${item.portada}" alt="${item.titulo}" class="portada" loading="lazy" onerror="this.src='https://via.placeholder.com/300x450?text=Sin+Portada'"><div class="info-tarjeta"><h3>${item.titulo}</h3>${tieneVideo ? '<span class="badge-video">▶ Disponible</span>' : '<span class="badge-sin-video">🔒 Sin enlace</span>'}</div>`;
    tarjeta.onclick = () => { auth.currentUser ? abrirVideoPelicula(item) : (videoPendiente = item, abrirModalLogin()); };
    lista.appendChild(tarjeta);
  });
}

function cambiarCategoria(cat) {
  document.querySelectorAll(".btn-pestana").forEach(b => { b.classList.remove("activa"); b.classList.add("inactiva"); });
  document.querySelectorAll(".btn-pestana").forEach(b => { if (b.textContent.includes(cat === 'peliculas' ? 'Películas' : 'Series')) { b.classList.remove("inactiva"); b.classList.add("activa"); } });
  mostrarContenido(cat);
}

function toggleMenu() { const menu = document.getElementById("menuPerfil"); menu.classList.toggle("mostrar"); mostrarHistorial(); }
document.addEventListener('click', function(e) { const menu = document.getElementById("menuPerfil"); if (menu && !menu.contains(e.target)) menu.classList.remove("mostrar"); });

function buscarContenido() {
  const texto = document.getElementById("buscadorInput").value.trim().toLowerCase();
  const resultados = contenido.filter(x => x.titulo.toLowerCase().includes(texto));
  const lista = document.getElementById("lista-contenido");
  lista.innerHTML = "";
  resultados.length ? resultados.forEach(item => {
    const tarjeta = document.createElement("div");
    tarjeta.className = "tarjeta";
    tarjeta.innerHTML = `<span class="etiqueta-anio">${item.anio}</span><i class="fa-solid fa-star estrella"></i><img src="${item.portada}" alt="${item.titulo}" class="portada" loading="lazy" onerror="this.src='https://via.placeholder.com/300x450?text=Sin+Portada'"><div class="info-tarjeta"><h3>${item.titulo}</h3></div>`;
    tarjeta.onclick = () => abrirVideoPelicula(item);
    lista.appendChild(tarjeta);
  }) : lista.innerHTML = `<p class="col-span-3 text-center text-gray-400 py-10">No se encontraron coincidencias</p>`;
}

function abrirModalLogin() { document.getElementById("modal-login").classList.remove("oculto"); }
function cerrarModalLogin() { document.getElementById("modal-login").classList.add("oculto"); videoPendiente = null; }
// ==============================================
// 🎬 REPRODUCTOR COMPATIBLE
// ==============================================
function abrirVideoPelicula(peli) {
    detenerVideo();
    const modal = document.getElementById("modal-video");
    const player = document.getElementById("netflixPlayer");
    const botones = document.getElementById("botonesOpciones");
    peliculaActual = peli;

    modal.classList.add("abierto");
    document.body.style.overflow = "hidden";

    document.getElementById("tituloPanel").textContent = peli.titulo;
    document.getElementById("anioPanel").textContent = peli.anio || "N/D";
    document.getElementById("ratingPanel").textContent = peli.puntuacion || "N/A";
    document.getElementById("generoPanel").textContent = peli.genero || "Película";
    document.getElementById("sinopsisPanel").textContent = peli.sinopsis || "Sin sinopsis disponible";

    botones.innerHTML = "";

    const btnPrincipal = document.createElement("button");
    btnPrincipal.className = "btn-opcion activo";
    btnPrincipal.innerHTML = `<i class="fa-solid fa-play mr-2"></i> Principal`;
    btnPrincipal.onclick = function() {
        document.querySelectorAll(".btn-opcion").forEach(b => b.classList.remove("activo"));
        this.classList.add("activo");
        if (peli.url) reproducirOpcion(peli.url, peli.titulo, peli.anio);
    };
    botones.appendChild(btnPrincipal);

    const btnNuevaVentana = document.createElement("button");
    btnNuevaVentana.className = "btn-opcion btn-nueva-ventana";
    btnNuevaVentana.innerHTML = `<i class="fa-solid fa-external-link-alt mr-2"></i> Abrir en ventana`;
    btnNuevaVentana.onclick = () => peli.url ? window.open(peli.url, '_blank') : alert("❌ No hay enlace disponible");
    botones.appendChild(btnNuevaVentana);

    if (peli.url) setTimeout(() => reproducirOpcion(peli.url, peli.titulo, peli.anio), 300);
    else player.innerHTML = `<div class="error-video" style="color:#EF4444;text-align:center;padding:4rem;font-size:1.2rem;">❌ Agrega el enlace para reproducir</div>`;

    agregarAlHistorial(peli);
    cargarRecomendadas(peli.tmdb_id);
}

function reproducirOpcion(url, titulo, anio) {
    const player = document.getElementById("netflixPlayer");
    let enlace = url.trim();

    // ✅ STREAMTAPE
    if (enlace.includes("streamtape.com")) {
        const id = enlace.match(/\/v\/([a-zA-Z0-9_-]+)/)?.[1];
        if (id) enlace = `https://streamtape.com/e/${id}/`;
        player.innerHTML = `<iframe src="${enlace}" frameborder="0" allow="autoplay; fullscreen" allowfullscreen style="width:100%;height:100%;border:none;position:absolute;top:0;left:0;"></iframe>`;
    }

    // ✅ TRANSTIME / OTROS EMBEDS
    else if (enlace.includes("transtime.io") || enlace.includes("embed")) {
        player.innerHTML = `<iframe src="${enlace}" frameborder="0" allow="autoplay; fullscreen" allowfullscreen style="width:100%;height:100%;border:none;position:absolute;top:0;left:0;"></iframe>`;
    }

    // ✅ YOUTUBE
    else if (enlace.includes("youtube.com") || enlace.includes("youtu.be")) {
        if (!enlace.includes("autoplay")) enlace += (enlace.includes("?") ? "&" : "?") + "autoplay=1";
        player.innerHTML = `<iframe src="${enlace}" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen style="width:100%;height:100%;border:none;position:absolute;top:0;left:0;"></iframe>`;
    }

    // ✅ VIDMOLY
    else if (enlace.includes("vidmoly.to") || enlace.includes("vidmoly.me")) {
        if (!enlace.includes("controls=")) enlace += (enlace.includes("?") ? "&" : "?") + "controls=1&logo=0&autoplay=1";
        player.innerHTML = `<iframe src="${enlace}" frameborder="0" allow="autoplay; fullscreen" allowfullscreen style="width:100%;height:100%;border:none;position:absolute;top:0;left:0;"></iframe>`;
    }

    // ✅ MIXDROP
    else if (enlace.includes("mixdrop.co") || enlace.includes("mixdrop.ch")) {
        if (!enlace.includes("autoplay")) enlace += (enlace.includes("?") ? "&" : "?") + "autoplay=1";
        player.innerHTML = `<iframe src="${enlace}" frameborder="0" allow="autoplay; fullscreen" allowfullscreen style="width:100%;height:100%;border:none;position:absolute;top:0;left:0;"></iframe>`;
    }

    // ✅ GOOGLE DRIVE
    else if (enlace.includes("drive.google.com")) {
        const id = enlace.match(/[-\w]{25,}/)?.[0];
        if (id) {
            const driveUrl = `https://drive.google.com/uc?export=stream&id=${id}&confirm=t&cache=1`;
            player.innerHTML = `<video src="${driveUrl}" controlsList="nodownload noremoteplayback" controls playsinline preload="auto" crossorigin="anonymous" autoplay style="width:100%;height:100%;background:#000;position:absolute;top:0;left:0;">Tu navegador no soporta este video</video>`;
        } else {
            player.innerHTML = `<div class="error-video" style="color:#EF4444;text-align:center;padding:4rem;">❌ Enlace de Drive inválido</div>`;
            return;
        }
    }

    // ✅ CUALQUIER OTRO ENLACE
    else {
        player.innerHTML = `<iframe src="${enlace}" frameborder="0" allow="autoplay; fullscreen" allowfullscreen style="width:100%;height:100%;border:none;position:absolute;top:0;left:0;"></iframe>`;
    }

    document.getElementById("tituloReproductor").textContent = `${titulo} ${anio ? `(${anio})` : ''}`;
}

// ==============================================
// 📥 RECOMENDACIONES
// ==============================================
async function cargarRecomendadas(tmdbId) {
    const contenedor = document.getElementById("recomendadasLista");
    contenedor.innerHTML = "<p class='text-gray-400 text-center py-3'>Cargando recomendaciones...</p>";

    if (!tmdbId) {
        contenedor.innerHTML = "<p class='text-gray-400 text-center py-3'>Sin recomendaciones disponibles</p>";
        return;
    }

    try {
        const res = await fetch(`${TMDB_BASE}/movie/${tmdbId}/recommendations?language=${TMDB_LANG}&page=1`, opcionesTMDB);
        const datos = await res.json();
        contenedor.innerHTML = "";

        if (!datos.results || datos.results.length === 0) {
            contenedor.innerHTML = "<p class='text-gray-400 text-center py-3'>No hay películas relacionadas</p>";
            return;
        }

        datos.results.slice(0, 6).forEach(pelicula => {
            const tarjeta = document.createElement("div");
            tarjeta.className = "tarjeta-recomendada";
            tarjeta.innerHTML = `
                <img src="${pelicula.poster_path ? TMDB_IMG + pelicula.poster_path : 'https://via.placeholder.com/110x165?text=Sin+Imagen'}" 
                     alt="${pelicula.title}" class="portada-recomendada" loading="lazy">
                <p class="texto-recomendada">${pelicula.title}</p>
            `;
            tarjeta.onclick = () => {
                cerrarVideo();
                const encontrado = contenido.find(c => c.tmdb_id == pelicula.id);
                if (encontrado) abrirVideoPelicula(encontrado);
                else abrirVideoPelicula({
                    id: `tmdb_${pelicula.id}`,
                    tmdb_id: pelicula.id,
                    titulo: pelicula.title,
                    anio: pelicula.release_date ? pelicula.release_date.split("-")[0] : "N/D",
                    tipo: "pelicula",
                    categoria: "peliculas",
                    portada: pelicula.poster_path ? TMDB_IMG + pelicula.poster_path : "",
                    sinopsis: pelicula.overview || "Sin sinopsis",
                    puntuacion: pelicula.vote_average ? pelicula.vote_average.toFixed(1) : "N/A",
                    genero: "Película",
                    url: ""
                });
            };
            contenedor.appendChild(tarjeta);
        });

    } catch (err) {
        contenedor.innerHTML = "<p class='text-red-400 text-center py-3'>Error al cargar recomendaciones</p>";
    }
}

    detenerVideo();

}
