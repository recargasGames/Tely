<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TELY 🎬 - Series</title>
    <link rel="icon" href="logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0A0A0F;color:#fff;font-family:'Segoe UI',Roboto,sans-serif;min-height:100vh;transition:background .3s,color .3s;display:flex}
        body.dark{background:#0A0A0F;color:#fff}
        body:not(.dark){background:#f0f0f0;color:#111}
        ::-webkit-scrollbar{display:none}
        
        .sidebar{position:fixed;top:0;left:0;bottom:0;width:72px;background:rgba(10,10,15,.97);backdrop-filter:blur(12px);border-right:1px solid rgba(124,58,237,.12);z-index:100;display:flex;flex-direction:column;align-items:center;padding:.8rem 0;overflow-y:auto;transition:width .3s}
        body:not(.dark) .sidebar{background:rgba(255,255,255,.97);border-color:rgba(0,0,0,.08)}
        .sidebar:hover{width:200px}
        .sidebar:hover .sidebar-link span{display:inline}
        .sidebar-logo{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,#7C3AED,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1.5rem;text-align:center;width:100%;padding:0 .5rem}
        .sidebar-logo small{display:block;font-size:.55rem;color:#64748B;-webkit-text-fill-color:#64748B}
        .sidebar-nav{display:flex;flex-direction:column;gap:.2rem;width:100%;padding:0 .3rem}
        .sidebar-link{display:flex;align-items:center;gap:.8rem;padding:.6rem .8rem;border-radius:10px;color:#94A3B8;text-decoration:none;font-weight:600;font-size:.85rem;transition:.3s;white-space:nowrap}
        .sidebar-link:hover{background:rgba(124,58,237,.12);color:#fff}
        .sidebar-link.active{background:rgba(124,58,237,.2);color:#fff}
        .sidebar-link i{font-size:1.2rem;min-width:24px;text-align:center}
        .sidebar-link span{display:none}
        .sidebar:hover .sidebar-link span{display:inline}
        body:not(.dark) .sidebar-link{color:#555}
        body:not(.dark) .sidebar-link:hover{background:rgba(124,58,237,.08);color:#111}
        body:not(.dark) .sidebar-link.active{background:rgba(124,58,237,.12);color:#7C3AED}
        .sidebar-bottom{margin-top:auto;display:flex;flex-direction:column;gap:.2rem;width:100%;padding:0 .3rem}
        
        .main-content{flex:1;margin-left:72px;padding:1rem;max-width:calc(100% - 72px)}
        @media(max-width:768px){.sidebar{width:56px}.main-content{margin-left:56px;max-width:calc(100% - 56px)}}
        
        .top-header{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0 1rem;flex-wrap:wrap;gap:.5rem}
        .top-header h1{font-size:1.3rem;font-weight:700;background:linear-gradient(135deg,#7C3AED,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .top-actions{display:flex;align-items:center;gap:.5rem}
        .theme-btn{background:rgba(255,255,255,.05);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:.9rem;transition:.3s}
        .theme-btn:hover{background:rgba(255,255,255,.1)}
        body:not(.dark) .theme-btn{background:rgba(0,0,0,.05);color:#111}
        body:not(.dark) .theme-btn:hover{background:rgba(0,0,0,.1)}
        .user-btn{background:rgba(124,58,237,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;transition:.3s}
        .user-btn:hover{background:rgba(124,58,237,.3)}
        body:not(.dark) .user-btn{color:#111}
        
        .search-bar{display:flex;align-items:center;gap:.5rem;max-width:500px;margin-bottom:1rem}
        .search-bar input{flex:1;padding:.5rem 1rem;border-radius:9999px;border:2px solid rgba(124,58,237,.2);background:rgba(255,255,255,.05);color:#fff;font-size:.9rem;transition:.3s}
        .search-bar input:focus{outline:none;border-color:#7C3AED}
        .search-bar input::placeholder{color:#64748B}
        body:not(.dark) .search-bar input{background:rgba(0,0,0,.05);color:#111;border-color:rgba(0,0,0,.1)}
        .search-bar button{padding:.4rem 1.2rem;border-radius:9999px;border:none;background:#7C3AED;color:#fff;font-size:.9rem;cursor:pointer;transition:.3s}
        .search-bar button:hover{background:#6D28D9}
        .search-results{display:none !important}
        
        .grid-movies{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.6rem}
        @media(min-width:768px){.grid-movies{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}}
        @media(min-width:1024px){.grid-movies{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}}
        
        .movie-card{background:rgba(255,255,255,.04);border-radius:8px;overflow:hidden;cursor:pointer;border:1px solid rgba(124,58,237,.06);transition:.3s;position:relative}
        .movie-card:hover{transform:translateY(-3px);border-color:rgba(124,58,237,.2)}
        body:not(.dark) .movie-card{background:rgba(0,0,0,.04);border-color:rgba(0,0,0,.08)}
        .movie-card .poster{width:100%;aspect-ratio:2/3;object-fit:cover;background:#1A1A2E}
        .movie-card .info{padding:.3rem .4rem}
        .movie-card .info h4{font-size:.7rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        body:not(.dark) .movie-card .info h4{color:#111}
        .movie-card .info .meta{display:flex;justify-content:space-between;font-size:.55rem;color:#94A3B8}
        .movie-card .badge-year{position:absolute;top:.3rem;left:.3rem;background:rgba(124,58,237,.85);color:#fff;padding:.1rem .4rem;border-radius:3px;font-size:.5rem;font-weight:700}
        .movie-card .badge-type{position:absolute;top:.3rem;right:.3rem;background:rgba(0,0,0,.7);color:#fff;padding:.1rem .4rem;border-radius:3px;font-size:.45rem;font-weight:600}
        
        .section-title{font-size:1rem;font-weight:700;margin:.8rem 0 .5rem;display:flex;align-items:center;gap:.4rem}
        .section-title i{color:#7C3AED}
        body:not(.dark) .section-title{color:#111}
        .skeleton{aspect-ratio:2/3;border-radius:8px;background:linear-gradient(90deg,#1A1A2E 25%,#2D2D44 50%,#1A1A2E 75%);background-size:200% 100%;animation:skeleton 1.5s infinite}
        body:not(.dark) .skeleton{background:linear-gradient(90deg,#e0e0e0 25%,#f0f0f0 50%,#e0e0e0 75%)}
        @keyframes skeleton{0%{background-position:-200%}100%{background-position:200%}}
        .load-more{display:flex;justify-content:center;padding:1rem 0}
        .load-more button{background:rgba(124,58,237,.15);color:#fff;padding:.4rem 1.5rem;border-radius:9999px;border:2px solid rgba(124,58,237,.2);font-weight:600;cursor:pointer;font-size:.85rem;transition:.3s}
        .load-more button:hover{background:rgba(124,58,237,.25)}
        body:not(.dark) .load-more button{color:#111;background:rgba(124,58,237,.1)}
        
        .user-dropdown{position:absolute;right:0;top:calc(100% + 8px);background:rgba(26,26,46,.95);border-radius:12px;width:200px;border:1px solid rgba(124,58,237,.15);padding:.4rem 0;display:none;z-index:50;box-shadow:0 20px 60px rgba(0,0,0,.5)}
        .user-dropdown.show{display:block}
        body:not(.dark) .user-dropdown{background:rgba(255,255,255,.95);border-color:rgba(0,0,0,.1)}
        .user-dropdown a{display:flex;align-items:center;gap:.6rem;padding:.4rem 1rem;color:#CBD5E1;text-decoration:none;font-size:.85rem;transition:.2s}
        .user-dropdown a:hover{background:rgba(124,58,237,.08);color:#fff}
        body:not(.dark) .user-dropdown a{color:#333}
        body:not(.dark) .user-dropdown a:hover{background:rgba(124,58,237,.08);color:#111}
        .user-dropdown hr{margin:.2rem 0;border:none;border-top:1px solid rgba(124,58,237,.08)}
        .user-menu{position:relative}
        .card-actions{display:flex;gap:4px;margin-top:4px;justify-content:center}
        .card-actions button{background:none;border:none;cursor:pointer;font-size:.65rem;padding:2px 6px;border-radius:4px;transition:.2s}
        .card-actions .fav-btn{color:#EF4444}
        .card-actions .fav-btn:hover{background:rgba(239,68,68,.15)}
        .card-actions .list-btn{color:#3B82F6}
        .card-actions .list-btn:hover{background:rgba(59,130,246,.15)}
        .empty-msg{color:#64748B;font-size:.9rem;padding:1rem 0;text-align:center}
    </style>
</head>
<body>

<nav class="sidebar">
    <div class="sidebar-logo">TELY<small>🍿</small></div>
    <div class="sidebar-nav">
        <a href="index.html" class="sidebar-link"><i class="fas fa-home"></i><span>Inicio</span></a>
        <a href="peliculas.html" class="sidebar-link"><i class="fas fa-film"></i><span>Películas</span></a>
        <a href="series.html" class="sidebar-link active"><i class="fas fa-tv"></i><span>Series</span></a>
        <a href="populares.html" class="sidebar-link"><i class="fas fa-fire"></i><span>Populares</span></a>
    </div>
    <div class="sidebar-bottom">
        <a href="perfil.html" class="sidebar-link"><i class="fas fa-user"></i><span>Perfil</span></a>
    </div>
</nav>

<main class="main-content">
    <div class="top-header">
        <h1><i class="fas fa-tv"></i> Series</h1>
        <div class="top-actions">
            <button class="theme-btn" onclick="toggleTheme()" id="themeBtn"><i class="fas fa-moon"></i></button>
            <div class="user-menu">
                <button class="user-btn" onclick="toggleUserMenu()"><i class="fas fa-user-circle"></i></button>
                <div class="user-dropdown" id="userDropdown">
                    <a href="perfil.html"><i class="fas fa-user"></i> Mi perfil</a>
                    <hr>
                    <a href="#" id="loginBtn" onclick="irALogin()"><i class="fas fa-sign-in-alt"></i> Iniciar sesión</a>
                    <a href="#" id="logoutBtn" style="display:none;" onclick="cerrarSesion()"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</a>
                </div>
            </div>
        </div>
    </div>

    <div class="search-bar">
        <input type="text" placeholder="🔍 Buscar series..." id="searchInput" oninput="buscarGlobal()">
        <button onclick="buscarGlobal()"><i class="fas fa-search"></i></button>
        <div class="search-results" id="searchResults"></div>
    </div>

    <div class="grid-movies" id="listaSeries">
        <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
        <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
        <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
        <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    </div>

    <div class="load-more"><button onclick="cargarMasSeries()" id="btnMas"><i class="fas fa-plus"></i> Cargar más</button></div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyBPBDEVUR7hjNrxCYrefF9Sbl0Wofp3VoQ",
    authDomain: "telyx-23210.firebaseapp.com",
    projectId: "telyx-23210",
    storageBucket: "telyx-23210.firebasestorage.app",
    messagingSenderId: "10164285015",
    appId: "1:10164285015:web:5cf32bd2831de126c67d12"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let paginaActual = 1;
let cargando = false;
let totalPaginas = 1;
let timeoutBusqueda = null;

function irALogin(){window.location.href='login.html'}
function cerrarSesion(){auth.signOut().then(()=>{location.reload()})}
function toggleUserMenu(){document.getElementById('userDropdown').classList.toggle('show')}
document.addEventListener('click',(e)=>{const m=document.getElementById('userDropdown');if(m&&!e.target.closest('.user-menu'))m.classList.remove('show')});
auth.onAuthStateChanged(user=>{document.getElementById('loginBtn').style.display=user?'none':'flex';document.getElementById('logoutBtn').style.display=user?'flex':'none'});

function toggleTheme(){const b=document.body;const btn=document.getElementById('themeBtn');if(b.classList.contains('dark')){b.classList.remove('dark');btn.innerHTML='<i class="fas fa-moon"></i>';localStorage.setItem('theme','light')}else{b.classList.add('dark');btn.innerHTML='<i class="fas fa-sun"></i>';localStorage.setItem('theme','dark')}}
if(localStorage.getItem('theme')==='light'){document.body.classList.remove('dark');document.getElementById('themeBtn').innerHTML='<i class="fas fa-moon"></i>'}else{document.body.classList.add('dark');document.getElementById('themeBtn').innerHTML='<i class="fas fa-sun"></i>'}

function getImagenUrl(path,size='w342'){if(!path)return'https://i.postimg.cc/8k4h4K7y/placeholder.jpg';return`https://image.tmdb.org/t/p/${size}${path}`}
function generarEnlaceUnlimplay(tmdb_id,tipo,temporada=1,capitulo=1){return`https://unlimplay.com/play/embed/tv/${tmdb_id}/${temporada}/${capitulo}?lang=es-MX&autoplay=1&controls=1&logo=0`}
function mostrarToast(msg,tipo='success'){const colores={success:'#10B981',warning:'#F59E0B',error:'#EF4444',info:'#3B82F6'};const t=document.createElement('div');t.style.cssText=`position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:${colores[tipo]||'#10B981'};color:#fff;padding:10px 20px;border-radius:10px;z-index:9999;font-weight:600;max-width:90%;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:opacity .3s;`;t.textContent=msg;document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300)},2500)}
async function fetchTMDB(path,params={}){const q=new URLSearchParams({path,...params});const res=await fetch(`https://tely-xi.vercel.app/api/tmdb?${q}`);if(!res.ok)throw new Error(`Error ${res.status}`);return res.json()}

function toggleFavorito(item){if(!auth.currentUser){window.location.href='login.html';return}const uid=auth.currentUser.uid;const ref=db.ref(`usuarios/${uid}/favoritos/${item.id}`);ref.once('value').then(s=>{if(s.exists()){ref.remove();mostrarToast('🗑️ Eliminado','warning')}else{ref.set({id:item.id,titulo:item.titulo,tipo:'serie',portada:item.portada,tmdb_id:item.tmdb_id});mostrarToast('❤️ Agregado','success')}})}
function toggleMiLista(item){if(!auth.currentUser){window.location.href='login.html';return}const uid=auth.currentUser.uid;const ref=db.ref(`usuarios/${uid}/milista/${item.id}`);ref.once('value').then(s=>{if(s.exists()){ref.remove();mostrarToast('🗑️ Eliminado','warning')}else{ref.set({id:item.id,titulo:item.titulo,tipo:'serie',portada:item.portada,tmdb_id:item.tmdb_id});mostrarToast('📝 Agregado','success')}})}

function crearTarjeta(item){const div=document.createElement('div');div.className='movie-card';const itemStr=JSON.stringify(item).replace(/"/g,"'");div.innerHTML=`
<span class="badge-year">${item.anio||'N/D'}</span>
<span class="badge-type">📺</span>
<img src="${item.portada}" class="poster" loading="lazy" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg'">
<div class="info"><h4>${item.titulo}</h4><div class="meta"><span>⭐ ${item.puntuacion||'N/A'}</span></div>
<div class="card-actions">
<button class="fav-btn" onclick="event.stopPropagation();toggleFavorito(${itemStr})"><i class="fas fa-heart"></i></button>
<button class="list-btn" onclick="event.stopPropagation();toggleMiLista(${itemStr})"><i class="fas fa-plus-circle"></i></button>
</div></div>`;
div.onclick=()=>{if(auth.currentUser){const p=new URLSearchParams();p.set('play',item.tmdb_id||item.id);p.set('tipo','serie');window.location.href=`reproductor.html?${p}`}else{window.location.href='login.html'}};return div}

async function cargarSeries(page=1){if(cargando||page>totalPaginas&&page>1)return;cargando=true;const grid=document.getElementById('listaSeries');const btn=document.getElementById('btnMas');btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Cargando...';if(page===1){grid.innerHTML='';for(let i=0;i<12;i++){const sk=document.createElement('div');sk.className='skeleton';grid.appendChild(sk)}}try{const data=await fetchTMDB('tv/popular',{page});totalPaginas=data.total_pages||1;if(page===1)grid.innerHTML='';if(!data.results||!data.results.length){if(page===1)grid.innerHTML='<p class="empty-msg">No hay series</p>';btn.style.display='none';cargando=false;return}const snap=await db.ref('series_personalizadas').once('value');const adminData=snap.val()||{};const adminMap={};Object.values(adminData).forEach(i=>{adminMap[i.tmdb_id]=i});data.results.forEach(s=>{const a=adminMap[s.id];const item={id:s.id,tmdb_id:s.id,titulo:a?.titulo||s.name||'Sin título',anio:a?.anio||(s.first_air_date?s.first_air_date.split('-')[0]:'N/D'),portada:a?.portada||getImagenUrl(s.poster_path,'w342'),puntuacion:a?.puntuacion||(s.vote_average?s.vote_average.toFixed(1):'N/A')};grid.appendChild(crearTarjeta(item))});paginaActual=page;if(page>=totalPaginas){btn.style.display='none'}else{btn.style.display='flex';btn.disabled=false;btn.innerHTML='<i class="fas fa-plus"></i> Cargar más'}}catch(e){console.error(e);btn.innerHTML='⚠️ Error';btn.disabled=false}cargando=false}
window.cargarMasSeries=function(){if(!cargando){paginaActual++;cargarSeries(paginaActual)}};

const mainContent=document.querySelector('.main-content');
mainContent.addEventListener('scroll',function(){const st=mainContent.scrollTop;const sh=mainContent.scrollHeight;const ch=mainContent.clientHeight;if(st+ch>=sh-100){const btn=document.getElementById('btnMas');if(btn.style.display!=='none'&&!cargando){window.cargarMasSeries()}}});

window.buscarGlobal=async function(){const input=document.getElementById('searchInput');const texto=input.value.trim();const grid=document.getElementById('listaSeries');if(!texto){cargarSeries(1);return}clearTimeout(timeoutBusqueda);timeoutBusqueda=setTimeout(async()=>{try{const data=await fetchTMDB('search/tv',{query:texto,page:1});grid.innerHTML='';if(!data.results||!data.results.length){grid.innerHTML=`<p class="empty-msg">🔍 No se encontraron resultados para "${texto}"</p>`;document.getElementById('btnMas').style.display='none';return}data.results.slice(0,20).forEach(s=>{const item={id:s.id,tmdb_id:s.id,titulo:s.name||'Sin título',anio:s.first_air_date?s.first_air_date.split('-')[0]:'N/D',portada:getImagenUrl(s.poster_path,'w342'),puntuacion:s.vote_average?s.vote_average.toFixed(1):'N/A'};grid.appendChild(crearTarjeta(item))});document.getElementById('btnMas').style.display='none'}catch(e){console.error(e)}},300)};

cargarSeries(1);
console.log('✅ Series - Carga rápida + buscador en grid');
</script>
</body>
</html>
