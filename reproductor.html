<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TELY 🎬 - Reproductor</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="apple-touch-icon" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow-x:hidden;background:#0A0A0F}
        body{background:#0A0A0F;color:#fff;font-family:'Segoe UI',Roboto,sans-serif;min-height:100vh;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
        ::-webkit-scrollbar{display:none}
        
        .main-content{width:100%;height:100%;padding:.3rem .5rem;overflow-y:auto;margin:0 auto;max-width:600px}
        .header-flotante{position:sticky;top:0;z-index:50;background:rgba(10,10,15,.92);backdrop-filter:blur(12px);padding:.3rem .3rem .4rem;border-bottom:1px solid rgba(124,58,237,.1)}
        .top-header{display:flex;justify-content:space-between;align-items:center;padding:.1rem 0 .2rem;flex-wrap:wrap;gap:.3rem}
        .top-header h1{font-size:1rem;font-weight:700;background:linear-gradient(135deg,#7C3AED,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .top-actions{display:flex;align-items:center;gap:.5rem}
        .theme-btn{background:rgba(255,255,255,.05);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;transition:.3s;display:flex;align-items:center;justify-content:center}
        .theme-btn:hover{background:rgba(255,255,255,.1)}
        .back-btn{background:rgba(255,255,255,.05);border:none;color:#94A3B8;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;transition:.3s;display:flex;align-items:center;justify-content:center}
        .back-btn:hover{background:rgba(255,255,255,.1)}
        .btn-fullscreen{background:rgba(255,255,255,.06);border:1px solid rgba(124,58,237,.15);color:#fff;padding:.25rem .6rem;border-radius:6px;font-weight:600;font-size:.65rem;cursor:pointer;transition:.3s;display:flex;align-items:center;gap:.2rem}
        .btn-fullscreen:hover{background:rgba(255,255,255,.1);border-color:#7C3AED}
        .player-wrapper{position:relative;background:#000;border-radius:12px;overflow:hidden;aspect-ratio:16/9;width:100%;margin:.2rem 0;min-height:220px}
        .player-wrapper iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;background:#000}
        .info-top{padding:.2rem 0 .1rem}
        .info-top h1{font-size:1.2rem;font-weight:700;color:#fff;background:linear-gradient(135deg,#7C3AED,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .info-top .meta{color:#94A3B8;font-size:.7rem;display:flex;gap:.6rem;flex-wrap:wrap;margin:.05rem 0}
        .info-top .meta .rating{color:#FBBF24;font-weight:700}
        .sinopsis{color:#94A3B8;font-size:.7rem;line-height:1.4;margin-top:.05rem}
        .player-controls{display:flex;gap:.3rem;flex-wrap:wrap;margin:.2rem 0}
        .btn-opcion{background:rgba(124,58,237,.2);border:1px solid #7C3AED;color:#fff;padding:.25rem .8rem;border-radius:6px;font-weight:600;font-size:.65rem;cursor:pointer}
        .btn-recargar{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.2);color:#34D399;padding:.25rem .7rem;border-radius:6px;font-weight:600;font-size:.65rem;cursor:pointer;transition:.3s}
        .btn-recargar:hover{background:rgba(16,185,129,.25)}
        .btn-nueva-ventana{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);color:#EF4444;padding:.25rem .7rem;border-radius:6px;font-weight:600;font-size:.65rem;cursor:pointer;transition:.3s}
        .btn-nueva-ventana:hover{background:rgba(239,68,68,.15)}
        .error-video{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:#0A0A0F;color:#EF4444;gap:.5rem;text-align:center;padding:.5rem}
        .error-video i{font-size:2.5rem}
        .error-video .sub{color:#64748B;font-size:.7rem}
        .episodios-section{margin-top:.3rem;background:rgba(255,255,255,.02);border-radius:12px;padding:.4rem .5rem;border:1px solid rgba(124,58,237,.06)}
        .episodios-section .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.2rem;flex-wrap:wrap;gap:.2rem}
        .episodios-section .section-header h3{font-size:.75rem;font-weight:700;color:#fff;display:flex;align-items:center;gap:.3rem}
        .episodios-section .section-header .temp-selector{display:flex;align-items:center;gap:.3rem}
        .episodios-section .section-header .temp-selector select{background:rgba(255,255,255,.06);color:#fff;border:1px solid rgba(124,58,237,.15);border-radius:6px;padding:.1rem .4rem;font-size:.65rem;font-weight:600;cursor:pointer;outline:none}
        .episodios-list{display:flex;flex-direction:column;gap:.2rem;max-height:250px;overflow-y:auto;padding-right:.1rem}
        .episodio-item{display:flex;flex-direction:column;padding:.2rem .3rem .15rem;background:rgba(255,255,255,.02);border-radius:6px;cursor:pointer;border:1px solid transparent;transition:.2s}
        .episodio-item:hover{background:rgba(255,255,255,.04)}
        .episodio-item.activo{border-color:#7C3AED;background:rgba(124,58,237,.06)}
        .episodio-item .top{display:flex;align-items:center;gap:.3rem;flex-wrap:wrap}
        .episodio-item .top .numero{font-size:.55rem;color:#A78BFA;font-weight:700}
        .episodio-item .top .titulo{font-size:.6rem;color:#E2E8F0;font-weight:500;flex:1}
        .episodio-item .sinopsis{font-size:.5rem;color:#64748B;margin-top:.03rem;padding-left:1.2rem;line-height:1.2}
        @media(max-width:480px){}
        body:fullscreen .header-flotante{display:none!important}
        body:fullscreen .main-content{padding:0!important;max-width:100%!important}
        body:fullscreen .player-wrapper{border-radius:0!important;aspect-ratio:auto!important;height:100vh!important;width:100vw!important;margin:0!important}
        body:fullscreen .info-top,body:fullscreen .player-controls,body:fullscreen .episodios-section{display:none!important}
    </style>
</head>
<body>

<main class="main-content">
    <div class="header-flotante">
        <div class="top-header">
            <h1><i class="fas fa-play"></i> TELY</h1>
            <div class="top-actions">
                <button class="back-btn" onclick="volverAlIndex()"><i class="fas fa-arrow-left"></i></button>
                <button class="theme-btn" onclick="toggleTheme()" id="themeBtn"><i class="fas fa-moon"></i></button>
                <button class="btn-fullscreen" onclick="toggleFullscreen()"><i class="fas fa-expand"></i></button>
            </div>
        </div>
    </div>

    <div class="info-top">
        <h1 id="playerTitulo">Cargando...</h1>
        <div class="meta">
            <span id="playerAnio">-</span>
            <span class="rating">⭐ <span id="playerRating">-</span></span>
            <span id="playerGenero">-</span>
            <span id="playerTipo" style="color:#A78BFA;">🎬</span>
        </div>
        <div class="sinopsis" id="playerSinopsis">Cargando información...</div>
    </div>

    <div class="player-wrapper" id="playerWrapper"></div>

    <div class="player-controls" id="playerControls">
        <button class="btn-opcion" disabled><i class="fas fa-play"></i> Unlimplay Latino</button>
        <button class="btn-recargar" onclick="recargarVideo()"><i class="fas fa-rotate"></i></button>
        <button class="btn-nueva-ventana" onclick="abrirNuevaVentana()"><i class="fas fa-external-link-alt"></i></button>
    </div>

    <div class="episodios-section" id="episodiosSection" style="display:none;">
        <div class="section-header">
            <h3><i class="fas fa-list"></i> Episodios</h3>
            <div class="temp-selector">
                <select id="tempSelect" onchange="cambiarTempSelect()"></select>
            </div>
        </div>
        <div class="episodios-list" id="episodiosList"></div>
    </div>
</main>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyBPBDEVUR7hjNrxCYrefF9Sbl0Wofp3VoQ",
    authDomain: "telyx-23210.firebaseapp.com",
    projectId: "telyx-23210",
    storageBucket: "telyx-23210.firebasestorage.app",
    messagingSenderId: "10164285015",
    appId: "1:10164285015:web:5cf32bd2831de126c67d12"
};
firebase.initializeApp(firebaseConfig);

const params = new URLSearchParams(window.location.search);
let tmdbId = params.get('play')?.replace('tmdb_', '');
const tipo = params.get('tipo') || 'pelicula';
const tempRestaurar = parseInt(params.get('temp')) || 1;
const capRestaurar = parseInt(params.get('cap')) || 1;

let urlActual = null;
let temporadasActuales = [];
let tempActualIndex = 0;

// ============================================================
// SOLO UNLIMPLAY - FORMATO EXACTO PARA DETECTAR SERVIDORES
// ============================================================
function generarEnlaceUnlimplay(tmdb_id, tipo, temporada = 1, capitulo = 1) {
    if (!tmdb_id) return null;
    const marca = Date.now();
    if (tipo === 'pelicula') {
        return `https://unlimplay.com/play/movie/${tmdb_id}?ref=tely&lang=es-MX&audio=latino&noads=1&_=${marca}`;
    } else {
        return `https://unlimplay.com/play/tv/${tmdb_id}/${temporada}/${capitulo}?ref=tely&lang=es-MX&audio=latino&noads=1&_=${marca}`;
    }
}

function reproducirDirecto(url) {
    const wrapper = document.getElementById('playerWrapper');
    if (!url) {
        wrapper.innerHTML = `<div class="error-video"><i class="fas fa-video-slash"></i><span>Sin enlace</span></div>`;
        return;
    }
    urlActual = url;
    const iframe = Object.assign(document.createElement('iframe'), {
        src: url,
        frameBorder: '0',
        allow: 'autoplay; encrypted-media; picture-in-picture; fullscreen',
        allowFullScreen: true,
        style: 'width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;'
    });
    wrapper.innerHTML = '';
    wrapper.appendChild(iframe);
}

async function fetchTMDB(path, params = {}) {
    const q = new URLSearchParams({ path, ...params });
    const res = await fetch(`https://tely-xi.vercel.app/api/tmdb?${q}`);
    if (!res.ok) throw new Error(`Error TMDB: ${res.status}`);
    return res.json();
}

async function cargarPelicula() {
    try {
        urlActual = generarEnlaceUnlimplay(tmdbId, 'pelicula');
        reproducirDirecto(urlActual);

        const data = await fetchTMDB(`movie/${tmdbId}`);
        if (data?.id) {
            document.getElementById('playerTitulo').textContent = data.title || 'Sin título';
            document.getElementById('playerAnio').textContent = data.release_date?.split('-')[0] || 'N/D';
            document.getElementById('playerRating').textContent = data.vote_average?.toFixed(1) || 'N/A';
            document.getElementById('playerGenero').textContent = data.genres?.map(g => g.name).join(', ') || 'Película';
            document.getElementById('playerSinopsis').textContent = data.overview || 'Sin sinopsis';
        }
    } catch(e) { console.error('Error:', e); }
}

async function cargarSerie() {
    try {
        const data = await fetchTMDB(`tv/${tmdbId}`);
        if (!data?.id) throw new Error('Serie no encontrada');
        
        document.getElementById('playerTitulo').textContent = data.name || 'Sin título';
        document.getElementById('playerAnio').textContent = data.first_air_date?.split('-')[0] || 'N/D';
        document.getElementById('playerRating').textContent = data.vote_average?.toFixed(1) || 'N/A';
        document.getElementById('playerGenero').textContent = data.genres?.map(g => g.name).join(', ') || 'Serie';
        document.getElementById('playerSinopsis').textContent = data.overview || 'Sin sinopsis';

        temporadasActuales = [];
        const numTemps = Math.min(data.number_of_seasons || 1, 10);
        for (let t = 1; t <= numTemps; t++) {
            const seasonData = await fetchTMDB(`tv/${tmdbId}/season/${t}`);
            if (seasonData?.episodes) {
                temporadasActuales.push({
                    numero: t,
                    capitulos: seasonData.episodes.map(ep => ({
                        numero: ep.episode_number,
                        titulo: ep.name || `Capítulo ${ep.episode_number}`,
                        sinopsis: ep.overview || 'Sin sinopsis'
                    }))
                });
            }
        }

        if (temporadasActuales.length) {
            document.getElementById('episodiosSection').style.display = 'block';
            const select = document.getElementById('tempSelect');
            select.innerHTML = '';
            temporadasActuales.forEach((t, idx) => {
                const opt = document.createElement('option');
                opt.value = idx;
                opt.textContent = `Temporada ${t.numero}`;
                select.appendChild(opt);
            });

            const tempIndex = Math.max(0, Math.min(tempRestaurar - 1, temporadasActuales.length - 1));
            tempActualIndex = tempIndex;
            select.value = tempIndex;
            const temp = temporadasActuales[tempIndex];
            const capIndex = Math.max(0, Math.min(capRestaurar - 1, temp.capitulos.length - 1));
            const cap = temp.capitulos[capIndex];

            urlActual = generarEnlaceUnlimplay(tmdbId, 'serie', temp.numero, cap.numero);
            reproducirDirecto(urlActual);
            mostrarEpisodios(tempIndex, capIndex);
        }
    } catch(e) { console.error('Error serie:', e); }
}

function mostrarEpisodios(tempIndex, capSeleccionado = 0) {
    const temp = temporadasActuales[tempIndex];
    const container = document.getElementById('episodiosList');
    container.innerHTML = '';
    temp.capitulos.forEach((cap, idx) => {
        const d = Object.assign(document.createElement('div'), {
            className: `episodio-item ${idx === capSeleccionado ? 'activo' : ''}`
        });
        d.innerHTML = `
            <div class="top">
                <span class="numero">${cap.numero}.</span>
                <span class="titulo">${cap.titulo}</span>
            </div>
            <div class="sinopsis">${cap.sinopsis}</div>
        `;
        d.onclick = () => {
            document.querySelectorAll('.episodio-item').forEach(el => el.classList.remove('activo'));
            d.classList.add('activo');
            urlActual = generarEnlaceUnlimplay(tmdbId, 'serie', temp.numero, cap.numero);
            reproducirDirecto(urlActual);
        };
        container.appendChild(d);
    });
}

function cambiarTempSelect() {
    tempActualIndex = parseInt(document.getElementById('tempSelect').value);
    mostrarEpisodios(tempActualIndex, 0);
    const temp = temporadasActuales[tempActualIndex];
    urlActual = generarEnlaceUnlimplay(tmdbId, 'serie', temp.numero, temp.capitulos[0].numero);
    reproducirDirecto(urlActual);
}

function recargarVideo() { urlActual && reproducirDirecto(urlActual); }
function abrirNuevaVentana() { urlActual && window.open(urlActual, '_blank'); }
function volverAlIndex() { window.location.href = 'index.html'; }
function toggleTheme() { document.body.classList.toggle('dark'); }
function toggleFullscreen() {
    const w = document.getElementById('playerWrapper');
    document.fullscreenElement ? document.exitFullscreen() : w.requestFullscreen?.();
}

if (tmdbId) {
    tipo === 'pelicula' ? cargarPelicula() : cargarSerie();
}
</script>
</body>
</html>
