    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;background:#0A0A0F}
        body{background:#0A0A0F;color:#fff;font-family:'Segoe UI',Roboto,sans-serif;min-height:100vh;transition:background 0.3s, color 0.3s;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
        ::-webkit-scrollbar{display:none}
        body.dark{background:#0A0A0F;color:#fff}
        body:not(.dark){background:#f0f0f0;color:#111}
        
        .main-content{width:100%;height:100vh;padding:.3rem .5rem;overflow-y:auto;margin:0 auto;max-width:600px}
        
        .header-flotante{
            position:sticky;
            top:0;
            z-index:50;
            background:rgba(10,10,15,.92);
            backdrop-filter:blur(12px);
            padding:.3rem .3rem .4rem;
            border-bottom:1px solid rgba(124,58,237,.1);
        }
        body:not(.dark) .header-flotante{
            background:rgba(240,240,240,.92);
            border-bottom-color:rgba(0,0,0,.08);
        }
        
        .top-header{display:flex;justify-content:space-between;align-items:center;padding:.1rem 0 .2rem;flex-wrap:wrap;gap:.3rem}
        .top-header h1{font-size:1rem;font-weight:700;background:linear-gradient(135deg,#7C3AED,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .top-actions{display:flex;align-items:center;gap:.5rem}
        
        .theme-btn{background:rgba(255,255,255,.05);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;transition:.3s;display:flex;align-items:center;justify-content:center}
        .theme-btn:hover{background:rgba(255,255,255,.1)}
        body:not(.dark) .theme-btn{background:rgba(0,0,0,.05);color:#111}
        body:not(.dark) .theme-btn:hover{background:rgba(0,0,0,.1)}
        
        .user-btn{background:rgba(124,58,237,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;transition:.3s;display:flex;align-items:center;justify-content:center}
        .user-btn:hover{background:rgba(124,58,237,.3)}
        body:not(.dark) .user-btn{color:#111}
        
        .back-btn{background:rgba(255,255,255,.05);border:none;color:#94A3B8;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;transition:.3s;display:flex;align-items:center;justify-content:center}
        .back-btn:hover{background:rgba(255,255,255,.1)}
        body:not(.dark) .back-btn{background:rgba(0,0,0,.05);color:#555}
        
        /* ⭐ INFO DE LA PELÍCULA */
        .info-top{padding:.2rem 0 .3rem}

            font-size:1.1rem;

            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }
        .info-top .meta{color:#94A3B8;font-size:.7rem;display:flex;gap:.6rem;flex-wrap:wrap}
        .info-top .sinopsis{color:#94A3B8;font-size:.7rem;line-height:1.3;margin-top:.1rem}
        body:not(.dark) .info-top h1{color:#7C3AED;-webkit-text-fill-color:#7C3AED}
        
        /* ⭐ REPRODUCTOR */
        .player-wrapper{position:relative;background:#000;border-radius:8px;overflow:hidden;aspect-ratio:16/9;width:100%;margin:.2rem 0}
        .player-wrapper iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;background:#000}

        .capitulo-item{display:flex;flex-direction:column;padding:.15rem .4rem;background:rgba(255,255,255,.03);border-radius:4px;cursor:pointer;border:1px solid transparent;transition:.2s}
        .capitulo-item:hover{background:rgba(255,255,255,.06)}
        .capitulo-item.activo{background:rgba(124,58,237,.12);border-color:#7C3AED}
        .capitulo-item.sin-enlace{opacity:.4;cursor:not-allowed}

        .capitulo-item .numero{font-size:.55rem;color:#A78BFA;font-weight:700;min-width:20px}

        .user-dropdown{position:absolute;right:0;top:calc(100% + 6px);background:rgba(26,26,46,.95);border-radius:8px;width:160px;border:1px solid rgba(124,58,237,.15);padding:.2rem 0;display:none;z-index:60;box-shadow:0 20px 60px rgba(0,0,0,.5)}

<script>

// ⭐ PANTALLA COMPLETA
document.addEventListener('DOMContentLoaded', function() {

// ⭐ BOTÓN ATRÁS - VA AL INDEX
history.pushState(null, '', window.location.href);
window.addEventListener('popstate', function(e) {
    window.location.href = 'index.html';

// ⭐ AUTENTICACIÓN
function irALogin() { window.location.href = 'login.html'; }
function cerrarSesion() { auth.signOut().then(() => { window.location.href = 'index.html'; }); }
function toggleUserMenu() { document.getElementById('userDropdown').classList.toggle('show'); }
document.addEventListener('click', (e) => {
    const menu = document.getElementById('userDropdown');
    if (menu && !e.target.closest('.user-menu')) menu.classList.remove('show');

auth.onAuthStateChanged(user => {

// ⭐ MODO OSCURO
function toggleTheme() {
    const body = document.body;
    const btn = document.getElementById('themeBtn');
    if (body.classList.contains('dark')) { 
        body.classList.remove('dark'); 
        btn.innerHTML = '<i class="fas fa-moon"></i>'; 
        localStorage.setItem('theme', 'light'); 
    } else { 
        body.classList.add('dark'); 
        btn.innerHTML = '<i class="fas fa-sun"></i>'; 
        localStorage.setItem('theme', 'dark'); 
    }
}
if (localStorage.getItem('theme') === 'light') { 
    document.body.classList.remove('dark'); 
    document.getElementById('themeBtn').innerHTML = '<i class="fas fa-moon"></i>'; 
} else { 
    document.body.classList.add('dark'); 
    document.getElementById('themeBtn').innerHTML = '<i class="fas fa-sun"></i>'; 
}

// ⭐ FUNCIONES DE ENLACES
function generarEnlaceUnlimplay(tmdb_id, tipo, temporada = 1, capitulo = 1) {
    if (tipo === 'pelicula') {
        return `https://unlimplay.com/play/embed/movie/${tmdb_id}?lang=es-MX&autoplay=1&controls=1&logo=0`;
    } else {
        return `https://unlimplay.com/play/embed/tv/${tmdb_id}/${temporada}/${capitulo}?lang=es-MX&autoplay=1&controls=1&logo=0`;
    }
}

function getImagenUrl(path, size = 'w342') {
    if (!path) return 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg';
    return `https://image.tmdb.org/t/p/${size}${path}`;
}

function mostrarToast(msg, tipo = 'success') {
    const colores = { success: '#10B981', warning: '#F59E0B', error: '#EF4444', info: '#3B82F6' };
    const t = document.createElement('div');
    t.style.cssText = `position:fixed;bottom:65px;left:50%;transform:translateX(-50%);background:${colores[tipo] || '#10B981'};color:#fff;padding:6px 14px;border-radius:8px;z-index:9999;font-weight:600;font-size:.7rem;max-width:90%;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:opacity 0.3s;`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2000);
}

async function fetchTMDB(path, params = {}) {
    const queryParams = new URLSearchParams();
    queryParams.append('path', path);
    Object.keys(params).forEach(key => queryParams.append(key, params[key]));
    const url = `https://tely-xi.vercel.app/api/tmdb?${queryParams.toString()}`;
    const response = await fetch(url);
    if (!response.ok) throw new Error(`Error: ${response.status}`);
    return response.json();
}

// ⭐ VARIABLES
const params = new URLSearchParams(window.location.search);
let tmdbId = params.get('play');
if (tmdbId && typeof tmdbId === 'string' && tmdbId.startsWith('tmdb_')) {
    tmdbId = tmdbId.replace('tmdb_', '');
}
const tipo = params.get('tipo') || 'pelicula';
const tempRestaurar = params.get('temp') ? parseInt(params.get('temp')) : null;
const capRestaurar = params.get('cap') ? parseInt(params.get('cap')) : null;

let peliculaActual = null;
let temporadasActuales = [];
let tempActualIndex = 0;
let opcionActiva = 1;
let urlActual = null;
let urlOp1 = null;
let urlOp2 = null;
let reproduciendo = false;

// ⭐ REPRODUCIR
function reproducir(url) {
    if (reproduciendo && urlActual === url) return;
    reproduciendo = true;
    
    const wrapper = document.getElementById('playerWrapper');
    urlActual = url;
    
    let finalUrl = url;
    if (finalUrl.includes('unlimplay.com')) {
        if (!finalUrl.includes('autoplay')) {
            finalUrl += finalUrl.includes('?') ? '&autoplay=1&controls=1&logo=0' : '?autoplay=1&controls=1&logo=0';
        }
        if (finalUrl.includes('unlimplay.com/play/') && !finalUrl.includes('unlimplay.com/play/embed/')) {
            finalUrl = finalUrl.replace('unlimplay.com/play/', 'unlimplay.com/play/embed/');
        }
        finalUrl += '&t=' + Date.now();
    } else {
        finalUrl += (finalUrl.includes('?') ? '&' : '?') + 't=' + Date.now();
    }
    
    wrapper.innerHTML = `
        <div class="loading-spinner">
            <i class="fas fa-spinner"></i>
            <span style="font-size:.7rem;">Cargando video...</span>
        </div>
    `;
    
    const iframe = document.createElement('iframe');
    iframe.src = finalUrl;
    iframe.frameborder = "0";
    iframe.referrerpolicy = "no-referrer-when-downgrade";
    iframe.allow = "autoplay; encrypted-media; picture-in-picture; fullscreen";
    iframe.allowfullscreen = true;
    iframe.style.cssText = "width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;";
    iframe.loading = "eager";
    
    iframe.onload = function() {
        const spinner = wrapper.querySelector('.loading-spinner');
        if (spinner) spinner.style.display = 'none';
        reproduciendo = false;
    };
    
    setTimeout(() => {
        const spinner = wrapper.querySelector('.loading-spinner');
        if (spinner) spinner.style.display = 'none';
        reproduciendo = false;
    }, 8000);
    
    wrapper.appendChild(iframe);
}

// ⭐ CARGAR CONTENIDO
async function cargarContenidoReproductor() {
    const wrapper = document.getElementById('playerWrapper');
    wrapper.innerHTML = `<div class="loading-spinner"><i class="fas fa-spinner"></i><span>Cargando...</span></div>`;
    
    try {
        const dbRef = db.ref();
        const [pSnap, sSnap] = await Promise.all([
            dbRef.child('contenido_personalizado').once('value'),
            dbRef.child('series_personalizadas').once('value')
        ]);
        const pelis = pSnap.val() ? Object.values(pSnap.val()) : [];
        const series = sSnap.val() ? Object.values(sSnap.val()) : [];
        const contenido = [...pelis.map(p => ({ ...p, tipo: 'pelicula' })), ...series.map(s => ({ ...s, tipo: 'serie' }))];
        
        let item = contenido.find(c => c.tmdb_id == tmdbId);
        
        if (!item && tmdbId) {
            if (tipo === 'pelicula') {
                const data = await fetchTMDB(`movie/${tmdbId}`);
                if (data && data.id) {
                    item = {
                        titulo: data.title || `Película ${tmdbId}`,
                        anio: data.release_date ? data.release_date.split('-')[0] : 'N/D',
                        sinopsis: data.overview || 'Sin sinopsis',
                        portada: getImagenUrl(data.poster_path, 'w342'),
                        genero: data.genres ? data.genres.map(g => g.name).join(', ') : 'Película',
                        tipo: 'pelicula',
                        tmdb_id: data.id,
                        puntuacion: data.vote_average ? data.vote_average.toFixed(1) : 'N/A',
                        url: generarEnlaceUnlimplay(data.id, 'pelicula')
                    };
                    await dbRef.child('contenido_personalizado').push(item);
                }
            } else {
                const data = await fetchTMDB(`tv/${tmdbId}`);
                if (data && data.id) {
                    const temporadas = [];
                    for (let t = 1; t <= Math.min(data.number_of_seasons || 1, 10); t++) {
                        try {
                            const seasonData = await fetchTMDB(`tv/${tmdbId}/season/${t}`);
                            if (!seasonData || !seasonData.episodes) continue;
                            const capitulos = seasonData.episodes.map(ep => ({
                                numero: ep.episode_number,
                                titulo: ep.name || `Capítulo ${ep.episode_number}`,
                                sinopsis: ep.overview || 'Sin sinopsis',
                                url: generarEnlaceUnlimplay(data.id, 'serie', t, ep.episode_number)
                            }));
                            temporadas.push({ numero: t, nombre: seasonData.name || `Temporada ${t}`, capitulos });
                        } catch(e) {}
                    }
                    if (temporadas.length > 0) {
                        item = {
                            titulo: data.name || `Serie ${tmdbId}`,
                            anio: data.first_air_date ? data.first_air_date.split('-')[0] : 'N/D',
                            sinopsis: data.overview || 'Sin sinopsis',
                            portada: getImagenUrl(data.poster_path, 'w342'),
                            genero: data.genres ? data.genres.map(g => g.name).join(', ') : 'Serie',
                            tipo: 'serie',
                            tmdb_id: data.id,
                            puntuacion: data.vote_average ? data.vote_average.toFixed(1) : 'N/A',
                            temporadas: temporadas,
                            url: generarEnlaceUnlimplay(data.id, 'serie', 1, 1)
                        };
                        await dbRef.child('series_personalizadas').push(item);
                    }
                }
            }
        }
        
        if (item) {
            peliculaActual = item;
            cargarReproductor(item, tempRestaurar, capRestaurar);
        } else {
            wrapper.innerHTML = `<div class="error-video"><i class="fas fa-exclamation-triangle"></i><span>Contenido no encontrado</span><span class="sub">ID: ${tmdbId}</span></div>`;
        }
    } catch(e) {
        wrapper.innerHTML = `<div class="error-video"><i class="fas fa-exclamation-triangle"></i><span>Error: ${e.message}</span></div>`;
    }
}

function cargarReproductor(peli, tempRestaurar = null, capRestaurar = null) {
    peliculaActual = peli;
    
    document.getElementById('playerTitulo').textContent = peli.titulo;
    document.getElementById('playerAnio').textContent = peli.anio || 'N/D';
    document.getElementById('playerRating').textContent = peli.puntuacion || 'N/A';
    document.getElementById('playerGenero').textContent = peli.genero || (peli.tipo === 'serie' ? 'Serie' : 'Película');
    document.getElementById('playerSinopsis').textContent = peli.sinopsis || 'Sin sinopsis';
    document.getElementById('playerTipo').textContent = peli.tipo === 'serie' ? '📺 Serie' : '🎬 Película';
    document.getElementById('playerTipo').style.color = peli.tipo === 'serie' ? '#10B981' : '#A78BFA';
    
    if (peli.tipo === 'serie' && peli.temporadas && peli.temporadas.length) {
        temporadasActuales = peli.temporadas;
        document.getElementById('capitulosSection').style.display = 'block';
        
        let tempIndex = 0, capIndex = 0;
        if (tempRestaurar !== null && capRestaurar !== null) {
            tempIndex = Math.min(tempRestaurar, temporadasActuales.length - 1);
            const temp = temporadasActuales[tempIndex];
            if (temp && temp.capitulos) capIndex = Math.min(capRestaurar, temp.capitulos.length - 1);
        }
        
        mostrarTemporada(tempIndex, capIndex);
        const pc = obtenerCapitulo(tempIndex, 0);
        
        if (pc) {
            urlOp1 = pc.url;
            if (urlOp1) {
                reproducir(urlOp1);
                document.getElementById('btnOp1').classList.add('active');
                document.getElementById('btnOp2').classList.remove('active');
                opcionActiva = 1;
            }
        }
        cargarRecomendaciones(peli.tmdb_id);
    } else {
        document.getElementById('capitulosSection').style.display = 'none';
        urlOp1 = peli.url || generarEnlaceUnlimplay(peli.tmdb_id, 'pelicula');
        
        if (urlOp1) {
            reproducir(urlOp1);
            document.getElementById('btnOp1').classList.add('active');
            document.getElementById('btnOp2').classList.remove('active');
            opcionActiva = 1;
        } else {
            document.getElementById('playerWrapper').innerHTML = `
                <div class="error-video"><i class="fas fa-link"></i><span>No hay enlaces disponibles</span></div>
            `;
        }
        cargarRecomendaciones(peli.tmdb_id);
    }
}

function obtenerCapitulo(tempIdx, capIdx) {
    if (!temporadasActuales || !temporadasActuales.length) return null;
    const t = temporadasActuales[tempIdx];
    if (!t || !t.capitulos || !t.capitulos.length) return null;
    return t.capitulos[capIdx] || null;
}

function mostrarTemporada(index, capSeleccionado = 0) {
    if (!temporadasActuales || !temporadasActuales.length) return;
    if (index < 0) index = 0;
    if (index >= temporadasActuales.length) index = temporadasActuales.length - 1;
    tempActualIndex = index;
    const temp = temporadasActuales[index];
    const container = document.getElementById('capitulosList');
    const label = document.getElementById('tempActual');
    label.textContent = `Temporada ${temp.numero || index + 1}`;
    container.innerHTML = '';
    document.getElementById('tempPrev').disabled = index === 0;
    document.getElementById('tempNext').disabled = index === temporadasActuales.length - 1;
    if (!temp.capitulos || !temp.capitulos.length) {
        container.innerHTML = '<p style="color:#64748B;padding:.2rem;text-align:center;font-size:.7rem;">Sin capítulos</p>';
        return;
    }
    temp.capitulos.forEach((cap, idx) => {
        const d = document.createElement('div');
        d.className = 'capitulo-item';
        if (idx === capSeleccionado) d.classList.add('activo');
        if (!cap.url) d.classList.add('sin-enlace');
        d.dataset.index = idx;
        d.innerHTML = `
            <div class="top">
                <span class="numero">Cap ${cap.numero || idx + 1}</span>
                <span class="titulo">${cap.titulo || 'Capítulo ' + (idx + 1)}</span>
                ${cap.url ? `<span class="play">▶</span>` : '<span style="color:#EF4444;font-size:.45rem;">🔒</span>'}
            </div>
            ${cap.sinopsis ? `<div class="sinopsis">${cap.sinopsis}</div>` : ''}
        `;
        d.onclick = () => {
            if (cap.url) {
                document.querySelectorAll('.capitulo-item').forEach(el => el.classList.remove('activo'));
                d.classList.add('activo');
                urlOp1 = cap.url;
                reproducir(cap.url);
            } else {
                mostrarToast('❌ Este capítulo no tiene enlace', 'error');
            }
        };
        container.appendChild(d);
    });
}

function cambiarTemp(dir) {
    const n = tempActualIndex + dir;
    if (n >= 0 && n < temporadasActuales.length) {
        mostrarTemporada(n, 0);
        const c = obtenerCapitulo(n, 0);
        if (c?.url) {
            urlOp1 = c.url;
            reproducir(c.url);
        }
    }
}

async function cargarRecomendaciones(tmdbId) {
    const container = document.getElementById('recomendaciones');
    container.innerHTML = '<p style="color:#64748B;font-size:.6rem;">Cargando...</p>';
    if (!tmdbId) return;
    try {
        const data = await fetchTMDB(`movie/${tmdbId}/recommendations`, { page: 1 });
        container.innerHTML = '';
        if (!data.results || !data.results.length) {
            container.innerHTML = '<p style="color:#64748B;font-size:.6rem;">Sin recomendaciones</p>';
            return;
        }
        data.results.slice(0, 8).forEach(p => {
            const div = document.createElement('div');
            div.className = 'recomendacion';
            const imgUrl = p.poster_path ? getImagenUrl(p.poster_path, 'w185') : 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg';
            div.innerHTML = `<img src="${imgUrl}" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg'"><p>${p.title || p.name}</p>`;
            div.onclick = () => {
                const tipo = p.media_type === 'tv' ? 'serie' : 'pelicula';
                window.location.href = `reproductor.html?play=${p.id}&tipo=${tipo}`;
            };
            container.appendChild(div);
        });
    } catch(e) { 
        container.innerHTML = '<p style="color:#64748B;font-size:.6rem;">Sin recomendaciones</p>'; 
    }
}

// ⭐ BANNER APK
function detectarPlataforma() {
    const ua = navigator.userAgent || '';
    const esWebView = /wv|WebView|Android.*(wv|WebView)/i.test(ua);
    const esNavegador = !esWebView && /Android|iPhone|iPad|iPod/i.test(ua);
    return { esWebView, esNavegador };
}

function mostrarBannerApp() {
    const banner = document.getElementById('bannerApp');
    if (!banner) return;
    if (localStorage.getItem('bannerAppCerrado') === 'true') return;
    const { esWebView, esNavegador } = detectarPlataforma();
    if (esNavegador) {
        banner.style.display = 'block';
        document.body.classList.add('banner-activo');
    }
}

function cerrarBannerApp() {
    const banner = document.getElementById('bannerApp');
    if (banner) {
        banner.style.display = 'none';
        document.body.classList.remove('banner-activo');
        localStorage.setItem('bannerAppCerrado', 'true');
    }
}

function descargarAPK() {
    const urlAPK = 'https://appsgeyser.io/19960416/Tely';
    mostrarToast('📱 Descargando TELY...', 'info');
    const link = document.createElement('a');
    link.href = urlAPK;
    link.target = '_blank';
    link.download = 'Tely.apk';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    setTimeout(cerrarBannerApp, 2000);
}
