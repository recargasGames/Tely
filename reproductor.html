<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TELY 🎬 - Reproductor</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://image.tmdb.org">
    <link rel="dns-prefetch" href="https://image.tmdb.org">
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="apple-touch-icon" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;background:#0A0A0F}
        body{background:#0A0A0F;color:#fff;font-family:'Segoe UI',Roboto,sans-serif;min-height:100vh;transition:background 0.3s, color 0.3s;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
        ::-webkit-scrollbar{display:none}
        body.dark{background:#0A0A0F;color:#fff}
        body:not(.dark){background:#f0f0f0;color:#111}
        
        .main-content{width:100%;height:100vh;padding:.3rem .5rem;overflow-y:auto;margin:0 auto;max-width:600px}
        
        .header-flotante{
            position:sticky;
            top:0;
            z-index:50;
            background:rgba(10,10,15,.92);
            backdrop-filter:blur(12px);
            padding:.3rem .3rem .4rem;
            border-bottom:1px solid rgba(124,58,237,.1);
        }
        body:not(.dark) .header-flotante{
            background:rgba(240,240,240,.92);
            border-bottom-color:rgba(0,0,0,.08);
        }
        
        .top-header{display:flex;justify-content:space-between;align-items:center;padding:.1rem 0 .2rem;flex-wrap:wrap;gap:.3rem}
        .top-header h1{font-size:1rem;font-weight:700;background:linear-gradient(135deg,#7C3AED,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .top-actions{display:flex;align-items:center;gap:.5rem}
        
        .theme-btn{background:rgba(255,255,255,.05);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;transition:.3s;display:flex;align-items:center;justify-content:center}
        .theme-btn:hover{background:rgba(255,255,255,.1)}
        body:not(.dark) .theme-btn{background:rgba(0,0,0,.05);color:#111}
        body:not(.dark) .theme-btn:hover{background:rgba(0,0,0,.1)}
        
        .user-btn{background:rgba(124,58,237,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;transition:.3s;display:flex;align-items:center;justify-content:center}
        .user-btn:hover{background:rgba(124,58,237,.3)}
        body:not(.dark) .user-btn{color:#111}
        
        .back-btn{background:rgba(255,255,255,.05);border:none;color:#94A3B8;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;transition:.3s;display:flex;align-items:center;justify-content:center}
        .back-btn:hover{background:rgba(255,255,255,.1)}
        body:not(.dark) .back-btn{background:rgba(0,0,0,.05);color:#555}
        
        /* ===== REPRODUCTOR ===== */
        .player-wrapper{position:relative;background:#000;border-radius:12px;overflow:hidden;aspect-ratio:16/9;width:100%;margin:.2rem 0}
        .player-wrapper iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;background:#000}
        
        /* ===== INFO ===== */
        .info-top{padding:.2rem 0 .1rem}
        .info-top h1{
            font-size:1.2rem;
            font-weight:700;
            color:#fff;
            background:linear-gradient(135deg,#7C3AED,#A78BFA);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }
        body:not(.dark) .info-top h1{color:#7C3AED;-webkit-text-fill-color:#7C3AED}
        .info-top .meta{color:#94A3B8;font-size:.7rem;display:flex;gap:.6rem;flex-wrap:wrap;margin:.05rem 0}
        .info-top .meta .rating{color:#FBBF24;font-weight:700}
        .info-top .sinopsis{color:#94A3B8;font-size:.7rem;line-height:1.4;margin-top:.05rem}
        
        /* ===== OPCIONES ===== */
        .player-controls{display:flex;gap:.3rem;flex-wrap:wrap;margin:.2rem 0}
        .btn-opcion{background:rgba(255,255,255,.06);border:1px solid rgba(124,58,237,.2);color:#fff;padding:.25rem .8rem;border-radius:6px;font-weight:600;font-size:.65rem;cursor:pointer;transition:.3s}
        .btn-opcion.active{border-color:#7C3AED;background:#7C3AED;color:#fff}
        .btn-opcion:hover{border-color:#7C3AED}
        .btn-opcion.opcion2{border-color:rgba(59,130,246,.4);background:rgba(59,130,246,.08);color:#60A5FA}
        .btn-opcion.opcion2:hover{background:rgba(59,130,246,.2);border-color:#3B82F6}
        .btn-opcion.opcion2.active{background:#3B82F6;border-color:#3B82F6;color:#fff}
        .badge-opcion2{display:inline-block;background:#FBBF24;color:#000;font-size:.4rem;font-weight:700;padding:.02rem .25rem;border-radius:3px;margin-left:.15rem}
        .btn-recargar{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.2);color:#34D399;padding:.25rem .7rem;border-radius:6px;font-weight:600;font-size:.65rem;cursor:pointer;transition:.3s}
        .btn-recargar:hover{background:rgba(16,185,129,.25)}
        .btn-nueva-ventana{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);color:#EF4444;padding:.25rem .7rem;border-radius:6px;font-weight:600;font-size:.65rem;cursor:pointer;transition:.3s}
        .btn-nueva-ventana:hover{background:rgba(239,68,68,.15)}
        
        /* ===== EPISODIOS - ESTILO IMAGEN ===== */
        .episodios-section{
            margin-top:.3rem;
            background:rgba(255,255,255,.02);
            border-radius:12px;
            padding:.4rem .5rem;
            border:1px solid rgba(124,58,237,.06);
        }
        .episodios-section .section-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:.2rem;
        }
        .episodios-section .section-header h3{
            font-size:.75rem;
            font-weight:700;
            color:#fff;
            display:flex;
            align-items:center;
            gap:.3rem;
        }
        body:not(.dark) .episodios-section .section-header h3{color:#111}
        .episodios-section .section-header .temp-selector{
            display:flex;
            align-items:center;
            gap:.3rem;
        }
        .episodios-section .section-header .temp-selector select{
            background:rgba(255,255,255,.06);
            color:#fff;
            border:1px solid rgba(124,58,237,.15);
            border-radius:6px;
            padding:.1rem .4rem;
            font-size:.65rem;
            font-weight:600;
            cursor:pointer;
            outline:none;
        }
        body:not(.dark) .episodios-section .section-header .temp-selector select{
            background:rgba(0,0,0,.04);
            color:#111;
        }
        .episodios-section .section-header .acciones{
            display:flex;
            gap:.4rem;
        }
        .episodios-section .section-header .acciones button{
            background:none;
            border:none;
            color:#94A3B8;
            font-size:.55rem;
            cursor:pointer;
            transition:.2s;
            padding:.05rem .3rem;
            border-radius:4px;
        }
        .episodios-section .section-header .acciones button:hover{
            background:rgba(124,58,237,.1);
            color:#fff;
        }
        body:not(.dark) .episodios-section .section-header .acciones button:hover{color:#111}
        
        .episodios-list{
            display:flex;
            flex-direction:column;
            gap:.2rem;
            max-height:250px;
            overflow-y:auto;
            padding-right:.1rem;
        }
        .episodio-item{
            display:flex;
            flex-direction:column;
            padding:.2rem .3rem .15rem;
            background:rgba(255,255,255,.02);
            border-radius:6px;
            cursor:pointer;
            border:1px solid transparent;
            transition:.2s;
        }
        .episodio-item:hover{background:rgba(255,255,255,.04)}
        .episodio-item.activo{
            border-color:#7C3AED;
            background:rgba(124,58,237,.06);
        }
        .episodio-item.sin-enlace{opacity:.4;cursor:not-allowed}
        .episodio-item .top{
            display:flex;
            align-items:center;
            gap:.3rem;
            flex-wrap:wrap;
        }
        .episodio-item .top .numero{
            font-size:.55rem;
            color:#A78BFA;
            font-weight:700;
        }
        .episodio-item .top .titulo{
            font-size:.6rem;
            color:#E2E8F0;
            font-weight:500;
            flex:1;
        }
        body:not(.dark) .episodio-item .top .titulo{color:#333}
        .episodio-item .top .estado{
            font-size:.45rem;
            color:#34D399;
            font-weight:600;
        }
        .episodio-item .top .estado.no-disponible{color:#EF4444}
        .episodio-item .sinopsis{
            font-size:.5rem;
            color:#64748B;
            margin-top:.03rem;
            padding-left:1.2rem;
            line-height:1.2;
        }
        body:not(.dark) .episodio-item .sinopsis{color:#666}
        .episodio-item .acciones-ep{
            display:flex;
            gap:.3rem;
            padding-left:1.2rem;
            margin-top:.05rem;
        }
        .episodio-item .acciones-ep button{
            background:none;
            border:none;
            color:#64748B;
            font-size:.45rem;
            cursor:pointer;
            transition:.2s;
            padding:.03rem .2rem;
            border-radius:3px;
        }
        .episodio-item .acciones-ep button:hover{
            background:rgba(124,58,237,.08);
            color:#fff;
        }
        body:not(.dark) .episodio-item .acciones-ep button:hover{color:#111}
        
        /* ===== RECOMENDACIONES ===== */
        .recomendaciones{display:flex;gap:.3rem;overflow-x:auto;padding:.2rem 0}
        .recomendacion{flex:0 0 auto;width:60px;cursor:pointer;border-radius:4px;overflow:hidden;text-align:center}
        .recomendacion:hover{transform:scale(1.05)}
        .recomendacion img{width:100%;height:80px;object-fit:cover}
        .recomendacion p{font-size:.4rem;text-align:center;color:#94A3B8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .titulo-recomendadas{font-weight:600;font-size:.75rem;color:#fff;margin:.2rem 0 .1rem}
        body:not(.dark) .titulo-recomendadas{color:#111}
        
        /* ===== LOADING / ERROR ===== */
        .loading-spinner{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:#000;color:#A78BFA;gap:.5rem}
        .loading-spinner i{font-size:2.5rem;color:#7C3AED;animation:spin 1s linear infinite}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        .error-video{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:#0A0A0F;color:#EF4444;gap:.5rem;text-align:center;padding:.5rem}
        .error-video i{font-size:2.5rem}
        .error-video .sub{color:#64748B;font-size:.7rem}
        
        /* ===== USER DROPDOWN ===== */
        .user-dropdown{position:absolute;right:0;top:calc(100% + 6px);background:rgba(26,26,46,.95);border-radius:8px;width:160px;border:1px solid rgba(124,58,237,.15);padding:.2rem 0;display:none;z-index:60;box-shadow:0 20px 60px rgba(0,0,0,.5)}
        .user-dropdown.show{display:block}
        body:not(.dark) .user-dropdown{background:rgba(255,255,255,.95);border-color:rgba(0,0,0,.1)}
        .user-dropdown a{display:flex;align-items:center;gap:.3rem;padding:.3rem .6rem;color:#CBD5E1;text-decoration:none;font-size:.75rem;transition:.2s}
        .user-dropdown a:hover{background:rgba(124,58,237,.08);color:#fff}
        body:not(.dark) .user-dropdown a{color:#333}
        body:not(.dark) .user-dropdown a:hover{background:rgba(124,58,237,.08);color:#111}
        .user-dropdown hr{margin:.05rem 0;border:none;border-top:1px solid rgba(124,58,237,.08)}
        .user-menu{position:relative}
        
        /* ===== BANNER APK ===== */
        #bannerApp{display:none;position:fixed;bottom:0;left:0;right:0;background:linear-gradient(135deg,#1A1A2E,#2D2D44);border-top:2px solid #7C3AED;padding:.5rem .6rem;z-index:9999;box-shadow:0 -4px 30px rgba(124,58,237,.3);animation:slideUp 0.5s ease-out}
        body:not(.dark) #bannerApp{background:linear-gradient(135deg,#f0f0f0,#e8e8e8);border-top-color:#7C3AED}
        body:not(.dark) #bannerApp .banner-titulo{color:#111}
        body:not(.dark) #bannerApp .banner-sub{color:#555}
        @keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
        body.banner-activo{padding-bottom:65px}
        .banner-logo-img{width:32px;height:32px;border-radius:6px;object-fit:cover}
        .banner-install-btn{background:linear-gradient(135deg,#7C3AED,#A78BFA);border:none;color:#fff;padding:.3rem .8rem;border-radius:6px;font-weight:700;font-size:.65rem;cursor:pointer;transition:.3s;display:flex;align-items:center;gap:.2rem}
        .banner-install-btn:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(124,58,237,.4)}
        
        /* ===== SCROLLBAR ===== */
        .episodios-list::-webkit-scrollbar{width:3px}
        .episodios-list::-webkit-scrollbar-track{background:rgba(255,255,255,.02)}
        .episodios-list::-webkit-scrollbar-thumb{background:#7C3AED;border-radius:10px}
    </style>
</head>
<body>

<!-- ===== BANNER APK ===== -->

    <div style="display:flex;align-items:center;justify-content:space-between;max-width:600px;margin:0 auto;gap:0.4rem;">

<script>
const firebaseConfig = {
    apiKey: "AIzaSyBPBDEVUR7hjNrxCYrefF9Sbl0Wofp3VoQ",
    authDomain: "telyx-23210.firebaseapp.com",
    projectId: "telyx-23210",
    storageBucket: "telyx-23210.firebasestorage.app",
    messagingSenderId: "10164285015",
    appId: "1:10164285015:web:5cf32bd2831de126c67d12",
    measurementId: "G-0YEZMJYMJS"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ===== CACHÉ =====
function guardarContenidoEnCache(tmdbId, data) {
    try { localStorage.setItem(`tely_contenido_${tmdbId}`, JSON.stringify({ data, timestamp: Date.now() })); } catch(e) {}
}
function obtenerContenidoCache(tmdbId, maxAge = 600000) {
    try {
        const cached = localStorage.getItem(`tely_contenido_${tmdbId}`);
        if (!cached) return null;
        const parsed = JSON.parse(cached);
        if (Date.now() - parsed.timestamp > maxAge) return null;
        return parsed.data;
    } catch(e) { return null; }
}

function guardarPestanaActiva() {
    try {
        const tabActiva = sessionStorage.getItem('tabActiva') || 'inicio';
        sessionStorage.setItem('tabAnterior', tabActiva);
    } catch(e) {}
}

function volverAlIndex() {
    guardarPestanaActiva();
    window.location.href = 'index.html';
}

// ===== AUTENTICACIÓN =====
function irALogin() { window.location.href = 'login.html'; }
function cerrarSesion() { auth.signOut().then(() => { window.location.href = 'index.html'; }); }
function toggleUserMenu() { document.getElementById('userDropdown').classList.toggle('show'); }
document.addEventListener('click', (e) => {
    const menu = document.getElementById('userDropdown');
    if (menu && !e.target.closest('.user-menu')) menu.classList.remove('show');
});
auth.onAuthStateChanged(user => {
    document.getElementById('loginBtn').style.display = user ? 'none' : 'flex';
    document.getElementById('logoutBtn').style.display = user ? 'flex' : 'none';
});

// ===== TEMA =====
function toggleTheme() {
    const body = document.body;
    const btn = document.getElementById('themeBtn');
    if (body.classList.contains('dark')) { 
        body.classList.remove('dark'); 
        btn.innerHTML = '<i class="fas fa-moon"></i>'; 
        localStorage.setItem('theme', 'light'); 
    } else { 
        body.classList.add('dark'); 
        btn.innerHTML = '<i class="fas fa-sun"></i>'; 
        localStorage.setItem('theme', 'dark'); 
    }
}
if (localStorage.getItem('theme') === 'light') { 
    document.body.classList.remove('dark'); 
    document.getElementById('themeBtn').innerHTML = '<i class="fas fa-moon"></i>'; 
} else { 
    document.body.classList.add('dark'); 
    document.getElementById('themeBtn').innerHTML = '<i class="fas fa-sun"></i>'; 
}

// ===== UTILIDADES =====
function getImagenUrl(path, size = 'w342') {
    if (!path) return 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg';
    return `https://image.tmdb.org/t/p/${size}${path}`;
}

function mostrarToast(msg, tipo = 'success') {
    const colores = { success: '#10B981', warning: '#F59E0B', error: '#EF4444', info: '#3B82F6' };
    const t = document.createElement('div');
    t.style.cssText = `position:fixed;bottom:65px;left:50%;transform:translateX(-50%);background:${colores[tipo] || '#10B981'};color:#fff;padding:6px 14px;border-radius:8px;z-index:9999;font-weight:600;font-size:.7rem;max-width:90%;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:opacity 0.3s;`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2000);
}

async function fetchTMDB(path, params = {}) {
    const queryParams = new URLSearchParams();
    queryParams.append('path', path);
    Object.keys(params).forEach(key => queryParams.append(key, params[key]));
    const url = `https://tely-xi.vercel.app/api/tmdb?${queryParams.toString()}`;
    const response = await fetch(url);
    if (!response.ok) throw new Error(`Error: ${response.status}`);
    return response.json();
}

function generarEnlaceUnlimplay(tmdb_id, tipo, temporada = 1, capitulo = 1) {
    if (tipo === 'pelicula') {
        return `https://unlimplay.com/play/embed/movie/${tmdb_id}?lang=es-MX&autoplay=1&controls=1&logo=0`;
    } else {
        return `https://unlimplay.com/play/embed/tv/${tmdb_id}/${temporada}/${capitulo}?lang=es-MX&autoplay=1&controls=1&logo=0`;
    }
}

const params = new URLSearchParams(window.location.search);
let tmdbId = params.get('play');
if (tmdbId && typeof tmdbId === 'string' && tmdbId.startsWith('tmdb_')) {

const tipo = params.get('tipo') || 'pelicula';
const tempRestaurar = params.get('temp') ? parseInt(params.get('temp')) : null;
const capRestaurar = params.get('cap') ? parseInt(params.get('cap')) : null;

let temporadasActuales = [];

// ===== REPRODUCTOR =====
function reproducir(url) {
    if (reproduciendo && urlActual === url) return;
    reproduciendo = true;
    
    const wrapper = document.getElementById('playerWrapper');
    urlActual = url;
    
    let finalUrl = url;
    if (finalUrl.includes('unlimplay.com')) {
        if (!finalUrl.includes('autoplay')) {
            finalUrl += finalUrl.includes('?') ? '&autoplay=1&controls=1&logo=0' : '?autoplay=1&controls=1&logo=0';
        }
        if (finalUrl.includes('unlimplay.com/play/') && !finalUrl.includes('unlimplay.com/play/embed/')) {
            finalUrl = finalUrl.replace('unlimplay.com/play/', 'unlimplay.com/play/embed/');
        }
        finalUrl += '&t=' + Date.now();
    } else {
        finalUrl += (finalUrl.includes('?') ? '&' : '?') + 't=' + Date.now();
    }
    
    wrapper.innerHTML = `
        <div class="loading-spinner">
            <i class="fas fa-spinner"></i>
            <span style="font-size:.7rem;">Cargando video...</span>
        </div>
    `;
    
    const iframe = document.createElement('iframe');
    iframe.src = finalUrl;
    iframe.frameborder = "0";
    iframe.referrerpolicy = "no-referrer-when-downgrade";
    iframe.allow = "autoplay; encrypted-media; picture-in-picture; fullscreen";
    iframe.allowfullscreen = true;
    iframe.style.cssText = "width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;";
    iframe.loading = "eager";
    
    iframe.onload = function() {
        const spinner = wrapper.querySelector('.loading-spinner');
        if (spinner) spinner.style.display = 'none';
        reproduciendo = false;
    };
    
    setTimeout(() => {
        const spinner = wrapper.querySelector('.loading-spinner');
        if (spinner) spinner.style.display = 'none';
        reproduciendo = false;
    }, 8000);
    
    wrapper.appendChild(iframe);
}

    if (opcion === 1) {

}

// ===== CARGAR CONTENIDO =====
async function cargarContenidoReproductor() {
    const wrapper = document.getElementById('playerWrapper');
    wrapper.innerHTML = `<div class="loading-spinner"><i class="fas fa-spinner"></i><span>Cargando...</span></div>`;
    
    try {
        const cachedData = obtenerContenidoCache(tmdbId);
        if (cachedData) {
            peliculaActual = cachedData;
            cargarReproductor(cachedData, tempRestaurar, capRestaurar);
            return;
        }
        
        const dbRef = db.ref();
        const [pSnap, sSnap] = await Promise.all([
            dbRef.child('contenido_personalizado').once('value'),
            dbRef.child('series_personalizadas').once('value')
        ]);
        const pelis = pSnap.val() ? Object.values(pSnap.val()) : [];
        const series = sSnap.val() ? Object.values(sSnap.val()) : [];
        const contenido = [...pelis.map(p => ({ ...p, tipo: 'pelicula' })), ...series.map(s => ({ ...s, tipo: 'serie' }))];
        
        let item = contenido.find(c => c.tmdb_id == tmdbId);
        
        if (!item && tmdbId) {
            if (tipo === 'pelicula') {
                const data = await fetchTMDB(`movie/${tmdbId}`);
                if (data && data.id) {
                    item = {
                        titulo: data.title || `Película ${tmdbId}`,
                        anio: data.release_date ? data.release_date.split('-')[0] : 'N/D',
                        sinopsis: data.overview || 'Sin sinopsis',
                        portada: getImagenUrl(data.poster_path, 'w342'),
                        genero: data.genres ? data.genres.map(g => g.name).join(', ') : 'Película',
                        tipo: 'pelicula',
                        tmdb_id: data.id,
                        puntuacion: data.vote_average ? data.vote_average.toFixed(1) : 'N/A',
                        url: generarEnlaceUnlimplay(data.id, 'pelicula'),
                        opcion2: ''
                    };
                    await dbRef.child('contenido_personalizado').push(item);
                }
            } else {
                const data = await fetchTMDB(`tv/${tmdbId}`);
                if (data && data.id) {
                    const temporadas = [];
                    for (let t = 1; t <= Math.min(data.number_of_seasons || 1, 10); t++) {
                        try {
                            const seasonData = await fetchTMDB(`tv/${tmdbId}/season/${t}`);
                            if (!seasonData || !seasonData.episodes) continue;
                            const capitulos = seasonData.episodes.map(ep => ({
                                numero: ep.episode_number,
                                titulo: ep.name || `Episodio ${ep.episode_number}`,
                                sinopsis: ep.overview || 'Sin sinopsis',
                                disponible: true,
                                url: generarEnlaceUnlimplay(data.id, 'serie', t, ep.episode_number),
                                opcion2: ''
                            }));
                            temporadas.push({ numero: t, nombre: seasonData.name || `Temporada ${t}`, capitulos });
                        } catch(e) {}
                    }
                    if (temporadas.length > 0) {
                        item = {
                            titulo: data.name || `Serie ${tmdbId}`,
                            anio: data.first_air_date ? data.first_air_date.split('-')[0] : 'N/D',
                            sinopsis: data.overview || 'Sin sinopsis',
                            portada: getImagenUrl(data.poster_path, 'w342'),
                            genero: data.genres ? data.genres.map(g => g.name).join(', ') : 'Serie',
                            tipo: 'serie',
                            tmdb_id: data.id,
                            puntuacion: data.vote_average ? data.vote_average.toFixed(1) : 'N/A',
                            temporadas: temporadas,
                            url: generarEnlaceUnlimplay(data.id, 'serie', 1, 1),
                            opcion2: ''
                        };
                        await dbRef.child('series_personalizadas').push(item);
                    }
                }
            }
        }
        
        if (item) {
            guardarContenidoEnCache(tmdbId, item);
            peliculaActual = item;
            cargarReproductor(item, tempRestaurar, capRestaurar);
        } else {
            wrapper.innerHTML = `<div class="error-video"><i class="fas fa-exclamation-triangle"></i><span>Contenido no encontrado</span><span class="sub">ID: ${tmdbId}</span></div>`;
        }
    } catch(e) {
        wrapper.innerHTML = `<div class="error-video"><i class="fas fa-exclamation-triangle"></i><span>Error: ${e.message}</span></div>`;
    }
}

function cargarReproductor(peli, tempRestaurar = null, capRestaurar = null) {
    peliculaActual = peli;
    esSerie = peli.tipo === 'serie';
    
    document.getElementById('playerTitulo').textContent = peli.titulo;
    document.getElementById('playerAnio').textContent = peli.anio || 'N/D';
    document.getElementById('playerRating').textContent = peli.puntuacion || 'N/A';
    document.getElementById('playerGenero').textContent = peli.genero || (peli.tipo === 'serie' ? 'Serie' : 'Película');
    document.getElementById('playerSinopsis').textContent = peli.sinopsis || 'Sin sinopsis';
    document.getElementById('playerTipo').textContent = peli.tipo === 'serie' ? '📺 Serie' : '🎬 Película';
    document.getElementById('playerTipo').style.color = peli.tipo === 'serie' ? '#10B981' : '#A78BFA';
    
    if (peli.opcion2) { urlOp2 = peli.opcion2; }
    
    if (esSerie && peli.temporadas && peli.temporadas.length) {
        temporadasActuales = peli.temporadas;
        document.getElementById('episodiosSection').style.display = 'block';
        
        const select = document.getElementById('tempSelect');
        select.innerHTML = '';
        temporadasActuales.forEach((t, idx) => {
            const opt = document.createElement('option');
            opt.value = idx;
            opt.textContent = `Temporada ${t.numero || idx + 1}`;
            select.appendChild(opt);
        });
        
        let tempIndex = 0, capIndex = 0;
        if (tempRestaurar !== null && capRestaurar !== null) {
            tempIndex = Math.min(tempRestaurar, temporadasActuales.length - 1);
            const temp = temporadasActuales[tempIndex];
            if (temp && temp.capitulos) capIndex = Math.min(capRestaurar, temp.capitulos.length - 1);
        }
        
        select.value = tempIndex;
        tempActualIndex = tempIndex;
        mostrarEpisodios(tempIndex, capIndex);
        
        const pc = obtenerCapitulo(tempIndex, 0);
        if (pc) {
            urlOp1 = pc.url;
            if (pc.opcion2) urlOp2 = pc.opcion2;
            if (urlOp1) {
                reproducir(urlOp1);
                document.getElementById('btnOp1').classList.add('active');
                document.getElementById('btnOp2').classList.remove('active');
                opcionActiva = 1;
            }
        }
    } else {
        document.getElementById('episodiosSection').style.display = 'none';
        urlOp1 = peli.url || generarEnlaceUnlimplay(peli.tmdb_id, 'pelicula');
        
        if (urlOp1) {
            reproducir(urlOp1);
            document.getElementById('btnOp1').classList.add('active');
            document.getElementById('btnOp2').classList.remove('active');
            opcionActiva = 1;
        } else {
            document.getElementById('playerWrapper').innerHTML = `<div class="error-video"><i class="fas fa-link"></i><span>No hay enlaces disponibles</span></div>`;
        }
    }
    
    cargarRecomendaciones(peli.tmdb_id);
}

function obtenerCapitulo(tempIdx, capIdx) {
    if (!temporadasActuales || !temporadasActuales.length) return null;
    const t = temporadasActuales[tempIdx];
    if (!t || !t.capitulos || !t.capitulos.length) return null;
    return t.capitulos[capIdx] || null;
}

function mostrarEpisodios(tempIndex, capSeleccionado = 0) {
    if (!temporadasActuales || !temporadasActuales.length) return;
    if (tempIndex < 0) tempIndex = 0;
    if (tempIndex >= temporadasActuales.length) tempIndex = temporadasActuales.length - 1;
    tempActualIndex = tempIndex;
    const temp = temporadasActuales[tempIndex];
    const container = document.getElementById('episodiosList');
    container.innerHTML = '';
    
    if (!temp.capitulos || !temp.capitulos.length) {
        container.innerHTML = '<p style="color:#64748B;padding:.2rem;text-align:center;font-size:.7rem;">Sin capítulos</p>';
        return;
    }
    
    temp.capitulos.forEach((cap, idx) => {
        const d = document.createElement('div');
        d.className = 'episodio-item';
        if (idx === capSeleccionado) d.classList.add('activo');
        if (!cap.url) d.classList.add('sin-enlace');
        const disponible = cap.url !== null && cap.url !== undefined && cap.url.trim() !== '';
        d.innerHTML = `
            <div class="top">
                <span class="numero">${cap.numero || idx + 1}.</span>
                <span class="titulo">${cap.titulo || 'Episodio ' + (idx + 1)}</span>
                <span class="estado ${disponible ? '' : 'no-disponible'}">${disponible ? '✅ Disponible' : '🔒 No disponible'}</span>
            </div>
            <div class="sinopsis">${cap.sinopsis || ''}</div>
            <div class="acciones-ep">
                <button onclick="event.stopPropagation(); marcarVisto(${idx})"><i class="fas fa-check"></i> Visto</button>
                <button onclick="event.stopPropagation(); descargarEpisodio(${idx})"><i class="fas fa-download"></i> Descargar</button>
                <button onclick="event.stopPropagation(); reportarEpisodio(${idx})"><i class="fas fa-flag"></i> Reportar</button>
            </div>
        `;
        d.onclick = () => {
            if (cap.url) {
                document.querySelectorAll('.episodio-item').forEach(el => el.classList.remove('activo'));
                d.classList.add('activo');
                urlOp1 = cap.url;
                if (cap.opcion2) urlOp2 = cap.opcion2;
                reproducir(cap.url);
            } else {
                mostrarToast('❌ Este episodio no tiene enlace', 'error');
            }
        };
        container.appendChild(d);
    });
}

function cambiarTempSelect() {
    const select = document.getElementById('tempSelect');
    const idx = parseInt(select.value);
    mostrarEpisodios(idx, 0);
    const c = obtenerCapitulo(idx, 0);
    if (c?.url) {
        urlOp1 = c.url;
        if (c.opcion2) urlOp2 = c.opcion2;
        reproducir(c.url);
    }
}

function marcarVisto(idx) {
    const items = document.querySelectorAll('.episodio-item');
    if (items[idx]) {
        items[idx].classList.toggle('activo');
        mostrarToast('✅ Marcado como visto', 'success');
    }
}

function descargarEpisodio(idx) {
    mostrarToast('⬇️ Descargando episodio... (próximamente)', 'info');
}

function reportarEpisodio(idx) {
    mostrarToast('📋 Reporte enviado para este episodio', 'success');
}

// ===== RECOMENDACIONES =====
async function cargarRecomendaciones(tmdbId) {
    const container = document.getElementById('recomendaciones');
    container.innerHTML = '<p style="color:#64748B;font-size:.6rem;">Cargando...</p>';
    if (!tmdbId) return;
    try {
        const data = await fetchTMDB(`movie/${tmdbId}/recommendations`, { page: 1 });
        container.innerHTML = '';
        if (!data.results || !data.results.length) {
            container.innerHTML = '<p style="color:#64748B;font-size:.6rem;">Sin recomendaciones</p>';
            return;
        }
        data.results.slice(0, 8).forEach(p => {
            const div = document.createElement('div');
            div.className = 'recomendacion';
            const imgUrl = p.poster_path ? getImagenUrl(p.poster_path, 'w185') : 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg';
            div.innerHTML = `<img src="${imgUrl}" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg'"><p>${p.title || p.name}</p>`;
            div.onclick = () => {
                const tipo = p.media_type === 'tv' ? 'serie' : 'pelicula';
                window.location.href = `reproductor.html?play=${p.id}&tipo=${tipo}`;
            };
            container.appendChild(div);
        });
    } catch(e) { 
        container.innerHTML = '<p style="color:#64748B;font-size:.6rem;">Sin recomendaciones</p>'; 
    }
}

function detectarPlataforma() {
    const ua = navigator.userAgent || '';
    const esWebView = /wv|WebView|Android.*(wv|WebView)/i.test(ua);
    const esNavegador = !esWebView && /Android|iPhone|iPad|iPod/i.test(ua);
    return { esWebView, esNavegador };
}

function mostrarBannerApp() {
    const banner = document.getElementById('bannerApp');
    if (!banner) return;
    if (localStorage.getItem('bannerAppCerrado') === 'true') return;
    const { esWebView, esNavegador } = detectarPlataforma();
    if (esNavegador) {
        banner.style.display = 'block';
        document.body.classList.add('banner-activo');
    }
}

function cerrarBannerApp() {
    const banner = document.getElementById('bannerApp');
    if (banner) {
        banner.style.display = 'none';
        document.body.classList.remove('banner-activo');
        localStorage.setItem('bannerAppCerrado', 'true');
    }
}

function descargarAPK() {
    const urlAPK = 'https://appsgeyser.io/19960416/Tely';
    mostrarToast('📱 Descargando TELY...', 'info');

function activarPantallaCompleta() {
    const ua = navigator.userAgent || '';
    const esWebView = /wv|WebView|Android.*(wv|WebView)/i.test(ua);
    const esApp = window.navigator.standalone || 
                   window.matchMedia('(display-mode: standalone)').matches ||
                   esWebView;
    if (esApp && !document.fullscreenElement && !document.webkitFullscreenElement) {
        try {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            }
        } catch(e) {}
    }
}

function esNavegadorWeb() {
    const ua = navigator.userAgent || '';
    const esWebView = /wv|WebView|Android.*(wv|WebView)/i.test(ua);
    const esApp = window.navigator.standalone || 
                   window.matchMedia('(display-mode: standalone)').matches ||
                   esWebView;
    return !esApp;
}
