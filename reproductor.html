<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TELY 🎬 - Reproductor</title>
    <link rel="icon" href="logo.png" type="image/png">
    <link rel="apple-touch-icon" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;background:#0A0A0F}
        body{background:#0A0A0F;color:#fff;font-family:'Segoe UI',Roboto,sans-serif;min-height:100vh;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
        ::-webkit-scrollbar{display:none}
        
        .main-content{width:100%;height:100vh;padding:.3rem .5rem;overflow-y:auto;margin:0 auto;max-width:600px}
        
        .header-flotante{
            position:sticky;
            top:0;
            z-index:50;
            background:rgba(10,10,15,.92);
            backdrop-filter:blur(12px);
            padding:.3rem .3rem .4rem;
            border-bottom:1px solid rgba(255,255,255,.08);
        }
        
        .top-header{display:flex;justify-content:space-between;align-items:center;padding:.1rem 0 .2rem;flex-wrap:wrap;gap:.3rem}
        .top-header h1{font-size:1rem;font-weight:700;color:#fff}
        .top-actions{display:flex;align-items:center;gap:.5rem}
        
        .theme-btn{background:rgba(255,255,255,.05);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;transition:.3s;display:flex;align-items:center;justify-content:center}
        .theme-btn:hover{background:rgba(255,255,255,.1)}
        
        .back-btn{background:rgba(255,255,255,.05);border:none;color:#94A3B8;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;transition:.3s;display:flex;align-items:center;justify-content:center}
        .back-btn:hover{background:rgba(255,255,255,.1)}
        
        .btn-fullscreen{
            background:rgba(255,255,255,.06);
            border:1px solid rgba(255,255,255,.15);
            color:#fff;
            padding:.25rem .6rem;
            border-radius:6px;
            font-weight:600;
            font-size:.65rem;
            cursor:pointer;
            transition:.3s;
            display:flex;
            align-items:center;
            gap:.2rem;
        }
        .btn-fullscreen:hover{
            background:rgba(255,255,255,.1);
            border-color:rgba(255,255,255,.25);
        }
        
        .player-wrapper{position:relative;background:#000;border-radius:12px;overflow:hidden;aspect-ratio:16/9;width:100%;margin:.2rem 0}
        .player-wrapper iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;background:#000}
        
        .info-top{padding:.2rem 0 .1rem}
        .info-top h1{font-size:1.2rem;font-weight:700;color:#fff}
        .info-top .meta{color:#94A3B8;font-size:.7rem;display:flex;gap:.6rem;flex-wrap:wrap;margin:.05rem 0}
        .info-top .meta .rating{color:#FBBF24;font-weight:700}
        .info-top .sinopsis{color:#94A3B8;font-size:.7rem;line-height:1.4;margin-top:.05rem}
        
        .player-controls{display:flex;gap:.3rem;flex-wrap:wrap;margin:.2rem 0}
        .btn-opcion{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);color:#fff;padding:.25rem .8rem;border-radius:6px;font-weight:600;font-size:.65rem;cursor:pointer;transition:.3s}
        .btn-opcion.active{border-color:#fff;background:rgba(255,255,255,.15);color:#fff}
        .btn-opcion:hover{border-color:rgba(255,255,255,.3)}
        .btn-opcion.opcion2{border:1px solid rgba(59,130,246,.4);background:rgba(59,130,246,.08);color:#60A5FA}
        .btn-opcion.opcion2:hover{background:rgba(59,130,246,.2);border-color:#3B82F6}
        .btn-opcion.opcion2.active{background:#3B82F6;border-color:#3B82F6;color:#fff}
        .btn-opcion.opcion2.oculto{display:none}
        .badge-opcion2{display:inline-block;background:#FBBF24;color:#000;font-size:.4rem;font-weight:700;padding:.02rem .25rem;border-radius:3px;margin-left:.15rem}
        .btn-recargar{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.2);color:#34D399;padding:.25rem .7rem;border-radius:6px;font-weight:600;font-size:.65rem;cursor:pointer;transition:.3s}
        .btn-recargar:hover{background:rgba(16,185,129,.25)}
        .btn-nueva-ventana{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);color:#EF4444;padding:.25rem .7rem;border-radius:6px;font-weight:600;font-size:.65rem;cursor:pointer;transition:.3s}
        .btn-nueva-ventana:hover{background:rgba(239,68,68,.15)}
        
        .error-video{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:#0A0A0F;color:#EF4444;gap:.5rem;text-align:center;padding:.5rem}
        .error-video i{font-size:2.5rem}
        .error-video .sub{color:#64748B;font-size:.7rem}
        
        .user-dropdown{position:absolute;right:0;top:calc(100% + 6px);background:rgba(26,26,46,.95);border-radius:8px;width:160px;border:1px solid rgba(255,255,255,.1);padding:.2rem 0;display:none;z-index:60;box-shadow:0 20px 60px rgba(0,0,0,.5)}
        .user-dropdown.show{display:block}
        .user-dropdown a{display:flex;align-items:center;gap:.3rem;padding:.3rem .6rem;color:#CBD5E1;text-decoration:none;font-size:.75rem;transition:.2s}
        .user-dropdown a:hover{background:rgba(255,255,255,.08);color:#fff}
        .user-dropdown hr{margin:.05rem 0;border:none;border-top:1px solid rgba(255,255,255,.08)}
        .user-menu{position:relative}
        
        .episodios-section{margin-top:.3rem;background:rgba(255,255,255,.02);border-radius:12px;padding:.4rem .5rem;border:1px solid rgba(255,255,255,.06)}
        .episodios-section .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.2rem;flex-wrap:wrap;gap:.2rem}
        .episodios-section .section-header h3{font-size:.75rem;font-weight:700;color:#fff;display:flex;align-items:center;gap:.3rem}
        .episodios-section .section-header .temp-selector{display:flex;align-items:center;gap:.3rem}
        .episodios-section .section-header .temp-selector select{background:rgba(255,255,255,.06);color:#fff;border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:.1rem .4rem;font-size:.65rem;font-weight:600;cursor:pointer;outline:none}
        .episodios-section .section-header .acciones{display:flex;gap:.4rem;flex-wrap:wrap}
        .episodios-section .section-header .acciones button{background:none;border:none;color:#94A3B8;font-size:.55rem;cursor:pointer;transition:.2s;padding:.05rem .3rem;border-radius:4px}
        .episodios-section .section-header .acciones button:hover{background:rgba(255,255,255,.1);color:#fff}
        .episodios-list{display:flex;flex-direction:column;gap:.2rem;max-height:250px;overflow-y:auto;padding-right:.1rem}
        .episodio-item{display:flex;flex-direction:column;padding:.2rem .3rem .15rem;background:rgba(255,255,255,.02);border-radius:6px;cursor:pointer;border:1px solid transparent;transition:.2s}
        .episodio-item:hover{background:rgba(255,255,255,.04)}
        .episodio-item.activo{border-color:#fff;background:rgba(255,255,255,.06)}
        .episodio-item.sin-enlace{opacity:.4;cursor:not-allowed}
        .episodio-item .top{display:flex;align-items:center;gap:.3rem;flex-wrap:wrap}
        .episodio-item .top .numero{font-size:.55rem;color:#fff;font-weight:700}
        .episodio-item .top .titulo{font-size:.6rem;color:#E2E8F0;font-weight:500;flex:1}
        .episodio-item .top .estado{font-size:.45rem;color:#34D399;font-weight:600}
        .episodio-item .top .estado.no-disponible{color:#EF4444}
        .episodio-item .sinopsis{font-size:.5rem;color:#64748B;margin-top:.03rem;padding-left:1.2rem;line-height:1.2}
        .episodio-item .acciones-ep{display:flex;gap:.3rem;padding-left:1.2rem;margin-top:.05rem;flex-wrap:wrap}
        .episodio-item .acciones-ep button{background:none;border:none;color:#64748B;font-size:.45rem;cursor:pointer;transition:.2s;padding:.03rem .2rem;border-radius:3px}
        .episodio-item .acciones-ep button:hover{background:rgba(255,255,255,.08);color:#fff}
        
        .recomendaciones-wrap{margin-top:.2rem}
        .titulo-recomendadas{font-weight:600;font-size:.75rem;color:#fff;margin:.2rem 0 .1rem}
        .recomendaciones{display:flex;gap:.3rem;overflow-x:auto;padding:.2rem 0;scrollbar-width:none}
        .recomendaciones::-webkit-scrollbar{display:none}
        .recomendacion{flex:0 0 auto;width:80px;cursor:pointer;border-radius:8px;overflow:hidden;text-align:center;transition:.3s;background:rgba(255,255,255,.02)}
        .recomendacion:hover{transform:scale(1.05);box-shadow:0 8px 30px rgba(0,0,0,.3)}
        .recomendacion img{width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:6px;display:block;background:#1A1A2E}
        .recomendacion p{font-size:.45rem;text-align:center;color:#94A3B8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:.05rem;padding:0 .1rem}
        
        .episodios-list::-webkit-scrollbar{width:3px}
        .episodios-list::-webkit-scrollbar-track{background:rgba(255,255,255,.02)}
        .episodios-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1)}
        
        @media(max-width:480px){.recomendacion{width:65px}.recomendacion p{font-size:.4rem}}
        
        body:fullscreen .header-flotante{display:none!important}
        body:fullscreen .main-content{padding:0!important;max-width:100%!important}
        body:fullscreen .player-wrapper{border-radius:0!important;aspect-ratio:auto!important;height:100vh!important;width:100vw!important;margin:0!important}
        body:fullscreen .info-top,body:fullscreen .player-controls,body:fullscreen .episodios-section,body:fullscreen .recomendaciones-wrap,body:fullscreen #bannerApp{display:none!important}
        
        #bannerApp{display:none;position:fixed;bottom:0;left:0;right:0;background:#1A1A2E;border-top:1px solid rgba(255,255,255,.1);padding:.5rem .6rem;z-index:9999;box-shadow:0 -4px 30px rgba(0,0,0,.5);animation:slideUp 0.5s ease-out}
        @keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
        body.banner-activo{padding-bottom:65px}
        .banner-logo-img{width:32px;height:32px;border-radius:6px;object-fit:cover}
        .banner-install-btn{background:#fff;color:#111;border:none;padding:.3rem .8rem;border-radius:6px;font-weight:700;font-size:.65rem;cursor:pointer;transition:.3s;display:flex;align-items:center;gap:.2rem}
        .banner-install-btn:hover{transform:scale(1.05);box-shadow:0 0 15px rgba(255,255,255,.3)}
        
        .episodio-item .badge-op2-ep{font-size:.35rem;background:#3B82F6;color:#fff;padding:.02rem .35rem;border-radius:3px;font-weight:700;margin-left:.2rem}
    </style>
</head>
<body>

<main class="main-content">
    <div class="header-flotante">
        <div class="top-header">
            <h1><i class="fas fa-play"></i> TELY</h1>
            <div class="top-actions">
                <button class="back-btn" onclick="volverAlIndex()"><i class="fas fa-arrow-left"></i></button>

                <button class="btn-fullscreen" onclick="toggleFullscreen()"><i class="fas fa-expand"></i></button>

                    <button class="user-btn" onclick="toggleUserMenu()"><i class="fas fa-user-circle"></i></button>

    <div class="info-top">
        <h1 id="playerTitulo">Cargando...</h1>

            <span id="playerAnio">-</span>
            <span class="rating">⭐ <span id="playerRating">-</span></span>

        </div>
        <div class="sinopsis" id="playerSinopsis">Cargando información...</div>
    </div>

    <div class="player-wrapper" id="playerWrapper">

    </div>

    <div class="player-controls" id="playerControls">

        <button class="btn-opcion opcion2 oculto" id="btnOp2" onclick="reproducirOpcion(2)">
            <i class="fas fa-play"></i> Opción 2 <span class="badge-opcion2">⭐</span>
        </button>

        <div class="recomendaciones" id="recomendaciones"></div>

</main>

<div id="bannerApp">
    <div style="display:flex;align-items:center;justify-content:space-between;max-width:600px;margin:0 auto;gap:0.4rem;">
        <div style="display:flex;align-items:center;gap:0.3rem;flex:1;">
            <img src="logo.png" alt="TELY" class="banner-logo-img" onerror="this.style.display='none'">
            <div>
                <div class="banner-titulo" style="font-weight:700;font-size:.7rem;color:#fff;">📱 ¿Quieres instalar TELY?</div>
                <div class="banner-sub" style="font-size:.55rem;color:#94A3B8;">Mejor experiencia</div>
            </div>
        </div>

            <button onclick="descargarAPK()" class="banner-install-btn"><i class="fas fa-download"></i> Instalar</button>
            <button onclick="cerrarBannerApp()" style="background:rgba(255,255,255,.1);border:none;color:#94A3B8;padding:.2rem .4rem;border-radius:6px;font-size:.7rem;cursor:pointer;transition:.3s;"><i class="fas fa-times"></i></button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
    apiKey: "AIzaSyBPBDEVUR7hjNrxCYrefF9Sbl0Wofp3VoQ",
    authDomain: "telyx-23210.firebaseapp.com",
    projectId: "telyx-23210",
    storageBucket: "telyx-23210.firebasestorage.app",
    messagingSenderId: "10164285015",
    appId: "1:10164285015:web:5cf32bd2831de126c67d12"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

const params = new URLSearchParams(window.location.search);
let tmdbId = params.get('play');
if (tmdbId && typeof tmdbId === 'string' && tmdbId.startsWith('tmdb_')) {
    tmdbId = tmdbId.replace('tmdb_', '');
}
const tipo = params.get('tipo') || 'pelicula';

let serieData = null;
let temporadasActuales = [];
let tempActualIndex = 0;
let opcionActiva = 1;
let urlActual = null;
let urlOp1 = null;
let urlOp2 = null;
let reproduciendo = false;
let esSerie = false;
let opcion2Disponible = false;

console.log('📌 ID:', tmdbId, '| Tipo:', tipo);

function volverAlIndex() {
    if (document.fullscreenElement) document.exitFullscreen().catch(()=>{});
    window.location.href = 'index.html';
}

function toggleFullscreen() {
    const w = document.getElementById('playerWrapper');
    if (!document.fullscreenElement) {
        if (w.requestFullscreen) w.requestFullscreen();
        else if (w.webkitRequestFullscreen) w.webkitRequestFullscreen();
    } else {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
}

function irALogin() { window.location.href = 'login.html'; }
function cerrarSesion() { auth.signOut().then(() => { window.location.href = 'index.html'; }); }
function toggleUserMenu() { document.getElementById('userDropdown').classList.toggle('show'); }
document.addEventListener('click', (e) => {
    const menu = document.getElementById('userDropdown');
    if (menu && !e.target.closest('.user-menu')) menu.classList.remove('show');
});
auth.onAuthStateChanged(user => {
    document.getElementById('loginBtn').style.display = user ? 'none' : 'flex';
    document.getElementById('logoutBtn').style.display = user ? 'flex' : 'none';
});

function toggleTheme() {
    const body = document.body;
    const btn = document.getElementById('themeBtn');
    if (body.classList.contains('dark')) { 
        body.classList.remove('dark'); 
        btn.innerHTML = '<i class="fas fa-moon"></i>'; 
        localStorage.setItem('theme', 'light'); 
    } else { 
        body.classList.add('dark'); 
        btn.innerHTML = '<i class="fas fa-sun"></i>'; 
        localStorage.setItem('theme', 'dark'); 
    }
}
if (localStorage.getItem('theme') === 'light') { 
    document.body.classList.remove('dark'); 
    document.getElementById('themeBtn').innerHTML = '<i class="fas fa-moon"></i>'; 
}

function getImagenUrl(path, size = 'w342') {
    if (!path) return 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg';
    if (path.startsWith('http')) return path;
    return `https://image.tmdb.org/t/p/${size}${path}`;
}

function mostrarToast(msg, tipo = 'success') {
    const colores = { success: '#10B981', warning: '#F59E0B', error: '#EF4444', info: '#3B82F6' };
    const t = document.createElement('div');
    t.style.cssText = `position:fixed;bottom:65px;left:50%;transform:translateX(-50%);background:${colores[tipo] || '#10B981'};color:#fff;padding:6px 14px;border-radius:8px;z-index:9999;font-weight:600;font-size:.7rem;max-width:90%;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:opacity 0.3s;`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2000);
}

async function fetchTMDB(path, params = {}) {
    const q = new URLSearchParams({ path, ...params });
    const res = await fetch(`https://tely-xi.vercel.app/api/tmdb?${q}`);
    if (!res.ok) throw new Error(`Error ${res.status}`);
    return res.json();
}

function generarEnlaceUnlimplay(tmdb_id, tipo, temporada = 1, capitulo = 1) {
    if (tipo === 'pelicula') {
        return `https://unlimplay.com/play/embed/movie/${tmdb_id}?lang=es-MX&autoplay=1&controls=1&logo=0&t=${Date.now()}`;
    } else {
        return `https://unlimplay.com/play/embed/tv/${tmdb_id}/${temporada}/${capitulo}?lang=es-MX&autoplay=1&controls=1&logo=0&t=${Date.now()}`;
    }
}

function reproducir(url) {
    if (reproduciendo && urlActual === url) return;
    reproduciendo = true;
    const wrapper = document.getElementById('playerWrapper');
    urlActual = url;
    
    // CARGA DIRECTA SIN CÍRCULO
    wrapper.innerHTML = '';
    
    const iframe = document.createElement('iframe');
    iframe.src = url;
    iframe.frameborder = "0";
    iframe.referrerpolicy = "no-referrer-when-downgrade";
    iframe.allow = "autoplay; encrypted-media; picture-in-picture; fullscreen";
    iframe.allowfullscreen = true;
    iframe.style.cssText = "width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;";
    iframe.loading = "eager";
    
    iframe.onload = () => { reproduciendo = false; };
    wrapper.appendChild(iframe);
}

function reproducirOpcion(opcion) {
    if (opcion === 1 && urlOp1) {
        opcionActiva = 1;
        document.getElementById('btnOp1').classList.add('active');
        document.getElementById('btnOp2').classList.remove('active');
        reproducir(urlOp1);
    } else if (opcion === 2 && opcion2Disponible && urlOp2) {
        opcionActiva = 2;
        document.getElementById('btnOp2').classList.add('active');
        document.getElementById('btnOp1').classList.remove('active');
        reproducir(urlOp2);
    } else {
        mostrarToast('❌ Opción no disponible', 'error');
    }
}

function recargarVideo() {
    if (urlActual) { mostrarToast('🔄 Recargando...', 'info'); reproducir(urlActual); }
    else mostrarToast('❌ No hay video', 'error');
}

function abrirNuevaVentana() {
    if (urlActual) window.open(urlActual, '_blank');
    else mostrarToast('❌ No hay enlace', 'error');
}

function reportarFalla() { mostrarToast('📋 Reporte enviado', 'success'); }
function ayuda() { mostrarToast('💬 Contáctanos', 'info'); }

async function cargarDatosSerie() {
    try {
        const data = await fetchTMDB(`tv/${tmdbId}`);
        if (!data || !data.id) {
            document.getElementById('playerWrapper').innerHTML = `<div class="error-video"><i class="fas fa-exclamation-triangle"></i><span>Serie no encontrada</span></div>`;
            return;
        }
        
        serieData = {
            id: data.id,
            titulo: data.name || 'Sin título',
            anio: data.first_air_date ? data.first_air_date.split('-')[0] : 'N/D',
            sinopsis: data.overview || 'Sin sinopsis',
            genero: data.genres ? data.genres.map(g => g.name).join(', ') : 'Serie',
            puntuacion: data.vote_average ? data.vote_average.toFixed(1) : 'N/A',
            numero_temporadas: data.number_of_seasons || 1
        };
        
        document.getElementById('playerTitulo').textContent = serieData.titulo;
        document.getElementById('playerAnio').textContent = serieData.anio;
        document.getElementById('playerRating').textContent = serieData.puntuacion;
        document.getElementById('playerGenero').textContent = serieData.genero;
        document.getElementById('playerSinopsis').textContent = serieData.sinopsis;
        document.getElementById('playerTipo').textContent = '📺 Serie';
        document.getElementById('playerTipo').style.color = '#10B981';
        
        // CREAR TODAS LAS TEMPORADAS DE UNA VEZ
        const numTemps = Math.min(serieData.numero_temporadas, 10);
        for (let t = 1; t <= numTemps; t++) {
            temporadasActuales.push({ numero: t, nombre: `Temporada ${t}`, capitulos: [] });
        }
        
        // LLENAR SELECTOR DE TEMPORADAS
        const select = document.getElementById('tempSelect');
        select.innerHTML = '';
        temporadasActuales.forEach((t, idx) => {
            const opt = document.createElement('option');
            opt.value = idx;
            opt.textContent = `Temporada ${t.numero}`;
            select.appendChild(opt);
        });
        
        document.getElementById('episodiosSection').style.display = 'block';
        
        // CARGAR DIRECTAMENTE TEMPORADA 1 - CAPÍTULO 1 SIN CAMBIOS
        tempActualIndex = 0;
        select.value = 0;
        await cargarCapitulosYOp2(0);
        
        // REPRODUCIR AUTOMÁTICAMENTE AL ENTRAR
        const temp = temporadasActuales[0];
        if (temp && temp.capitulos && temp.capitulos.length > 0) {
            const cap = temp.capitulos[0];
            urlOp1 = cap.url;
            if (cap.opcion2) {
                urlOp2 = cap.opcion2;
                opcion2Disponible = true;
                document.getElementById('btnOp2').classList.remove('oculto');
            }
            reproducir(urlOp1);
            document.getElementById('btnOp1').classList.add('active');
        }
        
        cargarRecomendaciones(tmdbId);
        
    } catch(e) {
        console.error('Error:', e);
        document.getElementById('playerWrapper').innerHTML = `<div class="error-video"><i class="fas fa-exclamation-triangle"></i><span>Error: ${e.message}</span></div>`;
    }
}

async function cargarCapitulosYOp2(tempIndex) {
    if (!temporadasActuales[tempIndex]) return;
    const temp = temporadasActuales[tempIndex];
    
    try {
        const data = await fetchTMDB(`tv/${tmdbId}/season/${temp.numero}`);
        if (!data || !data.episodes) return;
        
        temp.capitulos = data.episodes.map(ep => ({
            numero: ep.episode_number,
            titulo: ep.name || `Episodio ${ep.episode_number}`,
            sinopsis: ep.overview || 'Sin sinopsis',
            url: generarEnlaceUnlimplay(tmdbId, 'serie', temp.numero, ep.episode_number),
            opcion2: null
        }));
        
        try {
            const snap = await db.ref('series_personalizadas').once('value');
            const data2 = snap.val() || {};
            const items = Object.values(data2);
            const item = items.find(i => i.tmdb_id == tmdbId);
            if (item && item.temporadas) {
                const fbTemp = item.temporadas.find(t => t.numero == temp.numero);
                if (fbTemp && fbTemp.capitulos) {
                    temp.capitulos.forEach(cap => {
                        const fbCap = fbTemp.capitulos.find(c => c.numero == cap.numero);
                        if (fbCap?.opcion2) cap.opcion2 = fbCap.opcion2;
                    });
                }
            }
        } catch(e) {}
        
        mostrarEpisodios(tempIndex);
        
    } catch(e) {
        console.error('Error capítulos:', e);
    }
}

function mostrarEpisodios(tempIndex) {
    const temp = temporadasActuales[tempIndex];
    const container = document.getElementById('episodiosList');
    container.innerHTML = '';
    
    if (!temp.capitulos?.length) {
        container.innerHTML = '<p style="color:#64748B;padding:.2rem;text-align:center;">Sin capítulos</p>';
        return;
    }
    
    temp.capitulos.forEach((cap, idx) => {
        const d = document.createElement('div');
        d.className = 'episodio-item' + (idx === 0 ? ' activo' : '');
        const tieneOp2 = cap.opcion2?.startsWith('http');
        
        d.innerHTML = `
            <div class="top">
                <span class="numero">${cap.numero}.</span>
                <span class="titulo">${cap.titulo}</span>
                ${tieneOp2 ? '<span class="badge-op2-ep">⭐ Op2</span>' : ''}
            </div>
            <div class="sinopsis">${cap.sinopsis}</div>
        `;
        
        d.onclick = () => {
            document.querySelectorAll('.episodio-item').forEach(el => el.classList.remove('activo'));
            d.classList.add('activo');
            urlOp1 = cap.url;
            urlOp2 = tieneOp2 ? cap.opcion2 : null;
            opcion2Disponible = tieneOp2;
            document.getElementById('btnOp2').classList.toggle('oculto', !tieneOp2);
            reproducir(opcionActiva === 2 && tieneOp2 ? urlOp2 : urlOp1);
        };
        container.appendChild(d);
    });
}

async function cambiarTempSelect() {
    const idx = parseInt(document.getElementById('tempSelect').value);
    tempActualIndex = idx;
    if (!temporadasActuales[idx].capitulos.length) await cargarCapitulosYOp2(idx);
    else mostrarEpisodios(idx);
}

async function cargarRecomendaciones(tmdbId) {
    const container = document.getElementById('recomendaciones');
    try {
        const data = await fetchTMDB(`movie/${tmdbId}/recommendations`);
        container.innerHTML = '';
        data.results?.slice(0,8).forEach(p => {
            const div = document.createElement('div');
            div.className = 'recomendacion';
            const img = p.poster_path ? getImagenUrl(p.poster_path, 'w185') : 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg';
            div.innerHTML = `<img src="${img}" loading="lazy"><p>${p.title || p.name}</p>`;
            div.onclick = () => window.location.href = `reproductor.html?play=${p.id}&tipo=${p.media_type==='tv'?'serie':'pelicula'}`;
            container.appendChild(div);
        });
    } catch(e) {
        container.innerHTML = '<p style="color:#64748B;font-size:.6rem;">Sin recomendaciones</p>';
    }
}

function mostrarBannerApp() {
    if (localStorage.getItem('bannerAppCerrado') === 'true') return;
    if (/Android|iPhone/i.test(navigator.userAgent)) {
        document.getElementById('bannerApp').style.display = 'block';
        document.body.classList.add('banner-activo');
    }
}
function cerrarBannerApp() {
    document.getElementById('bannerApp').style.display = 'none';
    document.body.classList.remove('banner-activo');
    localStorage.setItem('bannerAppCerrado', 'true');
}
function descargarAPK() {
    window.open('https://appsgeyser.io/19960416/Tely', '_blank');
    setTimeout(cerrarBannerApp, 1500);
}

history.pushState(null, '', window.location.href);
window.addEventListener('popstate', volverAlIndex);

document.addEventListener('DOMContentLoaded', mostrarBannerApp);

if (tmdbId) {
    tipo === 'serie' ? cargarDatosSerie() : cargarPelicula();
} else {
    document.getElementById('playerWrapper').innerHTML = `<div class="error-video"><i class="fas fa-exclamation-triangle"></i><span>No se especificó contenido</span></div>`;
}

async function cargarPelicula() {
    try {
        const data = await fetchTMDB(`movie/${tmdbId}`);
        document.getElementById('playerTitulo').textContent = data.title || 'Sin título';
        document.getElementById('playerAnio').textContent = data.release_date?.split('-')[0] || 'N/D';
        document.getElementById('playerRating').textContent = data.vote_average?.toFixed(1) || 'N/A';
        document.getElementById('playerGenero').textContent = data.genres?.map(g=>g.name).join(', ') || 'Película';
        document.getElementById('playerSinopsis').textContent = data.overview || 'Sin sinopsis';
        document.getElementById('playerTipo').textContent = '🎬 Película';
        urlOp1 = generarEnlaceUnlimplay(tmdbId, 'pelicula');
        reproducir(urlOp1);
        cargarRecomendaciones(tmdbId);
    } catch(e) {
        document.getElementById('playerWrapper').innerHTML = `<div class="error-video"><i class="fas fa-exclamation-triangle"></i><span>Película no encontrada</span></div>`;
    }
}
