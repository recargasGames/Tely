        .user-dropdown{position:absolute;right:0;top:calc(100% + 6px);background:rgba(26,26,46,.95);border-radius:8px;width:160px;border:1px solid rgba(124,58,237,.15);padding:.2rem 0;display:none;z-index:60;box-shadow:0 20px 60px rgba(0,0,0,.5)}

        .recomendacion{flex:0 0 auto;width:80px;cursor:pointer;border-radius:8px;overflow:hidden;text-align:center;transition:.3s;background:rgba(255,255,255,.02)}

    </style>
</head>
<body>

<main class="main-content">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
// ============================================================
// CONFIGURACIÓN
// ============================================================
const firebaseConfig = {
    apiKey: "AIzaSyBPBDEVUR7hjNrxCYrefF9Sbl0Wofp3VoQ",
    authDomain: "telyx-23210.firebaseapp.com",
    projectId: "telyx-23210",
    storageBucket: "telyx-23210.firebasestorage.app",
    messagingSenderId: "10164285015",
    appId: "1:10164285015:web:5cf32bd2831de126c67d12"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ============================================================
// ⭐⭐ PROXY CONFIGURACIÓN ⭐⭐
// ============================================================
const PROXY_URL = 'https://cors-anywhere.herokuapp.com/';
let proxyActivo = false;
const SERVICIOS_CON_PROXY = ['unlimplay.com', 'unlimplay.net', 'unlimplay.org'];

function necesitaProxy(url) {
    if (!url) return false;
    return SERVICIOS_CON_PROXY.some(s => url.includes(s));
}

function aplicarProxy(url) {
    if (!proxyActivo || !necesitaProxy(url)) return url;
    if (url.startsWith(PROXY_URL)) return url;
    return PROXY_URL + url;
}

function toggleProxy() {
    proxyActivo = !proxyActivo;
    const btn = document.getElementById('btnProxy');
    const status = document.getElementById('proxyStatus');
    const indicator = document.getElementById('proxyIndicator');
    
    if (proxyActivo) {
        btn.classList.add('active');
        status.textContent = 'ON';
        status.style.color = '#34D399';
        indicator.style.display = 'inline';
        mostrarToast('🛡️ Proxy activado', 'success');
    } else {
        btn.classList.remove('active');
        status.textContent = 'OFF';
        status.style.color = '#94A3B8';
        indicator.style.display = 'none';
        mostrarToast('🛡️ Proxy desactivado', 'warning');
    }
    
    if (urlActual) {
        recargarVideo();
    }
}

// ============================================================
// VARIABLES
// ============================================================
const params = new URLSearchParams(window.location.search);
let tmdbId = params.get('play');
if (tmdbId && typeof tmdbId === 'string' && tmdbId.startsWith('tmdb_')) {
    tmdbId = tmdbId.replace('tmdb_', '');
}
const tipo = params.get('tipo') || 'pelicula';
const tempRestaurar = params.get('temp') ? parseInt(params.get('temp')) : null;
const capRestaurar = params.get('cap') ? parseInt(params.get('cap')) : null;

let urlOp1 = null, urlOp2 = null, urlActual = null;
let opcion2Disponible = false, opcionActiva = 1;
let esSerie = false;
let temporadasActuales = [];
let tempActualIndex = 0;

console.log('📌 ID:', tmdbId, '| Tipo:', tipo);

// ============================================================
// FUNCIONES BÁSICAS
// ============================================================
function volverAlIndex() {
    if (document.fullscreenElement) document.exitFullscreen().catch(()=>{});
    window.location.href = 'index.html';
}

function toggleFullscreen() {
    const w = document.getElementById('playerWrapper');
    if (!document.fullscreenElement) {
        if (w.requestFullscreen) w.requestFullscreen();
        else if (w.webkitRequestFullscreen) w.webkitRequestFullscreen();
    } else {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    }
}

function irALogin() { window.location.href = 'login.html'; }
function cerrarSesion() { auth.signOut().then(() => { window.location.href = 'index.html'; }); }
function toggleUserMenu() { document.getElementById('userDropdown').classList.toggle('show'); }
document.addEventListener('click', (e) => {
    const menu = document.getElementById('userDropdown');
    if (menu && !e.target.closest('.user-menu')) menu.classList.remove('show');
});
auth.onAuthStateChanged(user => {
    document.getElementById('loginBtn').style.display = user ? 'none' : 'flex';
    document.getElementById('logoutBtn').style.display = user ? 'flex' : 'none';
});

function toggleTheme() {
    const body = document.body;
    const btn = document.getElementById('themeBtn');
    if (body.classList.contains('dark')) { 
        body.classList.remove('dark'); 
        btn.innerHTML = '<i class="fas fa-moon"></i>'; 
        localStorage.setItem('theme', 'light'); 
    } else { 
        body.classList.add('dark'); 
        btn.innerHTML = '<i class="fas fa-sun"></i>'; 
        localStorage.setItem('theme', 'dark'); 
    }
}
if (localStorage.getItem('theme') === 'light') { 
    document.body.classList.remove('dark'); 
    document.getElementById('themeBtn').innerHTML = '<i class="fas fa-moon"></i>'; 
} else { 
    document.body.classList.add('dark'); 
    document.getElementById('themeBtn').innerHTML = '<i class="fas fa-sun"></i>'; 
}

function getImagenUrl(path, size = 'w342') {
    if (!path) return 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg';
    if (path.startsWith('http')) return path;
    return `https://image.tmdb.org/t/p/${size}${path}`;
}

function mostrarToast(msg, tipo = 'success') {
    const colores = { success: '#10B981', warning: '#F59E0B', error: '#EF4444', info: '#3B82F6' };
    const t = document.createElement('div');
    t.style.cssText = `position:fixed;bottom:65px;left:50%;transform:translateX(-50%);background:${colores[tipo] || '#10B981'};color:#fff;padding:6px 14px;border-radius:8px;z-index:9999;font-weight:600;font-size:.7rem;max-width:90%;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:opacity 0.3s;`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2000);
}

async function fetchTMDB(path, params = {}) {
    const q = new URLSearchParams({ path, ...params });
    const res = await fetch(`https://tely-xi.vercel.app/api/tmdb?${q}`);
    if (!res.ok) throw new Error(`Error ${res.status}`);
    return res.json();
}

// ⭐⭐⭐ FUNCIÓN GENERAR ENLACE - CORREGIDA ⭐⭐⭐
function generarEnlaceUnlimplay(tmdb_id, tipo, temporada = 1, capitulo = 1) {
    let url;
    if (tipo === 'pelicula') {
        url = `https://unlimplay.com/play/embed/movie/${tmdb_id}?lang=es-MX&autoplay=1&controls=1&logo=0`;
    } else {
        // ⭐ ASEGURAR QUE TEMPORADA Y CAPÍTULO SEAN NÚMEROS ⭐
        const temp = parseInt(temporada) || 1;
        const cap = parseInt(capitulo) || 1;
        url = `https://unlimplay.com/play/embed/tv/${tmdb_id}/${temp}/${cap}?lang=es-MX&autoplay=1&controls=1&logo=0`;
    }
    if (proxyActivo && necesitaProxy(url)) {
        url = aplicarProxy(url);
    }
    return url;
}

// ============================================================
// ⭐ REPRODUCIR DIRECTO ⭐
// ============================================================
function reproducirDirecto(url) {
    if (!url) return;
    const wrapper = document.getElementById('playerWrapper');
    
    let finalUrl = url;
    if (proxyActivo && necesitaProxy(url)) {
        finalUrl = aplicarProxy(url);
        console.log('🛡️ Proxy aplicado:', finalUrl);
    }
    
    urlActual = finalUrl;
    finalUrl += (finalUrl.includes('?') ? '&' : '?') + 't=' + Date.now();
    
    const iframe = document.createElement('iframe');
    iframe.src = finalUrl;
    iframe.frameborder = "0";
    iframe.referrerpolicy = "no-referrer-when-downgrade";
    iframe.allow = "autoplay; encrypted-media; picture-in-picture; fullscreen";
    iframe.allowfullscreen = true;
    iframe.style.cssText = "width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;";
    iframe.loading = "eager";
    
    wrapper.innerHTML = '';
    wrapper.appendChild(iframe);
}

// ⭐ CARGAR SERIE - CORREGIDA ⭐
// ============================================================
async function cargarSerie() {
    try {
        // 1. OBTENER DATOS DE FIREBASE
        let serieFirebase = null;
        let opcion2Global = null;
        try {
            const snap = await db.ref('series_personalizadas').once('value');
            const items = Object.values(snap.val() || {});
            const item = items.find(i => i.tmdb_id == tmdbId);
            if (item) {
                serieFirebase = item;
                if (item.opcion2 && item.opcion2.trim() !== '' && item.opcion2.startsWith('http')) {
                    opcion2Global = item.opcion2;
                }
                if (item.temporadas && item.temporadas.length) {
                    temporadasActuales = item.temporadas;
                }
            }
        } catch(e) { console.log('Firebase no disponible'); }
        
        // 2. SI HAY DATOS EN FIREBASE, MOSTRAR EPISODIOS
        if (temporadasActuales.length) {
            document.getElementById('episodiosSection').style.display = 'block';
            const select = document.getElementById('tempSelect');
            select.innerHTML = '';
            temporadasActuales.forEach((t, idx) => {
                const opt = document.createElement('option');
                opt.value = idx;
                opt.textContent = `Temporada ${t.numero}`;
                select.appendChild(opt);
            });
            
            let tempIndex = 0;
            if (tempRestaurar !== null && tempRestaurar < temporadasActuales.length) {
                tempIndex = tempRestaurar;
            }
            select.value = tempIndex;
            tempActualIndex = tempIndex;
            
            let capIndex = 0;
            if (capRestaurar !== null && temporadasActuales[tempIndex]?.capitulos?.length > capIndex) {
                capIndex = capRestaurar;
            }
            
            const cap = temporadasActuales[tempIndex]?.capitulos?.[capIndex];
            if (cap && cap.url) {
                // ⭐ GENERAR ENLACE CON TEMPORADA Y CAPÍTULO CORRECTOS ⭐
                const tempNum = temporadasActuales[tempIndex].numero || 1;
                const capNum = cap.numero || capIndex + 1;
                urlOp1 = generarEnlaceUnlimplay(tmdbId, 'serie', tempNum, capNum);
                
                if (cap.opcion2 && cap.opcion2.trim() !== '' && cap.opcion2.startsWith('http')) {
                    urlOp2 = cap.opcion2;
                    opcion2Disponible = true;
                    document.getElementById('btnOp2').classList.remove('oculto');
                } else if (opcion2Global) {
                    urlOp2 = opcion2Global;
                    opcion2Disponible = true;
                    document.getElementById('btnOp2').classList.remove('oculto');
                }
                reproducirDirecto(urlOp1);
                document.getElementById('btnOp1').classList.add('active');
            }
            
            mostrarEpisodios(tempIndex, capIndex);
        }
        
        // 3. OBTENER DATOS DE TMDB
        const data = await fetchTMDB(`tv/${tmdbId}`);
        if (data && data.id) {
            document.getElementById('playerTitulo').textContent = data.name || 'Sin título';
            document.getElementById('playerAnio').textContent = data.first_air_date ? data.first_air_date.split('-')[0] : 'N/D';
            document.getElementById('playerRating').textContent = data.vote_average ? data.vote_average.toFixed(1) : 'N/A';
            document.getElementById('playerGenero').textContent = data.genres ? data.genres.map(g => g.name).join(', ') : 'Serie';
            document.getElementById('playerSinopsis').textContent = data.overview || 'Sin sinopsis';
            document.getElementById('playerTipo').textContent = '📺 Serie';
            document.getElementById('playerTipo').style.color = '#10B981';
            esSerie = true;
        }
        
        // 4. SI NO HAY DATOS EN FIREBASE, CARGAR DE TMDB
        if (!temporadasActuales.length && data) {
            const numTemps = Math.min(data.number_of_seasons || 1, 10);
            for (let t = 1; t <= numTemps; t++) {
                try {
                    const seasonData = await fetchTMDB(`tv/${tmdbId}/season/${t}`);
                    if (!seasonData || !seasonData.episodes) continue;
                    const capitulos = seasonData.episodes.map(ep => ({
                        numero: ep.episode_number,
                        titulo: ep.name || `Capítulo ${ep.episode_number}`,
                        sinopsis: ep.overview || 'Sin sinopsis',
                        url: null, // Se generará después
                        opcion2: null
                    }));
                    temporadasActuales.push({ numero: t, nombre: seasonData.name || `Temporada ${t}`, capitulos });
                } catch(e) {}
            }
            
            if (temporadasActuales.length) {
                try {
                    await db.ref('series_personalizadas').push({
                        titulo: data.name,
                        anio: data.first_air_date ? data.first_air_date.split('-')[0] : 'N/D',
                        sinopsis: data.overview || 'Sin sinopsis',
                        portada: getImagenUrl(data.poster_path, 'w342'),
                        genero: data.genres ? data.genres.map(g => g.name).join(', ') : 'Serie',
                        tipo: 'serie',
                        tmdb_id: data.id,
                        puntuacion: data.vote_average ? data.vote_average.toFixed(1) : 'N/A',
                        temporadas: temporadasActuales,
                        url: generarEnlaceUnlimplay(data.id, 'serie', 1, 1)
                    });
                } catch(e) {}
            }
            
            if (temporadasActuales.length && !document.getElementById('episodiosSection').style.display) {
                document.getElementById('episodiosSection').style.display = 'block';
                const select = document.getElementById('tempSelect');
                select.innerHTML = '';
                temporadasActuales.forEach((t, idx) => {
                    const opt = document.createElement('option');
                    opt.value = idx;
                    opt.textContent = `Temporada ${t.numero}`;
                    select.appendChild(opt);
                });
                
                let tempIndex = 0;
                if (tempRestaurar !== null && tempRestaurar < temporadasActuales.length) {
                    tempIndex = tempRestaurar;
                }
                select.value = tempIndex;
                tempActualIndex = tempIndex;
                
                let capIndex = 0;
                if (capRestaurar !== null && temporadasActuales[tempIndex]?.capitulos?.length > capIndex) {
                    capIndex = capRestaurar;
                }
                
                const cap = temporadasActuales[tempIndex]?.capitulos?.[capIndex];
                if (cap && !urlOp1) {
                    const tempNum = temporadasActuales[tempIndex].numero || 1;
                    const capNum = cap.numero || capIndex + 1;
                    urlOp1 = generarEnlaceUnlimplay(tmdbId, 'serie', tempNum, capNum);
                    reproducirDirecto(urlOp1);
                    document.getElementById('btnOp1').classList.add('active');
                }
                
                mostrarEpisodios(tempIndex, capIndex);
            }
        }
        
        // 5. BUSCAR OPCIÓN 2
        if (!opcion2Disponible) {
            try {
                const snap = await db.ref('series_personalizadas').once('value');
                const items = Object.values(snap.val() || {});
                const item = items.find(i => i.tmdb_id == tmdbId);
                if (item && item.temporadas) {
                    temporadasActuales.forEach((temp, tempIdx) => {
                        const fbTemp = item.temporadas.find(t => t.numero == temp.numero);
                        if (fbTemp && fbTemp.capitulos) {
                            temp.capitulos.forEach(cap => {
                                const fbCap = fbTemp.capitulos.find(c => c.numero == cap.numero);
                                if (fbCap && fbCap.opcion2) {
                                    cap.opcion2 = fbCap.opcion2;
                                }
                            });
                        }
                    });
                    mostrarEpisodios(tempActualIndex);
                    
                    const temp = temporadasActuales[tempActualIndex];
                    const capActual = temp?.capitulos?.find(c => c.url === urlOp1);
                    if (capActual && capActual.opcion2 && capActual.opcion2.trim() !== '' && capActual.opcion2.startsWith('http')) {
                        urlOp2 = capActual.opcion2;
                        opcion2Disponible = true;
                        document.getElementById('btnOp2').classList.remove('oculto');
                    } else if (opcion2Global) {
                        urlOp2 = opcion2Global;
                        opcion2Disponible = true;
                        document.getElementById('btnOp2').classList.remove('oculto');
                    }
                }
            } catch(e) {}
        }
        
        cargarRecomendacionesSerie(tmdbId);
        
    } catch(e) {
        console.error('Error:', e);
    }
}

// ============================================================
// ⭐ MOSTRAR EPISODIOS ⭐
// ============================================================
function mostrarEpisodios(tempIndex, capSeleccionado = 0) {
    if (!temporadasActuales[tempIndex]) return;
    const temp = temporadasActuales[tempIndex];
    const container = document.getElementById('episodiosList');
    container.innerHTML = '';
    
    if (!temp.capitulos || !temp.capitulos.length) {
        container.innerHTML = '<p style="color:#64748B;padding:.2rem;text-align:center;font-size:.7rem;">Sin capítulos</p>';
        return;
    }
    
    const tempNum = temp.numero || 1;
    
    temp.capitulos.forEach((cap, idx) => {
        const d = document.createElement('div');
        d.className = 'episodio-item';
        if (idx === capSeleccionado) d.classList.add('activo');
        const tieneOp2 = cap.opcion2 && cap.opcion2.trim() !== '' && cap.opcion2.startsWith('http');
        const capNum = cap.numero || idx + 1;
        // Generar URL si no tiene
        if (!cap.url) {
            cap.url = generarEnlaceUnlimplay(tmdbId, 'serie', tempNum, capNum);
        }
        
        d.innerHTML = `
            <div class="top">
                <span class="numero">${capNum}.</span>
                <span class="titulo">${cap.titulo || 'Episodio ' + capNum}</span>
                ${tieneOp2 ? '<span class="badge-op2-ep">⭐ Op2</span>' : ''}
                ${proxyActivo && cap.url && necesitaProxy(cap.url) ? '<span class="proxy-badge">🛡️ Proxy</span>' : ''}
            </div>
            <div class="sinopsis">${cap.sinopsis || ''}</div>
        `;
        
        d.onclick = () => {
            if (!cap.url) { mostrarToast('❌ Sin enlace', 'error'); return; }
            
            document.querySelectorAll('.episodio-item').forEach(el => el.classList.remove('activo'));
            d.classList.add('activo');
            
            urlOp1 = generarEnlaceUnlimplay(tmdbId, 'serie', tempNum, capNum);
            if (cap.opcion2 && cap.opcion2.trim() !== '' && cap.opcion2.startsWith('http')) {
                urlOp2 = cap.opcion2;
                opcion2Disponible = true;
                document.getElementById('btnOp2').classList.remove('oculto');
            } else {
                urlOp2 = null;
                opcion2Disponible = false;
                document.getElementById('btnOp2').classList.add('oculto');
            }
            
            if (opcionActiva === 2 && !opcion2Disponible) {
                opcionActiva = 1;
                document.getElementById('btnOp1').classList.add('active');
                document.getElementById('btnOp2').classList.remove('active');
            }
            
            if (opcionActiva === 2 && opcion2Disponible && urlOp2) {
                reproducirDirecto(urlOp2);
            } else {
                reproducirDirecto(urlOp1);
            }
        };
        container.appendChild(d);
    });
}

function cambiarTempSelect() {
    const select = document.getElementById('tempSelect');
    const idx = parseInt(select.value);
    tempActualIndex = idx;
    mostrarEpisodios(idx, 0);
    
    const temp = temporadasActuales[idx];

            } else {

                document.getElementById('btnOp2').classList.add('oculto');
            }
            if (opcionActiva === 2 && !opcion2Disponible) {
                opcionActiva = 1;
                document.getElementById('btnOp1').classList.add('active');
                document.getElementById('btnOp2').classList.remove('active');
            }
            if (opcionActiva === 2 && opcion2Disponible && urlOp2) {

}

// ============================================================
function reproducirOpcion(opcion) {
    if (opcion === 1 && urlOp1) {
        opcionActiva = 1;
        document.getElementById('btnOp1').classList.add('active');
        document.getElementById('btnOp2').classList.remove('active');
        reproducirDirecto(urlOp1);
    } else if (opcion === 2 && opcion2Disponible && urlOp2) {
        opcionActiva = 2;
        document.getElementById('btnOp2').classList.add('active');
        document.getElementById('btnOp1').classList.remove('active');
        reproducirDirecto(urlOp2);
    } else {
        mostrarToast('❌ Opción no disponible', 'error');
    }
}

function detectarPlataforma() {
    const ua = navigator.userAgent || '';
    const esWebView = /wv|WebView|Android.*(wv|WebView)/i.test(ua);
    const esNavegador = !esWebView && /Android|iPhone|iPad|iPod/i.test(ua);
    return { esWebView, esNavegador };
}
function mostrarBannerApp() {
    const banner = document.getElementById('bannerApp');
    if (!banner) return;
    if (localStorage.getItem('bannerAppCerrado') === 'true') return;
    const { esNavegador } = detectarPlataforma();
    if (esNavegador) { banner.style.display = 'block'; document.body.classList.add('banner-activo'); }
}
function cerrarBannerApp() {
    const banner = document.getElementById('bannerApp');
    if (banner) { banner.style.display = 'none'; document.body.classList.remove('banner-activo'); localStorage.setItem('bannerAppCerrado', 'true'); }
}
function descargarAPK() {
    const urlAPK = 'https://appsgeyser.io/19960416/Tely';
    mostrarToast('📱 Descargando...', 'info');
