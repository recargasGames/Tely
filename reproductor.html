<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TELY 🎬 - Reproductor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0A0A0F;color:#fff;font-family:'Segoe UI',Roboto,sans-serif;min-height:100vh}
        .player-container{max-width:1200px;margin:0 auto;padding:1rem}
        .player-wrapper{position:relative;background:#000;border-radius:12px;overflow:hidden;aspect-ratio:16/9;width:100%}
        .player-wrapper iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;background:#000}
        .player-info{padding:.8rem 0}
        .player-info h1{font-size:1.3rem;font-weight:700;color:#fff}
        .player-info .meta{color:#94A3B8;font-size:.85rem;display:flex;gap:1rem;flex-wrap:wrap}
        .player-info .sinopsis{color:#94A3B8;font-size:.85rem;margin-top:.3rem;line-height:1.4}
        .player-controls{display:flex;gap:.5rem;flex-wrap:wrap;margin:.3rem 0}
        .btn-reproducir{background:#7C3AED;border:none;color:#fff;padding:.6rem 2rem;border-radius:8px;font-weight:700;font-size:.95rem;cursor:pointer;transition:.3s;display:flex;align-items:center;gap:.5rem}
        .btn-reproducir:hover{background:#6D28D9}
        .btn-reproducir:disabled{opacity:.5;cursor:not-allowed}
        .btn-nueva-ventana{background:rgba(255,255,255,.06);border:1px solid rgba(124,58,237,.2);color:#fff;padding:.6rem 1.5rem;border-radius:8px;font-weight:600;font-size:.85rem;cursor:pointer;transition:.3s}
        .btn-nueva-ventana:hover{background:rgba(124,58,237,.15)}
        .btn-recargar{background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.2);color:#34D399;padding:.6rem 1.5rem;border-radius:8px;font-weight:600;font-size:.85rem;cursor:pointer;transition:.3s}
        .btn-recargar:hover{background:rgba(16,185,129,.25)}
        .capitulos-section{background:rgba(255,255,255,.03);border-radius:10px;padding:.6rem;border:1px solid rgba(124,58,237,.06);margin-top:.3rem}
        .capitulos-section .temp-selector{display:flex;align-items:center;justify-content:center;gap:.6rem;margin-bottom:.3rem}
        .capitulos-section .temp-selector button{background:rgba(255,255,255,.06);border:none;color:#fff;padding:.1rem .5rem;border-radius:9999px;cursor:pointer;font-size:.8rem}
        .capitulos-section .temp-selector button:hover{background:rgba(124,58,237,.2)}
        .capitulos-section .temp-selector button:disabled{opacity:.3;cursor:not-allowed}
        .capitulos-section .temp-selector span{font-weight:700;font-size:.9rem;color:#fff}
        .capitulos-list{display:flex;flex-direction:column;gap:.2rem;max-height:250px;overflow-y:auto}
        .capitulo-item{display:flex;flex-direction:column;padding:.2rem .5rem;background:rgba(255,255,255,.04);border-radius:6px;cursor:pointer;border:1px solid transparent;transition:.2s}
        .capitulo-item:hover{background:rgba(255,255,255,.08)}
        .capitulo-item.activo{background:rgba(124,58,237,.15);border-color:#7C3AED}
        .capitulo-item.sin-enlace{opacity:.5;cursor:not-allowed}
        .capitulo-item .top{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}
        .capitulo-item .numero{font-size:.65rem;color:#A78BFA;font-weight:700;min-width:25px}
        .capitulo-item .titulo{font-size:.7rem;color:#E2E8F0;font-weight:500;flex:1}
        .capitulo-item .play{font-size:.55rem;color:#34D399;font-weight:600}
        .capitulo-item .sinopsis{font-size:.6rem;color:#64748B;margin-top:.05rem;padding-left:2rem;line-height:1.2}
        .recomendaciones{display:flex;gap:.5rem;overflow-x:auto;padding:.3rem 0}
        .recomendacion{flex:0 0 auto;width:70px;cursor:pointer;border-radius:6px;overflow:hidden}
        .recomendacion:hover{transform:scale(1.05)}
        .recomendacion img{width:100%;height:100px;object-fit:cover}
        .recomendacion p{font-size:.45rem;text-align:center;color:#94A3B8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .back-link{display:inline-flex;align-items:center;gap:.3rem;color:#A78BFA;text-decoration:none;font-weight:600;padding:.3rem .8rem;border-radius:8px;background:rgba(124,58,237,.1);transition:.3s;font-size:.85rem}
        .back-link:hover{background:rgba(124,58,237,.2)}
        .loading-spinner{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:#000;color:#A78BFA;gap:1rem}
        .loading-spinner i{font-size:3rem;color:#7C3AED;animation:spin 1s linear infinite}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        .error-video{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:#0A0A0F;color:#EF4444;gap:1rem;text-align:center;padding:1rem}
        .error-video i{font-size:3rem}
        .error-video .sub{color:#64748B;font-size:.8rem}
        body:not(.dark) .player-info h1{color:#111}
        body:not(.dark) .capitulos-section .temp-selector span{color:#111}
        body:not(.dark) .capitulo-item .titulo{color:#111}
        body:not(.dark) .capitulo-item .sinopsis{color:#555}
        body:not(.dark) .btn-nueva-ventana{color:#111;border-color:rgba(0,0,0,.1)}
        body:not(.dark) .btn-nueva-ventana:hover{background:rgba(124,58,237,.1)}
        body:not(.dark) .btn-recargar{color:#059669;border-color:rgba(5,150,105,.2)}
    </style>
</head>
<body>
<div class="player-container">
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Volver</a>
    
    <div class="player-wrapper" id="playerWrapper">
        <div class="loading-spinner">
            <i class="fas fa-spinner"></i>
            <span>Cargando reproductor...</span>
        </div>
    </div>
    
    <div class="player-info">
        <h1 id="playerTitulo">Título</h1>
        <div class="meta">
            <span id="playerAnio">2024</span>
            <span>⭐ <span id="playerRating">7.3</span></span>
            <span id="playerGenero">Acción</span>
            <span id="playerTipo" style="color:#A78BFA;">🎬 Película</span>
        </div>
        <div class="sinopsis" id="playerSinopsis">Sinopsis...</div>
    </div>
    
    <!-- CONTROLES -->
    <div class="player-controls" id="playerControls">
        <button class="btn-reproducir" id="btnReproducir" onclick="reproducirActual()">
            <i class="fas fa-play"></i> Reproducir
        </button>
        <button class="btn-recargar" onclick="recargarVideo()">
            <i class="fas fa-rotate"></i> Recargar
        </button>
        <button class="btn-nueva-ventana" onclick="abrirNuevaVentana()">
            <i class="fas fa-external-link-alt"></i> Nueva ventana
        </button>
    </div>
    
    <div class="capitulos-section" id="capitulosSection" style="display:none;">
        <div class="temp-selector">
            <button onclick="cambiarTemp(-1)" id="tempPrev"><i class="fas fa-chevron-left"></i></button>
            <span id="tempActual">Temporada 1</span>
            <button onclick="cambiarTemp(1)" id="tempNext"><i class="fas fa-chevron-right"></i></button>
        </div>
        <div class="capitulos-list" id="capitulosList"></div>
    </div>
    
    <div style="margin-top:.5rem;">
        <h4 style="font-weight:700;margin-bottom:.2rem;font-size:.9rem;color:#fff;">Te podría gustar</h4>
        <div class="recomendaciones" id="recomendaciones"></div>
    </div>
</div>

<script type="importmap">
{
    "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"
    }
}
</script>
<script type="module">
import { initializeApp } from "firebase/app";
import { getAuth } from "firebase/auth";
import { getDatabase, ref, get, push, child } from "firebase/database";

const firebaseConfig = {
    apiKey: "AIzaSyBPBDEVUR7hjNrxCYrefF9Sbl0Wofp3VoQ",
    authDomain: "telyx-23210.firebaseapp.com",
    projectId: "telyx-23210",
    storageBucket: "telyx-23210.firebasestorage.app",
    messagingSenderId: "10164285015",
    appId: "1:10164285015:web:5cf32bd2831de126c67d12",
    measurementId: "G-0YEZMJYMJS"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// ⭐ BOTÓN ATRÁS
history.pushState(null, '', window.location.href);
window.addEventListener('popstate', function(e) {
    const wrapper = document.getElementById('playerWrapper');
    if (wrapper.querySelector('iframe')) {
        wrapper.innerHTML = `<div class="loading-spinner"><i class="fas fa-spinner"></i><span>Cerrando...</span></div>`;
        e.preventDefault();
        history.pushState(null, '', window.location.href);
        return false;
    }
    return true;
});
document.addEventListener('backbutton', function(e) {
    const wrapper = document.getElementById('playerWrapper');
    if (wrapper.querySelector('iframe')) {
        wrapper.innerHTML = `<div class="loading-spinner"><i class="fas fa-spinner"></i><span>Cerrando...</span></div>`;
        e.preventDefault();
        e.stopPropagation();
        return false;
    }
}, false);

// ⭐ PARÁMETROS
const params = new URLSearchParams(window.location.search);
const tmdbId = params.get('play');
const tipo = params.get('tipo') || 'pelicula';
const tempRestaurar = params.get('temp') ? parseInt(params.get('temp')) : null;
const capRestaurar = params.get('cap') ? parseInt(params.get('cap')) : null;

let peliculaActual = null;
let temporadasActuales = [];
let tempActualIndex = 0;
let urlActual = null;

// ⭐ GENERAR ENLACE UNLIMPLAY
function generarEnlaceUnlimplay(tmdb_id, tipo, temporada = 1, capitulo = 1) {
    if (tipo === 'pelicula') {
        return `https://unlimplay.com/play/embed/movie/${tmdb_id}?lang=es-MX&autoplay=1&controls=1&logo=0`;
    } else {
        return `https://unlimplay.com/play/embed/tv/${tmdb_id}/${temporada}/${capitulo}?lang=es-MX&autoplay=1&controls=1&logo=0`;
    }
}

function getImagenUrl(path, size = 'w342') {
    if (!path) return 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg';
    return `https://image.tmdb.org/t/p/${size}${path}`;
}

function mostrarToast(msg, tipo = 'success') {
    const colores = { success: '#10B981', warning: '#F59E0B', error: '#EF4444' };
    const t = document.createElement('div');
    t.style.cssText = `position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:${colores[tipo] || '#10B981'};color:#fff;padding:10px 20px;border-radius:10px;z-index:9999;font-weight:600;max-width:90%;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:opacity 0.3s;`;
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2500);
}

function agregarAlHistorial(item, temporada = null, capitulo = null) {
    if (!item) return;
    let h = JSON.parse(localStorage.getItem('historialTely')) || [];
    const existente = h.findIndex(x => x.id === item.id);
    const entry = {
        id: item.id || `tmdb_${item.tmdb_id}`,
        titulo: item.titulo,
        tipo: item.tipo || 'pelicula',
        temporada: temporada,
        capitulo: capitulo,
        portada: item.portada,
        timestamp: Date.now()
    };
    if (existente !== -1) { h[existente] = entry; } else { h.unshift(entry); }
    if (h.length > 20) h.pop();
    localStorage.setItem('historialTely', JSON.stringify(h));
}

async function fetchTMDB(path, params = {}) {
    const queryParams = new URLSearchParams();
    queryParams.append('path', path);
    Object.keys(params).forEach(key => queryParams.append(key, params[key]));
    const url = `https://tely-xi.vercel.app/api/tmdb?${queryParams.toString()}`;
    const response = await fetch(url);
    if (!response.ok) throw new Error(`Error: ${response.status}`);
    return response.json();
}

// ⭐ REPRODUCIR - VERSIÓN RÁPIDA
function reproducir(url) {
    const wrapper = document.getElementById('playerWrapper');
    urlActual = url;
    
    let finalUrl = url;
    if (!finalUrl.includes('autoplay')) {
        if (finalUrl.includes('?')) {
            finalUrl += '&autoplay=1&controls=1&logo=0';
        } else {
            finalUrl += '?autoplay=1&controls=1&logo=0';
        }
    }
    if (finalUrl.includes('unlimplay.com/play/') && !finalUrl.includes('unlimplay.com/play/embed/')) {
        finalUrl = finalUrl.replace('unlimplay.com/play/', 'unlimplay.com/play/embed/');
    }
    
    // ⭐ AGREGAR TIMESTAMP PARA EVITAR CACHÉ
    finalUrl += '&t=' + Date.now();
    
    wrapper.innerHTML = `
        <div class="loading-spinner">
            <i class="fas fa-spinner"></i>
            <span>Cargando video...</span>
        </div>
    `;
    
    const iframe = document.createElement('iframe');
    iframe.src = finalUrl;
    iframe.frameborder = "0";
    iframe.referrerpolicy = "no-referrer-when-downgrade";
    iframe.allow = "autoplay; encrypted-media; picture-in-picture; fullscreen";
    iframe.allowfullscreen = true;
    iframe.style.cssText = "width:100%;height:100%;border:none;background:#000;position:absolute;top:0;left:0;";
    iframe.loading = "eager";
    
    // ⭐ CUANDO EL IFRAME TERMINE DE CARGAR
    iframe.onload = function() {
        const spinner = wrapper.querySelector('.loading-spinner');
        if (spinner) spinner.style.display = 'none';
    };
    
    // ⭐ SI DESPUÉS DE 8 SEGUNDOS SIGUE CARGANDO, OCULTAR SPINNER
    setTimeout(() => {
        const spinner = wrapper.querySelector('.loading-spinner');
        if (spinner) spinner.style.display = 'none';
    }, 8000);
    
    wrapper.appendChild(iframe);
}

// ⭐ REPRODUCIR ACTUAL
window.reproducirActual = function() {
    if (!peliculaActual) {
        mostrarToast('❌ No hay contenido para reproducir', 'error');
        return;
    }
    
    let url = null;
    if (peliculaActual.tipo === 'serie') {
        const capActivo = document.querySelector('.capitulo-item.activo');
        if (capActivo) {
            const idx = parseInt(capActivo.dataset.index);
            const temp = temporadasActuales[tempActualIndex];
            if (temp && temp.capitulos && temp.capitulos[idx]) {
                url = temp.capitulos[idx].url;
            }
        } else {
            const c = obtenerCapitulo(tempActualIndex, 0);
            url = c?.url;
        }
        if (!url) {
            mostrarToast('❌ Este capítulo no tiene enlace', 'error');
            return;
        }
    } else {
        url = peliculaActual.url || generarEnlaceUnlimplay(peliculaActual.tmdb_id, 'pelicula');
    }
    
    if (url) {
        reproducir(url);
        mostrarToast('▶️ Reproduciendo...', 'success');
    } else {
        mostrarToast('❌ No hay enlace disponible', 'error');
    }
};

// ⭐ RECARGAR VIDEO
window.recargarVideo = function() {
    if (urlActual) {
        mostrarToast('🔄 Recargando video...', 'info');
        reproducir(urlActual);
    } else {
        mostrarToast('❌ No hay video para recargar', 'error');
    }
};

// ⭐ NUEVA VENTANA
window.abrirNuevaVentana = function() {
    if (urlActual) {
        window.open(urlActual, '_blank');
    } else {
        mostrarToast('❌ No hay enlace para abrir', 'error');
    }
};

// ⭐ CARGAR CONTENIDO
async function cargarContenidoReproductor() {
    const wrapper = document.getElementById('playerWrapper');
    wrapper.innerHTML = `<div class="loading-spinner"><i class="fas fa-spinner"></i><span>Cargando...</span></div>`;
    
    try {
        const dbRef = ref(db);
        const [pSnap, sSnap] = await Promise.all([
            get(child(dbRef, 'contenido_personalizado')),
            get(child(dbRef, 'series_personalizadas'))
        ]);
        const pelis = pSnap.val() ? Object.values(pSnap.val()) : [];
        const series = sSnap.val() ? Object.values(sSnap.val()) : [];
        const contenido = [...pelis.map(p => ({ ...p, tipo: 'pelicula' })), ...series.map(s => ({ ...s, tipo: 'serie' }))];
        
        let item = contenido.find(c => c.tmdb_id == tmdbId);
        
        // SI NO EXISTE, GENERAR
        if (!item && tmdbId) {
            mostrarToast('⏳ Generando contenido...', 'info');
            if (tipo === 'pelicula') {
                const data = await fetchTMDB(`movie/${tmdbId}`);
                if (data && data.id) {
                    item = {
                        titulo: data.title || `Película ${tmdbId}`,
                        anio: data.release_date ? data.release_date.split('-')[0] : 'N/D',
                        sinopsis: data.overview || 'Sin sinopsis',
                        portada: getImagenUrl(data.poster_path, 'w342'),
                        genero: data.genres ? data.genres.map(g => g.name).join(', ') : 'Película',
                        tipo: 'pelicula',
                        tmdb_id: data.id,
                        puntuacion: data.vote_average ? data.vote_average.toFixed(1) : 'N/A',
                        url: generarEnlaceUnlimplay(data.id, 'pelicula'),
                    };
                    await push(ref(db, 'contenido_personalizado'), item);
                    mostrarToast('✅ Película generada', 'success');
                }
            } else {
                const data = await fetchTMDB(`tv/${tmdbId}`);
                if (data && data.id) {
                    const temporadas = [];
                    for (let t = 1; t <= Math.min(data.number_of_seasons || 1, 10); t++) {
                        try {
                            const seasonData = await fetchTMDB(`tv/${tmdbId}/season/${t}`);
                            if (!seasonData || !seasonData.episodes) continue;
                            const capitulos = seasonData.episodes.map(ep => ({
                                numero: ep.episode_number,
                                titulo: ep.name || `Capítulo ${ep.episode_number}`,
                                sinopsis: ep.overview || 'Sin sinopsis',
                                url: generarEnlaceUnlimplay(data.id, 'serie', t, ep.episode_number)
                            }));
                            temporadas.push({ numero: t, nombre: seasonData.name || `Temporada ${t}`, capitulos });
                        } catch(e) {}
                    }
                    if (temporadas.length > 0) {
                        item = {
                            titulo: data.name || `Serie ${tmdbId}`,
                            anio: data.first_air_date ? data.first_air_date.split('-')[0] : 'N/D',
                            sinopsis: data.overview || 'Sin sinopsis',
                            portada: getImagenUrl(data.poster_path, 'w342'),
                            genero: data.genres ? data.genres.map(g => g.name).join(', ') : 'Serie',
                            tipo: 'serie',
                            tmdb_id: data.id,
                            puntuacion: data.vote_average ? data.vote_average.toFixed(1) : 'N/A',
                            temporadas: temporadas,
                        };
                        await push(ref(db, 'series_personalizadas'), item);
                        mostrarToast('✅ Serie generada', 'success');
                    }
                }
            }
        }
        
        if (item) {
            peliculaActual = item;
            cargarReproductor(item, tempRestaurar, capRestaurar);
        } else {
            wrapper.innerHTML = `<div class="error-video"><i class="fas fa-exclamation-triangle"></i><span>Contenido no encontrado</span><span class="sub">ID: ${tmdbId} - Tipo: ${tipo}</span></div>`;
        }
    } catch(e) {
        console.error(e);
        wrapper.innerHTML = `<div class="error-video"><i class="fas fa-exclamation-triangle"></i><span>Error: ${e.message}</span></div>`;
    }
}

function cargarReproductor(peli, tempRestaurar = null, capRestaurar = null) {
    peliculaActual = peli;
    document.getElementById('playerTitulo').textContent = peli.titulo;
    document.getElementById('playerAnio').textContent = peli.anio || '2024';
    document.getElementById('playerRating').textContent = peli.puntuacion || '7.0';
    document.getElementById('playerGenero').textContent = peli.genero || (peli.tipo === 'serie' ? 'Serie' : 'Película');
    document.getElementById('playerSinopsis').textContent = peli.sinopsis || 'Sin sinopsis';
    document.getElementById('playerTipo').textContent = peli.tipo === 'serie' ? '📺 Serie' : '🎬 Película';
    document.getElementById('playerTipo').style.color = peli.tipo === 'serie' ? '#10B981' : '#A78BFA';
    
    if (peli.tipo === 'serie' && peli.temporadas && peli.temporadas.length) {
        temporadasActuales = peli.temporadas;
        document.getElementById('capitulosSection').style.display = 'block';
        
        let tempIndex = 0, capIndex = 0;
        if (tempRestaurar !== null && capRestaurar !== null) {
            tempIndex = Math.min(tempRestaurar, temporadasActuales.length - 1);
            const temp = temporadasActuales[tempIndex];
            if (temp && temp.capitulos) capIndex = Math.min(capRestaurar, temp.capitulos.length - 1);
        }
        
        mostrarTemporada(tempIndex, capIndex);
        const pc = obtenerCapitulo(tempIndex, 0);
        
        // Cargar primer capítulo
        if (pc?.url) {
            reproducir(pc.url);
        }
        agregarAlHistorial(peli, tempIndex, capIndex);
        cargarRecomendaciones(peli.tmdb_id);
    } else {
        document.getElementById('capitulosSection').style.display = 'none';
        const url = peli.url || generarEnlaceUnlimplay(peli.tmdb_id, 'pelicula');
        if (url) {
            reproducir(url);
        }
        agregarAlHistorial(peli);
        cargarRecomendaciones(peli.tmdb_id);
    }
}

function obtenerCapitulo(tempIdx, capIdx) {
    if (!temporadasActuales || !temporadasActuales.length) return null;
    const t = temporadasActuales[tempIdx];
    if (!t || !t.capitulos || !t.capitulos.length) return null;
    return t.capitulos[capIdx] || null;
}

function mostrarTemporada(index, capSeleccionado = 0) {
    if (!temporadasActuales || !temporadasActuales.length) return;
    if (index < 0) index = 0;
    if (index >= temporadasActuales.length) index = temporadasActuales.length - 1;
    tempActualIndex = index;
    const temp = temporadasActuales[index];
    const container = document.getElementById('capitulosList');
    const label = document.getElementById('tempActual');
    label.textContent = `Temporada ${temp.numero || index + 1}`;
    container.innerHTML = '';
    document.getElementById('tempPrev').disabled = index === 0;
    document.getElementById('tempNext').disabled = index === temporadasActuales.length - 1;
    if (!temp.capitulos || !temp.capitulos.length) {
        container.innerHTML = '<p style="color:#64748B;padding:.2rem;text-align:center;font-size:.8rem;">Sin capítulos</p>';
        return;
    }
    temp.capitulos.forEach((cap, idx) => {
        const d = document.createElement('div');
        d.className = 'capitulo-item';
        if (idx === capSeleccionado) d.classList.add('activo');
        if (!cap.url) d.classList.add('sin-enlace');
        d.dataset.index = idx;
        const tieneUrl = cap.url && cap.url.trim() !== '';
        d.innerHTML = `
            <div class="top">
                <span class="numero">Cap ${cap.numero || idx + 1}</span>
                <span class="titulo">${cap.titulo || 'Capítulo ' + (idx + 1)}</span>
                ${tieneUrl ? `<span class="play">▶ Ver</span>` : '<span style="color:#EF4444;font-size:.55rem;">🔒 Sin enlace</span>'}
            </div>
            ${cap.sinopsis ? `<div class="sinopsis">${cap.sinopsis}</div>` : ''}
        `;
        d.onclick = () => {
            if (!cap.url) {
                mostrarToast('❌ Este capítulo no tiene enlace', 'error');
                return;
            }
            document.querySelectorAll('.capitulo-item').forEach(el => el.classList.remove('activo'));
            d.classList.add('activo');
            reproducir(cap.url);
            agregarAlHistorial(peliculaActual, tempActualIndex, idx);
        };
        container.appendChild(d);
    });
}

window.cambiarTemp = function(dir) {
    const n = tempActualIndex + dir;
    if (n >= 0 && n < temporadasActuales.length) {
        mostrarTemporada(n, 0);
        const c = obtenerCapitulo(n, 0);
        if (c?.url) {
            reproducir(c.url);
        }
    }
};

async function cargarRecomendaciones(tmdbId) {
    const container = document.getElementById('recomendaciones');
    container.innerHTML = '<p style="color:#64748B;font-size:.7rem;">Cargando...</p>';
    if (!tmdbId) return;
    try {
        const data = await fetchTMDB(`movie/${tmdbId}/recommendations`, { page: 1 });
        container.innerHTML = '';
        if (!data.results || !data.results.length) {
            container.innerHTML = '<p style="color:#64748B;font-size:.7rem;">Sin recomendaciones</p>';
            return;
        }
        data.results.slice(0, 8).forEach(p => {
            const div = document.createElement('div');
            div.className = 'recomendacion';
            const imgUrl = p.poster_path ? getImagenUrl(p.poster_path, 'w185') : 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg';
            div.innerHTML = `
                <img src="${imgUrl}" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg'">
                <p>${p.title || p.name}</p>
            `;
            div.onclick = () => {
                const tipo = p.media_type === 'tv' ? 'serie' : 'pelicula';
                window.location.href = `reproductor.html?play=${p.id}&tipo=${tipo}`;
            };
            container.appendChild(div);
        });
    } catch(e) { container.innerHTML = '<p style="color:#64748B;font-size:.7rem;">Sin recomendaciones</p>'; }
}

// ⭐ INICIO
if (tmdbId) {
    cargarContenidoReproductor();
} else {
    document.getElementById('playerWrapper').innerHTML = `
        <div class="error-video"><i class="fas fa-exclamation-triangle"></i><span>No se especificó contenido</span><span class="sub">Usa: ?play=ID&tipo=pelicula</span></div>
    `;
}
