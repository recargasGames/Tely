<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TELY 🎬 - Películas</title>
    <link rel="icon" href="logo.png" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ========== RESET ========== */
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{width:100%;height:100%;overflow:hidden;background:#0A0A0F}
        body{background:#0A0A0F;color:#fff;font-family:system-ui,-apple-system,sans-serif}
        ::-webkit-scrollbar{display:none}

        /* ========== MAIN ========== */
        .main-content{
            width:100%;
            height:100vh;
            padding:10px 12px 20px 12px;
            overflow-y:auto;
            max-width:600px;
            margin:0 auto;
        }

        /* ========== HEADER ========== */
        .header{
            position:sticky;
            top:0;
            z-index:50;
            background:rgba(10,10,15,.95);
            backdrop-filter:blur(12px);
            padding:10px 0 14px;
            border-bottom:2px solid rgba(124,58,237,.15);
        }
        .header-top{
            display:flex;
            justify-content:space-between;
            align-items:center;
        }
        .header-top h1{
            font-size:22px;
            font-weight:800;
            background:linear-gradient(135deg,#7C3AED,#A78BFA);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }
        .header-actions{
            display:flex;
            gap:8px;
        }
        .header-actions button{
            background:rgba(255,255,255,.05);
            border:none;
            color:#fff;
            width:40px;
            height:40px;
            border-radius:50%;
            cursor:pointer;
            font-size:18px;
            transition:.3s;
        }
        .header-actions button:hover{
            background:rgba(255,255,255,.1);
        }
        .search-box{
            display:flex;
            gap:8px;
            margin-top:10px;
        }
        .search-box input{
            flex:1;
            padding:10px 16px;
            border-radius:50px;
            border:2px solid rgba(124,58,237,.2);
            background:rgba(255,255,255,.05);
            color:#fff;
            font-size:14px;
            transition:.3s;
        }
        .search-box input:focus{
            outline:none;
            border-color:#7C3AED;
            background:rgba(255,255,255,.08);
        }
        .search-box input::placeholder{
            color:#64748B;
        }
        .search-box button{
            padding:10px 20px;
            border-radius:50px;
            border:none;
            background:#7C3AED;
            color:#fff;
            font-weight:700;
            cursor:pointer;
            transition:.3s;
            font-size:14px;
        }
        .search-box button:hover{
            background:#6D28D9;
            transform:scale(1.02);
        }

        /* ========== FILTROS ========== */
        .filtros{
            display:flex;
            gap:8px;
            margin-top:10px;
            flex-wrap:wrap;
        }
        .filtros select{
            padding:6px 12px;
            border-radius:8px;
            border:1px solid rgba(124,58,237,.2);
            background:rgba(255,255,255,.05);
            color:#fff;
            font-size:12px;
            cursor:pointer;
            flex:1;
            min-width:80px;
        }
        .filtros select:focus{
            outline:none;
            border-color:#7C3AED;
        }
        .filtros button{
            padding:6px 16px;
            border-radius:8px;
            border:none;
            background:#7C3AED;
            color:#fff;
            font-weight:600;
            font-size:12px;
            cursor:pointer;
            transition:.3s;
        }
        .filtros button:hover{
            background:#6D28D9;
        }

        /* ⭐⭐⭐ 4 COLUMNAS POR FILA ⭐⭐⭐ */
        .grid-peliculas{
            display:grid !important;
            grid-template-columns:repeat(4,1fr) !important;
            gap:8px !important;
            padding:12px 0 !important;
        }

        /* ========== TARJETAS ========== */
        .movie-card{
            background:rgba(255,255,255,.04);
            border-radius:10px;
            overflow:hidden;
            cursor:pointer;
            border:1px solid rgba(124,58,237,.08);
            transition:all .3s ease;
            position:relative;
        }
        .movie-card:hover{
            transform:translateY(-4px);
            border-color:#7C3AED;
            box-shadow:0 8px 30px rgba(124,58,237,.2);
        }
        .movie-card .poster{
            width:100%;
            aspect-ratio:2/3;
            object-fit:cover;
            background:#1A1A2E;
        }
        .movie-card .info{
            padding:8px 6px;
        }
        .movie-card .info h4{
            font-size:11px;
            font-weight:600;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }
        .movie-card .info .meta{
            display:flex;
            justify-content:space-between;
            font-size:9px;
            color:#94A3B8;
            margin-top:2px;
        }
        .movie-card .badge-year{
            position:absolute;
            top:6px;
            left:6px;
            background:rgba(124,58,237,.85);
            color:#fff;
            padding:2px 8px;
            border-radius:4px;
            font-size:8px;
            font-weight:700;
        }
        .movie-card .badge-type{
            position:absolute;
            top:6px;
            right:6px;
            background:rgba(0,0,0,.7);
            color:#fff;
            padding:2px 8px;
            border-radius:4px;
            font-size:7px;
            font-weight:600;
        }

        /* ========== SKELETON ========== */
        .skeleton{
            aspect-ratio:2/3;
            border-radius:10px;
            background:linear-gradient(90deg,#1A1A2E 25%,#2D2D44 50%,#1A1A2E 75%);
            background-size:200% 100%;
            animation:skeleton 1.5s infinite;
        }
        @keyframes skeleton{
            0%{background-position:-200% 0}
            100%{background-position:200% 0}
        }

        /* ========== INDICADOR DE CARGA ========== */
        .loading-indicator{
            text-align:center;
            padding:20px 0;
            color:#94A3B8;
            font-size:14px;
            display:none;
        }
        .loading-indicator.show{
            display:block;
        }
        .loading-indicator i{
            margin-right:8px;
        }

        .empty-msg{
            color:#64748B;
            padding:20px;
            text-align:center;
            font-size:14px;
        }

        /* ========== FINAL ========== */
        .end-message{
            text-align:center;
            padding:20px 0;
            color:#64748B;
            font-size:13px;
            display:none;
        }
        .end-message.show{
            display:block;
        }
    </style>
</head>
<body>

<main class="main-content" id="mainContent">

    <!-- ===== HEADER ===== -->
    <div class="header">
        <div class="header-top">
            <h1>🎬 Películas</h1>
            <div class="header-actions">
                <button onclick="window.location.href='index.html'"><i class="fas fa-home"></i></button>
                <button onclick="toggleTheme()" id="themeBtn"><i class="fas fa-moon"></i></button>
                <button onclick="window.location.href='login.html'"><i class="fas fa-user"></i></button>
            </div>
        </div>

        <!-- ===== BUSCADOR ===== -->
        <div class="search-box">
            <input type="text" placeholder="🔍 Buscar películas..." id="searchInput" onkeydown="if(event.key==='Enter') buscar()">
            <button onclick="buscar()"><i class="fas fa-search"></i> Buscar</button>
        </div>

        <!-- ===== FILTROS ===== -->
        <div class="filtros">
            <select id="filterYear">
                <option value="">Todos los años</option>
                <option value="2026">2026</option>
                <option value="2025">2025</option>
                <option value="2024">2024</option>
                <option value="2023">2023</option>
            </select>
            <select id="filterGenre">
                <option value="">Todos los géneros</option>
                <option value="28">Acción</option>
                <option value="35">Comedia</option>
                <option value="18">Drama</option>
                <option value="27">Terror</option>
                <option value="878">Ciencia Ficción</option>
            </select>
            <button onclick="aplicarFiltros()"><i class="fas fa-filter"></i> Filtrar</button>
        </div>
    </div>

    <!-- ===== GRID 4 COLUMNAS ===== -->
    <div class="grid-peliculas" id="listaPeliculas"></div>

    <!-- ===== INDICADOR DE CARGA ===== -->
    <div class="loading-indicator" id="loadingIndicator">
        <i class="fas fa-spinner fa-spin"></i> Cargando más películas...
    </div>

    <!-- ===== MENSAJE FINAL ===== -->
    <div class="end-message" id="endMessage">
        🎬 ¡Ya no hay más películas!
    </div>

</main>

<!-- ===== FIREBASE ===== -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
// ============================================================
// 🔥 CONFIGURACIÓN FIREBASE
// ============================================================
const firebaseConfig = {
    apiKey: "AIzaSyBPBDEVUR7hjNrxCYrefF9Sbl0Wofp3VoQ",
    authDomain: "telyx-23210.firebaseapp.com",
    projectId: "telyx-23210",
    storageBucket: "telyx-23210.firebasestorage.app",
    messagingSenderId: "10164285015",
    appId: "1:10164285015:web:5cf32bd2831de126c67d12"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ============================================================
// 📌 VARIABLES GLOBALES
// ============================================================
let paginaActual = 1;
let cargando = false;
let totalPaginas = 1;
let filtroGenero = '';
let filtroAnio = '';
let yaNoHayMas = false;

// ============================================================
// 🛠️ FUNCIONES AUXILIARES
// ============================================================
function getImagen(path) {
    if (!path) return 'https://i.postimg.cc/8k4h4K7y/placeholder.jpg';
    return `https://image.tmdb.org/t/p/w342${path}`;
}

async function fetchTMDB(path, params = {}) {
    const q = new URLSearchParams({ path, ...params });
    const res = await fetch(`https://tely-xi.vercel.app/api/tmdb?${q}`);
    if (!res.ok) throw new Error(`Error ${res.status}`);
    return res.json();
}

function toggleTheme() {
    const body = document.body;
    const btn = document.getElementById('themeBtn');
    body.classList.toggle('dark');
    btn.innerHTML = body.classList.contains('dark') ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    localStorage.setItem('theme', body.classList.contains('dark') ? 'dark' : 'light');
}
if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark');
    document.getElementById('themeBtn').innerHTML = '<i class="fas fa-sun"></i>';
}

// ============================================================
// 🎴 CREAR TARJETA
// ============================================================
function crearTarjeta(item) {
    const div = document.createElement('div');
    div.className = 'movie-card';
    div.innerHTML = `
        <span class="badge-year">${item.anio || 'N/D'}</span>
        <span class="badge-type">🎬</span>
        <img src="${item.portada}" class="poster" loading="lazy" onerror="this.src='https://i.postimg.cc/8k4h4K7y/placeholder.jpg'">
        <div class="info">
            <h4>${item.titulo}</h4>
            <div class="meta"><span>⭐ ${item.puntuacion || 'N/A'}</span></div>
        </div>
    `;
    div.onclick = () => {
        const params = new URLSearchParams({ play: item.tmdb_id || item.id, tipo: 'pelicula' });
        window.location.href = `reproductor.html?${params}`;
    };
    return div;
}

// ============================================================
// 📦 CARGAR PELÍCULAS
// ============================================================
async function cargarPeliculas(page = 1) {
    if (cargando) return;
    if (page > totalPaginas && page > 1) {
        yaNoHayMas = true;
        document.getElementById('endMessage').classList.add('show');
        return;
    }

    cargando = true;
    const grid = document.getElementById('listaPeliculas');
    const loading = document.getElementById('loadingIndicator');
    
    // Mostrar indicador de carga
    loading.classList.add('show');

    // Mostrar skeletons en la primera página
    if (page === 1) {
        grid.innerHTML = '';
        for (let i = 0; i < 8; i++) {
            const sk = document.createElement('div');
            sk.className = 'skeleton';
            grid.appendChild(sk);
        }
    }

    try {
        const params = { page };
        if (filtroAnio) params.primary_release_year = filtroAnio;
        if (filtroGenero) params.with_genres = filtroGenero;

        const data = await fetchTMDB('discover/movie', params);
        totalPaginas = data.total_pages || 1;

        // Limpiar skeletons
        if (page === 1) grid.innerHTML = '';

        if (!data.results || !data.results.length) {
            if (page === 1) grid.innerHTML = '<p class="empty-msg">No hay películas disponibles</p>';
            loading.classList.remove('show');
            cargando = false;
            return;
        }

        // Obtener datos personalizados de Firebase
        const snap = await db.ref('contenido_personalizado').once('value');
        const adminData = snap.val() || {};
        const adminMap = {};
        Object.values(adminData).forEach(i => { adminMap[i.tmdb_id] = i; });

        // Crear tarjetas
        data.results.forEach(p => {
            const a = adminMap[p.id];
            const item = {
                id: p.id,
                tmdb_id: p.id,
                titulo: a?.titulo || p.title || 'Sin título',
                anio: a?.anio || (p.release_date ? p.release_date.split('-')[0] : 'N/D'),
                portada: a?.portada || getImagen(p.poster_path),
                puntuacion: a?.puntuacion || (p.vote_average ? p.vote_average.toFixed(1) : 'N/A')
            };
            grid.appendChild(crearTarjeta(item));
        });

        paginaActual = page;

        // Ocultar indicador de carga
        loading.classList.remove('show');

        // Si ya no hay más páginas, mostrar mensaje final
        if (page >= totalPaginas) {
            yaNoHayMas = true;
            document.getElementById('endMessage').classList.add('show');
        } else {
            yaNoHayMas = false;
            document.getElementById('endMessage').classList.remove('show');
        }

    } catch (e) {
        console.error('Error:', e);
        if (page === 1) grid.innerHTML = '<p class="empty-msg">⚠️ Error al cargar películas</p>';
        loading.classList.remove('show');
    }
    cargando = false;
}

// ============================================================
// 🔄 CARGAR MÁS (solo desde scroll)
// ============================================================
function cargarMasPeliculas() {
    if (!cargando && !yaNoHayMas) {
        cargarPeliculas(paginaActual + 1);
    }
}

// ============================================================
// 🎯 FILTROS
// ============================================================
window.aplicarFiltros = function() {
    filtroGenero = document.getElementById('filterGenre').value;
    filtroAnio = document.getElementById('filterYear').value;
    paginaActual = 1;
    totalPaginas = 1;
    yaNoHayMas = false;
    document.getElementById('endMessage').classList.remove('show');
    cargarPeliculas(1);
};

// ============================================================
// 📜 SCROLL INFINITO - CARGA AUTOMÁTICA
// ============================================================
const mainContent = document.getElementById('mainContent');
let timeoutScroll = null;

mainContent.addEventListener('scroll', function() {
    clearTimeout(timeoutScroll);
    timeoutScroll = setTimeout(() => {
        const scrollTop = mainContent.scrollTop;
        const scrollHeight = mainContent.scrollHeight;
        const clientHeight = mainContent.clientHeight;

        // 🔥 CARGA CUANDO FALTAN 150px PARA EL FINAL
        if (scrollTop + clientHeight >= scrollHeight - 150) {
            if (!cargando && !yaNoHayMas) {
                cargarMasPeliculas();
            }
        }
    }, 100);
});

// ============================================================
// 🔍 BÚSQUEDA
// ============================================================
window.buscar = async function() {
    const input = document.getElementById('searchInput');
    const query = input.value.trim();
    if (!query) return;

    try {
        const data = await fetchTMDB('search/movie', { query, page: 1 });
        const grid = document.getElementById('listaPeliculas');

        grid.innerHTML = '';

        if (!data.results || !data.results.length) {
            grid.innerHTML = '<p class="empty-msg">No se encontraron películas</p>';
            document.getElementById('endMessage').classList.remove('show');
            return;
        }

        data.results.forEach(p => {
            const item = {
                id: p.id,
                tmdb_id: p.id,
                titulo: p.title || 'Sin título',
                anio: p.release_date ? p.release_date.split('-')[0] : 'N/D',
                portada: getImagen(p.poster_path),
                puntuacion: p.vote_average ? p.vote_average.toFixed(1) : 'N/A'
            };
            grid.appendChild(crearTarjeta(item));
        });

        document.getElementById('endMessage').classList.remove('show');
    } catch (e) {
        console.error(e);
    }
};

// ============================================================
// 🚀 INICIAR
// ============================================================
cargarPeliculas(1);

console.log('🔥 4 columnas + Scroll infinito automático (sin botón)');
</script>

</body>
</html>
